<html><head><base href=".">
<title>AI Creepypasta Generator</title>
<style>
  body {
    background-color: #111;
    color: #d00;
    font-family: 'Courier New', monospace;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .container {
    max-width: 800px;
    width: 100%;
    position: relative;
  }

  .screen {
    background-color: #000;
    border: 2px solid #300;
    padding: 20px;
    margin: 20px 0;
    box-shadow: 0 0 20px #d003;
    position: relative;
    min-height: 400px;
  }

  #story {
    white-space: pre-line;
    line-height: 1.6;
    font-size: 16px;
    opacity: 0;
    transition: opacity 1s;
  }

  .typing {
    opacity: 1 !important;
  }

  button, select, input {
    background: #300;
    color: #d00;
    border: 2px solid #d00;
    padding: 10px 20px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s;
    margin: 5px;
  }

  button:hover, select:hover {
    background: #d00;
    color: #000;
    box-shadow: 0 0 15px #d00;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .hidden {
    display: none;
  }

  .glitch {
    animation: glitch 1s linear infinite;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0.1;
  }

  @keyframes glitch {
    2%, 64% {
      transform: translate(2px,0) skew(0deg);
    }
    4%, 60% {
      transform: translate(-2px,0) skew(0deg);
    }
    62% {
      transform: translate(0,0) skew(5deg); 
    }
  }

  .loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 24px;
    display: none;
  }

  .cursor {
    display: inline-block;
    width: 10px;
    height: 20px;
    background: #d00;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  @keyframes jumpscare {
    0% {
      transform: scale(1);
      filter: brightness(1);
    }
    5% {
      transform: scale(1.5);
      filter: brightness(2) invert(1);
    }
    10% {
      transform: scale(1.2);
      filter: brightness(1.5) invert(0);
    }
    15% {
      transform: scale(1.4);
      filter: brightness(2) invert(1);
    }
    20% {
      transform: scale(1);
      filter: brightness(1);
    }
  }

  .jumpscare {
    animation: jumpscare 0.5s linear;
  }

  .extreme-glitch {
    animation: extremeGlitch 0.3s linear infinite;
  }

  @keyframes extremeGlitch {
    0% {
      transform: translate(10px, 5px) skew(20deg);
      filter: hue-rotate(90deg);
    }
    25% {
      transform: translate(-15px, -10px) skew(-20deg);
      filter: invert(1) hue-rotate(180deg);
    }
    50% {
      transform: translate(5px, 15px) skew(10deg);
      filter: saturate(200%) hue-rotate(270deg);
    }
    75% {
      transform: translate(-5px, -5px) skew(-10deg);
      filter: contrast(200%) hue-rotate(0deg);
    }
  }

  .screen.danger {
    border-color: #f00;
    box-shadow: 0 0 30px #f00;
  }

  #stopButton {
    background: #600;
    border-color: #f00;
  }

  #stopButton:hover {
    background: #f00;
    color: #000;
    box-shadow: 0 0 15px #f00;
  }

  .custom-style-settings {
    border: 1px solid #300;
    padding: 15px;
    margin-top: 10px;
  }

  .setting-group {
    margin: 10px 0;
  }

  .setting-group label {
    display: block;
    margin-bottom: 5px;
    color: #d00;
  }

  #custom-category-details {
    width: 100%;
    background: #300;
    color: #d00;
    border: 2px solid #d00;
    padding: 10px;
    font-family: 'Courier New', monospace;
    margin: 5px 0;
    resize: vertical;
  }

  #lost-media-options input,
  #lost-media-options select {
    margin: 5px 0;
    width: 100%;
  }

  #lost-media-year {
    width: calc(100% - 24px) !important;
    padding: 10px;
  }

  #lost-media-name {
    width: calc(100% - 24px) !important;
    padding: 10px;
  }
  
  .chat-message {
    background: #222;
    border-radius: 10px;
    padding: 10px;
    margin: 10px 0;
    border-left: 3px solid #d00;
  }

  .chat-username {
    color: #d00;
    font-weight: bold;
    margin-bottom: 5px;
  }

  .chat-timestamp {
    color: #666;
    font-size: 0.8em;
    float: right;
  }

  .chat-text {
    color: #d00;
  }
  
  #style-sub-options {
    margin-top: 10px;
  }

  #sub-style {
    width: 100%;
  }
</style>
</head>

<script>let isGenerating = false;
let shouldStop = false;
let currentTimeout = null;
function handleCategoryChange() {
  const category = document.getElementById('category').value;
  document.querySelectorAll('[id$="-options"]').forEach(el => el.classList.add('hidden'));
  
  if (category === 'custom') {
    document.getElementById('custom-category-options').classList.remove('hidden');
  } else if (category === 'lost-episodes') {
    document.getElementById('lost-episodes-options').classList.remove('hidden');
  } else if (category === 'lost-media') {
    document.getElementById('lost-media-options').classList.remove('hidden');
  } else if (category === 'website') {
    document.getElementById('website-options').classList.remove('hidden');
  } else if (category === 'malware') {
    document.getElementById('malware-options').classList.remove('hidden');
  } else if (category === 'mobile-malware') {
    document.getElementById('mobile-malware-options').classList.remove('hidden');
  } else if (category === 'channel-hack') {
    document.getElementById('channel-hack-options').classList.remove('hidden');
  }
}
function handleStyleChange() {
  const style = document.getElementById('style').value;
  const customStyleOptions = document.getElementById('custom-style-options');
  const styleSubOptions = document.getElementById('style-sub-options');
  customStyleOptions.classList.add('hidden');
  styleSubOptions.classList.add('hidden');
  if (style === 'custom') {
    customStyleOptions.classList.remove('hidden');
  }
  styleSubOptions.classList.remove('hidden');
  const subStyleSelect = document.getElementById('sub-style');
  subStyleSelect.innerHTML = '';
  subStyleSelect.innerHTML = `
    <option value="none">No Sub-Style</option>
    <option value="killer">Ultra Killer Mode</option> 
    <option value="nonexistent">Non-Existent Words</option>
  `;
  if (style === 'y2k') {
    subStyleSelect.innerHTML += `
      <option value="y2k-variant">Y2K Variant</option>
    `;
  }
}
document.getElementById('custom-line-endings').addEventListener('change', function () {
  const lineEndingText = document.getElementById('custom-line-ending-text');
  if (this.value === 'custom') {
    lineEndingText.classList.remove('hidden');
  } else {
    lineEndingText.classList.add('hidden');
  }
});
function stopGeneration() {
  shouldStop = true;
  if (currentTimeout) {
    clearTimeout(currentTimeout);
  }
  const loadingElement = document.querySelector('.loading');
  loadingElement.style.display = 'none';
  document.getElementById('stopButton').style.display = 'none';
  isGenerating = false;
  const storyElement = document.getElementById('story');
  if (!storyElement.textContent.includes('GENERATION STOPPED')) {
    storyElement.innerHTML += '\n\n[GENERATION STOPPED BY USER]';
  }
}
async function generateStory() {
  if (isGenerating) return;
  isGenerating = true;
  shouldStop = false;
  document.getElementById('stopButton').style.display = 'inline-block';
  const storyElement = document.getElementById('story');
  const loadingElement = document.querySelector('.loading');
  const category = document.getElementById('category').value;
  const style = document.getElementById('style').value;
  const customTheme = document.getElementById('custom-theme').value;
  const length = document.getElementById('length').value;
  const screenElement = document.querySelector('.screen');
  screenElement.classList.remove('danger');
  screenElement.classList.remove('extreme-glitch');
  document.body.classList.remove('jumpscare');
  let wordCount;
  switch (length) {
    case '2-words':
      wordCount = 2;
      break;
    case 'short':
      wordCount = 300;
      break;
    case 'medium':
      wordCount = 500;
      break;
    case 'long':
      wordCount = 800;
      break;
    case 'epic':
      wordCount = 1200;
      break;
    case 'epicer':
      wordCount = 2000;
      break;
    case 'epicer+':
      wordCount = 3000;
      break;
    case 'epicer++':
      wordCount = 4000;
      break;
    case 'epicer+++':
      wordCount = 5000;
      break;
    case 'galaxy':
      wordCount = 10000;
      break;
    case 'universe':
      wordCount = 20000;
      break;
    case 'why':
      wordCount = 30000;
      break;
    case 'why+':
      wordCount = 40000;
      break;
    case 'why++':
      wordCount = 50000;
      break;
    case 'dont-click':
      wordCount = 666666;
      const warningMessage = "Y̸o̵u̶ ̷s̷h̴o̵u̸l̵d̷n̴'̶t̷ ̶h̴a̵v̸e̷ ̴c̶l̶i̵c̷k̵e̷d̸ ̶t̶h̶a̶t̴.̷.̷.̵";
      const glitchAudio = new Audio('data:audio/wav;base64,UklGRjIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YRAAAACU/6D/tf+5/8r/0P/W/+L/6v/2/wA=');
      glitchAudio.volume = 0.2;
      glitchAudio.play().catch(e => console.log('Audio blocked by browser'));
      screenElement.classList.add('danger');
      screenElement.classList.add('extreme-glitch');
      document.body.classList.add('jumpscare');
      storyElement.innerHTML = warningMessage;
      storyElement.classList.add('typing');
      await new Promise(resolve => setTimeout(resolve, 2000));
      break;
    default:
      wordCount = 500;
  }
  if (wordCount > 5000) {
    if (!confirm("WARNING: You've selected an extremely long story length. This may take a while to generate and could potentially crash your browser. Are you sure you want to continue?")) {
      return;
    }
  }
  storyElement.classList.remove('typing');
  loadingElement.style.display = 'block';
  let promptContext = '';
  if (category === 'lost-episodes') {
    const show = document.getElementById('show-select').value;
    promptContext = `about a lost episode of ${show}`;
  } else if (category === 'lost-media') {
    const mediaType = document.getElementById('lost-media-type').value;
    const mediaName = document.getElementById('lost-media-name').value;
    const mediaYear = document.getElementById('lost-media-year').value;
    const mediaFormat = document.getElementById('lost-media-format').value;
    let mediaContext = `about a mysterious lost ${mediaType}`;
    if (mediaName) {
      mediaContext += ` titled "${mediaName}"`;
    }
    if (mediaYear) {
      mediaContext += ` from ${mediaYear}`;
    }
    mediaContext += ` found on ${mediaFormat}`;
    promptContext = mediaContext;
  } else if (category === 'website') {
    const domain = document.getElementById('domain-name').value;
    const extension = document.getElementById('domain-extension').value;
    promptContext = `about a mysterious website ${domain}.${extension}`;
  } else if (category === 'malware') {
    const malware = document.getElementById('malware-name').value;
    promptContext = `about a malicious software called ${malware}`;
  } else if (category === 'mobile-malware') {
    const malwareName = document.getElementById('mobile-malware-name').value || 'unknown';
    const platform = document.getElementById('mobile-platform').value;
    promptContext = `about a malicious mobile app/malware called ${malwareName} targeting ${platform} devices`;
  } else if (category === 'channel-hack') {
    const channelType = document.getElementById('channel-select').value;
    const channelName = document.getElementById('channel-name').value || 'unknown';
    promptContext = `about hacking a ${channelType} channel/account named ${channelName}`;
  } else if (category === 'gmod') {
    promptContext = 'about a creepy Garry\'s Mod experience';
  } else if (category === 'minecraft') {
    promptContext = 'about a mysterious Minecraft encounter';
  } else if (category === 'custom') {
    const customCategoryName = document.getElementById('custom-category-name').value;
    const customCategoryDetails = document.getElementById('custom-category-details').value;
    promptContext = `about ${customCategoryName}${customCategoryDetails ? ` with these details: ${customCategoryDetails}` : ''}`;
  } else {
    promptContext = 'a general creepypasta story';
  }
  if (customTheme) {
    promptContext += ` involving ${customTheme}`;
  }
  let stylePrompt = '';
  switch (style) {
    case 'brainrot':
      stylePrompt = 'Write in extremely chaotic zoomer/meme style with excessive caps lock, emojis, and references to sigma, rizz, etc.';
      break;
    case 'greentext':
      stylePrompt = 'Write in 4chan greentext style, starting each line with ">"';
      break;
    case 'clickbait':
      stylePrompt = 'Write in the style of a clickbait YouTube title with excessive caps lock and exclamation marks';
      break;
    case 'copypasta':
      stylePrompt = 'Write in an extremely stupid and exaggerated copypasta style with random capitalization, excessive emojis, and repetitive phrases. Include phrases like "OMG", "LOL", and add lots of 😱😱😱 emojis. Make it deliberately over-the-top and nonsensical.';
      break;
    case 'frskull':
      stylePrompt = 'Write in modern internet slang style using "fr", "ong", "nah", "💀" emoji, and other current social media expressions. Make it sound like a Gen Z telling a story with frequent use of "fr fr", "nah fr", and skull emojis.';
      break;
    case 'y2k':
      const y2kSubStyle = document.getElementById('sub-style').value;
      if (y2kSubStyle === 'y2k-variant') {
        stylePrompt = 'Write in Y2K style but focus heavily on computer glitches, millennium bug fears, and early internet horror. Include lots of "ERROR 404", "SYSTEM FAILURE", and computer malfunction references along with the usual Y2K internet slang.';
      } else {
        stylePrompt = 'Write in early 2000s internet style with lots of "ZOMG", "ROFL", "EPIC FAIL", "TEH", "PWN3D", and other classic internet expressions. Use lots of "XD" emoticons and random "rawr means i love you in dinosaur" energy. Make it sound like a MySpace post from 2005.';
      }
      break;
    case '1337':
      stylePrompt = 'Write in classic 1337-speak style, replacing letters with numbers (e=3, a=4, t=7, etc) and using lots of "n00b", "pwn", and "h4x0r" terms';
      break;
    case 'y2k1337':
      stylePrompt = 'Combine Y2K and 1337-speak styles, using both "ZOMG ROFL" type phrases and number replacements like "n00b" and "l33t"';
      break;
    case 'rap':
      stylePrompt = 'Write in a rap/hip-hop style with rhymes, flow, and street slang. Include rap-style formatting and rhythm';
      break;
    case 'peak':
      stylePrompt = 'Write in an extremely exaggerated "peak fiction" style with excessive emphasis on dramatic reveals and plot twists';
      break;
    case 'freaky':
      stylePrompt = 'Write in an unsettling, bizarre style with lots of disturbing imagery and unexpected dark turns';
      break;
    case 'yalldont':
      stylePrompt = 'Write in Southern American dialectal style starting with "Y\'all don\'t understand..." and using lots of Southern expressions';
      break;
    case 'yo':
      stylePrompt = 'Write in casual street style starting with "Yo" and using lots of modern slang and informal expressions';
      break;
    case 'funny-normal':
      stylePrompt = 'Write in a style that starts completely normal but abruptly cuts off mid-sentence at a comedic moment';
      break;
    case 'sus':
      stylePrompt = 'Write in Among Us/suspicious style with lots of "sus", "amogus", "imposter" references and related memes';
      break;
    case 'youtube2014':
      stylePrompt = 'Write in the style of mid-2010s YouTube intro lyrics with dubstep references, excessive effects descriptions, and dated meme references';
      break;
    case 'robuxscam':
      stylePrompt = 'Write in the style of a scam Robux website with excessive exclamation marks, caps lock, random codes, and promises of free items';
      break;
    case 'rapreddit':
      stylePrompt = 'Write in a combination of rap style and Reddit post format, including both rhyming verses and Reddit-style formatting with subreddit references';
      break;
    case 'turn-of-events':
      stylePrompt = 'Write in a style that starts as a normal creepypasta but includes an unexpected funny or absurd turn of events at the end of every sentence. For example: "I walked into the dark room and saw a shadowy figure... sitting there doing taxes." Each line should build tension then end with something silly or unexpected.';
      break;
    case 'brick-turn':
      stylePrompt = 'Write in a chaotic, confusing style where each sentence starts normally but takes random absurd turns and topic changes mid-sentence. Each line should start coherently but spiral into unrelated topics and confusion, ending with "(line end)". For example: "I went to the store to buy milk but then the milk turned into a skateboard and I remembered I actually work at NASA(line end)" or "Was checking my email when suddenly my chair became president of chickens and now I\'m typing this from a submarine(line end)". Make each line completely unpredictable with sudden topic changes and nonsensical developments.';
      break;
    case 'turn-dramatic':
      stylePrompt = 'Write in a style that starts as an intense action scene but ends each sentence with an unexpectedly mundane activity. For example: "The masked killer chased me through the dark alley... so we could finish our chess game." or "Blood dripped from the walls as I ran... to catch the ice cream truck." Each line should build intense action/horror then end with something completely ordinary.';
      break;
    case 'turn-wholesome':
      stylePrompt = 'Write in a style that starts as a creepy horror story but ends each sentence with something unexpectedly wholesome and heartwarming. For example: "The shadow creature emerged from under my bed... to help me study for my math test." or "Strange noises echoed through the haunted house... from the surprise birthday party they were setting up." Each line should start scary but end warmly.';
      break;
    case 'turn-game':
      stylePrompt = 'Write in a style that starts as a serious horror story but ends each sentence with video game references and gaming moments. For example: "The ancient curse took hold of my soul... but then I remembered I needed to touch grass and stop playing League of Legends." or "Dark figures surrounded my house... asking if I had games on my phone." Each line should transition from horror to gaming culture.';
      break;
    case 'turn-food':
      stylePrompt = 'Write in a style that starts with creepy horror elements but ends each sentence with unexpected food and cooking references. For example: "The ghostly apparition floated through the walls... to share their grandma\'s secret lasagna recipe." or "A pentagram glowed on the floor... revealing a perfectly baked soufflé." Each line should shift from spooky to culinary.';
      break;
    case 'jokepasta':
      stylePrompt = 'Write in a deliberately humorous creepypasta style that parodies horror tropes. Include obvious jokes, puns, and comedic twists while maintaining creepypasta format. Make it silly and funny rather than scary, but keep the creepypasta structure. For example: "Then the skeleton popped out... and started doing standup comedy!" or "The haunted game console was possessed... by a ghost who just wanted to beat my high score."';
      break;
    case 'trollpasta':
      stylePrompt = 'Write in an intentionally bizarre and nonsensical trollpasta style with random elements, poor grammar, unexpected plot twists, and deliberately bad writing. Include random memes, references, and absurd developments. Make it read like an intentionally bad creepypasta that goes off the rails. Example style: "BUT THEN PHONE WAS DOGGO and HyPeRrEaLiStIc blood turned into spaghetti code while Mario did backflips in 144p quality!!1!" Use lots of exclamation marks, random capitalization, and nonsensical plot developments.';
      break;
    case 'custom':
      let customStyleSettings = '';
      const textCase = document.getElementById('custom-text-case').value;
      const punctuation = document.getElementById('custom-punctuation').value;
      const writingStyle = document.getElementById('custom-writing-style').value;
      const emoji = document.getElementById('custom-emoji').value;
      const lineEndings = document.getElementById('custom-line-endings').value;
      const lineEndingText = document.getElementById('custom-line-ending-text').value;
      customStyleSettings = `Use ${textCase} text case, ${punctuation} punctuation, ${writingStyle} writing style, ${emoji} emoji usage${lineEndings === 'custom' ? ` and end lines with "${lineEndingText}"` : ''}.`;
      stylePrompt = `Write in a custom style with these specifications: ${customStyleSettings}`;
      break;
    case 'chat':
      stylePrompt = 'Write in the style of a chat/messaging log. Format the story as a series of chat messages with usernames, timestamps, and messages. Include multiple participants having a conversation about something creepy/horrifying. Use formatting like:\nDarkExplorer98 [2:15 AM]: hey guys, something weird is happening...\nParanormalHunter [2:16 AM]: what do you mean?\nDarkExplorer98 [2:17 AM]: i keep hearing these sounds...';
      break;
    case 'broken-english':
      stylePrompt = 'Write in deliberately broken English with grammatical errors, mixed up tenses, and incorrect word usage. Make it sound like someone who is not fluent in English trying to tell a scary story. For example: "Yesterday I was go to store when strange thing happen..." Use wrong verb forms, missing articles, and imperfect sentence structure consistently.';
      break;
    case 'normal':
      const subStyle = document.getElementById('sub-style').value;
      switch (subStyle) {
        case 'killer':
          stylePrompt = 'Write in an extremely violent and aggressive style where the protagonist brutally defeats monsters and evil entities. Include graphic descriptions of combat and victory.';
          break;
        case 'nonexistent':
          stylePrompt = 'Write using made-up words and nonsensical terms that sound creepy but don\'t actually exist. Create an unsettling atmosphere through linguistic confusion.';
          break;
        default:
          stylePrompt = 'Write in a standard creepypasta style';
      }
      break;
  }
  try {
    const response = await fetch('/api/ai_completion', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        prompt: `Generate a creepy, unsettling horror story ${promptContext}. ${stylePrompt}
        The story should be approximately ${wordCount} words unless it's a special format like clickbait title.
        
        interface Response {
          title: string;
          story: string;
        }
        
        {
          "title": "The Last Livestream",
          "story": "I never meant to stay up so late watching streams, but something kept me glued to my screen that night..."
        }
        `,
        data: `Category: ${category}, Style: ${style}, Theme: ${customTheme}, Length: ${length}`
      })
    });
    const data = await response.json();
    loadingElement.style.display = 'none';
    if (length === 'dont-click') {
      data.title = `H̷̢̧͈͈̹̪̰̓̈́E̸̛͚̭̗̗̦̓͑̈̋̂̚ ̶̧̱̯̖̲̩̈́̈S̷͔̜̳̰̈́̎̈ ` + data.title;
      data.story = data.story.replace(/\./g, '...');
      data.story = data.story.replace(/!/g, '!!!');
      data.story = data.story.replace(/\?/g, '???');
    }
    storyElement.innerHTML = `<h2>${data.title}</h2>`;
    storyElement.classList.add('typing');
    let index = 0;
    const text = data.story;
    function typeWriter() {
      if (shouldStop) {
        return;
      }
      if (index < text.length) {
        let displayText = text.substring(0, index + 1);
        if (document.getElementById('style').value === 'chat') {
          displayText = displayText.split('\n').map(line => {
            if (line.match(/^[\w\d_]+ \[\d+:\d+ [AP]M\]:/)) {
              const [username, timestamp] = line.split(' [');
              const message = line.split(']: ')[1] || '';
              return `<div class="chat-message">
                <div class="chat-username">${username} <span class="chat-timestamp">[${timestamp.split(']')[0]}]</span></div>
                <div class="chat-text">${message}</div>
              </div>`;
            }
            return line;
          }).join('\n');
        }
        storyElement.innerHTML = `<h2>${data.title}</h2>${displayText}`;
        index++;
        currentTimeout = setTimeout(typeWriter, 30);
      } else {
        isGenerating = false;
        document.getElementById('stopButton').style.display = 'none';
      }
    }
    typeWriter();
  } catch (error) {
    console.error('Error:', error);
    loadingElement.style.display = 'none';
    document.getElementById('stopButton').style.display = 'none';
    isGenerating = false;
    storyElement.innerHTML = "ERROR: THE HORROR WAS TOO MUCH TO HANDLE...";
    storyElement.classList.add('typing');
  }
}
window.onload = generateStory;
setInterval(() => {
  if (Math.random() > 0.95) {
    document.querySelector('.screen').style.transform = `skew(${Math.random() * 2}deg)`;
    setTimeout(() => {
      document.querySelector('.screen').style.transform = 'skew(0deg)';
    }, 100);
  }
}, 500);
</script>
