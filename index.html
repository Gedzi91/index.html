<html><head><base href="https://sandbox.shadertoy.com/">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
    body { margin: 0; overflow: hidden; }
    #settingsPanel {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 10px;
        border-radius: 5px;
        font-family: Arial, sans-serif;
        transition: all 0.3s ease;
        max-height: 80vh;
        overflow-y: auto;
    }
    #settingsPanel.collapsed { max-height: 40px; overflow: hidden; }
    #gearIcon {
        cursor: pointer;
        font-size: 24px;
        float: right;
    }
    .slider-container {
        margin: 10px 0;
    }
    .slider-container input {
        width: 100%;
    }
    .slider-value {
        display: inline-block;
        width: 50px;
        text-align: right;
    }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="settingsPanel" class="collapsed">
    <div id="gearIcon">⚙️</div>
    <div class="slider-container">
        <label for="numRays">Number of Rays: <span class="slider-value" id="numRaysValue"></span></label>
        <input type="range" id="numRays" min="1" max="50" step="1">
    </div>
    <div class="slider-container">
        <label for="volumetricSteps">Volumetric Steps: <span class="slider-value" id="volumetricStepsValue"></span></label>
        <input type="range" id="volumetricSteps" min="1" max="50" step="1">
    </div>
    <div class="slider-container">
        <label for="maxIter">Max Iterations: <span class="slider-value" id="maxIterValue"></span></label>
        <input type="range" id="maxIter" min="1" max="100" step="1">
    </div>
    <div class="slider-container">
        <label for="far">Far: <span class="slider-value" id="farValue"></span></label>
        <input type="range" id="far" min="1" max="20" step="0.1">
    </div>
    <div class="slider-container">
        <label for="zoom">Zoom: <span class="slider-value" id="zoomValue"></span></label>
        <input type="range" id="zoom" min="0.1" max="5" step="0.1" value="1">
    </div>
    <div class="slider-container">
        <label for="rotationSpeed">Rotation Speed: <span class="slider-value" id="rotationSpeedValue"></span></label>
        <input type="range" id="rotationSpeed" min="0" max="2" step="0.01" value="0">
    </div>
    <div class="slider-container">
        <label for="randomizationSpeed">Randomization Speed: <span class="slider-value" id="randomizationSpeedValue"></span></label>
        <input type="range" id="randomizationSpeed" min="0" max="1" step="0.01" value="0">
    </div>
    <div class="slider-container">
        <label for="hueShift">Hue Shift: <span class="slider-value" id="hueShiftValue"></span></label>
        <input type="range" id="hueShift" min="0" max="1" step="0.01" value="0">
    </div>
    <div class="slider-container">
        <label for="saturation">Saturation: <span class="slider-value" id="saturationValue"></span></label>
        <input type="range" id="saturation" min="0" max="2" step="0.01" value="1">
    </div>
    <div class="slider-container">
        <label for="brightness">Brightness: <span class="slider-value" id="brightnessValue"></span></label>
        <input type="range" id="brightness" min="0" max="2" step="0.01" value="1">
    </div>
    <div class="slider-container">
        <label for="colorRandomization">Color Randomization: <span class="slider-value" id="colorRandomizationValue"></span></label>
        <input type="range" id="colorRandomization" min="0" max="1" step="0.01" value="0">
    </div>
</div>

<script id="fragmentShader" type="x-shader/x-fragment">
uniform vec3      iResolution;
uniform float     iTime;
uniform vec4      iMouse;
uniform sampler2D iChannel0;

uniform float uNumRays;
uniform float uVolumetricSteps;
uniform float uMaxIter;
uniform float uFar;
uniform float uZoom;
uniform float uHueShift;
uniform float uSaturation;
uniform float uBrightness;

#define NUM_RAYS uNumRays
#define VOLUMETRIC_STEPS int(uVolumetricSteps)
#define MAX_ITER int(uMaxIter)
#define FAR uFar
#define time iTime*1.1

mat2 mm2(in float a){float c = cos(a), s = sin(a);return mat2(c,-s,s,c);}
float noise( in float x ){return textureLod(iChannel0, vec2(x*.01,1.),0.0).x;}

float hash( float n ){return fract(sin(n)*43758.5453);}

float noise(in vec3 p)
{
	vec3 ip = floor(p);
    vec3 fp = fract(p);
	fp = fp*fp*(3.0-2.0*fp);
	
	vec2 tap = (ip.xy+vec2(37.0,17.0)*ip.z) + fp.xy;
	vec2 rg = textureLod( iChannel0, (tap + 0.5)/256.0, 0.0 ).yx;
	return mix(rg.x, rg.y, fp.z);
}

mat3 m3 = mat3( 0.00,  0.80,  0.60,
              -0.80,  0.36, -0.48,
              -0.60, -0.48,  0.64 );

float flow(in vec3 p, in float t)
{
	float z=2.;
	float rz = 0.;
	vec3 bp = p;
	for (float i= 1.;i < 5.;i++ )
	{
		p += time*.1;
		rz+= (sin(noise(p+t*0.8)*6.)*0.5+0.5) /z;
		p = mix(bp,p,0.6);
		z *= 2.;
		p *= 2.01;
        p*= m3;
	}
	return rz;	
}

float sins(in float x)
{
 	float rz = 0.;
    float z = 2.;
    for (float i= 0.;i < 3.;i++ )
	{
        rz += abs(fract(x*1.4)-0.5)/z;
        x *= 1.3;
        z *= 1.15;
        x -= time*.65*z;
    }
    return rz;
}

float segm( vec3 p, vec3 a, vec3 b)
{
    vec3 pa = p - a;
	vec3 ba = b - a;
	float h = clamp( dot(pa,ba)/dot(ba,ba), 0.0, 1. );	
	return length( pa - ba*h )*.5;
}

vec3 path(in float i, in float d)
{
    vec3 en = vec3(0.,0.,1.);
    float sns2 = sins(d+i*0.5)*0.22;
    float sns = sins(d+i*.6)*0.21;
    en.xz *= mm2((hash(i*10.569)-.5)*6.2+sns2);
    en.xy *= mm2((hash(i*4.732)-.5)*6.2+sns);
    return en;
}

vec2 map(vec3 p, float i)
{
	float lp = length(p);
    vec3 bg = vec3(0.);   
    vec3 en = path(i,lp);
    
    float ins = smoothstep(0.11,.46,lp);
    float outs = .15+smoothstep(.0,.15,abs(lp-1.));
    p *= ins*outs;
    float id = ins*outs;
    
    float rz = segm(p, bg, en)-0.011;
    return vec2(rz,id);
}

float march(in vec3 ro, in vec3 rd, in float startf, in float maxd, in float j)
{
	float precis = 0.001;
    float h=0.5;
    float d = startf;
    for( int i=0; i<MAX_ITER; i++ )
    {
        if( abs(h)<precis||d>maxd ) break;
        d += h*1.2;
	    float res = map(ro+rd*d, j).x;
        h = res;
    }
	return d;
}

vec3 vmarch(in vec3 ro, in vec3 rd, in float j, in vec3 orig)
{   
    vec3 p = ro;
    vec2 r = vec2(0.);
    vec3 sum = vec3(0);
    float w = 0.;
    for( int i=0; i<VOLUMETRIC_STEPS; i++ )
    {
        r = map(p,j);
        p += rd*.03;
        float lp = length(p);
        
        vec3 col = sin(vec3(1.05,2.5,1.52)*3.94+r.y)*.85+0.4;
        col.rgb *= smoothstep(.0,.015,-r.x);
        col *= smoothstep(0.04,.2,abs(lp-1.1));
        col *= smoothstep(0.1,.34,lp);
        sum += abs(col)*5. * (1.2-noise(lp*2.+j*13.+time*5.)*1.1) / (log(distance(p,orig)-2.)+.75);
    }
    return sum;
}

vec2 iSphere2(in vec3 ro, in vec3 rd)
{
    vec3 oc = ro;
    float b = dot(oc, rd);
    float c = dot(oc,oc) - 1.;
    float h = b*b - c;
    if(h <0.0) return vec2(-1.);
    else return vec2((-b - sqrt(h)), (-b + sqrt(h)));
}

vec3 hsvToRgb(vec3 c) {
    vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
    vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
    return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
}

void mainImage( out vec4 fragColor, in vec2 fragCoord )
{	
	vec2 p = fragCoord.xy/iResolution.xy-0.5;
	p.x*=iResolution.x/iResolution.y;
    p *= uZoom;
	vec2 um = iMouse.xy / iResolution.xy-.5;
    
	vec3 ro = vec3(0.,0.,5.);
    vec3 rd = normalize(vec3(p*.7,-1.5));
    mat2 mx = mm2(time*.4+um.x*6.);
    mat2 my = mm2(time*0.3+um.y*6.); 
    ro.xz *= mx;rd.xz *= mx;
    ro.xy *= my;rd.xy *= my;
    
    vec3 bro = ro;
    vec3 brd = rd;
	
    vec3 col = vec3(0.0125,0.,0.025);
    #if 1
    for (float j = 1.;j<NUM_RAYS+1.;j++)
    {
        ro = bro;
        rd = brd;
        mat2 mm = mm2((time*0.1+((j+1.)*5.1))*j*0.25);
        ro.xy *= mm;rd.xy *= mm;
        ro.xz *= mm;rd.xz *= mm;
        float rz = march(ro,rd,2.5,FAR,j);
		if ( rz >= FAR)continue;
    	vec3 pos = ro+rz*rd;
    	col = max(col,vmarch(pos,rd,j, bro));
    }
    #endif
    
    ro = bro;
    rd = brd;
    vec2 sph = iSphere2(ro,rd);
    
    if (sph.x > 0.)
    {
        vec3 pos = ro+rd*sph.x;
        vec3 pos2 = ro+rd*sph.y;
        vec3 rf = reflect( rd, pos );
        vec3 rf2 = reflect( rd, pos2 );
        float nz = (-log(abs(flow(rf*1.2,time)-.01)));
        float nz2 = (-log(abs(flow(rf2*1.2,-time)-.01)));
        col += (0.1*nz*nz* vec3(0.12,0.12,.5) + 0.05*nz2*nz2*vec3(0.55,0.2,.55))*0.8;
    }
    
	col = hsvToRgb(vec3(fract(uHueShift + length(col) * 0.1), uSaturation, uBrightness)) * length(col);
	fragColor = vec4(col*1.3, 1.0);
}

void main() {
    mainImage(gl_FragColor, gl_FragCoord.xy);
}
</script>

<script id="vertexShader" type="x-shader/x-vertex">
void main() {
    gl_Position = vec4( position, 1.0 );
}
</script>

<script>
let camera, scene, renderer, material, mesh;
let uniforms;
let rotationAngle = 0;
let randomValue = 0;

init();
animate();

function init() {
    camera = new THREE.OrthographicCamera( -1, 1, 1, -1, 0, 1 );
    scene = new THREE.Scene();
    
    const geometry = new THREE.PlaneBufferGeometry( 2, 2 );
    
    uniforms = {
        iTime: { value: 0 },
        iResolution:  { value: new THREE.Vector3() },
        iMouse: { value: new THREE.Vector4() },
        iChannel0: { value: new THREE.TextureLoader().load( 'https://threejs.org/examples/textures/UV_Grid_Sm.jpg' ) },
        uNumRays: { value: 13 },
        uVolumetricSteps: { value: 19 },
        uMaxIter: { value: 35 },
        uFar: { value: 6 },
        uZoom: { value: 1 },
        uHueShift: { value: 0 },
        uSaturation: { value: 1 },
        uBrightness: { value: 1 },
        uColorRandomization: { value: 0 }
    };
    
    material = new THREE.ShaderMaterial( {
        uniforms: uniforms,
        vertexShader: document.getElementById( 'vertexShader' ).textContent,
        fragmentShader: document.getElementById( 'fragmentShader' ).textContent
    } );
    
    mesh = new THREE.Mesh( geometry, material );
    scene.add( mesh );

    renderer = new THREE.WebGLRenderer();
    renderer.setPixelRatio( window.devicePixelRatio );
    document.body.appendChild( renderer.domElement );

    onWindowResize();
    window.addEventListener( 'resize', onWindowResize );

    document.onmousemove = function(e){
        uniforms.iMouse.value.x = e.clientX;
        uniforms.iMouse.value.y = e.clientY;
    }

    setupSettingsPanel();
}

function setupSettingsPanel() {
    const gearIcon = document.getElementById('gearIcon');
    const settingsPanel = document.getElementById('settingsPanel');
    
    gearIcon.addEventListener('click', () => {
        settingsPanel.classList.toggle('collapsed');
    });

    setupSlider('numRays', 1, 50, 1, 13);
    setupSlider('volumetricSteps', 1, 50, 1, 19);
    setupSlider('maxIter', 1, 100, 1, 35);
    setupSlider('far', 1, 20, 0.1, 6);
    setupSlider('zoom', 0.1, 5, 0.1, 1);
    setupSlider('rotationSpeed', 0, 2, 0.01, 0);
    setupSlider('randomizationSpeed', 0, 1, 0.01, 0);
    setupSlider('hueShift', 0, 1, 0.01, 0);
    setupSlider('saturation', 0, 2, 0.01, 1);
    setupSlider('brightness', 0, 2, 0.01, 1);
    setupSlider('colorRandomization', 0, 1, 0.01, 0);
}

function setupSlider(id, min, max, step, initialValue) {
    const slider = document.getElementById(id);
    const valueDisplay = document.getElementById(id + 'Value');
    slider.min = min;
    slider.max = max;
    slider.step = step;
    slider.value = initialValue;
    valueDisplay.textContent = initialValue;

    slider.addEventListener('input', function() {
        const value = parseFloat(this.value);
        valueDisplay.textContent = value.toFixed(2);
        const uniformName = 'u' + id.charAt(0).toUpperCase() + id.slice(1);
        if (uniforms[uniformName]) {
            uniforms[uniformName].value = value;
        }
    });
}

function onWindowResize() {
    renderer.setSize( window.innerWidth, window.innerHeight );
    uniforms.iResolution.value.x = renderer.domElement.width;
    uniforms.iResolution.value.y = renderer.domElement.height;
    uniforms.iResolution.value.z = 1;
}

function animate( timestamp ) {
    requestAnimationFrame( animate );
    uniforms.iTime.value = timestamp / 1000;

    // Apply continuous rotation
    rotationAngle += parseFloat(document.getElementById('rotationSpeed').value) * 0.01;
    uniforms.iMouse.value.x = Math.cos(rotationAngle) * uniforms.iResolution.value.x * 0.5;
    uniforms.iMouse.value.y = Math.sin(rotationAngle) * uniforms.iResolution.value.y * 0.5;

    // Apply continuous randomization
    randomValue += parseFloat(document.getElementById('randomizationSpeed').value) * 0.01;
    uniforms.uNumRays.value = 13 + Math.sin(randomValue) * 5;
    uniforms.uVolumetricSteps.value = 19 + Math.cos(randomValue * 1.3) * 5;

    // Apply color randomization
    const colorRandomization = uniforms.uColorRandomization.value;
    uniforms.uHueShift.value = (uniforms.uHueShift.value + colorRandomization * 0.01) % 1;
    uniforms.uSaturation.value = Math.max(0, Math.min(2, uniforms.uSaturation.value + (Math.random() - 0.5) * colorRandomization * 0.1));
    uniforms.uBrightness.value = Math.max(0, Math.min(2, uniforms.uBrightness.value + (Math.random() - 0.5) * colorRandomization * 0.1));
    
    renderer.render( scene, camera );
}
</script>

</body>
</html>
