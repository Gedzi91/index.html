<html><head><base href="https://dora-terminal.earth-199999.com" />
<title>Dora's Interactive Command Terminal</title>
<style>
  body {
    background: #2b2b2b;
    color: #50fa7b;
    font-family: 'Courier New', monospace;
    margin: 0;
    padding: 20px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  
  .terminal {
    background: #1e1e1e;
    border-radius: 8px;
    padding: 20px;
    flex-grow: 1;
    overflow-y: auto;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .back-button {
    background: #ff5555;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    text-decoration: none;
  }

  .prompt {
    color: #bd93f9;
  }

  .command-input {
    background: transparent;
    border: none;
    color: #50fa7b;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    width: 80%;
    outline: none;
  }

  .ascii-art {
    color: #ffb86c;
    white-space: pre;
    margin: 20px 0;
  }

  .response {
    margin: 10px 0;
    line-height: 1.4;
  }

  #suggestions {
    color: #8be9fd;
    margin-top: 10px;
  }

  .table {
    margin: 10px 0;
    border-collapse: collapse;
    width: 100%;
  }

  .table td, .table th {
    border: 1px solid #50fa7b;
    padding: 8px;
  }
</style>
</head>
<body>
<div class="header">
  <h1>Dora's CLI Explorer 🗺️</h1>
  <a href="https://multiverse-google.com" class="back-button">Return to Search</a>
</div>

<div class="terminal" id="terminal">
  <div class="ascii-art">
    ,-----.                     
    |  |) /_ ,--.,--. ,--,--.  
    |  .-.  \|  ||  |' ,-.  |  
    |  '--' /'  ''  '\ '-'  |  
    `------'  `----'  `--`--'  
  </div>
  <div class="response">¡Hola! I'm Dora! Welcome to my terminal adventure! 🎒</div>
  <div class="response">Type 'help' to see what we can explore together!</div>
  <div class="command-line">
    <span class="prompt">dora@explorer:~$</span>
    <input type="text" class="command-input" id="commandInput" autofocus>
  </div>
  <div id="suggestions"></div>
</div>

<script>
const commands = {
  help: {
    description: "Shows available commands",
    execute: () => `
Available commands:
- help: Shows this help message
- map: Opens the digital map
- backpack: Shows items in backpack
- explore [location]: Explore a new location
- spanish [word]: Translates a word to Spanish
- swiper [command]: Checks if a command is safe to run
- clear: Clears the terminal
- prices: Shows the dimensional price conversion table
- datasheet: Shows full technical specifications
    `
  },
  map: {
    description: "Opens the digital map",
    execute: () => `
🗺️ Opening Map...
Available locations:
- Rainforest
- Crystal Mountain
- Coding Canyon
- Python Plaza 
- Binary Beach
    `
  },
  backpack: {
    description: "Shows items in backpack",
    execute: () => `
🎒 Looking in my backpack...
- Map (digital version)
- Debugging compass
- USB stick
- Binary translator
- Emergency snacks
    `
  },
  datasheet: {
    description: "Shows technical specifications",
    execute: () => `
TECHNICAL SPECIFICATIONS:
=======================
Model: Explorer-CLI-3000
Version: 2.4.1
Operating System: ExplorerOS 4.2
Processor: Adventure Core i7
Memory: 16GB Adventure RAM
Storage: 1TB Quantum Drive
Display: 4K Adventure Vision
Battery: 48hr Adventure Cell
Connectivity: Multi-dimensional WiFi
Security: Swiper Protection™ v3.1
Languages: Spanish-English Translation Matrix
Navigation: Quantum GPS System
Durability: Military-grade adventure-proof
Weight: 2.3kg
Dimensions: 33cm x 25cm x 3cm
Warranty: Lifetime multiversal coverage
    `
  },
  prices: {
    description: "Shows price conversion table",
    execute: () => `
DIMENSIONAL PRICE CONVERSION TABLE:
=================================
Base Model Explorer-CLI-3000:
----------------------------
USD: $999.99
Hyrulean Rupees: ₹4,999
Keithionian Ringlets: ◊2,500
Dimensional Currency: Ð750

Pro Model Explorer-CLI-3000X:
----------------------------
USD: $1,499.99
Hyrulean Rupees: ₹7,499
Keithionian Ringlets: ◊3,750
Dimensional Currency: Ð1,125

Ultimate Explorer Edition:
------------------------
USD: $1,999.99
Hyrulean Rupees: ₹9,999
Keithionian Ringlets: ◊5,000
Dimensional Currency: Ð1,500

* Prices include multiversal shipping
* Warranty valid across all dimensions
* Trade-ins accepted in any currency
    `
  }
};

const terminal = document.getElementById('terminal');
const commandInput = document.getElementById('commandInput');
const suggestions = document.getElementById('suggestions');

function addResponse(text) {
  const response = document.createElement('div');
  response.className = 'response';
  response.innerText = text;
  terminal.insertBefore(response, commandInput.parentElement);
  terminal.scrollTop = terminal.scrollHeight;
}

function handleCommand(command) {
  const cmdLower = command.toLowerCase().trim();
  const cmdParts = cmdLower.split(' ');
  
  if (commands[cmdParts[0]]) {
    addResponse(commands[cmdParts[0]].execute());
  } else if (cmdParts[0] === 'explore') {
    if (cmdParts[1]) {
      addResponse(`¡Vámonos! Let's explore ${cmdParts[1]}! 🌟`);
    } else {
      addResponse('Where should we explore? Try "explore [location]"');
    }
  } else if (cmdParts[0] === 'spanish') {
    if (cmdParts[1]) {
      const translations = {
        hello: 'hola',
        friend: 'amigo',
        let: 'vamos',
        go: 'vámonos',
        explore: 'explorar'
      };
      addResponse(`${cmdParts[1]} in Spanish is: ${translations[cmdParts[1]] || '¯\\_(ツ)_/¯'}`);
    } else {
      addResponse('What word should I translate? Try "spanish [word]"');
    }
  } else if (cmdParts[0] === 'clear') {
    const children = Array.from(terminal.children);
    children.forEach(child => {
      if (!child.classList.contains('command-line') && !child.classList.contains('ascii-art')) {
        terminal.removeChild(child);
      }
    });
  } else {
    addResponse("Hmm, I don't know that command. Type 'help' to see what we can do!");
  }
}

commandInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    const command = commandInput.value;
    const promptSpan = document.createElement('div');
    promptSpan.innerHTML = `<span class="prompt">dora@explorer:~$</span> ${command}`;
    terminal.insertBefore(promptSpan, commandInput.parentElement);
    handleCommand(command);
    commandInput.value = '';
  }
});

commandInput.addEventListener('input', (e) => {
  const input = e.target.value.toLowerCase();
  if (input) {
    const matchingCommands = Object.keys(commands)
      .filter(cmd => cmd.startsWith(input))
      .map(cmd => `${cmd}: ${commands[cmd].description}`);
    suggestions.innerHTML = matchingCommands.join('<br>');
  } else {
    suggestions.innerHTML = '';
  }
});
</script>
</body></html>
