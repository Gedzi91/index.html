<html><head><base href="/" /><title>Error 404</title><style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #1a1a1a;
  font-family: Arial, sans-serif;
  color: #fff;
}

.error-container {
  text-align: center;
}

.glitch-text {
  font-size: 120px;
  font-weight: bold;
  position: relative;
  text-shadow: 2px 2px #ff0000;
  animation: glitch 1s infinite;
}

.error-message {
  font-size: 24px;
  margin-top: 20px;
  opacity: 0.8;
}

.robot {
  width: 200px;
  height: 200px;
  margin: 40px auto;
}

@keyframes glitch {
  0% {
    transform: translate(0);
  }
  20% {
    transform: translate(-2px, 2px);
    text-shadow: -2px 2px #00ff00;
  }
  40% {
    transform: translate(-2px, -2px);
    text-shadow: 2px -2px #0000ff;
  }
  60% {
    transform: translate(2px, 2px);
    text-shadow: 2px 2px #ff0000;
  }
  80% {
    transform: translate(2px, -2px);
    text-shadow: -2px 2px #ffff00;
  }
  100% {
    transform: translate(0);
  }
}

.robot-head {
  animation: shake 2s infinite;
}

@keyframes shake {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-10deg); }
  75% { transform: rotate(10deg); }
}
</style></head><body>
<div class="error-container">
  <svg class="robot" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="#333"/>
    <g class="robot-head">
      <circle cx="35" cy="40" r="5" fill="#ff0000"/>
      <circle cx="65" cy="40" r="5" fill="#ff0000"/>
      <path d="M 30 60 Q 50 70 70 60" stroke="#666" fill="none" stroke-width="3"/>
    </g>
    <rect x="20" y="80" width="60" height="5" fill="#666"/>
  </svg>
  <div class="glitch-text">404</div>
  <div class="error-message">Oops! Invalid input "ty76" detected. Please try again with valid instructions.</div>
</div>

<script>
document.addEventListener('mousemove', (e) => {
  const robot = document.querySelector('.robot-head');
  const rect = robot.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  
  const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
  robot.style.transform = `rotate(${angle * 20}deg)`;
});
</script>
</body></html>
