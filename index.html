<html><head><base href="https://flowingwaves.3d.art/"><title>Fluid Waves 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Arial', sans-serif;
}
canvas {
    position: absolute;
    top: 0;
    left: 0;
}
#controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
}
button {
    padding: 10px 20px;
    font-size: 16px;
    background: rgba(255, 255, 255, 0.1);
    border: none;
    color: #fff;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 5px;
}
button:hover {
    background: rgba(255, 255, 255, 0.2);
}
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="controls">
    <button id="colorBtn">Change Colors</button>
    <button id="speedBtn">Adjust Speed</button>
</div>

<script>
let scene, camera, renderer, geometry, material, particles;
let time = 0;
let colorScheme = 0;
let speed = 0.005;

const colorPalettes = [
    ['#FF6B6B', '#4ECDC4', '#45B7D1', '#F7FFF7'],
    ['#2C3E50', '#E74C3C', '#ECF0F1', '#3498DB'],
    ['#8E44AD', '#2980B9', '#27AE60', '#F1C40F']
];

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 50;

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    geometry = new THREE.BufferGeometry();
    const positions = [];
    const colors = [];
    const sizes = [];

    for (let i = 0; i < 10000; i++) {
        positions.push((Math.random() - 0.5) * 100);
        positions.push((Math.random() - 0.5) * 100);
        positions.push((Math.random() - 0.5) * 100);

        colors.push(Math.random(), Math.random(), Math.random());
        sizes.push(Math.random() * 2);
    }

    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

    material = new THREE.PointsMaterial({
        size: 0.5,
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        transparent: true
    });

    particles = new THREE.Points(geometry, material);
    scene.add(particles);

    window.addEventListener('resize', onWindowResize, false);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);

    time += speed;

    const positions = particles.geometry.attributes.position.array;
    const colors = particles.geometry.attributes.color.array;

    for (let i = 0; i < positions.length; i += 3) {
        const x = positions[i];
        const y = positions[i + 1];
        const z = positions[i + 2];

        const noiseValue = noise(x / 30, y / 30, z / 30 + time);
        
        positions[i] += Math.sin(noiseValue * Math.PI * 2) * speed * 10;
        positions[i + 1] += Math.cos(noiseValue * Math.PI * 2) * speed * 10;
        positions[i + 2] += Math.sin(noiseValue * Math.PI) * speed * 10;

        const colorIndex = Math.floor(noiseValue * colorPalettes[colorScheme].length);
        const color = new THREE.Color(colorPalettes[colorScheme][colorIndex]);

        colors[i] = color.r;
        colors[i + 1] = color.g;
        colors[i + 2] = color.b;
    }

    particles.geometry.attributes.position.needsUpdate = true;
    particles.geometry.attributes.color.needsUpdate = true;

    particles.rotation.y += speed * 0.1;

    renderer.render(scene, camera);
}

// Improved noise function (same as before)
function noise(x, y, z) {
    const X = Math.floor(x) & 255;
    const Y = Math.floor(y) & 255;
    const Z = Math.floor(z) & 255;

    x -= Math.floor(x);
    y -= Math.floor(y);
    z -= Math.floor(z);

    const u = fade(x);
    const v = fade(y);
    const w = fade(z);

    const A = p[X  ]+Y, AA = p[A]+Z, AB = p[A+1]+Z;
    const B = p[X+1]+Y, BA = p[B]+Z, BB = p[B+1]+Z;

    return lerp(w, lerp(v, lerp(u, grad(p[AA  ], x  , y  , z   ),
                                   grad(p[BA  ], x-1, y  , z   )),
                           lerp(u, grad(p[AB  ], x  , y-1, z   ),
                                   grad(p[BB  ], x-1, y-1, z   ))),
                   lerp(v, lerp(u, grad(p[AA+1], x  , y  , z-1 ),
                                   grad(p[BA+1], x-1, y  , z-1 )),
                           lerp(u, grad(p[AB+1], x  , y-1, z-1 ),
                                   grad(p[BB+1], x-1, y-1, z-1 ))));
}

function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function lerp(t, a, b) { return a + t * (b - a); }
function grad(hash, x, y, z) {
    const h = hash & 15;
    const u = h<8 ? x : y,
          v = h<4 ? y : h==12||h==14 ? x : z;
    return ((h&1) == 0 ? u : -u) + ((h&2) == 0 ? v : -v);
}

const p = new Array(512);
for(let i=0; i<256; i++) p[i] = p[i+256] = Math.floor(Math.random() * 256);

init();
animate();

document.getElementById('colorBtn').addEventListener('click', () => {
    colorScheme = (colorScheme + 1) % colorPalettes.length;
});

document.getElementById('speedBtn').addEventListener('click', () => {
    speed = speed === 0.005 ? 0.01 : speed === 0.01 ? 0.002 : 0.005;
});
</script>
</body></html>
