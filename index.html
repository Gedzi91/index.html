<html><head><base href="https://raymarching.test"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Raymarching Blending Animation</title>
<style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script id="vertexShader" type="x-shader/x-vertex">
    void main() {
        gl_Position = vec4(position, 1.0);
    }
</script>
<script id="fragmentShader" type="x-shader/x-fragment">
    precision highp float;

    uniform vec2 u_resolution;
    uniform float u_time;

    float sdSphere(vec3 p, float s) {
        return length(p) - s;
    }

    float sdBox(vec3 p, vec3 b) {
        vec3 d = abs(p) - b;
        return length(max(d, 0.0)) + min(max(d.x, max(d.y, d.z)), 0.0);
    }

    float smin(float a, float b, float k) {
        float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
        return mix(b, a, h) - k * h * (1.0 - h);
    }

    float scene(vec3 p) {
        float sphere = sdSphere(p - vec3(0.0, sin(u_time) * 2.0, 0.0), 1.0);
        float box = sdBox(p - vec3(sin(u_time) * 2.0, 0.0, 0.0), vec3(1.0));
        return smin(sphere, box, 0.5);
    }

    vec3 getNormal(vec3 p) {
        vec2 e = vec2(0.01, 0.0);
        return normalize(vec3(
            scene(p + e.xyy) - scene(p - e.xyy),
            scene(p + e.yxy) - scene(p - e.yxy),
            scene(p + e.yyx) - scene(p - e.yyx)
        ));
    }

    vec3 getColor(vec3 p) {
        float sphere = sdSphere(p - vec3(0.0, sin(u_time) * 2.0, 0.0), 1.0);
        float box = sdBox(p - vec3(sin(u_time) * 2.0, 0.0, 0.0), vec3(1.0));
        float blend = smoothstep(0.0, 0.2, abs(sphere - box));
        vec3 sphereColor = vec3(1.0, 0.0, 0.0);
        vec3 boxColor = vec3(0.0, 0.0, 1.0);
        return mix(sphereColor, boxColor, blend);
    }

    void main() {
        vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / u_resolution.y;
        vec3 rayOrigin = vec3(0.0, 0.0, -5.0);
        vec3 rayDirection = normalize(vec3(uv, 1.0));

        float t = 0.0;
        float maxDistance = 100.0;
        float minDistance = 0.01;
        vec3 color = vec3(0.0);

        for (int i = 0; i < 128; i++) {
            vec3 p = rayOrigin + rayDirection * t;
            float d = scene(p);
            if (d < minDistance) {
                vec3 normal = getNormal(p);
                color = getColor(p);
                break;
            }
            t += d;
            if (t > maxDistance) break;
        }

        gl_FragColor = vec4(color, 1.0);
    }
</script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geometry = new THREE.PlaneGeometry(2, 2);
    const material = new THREE.ShaderMaterial({
        uniforms: {
            u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            u_time: { value: 0.0 }
        },
        vertexShader: document.getElementById('vertexShader').textContent,
        fragmentShader: document.getElementById('fragmentShader').textContent
    });

    const plane = new THREE.Mesh(geometry, material);
    scene.add(plane);

    camera.position.z = 1;

    const animate = function () {
        requestAnimationFrame(animate);
        material.uniforms.u_time.value += 0.01;
        renderer.render(scene, camera);
    };

    animate();
</script>
</body></html>
