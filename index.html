<body>

  <iframe id="sketchfab-embed" title="少女前线Free" allowfullscreen mozallowfullscreen="true" webkitallowfullscreen="true" allow="autoplay; fullscreen; xr-spatial-tracking" xr-spatial-tracking execution-while-out-of-viewport execution-while-not-rendered web-share src="https://sketchfab.com/models/cdb8c2ee9d8d4186b301bdef2d8a976b/embed"> </iframe>
</div>
<div id="controls" class="overlay">
  <button onclick="toggleDreamState()">Toggle Dream State</button>
  <button onclick="changePerspective()">Change Perspective</button>
  <button onclick="toggleAudio()">Toggle Dreamscape Audio</button>
  <button onclick="captureMemory()">Capture Dream Memory</button>
  <button onclick="exitDreamverse()">Return to Reality</button>
  <input type="range" id="dream-intensity" min="0" max="100" value="50" oninput="adjustDreamIntensity(this.value)">
</div>
<div id="info" class="overlay">
  <h2>DreamVerse</h2>
  <p>Dream Fragments: <span id="fragmentCount">0</span></p>
  <p>Current Perspective: <span id="currentPerspective">Lucid</span></p>
</div>
<div id="dream-state" class="overlay">
  <h3>Dream State: <span id="currentState">Awakening</span></h3>
  <p>Intensity: <span id="intensityLevel">50</span>%</p>
</div>

<script>
let isDreaming = true;
let dreamIntensity = 50;
let dreamFragments = 0;
let currentPerspectiveIndex = 0;
const perspectives = ['Lucid', 'Surreal', 'Abstract', 'Ethereal', 'Cosmic'];

const fragmentCountElement = document.getElementById('fragmentCount');
const currentPerspectiveElement = document.getElementById('currentPerspective');
const currentStateElement = document.getElementById('currentState');
const intensityLevelElement = document.getElementById('intensityLevel');
const controls = document.getElementById('controls');
const info = document.getElementById('info');
const dreamState = document.getElementById('dream-state');
const sketchfabEmbed = document.getElementById('sketchfab-embed');

function toggleDreamState() {
  isDreaming = !isDreaming;
  currentStateElement.textContent = isDreaming ? "Dreaming" : "Lucid";
  sketchfabEmbed.contentWindow.postMessage(JSON.stringify({
    type: 'setTimelineInfo',
    timeScale: isDreaming ? 1 : 0.5
  }), '*');
}

function changePerspective() {
  currentPerspectiveIndex = (currentPerspectiveIndex + 1) % perspectives.length;
  currentPerspectiveElement.textContent = perspectives[currentPerspectiveIndex];
  sketchfabEmbed.contentWindow.postMessage(JSON.stringify({
    type: 'setCameraLookAt',
    position: [Math.random()*10-5, Math.random()*10-5, Math.random()*10-5],
    target: [0, 0, 0],
    duration: 1
  }), '*');
}

function toggleAudio() {
  sketchfabEmbed.contentWindow.postMessage(JSON.stringify({
    type: 'setVolume',
    volume: 0.5
  }), '*');
}

function captureMemory() {
  dreamFragments++;
  fragmentCountElement.textContent = dreamFragments;
  // Capture screenshot functionality would go here if Sketchfab API supported it
}

function exitDreamverse() {
  window.location.href = 'https://websim.ai/c/pano-viewer';
}

function adjustDreamIntensity(value) {
  dreamIntensity = value;
  intensityLevelElement.textContent = value;
  sketchfabEmbed.contentWindow.postMessage(JSON.stringify({
    type: 'setFilter',
    filter: {
      name: 'sharpen',
      intensity: value / 100
    }
  }), '*');
}

function toggleOverlays() {
  controls.classList.toggle('visible');
  info.classList.toggle('visible');
  dreamState.classList.toggle('visible');
}

// Initialize
window.addEventListener('load', () => {
  controls.classList.add('visible');
  info.classList.add('visible');
  dreamState.classList.add('visible');
  
  // Set up Sketchfab API
  let version = '1.12.1';
  let client = new Sketchfab(version, sketchfabEmbed);
  client.init(() => {
    console.log('Sketchfab API ready');
  });
});

// Double click to toggle overlays
document.addEventListener('dblclick', toggleOverlays);

// Sketchfab API
window.addEventListener('sketchfabLoaded', function(e) {
  console.log('Sketchfab model loaded');
});

// Dream animation loop
function animateDream() {
  if (isDreaming) {
    sketchfabEmbed.contentWindow.postMessage(JSON.stringify({
      type: 'setFilter',
      filter: {
        name: 'edge',
        intensity: Math.sin(Date.now() / 1000) * 0.5 + 0.5
      }
    }), '*');
  }
  requestAnimationFrame(animateDream);
}
animateDream();
</script>
