<html><head><base href=".">
<style>
  /* Previous styles unchanged */
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#87CEEB, #4169E1);
  }

  .game-container {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  .world {
    position: absolute;
    width: 5000px; /* Make the world much wider */
    height: 100vh;
    transition: transform 0.1s ease-out;
  }

  .character {
    width: 50px;
    height: 50px;
    position: absolute;
    bottom: 100px;
    left: 100px;
    transform-origin: center;
    z-index: 2;
  }

  .ground {
    position: absolute;
    bottom: 0;  
    width: 100%;
    height: 100px;
    background: linear-gradient(#228B22, #32CD32);
    background-image: 
    linear-gradient(90deg, transparent 50%, #228B22 50%),
    linear-gradient(transparent 50%, #32CD32 50%);
    background-size: 20px 20px;
  }

  .ring {
    position: absolute;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 4px solid gold;
    animation: rotate 1s infinite linear;
  }

  .controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    z-index: 1000;
  }

  .control-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    border: none;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .character-select {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.9);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    z-index: 2000;
  }

  .character-btn {
    margin: 10px;
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    background: #4169E1;
    color: white;
    border: none;
    border-radius: 5px;
  }

  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .score {
    position: fixed;
    top: 20px;
    left: 20px;
    font-family: 'Arial', sans-serif;
    font-size: 24px;
    color: white;
    text-shadow: 2px 2px 2px rgba(0,0,0,0.5);
  }

  .hidden {
    display: none;
  }

  .robotnik {
    position: absolute;
    width: 80px;
    height: 80px;
    bottom: 100px;
    right: 100px;
    z-index: 1;
  }

  .health-bar {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 200px;
    height: 20px;
    background: #ff0000;
    border: 2px solid white;
  }

  .health-fill {
    width: 100%;
    height: 100%;
    background: #00ff00;
    transition: width 0.3s;
  }

  .lost-rings {
    position: absolute;
    pointer-events: none;
    animation: scatter 1s ease-out forwards;
  }

  @keyframes scatter {
    0% { transform: translate(0, 0); }
    100% { transform: translate(var(--tx), var(--ty)); }
  }

  .start-menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(#1E90FF, #000066);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 3000;
  }

  .start-menu svg {
    width: 200px;
    height: 200px;
    margin-bottom: 20px;
  }

  .start-btn {
    padding: 15px 30px;
    font-size: 24px;
    background: #FFD700;
    border: none;
    border-radius: 10px;
    color: #000;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .start-btn:hover {
    transform: scale(1.1);
  }

  .victory-message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.9);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    font-size: 24px;
    z-index: 2000;
  }

  /* Add these styles for the new level and zone text */
  .wood-zone {
    background: linear-gradient(#2E1810, #4A2511) !important;
  }

  .wood-zone .ground {
    background: linear-gradient(#3E2723, #5D4037) !important;
    background-image: 
      linear-gradient(90deg, transparent 50%, #3E2723 50%),
      linear-gradient(transparent 50%, #5D4037 50%) !important;
    background-size: 20px 20px;
  }

  .zone-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Arial', sans-serif;
    font-size: 48px;
    color: white;
    text-shadow: 3px 3px 5px rgba(0,0,0,0.5);
    opacity: 0;
    transition: opacity 1s;
    z-index: 2500;
  }

  .zone-text.show {
    opacity: 1;
  }

  .timer {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Arial', sans-serif;
    font-size: 24px;
    color: white;
    text-shadow: 2px 2px 2px rgba(0,0,0,0.5);
  }

  .enemy {
    position: absolute;
    width: 40px;
    height: 40px;
    bottom: 100px;
    animation: waddle 2s infinite linear;
  }

  @keyframes waddle {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .versus-menu {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.9);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    z-index: 2000;
    color: white;
  }

  .versus-btn {
    margin: 10px;
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
    background: #4169E1;
    color: white;
    border: none;
    border-radius: 5px;
    transition: transform 0.2s;
  }

  .versus-btn:hover {
    transform: scale(1.1);
  }
</style>
</head>
<body>
<div class="game-container">
  <div class="world">
    <div class="ground"></div>

    <svg class="character hidden" id="sonic" viewBox="0 0 100 100">
      <!-- Base character -->
      <circle cx="50" cy="50" r="40" fill="#1E90FF"/>
      <!-- Cat ears -->
      <path d="M30 20 L40 35 L50 20" fill="#1E90FF" stroke="#1E90FF" stroke-width="2"/>
      <path d="M50 20 L60 35 L70 20" fill="#1E90FF" stroke="#1E90FF" stroke-width="2"/>
      <!-- Back spikes -->
      <path d="M80 30 L95 25 L80 40" fill="#1E90FF" stroke="#1E90FF" stroke-width="2"/>
      <path d="M85 45 L100 45 L85 55" fill="#1E90FF" stroke="#1E90FF" stroke-width="2"/>
      <path d="M80 60 L95 65 L80 70" fill="#1E90FF" stroke="#1E90FF" stroke-width="2"/>
      <!-- Eyes and details -->
      <circle cx="60" cy="40" r="15" fill="white"/>
      <circle cx="65" cy="40" r="8" fill="black"/>
      <path d="M20 50 Q50 80 80 50" stroke="#1E90FF" stroke-width="8" fill="none"/>
    </svg>

    <svg class="character hidden" id="tails" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="40" fill="#FFA500"/>
      <circle cx="60" cy="40" r="15" fill="white"/>
      <circle cx="65" cy="40" r="8" fill="black"/>
      <path d="M20 50 Q50 80 80 50" stroke="#FFA500" stroke-width="8" fill="none"/>
      <path d="M10 40 Q30 20 50 40" stroke="#FFA500" stroke-width="12" fill="none"/>
      <path d="M0 45 Q20 25 40 45" stroke="#FFFFFF" stroke-width="8" fill="none"/>
    </svg>

    <svg class="character hidden" id="knuckles" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="40" fill="#FF0000"/>
      <circle cx="60" cy="40" r="15" fill="white"/>
      <circle cx="65" cy="40" r="8" fill="black"/>
      <path d="M20 50 Q50 80 80 50" stroke="#FF0000" stroke-width="8" fill="none"/>
      <path d="M30 30 L50 40 L70 30" stroke="#FF0000" stroke-width="5" fill="none"/>
    </svg>

    <svg class="character hidden" id="shadow" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="40" fill="#000000"/>
      <circle cx="60" cy="40" r="15" fill="white"/>
      <circle cx="65" cy="40" r="8" fill="red"/>
      <path d="M20 50 Q50 80 80 50" stroke="#FF0000" stroke-width="8" fill="none"/>
      <path d="M30 30 L50 20 L70 30" stroke="#FF0000" stroke-width="5" fill="none"/>
    </svg>

    <svg class="character hidden" id="amy" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="40" fill="#FFB6C1"/>
      <circle cx="60" cy="40" r="15" fill="white"/>
      <circle cx="65" cy="40" r="8" fill="black"/>
      <path d="M20 50 Q50 80 80 50" stroke="#FF69B4" stroke-width="8" fill="none"/>
      <path d="M40 20 Q50 10 60 20" stroke="#FF69B4" stroke-width="5" fill="none"/>
    </svg>

    <svg class="robotnik hidden" id="robotnik" viewBox="0 0 100 100">
      <circle cx="50" cy="30" r="25" fill="#FF0000"/>
      <rect x="25" y="30" width="50" height="40" fill="#808080"/>
      <circle cx="40" cy="25" r="5" fill="white"/>
      <circle cx="60" cy="25" r="5" fill="white"/>
      <path d="M40 40 Q50 50 60 40" stroke="black" fill="none" stroke-width="2"/>
    </svg>
  </div>
</div>

<div class="score">RINGS: <span id="ringCount">0</span></div>
<div class="timer">Time: <span id="timeCounter">0:00</span></div>
<div class="health-bar hidden" id="healthBar">
  <div class="health-fill" id="healthFill"></div>
</div>

<div class="controls">
  <button class="control-btn" id="leftBtn">←</button>
  <button class="control-btn" id="jumpBtn">↑</button>
  <button class="control-btn" id="rightBtn">→</button>
  <button class="control-btn" id="downBtn">↓</button>
</div>

<div class="character-select hidden" id="characterSelect">
  <h2>Choose Your Character</h2>
  <button class="character-btn" onclick="selectCharacter('sonic')">Sonic</button>
  <button class="character-btn" onclick="selectCharacter('tails')">Tails</button>
  <button class="character-btn" onclick="selectCharacter('knuckles')">Knuckles</button>
  <h3>- OR -</h3>
  <h2>Fight & Unlock</h2>
  <button class="character-btn" onclick="startVersusBattle('shadow')">Fight Shadow</button>
  <button class="character-btn" onclick="startVersusBattle('amy')">Fight Amy</button>
</div>

<script>
let currentCharacter = null;
let selectedCharacterType = '';
let rings = [];
let ringCount = 0;
let isJumping = false;
let isFlying = false;
let isDescending = false;
let velocity = 0;
let position = { x: 100, y: 100 };
let cameraOffset = 0; // Added camera offset
let robotnikHealth = 100;
let robotnikPosition = { x: window.innerWidth - 180, y: 100 };
let isBossFight = false;
let isMovingLeft = false;
let isMovingRight = false;
let gameTimer = 0;
let timerInterval;
let enemies = [];
let unlockedCharacters = new Set(['sonic', 'tails', 'knuckles']);
let currentBoss = null;
let bossHealth = 100;
const MOVE_SPEED = 5;
const GRAVITY = 0.5;
const JUMP_FORCE = -15;
const FLY_FORCE = -1.2;
const DESCEND_FORCE = 2;

function startTimer() {
  timerInterval = setInterval(() => {
    gameTimer++;
    const minutes = Math.floor(gameTimer / 60);
    const seconds = gameTimer % 60;
    document.getElementById('timeCounter').textContent = 
      `${minutes}:${seconds.toString().padStart(2, '0')}`;
  }, 1000);
}

function spawnEnemy() {
  const enemy = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  enemy.setAttribute("viewBox", "0 0 100 100");
  enemy.classList.add("enemy");
  
  // Random enemy appearance
  enemy.innerHTML = `
    <circle cx="50" cy="50" r="20" fill="#FF0000"/>
    <circle cx="40" cy="40" r="5" fill="white"/>
    <circle cx="60" cy="40" r="5" fill="white"/>
  `;
  
  const randomX = cameraOffset + Math.random() * (window.innerWidth - 40);
  enemy.style.left = randomX + 'px';
  
  document.querySelector('.world').appendChild(enemy);
  enemies.push(enemy);
}

function startVersusBattle(character) {
  document.getElementById('characterSelect').classList.add('hidden');
  currentBoss = document.getElementById(character);
  currentBoss.classList.remove('hidden');
  currentBoss.style.right = '200px';
  currentBoss.style.bottom = '100px';
  
  // Start with Sonic
  selectCharacter('sonic');
  bossHealth = 100;
  
  // Show health bar
  document.getElementById('healthBar').classList.remove('hidden');
}

function spawnRing() {
    const ring = document.createElement('div');
    ring.className = 'ring';
    
    // Random position relative to camera view
    const randomX = cameraOffset + Math.random() * window.innerWidth;
    const randomY = Math.random() * 200 + 100;
    
    ring.style.left = randomX + 'px';
    ring.style.bottom = randomY + 'px';
    
    document.querySelector('.world').appendChild(ring);
    rings.push(ring);
    
    setTimeout(() => {
        const index = rings.indexOf(ring);
        if (index > -1) {
            rings.splice(index, 1);
            ring.remove();
        }
    }, 5000);
}

function checkCollision(rect1, rect2) {
    return !(rect1.right < rect2.left || 
             rect1.left > rect2.right || 
             rect1.bottom < rect2.top || 
             rect1.top > rect2.bottom);
}

function loseRings() {
    const lostRingCount = Math.min(ringCount, 5);
    ringCount = Math.max(0, ringCount - lostRingCount);
    document.getElementById('ringCount').textContent = ringCount;

    for(let i = 0; i < lostRingCount; i++) {
        const ring = document.createElement('div');
        ring.className = 'ring lost-rings';
        ring.style.left = position.x + 'px';
        ring.style.bottom = position.y + 'px';
        const angle = (Math.PI * 2 * i) / lostRingCount;
        const tx = Math.cos(angle) * 100;
        const ty = Math.sin(angle) * 100;
        ring.style.setProperty('--tx', `${tx}px`);
        ring.style.setProperty('--ty', `${ty}px`);
        document.querySelector('.world').appendChild(ring);
        setTimeout(() => ring.remove(), 1000);
    }
}

function updateRobotnik() {
    if (!isBossFight) return;
    
    const robotnik = document.getElementById('robotnik');
    if (robotnikPosition.x > position.x) {
        robotnikPosition.x -= 2;
    } else {
        robotnikPosition.x += 2;
    }
    
    robotnik.style.left = robotnikPosition.x + 'px';
    robotnik.style.bottom = robotnikPosition.y + 'px';
    
    const robotnikRect = robotnik.getBoundingClientRect();
    const characterRect = currentCharacter.getBoundingClientRect();
    
    if (checkCollision(robotnikRect, characterRect)) {
        if (velocity > 0) { // Moving downward/attacking
            robotnikHealth -= 20;
            document.getElementById('healthFill').style.width = robotnikHealth + '%';
            velocity = JUMP_FORCE; // Bounce off
            if (robotnikHealth <= 0) {
                robotnik.remove();
                document.getElementById('healthBar').classList.add('hidden');
                isBossFight = false;
                showVictoryMessage();
            }
        } else {
            loseRings();
            position.x -= 50;
            velocity = JUMP_FORCE;
        }
    }
}

function selectCharacter(character) {
    if (!unlockedCharacters.has(character)) {
        alert('Defeat this character in battle to unlock them!');
        return;
    }
    
    const characterElement = document.getElementById(character);
    if (!characterElement) {
        console.error('Character element not found:', character);
        return;
    }
    
    document.getElementById('characterSelect').classList.add('hidden');
    currentCharacter = characterElement;
    selectedCharacterType = character;
    currentCharacter.classList.remove('hidden');
    
    startTimer();
    setInterval(spawnRing, 2000);
    setInterval(spawnEnemy, 3000);
    update();
}

function startBossFight() {
    isBossFight = true;
    robotnikHealth = 100;
    const robotnik = document.getElementById('robotnik');
    robotnik.classList.remove('hidden');
    document.getElementById('healthBar').classList.remove('hidden');
    setInterval(updateRobotnik, 50);
}

function showStartMenu() {
    const startMenu = document.createElement('div');
    startMenu.className = 'start-menu';
    
    // Add Sonic SVG to start menu
    const sonicLogo = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    sonicLogo.setAttribute("viewBox", "0 0 100 100");
    sonicLogo.innerHTML = `
      <circle cx="50" cy="50" r="40" fill="#1E90FF"/>
      <circle cx="60" cy="40" r="15" fill="white"/>
      <circle cx="65" cy="40" r="8" fill="black"/>
      <path d="M20 50 Q50 80 80 50" stroke="#1E90FF" stroke-width="8" fill="none"/>
    `;
    
    const startButton = document.createElement('button');
    startButton.className = 'start-btn';
    startButton.textContent = 'Start Game';
    startButton.onclick = () => {
        startMenu.remove();
        document.getElementById('characterSelect').classList.remove('hidden');
    };
    
    startMenu.appendChild(sonicLogo);
    startMenu.appendChild(startButton);
    document.body.appendChild(startMenu);
}

function showVictoryMessage(message = 'Boss Defeated!') {
    const victory = document.createElement('div');
    victory.className = 'victory-message';
    victory.innerHTML = `
      <h2>${message}</h2>
      <p>Proceeding to next zone...</p>
    `;
    document.body.appendChild(victory);
    
    // If Shadow was defeated, switch to playing as Shadow
    if (currentBoss && currentBoss.id === 'shadow') {
        // Hide current character
        currentCharacter.classList.add('hidden');
        // Switch to Shadow
        currentCharacter = document.getElementById('shadow');
        selectedCharacterType = 'shadow';
        currentCharacter.classList.remove('hidden');
    }
    
    // Show zone text
    setTimeout(() => {
        victory.remove();
        transitionToWoodZone();
    }, 2000);
}

// Add new function for zone transition
function transitionToWoodZone() {
    // Create and show zone text
    const zoneText = document.createElement('div');
    zoneText.className = 'zone-text';
    zoneText.textContent = 'WOOD ZONE';
    document.body.appendChild(zoneText);
    
    // Trigger fade in
    setTimeout(() => {
        zoneText.classList.add('show');
    }, 100);
    
    // Change level appearance
    document.body.classList.add('wood-zone');
    
    // Reset camera position
    cameraOffset = 0;
    document.querySelector('.world').style.transform = `translateX(0)`;
    
    // Remove zone text after display
    setTimeout(() => {
        zoneText.classList.remove('show');
        setTimeout(() => {
            zoneText.remove();
        }, 1000);
    }, 3000);
    
    // Reset character position
    position = { x: 100, y: 100 };
    currentCharacter.style.left = position.x + 'px';
    currentCharacter.style.bottom = position.y + 'px';
    
    // Restart ring spawning
    setInterval(spawnRing, 2000);
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') {
        isMovingLeft = true;
    } else if (e.key === 'ArrowRight') {
        isMovingRight = true;
    }
    handleInput(e.key);
});

document.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft') {
        isMovingLeft = false;
    } else if (e.key === 'ArrowRight') {
        isMovingRight = false;
    }
    if (e.key === 'ArrowUp' && selectedCharacterType === 'tails') {
        isFlying = false;
    }
    if (e.key === 'ArrowDown' && selectedCharacterType === 'tails') {
        isDescending = false;
    }
});

['left', 'right', 'jump', 'down'].forEach(direction => {
    const btn = document.getElementById(`${direction}Btn`);
    const key = direction === 'jump' ? 'ArrowUp' : 
                direction === 'down' ? 'ArrowDown' :
                direction === 'left' ? 'ArrowLeft' : 'ArrowRight';
    
    // Add mousedown/touchstart handler with preventDefault
    btn.addEventListener('touchstart', (e) => {
        e.preventDefault(); // Prevent default touch behavior
        if (direction === 'left') {
            isMovingLeft = true;
        } else if (direction === 'right') {
            isMovingRight = true;
        } else if (direction === 'jump' && !isJumping) {
            if (selectedCharacterType === 'tails') {
                isFlying = true;
                isDescending = false;
                velocity = FLY_FORCE * 2;
            } else if (!isJumping) {
                velocity = JUMP_FORCE;
                isJumping = true;
            }
        }
        handleInput(key);
    });
    
    // Add mouseup/touchend handler with preventDefault
    btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (direction === 'left') {
            isMovingLeft = false;
        } else if (direction === 'right') {
            isMovingRight = false;
        } else if (direction === 'jump' && selectedCharacterType === 'tails') {
            isFlying = false;
        }
    });
    
    // Add click handler for better responsiveness
    btn.addEventListener('click', (e) => {
        e.preventDefault();
        if (direction === 'jump') {
            if (selectedCharacterType === 'tails') {
                isFlying = true;
                isDescending = false;
                velocity = FLY_FORCE * 2;
            } else if (!isJumping) {
                velocity = JUMP_FORCE;
                isJumping = true;
            }
        }
    });
});

function handleInput(key) {
    if (!currentCharacter) return;
    
    if (key === 'ArrowUp') {
        if ((selectedCharacterType === 'sonic' || selectedCharacterType === 'knuckles') && !isJumping) {
            velocity = JUMP_FORCE;
            isJumping = true;
        } else if (selectedCharacterType === 'tails') {
            isFlying = true;
            isDescending = false;
            velocity = FLY_FORCE * 2;
        }
    }
    if (key === 'ArrowDown' && selectedCharacterType === 'tails') {
        isDescending = true;
        isFlying = false;
        velocity = DESCEND_FORCE;
    }
}

function update() {
    // Early return if no character is selected
    if (!currentCharacter) return;
    
    // Move all existing update function code here, unchanged
    if (isMovingRight) {
        position.x += MOVE_SPEED;
        currentCharacter.style.transform = 'scaleX(1)';
        
        // Check if character is past middle of screen
        if (position.x - cameraOffset > window.innerWidth / 2) {
            cameraOffset = position.x - window.innerWidth / 2;
            document.querySelector('.world').style.transform = `translateX(-${cameraOffset}px)`;
        }
    }
    if (isMovingLeft) {
        position.x -= MOVE_SPEED;
        currentCharacter.style.transform = 'scaleX(-1)';
        
        // Check if character is before middle of screen
        if (position.x - cameraOffset < window.innerWidth / 4) {
            cameraOffset = Math.max(0, position.x - window.innerWidth / 4);
            document.querySelector('.world').style.transform = `translateX(-${cameraOffset}px)`;
        }
    }

    // Prevent going backwards past start of level
    if (position.x < 0) {
        position.x = 0;
    }

    // Prevent going past end of level
    if (position.x > 4900) {
        position.x = 4900;
    }

    if (selectedCharacterType === 'tails') {
        if (isFlying) {
            velocity = FLY_FORCE;
        } else if (isDescending) {
            velocity = DESCEND_FORCE;
        } else {
            velocity += GRAVITY;
        }
    } else {
        velocity += GRAVITY;
    }
    
    position.y += velocity;

    if (position.y > 100) {
        position.y = 100;
        velocity = 0;
        isJumping = false;
    }

    if (position.y < 0) {
        position.y = 0;
        velocity = 0;
    }

    currentCharacter.style.bottom = position.y + 'px';
    currentCharacter.style.left = position.x + 'px';

    // Safe check for current character before getting bounding rect
    const characterRect = currentCharacter ? currentCharacter.getBoundingClientRect() : null;
    
    if (characterRect) {
        rings.forEach((ring, index) => {
            const ringRect = ring.getBoundingClientRect();
            if (checkCollision(characterRect, ringRect)) {
                ring.remove();
                rings.splice(index, 1);
                ringCount++;
                document.getElementById('ringCount').textContent = ringCount;
                
                if (ringCount === 5 && !isBossFight) {
                    startBossFight();
                }
            }
        });

        // Check enemy collisions
        enemies.forEach((enemy, index) => {
            const enemyRect = enemy.getBoundingClientRect();
            if (checkCollision(characterRect, enemyRect)) {
                if (velocity > 0) { // If falling onto enemy
                    enemy.remove();
                    enemies.splice(index, 1);
                    velocity = JUMP_FORCE; // Bounce off
                } else {
                    loseRings();
                }
            }
        });
        
        // Check boss battle collision
        if (currentBoss) {
            const bossRect = currentBoss.getBoundingClientRect();
            if (checkCollision(characterRect, bossRect)) {
                if (velocity > 0) { // Attacking boss
                    bossHealth -= 20;
                    document.getElementById('healthFill').style.width = bossHealth + '%';
                    velocity = JUMP_FORCE; // Bounce off
                    
                    if (bossHealth <= 0) {
                        const defeatedBossId = currentBoss.id;
                        currentBoss.remove();
                        document.getElementById('healthBar').classList.add('hidden');
                        unlockedCharacters.add(defeatedBossId);
                        
                        if (defeatedBossId === 'shadow') {
                            currentCharacter.classList.add('hidden');
                            currentCharacter = document.getElementById('shadow');
                            selectedCharacterType = 'shadow';
                            currentCharacter.classList.remove('hidden');
                        }
                        
                        showVictoryMessage(`${defeatedBossId.toUpperCase()} DEFEATED!`);
                        currentBoss = null;
                    }
                } else {
                    loseRings();
                }
            }
        }
    }
    
    requestAnimationFrame(update);
}

// Start the game with the menu
showStartMenu();
</script>
</body></html>
