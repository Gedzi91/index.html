<html><head><base href="https://websim.ai/exolife/explore"><title>ExoLife 2.0 - Keplerate Molecular Dynamics</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Roboto', sans-serif;
    background: #000;
    color: #e0e0e0;
    height: 100%;
    overflow: hidden;
  }
  .container {
    display: flex;
    height: 100vh;
  }
  .sidebar {
    width: 300px;
    background: rgba(20, 20, 20, 0.8);
    padding: 20px;
    overflow-y: auto;
  }
  .main-content {
    flex-grow: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #simulation-viewer {
    flex-grow: 1;
    background: #111;
    position: relative;
  }
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .simulation-panel {
    background: rgba(30, 30, 30, 0.9);
    border-radius: 10px;
    padding: 20px;
    width: 90%;
    max-width: 1200px;
    box-shadow: 0 0 20px rgba(77, 182, 172, 0.5);
  }
  h1, h2, h3 {
    color: #4db6ac;
  }
  #simulation-canvas {
    width: 100%;
    height: 500px;
    background: #000;
    border-radius: 5px;
  }
  .control-panel {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
  }
  .control-btn {
    background: rgba(77, 182, 172, 0.8);
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.3s;
  }
  .control-btn:hover {
    background: rgba(77, 182, 172, 1);
  }
  #data-output {
    background: rgba(50, 50, 50, 0.5);
    padding: 10px;
    border-radius: 5px;
    margin-top: 20px;
    font-family: monospace;
    white-space: pre-wrap;
    height: 100px;
    overflow-y: auto;
  }
  .slider-container {
    margin-top: 20px;
  }
  .slider {
    width: 100%;
    margin: 10px 0;
  }
  .slider-label {
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h1>ExoLife Explorer</h1>
      <h2>Keplerate Molecular Dynamics</h2>
      <p>Sample ID: KEP16B-001-X</p>
      <p>Status: Active Simulation</p>
      <div class="slider-container">
        <div class="slider-label">
          <span>Temperature: </span>
          <span id="temp-value">25°C</span>
        </div>
        <input type="range" min="-100" max="200" value="25" class="slider" id="temp-slider">
        <div class="slider-label">
          <span>Pressure: </span>
          <span id="pressure-value">1 atm</span>
        </div>
        <input type="range" min="0" max="10" value="1" step="0.1" class="slider" id="pressure-slider">
      </div>
    </div>
    <div class="main-content">
      <div id="simulation-viewer">
        <div class="overlay">
          <div class="simulation-panel">
            <h2>Keplerate Molecular Dynamics Simulation</h2>
            <canvas id="simulation-canvas" width="1160" height="500"></canvas>
            <div class="control-panel">
              <button class="control-btn" onclick="toggleSimulation()">Pause/Resume</button>
              <button class="control-btn" onclick="resetSimulation()">Reset</button>
              <button class="control-btn" onclick="induceCatalysis()">Induce Catalysis</button>
              <button class="control-btn" onclick="applyRadiation()">Apply Radiation</button>
            </div>
            <div id="data-output">Simulation initialized. Observing Keplerate molecular behavior...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('simulation-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let bonds = [];
    let paused = false;
    let animationId;

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.radius = 5;
        this.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < this.radius || this.x > canvas.width - this.radius) this.vx *= -1;
        if (this.y < this.radius || this.y > canvas.height - this.radius) this.vy *= -1;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    function initSimulation() {
      particles = [];
      bonds = [];
      for (let i = 0; i < 100; i++) {
        particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
      }
      updateBonds();
    }

    function updateBonds() {
      bonds = [];
      particles.forEach((p1, i) => {
        particles.slice(i + 1).forEach(p2 => {
          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < 100) {
            bonds.push([p1, p2, distance]);
          }
        });
      });
    }

    function animate() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });

      bonds.forEach(bond => {
        ctx.beginPath();
        ctx.moveTo(bond[0].x, bond[0].y);
        ctx.lineTo(bond[1].x, bond[1].y);
        ctx.strokeStyle = `rgba(77, 182, 172, ${1 - bond[2] / 100})`;
        ctx.stroke();
      });

      updateBonds();

      if (!paused) {
        animationId = requestAnimationFrame(animate);
      }
    }

    function toggleSimulation() {
      paused = !paused;
      if (!paused) {
        animate();
      } else {
        cancelAnimationFrame(animationId);
      }
    }

    function resetSimulation() {
      cancelAnimationFrame(animationId);
      initSimulation();
      paused = false;
      animate();
    }

    function induceCatalysis() {
      particles.forEach(p => {
        p.vx *= 2;
        p.vy *= 2;
        p.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
      });
      logOutput("Catalysis induced. Molecular kinetics increased.");
    }

    function applyRadiation() {
      particles.forEach(p => {
        p.radius = Math.random() * 5 + 3;
        p.color = `hsl(${Math.random() * 60 + 180}, 100%, 50%)`;
      });
      logOutput("Radiation applied. Observing changes in molecular structure.");
    }

    function logOutput(message) {
      const output = document.getElementById('data-output');
      output.textContent += "\n" + message;
      output.scrollTop = output.scrollHeight;
    }

    document.getElementById('temp-slider').addEventListener('input', function() {
      const temp = this.value;
      document.getElementById('temp-value').textContent = `${temp}°C`;
      particles.forEach(p => {
        const scaleFactor = 1 + (temp - 25) / 100;
        p.vx *= scaleFactor;
        p.vy *= scaleFactor;
      });
      logOutput(`Temperature adjusted to ${temp}°C. Molecular kinetics updated.`);
    });

    document.getElementById('pressure-slider').addEventListener('input', function() {
      const pressure = this.value;
      document.getElementById('pressure-value').textContent = `${pressure} atm`;
      const newParticleCount = Math.floor(pressure * 100);
      while (particles.length < newParticleCount) {
        particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
      }
      particles = particles.slice(0, newParticleCount);
      logOutput(`Pressure adjusted to ${pressure} atm. Particle density updated.`);
    });

    initSimulation();
    animate();
  </script>
</body>
</html>
