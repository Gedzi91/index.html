<html><head><base href="." />
<style>
  @font-face {
    font-family: 'Comic Sans MS';
    src: url('ComicSansMS3.ttf') format('truetype');
  }

  body {
    font-family: 'Comic Sans MS', cursive;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #e8e8e8;
  }

  .logo {
    width: 200px;
    height: 200px;
    margin: 20px;
  }

  .download-btn {
    background: #90EE90;
    padding: 15px 30px;
    border-radius: 10px;
    font-size: 24px;
    cursor: pointer;
    text-transform: uppercase;
    border: 3px solid #008000;
    margin: 20px;
    font-family: 'Comic Sans MS', cursive;
    transform: rotate(-2deg);
  }

  .terms {
    max-width: 500px;
    padding: 20px;
    background: #fff;
    border: 1px solid #ccc;
    margin: 20px;
    font-family: 'Comic Sans MS', cursive;
    transform: rotate(1deg);
  }

  .loading-bar {
    width: 300px;
    height: 30px;
    border: 2px dashed #000;
    display: none;
    transform: rotate(-1deg);
  }

  .loading-progress {
    width: 0%;
    height: 100%;
    background: #4CAF50;
    transition: width 3s linear;
  }

  .error-screen {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 1000;
  }

  .tux {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100px;  /* Changed from 200px to 100px */
    height: 100px; /* Changed from 200px to 100px */
  }

  .made-in {
    font-family: 'Comic Sans MS', cursive;
    font-size: 24px;
    margin-top: 10px;
    transform: rotate(2deg);
    color: #ff6b6b;
    text-shadow: 2px 2px #ffce00;
  }
</style>
</head>
<body>
  <div class="made-in">mAdE iN mALaYsIa!1!1!1</div>
  
  <!-- Poorly drawn Android logo with text -->
  <svg class="logo" viewBox="0 0 100 100">
    <rect x="20" y="30" width="60" height="50" fill="#90EE90" rx="5" style="transform: rotate(1deg);" />
    <circle cx="35" cy="45" r="5" fill="black" />
    <circle cx="65" cy="45" r="5" fill="black" />
    <rect x="40" y="15" width="5" height="20" fill="#90EE90" transform="rotate(23, 40, 15)" />
    <rect x="55" y="15" width="5" height="20" fill="#90EE90" transform="rotate(-25, 60, 15)" />
    <text x="50" y="95" text-anchor="middle" font-family="Comic Sans MS" font-size="12">InSTaLeR!1!</text>
  </svg>

  <button class="download-btn">DOWNLOD ANDROD 20 NOWW!!1!</button>

  <div class="loading-bar">
    <div class="loading-progress"></div>
  </div>

  <div class="terms">
    wE r NoT rEsPoNsIbLe 4 uR deViCe gO bYe ByE oR sUmTiNg!!!11! dIs Is ToTaLLy ReL aNdRoD 20 iNsTaLeR oK!!1!
  </div>

  <div class="error-screen">
    <img src="Tux.png" alt="Linux Tux" class="tux">
  </div>

  <script>
    document.querySelector('.download-btn').addEventListener('click', function() {
      const loadingBar = document.querySelector('.loading-bar');
      const progress = document.querySelector('.loading-progress');
      
      loadingBar.style.display = 'block';
      this.disabled = true;
      
      // Start loading animation
      setTimeout(() => {
        progress.style.width = '100%';
      }, 100);

      // Show error screen after loading
      setTimeout(() => {
        document.querySelector('.error-screen').style.display = 'block';
      }, 3200);
    });
  </script>
</body></html>
