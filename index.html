<html><head><base href="/" />
<title>ANOSIMBIB.tv - The Most Delightful Corner of the Internet!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap');

  body {
    margin: 0;
    padding: 0;
    background: #1a1a2e;
    font-family: 'Bubblegum Sans', cursive;
    color: #fff;
    overflow-x: hidden;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }

  .header {
    text-align: center;
    padding: 2rem;
    background: linear-gradient(45deg, #2a2a4e, #3a3a6e);
    border-radius: 0 0 30px 30px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }

  .mascot-container {
    position: relative;
    width: 300px;
    margin: 0 auto;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  .welcome-text {
    font-size: 2.5rem;
    margin: 2rem 0;
    text-shadow: 3px 3px 0px #ff69b4;
  }

  .content-section {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 2rem;
    margin: 2rem 0;
    backdrop-filter: blur(5px);
  }

  .video-container {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }

  .video-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .sparkle {
    position: absolute;
    pointer-events: none;
    animation: sparkle 1.5s linear infinite;
  }

  @keyframes sparkle {
    0% { transform: scale(0) rotate(0deg); opacity: 0; }
    50% { transform: scale(1) rotate(180deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="mascot-container">
        <img src="917b527a-549c-4fbc-9aa1-409d9fcdef26.webp" alt="ANOSIMBIB Mascot" style="width: 100%; height: auto;">
      </div>
      <h1 class="welcome-text">Welcome to ANOSIMBIB.tv!</h1>
    </header>

    <section class="content-section">
      <h2>Featured Video</h2>
      <div class="video-container">
        <iframe src="https://www.youtube.com/embed/fzZLY-c0Ehk" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </section>
  </div>

  <script>
    function createSparkle() {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = Math.random() * window.innerWidth + 'px';
      sparkle.style.top = Math.random() * window.innerHeight + 'px';
      sparkle.innerHTML = `
        <svg width="20" height="20" viewBox="0 0 20 20">
          <path d="M10 0 L12 8 L20 10 L12 12 L10 20 L8 12 L0 10 L8 8 Z" fill="#ffeb3b"/>
        </svg>
      `;
      document.body.appendChild(sparkle);
      
      setTimeout(() => {
        sparkle.remove();
      }, 1500);
    }

    setInterval(createSparkle, 300);

    // Add bounce effect to mascot on hover
    const mascot = document.querySelector('.mascot-container img');
    mascot.addEventListener('mouseenter', () => {
      mascot.style.transform = 'scale(1.1)';
      mascot.style.transition = 'transform 0.3s ease';
    });
    mascot.addEventListener('mouseleave', () => {
      mascot.style.transform = 'scale(1)';
    });
  </script>
</body></html>
