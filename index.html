<html><head><base href="https://websim.ai" />
<title>Ominous Robotic Eye Tracker</title>
<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #000;
    overflow: hidden;
    cursor: none;
  }
  
  #eye {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #ff0000, #990000);
    position: relative;
    box-shadow: 0 0 50px #ff0000;
  }
  
  #pupil {
    width: 80px;
    height: 80px;
    background-color: #000;
    border-radius: 50%;
    position: absolute;
    top: 60px;
    left: 60px;
    transition: all 0.05s ease-out;
  }
  
  #scanner {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 10px;
    background: linear-gradient(to bottom, rgba(255,0,0,0.5), transparent);
    animation: scan 2s linear infinite;
  }
  
  @keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
  }
  
  #cursor {
    width: 20px;
    height: 20px;
    border: 2px solid #fff;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
  }
  
  #warning {
    position: fixed;
    bottom: 20px;
    color: #ff0000;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    text-align: center;
    width: 100%;
  }
</style>
</head>
<body>
  <div id="eye">
    <div id="pupil"></div>
    <div id="scanner"></div>
  </div>
  <div id="cursor"></div>
  <div id="warning">WARNING: UNAUTHORIZED ORGANIC ENTITY DETECTED</div>

  <script>
    const eye = document.getElementById('eye');
    const pupil = document.getElementById('pupil');
    const cursor = document.getElementById('cursor');
    const warning = document.getElementById('warning');
    
    document.addEventListener('mousemove', (e) => {
      const mouseX = e.clientX;
      const mouseY = e.clientY;
      
      cursor.style.left = `${mouseX}px`;
      cursor.style.top = `${mouseY}px`;
      
      const eyeRect = eye.getBoundingClientRect();
      const eyeCenterX = eyeRect.left + eyeRect.width / 2;
      const eyeCenterY = eyeRect.top + eyeRect.height / 2;
      
      const angle = Math.atan2(mouseY - eyeCenterY, mouseX - eyeCenterX);
      const distance = Math.min(30, Math.hypot(mouseX - eyeCenterX, mouseY - eyeCenterY) / 5);
      
      const pupilX = Math.cos(angle) * distance;
      const pupilY = Math.sin(angle) * distance;
      
      pupil.style.transform = `translate(${pupilX}px, ${pupilY}px)`;
      
      const warningText = `WARNING: UNAUTHORIZED ORGANIC ENTITY DETECTED AT X:${Math.round(mouseX)} Y:${Math.round(mouseY)}`;
      warning.textContent = warningText;
    });
  </script>
</body></html>
