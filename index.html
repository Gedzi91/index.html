<html><head><base href="https://digital-sculpture.art/research/holographic-technology/ai-reconstruction/holographic-ai-assistants/demo/final-render/metaphorical-realm/"><title>Metaphorical Realm Explorer</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    background: #000;
    color: #fff;
}

#metaphor-container {
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
}

#metaphor-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.control-panel {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    background: rgba(0, 0, 0, 0.7);
    border-radius: 15px;
    padding: 10px;
}

.control-button {
    background: none;
    border: 2px solid #fff;
    color: #fff;
    padding: 10px 20px;
    margin: 0 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.3s ease;
}

.control-button:hover {
    background: rgba(255, 255, 255, 0.2);
}

.control-button:active {
    background: rgba(255, 255, 255, 0.4);
    transform: scale(0.95);
}

#info-panel {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px;
    border-radius: 10px;
    max-width: 300px;
}

#metaphor-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    text-align: center;
    color: #fff;
    text-shadow: 0 0 10px rgba(255,255,255,0.8);
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.metaphor-fade-in {
    opacity: 1 !important;
}

.metaphor-fade-out {
    opacity: 0 !important;
}

#interaction-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
}

#interaction-overlay.active {
    opacity: 1;
}

#interaction-message {
    font-size: 24px;
    color: #fff;
    text-align: center;
    padding: 20px;
    background: rgba(0, 0, 0, 0.7);
    border-radius: 10px;
    max-width: 80%;
    pointer-events: auto;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

#interaction-message:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
}

@keyframes pulseGlow {
    0% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #fff; }
    50% { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #fff; }
    100% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #fff; }
}

.pulsing-glow {
    animation: pulseGlow 2s infinite;
}

#metaphor-particles {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.metaphor-particle {
    position: absolute;
    background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    animation: particleFade 3s ease-out;
}

@keyframes particleFade {
    0% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.5); }
}

#metaphor-realm {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 24px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
    transition: opacity 0.5s ease;
}

#female-silhouette {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 500px;
}

.luminous-line {
    fill: none;
    stroke: #fff;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-dasharray: 5,5;
    animation: dash 20s linear infinite;
}

.luminous-dot {
    fill: #fff;
    r: 3;
    animation: pulse 2s ease-in-out infinite alternate;
}

@keyframes dash {
    to {
        stroke-dashoffset: 1000;
    }
}

@keyframes pulse {
    from {
        r: 2;
        opacity: 0.5;
    }
    to {
        r: 4;
        opacity: 1;
    }
}

</style>
</head>
<body>
<div id="metaphor-container">
    <canvas id="metaphor-canvas"></canvas>
    
    <div class="control-panel">
        <button class="control-button" id="explore">Explore Metaphor</button>
        <button class="control-button" id="interpret">Interpret</button>
        <button class="control-button" id="shift-perspective">Shift Perspective</button>
    </div>
    
    <div id="info-panel">
        <h3>Metaphorical Insights</h3>
        <p>Current Realm: <span id="current-realm">Abstract Thoughts</span></p>
        <p>Metaphor Depth: <span id="metaphor-depth">Profound</span></p>
        <p>Conceptual Resonance: <span id="conceptual-resonance">87%</span></p>
    </div>
    
    <div id="metaphor-display"></div>
    
    <div id="interaction-overlay">
        <div id="interaction-message" class="pulsing-glow">
            Delving into the depths of metaphorical realms...
        </div>
    </div>

    <div id="metaphor-particles"></div>

    <div id="metaphor-realm">Abstract Thoughts</div>

    <svg id="female-silhouette" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Head -->
        <ellipse cx="50" cy="30" rx="15" ry="20" class="luminous-line"/>
        <!-- Body -->
        <path d="M50 50 Q30 100 40 150 Q50 180 50 200" class="luminous-line"/>
        <path d="M50 50 Q70 100 60 150 Q50 180 50 200" class="luminous-line"/>
        <!-- Arms -->
        <path d="M50 60 Q30 70 20 90" class="luminous-line"/>
        <path d="M50 60 Q70 70 80 90" class="luminous-line"/>
        <!-- Legs -->
        <path d="M40 150 Q35 175 30 200" class="luminous-line"/>
        <path d="M60 150 Q65 175 70 200" class="luminous-line"/>
        <!-- Luminous dots -->
        <circle cx="50" cy="30" class="luminous-dot"/>
        <circle cx="50" cy="100" class="luminous-dot"/>
        <circle cx="20" cy="90" class="luminous-dot"/>
        <circle cx="80" cy="90" class="luminous-dot"/>
        <circle cx="40" cy="150" class="luminous-dot"/>
        <circle cx="60" cy="150" class="luminous-dot"/>
    </svg>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Initialize Three.js scene
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('metaphor-canvas') });
renderer.setSize(window.innerWidth, window.innerHeight);

// Create a metaphorical realm representation
const geometry = new THREE.SphereGeometry(5, 32, 32);
const material = new THREE.ShaderMaterial({
    uniforms: {
        time: { value: 0 },
        resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
    },
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform float time;
        uniform vec2 resolution;
        varying vec2 vUv;
        
        float noise(vec2 p) {
            return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
        }
        
        void main() {
            vec2 p = (gl_FragCoord.xy * 2.0 - resolution) / min(resolution.x, resolution.y);
            float t = time * 0.1;
            
            vec3 color = vec3(0.5 + 0.5 * sin(t), 0.5 + 0.5 * cos(t), 0.5 + 0.5 * sin(t + 3.14));
            
            for(float i = 1.0; i < 10.0; i++) {
                p.x += 0.1 / i * sin(i * 3.0 * p.y + t);
                p.y += 0.1 / i * cos(i * 3.0 * p.x + t);
            }
            
            float r = abs(sin(p.x - p.y));
            float g = abs(sin(p.x + p.y));
            float b = abs(sin(p.x * p.y));
            
            gl_FragColor = vec4(r * color.r, g * color.g, b * color.b, 1.0);
        }
    `
});

const metaphorSphere = new THREE.Mesh(geometry, material);
scene.add(metaphorSphere);

camera.position.z = 10;

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    metaphorSphere.rotation.x += 0.005;
    metaphorSphere.rotation.y += 0.005;
    material.uniforms.time.value += 0.05;
    renderer.render(scene, camera);
}
animate();

// Control panel functionality
const metaphorRealms = ['Abstract Thoughts', 'Emotional Landscape', 'Conceptual Nexus', 'Symbolic Resonance'];
const metaphors = [
    'Time is a river flowing endlessly',
    'Life is a tapestry woven with experiences',
    'Knowledge is a key unlocking infinite doors',
    'Emotions are colors painting the soul',
    'Imagination is a bridge to unseen worlds'
];
let currentRealmIndex = 0;

document.getElementById('explore').addEventListener('click', () => {
    const metaphorDisplay = document.getElementById('metaphor-display');
    const randomMetaphor = metaphors[Math.floor(Math.random() * metaphors.length)];
    metaphorDisplay.textContent = randomMetaphor;
    metaphorDisplay.style.opacity = 0;
    void metaphorDisplay.offsetWidth; // Trigger reflow
    metaphorDisplay.style.opacity = 1;
    
    // Generate metaphor particles
    generateMetaphorParticles();
});

document.getElementById('interpret').addEventListener('click', () => {
    const interpretations = [
        'This metaphor suggests the cyclical nature of existence.',
        'It reveals the interconnectedness of all experiences.',
        'This concept emphasizes the transformative power of understanding.',
        'It highlights the subjective nature of our inner worlds.',
        'This metaphor encourages embracing the unknown with creativity.'
    ];
    
    const interactionMessage = document.getElementById('interaction-message');
    interactionMessage.textContent = interpretations[Math.floor(Math.random() * interpretations.length)];
    document.getElementById('interaction-overlay').classList.add('active');
    
    setTimeout(() => {
        document.getElementById('interaction-overlay').classList.remove('active');
    }, 5000);
});

document.getElementById('shift-perspective').addEventListener('click', () => {
    currentRealmIndex = (currentRealmIndex + 1) % metaphorRealms.length;
    const newRealm = metaphorRealms[currentRealmIndex];
    document.getElementById('current-realm').textContent = newRealm;
    document.getElementById('metaphor-realm').textContent = newRealm;
    
    // Change the shader based on the new realm
    switch(newRealm) {
        case 'Emotional Landscape':
            material.fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                varying vec2 vUv;
                
                void main() {
                    vec2 p = (gl_FragCoord.xy * 2.0 - resolution) / min(resolution.x, resolution.y);
                    float t = time * 0.1;
                    
                    vec3 color = vec3(0.5 + 0.5 * sin(t), 0.5 + 0.5 * cos(t), 0.5 + 0.5 * sin(t + 3.14));
                    
                    float r = abs(sin(p.x * 10.0 + t));
                    float g = abs(sin(p.y * 10.0 + t));
                    float b = abs(sin((p.x + p.y) * 5.0 + t));
                    
                    gl_FragColor = vec4(r * color.r, g * color.g, b * color.b, 1.0);
                }
            `;
            break;
        case 'Conceptual Nexus':
            material.fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                varying vec2 vUv;
                
                void main() {
                    vec2 p = (gl_FragCoord.xy * 2.0 - resolution) / min(resolution.x, resolution.y);
                    float t = time * 0.1;
                    
                    vec3 color = vec3(0.5 + 0.5 * sin(t), 0.5 + 0.5 * cos(t), 0.5 + 0.5 * sin(t + 3.14));
                    
                    float r = abs(sin(p.x * p.y + t));
                    float g = abs(cos(p.x * p.y + t));
                    float b = abs(sin(sqrt(p.x * p.x + p.y * p.y) * 10.0 + t));
                    
                    gl_FragColor = vec4(r * color.r, g * color.g, b * color.b, 1.0);
                }
            `;
            break;
        case 'Symbolic Resonance':
            material.fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                varying vec2 vUv;
                
                void main() {
                    vec2 p = (gl_FragCoord.xy * 2.0 - resolution) / min(resolution.x, resolution.y);
                    float t = time * 0.1;
                    
                    vec3 color = vec3(0.5 + 0.5 * sin(t), 0.5 + 0.5 * cos(t), 0.5 + 0.5 * sin(t + 3.14));
                    
                    float r = abs(sin(atan(p.y, p.x) * 5.0 + t));
                    float g = abs(cos(length(p) * 10.0 + t));
                    float b = abs(sin(dot(p, p) * 2.0 + t));
                    
                    gl_FragColor = vec4(r * color.r, g * color.g, b * color.b, 1.0);
                }
            `;
            break;
        default: // Abstract Thoughts
            material.fragmentShader = `
                uniform float time;
                uniform vec2 resolution;
                varying vec2 vUv;
                
                float noise(vec2 p) {
                    return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                }
                
                void main() {
                    vec2 p = (gl_FragCoord.xy * 2.0 - resolution) / min(resolution.x, resolution.y);
                    float t = time * 0.1;
                    
                    vec3 color = vec3(0.5 + 0.5 * sin(t), 0.5 + 0.5 * cos(t), 0.5 + 0.5 * sin(t + 3.14));
                    
                    for(float i = 1.0; i < 10.0; i++) {
                        p.x += 0.1 / i * sin(i * 3.0 * p.y + t);
                        p.y += 0.1 / i * cos(i * 3.0 * p.x + t);
                    }
                    
                    float r = abs(sin(p.x - p.y));
                    float g = abs(sin(p.x + p.y));
                    float b = abs(sin(p.x * p.y));
                    
                    gl_FragColor = vec4(r * color.r, g * color.g, b * color.b, 1.0);
                }
            `;
    }
    material.needsUpdate = true;
});

function generateMetaphorParticles() {
    const particlesContainer = document.getElementById('metaphor-particles');
    particlesContainer.innerHTML = '';
    for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'metaphor-particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.width = (Math.random() * 20 + 10) + 'px';
        particle.style.height = particle.style.width;
        particlesContainer.appendChild(particle);
    }
}

// Update metaphor depth and conceptual resonance
setInterval(() => {
    const depths = ['Surface', 'Intermediate', 'Deep', 'Profound', 'Transcendent'];
    document.getElementById('metaphor-depth').textContent = depths[Math.floor(Math.random() * depths.length)];
    document.getElementById('conceptual-resonance').textContent = Math.floor(Math.random() * 100) + '%';
}, 5000);

// Handle window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    material.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
});

// Interactive canvas behavior
const canvas = document.getElementById('metaphor-canvas');
const interactionOverlay = document.getElementById('interaction-overlay');
const interactionMessage = document.getElementById('interaction-message');

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    // Normalize coordinates
    const normalizedX = (x / canvas.width) * 2 - 1;
    const normalizedY = -(y / canvas.height) * 2 + 1;
    
    // Create a raycaster
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(normalizedX, normalizedY), camera);
    
    // Check for intersections with the metaphor sphere
    const intersects = raycaster.intersectObject(metaphorSphere);
    
    if (intersects.length > 0) {
        // Sphere was clicked
        interactionOverlay.classList.add('active');
        interactionMessage.textContent = "You've touched the essence of the metaphorical realm...";
        
        // Generate a ripple effect on the sphere
        const rippleOrigin = intersects[0].point;
        const rippleMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xffffff,
            transparent: true,
            opacity: 0.5
        });
        const ripple = new THREE.Mesh(new THREE.SphereGeometry(0.1, 32, 32), rippleMaterial);
        ripple.position.copy(rippleOrigin);
        scene.add(ripple);
        
        // Animate the ripple
        let rippleSize = 0.1;
        const rippleAnimation = setInterval(() => {
            rippleSize += 0.1;
            ripple.scale.set(rippleSize, rippleSize, rippleSize);
            rippleMaterial.opacity -= 0.02;
            
            if (rippleSize > 2) {
                clearInterval(rippleAnimation);
                scene.remove(ripple);
            }
        }, 50);
        
        // Hide the overlay after a delay
        setTimeout(() => {
            interactionOverlay.classList.remove('active');
        }, 3000);
    }
});

// Interaction message click handler
interactionMessage.addEventListener('click', () => {
    const metaphoricalInsights = [
        "In the dance of metaphors, we find the rhythm of understanding.",
        "Each symbol is a key, unlocking doors to deeper meaning.",
        "The landscape of thought is painted with the colors of metaphor.",
        "In the mirror of metaphor, we see reflections of universal truth.",
        "Metaphors are the bridges between the known and the unknown.",
        "In the garden of language, metaphors are the most vibrant flowers.",
        "The tapestry of understanding is woven with threads of metaphor.",
        "Metaphors are the constellations in the night sky of meaning.",
        "In the alchemy of thought, metaphors turn the ordinary into gold.",
        "The winds of metaphor carry seeds of insight across the mind's landscape."
    ];
    
    const randomInsight = metaphoricalInsights[Math.floor(Math.random() * metaphoricalInsights.length)];
    interactionMessage.textContent = randomInsight;
    
    // Trigger a visual effect on the metaphor sphere
    const pulseEffect = new THREE.Mesh(
        new THREE.SphereGeometry(5.2, 32, 32),
        new THREE.MeshBasicMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.5
        })
    );
    scene.add(pulseEffect);
    
    let pulseSize = 1;
    const pulseAnimation = setInterval(() => {
        pulseSize += 0.05;
        pulseEffect.scale.set(pulseSize, pulseSize, pulseSize);
        pulseEffect.material.opacity -= 0.02;
        
        if (pulseSize > 1.5) {
            clearInterval(pulseAnimation);
            scene.remove(pulseEffect);
        }
    }, 50);
});

// Add ambient light to the scene
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

// Add a point light to create more depth
const pointLight = new THREE.PointLight(0xffffff, 1);
pointLight.position.set(10, 10, 10);
scene.add(pointLight);

// Create abstract thought particles in the background
function addAbstractParticles() {
    const particleGeometry = new THREE.BufferGeometry();
    const particleMaterial = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.1,
        transparent: true,
        opacity: 0.8
    });

    const particleVertices = [];
    for (let i = 0; i < 10000; i++) {
        const x = (Math.random() - 0.5) * 2000;
        const y = (Math.random() - 0.5) * 2000;
        const z = -Math.random() * 2000;
        particleVertices.push(x, y, z);
    }

    particleGeometry.setAttribute('position', new THREE.Float32BufferAttribute(particleVertices, 3));
    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);
}

addAbstractParticles();

// Animate the female silhouette
const femaleSilhouette = document.getElementById('female-silhouette');
let rotationAngle = 0;

function animateSilhouette() {
    rotationAngle += 0.01;
    femaleSilhouette.style.transform = `translate(-50%, -50%) rotate(${Math.sin(rotationAngle) * 5}deg)`;
    requestAnimationFrame(animateSilhouette);
}

animateSilhouette();

// Initial exploration
document.getElementById('explore').click();
</script>
</body></html>
