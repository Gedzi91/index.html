<html><head><base href="https://codepen.io/pen/">
<title>Audiovisual Starry Experience</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: #000;
        color: #fff;
    }
    .settings-panel {
        position: fixed;
        top: 0;
        right: -300px; /* Start off-screen */
        width: 300px;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        transition: right 0.3s ease-in-out;
        overflow-y: auto;
        z-index: 1000;
        padding: 20px;
        box-sizing: border-box;
    }
    .settings-panel.open {
        right: 0;
    }
    .settings-toggle {
        position: fixed;
        top: 10px;
        right: 10px;
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
        z-index: 1001;
        opacity: 0.7;
        transition: opacity 0.3s;
    }
    .settings-toggle:hover {
        opacity: 1;
    }
    button {
        background-color: #4CAF50;
        border: none;
        color: white;
        padding: 10px 20px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
        border-radius: 5px;
        transition: background-color 0.3s;
    }
    button:hover {
        background-color: #45a049;
    }
    button:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
    }
    .slider {
        -webkit-appearance: none;
        width: 100%;
        height: 15px;
        border-radius: 5px;
        background: #d3d3d3;
        outline: none;
        opacity: 0.7;
        transition: opacity .2s;
        margin: 10px 0;
    }
    .slider:hover {
        opacity: 1;
    }
    .slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 25px;
        height: 25px;
        border-radius: 50%;
        background: #4CAF50;
        cursor: pointer;
    }
    .slider::-moz-range-thumb {
        width: 25px;
        height: 25px;
        border-radius: 50%;
        background: #4CAF50;
        cursor: pointer;
    }
    #tempoValue, #speedValue, #rotationValue, #colorCycleSpeedValue, #colorIntensityValue, #zoomValue, #teleidoscopeSidesValue, #teleidoscopeRotationSpeedValue, #edgeThicknessValue, #starEdgeLengthValue, #starEdgeAngleValue, #distortionAmountValue, #distortionSpeedValue {
        display: inline-block;
        width: 50px;
        text-align: right;
    }
</style>
</head>

<div id="settingsPanel" class="settings-panel">
    <div id="settingsContent">
        <div>
            <label for="speed">Speed: <span id="speedValue">1</span></label>
            <input type="range" min="0" max="5" value="1" step="0.1" class="slider" id="speed">
        </div>
        <div>
            <label for="rotation">Rotation: <span id="rotationValue">1.5</span></label>
            <input type="range" min="0" max="5" value="1.5" step="0.1" class="slider" id="rotation">
        </div>
        <div>
            <label for="colorCycleSpeed">Color Cycle Speed: <span id="colorCycleSpeedValue">0.8</span></label>
            <input type="range" min="0" max="10" value="0.8" step="0.1" class="slider" id="colorCycleSpeed">
        </div>
        <div>
            <label for="colorIntensity">Color Intensity: <span id="colorIntensityValue">0.2</span></label>
            <input type="range" min="0" max="2" value="0.2" step="0.1" class="slider" id="colorIntensity">
        </div>
        <div>
            <label for="enableTeleidoscope">Enable Teleidoscope:</label>
            <input type="checkbox" id="enableTeleidoscope">
        </div>
        <div>
            <label for="zoom">Zoom: <span id="zoomValue">1</span></label>
            <input type="range" min="0.1" max="5" value="1" step="0.1" class="slider" id="zoom">
        </div>
        <div>
            <label for="teleidoscopeSides"># of Sides: <span id="teleidoscopeSidesValue">10</span></label>
            <input type="range" min="3" max="12" value="10" step="1" class="slider" id="teleidoscopeSides">
        </div>
        <div>
            <label for="teleidoscopeRotationSpeed">Spin: <span id="teleidoscopeRotationSpeedValue">-1.5</span></label>
            <input type="range" min="-5" max="5" value="-1.5" step="0.1" class="slider" id="teleidoscopeRotationSpeed">
        </div>
        <div>
            <label for="edgeThickness">Edge Thickness: <span id="edgeThicknessValue">0.313</span></label>
            <input type="range" min="0" max="0.5" value="0.313" step="0.001" class="slider" id="edgeThickness">
        </div>
        <div>
            <label for="starEdgeLength">Star Edge Length: <span id="starEdgeLengthValue">-0.52</span></label>
            <input type="range" min="0.1" max="5" value="-0.52" step="0.1" class="slider" id="starEdgeLength">
        </div>
        <div>
            <label for="starEdgeAngle">Star Edge Angle: <span id="starEdgeAngleValue">-0.6</span></label>
            <input type="range" min="-1" max="1" value="-0.6" step="0.01" class="slider" id="starEdgeAngle">
        </div>
        <div>
            <label for="shapeSelect">Shape:</label>
            <select id="shapeSelect">
                <option value="circle">Circle</option>
                <option value="square">Square</option>
                <option value="triangle">Triangle</option>
                <option value="pentagram">Pentagram</option>
                <option value="heptagram">Heptagram</option>
                <option value="octagram">Octagram</option>
                <option value="enneagram" selected>Enneagram</option>
                <option value="decagram">Decagram</option>
                <option value="hendecagram">Hendecagram</option>
                <option value="dodecagram">Dodecagram</option>
            </select>
        </div>
        <div>
            <label for="distortionAmount">Distortion Amount: <span id="distortionAmountValue">0.1</span></label>
            <input type="range" min="0" max="1" value="0.1" step="0.01" class="slider" id="distortionAmount">
        </div>
        <div>
            <label for="distortionSpeed">Distortion Speed: <span id="distortionSpeedValue">2</span></label>
            <input type="range" min="0" max="5" value="2" step="0.1" class="slider" id="distortionSpeed">
        </div>
        <div>
            <label for="colorGroup">Color Group:</label>
            <select id="colorGroup">
                <option value="group1" selected>Vibrant Red-Blue</option>
                <option value="group2">Sunset Ocean</option>
                <option value="group3">Neon Spectrum</option>
                <option value="group4">Nature Pop</option>
                <option value="group5">Citrus Twilight</option>
                <option value="group6">Forest Glow</option>
                <option value="group7">Candy Cosmos</option>
                <option value="group8">Royal Prism</option>
                <option value="custom">Custom</option>
            </select>
        </div>
        <div id="customColorInputs" style="display: none;">
            <input type="color" id="customColor1" value="#FF0000">
            <input type="color" id="customColor2" value="#00FFFF">
            <input type="color" id="customColor3" value="#FFFF00">
            <input type="color" id="customColor4" value="#0000FF">
        </div>
        <div>
            <label for="randomizeColors">Randomize Colors:</label>
            <input type="checkbox" id="randomizeColors" checked>
        </div>
        <div>
            <label for="randomizeTime">Randomize Change Time: <span id="randomizeTimeValue">15</span> seconds</label>
            <input type="range" min="5" max="300" value="15" class="slider" id="randomizeTime">
        </div>
    </div>
</div>
<button id="settingsToggle" class="settings-toggle">⚙️</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<script id="vertexShader" type="x-shader/x-vertex">
varying vec2 vUv;
void main() {
    vUv = uv;
    gl_Position = vec4(position, 1.0);
}
</script>

<script id="fragmentShader" type="x-shader/x-fragment">
uniform vec2 iResolution;
uniform float iTime;
uniform float speed;
uniform float rotation;
uniform float colorCycleSpeed;
uniform float colorIntensity;
uniform bool enableTeleidoscope;
uniform float zoom;
uniform int teleidoscopeSides;
uniform float teleidoscopeRotationSpeed;
uniform int shapeType;
uniform float edgeThickness;
uniform float starEdgeLength;
uniform float starEdgeAngle;
uniform float distortionAmount;
uniform float distortionSpeed;
uniform vec3 paletteColor1;
uniform vec3 paletteColor2;
uniform vec3 paletteColor3;
uniform vec3 paletteColor4;

#define TIME        iTime
#define RESOLUTION  iResolution

#define ROT(a)      mat2(cos(a), sin(a), -sin(a), cos(a))

const float
  pi        = acos(-1.)
, tau       = 2.*pi
, planeDist = .5
, furthest  = 16.
, fadeFrom  = 8.
;

const vec2 
  pathA = vec2(.31, .41)
, pathB = vec2(1.0,sqrt(0.5))
;

const vec4 
  U = vec4(0, 1, 2, 3)
  ;

vec3 aces_approx(vec3 v) {
  v = max(v, 0.0);
  v *= 0.6;
  float a = 2.51;
  float b = 0.03;
  float c = 2.43;
  float d = 0.59;
  float e = 0.14;
  return clamp((v*(a*v+b))/(v*(c*v+d)+e), 0.0, 1.0);
}

vec3 offset(float z) {
  return vec3(pathB*sin(pathA*z), z);
}

vec3 doffset(float z) {
  return vec3(pathA*pathB*cos(pathA*z), 1.0);
}

vec3 ddoffset(float z) {
  return vec3(-pathA*pathA*pathB*sin(pathA*z), 0.0);
}

vec4 alphaBlend(vec4 back, vec4 front) {
  float w = front.w + back.w*(1.0-front.w);
  vec3 xyz = (front.xyz*front.w + back.xyz*back.w*(1.0-front.w))/w;
  return w > 0.0 ? vec4(xyz, w) : vec4(0.0);
}

float pmin(float a, float b, float k) {
  float h = clamp(0.5+0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

float pmax(float a, float b, float k) {
  return -pmin(-a, -b, k);
}

float pabs(float a, float k) {
  return -pmin(a, -a, k);
}

float shape(vec2 p, float r, float sm) {
    float d;
    if (shapeType == 1) { // Square
        vec2 d2 = abs(p) - r;
        d = min(max(d2.x, d2.y), 0.0) + length(max(d2, 0.0));
    } else if (shapeType == 2) { // Triangle
        const float k = sqrt(3.0);
        p.x = abs(p.x) - r;
        p.y = p.y + r/k;
        if (p.x + k*p.y > 0.0) p = vec2(p.x-k*p.y,-k*p.x-p.y)/2.0;
        p.x -= clamp(p.x, -2.0*r, 0.0);
        d = -length(p)*sign(p.y);
    } else if (shapeType >= 3) { // Star shapes
        int n = shapeType + 2; // Number of points
        float an = 3.141593 / float(n);
        float en = 3.141593 / float(n);
        vec2 acs = vec2(cos(an), sin(an));
        vec2 ecs = vec2(cos(en), sin(en));
        float bn = mod(atan(p.x, p.y), 2.0 * an) - an;
        p = length(p) * vec2(cos(bn), abs(sin(bn)));
        p -= r * acs;
        vec2 sc = vec2(cos(starEdgeAngle), sin(starEdgeAngle));
        p += sc * clamp(-dot(p, sc), 0.0, r * acs.y / ecs.y * starEdgeLength);
        d = length(p) * sign(p.x);
    } else { // Circle (default)
        d = length(p) - r;
    }
    return smoothstep(edgeThickness, 0.0, abs(d)) - sm;
}

vec3 hsv2rgb(vec3 c) {
    vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
    vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
    return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
}

vec3 palette(float t) {
    vec3 a = paletteColor1;
    vec3 b = paletteColor2;
    vec3 c = paletteColor3;
    vec3 d = paletteColor4;
    return a + b * cos(6.28318 * (c * t + d));
}

vec2 distort(vec2 p) {
    float angle = atan(p.y, p.x);
    float radius = length(p);
    float distortion = sin(radius * 10.0 + iTime * distortionSpeed) * distortionAmount;
    return p + vec2(cos(angle), sin(angle)) * distortion;
}

vec4 plane(vec3 ro, vec3 rd, vec3 pp, vec3 npp, float pd, vec3 cp, vec3 off, float n) {
  float aa = 3.*pd*distance(pp.xy, npp.xy);
  vec4 col = vec4(0.);
  vec2 p2 = pp.xy;
  p2 -= offset(pp.z).xy;
  vec2 doff   = ddoffset(pp.z).xz;
  vec2 ddoff  = doffset(pp.z).xz;
  float dd = dot(doff, ddoff);
  p2 *= ROT(dd*pi*5.*rotation);

  p2 = distort(p2);

  float d0 = shape(p2, 0.45, 0.02);
  float d1 = d0-0.01;
  float d2 = length(p2);
  const float colp = pi*100.;
  float colaa = aa*200.;
  
  col.xyz = palette(0.5*n + 2.0*d2 + iTime * colorCycleSpeed) * mix(0.5/(d2*d2), 1., smoothstep(-0.5+colaa, 0.5+colaa, sin(d2*colp))) / max(3.*d2*d2, 1E-1);
  col.xyz *= colorIntensity;
  col.xyz = mix(col.xyz, vec3(2.), smoothstep(aa, -aa, d1)); 
  col.w = smoothstep(aa, -aa, -d0);
  return col;
}

vec3 color(vec3 ww, vec3 uu, vec3 vv, vec3 ro, vec2 p) {
  float lp = length(p);
  vec2 np = p + 1./RESOLUTION.xy;
  float rdd = 2.0-0.25;
  
  vec3 rd = normalize(p.x*uu + p.y*vv + rdd*ww);
  vec3 nrd = normalize(np.x*uu + np.y*vv + rdd*ww);

  float nz = floor(ro.z / planeDist);

  vec4 acol = vec4(0.0);

  vec3 aro = ro;
  float apd = 0.0;

  for (float i = 1.; i <= furthest; ++i) {
    if ( acol.w > 0.95) {
      break;
    }
    float pz = planeDist*nz + planeDist*i;

    float lpd = (pz - aro.z)/rd.z;
    float npd = (pz - aro.z)/nrd.z;
    float cpd = (pz - aro.z)/ww.z;

    {
      vec3 pp = aro + rd*lpd;
      vec3 npp= aro + nrd*npd;
      vec3 cp = aro+ww*cpd;

      apd += lpd;

      vec3 off = offset(pp.z);

      float dz = pp.z-ro.z;
      float fadeIn = smoothstep(planeDist*furthest, planeDist*fadeFrom, dz);
      float fadeOut = smoothstep(0., planeDist*.1, dz);
      float fadeOutRI = smoothstep(0., planeDist*1.0, dz);

      float ri = mix(1.0, 0.9, fadeOutRI*fadeIn);

      vec4 pcol = plane(ro, rd, pp, npp, apd, cp, off, nz+i);

      pcol.w *= fadeOut*fadeIn;
      acol = alphaBlend(pcol, acol);
      aro = pp;
    }
  }

  return acol.xyz*acol.w;
}

vec2 kale(vec2 uv, int sides, float rotationOffset) {
    float a = atan(uv.y, uv.x) + rotationOffset;
    float r = length(uv);
    float pi = 3.14159;
    float angle = 2.0*pi/float(sides);
    a = mod(a, angle);
    a = abs(a - angle/2.0);
    return vec2(cos(a), sin(a)) * r;
}

void main() {
    vec2 r = RESOLUTION.xy, q = gl_FragCoord.xy/r, pp = -1.0+2.0*q, p = pp;
    p.x *= r.x/r.y;
    
    if (enableTeleidoscope) {
        p *= zoom;
        float rotationOffset = teleidoscopeRotationSpeed * TIME;
        p = kale(p, teleidoscopeSides, rotationOffset);
    }

    float tm  = planeDist*TIME*speed;

    vec3 ro   = offset(tm);
    vec3 dro  = doffset(tm);
    vec3 ddro = ddoffset(tm);

    vec3 ww = normalize(dro);
    vec3 uu = normalize(cross(U.xyx+ddro, ww));
    vec3 vv = cross(ww, uu);
    
    vec3 col = color(ww, uu, vv, ro, p);
    col = aces_approx(col);
    col = sqrt(col);
    gl_FragColor = vec4(col, 1);
}
</script>

<canvas id="starryPlanes"></canvas>

<script>
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('starryPlanes')});
renderer.setSize(window.innerWidth, window.innerHeight);

const geometry = new THREE.PlaneGeometry(2, 2);
const uniforms = {
    iTime: { value: 0 },
    iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    speed: { value: 1.0 },
    rotation: { value: 1.5 },
    colorCycleSpeed: { value: 0.8 },
    colorIntensity: { value: 0.2 },
    enableTeleidoscope: { value: false },
    zoom: { value: 1.0 },
    teleidoscopeSides: { value: 10 },
    teleidoscopeRotationSpeed: { value: -1.5 },
    shapeType: { value: 7 }, // Enneagram
    edgeThickness: { value: 0.313 },
    starEdgeLength: { value: -0.52 },
    starEdgeAngle: { value: -0.6 },
    distortionAmount: { value: 0.1 },
    distortionSpeed: { value: 2.0 },
    paletteColor1: { value: new THREE.Color(0x808080) },
    paletteColor2: { value: new THREE.Color(0x808080) },
    paletteColor3: { value: new THREE.Color(0xffffff) },
    paletteColor4: { value: new THREE.Color(0x436a8e) }
};

const colorGroups = {
    group1: {
        color1: "#FF0000",
        color2: "#00FFFF",
        color3: "#FFFF00",
        color4: "#0000FF"
    },
    group2: {
        color1: "#FF6B35",
        color2: "#004E89",
        color3: "#EFEFD0",
        color4: "#3A0CA3"
    },
    group3: {
        color1: "#FF00FF",
        color2: "#00FF00",
        color3: "#FFFF00",
        color4: "#0000FF"
    },
    group4: {
        color1: "#1A5E1F",
        color2: "#FF4D6D",
        color3: "#FFF75E",
        color4: "#7209B7"
    },
    group5: {
        color1: "#FF8C00",
        color2: "#4B0082",
        color3: "#00CED1",
        color4: "#FF1493"
    },
    group6: {
        color1: "#8B008B",
        color2: "#00FF7F",
        color3: "#FF4500",
        color4: "#1E90FF"
    },
    group7: {
        color1: "#FF1493",
        color2: "#00BFFF",
        color3: "#FFFF00",
        color4: "#32CD32"
    },
    group8: {
        color1: "#8A2BE2",
        color2: "#FF7F50",
        color3: "#00FA9A",
        color4: "#DC143C"
    }
};

const material = new THREE.ShaderMaterial({
    uniforms: uniforms,
    vertexShader: document.getElementById('vertexShader').textContent,
    fragmentShader: document.getElementById('fragmentShader').textContent
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

let randomizeInterval;

function updateColorGroup() {
    const group = document.getElementById('colorGroup').value;
    if (group === 'custom') {
        document.getElementById('customColorInputs').style.display = 'block';
        updateCustomColors();
    } else {
        document.getElementById('customColorInputs').style.display = 'none';
        if (colorGroups[group]) {
            const colors = colorGroups[group];
            updateColors(colors);
        }
    }
    console.log('Color Group updated:', group);
}

function updateCustomColors() {
    const colors = {
        color1: document.getElementById('customColor1').value,
        color2: document.getElementById('customColor2').value,
        color3: document.getElementById('customColor3').value,
        color4: document.getElementById('customColor4').value
    };
    updateColors(colors);
}

function updateColors(colors) {
    uniforms.paletteColor1.value.setStyle(colors.color1);
    uniforms.paletteColor2.value.setStyle(colors.color2);
    uniforms.paletteColor3.value.setStyle(colors.color3);
    uniforms.paletteColor4.value.setStyle(colors.color4);
}

function randomizeColors() {
    const randomColor = () => '#' + Math.floor(Math.random()*16777215).toString(16);
    const colors = {
        color1: randomColor(),
        color2: randomColor(),
        color3: randomColor(),
        color4: randomColor()
    };
    updateColors(colors);
}

function updateRandomizeColors() {
    const shouldRandomize = document.getElementById('randomizeColors').checked;
    const randomizeTime = document.getElementById('randomizeTime').value * 1000; // Convert to milliseconds
    
    clearInterval(randomizeInterval);
    
    if (shouldRandomize) {
        randomizeColors();
        randomizeInterval = setInterval(randomizeColors, randomizeTime);
    }
}

function updateRandomizeTime() {
    const value = document.getElementById('randomizeTime').value;
    document.getElementById('randomizeTimeValue').textContent = value;
    updateRandomizeColors();
}

// Add event listeners
document.getElementById('colorGroup').addEventListener('change', updateColorGroup);
document.getElementById('customColor1').addEventListener('input', updateCustomColors);
document.getElementById('customColor2').addEventListener('input', updateCustomColors);
document.getElementById('customColor3').addEventListener('input', updateCustomColors);
document.getElementById('customColor4').addEventListener('input', updateCustomColors);
document.getElementById('randomizeColors').addEventListener('change', updateRandomizeColors);
document.getElementById('randomizeTime').addEventListener('input', updateRandomizeTime);
document.getElementById('shapeSelect').addEventListener('change', updateShapeType);

// Add this function to update the shape type
function updateShapeType() {
    const shapeSelect = document.getElementById('shapeSelect');
    const shapeValue = shapeSelect.value;
    let shapeType;
    switch (shapeValue) {
        case 'circle': shapeType = 0; break;
        case 'square': shapeType = 1; break;
        case 'triangle': shapeType = 2; break;
        case 'pentagram': shapeType = 3; break;
        case 'heptagram': shapeType = 5; break;
        case 'octagram': shapeType = 6; break;
        case 'enneagram': shapeType = 7; break;
        case 'decagram': shapeType = 8; break;
        case 'hendecagram': shapeType = 9; break;
        case 'dodecagram': shapeType = 10; break;
        default: shapeType = 0;
    }
    uniforms.shapeType.value = shapeType;
    console.log('Shape Type updated:', shapeType);
}

// Initialize
updateColorGroup();
document.getElementById('colorGroup').value = 'group1'; // Vibrant Red-Blue
updateRandomizeColors();
document.getElementById('randomizeColors').checked = true;
document.getElementById('randomizeTime').value = 15;
updateRandomizeTime();
document.getElementById('speed').value = 1; 
document.getElementById('rotation').value = 1.5; 
document.getElementById('colorCycleSpeed').value = 0.8; 
document.getElementById('colorIntensity').value = 0.2; 
document.getElementById('enableTeleidoscope').checked = false; 
document.getElementById('teleidoscopeSides').value = 10; 
document.getElementById('teleidoscopeRotationSpeed').value = -1.5; 
document.getElementById('edgeThickness').value = 0.313; 
document.getElementById('starEdgeLength').value = -0.52; 
document.getElementById('starEdgeAngle').value = -0.6; 
document.getElementById('distortionAmount').value = 0.1; 
document.getElementById('distortionSpeed').value = 2; 
updateShapeType();

// Make sure to call these functions to update the uniforms
updateSpeed();
updateRotation();
updateColorCycleSpeed();
updateColorIntensity();
updateEnableTeleidoscope();
updateTeleidoscopeSides();
updateTeleidoscopeRotationSpeed();
updateEdgeThickness();
updateStarEdgeLength();
updateStarEdgeAngle();
updateDistortionAmount();
updateDistortionSpeed();

function animate(time) {
    uniforms.iTime.value = time / 1000;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

window.addEventListener('resize', function() {
    const width = window.innerWidth;
    const height = window.innerHeight;
    renderer.setSize(width, height);
    uniforms.iResolution.value.set(width, height);
});

requestAnimationFrame(animate);

document.getElementById('speed').addEventListener('input', updateSpeed);
document.getElementById('rotation').addEventListener('input', updateRotation);
document.getElementById('colorCycleSpeed').addEventListener('input', updateColorCycleSpeed);
document.getElementById('colorIntensity').addEventListener('input', updateColorIntensity);
document.getElementById('enableTeleidoscope').addEventListener('change', updateEnableTeleidoscope);
document.getElementById('zoom').addEventListener('input', updateZoom);
document.getElementById('teleidoscopeSides').addEventListener('input', updateTeleidoscopeSides);
document.getElementById('teleidoscopeRotationSpeed').addEventListener('input', updateTeleidoscopeRotationSpeed);
document.getElementById('edgeThickness').addEventListener('input', updateEdgeThickness);
document.getElementById('starEdgeLength').addEventListener('input', updateStarEdgeLength);
document.getElementById('starEdgeAngle').addEventListener('input', updateStarEdgeAngle);
document.getElementById('distortionAmount').addEventListener('input', updateDistortionAmount);
document.getElementById('distortionSpeed').addEventListener('input', updateDistortionSpeed);

function updateSpeed() {
    const value = document.getElementById('speed').value;
    uniforms.speed.value = parseFloat(value);
    document.getElementById('speedValue').textContent = value;
    console.log('Speed updated:', uniforms.speed.value);
}

function updateRotation() {
    const value = document.getElementById('rotation').value;
    uniforms.rotation.value = parseFloat(value);
    document.getElementById('rotationValue').textContent = value;
    console.log('Rotation updated:', uniforms.rotation.value);
}

function updateColorCycleSpeed() {
    const value = document.getElementById('colorCycleSpeed').value;
    uniforms.colorCycleSpeed.value = parseFloat(value) * 0.1;
    document.getElementById('colorCycleSpeedValue').textContent = value;
    console.log('Color Cycle Speed updated:', uniforms.colorCycleSpeed.value);
}

function updateColorIntensity() {
    const value = document.getElementById('colorIntensity').value;

    document.getElementById('colorIntensityValue').textContent = value;
    console.log('Color Intensity updated:', uniforms.colorIntensity.value);
}

function updateEnableTeleidoscope() {
    uniforms.enableTeleidoscope.value = document.getElementById('enableTeleidoscope').checked;
    console.log('Enable Teleidoscope updated:', uniforms.enableTeleidoscope.value);
}

function updateZoom() {
    const value = document.getElementById('zoom').value;
    uniforms.zoom.value = parseFloat(value);
    document.getElementById('zoomValue').textContent = value;
    console.log('Zoom updated:', uniforms.zoom.value);
}

function updateTeleidoscopeSides() {
    const value = document.getElementById('teleidoscopeSides').value;
    uniforms.teleidoscopeSides.value = parseInt(value);
    document.getElementById('teleidoscopeSidesValue').textContent = value;
    console.log('Teleidoscope Sides updated:', uniforms.teleidoscopeSides.value);
}

function updateTeleidoscopeRotationSpeed() {
    const value = document.getElementById('teleidoscopeRotationSpeed').value;
    uniforms.teleidoscopeRotationSpeed.value = parseFloat(value);
    document.getElementById('teleidoscopeRotationSpeedValue').textContent = value;
    console.log('Teleidoscope Rotation Speed updated:', uniforms.teleidoscopeRotationSpeed.value);
}

function updateEdgeThickness() {
    const value = document.getElementById('edgeThickness').value;
    uniforms.edgeThickness.value = parseFloat(value);
    document.getElementById('edgeThicknessValue').textContent = value;
    console.log('Edge Thickness updated:', uniforms.edgeThickness.value);
}

function updateStarEdgeLength() {
    const value = document.getElementById('starEdgeLength').value;
    uniforms.starEdgeLength.value = parseFloat(value);
    document.getElementById('starEdgeLengthValue').textContent = value;
    console.log('Star Edge Length updated:', uniforms.starEdgeLength.value);
}

function updateStarEdgeAngle() {
    const value = document.getElementById('starEdgeAngle').value;
    uniforms.starEdgeAngle.value = parseFloat(value);
    document.getElementById('starEdgeAngleValue').textContent = value;
    console.log('Star Edge Angle updated:', uniforms.starEdgeAngle.value);

function updateDistortionAmount() {
    const value = document.getElementById('distortionAmount').value;
    uniforms.distortionAmount.value = parseFloat(value);
    document.getElementById('distortionAmountValue').textContent = value;
}

function updateDistortionSpeed() {
    const value = document.getElementById('distortionSpeed').value;
    uniforms.distortionSpeed.value = parseFloat(value);
    document.getElementById('distortionSpeedValue').textContent = value;
}

const settingsPanel = document.getElementById('settingsPanel');
const settingsToggle = document.getElementById('settingsToggle');

settingsToggle.addEventListener('click', () => {
    settingsPanel.classList.toggle('open');
});
</script>
</body></html>
