<html><head><base href="/" />
<style>
  body {
    background-color: #f0f8ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Press Start 2P', cursive;
    padding: 20px;
  }

  .canvas-container {
    margin: 20px;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
  }

  button {
    background: #ff69b4;
    border: none;
    padding: 15px 30px;
    border-radius: 8px;
    color: white;
    font-family: 'Press Start 2P', cursive;
    cursor: pointer;
    margin: 20px;
    box-shadow: 0 4px #ff1493;
    transition: all 0.2s;
  }

  button:hover {
    transform: translateY(2px);
    box-shadow: 0 2px #ff1493;
  }

  canvas {
    border: 4px solid #4a4a4a;
    image-rendering: pixelated;
  }

  h1 {
    color: #ff69b4;
    text-shadow: 2px 2px #ff1493;
    margin-bottom: 30px;
  }

  .bee {
    position: absolute;
    width: 20px;
    height: 20px;
    pointer-events: none;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <h1>Pixel Flower Generator 🌸</h1>
  <div class="canvas-container">
    <canvas id="flowerCanvas" width="600" height="600"></canvas>
  </div>
  <button id="generateBtn">Generate New Flower</button>

<script>
const canvas = document.getElementById('flowerCanvas');
const ctx = canvas.getContext('2d');
const generateBtn = document.getElementById('generateBtn');

let bees = [];
const BEE_COUNT = 5;
let flowerPixels = [];

class Bee {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.speed = 0.3 + Math.random() * 0.7;
        this.angle = Math.random() * Math.PI * 2;
        this.wobble = 0;
        this.size = 12;
    }

    update() {
        this.wobble += 0.05;
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed + Math.sin(this.wobble) * 1;
        
        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
        
        if (Math.random() < 0.01) {
            this.angle += (Math.random() - 0.5) * Math.PI/4;
        }
    }

    draw() {
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.ellipse(this.x + this.size*0.5, this.y, this.size*1.2, this.size*0.8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(this.x - this.size*0.5, this.y, this.size, this.size*0.8, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#000000';
        ctx.fillRect(this.x - this.size*0.2, this.y - this.size*0.7, this.size*0.4, this.size*1.4);
        ctx.fillRect(this.x + this.size*0.4, this.y - this.size*0.7, this.size*0.4, this.size*1.4);

        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.ellipse(this.x - this.size*0.3, this.y - this.size*0.8, 
                    this.size*0.8, this.size*1.2, 
                    Math.PI/4 + Math.sin(this.wobble) * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(this.x + this.size*0.3, this.y - this.size*0.8, 
                    this.size*0.8, this.size*1.2, 
                    -Math.PI/4 + Math.sin(this.wobble + Math.PI) * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;

        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(this.x - this.size*0.8, this.y - this.size*0.2, this.size*0.15, 0, Math.PI * 2);
        ctx.arc(this.x - this.size*0.4, this.y - this.size*0.2, this.size*0.15, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(this.x - this.size*0.8, this.y - this.size*0.3);
        ctx.quadraticCurveTo(
            this.x - this.size*1.2, 
            this.y - this.size*1.2,
            this.x - this.size*1.4, 
            this.y - this.size*0.8
        );
        ctx.moveTo(this.x - this.size*0.4, this.y - this.size*0.3);
        ctx.quadraticCurveTo(
            this.x - this.size*0.8, 
            this.y - this.size*1.2,
            this.x - this.size, 
            this.y - this.size*0.8
        );
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
}

function randomColor() {
    const hue = Math.floor(Math.random() * 360);
    const saturation = 70 + Math.random() * 30;
    const lightness = 40 + Math.random() * 40;
    return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
}

function drawPixel(x, y, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, 3, 3);
    flowerPixels.push({x, y, color});
}

function redrawFlower() {
    for (const pixel of flowerPixels) {
        ctx.fillStyle = pixel.color;
        ctx.fillRect(pixel.x, pixel.y, 3, 3);
    }
}

function generateFlower() {
    flowerPixels = [];
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    
    const petalColor = randomColor();
    const centerColor = randomColor();
    const stemColor = Math.random() > 0.3 ? 'hsl(120, 70%, 40%)' : randomColor(); 
    const petalCount = 3 + Math.floor(Math.random() * 8); 
    const petalSize = 40 + Math.floor(Math.random() * 100); 
    const petalStyle = Math.floor(Math.random() * 4); 
    
    const stemWave = Math.random() * 30;
    for (let y = centerY; y < centerY + 240; y++) {
        const xOffset = Math.sin((y - centerY) / 30) * stemWave;
        for (let x = centerX - 6 + xOffset; x <= centerX + 6 + xOffset; x++) {
            drawPixel(x, y, stemColor);
        }
    }
    
    for (let petal = 0; petal < petalCount; petal++) {
        const angle = (petal * 2 * Math.PI) / petalCount;
        for (let i = 0; i < petalSize; i++) {
            let width;
            switch(petalStyle) {
                case 0:
                    width = i/2;
                    break;
                case 1:
                    width = Math.sqrt(i * (petalSize - i)) / 2;
                    break;
                case 2:
                    width = Math.sin(i / 10) * i/4 + i/4;
                    break;
                case 3:
                    width = Math.sin(i / 15) * i/3 + i/3;
                    break;
            }
            
            for (let j = -width; j <= width; j++) {
                const x = centerX + Math.cos(angle) * i - Math.sin(angle) * j;
                const y = centerY + Math.sin(angle) * i + Math.cos(angle) * j;
                
                if (Math.random() > 0.1) {
                    let colorVariation;
                    if (Math.random() > 0.95) {
                        colorVariation = 'hsl(60, 100%, 80%)';
                    } else {
                        const hueShift = Math.random() * 40 - 20;
                        colorVariation = `hsl(${parseInt(petalColor.split(',')[0].slice(4)) + hueShift}, 
                            ${70 + Math.random() * 30}%, 
                            ${40 + Math.random() * 40}%)`;
                    }
                    drawPixel(x, y, colorVariation);
                }
            }
        }
    }
    
    const centerPattern = Math.floor(Math.random() * 3);
    const centerSize = 15 + Math.floor(Math.random() * 20);
    
    for (let i = -centerSize; i <= centerSize; i++) {
        for (let j = -centerSize; j <= centerSize; j++) {
            if (i*i + j*j <= centerSize * centerSize) {
                const x = centerX + i;
                const y = centerY + j;
                
                let shouldDraw = true;
                switch(centerPattern) {
                    case 0:
                        break;
                    case 1:
                        shouldDraw = Math.sin(Math.atan2(j, i) + Math.sqrt(i*i + j*j)/5) > 0;
                        break;
                    case 2:
                        shouldDraw = (Math.floor(i/3) + Math.floor(j/3)) % 2 === 0;
                        break;
                }
                
                if (shouldDraw) {
                    const colorVariation = `hsl(${parseInt(centerColor.split(',')[0].slice(4))}, 
                        ${70 + Math.random() * 30}%, 
                        ${40 + Math.random() * 40}%)`;
                    drawPixel(x, y, colorVariation);
                }
            }
        }
    }
    
    bees = Array(BEE_COUNT).fill(null).map(() => new Bee());
}

function animate() {
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    redrawFlower();
    
    bees.forEach(bee => {
        bee.update();
        bee.draw();
    });
    
    requestAnimationFrame(animate);
}

generateBtn.addEventListener('click', generateFlower);
generateFlower();
animate();
</script>
</body></html>
