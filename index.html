<html><head><base href="https://quantumverse.com/explore">
<title>QuantumVerse Explorer</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        font-family: 'Arial', sans-serif;
    }
    #quantum-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    #ui-overlay {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #fff;
        font-size: 14px;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
</style>
</head>
<body>
<canvas id="quantum-canvas"></canvas>
<div id="ui-overlay">
    <div>Dimension: <span id="current-dimension">Quantum Realm</span></div>
    <div>Stability: <span id="stability">87%</span></div>
    <div>Quantum Flux: <span id="quantum-flux">High</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

<script>
class QuantumVerseEngine {
    constructor() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({canvas: document.getElementById('quantum-canvas'), antialias: true});
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);

        this.clock = new THREE.Clock();
        this.timeScale = 1;

        this.initScene();
        this.animate();

        window.addEventListener('resize', () => this.onWindowResize(), false);
    }

    initScene() {
        // Non-Euclidean Landscape
        const landscape = new THREE.Group();
        for (let i = 0; i < 50; i++) {
            const geometry = new THREE.TorusKnotGeometry(20 + Math.random() * 10, 3, 100, 16);
            const material = new THREE.MeshPhongMaterial({
                color: new THREE.Color(Math.random(), Math.random(), Math.random()),
                shininess: 100,
                transparent: true,
                opacity: 0.7
            });
            const torusKnot = new THREE.Mesh(geometry, material);
            torusKnot.position.set(
                Math.random() * 200 - 100,
                Math.random() * 200 - 100,
                Math.random() * 200 - 100
            );
            landscape.add(torusKnot);
        }
        this.scene.add(landscape);
        this.landscape = landscape;

        // Dynamic Curvature
        const planeGeometry = new THREE.PlaneGeometry(1000, 1000, 100, 100);
        const planeMaterial = new THREE.MeshPhongMaterial({
            color: 0x00ffff,
            wireframe: true,
            side: THREE.DoubleSide
        });
        this.dynamicGround = new THREE.Mesh(planeGeometry, planeMaterial);
        this.dynamicGround.rotation.x = -Math.PI / 2;
        this.scene.add(this.dynamicGround);

        // Quantum Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        this.scene.add(ambientLight);

        for (let i = 0; i < 5; i++) {
            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(
                Math.random() * 100 - 50,
                Math.random() * 100 - 50,
                Math.random() * 100 - 50
            );
            this.scene.add(pointLight);
        }

        // Procedurally Generated Objects
        const objectGroup = new THREE.Group();
        for (let i = 0; i < 20; i++) {
            const geometry = new THREE.IcosahedronGeometry(Math.random() * 5 + 1, 0);
            const material = new THREE.MeshPhongMaterial({
                color: new THREE.Color(Math.random(), Math.random(), Math.random()),
                shininess: 30,
                transparent: true,
                opacity: 0.8
            });
            const object = new THREE.Mesh(geometry, material);
            object.position.set(
                Math.random() * 100 - 50,
                Math.random() * 100 - 50,
                Math.random() * 100 - 50
            );
            objectGroup.add(object);
        }
        this.scene.add(objectGroup);
        this.objectGroup = objectGroup;

        this.camera.position.z = 50;
    }

    animate() {
        requestAnimationFrame(() => this.animate());

        const elapsedTime = this.clock.getElapsedTime() * this.timeScale;

        // Animate Non-Euclidean Landscape
        this.landscape.rotation.x = Math.sin(elapsedTime * 0.1) * 0.1;
        this.landscape.rotation.y = Math.cos(elapsedTime * 0.15) * 0.1;

        // Animate Dynamic Curvature
        const vertices = this.dynamicGround.geometry.attributes.position.array;
        for (let i = 0; i < vertices.length; i += 3) {
            vertices[i + 2] = Math.sin(vertices[i] / 20 + elapsedTime) * Math.cos(vertices[i + 1] / 20 + elapsedTime) * 10;
        }
        this.dynamicGround.geometry.attributes.position.needsUpdate = true;

        // Animate Procedurally Generated Objects
        this.objectGroup.children.forEach((object, index) => {
            object.rotation.x = Math.sin(elapsedTime + index) * 2;
            object.rotation.y = Math.cos(elapsedTime + index) * 2;
            object.position.y = Math.sin(elapsedTime * 0.5 + index) * 10;
        });

        // Quantum-Based Transitions
        if (Math.random() < 0.005) {
            this.triggerQuantumTransition();
        }

        this.renderer.render(this.scene, this.camera);
    }

    triggerQuantumTransition() {
        const transitionDuration = 2;
        const originalFov = this.camera.fov;

        gsap.to(this.camera, {
            fov: originalFov * 1.5,
            duration: transitionDuration / 2,
            onUpdate: () => this.camera.updateProjectionMatrix(),
            onComplete: () => {
                this.randomizeScene();
                gsap.to(this.camera, {
                    fov: originalFov,
                    duration: transitionDuration / 2,
                    onUpdate: () => this.camera.updateProjectionMatrix()
                });
            }
        });

        gsap.to(this.scene.background, {
            r: Math.random(),
            g: Math.random(),
            b: Math.random(),
            duration: transitionDuration
        });

        // Update UI
        document.getElementById('current-dimension').textContent = this.getRandomDimensionName();
        document.getElementById('stability').textContent = `${Math.floor(Math.random() * 100)}%`;
        document.getElementById('quantum-flux').textContent = ['Low', 'Medium', 'High'][Math.floor(Math.random() * 3)];
    }

    randomizeScene() {
        this.scene.background = new THREE.Color(Math.random(), Math.random(), Math.random());
        this.timeScale = Math.random() * 2 + 0.5;

        this.objectGroup.children.forEach(object => {
            object.material.color.setRGB(Math.random(), Math.random(), Math.random());
            object.scale.set(
                Math.random() * 2 + 0.5,
                Math.random() * 2 + 0.5,
                Math.random() * 2 + 0.5
            );
        });
    }

    getRandomDimensionName() {
        const adjectives = ['Quantum', 'Fractal', 'Nebulous', 'Ethereal', 'Temporal'];
        const nouns = ['Realm', 'Void', 'Nexus', 'Continuum', 'Labyrinth'];
        return `${adjectives[Math.floor(Math.random() * adjectives.length)]} ${nouns[Math.floor(Math.random() * nouns.length)]}`;
    }

    onWindowResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
    }
}

const quantumVerseEngine = new QuantumVerseEngine();
</script>
</body></html>
