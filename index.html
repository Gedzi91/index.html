<title>自定義動物運勢轉盤</title>
<style>
body {
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    background-color: #f0f8ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.container {
    background-color: white;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    max-width: 800px;
    width: 100%;
    text-align: center;
    position: relative;
}
h1 {
    color: #4a4a4a;
    margin-bottom: 30px;
}
.customize-section, .spinner-section {
    margin-bottom: 30px;
}
.animal-selection {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 15px;
    margin-bottom: 20px;
}
.animal-option {
    font-size: 40px;
    cursor: pointer;
    transition: transform 0.2s;
}
.animal-option:hover {
    transform: scale(1.2);
}
.selected-animals {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}
.selected-animal {
    font-size: 30px;
    background-color: #e6f3ff;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}
button {
    padding: 15px 30px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 18px;
    cursor: pointer;
    transition: background-color 0.3s;
    margin: 10px;
}
button:hover {
    background-color: #45a049;
}
.message {
    margin-top: 20px;
    color: #4a4a4a;
}
.spinner {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    position: relative;
    border: 10px solid #333;
    margin: 0 auto;
}
.slot {
    position: absolute;
    width: 60px;
    height: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
}
.pointer {
    width: 10px;
    height: 150px;
    background-color: red;
    position: absolute;
    top: 0;
    left: calc(50% - 5px);
    transform-origin: bottom center;
    z-index: 10;
}
.speed-control {
    position: absolute;
    bottom: 30px;
    left: 30px;
    display: flex;
    align-items: center;
}
.speed-control input {
    margin: 0 10px;
}
#start {
    position: absolute;
    bottom: -60px;
    left: 50%;
    transform: translateX(-50%);
}
</style>
</head>
<body>
<div class="container">
    <h1>自定義動物運勢轉盤</h1>
    
    <div class="customize-section">
        <div class="animal-selection">
            <div class="animal-option">🐶</div>
            <div class="animal-option">🐱</div>
            <div class="animal-option">🐭</div>
            <div class="animal-option">🐰</div>
            <div class="animal-option">🦊</div>
            <div class="animal-option">🐻</div>
            <div class="animal-option">🐼</div>
            <div class="animal-option">🐨</div>
            <div class="animal-option">🐯</div>
            <div class="animal-option">🦁</div>
            <div class="animal-option">🐸</div>
            <div class="animal-option">🐒</div>
            <div class="animal-option">🦉</div>
            <div class="animal-option">🦄</div>
            <div class="animal-option">🐷</div>
            <div class="animal-option">🐙</div>
            <div class="animal-option">🦋</div>
            <div class="animal-option">🐢</div>
        </div>
        
        <div class="selected-animals"></div>
        
        <button id="save-customization">儲存自定義設置</button>
        
        <p class="message">點擊動物圖示來新增或移除轉盤上的動物。您必須選擇剛好12種動物。</p>
    </div>
    
    <div class="spinner-section" style="display:none;">
        <div class="spinner">
            <div class="pointer"></div>
        </div>
        <button id="start">開始</button>
        <div class="speed-control">
            <span>速度：</span>
            <input type="range" id="speed" min="1" max="5" value="3" step="1">
            <span id="speed-value">3</span>
        </div>
        <button id="back-to-customize">返回自定義</button>
        <p class="result"></p>
    </div>
</div>

<script>
const animalOptions = document.querySelectorAll('.animal-option');
const selectedAnimals = document.querySelector('.selected-animals');
const saveButton = document.getElementById('save-customization');
const message = document.querySelector('.message');
const customizeSection = document.querySelector('.customize-section');
const spinnerSection = document.querySelector('.spinner-section');
const spinner = document.querySelector('.spinner');
const startButton = document.getElementById('start');
const backButton = document.getElementById('back-to-customize');
const result = document.querySelector('.result');
const speedControl = document.getElementById('speed');
const speedValue = document.getElementById('speed-value');

let currentSelection = ['🐶', '🐱', '🐭', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐸', '🐒'];

function updateSelectedAnimals() {
    selectedAnimals.innerHTML = '';
    currentSelection.forEach(animal => {
        const div = document.createElement('div');
        div.className = 'selected-animal';
        div.textContent = animal;
        div.addEventListener('click', () => removeAnimal(animal));
        selectedAnimals.appendChild(div);
    });
}

function addAnimal(animal) {
    if (currentSelection.length < 12 && !currentSelection.includes(animal)) {
        currentSelection.push(animal);
        updateSelectedAnimals();
    }
}

function removeAnimal(animal) {
    const index = currentSelection.indexOf(animal);
    if (index > -1) {
        currentSelection.splice(index, 1);
        updateSelectedAnimals();
    }
}

animalOptions.forEach(option => {
    option.addEventListener('click', () => addAnimal(option.textContent));
});

saveButton.addEventListener('click', () => {
    if (currentSelection.length === 12) {
        message.textContent = '自定義設置儲存成功！轉盤準備就緒。';
        message.style.color = 'green';
        customizeSection.style.display = 'none';
        spinnerSection.style.display = 'block';
        updateSpinner();
    } else {
        message.textContent = '請在儲存前選擇剛好12種動物。';
        message.style.color = 'red';
    }
});

function updateSpinner() {
    spinner.innerHTML = '<div class="pointer"></div>';
    currentSelection.forEach((animal, index) => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.textContent = animal;
        const angle = index * 30;
        const radius = 120;
        const x = Math.cos(angle * Math.PI / 180) * radius + 150;
        const y = Math.sin(angle * Math.PI / 180) * radius + 150;
        slot.style.left = `${x - 30}px`;
        slot.style.top = `${y - 30}px`;
        spinner.appendChild(slot);
    });
}

startButton.addEventListener('click', () => {
    const speed = parseInt(speedControl.value);
    const duration = 6 - speed; // 速度越快，持續時間越短
    const rotations = 5 + Math.random() * 5;
    const totalRotation = rotations * 360 + Math.floor(Math.random() * 360);
    
    const pointer = spinner.querySelector('.pointer');
    pointer.style.transition = `transform ${duration}s cubic-bezier(0.25, 0.1, 0.25, 1)`;
    pointer.style.transform = `rotate(${totalRotation}deg)`;
    
    setTimeout(() => {
        const index = Math.floor(((360 - (totalRotation % 360)) % 360) / 30);
        result.textContent = `您的幸運動物是：${currentSelection[index]}`;
    }, duration * 1000);
});

backButton.addEventListener('click', () => {
    customizeSection.style.display = 'block';
    spinnerSection.style.display = 'none';
    const pointer = spinner.querySelector('.pointer');
    pointer.style.transition = 'none';
    pointer.style.transform = 'rotate(0deg)';
    result.textContent = '';
});

speedControl.addEventListener('input', () => {
    speedValue.textContent = speedControl.value;
});

updateSelectedAnimals();
</script>
</body></html>
