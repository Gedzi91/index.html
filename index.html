<html><head><base href="." />
<meta charset="UTF-8">
<title>Cookin' with Grandmaw</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
<style>
body { margin: 0; font-family: 'Comic Sans MS', cursive; }
canvas { display: block; }
.menu {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 242, 230, 0.9);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
}
.menu h1 {
    color: #8B4513;
    font-size: 3em;
    margin-bottom: 20px;
}
.menu button {
    background: #8B4513;
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 1.2em;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Comic Sans MS', cursive;
    transition: transform 0.2s;
}
.menu button:hover {
    transform: scale(1.1);
}
.game-ui {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 242, 230, 0.9);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}
.grandmaw-text {
    font-size: 1.2em;
    color: #8B4513;
}
#mixingIndicator {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 20px;
    background: #ddd;
    border-radius: 10px;
    display: none;
}
#mixingIndicator div {
    width: 0%;
    height: 100%;
    background: #8B4513;
    border-radius: 10px;
    transition: width 0.3s;
}
</style>
</head>
<body>

<div class="menu" id="mainMenu">
    <h1>Cookin' with Grandmaw!</h1>
    <button onclick="startGame()">Start Cookin'!</button>
</div>

<div class="game-ui" id="gameUI">
    <p class="grandmaw-text">"Alright sweetie, let's make a pie! First, open the carton of eggs."</p>
</div>

<div id="mixingIndicator">
    <div></div>
</div>

<script>
let scene, camera, renderer, counter, eggCarton, world, eggs = [], bowl, flowerBox, particles = [];
let bowlContents = [];
let flourLevel = 0;
let gameStarted = false;
let isDragging = false;
let draggedObject = null;
let dragPlane = new THREE.Plane();
let dragPoint = new THREE.Vector3();
let cartonOpen = false;
let eggsInBowl = 0;
let flowerPhase = false;
let milkPhase = false; // Added milkPhase
let isPouring = false;
let mousePosition = new THREE.Vector2();
let raycaster = new THREE.Raycaster();
let zDistance = 0;

let milkContainer, stirrer, sugarContainer;
let liquidParticles = [];
let mixingProgress = 0;
let isMixing = false;
let mixingStartTime = null;
let isStirring = false;
let ingredients = {
  eggs: false,
  flour: false,
  milk: false,
  sugar: false
};
let milkLevel = 0;

let camera3D, controls;
let inOvenRoom = false;
let playerVelocity = new THREE.Vector3();
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;

function init() {
    // Scene setup
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0xFFF0E0);
    document.body.appendChild(renderer.domElement);

    // Physics world setup
    world = new CANNON.World();
    world.gravity.set(0, -9.82, 0);
    world.broadphase = new CANNON.NaiveBroadphase();
    world.solver.iterations = 10;

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.9);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    // Counter
    const counterGeometry = new THREE.BoxGeometry(15, 0.5, 8);
    const counterMaterial = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
    counter = new THREE.Mesh(counterGeometry, counterMaterial);
    scene.add(counter);

    const counterBody = new CANNON.Body({
        mass: 0,
        shape: new CANNON.Box(new CANNON.Vec3(7.5, 0.25, 4)),
    });
    world.addBody(counterBody);

    // Egg carton
    const cartonGeometry = new THREE.BoxGeometry(3, 0.8, 1.2);
    const cartonMaterial = new THREE.MeshPhongMaterial({ color: 0xE6E6E6 });
    eggCarton = new THREE.Mesh(cartonGeometry, cartonMaterial);
    eggCarton.position.set(-2, 0.65, 0);
    scene.add(eggCarton);

    // Bowl
    createBowl();
    
    // Flower box (initially hidden)
    createFlowerBox();

    // Create milk and stirrer
    createMilkAndStirrer();

    camera.position.set(0, 4, 6);
    camera.lookAt(0, 0, 0);

    setupEventListeners();
    animate();
}

function createFlowerBox() {
    const boxGeometry = new THREE.BoxGeometry(1.5, 2, 1);
    const boxMaterial = new THREE.MeshPhongMaterial({ color: 0xFFFFFF });
    
    // Create texture from the happy flower image
    const texture = new THREE.TextureLoader().load('/costume1 (7).png');
    const labelGeometry = new THREE.PlaneGeometry(1, 1);
    const labelMaterial = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
    const label = new THREE.Mesh(labelGeometry, labelMaterial);
    
    flowerBox = new THREE.Group();
    const boxMesh = new THREE.Mesh(boxGeometry, boxMaterial);
    flowerBox.add(boxMesh);
    
    label.position.z = 0.51;
    flowerBox.add(label);
    
    flowerBox.position.set(-4, 1.5, 0);
    flowerBox.visible = false;
    scene.add(flowerBox);
    
    // Add physics body
    const boxBody = new CANNON.Body({
        mass: 1,
        shape: new CANNON.Box(new CANNON.Vec3(0.75, 1, 0.5))
    });
    boxBody.position.copy(flowerBox.position);
    world.addBody(boxBody);
    
    flowerBox.body = boxBody; // Store reference to physics body
}

function createMilkAndStirrer() {
    // Create milk carton
    const milkGeometry = new THREE.BoxGeometry(1, 2, 1);
    const milkMaterial = new THREE.MeshPhongMaterial({ color: 0xFFFFFF });
    milkContainer = new THREE.Mesh(milkGeometry, milkMaterial);
    milkContainer.position.set(-6, 1.5, 0);
    scene.add(milkContainer);

    // Physics for milk carton
    const milkBody = new CANNON.Body({
        mass: 1,
        shape: new CANNON.Box(new CANNON.Vec3(0.5, 1, 0.5)),
        material: new CANNON.Material({
            friction: 0.3,
            restitution: 0.2
        })
    });
    milkBody.position.copy(milkContainer.position);
    world.addBody(milkBody);
    milkContainer.body = milkBody;

    // Create stirrer
    const stirrerGeometry = new THREE.CylinderGeometry(0.1, 0.1, 2.5);
    const stirrerMaterial = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
    stirrer = new THREE.Mesh(stirrerGeometry, stirrerMaterial);
    stirrer.position.set(-8, 1.5, 0);
    stirrer.rotation.x = Math.PI / 2;
    scene.add(stirrer);

    // Physics for stirrer
    const stirrerBody = new CANNON.Body({
        mass: 0.5,
        shape: new CANNON.Cylinder(0.1, 0.1, 2.5, 8),
        material: new CANNON.Material({
            friction: 0.3,
            restitution: 0.2
        })
    });
    stirrerBody.position.copy(stirrer.position);
    world.addBody(stirrerBody);
    stirrer.body = stirrerBody;

    // Create sugar container
    const sugarGeometry = new THREE.CylinderGeometry(0.5, 0.5, 1.5);
    const sugarMaterial = new THREE.MeshPhongMaterial({ color: 0xE0E0E0 });
    sugarContainer = new THREE.Mesh(sugarGeometry, sugarMaterial);
    sugarContainer.position.set(-10, 1.5, 0);
    scene.add(sugarContainer);

    // Physics for sugar container
    const sugarBody = new CANNON.Body({
        mass: 1,
        shape: new CANNON.Cylinder(0.5, 0.5, 1.5, 8)
    });
    sugarBody.position.copy(sugarContainer.position);
    world.addBody(sugarBody);
    sugarContainer.body = sugarBody;

    // Initially hide them
    milkContainer.visible = false;
    stirrer.visible = false;
    sugarContainer.visible = false; // Keep sugar hidden initially
}

function createParticle() {
    const particle = new THREE.Mesh(
        new THREE.SphereGeometry(0.03, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xFFFFFF })
    );
    
    // Get position from flour box's current position
    particle.position.copy(flowerBox.position);
    particle.position.y -= 0.5;
    
    // Add some random spread to the particles
    particle.velocity = new THREE.Vector3(
        (Math.random() - 0.5) * 0.1,
        -0.2 - Math.random() * 0.3, // Faster downward velocity
        (Math.random() - 0.5) * 0.1
    );
    
    scene.add(particle);
    particles.push(particle);
}

function createLiquidParticle(isWhite = true) {
    const particle = new THREE.Mesh(
        new THREE.SphereGeometry(0.05, 8, 8),
        new THREE.MeshPhongMaterial({ 
            color: isWhite ? 0xFFFFFF : 0xF5F5DC,
            transparent: true,
            opacity: 0.8 
        })
    );
    
    particle.position.copy(milkContainer.position);
    particle.position.y -= 1;
    
    particle.velocity = new THREE.Vector3(
        (Math.random() - 0.5) * 0.1,
        -0.3,
        (Math.random() - 0.5) * 0.1
    );
    
    scene.add(particle);
    liquidParticles.push(particle);
}

function updateParticles() {
    for(let i = particles.length - 1; i >= 0; i--) {
        const particle = particles[i];
        particle.position.add(particle.velocity);
        
        // Check if particle is in bowl
        const distToBowl = particle.position.distanceTo(bowl.position);
        if(distToBowl < 1) {
            scene.remove(particle);
            particles.splice(i, 1);
            flourLevel += 0.001;
            updateFlourInBowl();
            continue;
        }
        
        // Remove particles that fall too low
        if(particle.position.y < 0) {
            scene.remove(particle);
            particles.splice(i, 1);
        }
    }

    // Update liquid particles
    for(let i = liquidParticles.length - 1; i >= 0; i--) {
        const particle = liquidParticles[i];
        particle.position.add(particle.velocity);
        
        const distToBowl = particle.position.distanceTo(bowl.position);
        if(distToBowl < 1) {
            scene.remove(particle);
            liquidParticles.splice(i, 1);
            milkLevel += 0.001;
            updateBowlContents();
            continue;
        }
        
        // Remove particles that fall too low
        if(particle.position.y < 0) {
            scene.remove(particle);
            liquidParticles.splice(i, 1);
        }
    }
}

// Update the updateFlourInBowl function to check if enough flour is added
function updateFlourInBowl() {
    const existingFlour = scene.children.find(child => child.name === 'flourMesh');
    if (existingFlour) {
        scene.remove(existingFlour);
    }

    if (flourLevel > 0) {
        const flourGeometry = new THREE.CylinderGeometry(1.3, 1.3, flourLevel, 32);
        const flourMaterial = new THREE.MeshPhongMaterial({
            color: 0xFFFFFF,
            transparent: true,
            opacity: 0.9
        });
        const flourMesh = new THREE.Mesh(flourGeometry, flourMaterial);
        flourMesh.name = 'flourMesh';
        flourMesh.position.copy(bowl.position);
        flourMesh.position.y = 0.5 + (flourLevel / 2);
        scene.add(flourMesh);

        // Check if enough flour has been added
        if (flourLevel >= 0.5 && flowerPhase) {  // Adjust threshold as needed
            completedFlourPhase();
        }
    }
}

function updateBowlContents() {
    const existingMilk = scene.children.find(child => child.name === 'milkMesh');
    if (existingMilk) {
        scene.remove(existingMilk);
    }

    if (milkLevel > 0) {
        const milkGeometry = new THREE.CylinderGeometry(1.3, 1.3, milkLevel, 32);
        const milkMaterial = new THREE.MeshPhongMaterial({
            color: 0xFFFAFA,
            transparent: true,
            opacity: 0.7
        });
        const milkMesh = new THREE.Mesh(milkGeometry, milkMaterial);
        milkMesh.name = 'milkMesh';
        milkMesh.position.copy(bowl.position);
        milkMesh.position.y = 0.5 + flourLevel + (milkLevel / 2); // Stack on top of flour
        scene.add(milkMesh);

        // Check if enough milk has been added
        if (milkLevel >= 0.5 && milkPhase) {  // Adjust threshold as needed
            completeMilkPhase();
        }
    }
}

function completeMilkPhase() {
    milkPhase = false;
    document.querySelector('.grandmaw-text').textContent = 
        "Time to mix it all together! Use the stirrer to mix for 5 seconds.";
    isStirring = false;
    mixingStartTime = null;
}

function createBowl() {
    const bowlGroup = new THREE.Group();
    
    const points = [];
    for (let i = 0; i < 10; i++) {
        const angle = (i / 9) * Math.PI / 2;
        points.push(new THREE.Vector2(
            Math.sin(angle) * 1.5,
            Math.cos(angle) * 1
        ));
    }
    const bowlGeometry = new THREE.LatheGeometry(points, 32);
    const bowlMaterial = new THREE.MeshPhongMaterial({ 
        color: 0xD2B48C,
        shininess: 50
    });
    const bowlMesh = new THREE.Mesh(bowlGeometry, bowlMaterial);
    bowlMesh.rotation.x = Math.PI;
    bowlGroup.add(bowlMesh);

    const rimGeometry = new THREE.TorusGeometry(1.5, 0.08, 16, 100);
    const rimMesh = new THREE.Mesh(rimGeometry, bowlMaterial);
    rimMesh.rotation.x = Math.PI / 2;
    rimMesh.position.y = 0;
    bowlGroup.add(rimMesh);

    bowlGroup.position.set(2, 1.2, 0);
    scene.add(bowlGroup);
    bowl = bowlGroup;

    const bowlBody = new CANNON.Body({
        mass: 0,
        shape: new CANNON.Sphere(1.5),
        position: new CANNON.Vec3(2, 1.2, 0)
    });
    world.addBody(bowlBody);
}

function checkEggInBowl(egg) {
    const distToBowl = egg.mesh.position.distanceTo(bowl.position);
    if(distToBowl < 1.5 && !egg.inBowl) {
        egg.inBowl = true;
        eggsInBowl++;
        
        // Create cracking effect
        crackEgg(egg);
        
        if(eggsInBowl === 3) {
            setTimeout(() => {
                document.querySelector('.grandmaw-text').textContent = 
                    "Ok, now pour the flour!";
                startFlourPhase();
            }, 1000);
        }
    }
}

function crackEgg(egg) {
    if (egg.cracked) return;
    
    egg.cracked = true;
    
    // Create egg shell pieces
    const shellGeometry = new THREE.SphereGeometry(0.3, 8, 8);
    const shellMaterial = new THREE.MeshPhongMaterial({ 
        color: 0xFFFAF0,
        side: THREE.DoubleSide
    });
    
    // Split into top and bottom pieces
    const topShell = new THREE.Mesh(shellGeometry, shellMaterial);
    const bottomShell = new THREE.Mesh(shellGeometry, shellMaterial);
    
    topShell.scale.set(0.5, 0.3, 0.5);
    bottomShell.scale.set(0.5, 0.3, 0.5);
    
    topShell.position.copy(egg.mesh.position);
    bottomShell.position.copy(egg.mesh.position);
    
    scene.add(topShell);
    scene.add(bottomShell);
    
    // Animate shell pieces flying apart
    const animateShells = () => {
        topShell.position.y += 0.1;
        topShell.position.x += 0.05;
        topShell.rotation.z += 0.1;
        
        bottomShell.position.y += 0.1;
        bottomShell.position.x -= 0.05;
        bottomShell.rotation.z -= 0.1;
        
        if (topShell.position.y < egg.mesh.position.y + 2) {
            requestAnimationFrame(animateShells);
        } else {
            scene.remove(topShell);
            scene.remove(bottomShell);
        }
    };
    
    animateShells();
    
    // Create yolk that stays in bowl
    const yolkGeometry = new THREE.SphereGeometry(0.3, 32, 32);
    const yolkMaterial = new THREE.MeshPhongMaterial({ 
        color: 0xFFD700,
        transparent: true,
        opacity: 0.9
    });
    const yolk = new THREE.Mesh(yolkGeometry, yolkMaterial);
    yolk.position.copy(bowl.position);
    yolk.position.y = 0.5 + (bowlContents.length * 0.1); // Stack ingredients
    yolk.scale.set(0.8, 0.4, 0.8);
    scene.add(yolk);
    bowlContents.push(yolk);

    // Remove the original egg
    scene.remove(egg.mesh);
    world.remove(egg.body);
}

function createEggs() {
    for(let i = 0; i < 3; i++) {
        const eggGeometry = new THREE.SphereGeometry(0.3, 32, 32);
        const eggMaterial = new THREE.MeshPhongMaterial({ 
            color: 0xFFFAF0,
            specular: 0x222222,
            shininess: 30
        });
        const egg = new THREE.Mesh(eggGeometry, eggMaterial);
        
        egg.position.set(-2.5 + i * 0.7, 1, 0);
        egg.scale.y = 1.3;
        scene.add(egg);

        const eggBody = new CANNON.Body({
            mass: 1,
            shape: new CANNON.Sphere(0.3),
        });
        eggBody.position.copy(egg.position);
        world.addBody(eggBody);

        eggs.push({ 
            mesh: egg, 
            body: eggBody, 
            inBowl: false,
            cracked: false
        });
    }
}

function startFlourPhase() {
    flowerPhase = true;
    flowerBox.visible = true;
}

function completedFlourPhase() {
    flowerPhase = false; // End flour phase
    milkPhase = true;  // Start milk phase
    document.querySelector('.grandmaw-text').textContent = 
        "Now pour in the milk, sugar!";
    milkContainer.visible = true;
    stirrer.visible = true;
    sugarContainer.visible = false; // Keep sugar hidden until mixing is done
}

function handleMixing() {
    if (!isStirring) return;
    
    if (!mixingStartTime) {
        mixingStartTime = Date.now();
        document.getElementById('mixingIndicator').style.display = 'block';
    }
    
    const elapsed = (Date.now() - mixingStartTime) / 1000;
    const progress = Math.min(elapsed / 5, 1);
    
    document.querySelector('#mixingIndicator div').style.width = 
        `${progress * 100}%`;
    
    if (progress >= 1 && !ingredients.sugar) {
        completeStirring();
    }
    
    // Animate bowl contents
    bowlContents.forEach(content => {
        content.rotation.y += 0.1;
        content.position.x = bowl.position.x + Math.sin(Date.now() * 0.005) * 0.2;
        content.position.z = bowl.position.z + Math.cos(Date.now() * 0.005) * 0.2;
    });
}

function completeStirring() {
    isStirring = false;
    document.getElementById('mixingIndicator').style.display = 'none';
    
    // Create oven button
    const ovenButton = document.createElement('button');
    ovenButton.textContent = "Oven";
    ovenButton.style.position = 'fixed';
    ovenButton.style.bottom = '20px';
    ovenButton.style.right = '20px';
    ovenButton.style.padding = '10px 20px';
    ovenButton.style.backgroundColor = '#8B4513';
    ovenButton.style.color = 'white';
    ovenButton.style.border = 'none';
    ovenButton.style.borderRadius = '5px';
    ovenButton.onclick = () => {
        inOvenRoom = true;
        document.body.requestPointerLock();
        createOvenRoom();
        setupFirstPersonControls();
    };
    document.body.appendChild(ovenButton);
}

// Update animate function to include first person movement
function animate() {
    requestAnimationFrame(animate);
    
    if(inOvenRoom) {
        // Handle movement
        const speed = 0.1;
        const direction = new THREE.Vector3();
        
        if(moveForward) direction.z -= 1;
        if(moveBackward) direction.z += 1;
        if(moveLeft) direction.x -= 1;
        if(moveRight) direction.x += 1;
        
        direction.normalize();
        direction.applyEuler(new THREE.Euler(0, camera.rotation.y, 0));
        
        camera.position.add(direction.multiplyScalar(speed));
        
        // Keep player within room bounds
        camera.position.x = Math.max(-9, Math.min(9, camera.position.x));
        camera.position.z = Math.max(-9, Math.min(9, camera.position.z));
        camera.position.y = 1.7; // Fixed height
    } else {
        world.step(1/60);
        
        eggs.forEach(egg => {
            if(!isDragging || egg !== draggedObject) {
                egg.mesh.position.copy(egg.body.position);
                egg.mesh.quaternion.copy(egg.body.quaternion);
                checkEggInBowl(egg);
            }
        });

        if(gameStarted && !cartonOpen) {
            eggCarton.rotation.y = Math.sin(Date.now() * 0.001) * 0.1;
        }

        if(isPouring) {
            createParticle();
            createParticle();
        }
        
        // Update flour box position with physics
        if (flowerBox && flowerBox.body && !isDragging) {
            flowerBox.position.copy(flowerBox.body.position);
            flowerBox.quaternion.copy(flowerBox.body.quaternion);
        }

        if (isStirring) {
            handleMixing();
        }

        updateParticles();
    }
    
    renderer.render(scene, camera);
}

function onMouseDown(event) {
    if(!gameStarted) return;

    mousePosition.x = (event.clientX / window.innerWidth) * 2 - 1;
    mousePosition.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mousePosition, camera);

    if(!cartonOpen) {
        const intersects = raycaster.intersectObject(eggCarton);
        if(intersects.length > 0) {
            openCarton();
        }
    } else if(flowerPhase && flowerBox) {
        const intersects = raycaster.intersectObject(flowerBox, true);
        if(intersects.length > 0) {
            isDragging = true;
            draggedObject = flowerBox;
            isPouring = true;
            if(flowerBox.body) {
                flowerBox.body.type = CANNON.Body.KINEMATIC;
            }
            const planeNormal = new THREE.Vector3(0, 0, 1);
            dragPlane.setFromNormalAndCoplanarPoint(
                planeNormal,
                flowerBox.position
            );
            zDistance = flowerBox.position.z;
        }
    } else if (milkPhase) {
        // Check for milk container intersections
        const milkIntersects = raycaster.intersectObject(milkContainer);
        if(milkIntersects.length > 0) {
            isDragging = true;
            draggedObject = milkContainer;
            isPouring = true;
            if(milkContainer.body) {
                milkContainer.body.type = CANNON.Body.KINEMATIC;
            }
            const planeNormal = new THREE.Vector3(0, 0, 1);
            dragPlane.setFromNormalAndCoplanarPoint(
                planeNormal,
                milkContainer.position
            );
            zDistance = milkContainer.position.z;
        }
        
        // Check for stirrer intersections
        const stirrerIntersects = raycaster.intersectObject(stirrer);
        if(stirrerIntersects.length > 0) {
            isDragging = true;
            draggedObject = stirrer;
            if(stirrer.body) {
                stirrer.body.type = CANNON.Body.KINEMATIC;
            }
            const planeNormal = new THREE.Vector3(0, 0, 1);
            dragPlane.setFromNormalAndCoplanarPoint(
                planeNormal,
                stirrer.position
            );
            zDistance = stirrer.position.z;
        }
    } else {
        const intersectables = eggs.map(egg => egg.mesh).filter(Boolean);
        const intersects = raycaster.intersectObjects(intersectables);
        
        if(intersects.length > 0) {
            const foundEgg = eggs.find(egg => egg.mesh === intersects[0].object);
            if(foundEgg) {
                isDragging = true;
                draggedObject = foundEgg;
                const planeNormal = new THREE.Vector3(0, 0, 1);
                dragPlane.setFromNormalAndCoplanarPoint(
                    planeNormal,
                    draggedObject.mesh.position
                );
                zDistance = draggedObject.mesh.position.z;
            }
        }
    }
}

function onMouseMove(event) {
    if(!isDragging && !isPouring) return;

    mousePosition.x = (event.clientX / window.innerWidth) * 2 - 1;
    mousePosition.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mousePosition, camera);
    
    if(isDragging && draggedObject) {
        const intersection = new THREE.Vector3();
        raycaster.ray.intersectPlane(dragPlane, intersection);
        
        if(!intersection) return;

        intersection.z = zDistance;
        
        if(draggedObject === milkContainer) {
            // Handle milk container movement
            milkContainer.position.copy(intersection);
            if(milkContainer.body) {
                milkContainer.body.position.copy(intersection);
                milkContainer.body.velocity.setZero();
                milkContainer.body.angularVelocity.setZero();
            }
            if(isPouring) {
                createLiquidParticle();
            }
        } else if(draggedObject === stirrer) {
            // Handle stirrer movement
            stirrer.position.copy(intersection);
            if(stirrer.body) {
                stirrer.body.position.copy(intersection);
                stirrer.body.velocity.setZero();
                stirrer.body.angularVelocity.setZero();
            }
            // Check if stirrer is in bowl
            if(stirrer.position.distanceTo(bowl.position) < 1.5) {
                isStirring = true;
            } else {
                isStirring = false;
            }
        } else if(draggedObject instanceof THREE.Group) {
            // For flour box
            draggedObject.position.copy(intersection);
            if(draggedObject.body) {
                draggedObject.body.position.copy(intersection);
                draggedObject.body.velocity.setZero();
                draggedObject.body.angularVelocity.setZero();
            }
        } else if(draggedObject.body && draggedObject.mesh) {
            // For eggs and other objects
            draggedObject.body.position.copy(intersection);
            draggedObject.mesh.position.copy(intersection);
            draggedObject.body.velocity.setZero();
            draggedObject.body.angularVelocity.setZero();
        }
    }
}

function onMouseUp() {
    if(draggedObject) {
        if(draggedObject.body) {
            draggedObject.body.type = CANNON.Body.DYNAMIC;
            draggedObject.body.velocity.set(0, -1, 0);
        }
    }
    isDragging = false;
    isPouring = false;
    draggedObject = null;
}

function setupEventListeners() {
    window.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    window.addEventListener('keydown', onKeyDown);
}

function openCarton() {
    cartonOpen = true;
    document.querySelector('.grandmaw-text').textContent = 
        "Perfect! Now drag the eggs to the bowl, sugar!";
    
    const targetRotation = Math.PI;
    createEggs();
    eggCarton.rotation.x = targetRotation;
}

function startGame() {
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('gameUI').style.display = 'block';
    gameStarted = true;
}

function onKeyDown(event) {
    if (!draggedObject) return;
    
    switch(event.key.toLowerCase()) {
        case 'q':
            if(draggedObject.body) {
                draggedObject.body.position.z -= 0.5;
                zDistance = draggedObject.body.position.z;
            } else {
                draggedObject.position.z -= 0.5;
                zDistance = draggedObject.position.z;
            }
            break;
        case 'e':
            if(draggedObject.body) {
                draggedObject.body.position.z += 0.5;
                zDistance = draggedObject.body.position.z;
            } else {
                draggedObject.position.z += 0.5;
                zDistance = draggedObject.position.z;
            }
            break;
    }
}

window.addEventListener('resize', onWindowResize, false);

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function createOvenRoom() {
    // Clear main scene
    while(scene.children.length > 0) {
        scene.remove(scene.children[0]);
    }
    
    // Create room geometry
    const roomGeometry = new THREE.BoxGeometry(20, 10, 20);
    const wallMaterial = new THREE.MeshPhongMaterial({ 
        color: 0xF5F5F5,  // Light colored walls
        side: THREE.BackSide 
    });
    const room = new THREE.Mesh(roomGeometry, wallMaterial);
    scene.add(room);

    // Add floor with tile texture
    const floorGeometry = new THREE.PlaneGeometry(20, 20);
    const floorMaterial = new THREE.MeshPhongMaterial({ 
        color: 0xD3D3D3,
        shininess: 50
    });
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -5;
    scene.add(floor);

    // Add kitchen counter along the wall
    const counterGeometry = new THREE.BoxGeometry(18, 2, 2);
    const counterMaterial = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
    const counter = new THREE.Mesh(counterGeometry, counterMaterial);
    counter.position.set(0, -3, -8);
    scene.add(counter);

    // Add cabinets above counter
    const cabinetGeometry = new THREE.BoxGeometry(18, 4, 1.5);
    const cabinetMaterial = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
    const cabinets = new THREE.Mesh(cabinetGeometry, cabinetMaterial);
    cabinets.position.set(0, 2, -8);
    scene.add(cabinets);

    // Add oven
    const ovenGeometry = new THREE.BoxGeometry(4, 4, 2);
    const ovenMaterial = new THREE.MeshPhongMaterial({ color: 0x404040 });
    const oven = new THREE.Mesh(ovenGeometry, ovenMaterial);
    oven.position.set(-6, -2, -8);
    scene.add(oven);

    // Add refrigerator
    const fridgeGeometry = new THREE.BoxGeometry(3, 8, 2);
    const fridgeMaterial = new THREE.MeshPhongMaterial({ color: 0xC0C0C0 });
    const fridge = new THREE.Mesh(fridgeGeometry, fridgeMaterial);
    fridge.position.set(8, -1, -8);
    scene.add(fridge);

    // Add sink
    const sinkGeometry = new THREE.BoxGeometry(3, 0.5, 2);
    const sinkMaterial = new THREE.MeshPhongMaterial({ color: 0xC0C0C0 });
    const sink = new THREE.Mesh(sinkGeometry, sinkMaterial);
    sink.position.set(2, -2, -7.5);
    scene.add(sink);

    // Add lighting
    const mainLight = new THREE.PointLight(0xffffff, 1, 20);
    mainLight.position.set(0, 4, 0);
    scene.add(mainLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    
    // Set up first person camera
    camera.position.set(0, 1.7, 5);
}

// Update the setupFirstPersonControls function to fix looking around
function setupFirstPersonControls() {
    // Lock pointer on click
    renderer.domElement.addEventListener('click', () => {
        renderer.domElement.requestPointerLock();
    });

    document.addEventListener('keydown', (event) => {
        switch(event.code) {
            case 'KeyW': moveForward = true; break;
            case 'KeyS': moveBackward = true; break;
            case 'KeyA': moveLeft = true; break;
            case 'KeyD': moveRight = true; break;
            case 'Space': // Add jumping if desired
                break;
        }
    });

    document.addEventListener('keyup', (event) => {
        switch(event.code) {
            case 'KeyW': moveForward = false; break;
            case 'KeyS': moveBackward = false; break;
            case 'KeyA': moveLeft = false; break;
            case 'KeyD': moveRight = false; break;
        }
    });

    let euler = new THREE.Euler(0, 0, 0, 'YXZ');
    let prevTime = performance.now();

    document.addEventListener('mousemove', (event) => {
        if (document.pointerLockElement === renderer.domElement) {
            euler.setFromQuaternion(camera.quaternion);
            
            euler.y -= event.movementX * 0.002;
            euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, 
                euler.x - event.movementY * 0.002));
            
            camera.quaternion.setFromEuler(euler);
        }
    });

    // Add collision detection with walls
    function updatePosition() {
        const currentTime = performance.now();
        const delta = (currentTime - prevTime) / 1000;

        if (moveForward) camera.translateZ(-5 * delta);
        if (moveBackward) camera.translateZ(5 * delta);
        if (moveLeft) camera.translateX(-5 * delta);
        if (moveRight) camera.translateX(5 * delta);

        // Keep player within room bounds
        camera.position.x = Math.max(-9, Math.min(9, camera.position.x));
        camera.position.z = Math.max(-9, Math.min(9, camera.position.z));
        camera.position.y = 1.7; // Fixed height

        prevTime = currentTime;
        requestAnimationFrame(updatePosition);
    }
    updatePosition();
}
init();
</script>
