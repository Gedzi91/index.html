<html><head><base href="https://websim.ai/universe-simulation/">
<title>Universe Simulation with Atom-Black Hole Interactions</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<style>
  body { 
    margin: 0; 
    padding: 0; 
    overflow: hidden; 
    background-color: #000; 
    font-family: 'Arial', sans-serif;
  }
  #info-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background-color: rgba(0,0,0,0.7);
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    flex-wrap: wrap;
    z-index: 1000;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0 10px;
  }
  .stat-label {
    font-size: 0.8em;
    color: #90CAF9;
    text-transform: uppercase;
  }
  .stat-value {
    font-family: 'Courier New', monospace;
    color: #FFD54F;
    font-size: 1.2em;
    font-weight: bold;
  }
</style>
</head>
<body>
<div id="info-bar">
  <div class="stat">
    <span class="stat-label">Total Energy</span>
    <span id="totalEnergy" class="stat-value">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Implosion Factor</span>
    <span id="implosionFactor" class="stat-value">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Total Universes</span>
    <span id="universeCount" class="stat-value">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Large Universes</span>
    <span id="largeUniverseCount" class="stat-value">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Small Universes</span>
    <span id="smallUniverseCount" class="stat-value">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Free Atoms</span>
    <span id="freeAtomCount" class="stat-value">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Black Hole Energy</span>
    <span id="blackHoleEnergy" class="stat-value">0</span>
  </div>
</div>
<script>
let universes = [];
let freeAtoms = [];
let totalEnergy = 0;
let implosionFactor = 0;
let alpha = 0.001;
let psi = 1;
const MAX_UNIVERSES = 1000;
const LARGE_UNIVERSE_THRESHOLD = 100;
const SMALL_UNIVERSE_LIFESPAN = 60 * 60; // 1 minute at 60 fps
const CENTER_ATTRACTION_STRENGTH = 0.05;
let blackHole;
let lastFreeAtomAddTime = 0;
const FREE_ATOM_ADD_INTERVAL = 60; // Add free atom every second (60 frames)
const RANDOM_UNIVERSE_CREATION_CHANCE = 0.01; // 1% chance per frame
const MAX_FREE_ATOMS = 500; // Maximum number of free atoms
const BLACK_HOLE_ENERGY_LOSS_PER_ATOM = 40; // Energy loss when a free atom touches the black hole

class BlackHole {
  constructor(x, y) {
    this.position = createVector(x, y);
    this.energy = 1000;
    this.radius = sqrt(this.energy) * 0.5;
    this.attractionRadius = this.radius * 10;
    this.shrinkRate = 0.05;
    this.maxGrowthRate = 10;
    this.rotationSpeed = 0.02;
    this.rotationAngle = 0;
    this.spiralArms = 3;
    this.spiralTightness = 0.1;
    this.spiralSize = 0.4;
  }

  update() {
    this.energy = max(this.energy - this.shrinkRate, 10);
    this.updateProperties();
    this.rotationAngle += this.rotationSpeed;
  }

  updateProperties() {
    this.radius = sqrt(this.energy) * 0.5;
    this.attractionRadius = this.radius * 10;
  }

  attract(universe) {
    let distance = this.position.dist(universe.position);
    if (distance < this.attractionRadius) {
      let force = p5.Vector.sub(this.position, universe.position);
      force.setMag(map(distance, 0, this.attractionRadius, 0.5, 0.1));
      universe.velocity.add(force);

      if (distance < this.radius + universe.radius) {
        this.absorb(universe);
        return true;
      }
    }
    return false;
  }

  absorb(universe) {
    let energyGain = min(universe.energy, this.maxGrowthRate);
    this.energy += energyGain;
    this.updateProperties();
  }

  loseEnergy() {
    this.energy = max(this.energy - BLACK_HOLE_ENERGY_LOSS_PER_ATOM, 10);
    this.updateProperties();
  }

  display() {
    push();
    translate(this.position.x, this.position.y);
    rotate(this.rotationAngle);
    
    // Draw spiral arms with improved sharpness
    for (let arm = 0; arm < this.spiralArms; arm++) {
      let armAngle = (TWO_PI / this.spiralArms) * arm;
      beginShape();
      noFill();
      stroke(255, 150);
      strokeWeight(1.5);
      for (let a = 0; a < 8 * PI; a += 0.05) {
        let r = this.radius * this.spiralSize * exp(this.spiralTightness * a);
        let x = r * cos(a + armAngle);
        let y = r * sin(a + armAngle);
        vertex(x, y);
      }
      endShape();
    }
    
    // Draw event horizon
    noStroke();
    fill(0);
    ellipse(0, 0, this.radius * 2);
    
    // Draw accretion disk with improved sharpness
    let eventHorizonRadius = this.radius * 1.2;
    for (let r = eventHorizonRadius; r > this.radius; r -= 0.5) {
      let alpha = map(r, eventHorizonRadius, this.radius, 0, 200);
      fill(255, alpha);
      ellipse(0, 0, r * 2);
    }
    
    pop();
  }
}

class Universe {
  constructor(x, y, energy, isLarge = null) {
    this.position = createVector(x, y);
    this.velocity = p5.Vector.random2D().mult(random(0.5, 2));
    this.energy = energy;
    this.radius = sqrt(this.energy);
    this.color = color(random(360), 100, 100);
    this.birthTime = frameCount;
    this.isLarge = isLarge !== null ? isLarge : this.energy >= LARGE_UNIVERSE_THRESHOLD;
  }

  update() {
    if (!this.isLarge) {
      let center = createVector(width / 2, height / 2);
      let attractionForce = p5.Vector.sub(center, this.position);
      attractionForce.normalize();
      attractionForce.mult(CENTER_ATTRACTION_STRENGTH);
      this.velocity.add(attractionForce);
    }

    this.position.add(this.velocity);
    this.checkBoundaries();
    
    if (!this.isLarge) {
      let age = frameCount - this.birthTime;
      if (age > SMALL_UNIVERSE_LIFESPAN) {
        return this.transformToFreeAtom();
      }
    }
    return true;
  }

  transformToFreeAtom() {
    let newAtom = new FreeAtom(this.position.x, this.position.y);
    freeAtoms.push(newAtom);
    return false; // Remove the universe
  }

  checkBoundaries() {
    let touchedEdge = false;
    if (this.position.x - this.radius < 0) {
      this.velocity.x *= -1;
      this.position.x = this.radius;
      touchedEdge = true;
    } else if (this.position.x + this.radius > width) {
      this.velocity.x *= -1;
      this.position.x = width - this.radius;
      touchedEdge = true;
    }
    if (this.position.y - this.radius < 0) {
      this.velocity.y *= -1;
      this.position.y = this.radius;
      touchedEdge = true;
    } else if (this.position.y + this.radius > height) {
      this.velocity.y *= -1;
      this.position.y = height - this.radius;
      touchedEdge = true;
    }

    if (touchedEdge && !this.isLarge) {
      this.transformToLarge();
    }
  }

  transformToLarge() {
    this.isLarge = true;
    this.energy = LARGE_UNIVERSE_THRESHOLD;
    this.radius = sqrt(this.energy);
    this.color = color(random(360), 100, 100);
  }

  interact(other) {
    let distance = this.position.dist(other.position);
    if (distance < this.radius + other.radius) {
      this.collide(other);
      return true;
    }
    return false;
  }

  collide(other) {
    if (!this.isLarge) this.birthTime = frameCount;
    if (!other.isLarge) other.birthTime = frameCount;

    this.split();
    other.split();
  }

  split() {
    if (universes.length < MAX_UNIVERSES && this.energy > 10) {
      let newEnergy = this.energy / 2;
      this.energy = newEnergy;
      this.radius = sqrt(this.energy);
      this.isLarge = this.energy >= LARGE_UNIVERSE_THRESHOLD;
      
      let newUniverse = new Universe(
        this.position.x + random(-10, 10),
        this.position.y + random(-10, 10),
        newEnergy
      );
      universes.push(newUniverse);
    }
  }

  display() {
    noStroke();
    fill(this.color);
    ellipse(this.position.x, this.position.y, this.radius * 2);
    
    if (!this.isLarge) {
      let age = frameCount - this.birthTime;
      let lifeProgress = age / SMALL_UNIVERSE_LIFESPAN;
      let pulseSize = sin(lifeProgress * PI * 10) * 5;
      let pulseAlpha = map(lifeProgress, 0, 1, 150, 50);
      
      fill(this.color.levels[0], this.color.levels[1], this.color.levels[2], pulseAlpha);
      ellipse(this.position.x, this.position.y, this.radius * 2 + pulseSize);
    }
  }
}

class FreeAtom {
  constructor(x, y) {
    this.position = createVector(x, y);
    this.velocity = p5.Vector.random2D().mult(random(0.2, 0.5));
    this.radius = 5;
    this.color = color(200, 100, 100);
    this.passedThroughBlackHole = false;
    this.wanderAngle = 0;
  }

  update() {
    this.wander();
    this.attractToBlackHole();
    this.position.add(this.velocity);
    return this.checkBoundaries();
  }

  wander() {
    let wanderStrength = 0.05;
    this.wanderAngle = noise(this.position.x * 0.01, this.position.y * 0.01, frameCount * 0.01) * TWO_PI;
    let wanderForce = p5.Vector.fromAngle(this.wanderAngle);
    wanderForce.mult(wanderStrength);
    this.velocity.add(wanderForce);
    this.velocity.limit(0.7);
  }

  attractToBlackHole() {
    let distanceToBlackHole = dist(this.position.x, this.position.y, blackHole.position.x, blackHole.position.y);
    if (distanceToBlackHole < blackHole.attractionRadius) {
      let attractionForce = p5.Vector.sub(blackHole.position, this.position);
      attractionForce.normalize();
      attractionForce.mult(map(distanceToBlackHole, 0, blackHole.attractionRadius, 0.1, 0.01));
      this.velocity.add(attractionForce);
    }
  }

  checkBoundaries() {
    let distanceToCenter = dist(this.position.x, this.position.y, width/2, height/2);
    if (distanceToCenter > blackHole.radius * 1.2) {
      if (this.position.x < 0) {
        this.position.x = 0;
        this.velocity.x *= -0.5;
      } else if (this.position.x > width) {
        this.position.x = width;
        this.velocity.x *= -0.5;
      }
      if (this.position.y < 0) {
        this.position.y = 0;
        this.velocity.y *= -0.5;
      } else if (this.position.y > height) {
        this.position.y = height;
        this.velocity.y *= -0.5;
      }
      this.passedThroughBlackHole = false;
    } else {
      if (distanceToCenter < blackHole.radius) {
        blackHole.loseEnergy();
        return false;
      }
    }
    return true;
  }

  interact(other) {
    let distance = this.position.dist(other.position);
    if (distance < this.radius + other.radius) {
      return true;
    }
    return false;
  }

  display() {
    noStroke();
    fill(this.color);
    ellipse(this.position.x, this.position.y, this.radius * 2);
    
    let glowSize = sin(frameCount * 0.1) * 2 + 3;
    fill(this.color.levels[0], this.color.levels[1], this.color.levels[2], 50);
    ellipse(this.position.x, this.position.y, (this.radius + glowSize) * 2);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB);
  blackHole = new BlackHole(width/2, height/2);
  for (let i = 0; i < 5; i++) {
    createUniverse();
  }
  for (let i = 0; i < 20; i++) {
    createFreeAtom();
  }
}

function draw() {
  background(0, 0.1);
  
  totalEnergy = 0;
  let largeUniverseCount = 0;
  let smallUniverseCount = 0;

  blackHole.update();
  blackHole.display();

  // Update and display universes
  for (let i = universes.length - 1; i >= 0; i--) {
    let universe = universes[i];
    let shouldKeep = universe.update();
    
    if (!shouldKeep || blackHole.attract(universe)) {
      universes.splice(i, 1);
      continue;
    }
    
    for (let j = i - 1; j >= 0; j--) {
      universe.interact(universes[j]);
    }
    
    universe.display();
    totalEnergy += universe.energy;
    
    if (universe.isLarge) {
      largeUniverseCount++;
    } else {
      smallUniverseCount++;
    }
    
    if (universe.energy < 1) {
      universes.splice(i, 1);
    }
  }

  // Update and display free atoms
  for (let i = freeAtoms.length - 1; i >= 0; i--) {
    let atom = freeAtoms[i];
    let shouldKeep = atom.update();
    atom.display();

    if (!shouldKeep) {
      freeAtoms.splice(i, 1);
      continue;
    }

    // Check for collisions with small universes
    for (let j = universes.length - 1; j >= 0; j--) {
      let universe = universes[j];
      if (!universe.isLarge && atom.interact(universe)) {
        // Create two new free atoms
        for (let k = 0; k < 2; k++) {
          if (freeAtoms.length < MAX_FREE_ATOMS) {
            let newAtom = new FreeAtom(
              universe.position.x + random(-10, 10),
              universe.position.y + random(-10, 10)
            );
            freeAtoms.push(newAtom);
          }
        }
        // Remove the colliding atom and small universe
        freeAtoms.splice(i, 1);
        universes.splice(j, 1);
        break;
      }
    }

    // Check for collisions with other free atoms
    for (let j = i - 1; j >= 0; j--) {
      if (atom.interact(freeAtoms[j])) {
        freeAtoms.splice(j, 1);
        freeAtoms.splice(i, 1);
        break;
      }
    }
  }
  
  implosionFactor = alpha * totalEnergy * psi;
  
  if (implosionFactor > 5) {
    implode();
  }
  
  if (frameCount - lastFreeAtomAddTime >= FREE_ATOM_ADD_INTERVAL) {
    if (freeAtoms.length < MAX_FREE_ATOMS) {
      createFreeAtom();
    }
    lastFreeAtomAddTime = frameCount;
  }
  
  if (random() < RANDOM_UNIVERSE_CREATION_CHANCE) {
    createRandomUniverse();
  }
  
  updateInfo(largeUniverseCount, smallUniverseCount);
}

function createUniverse() {
  if (universes.length < MAX_UNIVERSES) {
    let x = random(width);
    let y = random(height);
    let energy = random(50, 200);
    universes.push(new Universe(x, y, energy));
  }
}

function createRandomUniverse() {
  if (universes.length < MAX_UNIVERSES) {
    let x = random(width);
    let y = random(height);
    let isLarge = random() < 0.5;
    let energy = isLarge ? random(LARGE_UNIVERSE_THRESHOLD, LARGE_UNIVERSE_THRESHOLD * 2) : random(10, LARGE_UNIVERSE_THRESHOLD);
    universes.push(new Universe(x, y, energy, isLarge));
  }
}

function createFreeAtom() {
  let x = random(width);
  let y = random(height);
  freeAtoms.push(new FreeAtom(x, y));
}

function implode() {
  let newEnergy = totalEnergy * 1.5;
  universes = [new Universe(width/2, height/2, newEnergy)];
}

function updateInfo(largeCount, smallCount) {
  document.getElementById('totalEnergy').textContent = totalEnergy.toFixed(2);
  document.getElementById('implosionFactor').textContent = implosionFactor.toFixed(4);
  document.getElementById('universeCount').textContent = universes.length;
  document.getElementById('largeUniverseCount').textContent = largeCount;
  document.getElementById('smallUniverseCount').textContent = smallCount;
  document.getElementById('freeAtomCount').textContent = freeAtoms.length;
  document.getElementById('blackHoleEnergy').textContent = blackHole.energy.toFixed(2);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  blackHole.position = createVector(width/2, height/2);
}

function mousePressed() {
  if (random() < 0.7) {
    createRandomUniverse();
  } else {
    createFreeAtom();
  }
}
</script>
</body></html>
