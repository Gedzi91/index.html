<html><head><base href="https://eldritch-maze.com/"><title>Eldritch Maze Explorer</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

<div id="ui">
  <div id="timer">Time in the Maze: 0s</div>
  <div id="sanity">Sanity: 100%</div>
  <div id="message">Escape before your mind shatters...</div>
</div>
<div id="winScreen">YOU ARE FREE</div>
<div id="jewelTooltip">Click to collect the blood jewel</div>
<audio id="backgroundAudio" loop>
  <source src="https://www.dl.dropboxusercontent.com/scl/fi/m3bi4c1gmb52dslqexevd/f-1-mx-44_38.mp3?rlkey=taop6oky2naucaq57x6kuxx2b&st=4s6u69v9&dl=0" type="audio/mpeg">
</audio>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const textureSize = 512;
const data = new Uint8Array(textureSize * textureSize * 4);
const simplex = new SimplexNoise();

for (let i = 0; i < textureSize; i++) {
  for (let j = 0; j < textureSize; j++) {
    const stride = (i * textureSize + j) * 4;
    const noise = simplex.noise2D(i / 32, j / 32) * 0.5 + 0.5;
    const color = Math.floor(noise * 255);
    data[stride] = color;
    data[stride + 1] = color;
    data[stride + 2] = color;
    data[stride + 3] = 255;
  }
}

const noiseTexture = new THREE.DataTexture(data, textureSize, textureSize, THREE.RGBAFormat);
noiseTexture.needsUpdate = true;

const mazeSize = 30;
const maze = [];
for (let i = 0; i < mazeSize; i++) {
  maze[i] = [];
  for (let j = 0; j < mazeSize; j++) {
    maze[i][j] = Math.random() < 0.3;
  }
}

const cageSize = mazeSize + 2;
const cagePillarGeometry = new THREE.BoxGeometry(0.1, 10, 0.1);
const cagePillarMaterial = new THREE.MeshPhongMaterial({
  color: 0x444444,
  emissive: 0x111111,
  map: noiseTexture,
  bumpMap: noiseTexture,
  bumpScale: 0.05,
});

for (let i = 0; i < cageSize; i++) {
  for (let j = 0; j < cageSize; j++) {
      if (i === 0 || i === cageSize - 1 || j === 0 || j === cageSize - 1) {
        const pillar = new THREE.Mesh(cagePillarGeometry, cagePillarMaterial);
        pillar.position.set(i - cageSize / 2, 0, j - cageSize / 2);
        scene.add(pillar);
      }

  }
}

const wallGeometry = new THREE.BoxGeometry(1, 2, 1);
const wallMaterial = new THREE.MeshPhongMaterial({ 
  map: noiseTexture,
  displacementMap: noiseTexture,
  displacementScale: 0.1,
  bumpMap: noiseTexture,
  bumpScale: 0.1,
});

for (let i = 0; i < mazeSize; i++) {
  for (let j = 0; j < mazeSize; j++) {
    if (maze[i][j]) {
      const wall = new THREE.Mesh(wallGeometry, wallMaterial);
      wall.position.set(i - mazeSize / 2, 0, j - mazeSize / 2);
      scene.add(wall);
    }
  }
}

for (let i = 0; i <= mazeSize; i++) {
  for (let j = 0; j <= mazeSize; j++) {
    const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2, 0.1), wallMaterial);
    pillar.position.set(i - mazeSize / 2 - 0.45, 0, j - mazeSize / 2 - 0.45);
    scene.add(pillar);
  }
}

const floorGeometry = new THREE.PlaneGeometry(mazeSize, mazeSize, 64, 64);
const floorMaterial = new THREE.MeshPhongMaterial({ 
  map: noiseTexture,
  displacementMap: noiseTexture,
  displacementScale: 0.2,
  bumpMap: noiseTexture,
  bumpScale: 0.2,
  side: THREE.DoubleSide,
  specular: 0x111111,
  shininess: 10
});
const floor = new THREE.Mesh(floorGeometry, floorMaterial);
floor.rotation.x = Math.PI / 2;
floor.position.y = -1;
scene.add(floor);

const bloodGeometry = new THREE.CircleGeometry(0.2, 32);
const bloodMaterial = new THREE.MeshPhongMaterial({ color: 0x8B0000, side: THREE.DoubleSide });
for (let i = 0; i < 50; i++) {
  const blood = new THREE.Mesh(bloodGeometry, bloodMaterial);
  blood.position.set(
    Math.random() * mazeSize - mazeSize / 2,
    -0.99,
    Math.random() * mazeSize - mazeSize / 2
  );
  blood.rotation.x = -Math.PI / 2;
  blood.scale.set(Math.random() * 0.5 + 0.5, Math.random() * 0.5 + 0.5, 1);
  scene.add(blood);
}

const ambientLight = new THREE.AmbientLight(0x404040);
scene.add(ambientLight);
const flashlight = new THREE.PointLight(0xffffff, 1, 10);
camera.add(flashlight);
flashlight.position.set(0, 0, -1);

const player = new THREE.Object3D();
player.add(camera);
scene.add(player);
player.position.set(-mazeSize / 2 + 0.5, 0, -mazeSize / 2 + 0.5);

let moveForward = false;
let moveBackward = false;
let moveLeft = false;
let moveRight = false;

document.addEventListener('keydown', onKeyDown);
document.addEventListener('keyup', onKeyUp);

function onKeyDown(event) {
  switch (event.code) {
    case 'ArrowUp':
    case 'KeyW':
      moveForward = true;
      break;
    case 'ArrowLeft':
    case 'KeyA':
      moveLeft = true;
      break;
    case 'ArrowDown':
    case 'KeyS':
      moveBackward = true;
      break;
    case 'ArrowRight':
    case 'KeyD':
      moveRight = true;
      break;
  }
}

function onKeyUp(event) {
  switch (event.code) {
    case 'ArrowUp':
    case 'KeyW':
      moveForward = false;
      break;
    case 'ArrowLeft':
    case 'KeyA':
      moveLeft = false;
      break;
    case 'ArrowDown':
    case 'KeyS':
      moveBackward = false;
      break;
    case 'ArrowRight':
    case 'KeyD':
      moveRight = false;
      break;
  }
}

let pitch = 0;
let yaw = 0;
let isPointerLocked = false;

document.addEventListener('mousemove', (event) => {
  if (isPointerLocked) {
    yaw -= event.movementX * 0.002;
    pitch -= event.movementY * 0.002;
    pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
    camera.rotation.set(pitch, yaw, 0, 'YXZ');
  }
});

document.addEventListener('pointerlockchange', () => {
  isPointerLocked = document.pointerLockElement === renderer.domElement;
});

renderer.domElement.addEventListener('click', () => {
  if (!isPointerLocked) {
    renderer.domElement.requestPointerLock();
  }
});

const horrorGeometry = new THREE.SphereGeometry(0.5, 32, 32);
const horrorMaterial = new THREE.MeshPhongMaterial({ 
  color: 0x000000,
  emissive: 0x8b0000,
  emissiveIntensity: 0.5,
  transparent: true,
  opacity: 0.8
});
const horrors = [];

for (let i = 0; i < 5; i++) {
  const horror = new THREE.Mesh(horrorGeometry, horrorMaterial);
  horror.position.set(
    Math.random() * mazeSize - mazeSize / 2,
    Math.random() * 2 - 1,
    Math.random() * mazeSize - mazeSize / 2
  );
  scene.add(horror);
  horrors.push(horror);
}

const skeletonGroup = new THREE.Group();

const skullGeometry = new THREE.SphereGeometry(0.15, 32, 32);
const skullMaterial = new THREE.MeshPhongMaterial({
  color: 0xffffff,
  map: noiseTexture,
  bumpMap: noiseTexture,
  bumpScale: 0.05,
  emissive: 0x330000,
  emissiveIntensity: 0.2
});
const skull = new THREE.Mesh(skullGeometry, skullMaterial);
skull.position.y = 0.7;
skeletonGroup.add(skull);

const eyeSocketGeometry = new THREE.SphereGeometry(0.05, 16, 16);
const eyeSocketMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
const leftEye = new THREE.Mesh(eyeSocketGeometry, eyeSocketMaterial);
leftEye.position.set(-0.05, 0.75, 0.1);
skeletonGroup.add(leftEye);
const rightEye = leftEye.clone();
rightEye.position.set(0.05, 0.75, 0.1);
skeletonGroup.add(rightEye);

const torsoGeometry = new THREE.CylinderGeometry(0.2, 0.15, 0.5, 8);
const torsoMaterial = new THREE.MeshPhongMaterial({
  color: 0xffffff,
  map: noiseTexture,
  bumpMap: noiseTexture,
  bumpScale: 0.05,
  emissive: 0x330000,
  emissiveIntensity: 0.2
});
const torso = new THREE.Mesh(torsoGeometry, torsoMaterial);
torso.position.y = 0.25;
skeletonGroup.add(torso);

const armGeometry = new THREE.CylinderGeometry(0.03, 0.03, 0.4, 8);
const leftArm = new THREE.Mesh(armGeometry, torsoMaterial);
leftArm.position.set(-0.2, 0.3, 0);
leftArm.rotation.z = Math.PI / 4;
skeletonGroup.add(leftArm);
const rightArm = leftArm.clone();
rightArm.position.set(0.2, 0.3, 0);
rightArm.rotation.z = -Math.PI / 4;
skeletonGroup.add(rightArm);

const legGeometry = new THREE.CylinderGeometry(0.05, 0.05, 0.4, 8);
const leftLeg = new THREE.Mesh(legGeometry, torsoMaterial);
leftLeg.position.set(-0.1, -0.2, 0);
skeletonGroup.add(leftLeg);
const rightLeg = leftLeg.clone();
rightLeg.position.set(0.1, -0.2, 0);
skeletonGroup.add(rightLeg);

scene.add(skeletonGroup);
skeletonGroup.position.copy(randomSpawnPosition());

let skeletonDirection = new THREE.Vector3(1, 0, 0);
let skeletonNextTurn = 0;

function isEntityVisible(entity) {
  const frustum = new THREE.Frustum();
  const matrix = new THREE.Matrix4().multiplyMatrices(
    camera.projectionMatrix,
    camera.matrixWorldInverse
  );
  frustum.setFromProjectionMatrix(matrix);
  
  if (!frustum.containsPoint(entity.position)) {
    return false;
  }
  
  const raycaster = new THREE.Raycaster();
  const direction = entity.position.clone().sub(camera.position).normalize();
  raycaster.set(camera.position, direction);
  
  const intersects = raycaster.intersectObjects(scene.children);
  return intersects[0] && intersects[0].object === entity;
}

function updateSkeletonPosition(delta) {
  if (!isEntityVisible(skeletonGroup)) {
    const speed = 3;
    const newPosition = skeletonGroup.position.clone().add(
      skeletonDirection.clone().multiplyScalar(speed * delta)
    );
    
    const gridX = Math.round(newPosition.x + mazeSize / 2);
    const gridZ = Math.round(newPosition.z + mazeSize / 2);
    
    if (gridX >= 0 && gridX < mazeSize && gridZ >= 0 && gridZ < mazeSize && !maze[gridX][gridZ]) {
      skeletonGroup.position.copy(newPosition);
      
      if (Math.random() < 0.1) {
        skeletonDirection.copy(
          player.position.clone().sub(skeletonGroup.position).normalize()
        );
      }
    } else {
      skeletonDirection.set(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
    }
  }
  
  skeletonGroup.position.y = Math.sin(Date.now() * 0.005) * 0.05;
  skull.rotation.y = Math.sin(Date.now() * 0.003) * 0.2;
  leftArm.rotation.x = Math.sin(Date.now() * 0.007) * 0.3;
  rightArm.rotation.x = Math.sin(Date.now() * 0.007 + Math.PI) * 0.3;
}

function createAbomination() {
  const abominationGroup = new THREE.Group();

  const bodyGeometry = new THREE.IcosahedronGeometry(0.5, 1);
  const bodyMaterial = new THREE.MeshPhongMaterial({
    color: 0x330000,
    emissive: 0x220000,
    specular: 0x111111,
    shininess: 30,
    transparent: true,
    opacity: 0.9,
    map: noiseTexture,
    displacementMap: noiseTexture,
    displacementScale: 0.1,
    bumpMap: noiseTexture,
    bumpScale: 0.05,
  });
  const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
  abominationGroup.add(body);

  const tentacleGeometry = new THREE.CylinderGeometry(0.05, 0.01, 0.5, 8);
  const tentacleMaterial = new THREE.MeshPhongMaterial({
    color: 0x220000,
    emissive: 0x110000,
    specular: 0x111111,
    shininess: 30,
    transparent: true,
    opacity: 0.9,
    map: noiseTexture,
  });

  for (let i = 0; i < 8; i++) {
    const tentacle = new THREE.Mesh(tentacleGeometry, tentacleMaterial);
    tentacle.position.set(
      Math.random() * 0.4 - 0.2,
      Math.random() * 0.4 - 0.2,
      Math.random() * 0.4 - 0.2
    );
    tentacle.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );
    abominationGroup.add(tentacle);
  }

  const eyeGeometry = new THREE.SphereGeometry(0.1, 16, 16);
  const eyeMaterial = new THREE.MeshPhongMaterial({
    color: 0xffffff,
    emissive: 0x008800,
    emissiveIntensity: 0.5,
    specular: 0x444444,
    shininess: 30,
  });

  for (let i = 0; i < 3; i++) {
    const eye = new THREE.Mesh(eyeGeometry, eyeMaterial);
    eye.position.set(
      Math.random() * 0.4 - 0.2,
      Math.random() * 0.4 - 0.2,
      Math.random() * 0.4 - 0.2
    );
    abominationGroup.add(eye);
  }

  return abominationGroup;
}

const abomination = createAbomination();
scene.add(abomination);
abomination.position.copy(randomSpawnPosition());

const mirrors = [];
const mirrorPairs = Math.max(2, Math.floor(mazeSize / 10)); // At least 2 pairs, or 10% of maze size

function createMirrorPortal() {
  const mirrorGeometry = new THREE.PlaneGeometry(1, 2);
  const mirrorMaterial = new THREE.MeshPhongMaterial({
    color: 0x7085bf,
    transparent: true,
    opacity: 0.5,
    side: THREE.DoubleSide,
    envMap: noiseTexture,
    refractionRatio: 0.98,
    reflectivity: 0.9
  });

  const mirror = new THREE.Mesh(mirrorGeometry, mirrorMaterial);
  mirror.userData.isPortal = true;
  return mirror;
}

// Spawn mirror pairs
for (let i = 0; i < mirrorPairs; i++) {
  const mirror1 = createMirrorPortal();
  const mirror2 = createMirrorPortal();
  
  let pos1, pos2;
  do {
    pos1 = randomSpawnPosition();
    pos2 = randomSpawnPosition();
  } while (pos1.distanceTo(pos2) < mazeSize / 4); // Ensure mirrors aren't too close
  
  mirror1.position.copy(pos1);
  mirror2.position.copy(pos2);
  
  // Random rotation
  mirror1.rotation.y = Math.random() * Math.PI * 2;
  mirror2.rotation.y = Math.random() * Math.PI * 2;
  
  mirror1.userData.pair = mirror2;
  mirror2.userData.pair = mirror1;
  
  mirrors.push(mirror1, mirror2);
  scene.add(mirror1);
  scene.add(mirror2);
}

function checkPortals() {
  for (const mirror of mirrors) {
    const distanceToPortal = player.position.distanceTo(mirror.position);
    if (distanceToPortal < 0.5) {
      // Teleport to paired mirror
      const pair = mirror.userData.pair;
      const offset = player.position.clone().sub(mirror.position);
      player.position.copy(pair.position.clone().add(offset));
      
      // Add portal effect
      const portalLight = new THREE.PointLight(0x7085bf, 1, 2);
      portalLight.position.copy(pair.position);
      scene.add(portalLight);
      setTimeout(() => scene.remove(portalLight), 500);
      
      // Prevent immediate re-teleport
      setTimeout(() => checkPortals, 1000);
      break;
    }
  }
}

function createEldritchEntity() {
  const eldritchGroup = new THREE.Group();

  const coreGeometry = new THREE.TorusKnotGeometry(0.3, 0.1, 100, 16);
  const coreMaterial = new THREE.MeshPhongMaterial({
    color: 0x000066,
    emissive: 0x000033,
    specular: 0x222222,
    shininess: 50,
    transparent: true,
    opacity: 0.9,
    map: noiseTexture,
    displacementMap: noiseTexture,
    displacementScale: 0.2,
  });
  const core = new THREE.Mesh(coreGeometry, coreMaterial);
  eldritchGroup.add(core);

  const tendrilGeometry = new THREE.ConeGeometry(0.05, 0.4, 8);
  const tendrilMaterial = new THREE.MeshPhongMaterial({
    color: 0x000044,
    emissive: 0x000022,
    transparent: true,
    opacity: 0.7,
    map: noiseTexture,
  });

  for (let i = 0; i < 12; i++) {
    const tendril = new THREE.Mesh(tendrilGeometry, tendrilMaterial);
    tendril.position.set(
      Math.random() * 0.6 - 0.3,
      Math.random() * 0.6 - 0.3,
      Math.random() * 0.6 - 0.3
    );
    tendril.rotation.set(
      Math.random() * Math.PI * 2,
      Math.random() * Math.PI * 2,
      Math.random() * Math.PI * 2
    );
    eldritchGroup.add(tendril);
  }

  const eyeGeometry = new THREE.SphereGeometry(0.08, 32, 32);
  const eyeMaterial = new THREE.MeshPhongMaterial({
    color: 0xffffff,
    emissive: 0x00ffff,
    emissiveIntensity: 0.8,
  });

  for (let i = 0; i < 5; i++) {
    const eye = new THREE.Mesh(eyeGeometry, eyeMaterial);
    eye.position.set(
      Math.random() * 0.4 - 0.2,
      Math.random() * 0.4 - 0.2,
      Math.random() * 0.4 - 0.2
    );
    eye.scale.set(0.5, 1, 1);
    eldritchGroup.add(eye);
  }

  return eldritchGroup;
}

function randomSpawnPosition() {
  let x, z;
  do {
    x = Math.floor(Math.random() * mazeSize);
    z = Math.floor(Math.random() * mazeSize); 
  } while (maze[x][z]); // Keep trying until we find an empty space
  
  return new THREE.Vector3(
    x - mazeSize / 2,
    0,
    z - mazeSize / 2
  );
}

const eldritchEntity = createEldritchEntity();
scene.add(eldritchEntity);
eldritchEntity.position.copy(randomSpawnPosition());

let eldritchDirection = new THREE.Vector3(1, 0, 0);
let eldritchNextTurn = 0;

function updateEldritchPosition(delta) {
  const speed = 2;
  const newPosition = eldritchEntity.position.clone().add(eldritchDirection.clone().multiplyScalar(speed * delta));
  
  const gridX = Math.round(newPosition.x + mazeSize / 2);
  const gridZ = Math.round(newPosition.z + mazeSize / 2);
  
  if (gridX >= 0 && gridX < mazeSize && gridZ >= 0 && gridZ < mazeSize && !maze[gridX][gridZ]) {
    eldritchEntity.position.copy(newPosition);
  } else {
    eldritchDirection.set(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
  }
  
  eldritchNextTurn -= delta;
  if (eldritchNextTurn <= 0) {
    eldritchDirection.set(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
    eldritchNextTurn = Math.random() * 2 + 1;
  }
  
  eldritchEntity.rotation.y += delta * 2;
  eldritchEntity.position.y = Math.sin(Date.now() * 0.002) * 0.2;
  
  eldritchEntity.children.forEach((child, index) => {
    child.rotation.x += Math.sin(Date.now() * 0.001 + index) * 0.03;
    child.rotation.y += Math.cos(Date.now() * 0.002 + index) * 0.03;
    child.rotation.z += Math.sin(Date.now() * 0.003 + index) * 0.03;
    if (child !== eldritchEntity.children[0]) {
      child.scale.set(
        1 + Math.sin(Date.now() * 0.007 + index) * 0.2,
        1 + Math.sin(Date.now() * 0.005 + index) * 0.2,
        1 + Math.sin(Date.now() * 0.003 + index) * 0.2
      );
    }
  });
}

let abominationDirection = new THREE.Vector3(1, 0, 0);
let abominationNextTurn = 0;

function updateAbominationPosition(delta) {
  const speed = 1.5;
  const newPosition = abomination.position.clone().add(abominationDirection.clone().multiplyScalar(speed * delta));
  
  const gridX = Math.round(newPosition.x + mazeSize / 2);
  const gridZ = Math.round(newPosition.z + mazeSize / 2);
  
  if (gridX >= 0 && gridX < mazeSize && gridZ >= 0 && gridZ < mazeSize && !maze[gridX][gridZ]) {
    abomination.position.copy(newPosition);
  } else {
    abominationDirection.set(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
  }
  
  abominationNextTurn -= delta;
  if (abominationNextTurn <= 0) {
    abominationDirection.set(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
    abominationNextTurn = Math.random() * 2 + 1;
  }
  
  abomination.rotation.y = Math.atan2(abominationDirection.x, abominationDirection.z);
  
  abomination.position.y = Math.sin(Date.now() * 0.003) * 0.1;
  abomination.scale.set(
    1 + Math.sin(Date.now() * 0.007) * 0.1,
    1 + Math.sin(Date.now() * 0.005) * 0.1,
    1 + Math.sin(Date.now() * 0.003) * 0.1
  );
  abomination.children.forEach((child, index) => {
    child.rotation.x += Math.sin(Date.now() * 0.001 + index) * 0.02;
    child.rotation.y += Math.cos(Date.now() * 0.002 + index) * 0.02;
    child.rotation.z += Math.sin(Date.now() * 0.003 + index) * 0.02;
  });
}

function createVoidWatcher() {
  const entity = new THREE.Group();
  
  // Create writhing mass of darkness
  const coreGeometry = new THREE.DodecahedronGeometry(0.8, 2);
  const coreMaterial = new THREE.MeshPhongMaterial({
    color: 0x000000,
    emissive: 0x000000,
    specular: 0x000000,
    shininess: 0,
    transparent: true,
    opacity: 0.9,
    map: noiseTexture,
    displacementMap: noiseTexture,
    displacementScale: 0.3,
  });
  
  const core = new THREE.Mesh(coreGeometry, coreMaterial);
  entity.add(core);

  // Add multiple glowing "eyes" that blink randomly
  for (let i = 0; i < 15; i++) {
    const eyeGeometry = new THREE.SphereGeometry(0.1, 32, 32);
    const eyeMaterial = new THREE.MeshPhongMaterial({
      color: 0xff0000,
      emissive: 0xff0000,
      emissiveIntensity: 2,
      transparent: true,
      opacity: 0.8
    });
    
    const eye = new THREE.Mesh(eyeGeometry, eyeMaterial);
    const angle = (i / 15) * Math.PI * 2;
    eye.position.set(
      Math.cos(angle) * 0.5,
      Math.sin(angle) * 0.5,
      0
    );
    entity.add(eye);

    // Animate eye blinking
    setInterval(() => {
      eye.material.opacity = Math.random() < 0.2 ? 0 : 0.8;
    }, 100);
  }

  // Add tendril effects
  const tendrilGeometry = new THREE.CylinderGeometry(0.02, 0.001, 1, 8);
  const tendrilMaterial = new THREE.MeshPhongMaterial({
    color: 0x000000,
    emissive: 0x330000,
    transparent: true,
    opacity: 0.7
  });

  for (let i = 0; i < 20; i++) {
    const tendril = new THREE.Mesh(tendrilGeometry, tendrilMaterial);
    tendril.position.set(
      Math.random() * 2 - 1,
      Math.random() * 2 - 1,
      Math.random() * 2 - 1
    );
    tendril.rotation.set(
      Math.random() * Math.PI * 2,
      Math.random() * Math.PI * 2,
      Math.random() * Math.PI * 2
    );
    entity.add(tendril);
  }

  return entity;
}

const voidWatcher = createVoidWatcher();
scene.add(voidWatcher);
voidWatcher.position.copy(randomSpawnPosition());

function updateVoidWatcher(delta) {
  // Rotate core slowly
  voidWatcher.rotation.y += delta * 0.5;
  
  // Pulsate size
  const scale = 1 + Math.sin(Date.now() * 0.002) * 0.2;
  voidWatcher.scale.set(scale, scale, scale);
  
  // Move tendrils
  voidWatcher.children.forEach((child, i) => {
    if (i > 15) { // Skip eyes, only animate tendrils
      child.rotation.x += Math.sin(Date.now() * 0.001 + i) * 0.02;
      child.rotation.y += Math.cos(Date.now() * 0.002 + i) * 0.02;
      child.rotation.z += Math.sin(Date.now() * 0.003 + i) * 0.02;
    }
  });

  // Move toward player if close
  const distanceToPlayer = voidWatcher.position.distanceTo(player.position);
  if (distanceToPlayer < 10) {
    const direction = player.position.clone().sub(voidWatcher.position).normalize();
    voidWatcher.position.add(direction.multiplyScalar(delta));
    
    // Drain sanity faster when closer
    if (distanceToPlayer < 5) {
      sanity -= (5 - distanceToPlayer) * delta * 30;
      sanity = Math.max(0, sanity);
      sanityElement.textContent = `Sanity: ${Math.floor(sanity)}%`;
    }
  }
}

const bloodJewels = [];
const bloodJewelGeometry = new THREE.OctahedronGeometry(0.2, 2);
const bloodJewelMaterial = new THREE.MeshPhongMaterial({
  color: 0x8B0000,
  emissive: 0x330000,
  emissiveIntensity: 0.5,
  specular: 0xffffff,
  shininess: 100,
  transparent: true,
  opacity: 0.9
});

// Create 5 blood jewels at random positions
for (let i = 0; i < 5; i++) {
  const bloodJewel = new THREE.Mesh(bloodJewelGeometry, bloodJewelMaterial);
  bloodJewel.position.copy(randomSpawnPosition());
  bloodJewel.userData.collected = false;
  bloodJewels.push(bloodJewel);
  scene.add(bloodJewel);
}

const clock = new THREE.Clock();
let gameTime = 0;
let sanity = 100;
const timerElement = document.getElementById('timer');
const messageElement = document.getElementById('message');
const sanityElement = document.getElementById('sanity');
const audioElement = document.getElementById('backgroundAudio');
audioElement.volume = 0.55;

function isInFrustum(object, camera) {
  const frustum = new THREE.Frustum();
  frustum.setFromProjectionMatrix(new THREE.Matrix4().multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse));
  return frustum.intersectsObject(object);
}

function triggerJumpscare(entity) {
  const jumpscareDistance = 2;
  const playerViewDirection = new THREE.Vector3(0, 0, -1);
  playerViewDirection.applyQuaternion(camera.quaternion);

  const toEntity = entity.position.clone().sub(player.position).normalize();
  const angle = playerViewDirection.angleTo(toEntity);
  const distance = player.position.distanceTo(entity.position);
  
  if (distance < jumpscareDistance && angle < Math.PI / 4) {
    const flash = new THREE.PointLight(0xff0000, 2, 10);
    flash.position.copy(player.position);
    scene.add(flash);
    
    sanity = Math.max(0, sanity - 30);
    sanityElement.textContent = `Sanity: ${Math.floor(sanity)}%`;
    
    setTimeout(() => scene.remove(flash), 100);

    // Only teleport abomination
    if (entity === abomination) {
      abomination.position.copy(randomSpawnPosition());
    }
  }
}

function animate() {
  const animationId = requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  gameTime += delta;
  timerElement.textContent = `Time in the Maze: ${Math.floor(gameTime)}s`;
  
  const moveSpeed = 2;
  const velocity = new THREE.Vector3();
  
  if (moveForward) velocity.z -= moveSpeed * delta;
  if (moveBackward) velocity.z += moveSpeed * delta;
  if (moveLeft) velocity.x -= moveSpeed * delta;
  if (moveRight) velocity.x += moveSpeed * delta;
  
  velocity.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
  player.position.add(velocity);
  
  const playerX = Math.round(player.position.x + mazeSize / 2);
  const playerZ = Math.round(player.position.z + mazeSize / 2);
  
  if (maze[playerX] && maze[playerX][playerZ]) {
    player.position.sub(velocity);
  }

  if (sanity > 0) {
    [eldritchEntity, abomination, skeletonGroup, voidWatcher].forEach(entity => {
      triggerJumpscare(entity);
    });
    
    updateSkeletonPosition(delta);
    updateEldritchPosition(delta);
    updateAbominationPosition(delta);
    updateVoidWatcher(delta);
    
    const distanceToEldritch = player.position.distanceTo(eldritchEntity.position);
    if (distanceToEldritch < 4) {
      sanity -= (4 - distanceToEldritch) * delta * 20;
      sanity = Math.max(0, sanity);
      sanityElement.textContent = `Sanity: ${Math.floor(sanity)}%`;
      
      if (sanity === 0) {
        messageElement.textContent = "Your mind breaks at the sight of the unknowable.";
        document.exitPointerLock();
        isPointerLocked = false;
      }
    }

    horrors.forEach((horror, index) => {
      horror.rotation.y += 0.01 + index * 0.005;
      horror.position.y = Math.sin(gameTime + index) * 0.2;
      
      const distance = player.position.distanceTo(horror.position);
      if (distance < 3) {
        sanity -= (3 - distance) * delta * 5;
        sanity = Math.max(0, sanity);
        sanityElement.textContent = `Sanity: ${Math.floor(sanity)}%`;
        
        if (sanity === 0) {
          messageElement.textContent = "Your mind has shattered. The horrors consume you.";
          document.exitPointerLock();
          isPointerLocked = false;
        }
      }
    });
    
    const distanceToSkeleton = player.position.distanceTo(skeletonGroup.position);
    if (distanceToSkeleton < 2) {
      sanity -= (2 - distanceToSkeleton) * delta * 10;
      sanity = Math.max(0, sanity);
      sanityElement.textContent = `Sanity: ${Math.floor(sanity)}%`;
      
      if (sanity === 0) {
        messageElement.textContent = "The skeletal horror has claimed your soul.";
        document.exitPointerLock();
        isPointerLocked = false;
      }
    }

  }

  if (playerX === mazeSize - 1 && playerZ === mazeSize - 1) {
    messageElement.textContent = `You escaped with ${Math.floor(sanity)}% sanity left!`;
    document.exitPointerLock();
    isPointerLocked = false;
  }

  // Check for portal teleportation
  if (moveForward || moveBackward || moveLeft || moveRight) {
    checkPortals();
  }

  // Check for jewel tooltips
  const hasCollectedAny = bloodJewels.some(jewel => jewel.userData.collected);
  if (!hasCollectedAny) {
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
    const intersects = raycaster.intersectObjects(bloodJewels);
    
    const tooltipElement = document.getElementById('jewelTooltip');
    if (intersects.length > 0) {
      tooltipElement.style.display = 'block';
      const vector = intersects[0].point.clone().project(camera);
      tooltipElement.style.left = (vector.x * window.innerWidth/2 + window.innerWidth/2) + 'px';
      tooltipElement.style.top = (-vector.y * window.innerHeight/2 + window.innerHeight/2) + 'px';
    } else {
      tooltipElement.style.display = 'none';
    }
  } else {
    document.getElementById('jewelTooltip').style.display = 'none';
  }

  // Update mirror portal effects
  mirrors.forEach((mirror, index) => {
    mirror.material.opacity = 0.3 + Math.sin(Date.now() * 0.001 + index) * 0.2;
    mirror.rotation.y += Math.sin(Date.now() * 0.0001 + index) * 0.001;
    
    const distanceToPlayer = player.position.distanceTo(mirror.position);
    if (distanceToPlayer < 5) {
      mirror.material.emissive.setHSL(
        (Date.now() * 0.0001) % 1,
        0.5,
        0.2 + (5 - distanceToPlayer) / 10
      );
    }
  });

  // Animate blood jewels
  bloodJewels.forEach((jewel, index) => {
    if (!jewel.userData.collected) {
      jewel.rotation.y += 0.02;
      jewel.position.y = Math.sin(gameTime * 2 + index) * 0.1 + 0.5;
    }
  });

  scene.children.forEach(object => {
    if (object.isMesh && !isInFrustum(object, camera)) {
      object.visible = false;
    } else if (!object.userData.collected) {
      object.visible = true;
    }
  });

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.addEventListener('mousedown', (event) => {
  if (event.button === 0 && isPointerLocked) { // Left click only
    // Jewel collection check
    const raycaster = new THREE.Raycaster();
    const mouseVector = new THREE.Vector2(0, 0);
    raycaster.setFromCamera(mouseVector, camera);
    
    const intersects = raycaster.intersectObjects(bloodJewels);
    if (intersects.length > 0) {
      const jewel = intersects[0].object;
      if (!jewel.userData.collected) {
        jewel.userData.collected = true;
        jewel.visible = false;
        
        // Check if all jewels collected
        const allCollected = bloodJewels.every(j => j.userData.collected);
        if (allCollected) {
          const audioElement = document.getElementById('backgroundAudio');
          audioElement.pause();
          
          const winScreen = document.getElementById('winScreen');
          winScreen.style.display = 'flex';
          
          messageElement.textContent = "You have collected all the blood jewels! You are free!";
          
          setTimeout(() => {
            cancelAnimationFrame(animationId);
            renderer.dispose();
            document.body.innerHTML = '';
            window.close();
          }, 3000);
        } else {
          messageElement.textContent = "Blood jewel collected! Find the rest to escape...";
        }
        return;
      }
    }
    
    // Default sanity reset behavior if no jewel was clicked
    sanity = 100;
    sanityElement.textContent = `Sanity: ${Math.floor(sanity)}%`;
    messageElement.textContent = "Your mind feels clearer...";
  }
});

document.addEventListener('click', () => {
  if (audioElement.paused) {
    audioElement.play();
  }
}, { once: true });
</script></body></html>
