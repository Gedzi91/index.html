let source = null;

function playScornSound() {
    const sound = document.getElementById('scornSound');
    
    // If we don't have an AudioContext yet, create one
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    // If we haven't created a source node yet, or if we need a new one
    if (!source) {
        source = audioCtx.createMediaElementSource(sound);
    }
    
    // Create a new BiquadFilterNode for each play
    const pitchNode = audioCtx.createBiquadFilter();
    pitchNode.type = "allpass";
    
    // Generate random variations
    const speed = 0.85 + Math.random() * 0.3;
    const pitchVariation = -200 + Math.random() * 400;
    
    sound.preservesPitch = false;
    sound.playbackRate = speed;
    pitchNode.frequency.setValueAtTime(pitchVariation, audioCtx.currentTime);
    
    // Disconnect any existing connections
    source.disconnect();
    
    // Connect the audio nodes
    source.connect(pitchNode);
    pitchNode.connect(audioCtx.destination);
    
    // Reset time and play
    sound.currentTime = 0;
    sound.play().catch(error => {
        console.log("Audio playback error:", error);
        // Fallback to normal playback if Web Audio API fails
        sound.playbackRate = 1;
        sound.preservesPitch = true;
        sound.play();
    });
}

    this.playbackRate = 1;

function cycleJermaQuote() {
    const jermaQuoteElement = document.querySelector('.jerma-quote');
    const randomQuote = jermaQuotes[Math.floor(Math.random() * jermaQuotes.length)];
    jermaQuoteElement.textContent = `"${randomQuote}" - Jerma985`;
}

document.addEventListener('DOMContentLoaded', () => {
    let clicks = 0;
    const h1 = document.querySelector('h1');
    
    setInterval(cycleJermaQuote, 30000);
    
    h1.addEventListener('click', () => {
        clicks++;
        if(clicks >= 5) {
            cycleJermaQuote();
            clicks = 0;
        }
    });
});

document.getElementById('input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        transform();
    }
});

document.addEventListener('mousemove', (e) => {
    const faces = document.querySelectorAll('.jerma-face');
    const mouseX = e.clientX;
    const mouseY = e.clientY;
    
    faces.forEach((face, index) => {
        const rect = face.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        const distX = mouseX - centerX;
        const distY = mouseY - centerY;
        const distance = Math.sqrt(distX * distX + distY * distY);
        
        const maxRotation = 45; // Increased from 15
        const rotationX = (distY / distance) * maxRotation;
        const rotationY = -(distX / distance) * maxRotation;
        
        const parallaxAmount = 50; // Increased from 30
        const moveX = (mouseX - window.innerWidth / 2) * 0.05; // Increased multiplier
        const moveY = (mouseY - window.innerHeight / 2) * 0.05;
        
        const baseTransform = window.getComputedStyle(face).transform;
        const parallaxMultiplier = (index + 1) * 0.8; // Increased from 0.5
        
        const distortionFactor = Math.min(0.3, distance * 0.0002); // Added distortion
        
        face.style.transform = `
            perspective(800px)
            rotateX(${rotationX}deg) 
            rotateY(${rotationY}deg)
            translate(${moveX * parallaxMultiplier}px, ${moveY * parallaxMultiplier}px)
            scale(${1 + distortionFactor})
            skew(${distortionFactor * 20}deg, ${distortionFactor * 10}deg)
        `;
        
        const maxDistance = Math.sqrt(window.innerWidth * window.innerWidth + window.innerHeight * window.innerHeight);
        const proximityFactor = 1 - (distance / maxDistance);
        face.style.filter = `
            sepia(${0.7 + proximityFactor * 0.3})
            hue-rotate(${-40 - proximityFactor * 40}deg)
            brightness(${0.5 + proximityFactor * 0.5})
            contrast(${150 + proximityFactor * 50}%)
            saturate(${150 + proximityFactor * 50}%)
        `;
    });
});

document.addEventListener('mouseleave', () => {
    const faces = document.querySelectorAll('.jerma-face');
    faces.forEach(face => {
        face.style.transition = 'transform 0.5s ease-out, filter 0.5s ease-out';
        face.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) translate(0, 0)';
        face.style.filter = 'sepia(0.7) hue-rotate(-40deg) brightness(0.5)';
        
        setTimeout(() => {
            face.style.transition = 'transform 0.1s ease-out, filter 0.3s ease';
        }, 500);
    });
});
</script>
