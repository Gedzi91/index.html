<html><head><base href="https://galacticvoyager.space/"><title>Galactic Voyager: Infinite Universe Explorer</title><style>
body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}
#gameCanvas {
    width: 100vw;
    height: 100vh;
    display: block;
}
#controls {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 5px;
}
#planetInfo {
    position: absolute;
    top: 10px;
    right: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 5px;
}
</style></head><body>
<canvas id="gameCanvas"></canvas>
<div id="controls">
    <h3>Controls:</h3>
    <p>W: Forward | S: Backward</p>
    <p>A: Turn Left | D: Turn Right</p>
    <p>E: Fly Up | Q: Fly Down</p>
</div>
<div id="planetInfo">
    <h3>Planet Information</h3>
    <p id="planetName"></p>
    <p id="planetDesc"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Initialize Three.js scene, camera, and renderer
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// Create infinite starfield background
const starGeometry = new THREE.BufferGeometry();
const starMaterial = new THREE.PointsMaterial({ color: 0xFFFFFF, size: 0.1 });
const starVertices = [];
const starCount = 100000;
const starSpread = 10000;

for (let i = 0; i < starCount; i++) {
    const x = (Math.random() - 0.5) * starSpread;
    const y = (Math.random() - 0.5) * starSpread;
    const z = (Math.random() - 0.5) * starSpread;
    starVertices.push(x, y, z);
}

starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

function updateStars() {
    const positions = starGeometry.attributes.position.array;
    for (let i = 0; i < positions.length; i += 3) {
        if (Math.abs(positions[i] - ship.position.x) > starSpread / 2 ||
            Math.abs(positions[i + 1] - ship.position.y) > starSpread / 2 ||
            Math.abs(positions[i + 2] - ship.position.z) > starSpread / 2) {
            positions[i] = ship.position.x + (Math.random() - 0.5) * starSpread;
            positions[i + 1] = ship.position.y + (Math.random() - 0.5) * starSpread;
            positions[i + 2] = ship.position.z + (Math.random() - 0.5) * starSpread;
        }
    }
    starGeometry.attributes.position.needsUpdate = true;
}

// Create smaller, realistic spaceship
const ship = new THREE.Group();

// Main body
const bodyGeometry = new THREE.CylinderGeometry(0.25, 0.5, 2, 16);
const bodyMaterial = new THREE.MeshPhongMaterial({ color: 0xcccccc, shininess: 100 });
const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
body.castShadow = true;
body.receiveShadow = true;
ship.add(body);

// Cockpit
const cockpitGeometry = new THREE.SphereGeometry(0.3, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
const cockpitMaterial = new THREE.MeshPhongMaterial({ color: 0x3399ff, shininess: 100, opacity: 0.7, transparent: true });
const cockpit = new THREE.Mesh(cockpitGeometry, cockpitMaterial);
cockpit.position.y = 0.75;
cockpit.rotation.x = Math.PI;
cockpit.castShadow = true;
ship.add(cockpit);

// Wings
const wingGeometry = new THREE.BoxGeometry(1.5, 0.05, 0.5);
const wingMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000, shininess: 100 });
const leftWing = new THREE.Mesh(wingGeometry, wingMaterial);
leftWing.position.set(-0.75, 0, 0);
leftWing.castShadow = true;
leftWing.receiveShadow = true;
ship.add(leftWing);

const rightWing = leftWing.clone();
rightWing.position.set(0.75, 0, 0);
ship.add(rightWing);

// Engines
const engineGeometry = new THREE.CylinderGeometry(0.15, 0.25, 0.35, 16);
const engineMaterial = new THREE.MeshPhongMaterial({ color: 0x333333, shininess: 100 });
const leftEngine = new THREE.Mesh(engineGeometry, engineMaterial);
leftEngine.position.set(-0.35, -1, 0);
leftEngine.castShadow = true;
leftEngine.receiveShadow = true;
ship.add(leftEngine);

const rightEngine = leftEngine.clone();
rightEngine.position.set(0.35, -1, 0);
ship.add(rightEngine);

// Engine glow
const glowGeometry = new THREE.SphereGeometry(0.1, 16, 16);
const glowMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.7 });
const leftGlow = new THREE.Mesh(glowGeometry, glowMaterial);
leftGlow.position.set(-0.35, -1.2, 0);
ship.add(leftGlow);

const rightGlow = leftGlow.clone();
rightGlow.position.set(0.35, -1.2, 0);
ship.add(rightGlow);

ship.rotation.x = Math.PI / 2;
scene.add(ship);

// Add lights
const ambientLight = new THREE.AmbientLight(0x404040);
scene.add(ambientLight);
const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
directionalLight.position.set(1, 1, 1);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Create infinite planets
const planets = [];
const usedNames = new Set();
const usedDescriptions = new Set();

function generateUniqueRandomPlanet() {
    const planetTypes = [
        () => {
            const planet = new THREE.Group();
            const baseColor = new THREE.Color(Math.random(), Math.random(), Math.random());
            const baseGeometry = new THREE.SphereGeometry(10, 64, 64);
            const baseMaterial = new THREE.MeshPhongMaterial({ color: baseColor });
            const base = new THREE.Mesh(baseGeometry, baseMaterial);
            planet.add(base);

            const craterCount = Math.floor(Math.random() * 50) + 20;
            for (let i = 0; i < craterCount; i++) {
                const craterGeometry = new THREE.CircleGeometry(Math.random() * 0.5 + 0.1, 32);
                const craterMaterial = new THREE.MeshPhongMaterial({ color: 0x808080 });
                const crater = new THREE.Mesh(craterGeometry, craterMaterial);
                crater.position.setFromSpherical(new THREE.Spherical(10, Math.random() * Math.PI, Math.random() * Math.PI * 2));
                crater.lookAt(planet.position);
                planet.add(crater);
            }

            return {
                planet: planet,
                name: `Crater World ${Math.floor(Math.random() * 1000000)}`,
                description: `A rocky planet with a ${baseColor.getHexString()} surface, pockmarked by ${craterCount} distinct craters of varying sizes.`
            };
        },
        () => {
            const planet = new THREE.Group();
            const oceanColor = new THREE.Color(0, Math.random() * 0.5 + 0.5, Math.random() * 0.5 + 0.5);
            const oceanGeometry = new THREE.SphereGeometry(10, 64, 64);
            const oceanMaterial = new THREE.MeshPhongMaterial({ color: oceanColor });
            const ocean = new THREE.Mesh(oceanGeometry, oceanMaterial);
            planet.add(ocean);

            const islandCount = Math.floor(Math.random() * 30) + 10;
            for (let i = 0; i < islandCount; i++) {
                const islandGeometry = new THREE.SphereGeometry(Math.random() * 0.5 + 0.2, 16, 16);
                const islandMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
                const island = new THREE.Mesh(islandGeometry, islandMaterial);
                island.position.setFromSpherical(new THREE.Spherical(10, Math.random() * Math.PI, Math.random() * Math.PI * 2));
                island.lookAt(planet.position);
                planet.add(island);
            }

            return {
                planet: planet,
                name: `Archipelago ${Math.floor(Math.random() * 1000000)}`,
                description: `An ocean world with ${oceanColor.getHexString()} waters, dotted with ${islandCount} lush green islands.`
            };
        },
        () => {
            const planet = new THREE.Group();
            const baseColor = new THREE.Color(Math.random(), Math.random(), Math.random());
            const baseGeometry = new THREE.SphereGeometry(10, 64, 64);
            const baseMaterial = new THREE.MeshPhongMaterial({ color: baseColor });
            const base = new THREE.Mesh(baseGeometry, baseMaterial);
            planet.add(base);

            const ringColor = new THREE.Color(Math.random(), Math.random(), Math.random());
            const ringGeometry = new THREE.RingGeometry(15, 20, 64);
            const ringMaterial = new THREE.MeshPhongMaterial({ color: ringColor, side: THREE.DoubleSide });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = Math.PI / 2;
            planet.add(ring);

            const moonCount = Math.floor(Math.random() * 3) + 1;
            for (let i = 0; i < moonCount; i++) {
                const moonGeometry = new THREE.SphereGeometry(Math.random() + 0.5, 32, 32);
                const moonMaterial = new THREE.MeshPhongMaterial({ color: 0xcccccc });
                const moon = new THREE.Mesh(moonGeometry, moonMaterial);
                moon.position.setFromSpherical(new THREE.Spherical(25 + i * 5, Math.random() * Math.PI, Math.random() * Math.PI * 2));
                planet.add(moon);
            }

            return {
                planet: planet,
                name: `Ringed Giant ${Math.floor(Math.random() * 1000000)}`,
                description: `A massive ${baseColor.getHexString()} gas giant with ${ringColor.getHexString()} rings, orbited by ${moonCount} moons.`
            };
        },
        () => {
            const planet = new THREE.Group();
            const coreColor = new THREE.Color(1, Math.random() * 0.5, 0);
            const coreGeometry = new THREE.SphereGeometry(9.8, 64, 64);
            const coreMaterial = new THREE.MeshPhongMaterial({ color: coreColor, emissive: coreColor });
            const core = new THREE.Mesh(coreGeometry, coreMaterial);
            planet.add(core);

            const surfaceGeometry = new THREE.SphereGeometry(10, 64, 64);
            const surfaceMaterial = new THREE.MeshPhongMaterial({ color: 0x1a0500 });
            const surface = new THREE.Mesh(surfaceGeometry, surfaceMaterial);
            planet.add(surface);

            const crackCount = Math.floor(Math.random() * 20) + 10;
            for (let i = 0; i < crackCount; i++) {
                const crackGeometry = new THREE.PlaneGeometry(0.1, Math.random() * 3 + 1);
                const crackMaterial = new THREE.MeshBasicMaterial({ color: coreColor, side: THREE.DoubleSide });
                const crack = new THREE.Mesh(crackGeometry, crackMaterial);
                crack.position.setFromSpherical(new THREE.Spherical(10, Math.random() * Math.PI, Math.random() * Math.PI * 2));
                crack.lookAt(planet.position);
                crack.rotateOnAxis(new THREE.Vector3(1, 0, 0), Math.PI / 2);
                planet.add(crack);
            }

            return {
                planet: planet,
                name: `Volcanic Inferno ${Math.floor(Math.random() * 1000000)}`,
                description: `A hellish world with a molten ${coreColor.getHexString()} core visible through ${crackCount} cracks in its obsidian surface.`
            };
        },
        () => {
            const planet = new THREE.Group();
            const baseColor = new THREE.Color(Math.random() * 0.5, Math.random() * 0.5 + 0.5, Math.random() * 0.5);
            const baseGeometry = new THREE.SphereGeometry(10, 64, 64);
            const baseMaterial = new THREE.MeshPhongMaterial({ color: baseColor });
            const base = new THREE.Mesh(baseGeometry, baseMaterial);
            planet.add(base);

            const cloudColor = new THREE.Color(1, 1, 1);
            const cloudCount = Math.floor(Math.random() * 50) + 30;
            for (let i = 0; i < cloudCount; i++) {
                const cloudGeometry = new THREE.SphereGeometry(Math.random() + 0.5, 16, 16);
                const cloudMaterial = new THREE.MeshPhongMaterial({ color: cloudColor, transparent: true, opacity: 0.8 });
                const cloud = new THREE.Mesh(cloudGeometry, cloudMaterial);
                cloud.position.setFromSpherical(new THREE.Spherical(10.5, Math.random() * Math.PI, Math.random() * Math.PI * 2));
                planet.add(cloud);
            }

            return {
                planet: planet,
                name: `Cloudy Sphere ${Math.floor(Math.random() * 1000000)}`,
                description: `A ${baseColor.getHexString()} planet with a thick atmosphere, shrouded by ${cloudCount} swirling white clouds.`
            };
        },
        () => {
            const planet = new THREE.Group();
            const baseColor = new THREE.Color(Math.random(), Math.random(), Math.random());
            const baseGeometry = new THREE.SphereGeometry(10, 64, 64);
            const baseMaterial = new THREE.MeshPhongMaterial({ color: baseColor });
            const base = new THREE.Mesh(baseGeometry, baseMaterial);
            planet.add(base);

            const crystalCount = Math.floor(Math.random() * 100) + 50;
            const crystalColor = new THREE.Color(Math.random(), Math.random(), Math.random());
            for (let i = 0; i < crystalCount; i++) {
                const crystalGeometry = new THREE.ConeGeometry(0.2, 1, 4);
                const crystalMaterial = new THREE.MeshPhongMaterial({ color: crystalColor });
                const crystal = new THREE.Mesh(crystalGeometry, crystalMaterial);
                crystal.position.setFromSpherical(new THREE.Spherical(10, Math.random() * Math.PI, Math.random() * Math.PI * 2));
                crystal.lookAt(planet.position);
                planet.add(crystal);
            }

            return {
                planet: planet,
                name: `Crystal Haven ${Math.floor(Math.random() * 1000000)}`,
                description: `A ${baseColor.getHexString()} world adorned with ${crystalCount} gleaming ${crystalColor.getHexString()} crystals jutting from its surface.`
            };
        },
        () => {
            const planet = new THREE.Group();
            const baseColor = new THREE.Color(Math.random(), Math.random(), Math.random());
            const baseGeometry = new THREE.SphereGeometry(10, 64, 64);
            const baseMaterial = new THREE.MeshPhongMaterial({ color: baseColor });
            const base = new THREE.Mesh(baseGeometry, baseMaterial);
            planet.add(base);

            const ringCount = Math.floor(Math.random() * 5) + 3;
            for (let i = 0; i < ringCount; i++) {
                const ringColor = new THREE.Color(Math.random(), Math.random(), Math.random());
                const ringGeometry = new THREE.TorusGeometry(11 + i, 0.2, 16, 100);
                const ringMaterial = new THREE.MeshPhongMaterial({ color: ringColor });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.rotation.x = Math.random() * Math.PI;
                ring.rotation.y = Math.random() * Math.PI;
                planet.add(ring);
            }

            return {
                planet: planet,
                name: `Multi-Ring Wonder ${Math.floor(Math.random() * 1000000)}`,
                description: `A ${baseColor.getHexString()} planet encircled by ${ringCount} colorful rings, each orbiting at a unique angle.`
            };
        },
        () => {
            const planet = new THREE.Group();
            const baseColor = new THREE.Color(0.5, 0.5, 0.5);
            const baseGeometry = new THREE.SphereGeometry(10, 64, 64);
            const baseMaterial = new THREE.MeshPhongMaterial({ color: baseColor });
            const base = new THREE.Mesh(baseGeometry, baseMaterial);
            planet.add(base);

            const cityCount = Math.floor(Math.random() * 20) + 10;
            for (let i = 0; i < cityCount; i++) {
                const cityGeometry = new THREE.BoxGeometry(1, Math.random() * 2 + 0.5, 1);
                const cityMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
                const city = new THREE.Mesh(cityGeometry, cityMaterial);
                city.position.setFromSpherical(new THREE.Spherical(10, Math.random() * Math.PI, Math.random() * Math.PI * 2));
                city.lookAt(planet.position);
                planet.add(city);
            }

            return {
                planet: planet,
                name: `Metropolis Globe ${Math.floor(Math.random() * 1000000)}`,
                description: `A planet-wide city with a gray surface, featuring ${cityCount} towering metropolises spread across its surface.`
            };
        },
        () => {
            const planet = new THREE.Group();
            const baseColor = new THREE.Color(0.7, 0.7, 0.7);
            const baseGeometry = new THREE.SphereGeometry(10, 64, 64);
            const baseMaterial = new THREE.MeshPhongMaterial({ color: baseColor });
            const base = new THREE.Mesh(baseGeometry, baseMaterial);
            planet.add(base);

            const tentacleCount = Math.floor(Math.random() * 10) + 5;
            const tentacleColor = new THREE.Color(Math.random(), Math.random(), Math.random());
            for (let i = 0; i < tentacleCount; i++) {
                const tentacleGeometry = new THREE.CylinderGeometry(0.2, 0.1, 5, 8);
                const tentacleMaterial = new THREE.MeshPhongMaterial({ color: tentacleColor });
                const tentacle = new THREE.Mesh(tentacleGeometry, tentacleMaterial);
                tentacle.position.setFromSpherical(new THREE.Spherical(10, Math.random() * Math.PI, Math.random() * Math.PI * 2));
                tentacle.lookAt(planet.position);
                planet.add(tentacle);
            }

            return {
                planet: planet,
                name: `Tentacle Terror ${Math.floor(Math.random() * 1000000)}`,
                description: `A bizarre world with a pale surface, from which ${tentacleCount} gigantic ${tentacleColor.getHexString()} tentacles emerge, reaching into space.`
            };
        }
    ];

    let planetData;
    do {
        const randomType = planetTypes[Math.floor(Math.random() * planetTypes.length)];
        planetData = randomType();
    } while (usedNames.has(planetData.name) || usedDescriptions.has(planetData.description));

    usedNames.add(planetData.name);
    usedDescriptions.add(planetData.description);

    return planetData;
}

function createPlanet() {
    const { planet, name, description } = generateUniqueRandomPlanet();
    planet.position.set(
        ship.position.x + (Math.random() - 0.5) * 10000,
        ship.position.y + (Math.random() - 0.5) * 10000,
        ship.position.z + (Math.random() - 0.5) * 10000
    );
    planet.name = name;
    planet.description = description;
    scene.add(planet);
    planets.push(planet);
}

// Initial planet creation
for (let i = 0; i < 50; i++) {
    createPlanet();
}

function updatePlanets() {
    const maxPlanets = 100;
    const spawnDistance = 1000;
    const despawnDistance = 5000;

    // Remove distant planets
    for (let i = planets.length - 1; i >= 0; i--) {
        if (ship.position.distanceTo(planets[i].position) > despawnDistance) {
            usedNames.delete(planets[i].name);
            usedDescriptions.delete(planets[i].description);
            scene.remove(planets[i]);
            planets.splice(i, 1);
        }
    }

    // Add new planets if needed
    while (planets.length < maxPlanets) {
        createPlanet();
    }
}

// Game state
let velocity = new THREE.Vector3();
let acceleration = new THREE.Vector3();
let angularVelocity = new THREE.Vector3();
const keys = {};
let currentPlanet = null;

// Constants
const MAX_SPEED = 2;
const ACCELERATION = 0.05;
const ROTATION_SPEED = 0.03;
const DAMPING = 0.98;

// Key event listeners
window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

// Update planet information
function updatePlanetInfo() {
    const planetInfo = document.getElementById('planetInfo');
    const planetName = document.getElementById('planetName');
    const planetDesc = document.getElementById('planetDesc');

    if (currentPlanet) {
        planetName.textContent = `Name: ${currentPlanet.name}`;
        planetDesc.textContent = currentPlanet.description;
    } else {
        planetName.textContent = 'No planet nearby';
        planetDesc.textContent = 'Go land on a planet to see its information';
    }
}

// Main game loop
function animate() {
    requestAnimationFrame(animate);

    // Reset acceleration
    acceleration.set(0, 0, 0);
    angularVelocity.set(0, 0, 0);

    // Apply acceleration based on key presses
    if (keys['w']) {
        const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(ship.quaternion);
        acceleration.add(direction.multiplyScalar(ACCELERATION));
    }
    if (keys['s']) {
        const direction = new THREE.Vector3(0, 0, 1).applyQuaternion(ship.quaternion);
        acceleration.add(direction.multiplyScalar(ACCELERATION));
    }
    if (keys['a']) angularVelocity.y += ROTATION_SPEED;
    if (keys['d']) angularVelocity.y -= ROTATION_SPEED;
    if (keys['e']) {
        const direction = new THREE.Vector3(0, 1, 0).applyQuaternion(ship.quaternion);
        acceleration.add(direction.multiplyScalar(ACCELERATION));
    }
    if (keys['q']) {
        const direction = new THREE.Vector3(0, -1, 0).applyQuaternion(ship.quaternion);
        acceleration.add(direction.multiplyScalar(ACCELERATION));
    }

    // Update velocity
    velocity.add(acceleration);
    velocity.clampLength(0, MAX_SPEED);

    // Apply damping
    velocity.multiplyScalar(DAMPING);

    // Update ship position and rotation
    ship.position.add(velocity);
    ship.rotation.y += angularVelocity.y;

    // Adjust ship pitch and roll based on movement
    ship.rotation.x = THREE.MathUtils.lerp(ship.rotation.x, -velocity.y * 0.2, 0.1);
    ship.rotation.z = THREE.MathUtils.lerp(ship.rotation.z, -angularVelocity.y * 2, 0.1);

    // Check for planet proximity
    let nearestPlanet = null;
    let nearestDistance = Infinity;
    planets.forEach(planet => {
        const distance = ship.position.distanceTo(planet.position);
        if (distance < nearestDistance) {
            nearestDistance = distance;
            nearestPlanet = planet;
        }
    });

    if (nearestDistance < 15) {
        currentPlanet = nearestPlanet;
    } else {
        currentPlanet = null;
    }

    updatePlanetInfo();

    // Rotate planets slowly
    planets.forEach(planet => {
        planet.rotation.y += 0.001;
    });

    // Update infinite environment
    updateStars();
    updatePlanets();

    // Update planet rotations and animations
    planets.forEach(planet => {
        planet.rotation.y += 0.001;
        if (planet.update) {
            planet.update();
        }
    });

    // Update camera position
    const cameraOffset = new THREE.Vector3(0, 1, 5);
    cameraOffset.applyQuaternion(ship.quaternion);
    camera.position.copy(ship.position).add(cameraOffset);
    camera.lookAt(ship.position);

    // Animate engine glow
    const glowIntensity = Math.sin(Date.now() * 0.01) * 0.1 + 0.7;
    leftGlow.material.opacity = glowIntensity;
    rightGlow.material.opacity = glowIntensity;

    renderer.render(scene, camera);
}

animate();

// Handle window resizing
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body></html>
