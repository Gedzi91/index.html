<html><head><base href="https://solarsystemdata/"><title>SpaceSim</title>
<script src="https://unpkg.com/htmx.org@1.9.4"></script>
<style>
body {
  background-color: #000;
  margin: 0;
  overflow: hidden;
  display: flex;
  font-family: Arial, sans-serif;
  color: white;
  height: 100vh;
}
#solar-system-container {
  flex-grow: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}
#solar-system {
  position: relative;
  width: 800px;
  height: 800px;
  transition: transform 0.3s ease;
}
.celestial-body {
  position: absolute;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: box-shadow 0.3s ease, background-color 0.5s ease, width 0.5s ease, height 0.5s ease;
}
.celestial-body:hover {
  box-shadow: 0 0 10px 5px rgba(255, 255, 255, 0.5);
}
#sun {
  width: 60px;
  height: 60px;
  background: radial-gradient(circle at 30% 30%, #ffd700, #ffa500);
  box-shadow: 0 0 20px #ffa500;
  left: 50%;
  top: 50%;
}
.orbit {
  position: absolute;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.5s ease, height 0.5s ease;
}
.moon {
  position: absolute;
  width: 4px;
  height: 4px;
  background-color: #ccc;
  border-radius: 50%;
  top: 50%;
  left: 50%;
}
.moon-orbit {
  position: absolute;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
#planet-name {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 24px;
  pointer-events: none;
}
#credits {
  position: absolute;
  bottom: 10px;
  right: 10px;
  text-align: right;
  font-size: 12px;
  opacity: 0.7;
}
#system-log {
  width: 300px;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.7);
  border-right: 1px solid #333;
  padding: 20px;
  overflow-y: auto;
  box-sizing: border-box;
  position: relative;
  display: flex;
  flex-direction: column;
}
#system-log h2 {
  margin-top: 0;
  border-bottom: 1px solid #444;
  padding-bottom: 10px;
}
#log-entries {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  flex-grow: 1;
  overflow-y: auto;
}
#log-entries p {
  margin: 2px 0;
  line-height: 1.1;
}
#turn-button {
  position: absolute;
  top: 10px;
  right: 10px;
  background-color: #4CAF50;
  border: none;
  color: white;
  padding: 10px 20px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  cursor: pointer;
  border-radius: 5px;
}
#custom-event-form {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
}
#custom-event-input {
  margin-bottom: 10px;
  padding: 5px;
  border-radius: 3px;
  border: 1px solid #444;
  background-color: #222;
  color: white;
}
#custom-event-submit {
  background-color: #4CAF50;
  border: none;
  color: white;
  padding: 5px 10px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 14px;
  margin: 4px 2px;
  cursor: pointer;
  border-radius: 3px;
}
</style>
</head>
<body>
<div id="system-log">
  <h2>System Log</h2>
  <div id="log-entries"></div>
  <button id="turn-button">Next Turn</button>
  <form id="custom-event-form" hx-post="/api/custom-event" hx-target="#log-entries" hx-swap="beforeend">
    <input type="text" id="custom-event-input" name="custom-event" placeholder="Enter custom event...">
    <button type="submit" id="custom-event-submit">Add Custom Event</button>
  </form>
</div>
<div id="solar-system-container">
  <div id="solar-system">
    <div id="sun" class="celestial-body" 
         hx-get="/planet-name?name=Sun"
         hx-target="#planet-name"
         hx-trigger="mouseover"
         hx-swap="innerHTML"></div>
  </div>
  <div id="planet-name"></div>
  <div id="credits">
    <p>Made by @SomeGoofyGuy on Discord</p>
    <p>Original Idea by @kingnoobandmechanicalshark on Discord</p>
  </div>
</div>

<script>
const planets = [
  { name: 'Mercury', color: '#8c7e6d', size: 10, orbit: 100, speed: 4.7, resources: 100, moons: [] },
  { name: 'Venus', color: '#e39e1c', size: 15, orbit: 140, speed: 3.5, resources: 200, moons: [] },
  { name: 'Earth', color: '#6b93d6', size: 16, orbit: 180, speed: 3, resources: 1000, moons: [{ name: 'Moon', size: 4, orbit: 20, speed: 1 }] },
  { name: 'Mars', color: '#c1440e', size: 12, orbit: 220, speed: 2.4, resources: 150, moons: [
    { name: 'Phobos', size: 2, orbit: 12, speed: 1.5 },
    { name: 'Deimos', size: 1, orbit: 16, speed: 1.2 }
  ] },
  { name: 'Jupiter', color: '#d8ca9d', size: 36, orbit: 300, speed: 1.3, resources: 5000, moons: [
    { name: 'Io', size: 3, orbit: 30, speed: 2 },
    { name: 'Europa', size: 3, orbit: 36, speed: 1.8 },
    { name: 'Ganymede', size: 5, orbit: 42, speed: 1.5 },
    { name: 'Callisto', size: 4, orbit: 48, speed: 1.2 }
  ] },
  { name: 'Saturn', color: '#f4d47a', size: 30, orbit: 380, speed: 0.9, resources: 4000, moons: [
    { name: 'Titan', size: 5, orbit: 40, speed: 1.5 },
    { name: 'Enceladus', size: 2, orbit: 32, speed: 2 }
  ] },
  { name: 'Uranus', color: '#c9eeff', size: 26, orbit: 440, speed: 0.7, resources: 3000, moons: [
    { name: 'Miranda', size: 2, orbit: 24, speed: 2 },
    { name: 'Titania', size: 3, orbit: 30, speed: 1.5 }
  ] },
  { name: 'Neptune', color: '#5b5ddf', size: 24, orbit: 490, speed: 0.5, resources: 2500, moons: [
    { name: 'Triton', size: 4, orbit: 28, speed: 1.8 }
  ] }
];

const solarSystem = document.getElementById('solar-system');
let speedMultiplier = 0.2;
let zoomLevel = 1;
let currentTurn = 1;
let colonizedPlanets = ['Earth'];
let explorationStatus = {};

function createPlanet(planet) {
  const orbit = document.createElement('div');
  orbit.className = 'orbit';
  orbit.style.width = `${planet.orbit * 2}px`;
  orbit.style.height = `${planet.orbit * 2}px`;
  solarSystem.appendChild(orbit);

  const planetEl = document.createElement('div');
  planetEl.className = 'celestial-body';
  planetEl.id = planet.name.toLowerCase();
  planetEl.style.width = `${planet.size}px`;
  planetEl.style.height = `${planet.size}px`;
  planetEl.style.backgroundColor = planet.color;
  planetEl.setAttribute('hx-get', `/planet-name?name=${planet.name}`);
  planetEl.setAttribute('hx-target', '#planet-name');
  planetEl.setAttribute('hx-trigger', 'mouseover');
  planetEl.setAttribute('hx-swap', 'innerHTML');
  solarSystem.appendChild(planetEl);

  let angle = 0;
  setInterval(() => {
    angle += planet.speed * 0.02 * speedMultiplier;
    const x = Math.cos(angle) * planet.orbit + 400;
    const y = Math.sin(angle) * planet.orbit + 400;
    planetEl.style.left = `${x}px`;
    planetEl.style.top = `${y}px`;
  }, 20);

  // Create moons
  planet.moons.forEach((moon, index) => {
    const moonOrbit = document.createElement('div');
    moonOrbit.className = 'moon-orbit';
    moonOrbit.style.width = `${moon.orbit * 2}px`;
    moonOrbit.style.height = `${moon.orbit * 2}px`;
    planetEl.appendChild(moonOrbit);

    const moonEl = document.createElement('div');
    moonEl.className = 'moon';
    moonEl.style.width = `${moon.size}px`;
    moonEl.style.height = `${moon.size}px`;
    planetEl.appendChild(moonEl);

    let moonAngle = 0;
    setInterval(() => {
      moonAngle += moon.speed * 0.1 * speedMultiplier;
      const moonX = Math.cos(moonAngle) * moon.orbit;
      const moonY = Math.sin(moonAngle) * moon.orbit;
      moonEl.style.left = `calc(50% + ${moonX}px)`;
      moonEl.style.top = `calc(50% + ${moonY}px)`;
    }, 20);
  });
}

planets.forEach(createPlanet);

// Zoom functionality with scroll wheel
document.addEventListener('wheel', (e) => {
  e.preventDefault();
  const zoomSpeed = 0.1;
  if (e.deltaY < 0) {
    zoomLevel = Math.min(zoomLevel + zoomSpeed, 2);
  } else {
    zoomLevel = Math.max(zoomLevel - zoomSpeed, 0.5);
  }
  solarSystem.style.transform = `scale(${zoomLevel})`;
}, { passive: false });

// HTMX extension for clearing planet name on mouseout
htmx.defineExtension('clear-planet-name', {
  onEvent: function(name, evt) {
    if (name === 'htmx:afterOnLoad') {
      evt.detail.elt.addEventListener('mouseout', function() {
        document.getElementById('planet-name').innerHTML = '';
      });
    }
  }
});

document.body.setAttribute('hx-ext', 'clear-planet-name');

// Function to log system events
function logEvent(event) {
  const logEntries = document.getElementById('log-entries');
  const logEntry = document.createElement('p');
  logEntry.innerHTML = event;
  logEntries.appendChild(logEntry);
  logEntries.scrollTop = logEntries.scrollHeight;
}

// Function to update planet appearance
function updatePlanet(planetName, updates) {
  const planet = document.getElementById(planetName.toLowerCase());
  const orbit = planet.previousElementSibling;
  if (planet) {
    if (updates.color) {
      planet.style.backgroundColor = updates.color;
    }
    if (updates.size) {
      planet.style.width = `${updates.size}px`;
      planet.style.height = `${updates.size}px`;
    }
    if (updates.orbit) {
      orbit.style.width = `${updates.orbit * 2}px`;
      orbit.style.height = `${updates.orbit * 2}px`;
    }
  }
}

// Function to remove a planet
function removePlanet(planetName) {
  const planet = document.getElementById(planetName.toLowerCase());
  const orbit = planet.previousElementSibling;
  if (planet && orbit) {
    solarSystem.removeChild(planet);
    solarSystem.removeChild(orbit);
  }
}

// Function to get emoji for action
function getActionEmoji(action) {
  const actionMap = {
    '/colonize': '🏙️',
    '/terraform': '🌱',
    '/mine': '⛏️',
    '/explore': '🚀',
    '/build': '🏗️',
    '/research': '🔬',
    '/attack': '💥',
    '/defend': '🛡️'
  };

  return actionMap[action.split(' ')[0]] || '🔧';
}

// Function to get planet emoji
function getPlanetEmoji(planetName) {
  const planetMap = {
    'Mercury': '☿️',
    'Venus': '♀️',
    'Earth': '🌎',
    'Mars': '♂️',
    'Jupiter': '♃',
    'Saturn': '♄',
    'Uranus': '⛢',
    'Neptune': '♆'
  };
  
  return planetMap[planetName] || '🪐';
}

// Function to make API calls for all colonized planets
async function makeApiCalls() {
  const responses = await Promise.all(colonizedPlanets.map(planet => 
    fetch(`/api/${planet.toLowerCase()}?turn=${currentTurn}`).then(res => res.json())
  ));
  
  let systemChanges = [];

  responses.forEach((response, index) => {
    const planet = colonizedPlanets[index];
    if (response.action) {
      const actionParts = response.action.split(' ');
      const action = actionParts[0];
      const targetPlanet = actionParts[1] || planet;
      const actionEmoji = getActionEmoji(action);
      const planetEmoji = getPlanetEmoji(targetPlanet);
      
      logEvent(`T${currentTurn}: ${planet} - ${response.lore} | ${actionEmoji}${planetEmoji} ${response.action}`);
      
      if (action === '/explore') {
        if (!explorationStatus[targetPlanet]) {
          explorationStatus[targetPlanet] = {
            turnsExplored: 1,
            exploringPlanet: planet
          };
        } else {
          explorationStatus[targetPlanet].turnsExplored++;
        }

        if (explorationStatus[targetPlanet].turnsExplored >= 3) {
          logEvent(`T${currentTurn}: ${planet} - Exploration of ${targetPlanet} complete. Ready for colonization.`);
        }
      } else if (action === '/colonize') {
        if (explorationStatus[targetPlanet] && explorationStatus[targetPlanet].turnsExplored >= 3) {
          if (!colonizedPlanets.includes(targetPlanet)) {
            colonizedPlanets.push(targetPlanet);
            logEvent(`T${currentTurn}: ${targetPlanet} has been successfully colonized!`);
            systemChanges.push({ type: 'colonize', planet: targetPlanet });
          }
          delete explorationStatus[targetPlanet];
        } else {
          logEvent(`T${currentTurn}: Colonization of ${targetPlanet} failed. More exploration needed.`);
        }
      } else if (action === '/mine') {
        systemChanges.push({ type: 'mine', planet: targetPlanet });
      }
      
      if (response.planetUpdates) {
        for (const [planet, updates] of Object.entries(response.planetUpdates)) {
          systemChanges.push({ type: 'update', planet: planet, updates: updates });
        }
      }
    }
  });

  // Call the system view update API
  await updateSystemView(systemChanges);

  currentTurn++;
  updateTurnButton();
}

// Function to update the system view based on changes
async function updateSystemView(changes) {
  const response = await fetch('/api/update-system-view', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ changes: changes, turn: currentTurn }),
  }).then(res => res.json());

  if (response.updates) {
    response.updates.forEach(update => {
      if (update.type === 'update') {
        updatePlanet(update.planet, update.updates);
      } else if (update.type === 'remove') {
        removePlanet(update.planet);
      } else if (update.type === 'add') {
        createPlanet(update.planetData);
      }
    });
  }

  if (response.message) {
    logEvent(`T${currentTurn}: System Update - ${response.message}`);
  }
}

// Function to update the turn button
function updateTurnButton() {
  const turnButton = document.getElementById('turn-button');
  turnButton.textContent = `Next Turn (${currentTurn})`;
}

// HTMX event listeners for API calls
document.body.addEventListener('htmx:afterOnLoad', function(event) {
  if (event.detail.elt.id === 'log-entries') {
    const response = JSON.parse(event.detail.xhr.response);
    if (response.customEvent) {
      logEvent(`T${currentTurn}: SE: ${response.customEvent}`);
    }
  }
});

// Initial log message
logEvent("T1: Earth - As humanity gazes upon the stars, a spark of curiosity ignites. The first steps towards space exploration begin, marking the dawn of a new era. | 🚀🌎 /explore Earth");

// Custom event form submission
document.getElementById('custom-event-form').addEventListener('htmx:afterOnLoad', function(event) {
  const customEventInput = document.getElementById('custom-event-input');
  customEventInput.value = '';
});

// Initialize the turn button
updateTurnButton();

// Add click event listener to the turn button
document.getElementById('turn-button').addEventListener('click', makeApiCalls);
</script>
</body></html>
