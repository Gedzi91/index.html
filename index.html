<html><head><base href="https://games.reimagined/lunar-lander?theme=yahoo"><title>YaHoO! Lunar Lander 2100: Quantum Descent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background-color: #000;
    font-family: 'Orbitron', sans-serif;
    color: #720e9e;
  }
  #game-container {
    position: relative;
    width: 100%;
    height: 100%;
  }
  #game-canvas, #background-canvas, #quantum-overlay, #particle-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 15px;
    background: rgba(255, 255, 255, 0.8);
    border: 2px solid #720e9e;
    border-radius: 10px;
    font-size: 16px;
    box-shadow: 0 0 10px #720e9e;
  }
  #controls-info {
    position: absolute;
    bottom: 20px;
    left: 20px;
    padding: 15px;
    background: rgba(255, 255, 255, 0.8);
    border: 2px solid #720e9e;
    border-radius: 10px;
    font-size: 16px;
    box-shadow: 0 0 10px #720e9e;
  }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px;
    background: rgba(255, 255, 255, 0.9);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    display: none;
    border: 3px solid #720e9e;
    box-shadow: 0 0 20px #720e9e;
  }
  .hud-value {
    color: #f60;
    font-weight: bold;
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="background-canvas"></canvas>
  <canvas id="particle-canvas"></canvas>
  <canvas id="game-canvas"></canvas>
  <canvas id="quantum-overlay"></canvas>
  <div id="hud">
    Altitude: <span id="altitude" class="hud-value">1000</span> m<br>
    Velocity: <span id="velocity" class="hud-value">0</span> m/s<br>
    Fuel: <span id="fuel" class="hud-value">100</span>%<br>
    Yahoo! Points: <span id="yahoo-points" class="hud-value">0</span>
  </div>
  <div id="controls-info">
    Controls: W - Thrust, A/D - Rotate, S - Yahoo! Boost
  </div>
  <div id="message"></div>
</div>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const quantumOverlay = document.getElementById('quantum-overlay');
const qCtx = quantumOverlay.getContext('2d');
const backgroundCanvas = document.getElementById('background-canvas');
const bgCtx = backgroundCanvas.getContext('2d');
const particleCanvas = document.getElementById('particle-canvas');
const pCtx = particleCanvas.getContext('2d');

let width, height;

const lander = {
  x: 0,
  y: 0,
  velocity: { x: 0, y: 0 },
  angle: 0,
  thrusting: false,
  fuel: 100,
  yahooBoost: 0,
  width: 40,
  height: 50
};

const terrain = [];
let landingPads = [];
let stars = [];
let obstacles = [];
let particles = [];
let gameState = 'playing';
let yahooPoints = 0;

// Load game assets
const thrusterSound = new Audio('https://games.reimagined/assets/yahoo_thrust.mp3');
const explosionSound = new Audio('https://games.reimagined/assets/yahoo_explosion.mp3');
const landingSound = new Audio('https://games.reimagined/assets/yahoo_landing.mp3');
const yahooSound = new Audio('https://games.reimagined/assets/yahoo_boost.mp3');

function resizeCanvas() {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
  quantumOverlay.width = width;
  quantumOverlay.height = height;
  backgroundCanvas.width = width;
  backgroundCanvas.height = height;
  particleCanvas.width = width;
  particleCanvas.height = height;
  generateLevel();
}

function generateLevel() {
  generateTerrain();
  generateStars();
  generateObstacles();
  resetLander();
}

function generateStars() {
  stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * width,
      y: Math.random() * height,
      size: Math.random() * 2 + 1,
      twinkle: Math.random()
    });
  }
}

function generateObstacles() {
  obstacles = [];
  for (let i = 0; i < 7; i++) {
    obstacles.push({
      x: Math.random() * width,
      y: Math.random() * height * 0.6,
      radius: Math.random() * 40 + 25,
      rotationSpeed: (Math.random() - 0.5) * 0.03
    });
  }
}

function drawBackground() {
  const gradient = bgCtx.createLinearGradient(0, 0, 0, height);
  gradient.addColorStop(0, '#000033');
  gradient.addColorStop(0.5, '#330066');
  gradient.addColorStop(1, '#660099');
  bgCtx.fillStyle = gradient;
  bgCtx.fillRect(0, 0, width, height);
  
  // Draw stars
  stars.forEach(star => {
    const twinkle = (Math.sin(Date.now() * 0.005 + star.twinkle * 10) + 1) / 2;
    bgCtx.fillStyle = `rgba(255, 255, 255, ${0.5 + twinkle * 0.5})`;
    bgCtx.beginPath();
    bgCtx.arc(star.x, star.y, star.size * twinkle, 0, Math.PI * 2);
    bgCtx.fill();
  });
  
  // Draw Yahoo! planet
  const planetGradient = bgCtx.createRadialGradient(width * 0.8, height * 0.2, 0, width * 0.8, height * 0.2, 150);
  planetGradient.addColorStop(0, '#ff00ff');
  planetGradient.addColorStop(0.5, '#cc00cc');
  planetGradient.addColorStop(1, '#990099');
  bgCtx.fillStyle = planetGradient;
  bgCtx.beginPath();
  bgCtx.arc(width * 0.8, height * 0.2, 150, 0, Math.PI * 2);
  bgCtx.fill();
  
  // Draw atmosphere glow
  const glowGradient = bgCtx.createRadialGradient(width * 0.8, height * 0.2, 145, width * 0.8, height * 0.2, 180);
  glowGradient.addColorStop(0, 'rgba(255, 105, 180, 0.4)');
  glowGradient.addColorStop(1, 'rgba(255, 105, 180, 0)');
  bgCtx.fillStyle = glowGradient;
  bgCtx.beginPath();
  bgCtx.arc(width * 0.8, height * 0.2, 180, 0, Math.PI * 2);
  bgCtx.fill();
}

function generateTerrain() {
  terrain.length = 0;
  landingPads.length = 0;
  
  let x = 0;
  let y = height * 0.8;
  
  while (x < width) {
    terrain.push({ x, y });
    
    if (Math.random() < 0.1 && landingPads.length < 3) {
      const padWidth = Math.random() * 120 + 80;
      landingPads.push({ x, width: padWidth, y });
      x += padWidth;
      terrain.push({ x, y });
    } else {
      x += Math.random() * 60 + 30;
      y += (Math.random() - 0.5) * 60;
      y = Math.max(height * 0.5, Math.min(height * 0.9, y));
    }
  }
}

function resetLander() {
  lander.x = width / 2;
  lander.y = height * 0.1;
  lander.velocity = { x: 0, y: 0 };
  lander.angle = 0;
  lander.fuel = 100;
  lander.yahooBoost = 0;
  yahooPoints = 0;
  gameState = 'playing';
}

function drawTerrain() {
  ctx.strokeStyle = '#720e9e';
  ctx.lineWidth = 3;
  ctx.beginPath();
  terrain.forEach((point, index) => {
    if (index === 0) {
      ctx.moveTo(point.x, point.y);
    } else {
      ctx.lineTo(point.x, point.y);
    }
  });
  ctx.stroke();
  
  ctx.fillStyle = '#f60';
  landingPads.forEach(pad => {
    ctx.fillRect(pad.x, pad.y, pad.width, 8);
    
    // Add landing pad lights
    for (let i = 0; i < pad.width; i += 20) {
      ctx.fillStyle = `rgba(255, 255, 0, ${0.7 + Math.sin(Date.now() * 0.01 + i) * 0.3})`;
      ctx.fillRect(pad.x + i, pad.y - 5, 10, 5);
    }
  });
}

function drawLander() {
  ctx.save();
  ctx.translate(lander.x, lander.y);
  ctx.rotate(lander.angle);

  // Draw lander body (Yahoo! themed)
  ctx.fillStyle = '#720e9e';
  ctx.beginPath();
  ctx.moveTo(0, -lander.height / 2);
  ctx.lineTo(-lander.width / 2, lander.height / 2);
  ctx.lineTo(lander.width / 2, lander.height / 2);
  ctx.closePath();
  ctx.fill();

  // Draw Yahoo! logo
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 16px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Y!', 0, 0);

  // Draw legs
  ctx.strokeStyle = '#f60';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-lander.width / 2, lander.height / 2);
  ctx.lineTo(-lander.width / 2 - 10, lander.height / 2 + 15);
  ctx.moveTo(lander.width / 2, lander.height / 2);
  ctx.lineTo(lander.width / 2 + 10, lander.height / 2 + 15);
  ctx.stroke();

  // Draw thrusters
  if (lander.thrusting && lander.fuel > 0) {
    const flameHeight = 20 + Math.random() * 10;
    const flameGradient = ctx.createLinearGradient(0, lander.height / 2, 0, lander.height / 2 + flameHeight);
    flameGradient.addColorStop(0, '#ff00ff');
    flameGradient.addColorStop(0.5, '#ff6600');
    flameGradient.addColorStop(1, '#ffcc00');
    ctx.fillStyle = flameGradient;
    ctx.beginPath();
    ctx.moveTo(-lander.width / 6, lander.height / 2);
    ctx.quadraticCurveTo(0, lander.height / 2 + flameHeight, lander.width / 6, lander.height / 2);
    ctx.closePath();
    ctx.fill();
    
    // Play thruster sound
    if (thrusterSound.paused) {
      thrusterSound.play();
    }
  } else {
    thrusterSound.pause();
    thrusterSound.currentTime = 0;
  }

  ctx.restore();
}

function drawObstacles() {
  obstacles.forEach(obstacle => {
    ctx.save();
    ctx.translate(obstacle.x, obstacle.y);
    ctx.rotate(Date.now() * obstacle.rotationSpeed);
    
    // Draw Yahoo! themed obstacle
    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, obstacle.radius);
    gradient.addColorStop(0, '#ff00ff');
    gradient.addColorStop(0.7, '#cc00cc');
    gradient.addColorStop(1, '#990099');
    ctx.fillStyle = gradient;
    
    ctx.beginPath();
    const spikes = 5;
    for (let i = 0; i < spikes * 2; i++) {
      const radius = i % 2 === 0 ? obstacle.radius : obstacle.radius * 0.5;
      const angle = (Math.PI * 2 * i) / (spikes * 2);
      ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
    }
    ctx.closePath();
    ctx.fill();
    
    // Add glow effect
    ctx.shadowColor = '#ff00ff';
    ctx.shadowBlur = 20;
    ctx.stroke();
    
    // Draw Yahoo! logo on obstacle
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Y!', 0, 0);
    
    ctx.restore();
  });
}

function updateLander() {
  if (gameState !== 'playing') return;

  const gravity = 0.02;
  const thrust = 0.04;
  
  lander.velocity.y += gravity;
  
  if (lander.thrusting && lander.fuel > 0) {
    lander.velocity.x += Math.sin(lander.angle) * thrust;
    lander.velocity.y -= Math.cos(lander.angle) * thrust;
    lander.fuel = Math.max(0, lander.fuel - 0.1);
    
    // Add thruster particles
    for (let i = 0; i < 5; i++) {
      particles.push({
        x: lander.x + (Math.random() - 0.5) * 10,
        y: lander.y +lander.height / 2,
        vx: (Math.random() - 0.5) * 2,
        vy: Math.random() * 5 + 2,
        life: 30,
        color: `hsl(${Math.random() * 60 + 300}, 100%, 50%)`
      });
    }
  }
  
  lander.x += lander.velocity.x;
  lander.y += lander.velocity.y;
  
  // Yahoo! Boost effects
  lander.yahooBoost += (Math.random() - 0.5) * 0.2;
  lander.yahooBoost = Math.max(0, Math.min(100, lander.yahooBoost));
  
  if (lander.yahooBoost > 50) {
    lander.x += (Math.random() - 0.5) * lander.yahooBoost * 0.05;
    lander.y += (Math.random() - 0.5) * lander.yahooBoost * 0.05;
    yahooPoints += Math.floor(lander.yahooBoost / 10);
  }
  
  // Collision detection with terrain
  for (let i = 0; i < terrain.length - 1; i++) {
    if (lander.x >= terrain[i].x && lander.x < terrain[i + 1].x) {
      const terrainY = terrain[i].y + (terrain[i + 1].y - terrain[i].y) * 
        ((lander.x - terrain[i].x) / (terrain[i + 1].x - terrain[i].x));
      
      if (lander.y + lander.height / 2 >= terrainY) {
        const pad = landingPads.find(p => lander.x >= p.x && lander.x <= p.x + p.width);
        if (pad && Math.abs(lander.velocity.y) < 1 && Math.abs(lander.velocity.x) < 0.5 && Math.abs(lander.angle) < 0.1) {
          showMessage('YaHoO! Successful landing!', '#720e9e');
          landingSound.play();
          yahooPoints += 1000;
        } else {
          showMessage('Oops! Crash landing!', '#ff0000');
          explosionSound.play();
          createExplosion(lander.x, lander.y);
        }
        gameState = 'ended';
        return;
      }
    }
  }
  
  // Collision detection with obstacles
  obstacles.forEach(obstacle => {
    const dx = lander.x - obstacle.x;
    const dy = lander.y - obstacle.y;
    const distance = Math.sqrt(dx * dx + dy * dy);
    if (distance < obstacle.radius + lander.width / 2) {
      showMessage('Yahoo! Obstacle collision!', '#ff0000');
      explosionSound.play();
      createExplosion(lander.x, lander.y);
      gameState = 'ended';
    }
  });

  // Update HUD
  document.getElementById('altitude').textContent = Math.floor(height - lander.y);
  document.getElementById('velocity').textContent = (Math.sqrt(lander.velocity.x ** 2 + lander.velocity.y ** 2) * 10).toFixed(1);
  document.getElementById('fuel').textContent = Math.floor(lander.fuel);
  document.getElementById('yahoo-points').textContent = yahooPoints;
}

function drawYahooEffects() {
  qCtx.clearRect(0, 0, width, height);
  
  if (lander.yahooBoost > 0) {
    const gradient = qCtx.createRadialGradient(lander.x, lander.y, 0, lander.x, lander.y, lander.yahooBoost);
    gradient.addColorStop(0, `rgba(255, 102, 0, ${lander.yahooBoost / 200})`);
    gradient.addColorStop(1, 'rgba(255, 102, 0, 0)');
    
    qCtx.fillStyle = gradient;
    qCtx.beginPath();
    qCtx.arc(lander.x, lander.y, lander.yahooBoost, 0, Math.PI * 2);
    qCtx.fill();
    
    for (let i = 0; i < lander.yahooBoost / 5; i++) {
      qCtx.fillStyle = `rgba(255, 102, 0, ${Math.random() * 0.5})`;
      qCtx.beginPath();
      qCtx.arc(
        lander.x + (Math.random() - 0.5) * lander.yahooBoost * 2,
        lander.y + (Math.random() - 0.5) * lander.yahooBoost * 2,
        Math.random() * 3,
        0,
        Math.PI * 2
      );
      qCtx.fill();
    }
    
    // Add Yahoo! particles
    for (let i = 0; i < lander.yahooBoost / 2; i++) {
      const particleSize = Math.random() * 2 + 1;
      const distance = Math.random() * lander.yahooBoost;
      const angle = Math.random() * Math.PI * 2;
      const x = lander.x + Math.cos(angle) * distance;
      const y = lander.y + Math.sin(angle) * distance;
      
      qCtx.fillStyle = `rgba(255, 102, 0, ${Math.random() * 0.7})`;
      qCtx.beginPath();
      qCtx.arc(x, y, particleSize, 0, Math.PI * 2);
      qCtx.fill();
    }
  }
}

function showMessage(text, color) {
  const messageEl = document.getElementById('message');
  messageEl.textContent = text;
  messageEl.style.color = color;
  messageEl.style.display = 'block';
  setTimeout(() => {
    messageEl.style.display = 'none';
  }, 3000);
}

function createExplosion(x, y) {
  for (let i = 0; i < 100; i++) {
    particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 10,
      vy: (Math.random() - 0.5) * 10,
      life: 60,
      color: `hsl(${Math.random() * 60 + 15}, 100%, 50%)`
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  });
}

function drawParticles() {
  pCtx.clearRect(0, 0, width, height);
  particles.forEach(p => {
    pCtx.fillStyle = p.color || `rgba(255, 102, 0, ${p.life / 30})`;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    pCtx.fill();
  });
}

function gameLoop() {
  ctx.clearRect(0, 0, width, height);
  
  drawBackground();
  drawTerrain();
  drawObstacles();
  updateLander();
  drawLander();
  drawYahooEffects();
  updateParticles();
  drawParticles();
  
  requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown', (e) => {
  if (gameState !== 'playing') return;
  if (e.key === 'w') lander.thrusting = true;
  if (e.key === 'a') lander.angle -= 0.05;
  if (e.key === 'd') lander.angle += 0.05;
  if (e.key === 's') {
    lander.yahooBoost = Math.min(100, lander.yahooBoost + 20);
    yahooSound.play();
  }
});

window.addEventListener('keyup', (e) => {
  if (e.key === 'w') lander.thrusting = false;
});

window.addEventListener('click', () => {
  if (gameState === 'ended') {
    generateLevel();
  }
});

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
gameLoop();
</script>
</body></html>
