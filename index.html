  };

  const preloadedMIDIs = {};
  let isSynthDisposed = false; // Disposal flag
  let synth;

  async function preloadMIDIs() {
    for (const [name, url] of Object.entries(exampleMIDIs)) {
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const arrayBuffer = await response.arrayBuffer();
        preloadedMIDIs[name] = new Midi(arrayBuffer);
        console.log(`Preloaded MIDI: ${name}`);
      } catch (error) {
        console.error(`Failed to preload MIDI "${name}":`, error);
        alert(`Failed to preload the MIDI file: ${name}. Please check the URL or try another file.`);
      }
    }
  }

  const pikachu = document.getElementById('pikachu');
  const speechBubble = document.getElementById('speech-bubble');

  const messages = [
    "Pika Pika! Welcome to Pikachu's Piano!",
    "Zap your way through the controls!",
    "Catch the perfect note with each click!",
    "Elekid your creativity today!",
    "Thanks for playing! Stay electrified!",
  ];

  const cheekyMessages = [
    "Pssst, I think you should click that link!",
    "Ooh, that one looks interesting!",
    "I bet there's something cool behind that link!",
    "Go ahead, take a peek! I won't tell anyone!",
    "Trust me, you won't regret clicking that one!",
    "This link is going to spark your interest!",
    "I've got a good feeling about this one!",
    "I'm not saying it's the best link ever, but...",
    "If you don't click this link, I'll say bye-bye!",
    "I've seen a lot of links in my day, but this one takes the cake!",
    "Lightning strikes for awesome links - click it!",
    "You know what they say: when life gives you links, click 'em!",
    "Friends don't let friends ignore good links!",
    "Trust Pikachu's instincts - this link is worth exploring!"
  ];

  let currentMessageIndex = 0;

  window.addEventListener('load', () => {
    speechBubble.textContent = messages[0];
    speechBubble.classList.add('show');
    pikachu.classList.add('wiggle');

    setTimeout(() => {
      speechBubble.classList.remove('show');
      pikachu.classList.remove('wiggle');
    }, 3000);
  });

  pikachu.addEventListener('mouseover', () => {
    speechBubble.classList.add('show');
    pikachu.classList.add('bounce');
  });

  pikachu.addEventListener('mouseout', () => {
    speechBubble.classList.remove('show');
    pikachu.classList.remove('bounce');
  });

  pikachu.addEventListener('click', () => {
    speechBubble.textContent = messages[currentMessageIndex];
    speechBubble.classList.add('show');
    pikachu.classList.add('wiggle');
    
    currentMessageIndex = (currentMessageIndex + 1) % messages.length;
    
    setTimeout(() => {
      speechBubble.classList.remove('show');
      pikachu.classList.remove('wiggle');
    }, 3000);
  });

  const links = document.querySelectorAll('a');

  links.forEach(link => {
    link.addEventListener('mouseenter', () => {
      if (Math.random() < 0.3) {
        const randomIndex = Math.floor(Math.random() * cheekyMessages.length);
        speechBubble.textContent = cheekyMessages[randomIndex];
        speechBubble.classList.add('show');
        pikachu.classList.add('wiggle');

      pikachu.classList.remove('wiggle');

    let isMidiPlaying = false;

    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const downloadMIDIBtn = document.getElementById('downloadMIDIBtn');
    const stopMidiBtn = document.getElementById('stopMidiBtn'); 
    const tempoInput = document.getElementById('tempo');
    const startMetronomeBtn = document.getElementById('startMetronome');
    const stopMetronomeBtn = document.getElementById('stopMetronome');
    const whiteKeys = document.querySelectorAll('.key.white');
    const blackKeys = document.querySelectorAll('.key.black');

    const volumeSlider = document.getElementById('volume');
    const oscillatorTypeSelect = document.getElementById('oscillatorType');
    const attackSlider = document.getElementById('attack');
    const decaySlider = document.getElementById('decay');
    const sustainSlider = document.getElementById('sustain');
    const releaseSlider = document.getElementById('release');

    window.addEventListener('load', async () => {
      await preloadMIDIs();

      try {
        metronomeSynth = new Tone.Synth({
          oscillator: {
            type: 'square'
          },
          envelope: {
            attack: 0.001,
            decay: 0.1,
            sustain: 0
          }
        }).toDestination();

        console.log("Metronome synth initialized successfully.");
      } catch (error) {
        console.error("Metronome synth failed to initialize:", error);
        alert("Failed to initialize the metronome. Please try again.");
        startMetronomeBtn.disabled = true;
        stopMetronomeBtn.disabled = true;
      }
    });

    function ensureSynthInitialized() {
      if (!synth || isSynthDisposed) {
        initSynth(instrumentSelect.value);
      }
    }

    function initSynth(instrumentType) {
      if (synth && !isSynthDisposed) {
        synth.disconnect();
        synth.dispose();
        synth = null; // Set synth to null after disposal
        isSynthDisposed = true;
      }

      switch (instrumentType) {
        case 'AMSynth':
          synth = new Tone.PolySynth(Tone.AMSynth, { polyphony: 32, volume: -10 }).toDestination();
          break;
        case 'FMSynth':
          synth = new Tone.PolySynth(Tone.FMSynth, { polyphony: 32, volume: -10 }).toDestination();
          break;
        case 'DuoSynth':
          synth = new Tone.PolySynth(Tone.DuoSynth, { polyphony: 32, volume: -10 }).toDestination();
          break;
        case 'MonoSynth':
          synth = new Tone.MonoSynth({ volume: -10 }).toDestination();
          break;
        case 'PluckSynth':
          synth = new Tone.PluckSynth({ volume: -10 }).toDestination();
          break;
        case 'Membrane':
          synth = new Tone.PolySynth(Tone.MembraneSynth, { polyphony: 32, volume: -10 }).toDestination();
          break;
        case 'MetalSynth':
          synth = new Tone.PolySynth(Tone.MetalSynth, { polyphony: 32, volume: -10 }).toDestination();
          break;
        case 'VoltorbSynth':
          synth = new Tone.PolySynth(Tone.Synth, {
            polyphony: 32,
            volume: -10,
            oscillator: {
              type: 'fatsawtooth',
              count: 3,
              spread: 30
            },
            envelope: {
              attack: 0.01,
              decay: 0.1,
              sustain: 0.5,
              release: 0.4,
              attackCurve: 'exponential'
            }
          });

          const distortion = new Tone.Distortion(0.8);
          const tremolo = new Tone.Tremolo({
            frequency: 10,
            type: 'square',
            depth: 0.6,
            spread: 180
          });

          synth.chain(tremolo, distortion, Tone.Destination);
          break;
        case 'EeveeSynth':
          synth = new Tone.Sampler({
            urls: {
              C3: 'https://tonejs.github.io/audio/salamander/C3.mp3',
              E3: 'https://tonejs.github.io/audio/salamander/C3.mp3',
              G3: 'https://tonejs.github.io/audio/salamander/C3.mp3',
            },
            volume: -10,
            release: 0.5,
            curve: 'exponential'
          });

          const phaser = new Tone.Phaser({
            frequency: 0.5,
            octaves: 3,
            baseFrequency: 1000 
          });
          const feedbackDelay = new Tone.FeedbackDelay('8n', 0.5);
          synth.chain(phaser, feedbackDelay, Tone.Destination);
          break;
        case 'MewSynth':
          synth = new Tone.FMSynth({
            volume: -10,
            harmonicity: 8,
            modulationIndex: 10,
            oscillator: {
               type: 'sine'
            },
            envelope: {
              attack: 0.001,
              decay: 2,
              sustain: 0.1,
              release: 2
            },
            modulation: {
              type: 'square'
            },
            modulationEnvelope: {
              attack: 0.002,
              decay: 0.2,
              sustain: 0,
              release: 0.2
            }
          });

          const pitchShift = new Tone.PitchShift({
            pitch: 12,
            windowSize: 0.1,
            delayTime: 0,
            feedback: 0
          });
          const reverb = new Tone.Reverb({
            decay: 4,
            preDelay: 0.01 
          });

          synth.chain(pitchShift, reverb, Tone.Destination);
          break;
        case 'SnorlaxSynth':
          synth = new Tone.Synth({
            oscillator: {
              type: 'sine',
            },
            envelope: {
              attack: 1,
              decay: 0.2,
              sustain: 0.2,
              release: 2,
            },
            volume: -20,
          });

          const chorus = new Tone.Chorus(4, 2.5, 0.5);
          const vibrato = new Tone.Vibrato(5, 0.1);
          const reverbS = new Tone.Reverb({
            decay: 4,
            wet: 0.5,
          });

          synth.chain(chorus, vibrato, reverbS, Tone.Destination);
          break;
        case 'Synth':
          synth = new Tone.Synth({ volume: -10 }).toDestination();
          break;
        default:
          synth = new Tone.PolySynth(Tone.AMSynth, { polyphony: 32, volume: -10 }).toDestination();
      }

      isSynthDisposed = false; // Reset the flag after initialization

      initializeSynthControls();
    }

    function initializeSynthControls() {
      if (synth.volume) {
        volumeSlider.value = synth.volume.value;
      }
      if (synth.oscillator && synth.oscillator.type) {
        oscillatorTypeSelect.value = synth.oscillator.type;
      }
      if (synth.envelope) {
        attackSlider.value = synth.envelope.attack;
        decaySlider.value = synth.envelope.decay;
        sustainSlider.value = synth.envelope.sustain;
        releaseSlider.value = synth.envelope.release;
      }
    }

    instrumentSelect.addEventListener('change', (event) => {
      initSynth(event.target.value);
      
      const selectedColor = event.target.selectedOptions[0].dataset.color;
      
      document.querySelectorAll('.key.white').forEach(key => {
        key.style.background = `linear-gradient(to bottom, #fff, ${selectedColor})`;
      });
      document.querySelectorAll('.key.black').forEach(key => {
        key.style.background = `linear-gradient(to bottom, #777, ${selectedColor})`;
      });

      document.body.style.background = `radial-gradient(circle at center, ${selectedColor}, #ff9d00)`;
    });

    volumeSlider.addEventListener('input', (event) => {
      const volume = parseInt(event.target.value, 10);
      ensureSynthInitialized();
      if (synth.volume) {
        synth.volume.value = volume;
      }
    });

    oscillatorTypeSelect.addEventListener('change', (event) => {
      ensureSynthInitialized();
      const type = event.target.value;
      if (synth.set && typeof synth.set === 'function') {
        synth.set({ oscillator: { type } });
      }
    });

    attackSlider.addEventListener('input', (event) => {
      const attack = parseFloat(event.target.value);
      ensureSynthInitialized();
      if (synth.envelope) {
        synth.envelope.attack = attack;
      } else if (synth.get && synth.get().envelope) {
        synth.get().envelope.attack = attack;
      }
    });

    decaySlider.addEventListener('input', (event) => {
      const decay = parseFloat(event.target.value);
      ensureSynthInitialized();
      if (synth.envelope) {
        synth.envelope.decay = decay;
      } else if (synth.get && synth.get().envelope) {
        synth.get().envelope.decay = decay;
      }
    });

    sustainSlider.addEventListener('input', (event) => {
      const sustain = parseFloat(event.target.value);
      ensureSynthInitialized();
      if (synth.envelope) {
        synth.envelope.sustain = sustain;
      } else if (synth.get && synth.get().envelope) {
        synth.get().envelope.sustain = sustain;
      }
    });

    releaseSlider.addEventListener('input', (event) => {
      const release = parseFloat(event.target.value);
      ensureSynthInitialized();
      if (synth.envelope) {
        synth.envelope.release = release;
      } else if (synth.get && synth.get().envelope) {
        synth.get().envelope.release = release;
      }
    });

    initSynth(instrumentSelect.value);

    recordBtn.addEventListener('click', () => {
      isRecording = true;
      recordedNotes = [];
      recordStartTime = Date.now();
      recordBtn.disabled = true;
      playBtn.disabled = true;
      stopBtn.disabled = false;
      downloadMIDIBtn.disabled = true;
    });

    stopBtn.addEventListener('click', () => {
      isRecording = false;
      recordBtn.disabled = false;
      playBtn.disabled = recordedNotes.length === 0;
      stopBtn.disabled = true;
      downloadMIDIBtn.disabled = recordedNotes.length === 0;
    });

    playBtn.addEventListener('click', async () => {
      ensureSynthInitialized();

      if (recordedNotes.length === 0) return;

      isMidiPlaying = true; 
      stopMidiBtn.disabled = false; 

      playBtn.disabled = true;
      recordBtn.disabled = true;
      stopBtn.disabled = true;

      try {
        const part = new Tone.Part((time, noteEvent) => {
          try {
            synth.triggerAttackRelease(noteToFrequency(noteEvent.note), "8n", time);
            const key = document.querySelector(`[data-midi="${noteEvent.midi}"]`);
            if (key) {
              key.classList.add('pressed');
              setTimeout(() => {
                key.classList.remove('pressed');
              }, Tone.Time("8n").toMilliseconds());
            }
          } catch (error) {
            console.error("Error during play:", error);
          }
        }, recordedNotes.map(event => ({
          time: event.time / 1000,
          note: noteToFrequency(event.midi),
          midi: event.midi
        })));

        part.start(0);
        await Tone.start();
        Tone.Transport.start();

        const lastNoteTime = recordedNotes[recordedNotes.length - 1].time / 1000;
        Tone.Transport.schedule(() => {
          Tone.Transport.stop();
          part.dispose();
          isMidiPlaying = false; 
          stopMidiBtn.disabled = true; 
          playBtn.disabled = false;
          recordBtn.disabled = false;
        }, `+${lastNoteTime + 1}`);
      } catch (error) {
        console.error("Playback Error:", error);
        alert("An error occurred during playback.");
        isMidiPlaying = false; 
        stopMidiBtn.disabled = true; 
        playBtn.disabled = false;
        recordBtn.disabled = false;
      }
    });

    async function playLoadedMidi(midi) {
      if (!midi) {
        alert("No MIDI file loaded.");
        return;
      }

      ensureSynthInitialized();
      if (!synth || isSynthDisposed) {
        alert("Synth failed to initialize.");
        return;
      }

      try {
        isMidiPlaying = true; 
        stopMidiBtn.disabled = false; 

        playBtn.disabled = true;
        recordBtn.disabled = true;
        playExampleBtn.disabled = true;
        playUploadedBtn.disabled = true;

        const now = Tone.now();

        const part = new Tone.Part((time, noteEvent) => {
          try {
            synth.triggerAttackRelease(
              noteEvent.name,
              noteEvent.duration,
              time,
              noteEvent.velocity
            );

            const key = document.querySelector(`[data-note="${noteEvent.name}"]`);
            if (key) {
              key.classList.add('pressed');

              Tone.Transport.scheduleOnce(() => {
                key.classList.remove('pressed');
              }, time + noteEvent.duration);
            }
          } catch (error) {
            console.error("Error during MIDI playback:", error);
          }
        }, midi.tracks[0].notes);

        part.start(now);
        await Tone.start();
        Tone.Transport.start();

        const totalDuration = midi.duration;

        Tone.Transport.scheduleOnce(() => {
          Tone.Transport.stop();
          part.dispose();
          isMidiPlaying = false; 
          stopMidiBtn.disabled = true; 
          playBtn.disabled = false;
          recordBtn.disabled = false;
          playExampleBtn.disabled = false;
          playUploadedBtn.disabled = false;
        }, `+${totalDuration}`);

      } catch (error) {
        console.error("Error during MIDI playback:", error);
        alert("An error occurred while playing the MIDI file.");
        isMidiPlaying = false; 
        stopMidiBtn.disabled = true; 
        playBtn.disabled = false;
        recordBtn.disabled = false;
        playExampleBtn.disabled = false;
        playUploadedBtn.disabled = false;
      }
    }

    exampleSelect.addEventListener('change', () => {
      if (exampleSelect.value) {
        playExampleBtn.disabled = false;
      } else {
        playExampleBtn.disabled = true;
      }
    });

    playExampleBtn.addEventListener('click', async () => {
      const selectedValue = exampleSelect.value;
      if (!selectedValue) {
        alert("Please select a MIDI song to play.");
        return;
      }

      const midiEntry = Object.entries(exampleMIDIs).find(([key, url]) => url === selectedValue);
      if (!midiEntry) {
        alert("Selected MIDI song is not available.");
        return;
      }

      const [midiName, midiURL] = midiEntry;
      const midi = preloadedMIDIs[midiName];
      if (!midi) {
        alert("Failed to load the selected example MIDI song.");
        return;
      }

      loadedMidi = midi;
      playLoadedMidi(loadedMidi);
    });

    midiFileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (file && (file.name.endsWith('.mid') || file.name.endsWith('.midi'))) {
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const midi = new Midi(e.target.result);
            loadedMidi = midi;
            playUploadedBtn.disabled = false;
          } catch (error) {
            console.error("Failed to parse uploaded MIDI:", error);
            alert("Failed to parse the uploaded MIDI file.");
          }
        };
        reader.readAsArrayBuffer(file);
      } else {
        alert("Please upload a valid MIDI file.");
        playUploadedBtn.disabled = true;
      }
    });

    playUploadedBtn.addEventListener('click', () => {
      if (loadedMidi) {
        playLoadedMidi(loadedMidi);
      }
    });

    document.addEventListener('keydown', (event) => {
      if (isSynthDisposed) return; // Exit if synth is disposed

      const keyPressed = event.key.toUpperCase();
      
      if (pressedKeys.has(keyPressed)) {
        return;
      }

      pressedKeys.add(keyPressed);
      ensureSynthInitialized();

      const whiteKey = Array.from(whiteKeys).find(k => k.dataset.key === keyPressed);    
      const blackKey = Array.from(blackKeys).find(k => k.dataset.key === keyPressed);

      if (whiteKey) {
        whiteKey.classList.add('pressed');
        try {
          synth.triggerAttack(noteToFrequency(whiteKey.dataset.midi), Tone.now(), 0.5);
          if (isRecording) {
            recordedNotes.push({
              midi: whiteKey.dataset.midi,
              time: Date.now() - recordStartTime
            });
          }
        } catch (error) {
          console.error("Error triggering attack on white key:", error);
        }
      } else if (blackKey) {
        blackKey.classList.add('pressed');
        try {
          synth.triggerAttack(noteToFrequency(blackKey.dataset.midi), Tone.now(), 0.5);
          if (isRecording) {
            recordedNotes.push({
              midi: blackKey.dataset.midi,
              time: Date.now() - recordStartTime
            });
          }
        } catch (error) {
          console.error("Error triggering attack on black key:", error);
        }
      }
    });

    document.addEventListener('keyup', (event) => {
      const keyReleased = event.key.toUpperCase();
      pressedKeys.delete(keyReleased);

      const whiteKey = Array.from(whiteKeys).find(k => k.dataset.key === keyReleased);
      const blackKey = Array.from(blackKeys).find(k => k.dataset.key === keyReleased);

      if (whiteKey) {
        whiteKey.classList.remove('pressed');
        const frequency = noteToFrequency(whiteKey.dataset.midi);
        if (frequency) {
          try {
            synth.triggerRelease(frequency, Tone.now());
          } catch (error) {
            console.error("Error triggering release on white key:", error);
          }
        }
      } else if (blackKey) {
        blackKey.classList.remove('pressed');
        const frequency = noteToFrequency(blackKey.dataset.midi);
        if (frequency) {
          try {
            synth.triggerRelease(frequency, Tone.now());
          } catch (error) {
            console.error("Error triggering release on black key:", error);
          }
        }
      }
    });

    function whiteKeyMouseDown(event) {
      ensureSynthInitialized();
      if (!synth || isSynthDisposed) return; // Prevent using disposed synth

      const key = event.target;
      const keyCode = key.dataset.key;
      
      if (pressedKeys.has(keyCode)) {
        return;
      }

      pressedKeys.add(keyCode);
      key.classList.add('pressed');
      try {
        synth.triggerAttack(noteToFrequency(key.dataset.midi), Tone.now(), 0.5);
        if (isRecording) {
          recordedNotes.push({
            midi: key.dataset.midi,
            time: Date.now() - recordStartTime
          });
        }
      } catch (error) {
        console.error("Error triggering attack:", error);
      }
    }

    function whiteKeyMouseUp(event) {
      ensureSynthInitialized();
      if (!synth || isSynthDisposed) return; // Prevent using disposed synth

      const key = event.target;
      const keyCode = key.dataset.key;
      pressedKeys.delete(keyCode);
      const frequency = noteToFrequency(key.dataset.midi);
      
      if (frequency) {
        try {
          synth.triggerRelease(frequency, Tone.now());
        } catch (error) {
          console.error("Error triggering release:", error);
        }
      }
      key.classList.remove('pressed');
    }

    function blackKeyMouseDown(event) {
      ensureSynthInitialized();
      if (!synth || isSynthDisposed) return; // Prevent using disposed synth

      const key = event.target;
      const keyCode = key.dataset.key;
      
      if (pressedKeys.has(keyCode)) {
        return;
      }

      pressedKeys.add(keyCode);
      key.classList.add('pressed');
      try {
        synth.triggerAttack(noteToFrequency(key.dataset.midi), Tone.now(), 0.5);
        if (isRecording) {
          recordedNotes.push({
            midi: key.dataset.midi,
            time: Date.now() - recordStartTime
          });
        }
      } catch (error) {
        console.error("Error triggering attack:", error);
      }
    }

    function blackKeyMouseUp(event) {
      ensureSynthInitialized();
      if (!synth || isSynthDisposed) return; // Prevent using disposed synth

      const key = event.target;
      const keyCode = key.dataset.key;
      pressedKeys.delete(keyCode);
      const frequency = noteToFrequency(key.dataset.midi);
      
      if (frequency) {
        try {
          synth.triggerRelease(frequency, Tone.now());
        } catch (error) {
          console.error("Error triggering release:", error);
        }
      }
      key.classList.remove('pressed');
    }

    whiteKeys.forEach(key => {
      key.addEventListener('mousedown', whiteKeyMouseDown);
      key.addEventListener('mouseup', whiteKeyMouseUp);
      key.addEventListener('mouseleave', whiteKeyMouseUp);
    });

    blackKeys.forEach(key => {
      key.addEventListener('mousedown', blackKeyMouseDown);
      key.addEventListener('mouseup', blackKeyMouseUp);    
      key.addEventListener('mouseleave', blackKeyMouseUp);  
    });  

    function noteToFrequency(midi) {    
      return Tone.Frequency(midi, "midi").toFrequency();  
    }

    startMetronomeBtn.addEventListener('click', async () => {
      if (metronomeSynth && !isMetronomePlaying) {
        const bpm = parseInt(tempoInput.value, 10);
        if (isNaN(bpm) || bpm < 60 || bpm > 200) {
          alert("Please enter a valid BPM between 60 and 200.");
          return;
        }
        Tone.Transport.bpm.value = bpm;

        Tone.Transport.scheduleRepeat((time) => {
          metronomeSynth.triggerAttackRelease("C5", "8n", time);
        }, "4n");

        try {
          await Tone.start();
          Tone.Transport.start();
          isMetronomePlaying = true;
          startMetronomeBtn.disabled = true;
          stopMetronomeBtn.disabled = false;
        } catch (error) {
          console.error("Failed to start the metronome:", error);
          alert("Failed to start the metronome. Please try again.");
        }
      }
    });

    stopMetronomeBtn.addEventListener('click', () => {
      if (isMetronomePlaying) {
        Tone.Transport.stop();
        Tone.Transport.cancel();
        isMetronomePlaying = false;

        startMetronomeBtn.disabled = false;
        stopMetronomeBtn.disabled = true;
      }
    });

    downloadMIDIBtn.addEventListener('click', () => {
      if (recordedNotes.length === 0) return;

      const midi = new Midi();
      midi.header.setTempo(120);
      const track = midi.addTrack();

      recordedNotes.forEach(noteEvent => {
        track.addNote({
          midi: parseInt(noteEvent.midi, 10),
          time: noteEvent.time / 1000,
          duration: 0.5,
        });
      });

      const midiBlob = new Blob([midi.toArray()], { type: 'audio/midi' });
      const url = URL.createObjectURL(midiBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'recording.mid';
      a.click();
      URL.revokeObjectURL(url);
    });

    stopMidiBtn.addEventListener('click', () => {
      if (isMidiPlaying) {
        Tone.Transport.stop();
        Tone.Transport.cancel(); 
        isMidiPlaying = false; 
        stopMidiBtn.disabled = true; 
        playBtn.disabled = false;
        recordBtn.disabled = false;
        playExampleBtn.disabled = false;
        playUploadedBtn.disabled = false;

        document.querySelectorAll('.key').forEach(key => key.classList.remove('pressed'));
      }
    });

    window.addEventListener('beforeunload', () => {
      if (metronomeSynth) {
        metronomeSynth.dispose();
      }
      if (synth && !isSynthDisposed) {
        synth.dispose();
        synth = null; // Set to null upon disposal
        isSynthDisposed = true;
      }
    });
  });
</script></body></html>
