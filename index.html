<html><head><base href="https://neon-chrome-cyberpunk-evolution">
<style>
:root {
  --neon-blue: #00f3ff;
  --neon-pink: #ff00ff;
  --neon-purple: #9d00ff;
  --neon-green: #00ff66;
  --neon-yellow: #ffff00;
  --neon-orange: #ff4400;
  --dark-bg: #0a0a0a;
}

body {
  background-color: var(--dark-bg);
  color: white;
  font-family: 'Share Tech Mono', monospace;
  margin: 0;
  height: 100vh;
  overflow: hidden;
}

#gameCanvas {
  width: 100%;
  height: 100%;
  display: block;
}

#hud {
  position: fixed;
  top: 20px;
  left: 20px;
  font-size: 20px;
  text-shadow: 0 0 10px var(--neon-blue);
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
<div id="hud">
  ABSORPTION: <span id="absorption">0%</span><br>
  SCORE: <span id="score">0</span><br>
  LEVEL: <span id="level">1</span><br>
  SHAPES ABSORBED: <span id="shapes">🔵:0 🟨:0 🔺:0 💎:0 ⭐:0 🔷:0</span>
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Set canvas size
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Updated game state
const game = {
    player: {
        x: canvas.width/2,
        y: canvas.height/2,
        radius: 20,
        speed: 5,
        absorption: 0,
        color: '#00f3ff',
        shape: 'circle',
        absorbed: {
            circle: 0,
            square: 0,
            triangle: 0,
            diamond: 0,
            star: 0,
            hexagon: 0
        },
        abilities: {
            specialShot: false,
            areaEffect: false,
            shield: false
        },
        health: 100
    },
    enemies: [],
    bullets: [],
    particles: [],
    keys: {},
    mouse: { x: 0, y: 0 },
    score: 0,
    level: 1,
    autoShootInterval: null
};

// Input handlers
window.addEventListener('keydown', e => game.keys[e.key] = true);
window.addEventListener('keyup', e => game.keys[e.key] = false);
window.addEventListener('mousemove', e => {
    game.mouse.x = e.clientX;
    game.mouse.y = e.clientY;
});
window.addEventListener('mousedown', startAutoShoot);
window.addEventListener('mouseup', stopAutoShoot);
window.addEventListener('touchstart', startAutoShoot);
window.addEventListener('touchend', stopAutoShoot);
window.addEventListener('touchmove', e => {
    game.mouse.x = e.touches[0].clientX;
    game.mouse.y = e.touches[0].clientY;
});

function startAutoShoot() {
    game.player.isAutoShooting = true;
    if (!game.autoShootInterval) {
        game.autoShootInterval = setInterval(shoot, 100);
    }
}

function stopAutoShoot() {
    game.player.isAutoShooting = false;
    if (game.autoShootInterval) {
        clearInterval(game.autoShootInterval);
        game.autoShootInterval = null;
    }
}

function shoot() {
    const angle = Math.atan2(
        game.mouse.y - game.player.y,
        game.mouse.x - game.player.x
    );
    game.bullets.push({
        x: game.player.x,
        y: game.player.y,
        velocity: {
            x: Math.cos(angle) * 10,
            y: Math.sin(angle) * 10
        },
        damage: 10 + Math.floor(game.level/2)
    });
    createParticleEffect(game.player.x, game.player.y, '#ff00ff');
}

function createParticleEffect(x, y, color) {
    for(let i = 0; i < 10; i++) {
        game.particles.push({
            x: x,
            y: y,
            velocity: {
                x: (Math.random() - 0.5) * 5,
                y: (Math.random() - 0.5) * 5
            },
            color: color,
            life: 1
        });
    }
}

function spawnEnemy() {
    const side = Math.floor(Math.random() * 4);
    let x, y;
    const shapes = ['circle', 'square', 'triangle', 'diamond', 'star', 'hexagon'];
    const colors = {
        circle: '#00f3ff',
        square: '#ffff00',
        triangle: '#00ff66',
        diamond: '#ff00ff',
        star: '#ff4400',
        hexagon: '#9d00ff'
    };
    
    const availableShapes = shapes.slice(0, Math.min(shapes.length, Math.floor(game.level / 2) + 3));
    const shape = availableShapes[Math.floor(Math.random() * availableShapes.length)];
    
    switch(side) {
        case 0: x = 0; y = Math.random() * canvas.height; break;
        case 1: x = canvas.width; y = Math.random() * canvas.height; break;
        case 2: x = Math.random() * canvas.width; y = 0; break;
        case 3: x = Math.random() * canvas.width; y = canvas.height; break;
    }
    
    game.enemies.push({
        x: x,
        y: y,
        radius: 15,
        color: colors[shape],
        shape: shape,
        points: shape === 'circle' ? 10 : 
                shape === 'square' ? 20 :
                shape === 'triangle' ? 30 :
                shape === 'diamond' ? 40 :
                shape === 'star' ? 50 : 60,
        health: 100 + (game.level * 10),
        time: 0,
        angle: Math.random() * Math.PI * 2
    });
}

function updatePlayer() {
    if(game.keys['w']) game.player.y -= game.player.speed;
    if(game.keys['s']) game.player.y += game.player.speed;
    if(game.keys['a']) game.player.x -= game.player.speed;
    if(game.keys['d']) game.player.x += game.player.speed;
    
    game.player.x = Math.max(game.player.radius, Math.min(canvas.width - game.player.radius, game.player.x));
    game.player.y = Math.max(game.player.radius, Math.min(canvas.height - game.player.radius, game.player.y));
}

function updateBullets() {
    game.bullets.forEach((bullet, index) => {
        bullet.x += bullet.velocity.x;
        bullet.y += bullet.velocity.y;
        
        if(bullet.x < 0 || bullet.x > canvas.width || 
           bullet.y < 0 || bullet.y > canvas.height) {
            game.bullets.splice(index, 1);
        }
    });
}

function updateEnemies() {
    game.enemies.forEach(enemy => {
        const speed = 1 + (game.level * 0.1);
        
        switch(enemy.shape) {
            case 'circle':
                enemy.time += 0.05;
                const dx = game.player.x - enemy.x;
                const dy = game.player.y - enemy.y;
                enemy.x += (dx / Math.hypot(dx, dy)) * speed;
                enemy.y += (dy / Math.hypot(dx, dy)) * speed + Math.sin(enemy.time) * 2;
                break;
                
            case 'square':
                enemy.angle += 0.05;
                enemy.x += Math.cos(enemy.angle) * speed;
                enemy.y += Math.sin(enemy.angle) * speed;
                break;
                
            case 'triangle':
                enemy.time += 0.05;
                const angle = Math.atan2(game.player.y - enemy.y, game.player.x - enemy.x);
                enemy.x += Math.cos(angle + Math.sin(enemy.time)) * speed;
                enemy.y += Math.sin(angle + Math.sin(enemy.time)) * speed;
                break;
                
            case 'diamond':
                enemy.time += 0.05;
                const dxDiamond = game.player.x - enemy.x;
                const dyDiamond = game.player.y - enemy.y;
                enemy.x += (dxDiamond / Math.hypot(dxDiamond, dyDiamond)) * speed * 0.5;
                enemy.y += (dyDiamond / Math.hypot(dxDiamond, dyDiamond)) * speed * 0.5 + Math.sin(enemy.time) * 2;
                break;
                
            case 'star':
                enemy.angle += 0.1;
                enemy.x += Math.cos(enemy.angle) * speed * 1.5;
                enemy.y += Math.sin(enemy.angle) * speed * 1.5;
                break;
                
            case 'hexagon':
                enemy.time += 0.02;
                enemy.x += Math.cos(enemy.time) * speed;
                enemy.y += Math.sin(enemy.time) * speed;
                break;
        }
        
        const dist = Math.hypot(enemy.x - game.player.x, enemy.y - game.player.y);
        if(dist < enemy.radius + game.player.radius) {
            game.player.absorption += 0.5;
            document.getElementById('absorption').textContent = Math.floor(game.player.absorption) + '%';
            
            if(game.player.absorption >= 100) {
                game.score += 10;
                game.player.absorbed[enemy.shape]++;
                updatePlayerShape();
                updatePlayerAbilities();
                game.player.absorption = 0;
                game.enemies = game.enemies.filter(e => e !== enemy);
                
                document.getElementById('shapes').textContent = 
                    `🔵:${game.player.absorbed.circle} 🟨:${game.player.absorbed.square} 🔺:${game.player.absorbed.triangle} ` +
                    `💎:${game.player.absorbed.diamond} ⭐:${game.player.absorbed.star} 🔷:${game.player.absorbed.hexagon}`;
            }
        }
    });
}

function updateParticles() {
    game.particles.forEach((particle, index) => {
        particle.x += particle.velocity.x;
        particle.y += particle.velocity.y;
        particle.life -= 0.02;
        
        if(particle.life <= 0) {
            game.particles.splice(index, 1);
        }
    });
}

function checkCollisions() {
    game.bullets.forEach((bullet, bulletIndex) => {
        game.enemies.forEach((enemy, enemyIndex) => {
            const dist = Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y);
            if(dist < enemy.radius) {
                enemy.health -= bullet.damage;
                game.bullets.splice(bulletIndex, 1);
                createParticleEffect(enemy.x, enemy.y, enemy.color);
                
                if(enemy.health <= 0) {
                    game.score += enemy.points;
                    document.getElementById('score').textContent = game.score;
                    game.enemies.splice(enemyIndex, 1);
                    
                    if(game.score >= game.level * 100) {
                        game.level++;
                        document.getElementById('level').textContent = game.level;
                        game.player.health = Math.min(game.player.health + 20, 100);
                    }
                }
            }
        });
    });
}

function updatePlayerAbilities() {
    game.player.speed = 5 + game.player.absorbed.circle;
    game.player.radius = 20 + game.player.absorbed.square;
    
    if(game.player.absorbed.triangle > 0) {
        clearInterval(game.autoShootInterval);
        game.autoShootInterval = setInterval(shoot, Math.max(50, 100 - game.player.absorbed.triangle * 10));
    }
    
    game.player.abilities.specialShot = game.player.absorbed.diamond >= 3;
    game.player.abilities.areaEffect = game.player.absorbed.star >= 2;
    game.player.abilities.shield = game.player.absorbed.hexagon >= 1;
}

function updatePlayerShape() {
    const shapes = Object.entries(game.player.absorbed);
    shapes.sort((a, b) => b[1] - a[1]);
    game.player.shape = shapes[0][0];
    
    const totalAbsorbed = Object.values(game.player.absorbed).reduce((a, b) => a + b, 0);
    if(totalAbsorbed > 0) {
        game.player.color = blendNeonColors(game.player.absorbed);
    }
}

function blendNeonColors(absorbed) {
    let r = 0, g = 0, b = 0;
    let total = 0;
    
    Object.entries(absorbed).forEach(([shape, count]) => {
        if(count > 0) {
            const color = {
                circle: '#00f3ff',
                square: '#ffff00',
                triangle: '#00ff66',
                diamond: '#ff00ff',
                star: '#ff4400',
                hexagon: '#9d00ff'
            }[shape];
            const rgb = hexToRgb(color);
            r += rgb.r * count;
            g += rgb.g * count;
            b += rgb.b * count;
            total += count;
        }
    });
    
    return `rgb(${r/total}, ${g/total}, ${b/total})`;
}

function hexToRgb(hex) {
    let r = 0, g = 0, b = 0;
    if (hex.length === 7) {
        r = parseInt(hex.slice(1, 3), 16);
        g = parseInt(hex.slice(3, 5), 16);
        b = parseInt(hex.slice(5, 7), 16);
    }
    return { r, g, b };
}

function drawNeonShape(enemy) {
    ctx.shadowBlur = 20;
    ctx.shadowColor = enemy.color;
    ctx.strokeStyle = enemy.color;
    ctx.lineWidth = 2;
    
    switch(enemy.shape) {
        case 'circle':
            ctx.beginPath();
            ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
            ctx.stroke();
            break;
        case 'square':
            ctx.strokeRect(enemy.x - enemy.radius, enemy.y - enemy.radius, 
                         enemy.radius * 2, enemy.radius * 2);
            break;
        case 'triangle':
            ctx.beginPath();
            ctx.moveTo(enemy.x, enemy.y - enemy.radius);
            ctx.lineTo(enemy.x + enemy.radius, enemy.y + enemy.radius);
            ctx.lineTo(enemy.x - enemy.radius, enemy.y + enemy.radius);
            ctx.closePath();
            ctx.stroke();
            break;
        case 'diamond':
            ctx.beginPath();
            ctx.moveTo(enemy.x, enemy.y - enemy.radius);
            ctx.lineTo(enemy.x + enemy.radius, enemy.y);
            ctx.lineTo(enemy.x, enemy.y + enemy.radius);
            ctx.lineTo(enemy.x - enemy.radius, enemy.y);
            ctx.closePath();
            ctx.stroke();
            break;
        case 'star':
            ctx.beginPath();
            const spikes = 5;
            const outerRadius = enemy.radius;
            const innerRadius = enemy.radius / 2;
            for (let i = 0; i < spikes; i++) {
                const angle = i * (Math.PI / spikes);
                ctx.lineTo(enemy.x + Math.cos(angle) * outerRadius, enemy.y + Math.sin(angle) * outerRadius);
                ctx.lineTo(enemy.x + Math.cos(angle + Math.PI / spikes) * innerRadius, enemy.y + Math.sin(angle + Math.PI / spikes) * innerRadius);
            }
            ctx.closePath();
            ctx.stroke();
            break;
        case 'hexagon':
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = i * (Math.PI / 3);
                ctx.lineTo(enemy.x + Math.cos(angle) * enemy.radius, enemy.y + Math.sin(angle) * enemy.radius);
            }
            ctx.closePath();
            ctx.stroke();
            break;
    }
}

function render() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    drawNeonShape({x: game.player.x, y: game.player.y, radius: game.player.radius, 
                   color: game.player.color, shape: game.player.shape});
    
    game.enemies.forEach(enemy => {
        drawNeonShape(enemy);
    });
    
    game.bullets.forEach(bullet => {
        ctx.beginPath();
        ctx.fillStyle = '#00f3ff';
        ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
        ctx.fill();
    });
    
    game.particles.forEach(particle => {
        ctx.beginPath();
        ctx.fillStyle = particle.color;
        ctx.globalAlpha = particle.life;
        ctx.arc(particle.x, particle.y, 2, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

function gameLoop() {
    updatePlayer();
    updateBullets();
    updateEnemies();
    updateParticles();
    checkCollisions();
    
    if(Math.random() < 0.02 + (game.level * 0.005)) spawnEnemy();
    
    render();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body></html>
