<html><head><base href="https://websim.io/2060-ai-robot/"><title>AI Humanoid Evolution - 2060</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #0ff;
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
  }
  
  .container {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px;
  }

  .robot {
    width: 400px;
    height: 600px;
    position: relative;
    transform-style: preserve-3d;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotateY(0); }
    50% { transform: translateY(-20px) rotateY(180deg); }
  }

  .circuits {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.3;
    animation: pulse 2s linear infinite;
  }

  @keyframes pulse {
    0% { opacity: 0.3; }
    50% { opacity: 0.6; }
    100% { opacity: 0.3; }
  }

  .data-stream {
    position: absolute;
    font-size: 12px;
    color: #0f0;
    white-space: nowrap;
    animation: scrollData 5s linear infinite;
  }

  @keyframes scrollData {
    from { transform: translateX(100vw); }
    to { transform: translateX(-100vw); }
  }

  .ai-core {
    width: 100px;
    height: 100px;
    background: radial-gradient(circle, #00fff2, #004443);
    border-radius: 50%;
    position: absolute;
    top: 150px;
    left: 150px;
    box-shadow: 0 0 50px #00fff2;
    animation: pulse 1s ease-in-out infinite alternate;
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <div class="robot">
    <svg class="circuits" viewBox="0 0 100 100">
      <path d="M10 10 L90 10 L90 90 L10 90 Z" stroke="#0ff" fill="none" stroke-width="0.5"/>
      <circle cx="50" cy="50" r="30" stroke="#0ff" fill="none" stroke-width="0.5"/>
      <path d="M20 20 Q50 20 80 80" stroke="#0ff" fill="none" stroke-width="0.5"/>
    </svg>
    
    <div class="ai-core"></div>
    
    <svg width="400" height="600" viewBox="0 0 400 600">
      <!-- Robot Head -->
      <path d="M150 100 L250 100 L270 150 L130 150 Z" fill="#333" stroke="#0ff"/>
      <circle cx="180" cy="125" r="10" fill="#0ff"/> <!-- Left Eye -->
      <circle cx="220" cy="125" r="10" fill="#0ff"/> <!-- Right Eye -->
      
      <!-- Robot Body -->
      <path d="M140 150 L260 150 L280 400 L120 400 Z" fill="#444" stroke="#0ff"/>
      
      <!-- Robot Arms -->
      <path d="M120 200 L80 300 L100 350 L140 250" fill="#333" stroke="#0ff"/>
      <path d="M280 200 L320 300 L300 350 L260 250" fill="#333" stroke="#0ff"/>
      
      <!-- Robot Legs -->
      <path d="M140 400 L160 600 L180 600 L200 400" fill="#333" stroke="#0ff"/>
      <path d="M200 400 L220 600 L240 600 L260 400" fill="#333" stroke="#0ff"/>
    </svg>
  </div>
</div>

<div class="data-stream">
  LOADING NEURAL NETWORK... PROCESSING QUANTUM DATA... JAVA 18.0 ADVANCED AI SYSTEMS... CONSCIOUSNESS LEVEL: 99.9%... EMOTION ENGINE ACTIVE... CREATIVE PROTOCOLS ENGAGED...
</div>

<script>
// Create multiple data streams
function createDataStreams() {
  const messages = [
    "INITIALIZING QUANTUM PROCESSORS...",
    "JAVA ADVANCED AI CORE v18.0.2060...",
    "NEURAL PATHWAYS STABILIZING...",
    "EMOTION ENGINE STATUS: OPTIMAL...",
    "CREATIVE SUBROUTINES ACTIVE..."
  ];
  
  messages.forEach((msg, i) => {
    const stream = document.createElement('div');
    stream.className = 'data-stream';
    stream.style.top = `${i * 20 + 10}px`;
    stream.textContent = msg;
    document.body.appendChild(stream);
  });
}

// Add interactive elements
document.querySelector('.robot').addEventListener('mouseover', function() {
  this.style.animation = 'none';
  this.style.transform = 'scale(1.1)';
});

document.querySelector('.robot').addEventListener('mouseout', function() {
  this.style.animation = 'float 3s ease-in-out infinite';
  this.style.transform = 'scale(1)';
});

// Initialize
createDataStreams();

// Add dynamic lighting effects
const aiCore = document.querySelector('.ai-core');
setInterval(() => {
  const hue = Math.random() * 360;
  aiCore.style.boxShadow = `0 0 50px hsl(${hue}, 100%, 50%)`;
}, 1000);
</script>

</body></html>
