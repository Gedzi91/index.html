<html><head><base href="." />
<title>Gingangguliguli Robot</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(45deg, #1a1a1a, #2d2d2d);
  font-family: 'Courier New', monospace;
}

.robot-head {
  position: relative;
  width: 200px;
  height: 200px;
  animation: float 3s ease-in-out infinite;
}

.robot-face {
  fill: #444;
  stroke: #00ff00;
  stroke-width: 2;
}

.eye {
  fill: #00ff00;
  animation: blink 2s infinite;
}

.mouth {
  stroke: #00ff00;
  stroke-width: 3;
  fill: none;
  animation: speak 0.5s infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

@keyframes blink {
  0%, 96%, 100% { transform: scaleY(1); }
  98% { transform: scaleY(0); }
}

@keyframes speak {
  0%, 100% { d: path('M 70 140 Q 100 150, 130 140'); }
  50% { d: path('M 70 140 Q 100 130, 130 140'); }
}

.play-btn {
  position: absolute;
  bottom: 20px;
  padding: 15px 30px;
  font-size: 18px;
  background: #00ff00;
  border: none;
  color: #1a1a1a;
  cursor: pointer;
  border-radius: 5px;
  font-family: 'Courier New', monospace;
  transition: all 0.3s ease;
}

.play-btn:hover {
  transform: scale(1.1);
  background: #00dd00;
}
</style>
</head>
<body>

<svg class="robot-head" viewBox="0 0 200 200">
  <rect class="robot-face" x="50" y="50" width="100" height="120" rx="10" />
  <circle class="eye" cx="80" cy="90" r="10" />
  <circle class="eye" cx="120" cy="90" r="10" />
  <path class="mouth" d="M 70 140 Q 100 150, 130 140" />
  <rect class="robot-face" x="85" y="30" width="30" height="20" />
  <rect class="robot-face" x="40" y="80" width="10" height="40" />
  <rect class="robot-face" x="150" y="80" width="10" height="40" />
</svg>

<button class="play-btn" onclick="window.playRoboSong()">Play Gingan Guli Guli</button>

<script>
window.playRoboSong = function() {
    // Using the Web Speech API for robot voice
    const utterance = new SpeechSynthesisUtterance("gingan guli guli gingan guli guli gingan guli guli guli guli");
    utterance.rate = 1.0;  // Speed of speech
    utterance.pitch = 0.5; // Makes it sound more robotic
    utterance.volume = 1.0;
    
    // Add some variety to make it more song-like
    const lines = ["gingan guli guli", "gingan guli guli", "gingan guli guli guli guli"];
    
    let currentLine = 0;
    
    function speakLine() {
        if (currentLine < lines.length) {
            const lineUtterance = new SpeechSynthesisUtterance(lines[currentLine]);
            lineUtterance.rate = 1.0;
            lineUtterance.pitch = 0.5;
            lineUtterance.volume = 1.0;
            
            lineUtterance.onend = () => {
                currentLine++;
                setTimeout(speakLine, 300); // Small pause between lines
            };
            
            speechSynthesis.speak(lineUtterance);
        }
    }
    
    speakLine();
};
</script>
</body></html>
