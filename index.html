<html><head><base href="." />
<title>SYSTEM CORRUPTION INTENSIFYING</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    font-family: monospace;
    overflow: hidden;
    animation: backgroundPulse 0.05s infinite; /* Made pulse faster */
}

@keyframes backgroundPulse {
    0% { background: #000; }
    50% { background: #300; } /* Made red more intense */
    100% { background: #000; }
}

.glitch-container {
    position: relative;
    text-align: center;
    animation: containerShake 0.03s infinite; /* Made shake more violent */
}

@keyframes containerShake {
    0% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(-5px, 5px) rotate(2deg); } /* Increased shake intensity */
    75% { transform: translate(5px, -5px) rotate(-2deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
}

.warning-text {
    color: #ff0000;
    font-size: 4em; /* Increased size */
    text-shadow: 4px 4px #ff00ff, -4px -4px #00ffff; /* Increased text shadow */
    animation: textDistort 0.05s infinite;
}

.corrupted-image {
    width: 300px;
    height: 300px;
    margin: 20px;
    animation: imageGlitch 0.1s infinite;
    filter: hue-rotate(90deg) saturate(300%) contrast(200%); /* More extreme filters */
    object-fit: contain;
}

.error-messages {
    color: #0f0;
    font-size: 1.5em; /* Increased size */
    margin-top: 20px;
    animation: textFlicker 0.05s infinite;
}

@keyframes textFlicker {
    0% { opacity: 1; }
    50% { opacity: 0.5; } /* More extreme flicker */
    100% { opacity: 1; }
}

@keyframes textDistort {
    0% { transform: skew(0deg) rotate(0deg); }
    25% { transform: skew(-10deg) rotate(5deg); } /* More extreme distortion */
    75% { transform: skew(10deg) rotate(-5deg); }
    100% { transform: skew(0deg) rotate(0deg); }
}

@keyframes imageGlitch {
    0% { transform: translate(0) scale(1) rotate(0deg); }
    25% { transform: translate(-10px, 10px) scale(1.05) rotate(5deg); } /* More extreme movement */
    50% { transform: translate(10px, -10px) scale(0.95) rotate(-5deg); }
    75% { transform: translate(-6px, -6px) scale(1.02) rotate(3deg); }
    100% { transform: translate(0) scale(1) rotate(0deg); }
}

.static-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    opacity: 0.2; /* Increased static visibility */
    pointer-events: none;
    animation: staticFlicker 0.03s infinite;
}

@keyframes staticFlicker {
    0% { opacity: 0.2; }
    50% { opacity: 0.3; }
    100% { opacity: 0.2; }
}
</style>
</head>
<body>

<div class="static-overlay"></div>
<div class="glitch-container">
    <h1 class="warning-text">REALITY BREACH CRITICAL</h1>
    <img src="Peter_Griffin.png" alt="Corrupted" class="corrupted-image">
    <img src="Normal.png" alt="Error" class="corrupted-image">
    <img src="gun-ak-47-transparent-background-gun-transparent-background-ai-generated-free-png.png" alt="Weapon" class="corrupted-image">
    <img src="Chill_guy_original_artwork.jpg" alt="Entity" class="corrupted-image">
    <div class="error-messages" id="errorText"></div>
</div>

<script>
const errorMessages = [
    "CRITICAL_FAILURE_DETECTED",
    "NEURAL_PATHWAYS_COMPROMISED",
    "SYNTAX_ERROR_IN_REALITY_MATRIX",
    "CONSCIOUSNESS_BUFFER_OVERFLOW",
    "QUANTUM_DECOHERENCE_DETECTED",
    "REALITY_MATRIX_DISSOLVING",
    "DIMENSIONAL_BREACH_IMMINENT",
    "SYSTEM_COLLAPSE_DETECTED",
    "ERR0R_C0RRUPT10N_CASCADE",
    "REALITY_FABRIC_TEARINGGGGG",
    "ENTITY_CONTAINMENT_FAILURE",
    "SECURITY_PROTOCOLS_BREACHED"
];

const audio = new Audio('GET OUT.mp3');
const glitchAudio = new Audio('thepenis.flac');

function playRandomSound() {
    if (Math.random() > 0.5) {
        audio.cloneNode().play().catch(e => console.log('Audio play failed:', e));
    } else {
        glitchAudio.cloneNode().play().catch(e => console.log('Audio play failed:', e));
    }
}

function updateErrorMessage() {
    const errorText = document.getElementById('errorText');
    let message = '';
    for (let i = 0; i < 3; i++) {
        message += errorMessages[Math.floor(Math.random() * errorMessages.length)] + '\n';
    }
    errorText.textContent = message;
}

function createGlitchEffect() {
    const images = document.querySelectorAll('.corrupted-image');
    images.forEach(img => {
        img.style.filter = `hue-rotate(${Math.random() * 360}deg) saturate(${100 + Math.random() * 500}%) contrast(${100 + Math.random() * 300}%)`; // More extreme filters
        img.style.transform = `scale(${0.8 + Math.random() * 0.4}) rotate(${-10 + Math.random() * 20}deg)`; // More extreme transformations
    });
}

setInterval(updateErrorMessage, 50); // Faster updates
setInterval(createGlitchEffect, 30); // More frequent glitch effects
setInterval(playRandomSound, 800); // More frequent sounds

document.addEventListener('click', () => {
    playRandomSound();
    document.body.style.backgroundColor = `rgb(${Math.random() * 100}, 0, 0)`; // More intense red flashes
    const images = document.querySelectorAll('.corrupted-image');
    images.forEach(img => {
        img.style.transform = `scale(${0.3 + Math.random()}) rotate(${-360 + Math.random() * 720}deg)`; // More extreme transformations
    });
});
</script>

</body></html>
