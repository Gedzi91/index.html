<html><head><base href="https://ripplecreator.net/"><title>Play with Planets - Gravity Simulator</title><style>

</style></head><body>
<canvas id="pulsarCanvas"></canvas>
<button id="fullscreenButton">Full Screen</button>
<button id="customizationToggle">Customize</button>

<div id="customizationMenu">
  <h2>Customize</h2>
  <label for="starType">Star Type:</label>
  <select id="starType">
    <option value="yellow">Yellow Dwarf (Sun-like)</option>
    <option value="red">Red Dwarf</option>
    <option value="blue">Blue Giant</option>
    <option value="white">White Dwarf</option>
    <option value="black">Black Hole</option>
  </select>
  <label for="starSize">Star Size:</label>
  <input type="range" id="starSize" min="0.5" max="5" step="0.1" value="1.0">
  <span id="starSizeValue">1.0</span>
  <label for="planetSize">Planet Size:</label>
  <input type="range" id="planetSize" min="0.5" max="5" step="0.1" value="5.0">
  <span id="planetSizeValue">5.0</span>
  <label for="planetAmount">Planet Amount:</label>
  <input type="range" id="planetAmount" min="1" max="5000" step="1" value="42">
  <span id="planetAmountValue">42</span>
  <label for="ringProbability">Ring Probability:</label>
  <input type="range" id="ringProbability" min="0" max="1" step="0.1" value="0.5">
  <span id="ringProbabilityValue">0.5</span>
  <label for="earthProbability">Earth-like Planet Probability:</label>
  <input type="range" id="earthProbability" min="0" max="0.5" step="0.01" value="0.18">
  <span id="earthProbabilityValue">0.18</span>
  <label for="maxMoons">Max Moons per Planet:</label>
  <input type="range" id="maxMoons" min="0" max="10" step="1" value="5">
  <span id="maxMoonsValue">5</span>
  <label for="timeSpeed">Time Speed:</label>
  <input type="range" id="timeSpeed" min="0.1" max="5" step="0.1" value="1.0">
  <span id="timeSpeedValue">1.0</span>
</div>

<script>const canvas = document.getElementById('pulsarCanvas');
const ctx = canvas.getContext('2d');
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;
const BACKGROUND_STARS = [];
const NUM_BACKGROUND_STARS = 200;
const planets = [];
let MAX_PLANETS = 42;
let EARTH_PROBABILITY = 0.18;
let planetSize = 5.0;
let ringProbability = 0.5;
let MAX_MOONS = 5;
const gravityWells = new Map();
const pulses = [];
const MAX_SPEED = 8;
const G = 6.67430e-11;
const SCALE_FACTOR = 1e9;
const DECELERATION_FACTOR = 0.98;
const STAR_ANIMATION_DURATION = 60;
let starType = 'yellow';
let starSize = 1.0;
const STAR_PROPERTIES = {
  yellow: {
    mass: 1e6,
    colors: ['rgba(255, 255, 255, ', 'rgba(255, 220, 100, ', 'rgba(255, 150, 0, '],
    baseSize: 15
  },
  red: {
    mass: 5e5,
    colors: ['rgba(255, 200, 200, ', 'rgba(255, 100, 100, ', 'rgba(200, 50, 50, '],
    baseSize: 12
  },
  blue: {
    mass: 2e6,
    colors: ['rgba(200, 200, 255, ', 'rgba(100, 100, 255, ', 'rgba(50, 50, 200, '],
    baseSize: 20
  },
  white: {
    mass: 8e5,
    colors: ['rgba(255, 255, 255, ', 'rgba(200, 200, 200, ', 'rgba(180, 180, 180, '],
    baseSize: 10
  },
  black: {
    mass: 5e6,
    colors: ['rgba(0, 0, 0, ', 'rgba(20, 20, 20, ', 'rgba(40, 40, 40, '],
    baseSize: 25
  }
};
let timeSpeed = 1.0;
function generateContinentPath(ctx, x, y, radius) {
  const points = Math.floor(Math.random() * 5) + 5;
  ctx.beginPath();
  for (let i = 0; i < points; i++) {
    const angle = i / points * Math.PI * 2;
    const distance = radius * (0.3 + Math.random() * 0.4);
    const px = x + Math.cos(angle) * distance;
    const py = y + Math.sin(angle) * distance;
    if (i === 0) {
      ctx.moveTo(px, py);
    } else {
      ctx.lineTo(px, py);
    }
  }
  ctx.closePath();
}
function drawEarthLikePlanet(ctx, x, y, radius, continents) {
  ctx.fillStyle = '#0077be';
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#228B22';
  continents.forEach(continent => {
    generateContinentPath(ctx, x + continent.offsetX, y + continent.offsetY, radius);
    ctx.fill();
  });
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.lineWidth = radius * 0.1;
  ctx.beginPath();
  ctx.arc(x, y, radius * 1.05, 0, Math.PI * 2);
  ctx.stroke();
}
function Moon(planet) {
  this.planet = planet;
  this.radius = planet.radius * (0.1 + Math.random() * 0.2);
  this.distance = planet.radius * (4 + Math.random() * 6);
  this.angle = Math.random() * Math.PI * 2;
  this.speed = 0.02 + Math.random() * 0.03;
  this.color = getPlanetColor();
}
Moon.prototype.update = function () {
  this.angle += this.speed * timeSpeed;
  this.x = this.planet.x + Math.cos(this.angle) * this.distance;
  this.y = this.planet.y + Math.sin(this.angle) * this.distance;
};
Moon.prototype.draw = function () {
  ctx.fillStyle = this.color;
  ctx.beginPath();
  ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
  ctx.fill();
};
function Planet(x, y) {
  this.x = x;
  this.y = y;
  this.radius = Math.random() * 6 + 2;
  this.mass = this.radius * 0.2;
  this.vx = (Math.random() - 0.5) * 0.5;
  this.vy = (Math.random() - 0.5) * 0.5;
  this.color = getPlanetColor();
  this.hasRing = Math.random() < ringProbability;
  this.ringColor = this.hasRing ? getPlanetColor() : null;
  this.ringWidth = this.hasRing ? this.radius * 2 : 0;
  this.isEarthLike = EARTH_PROBABILITY > 0 && planets.length === 0 || Math.random() < EARTH_PROBABILITY;
  this.moons = [];
  this.continents = [];
  if (this.isEarthLike) {
    this.hasRing = false;
    this.radius = Math.random() * planetSize * 1.5 + planetSize * 0.5;
    const continentCount = Math.floor(Math.random() * 3) + 2;
    for (let i = 0; i < continentCount; i++) {
      this.continents.push({
        offsetX: (Math.random() - 0.5) * this.radius * 0.8,
        offsetY: (Math.random() - 0.5) * this.radius * 0.8
      });
    }
  }
  const moonCount = Math.floor(Math.random() * (MAX_MOONS + 1));
  for (let i = 0; i < moonCount; i++) {
    this.moons.push(new Moon(this));
  }
}
function getPlanetColor() {
  const hue = Math.random() * 360;
  const saturation = 30 + Math.random() * 70;
  const lightness = 20 + Math.random() * 60;
  return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
}
Planet.prototype.draw = function () {
  ctx.globalAlpha = 1;
  if (this.isEarthLike) {
    drawEarthLikePlanet(ctx, this.x, this.y, this.radius, this.continents);
  } else {
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
    if (this.hasRing) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
      ctx.strokeStyle = this.ringColor;
      ctx.lineWidth = this.ringWidth * 0.1;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius * 2.2, 0, Math.PI * 2);
      ctx.strokeStyle = `${this.ringColor}88`;
      ctx.lineWidth = this.ringWidth * 0.08;
      ctx.stroke();
    }
  }
  this.moons.forEach(moon => {
    moon.update();
    moon.draw();
  });
  if (this.name) {
    ctx.fillStyle = 'white';
    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(this.name, this.x, this.y + this.radius + 20);
  }
};
Planet.prototype.update = function () {
  let totalForceX = 0;
  let totalForceY = 0;
  let isAffectedByGravity = false;
  const wellArray = Array.from(gravityWells.values());
  for (let i = 0; i < wellArray.length; i++) {
    const well = wellArray[i];
    const dx = well.x - this.x;
    const dy = well.y - this.y;
    const distanceSquared = dx * dx + dy * dy;
    const distance = Math.sqrt(distanceSquared);
    if (well.type === 'black') {
      const force = G * this.mass * well.mass / distanceSquared * SCALE_FACTOR * 3;
      totalForceX += dx / distance * force;
      totalForceY += dy / distance * force;
      if (distance < well.mass / 1e5) {
        const index = planets.indexOf(this);
        if (index > -1) {
          planets.splice(index, 1);
        }
        return;
      }
    } else {
      const force = G * this.mass * well.mass / distanceSquared * SCALE_FACTOR;
      totalForceX += dx / distance * force;
      totalForceY += dy / distance * force;
      const orbitalSpeed = Math.sqrt(G * well.mass / distance) * SCALE_FACTOR;
      const tangentX = -dy / distance;
      const tangentY = dx / distance;
      this.vx += tangentX * orbitalSpeed * 0.01;
      this.vy += tangentY * orbitalSpeed * 0.01;
    }
    isAffectedByGravity = true;
  }
  for (let i = 0; i < planets.length; i += 10) {
    if (this === planets[i]) continue;
    const dx = planets[i].x - this.x;
    const dy = planets[i].y - this.y;
    const distanceSquared = dx * dx + dy * dy;
    if (distanceSquared < 100) {
      const distance = Math.sqrt(distanceSquared);
      const force = G * this.mass * planets[i].mass / distanceSquared * SCALE_FACTOR * 0.1;
      totalForceX += dx / distance * force;
      totalForceY += dy / distance * force;
      isAffectedByGravity = true;
    }
  }
  pulses.forEach(pulse => {
    const dx = this.x - pulse.x;
    const dy = this.y - pulse.y;
    const distance = Math.sqrt(dx * dx + dy * dy);
    if (distance < pulse.radius) {
      const force = pulse.strength * (1 - distance / pulse.radius) / this.mass;
      totalForceX += dx / distance * force * 2;
      totalForceY += dy / distance * force * 2;
      isAffectedByGravity = true;
    }
  });
  const ax = totalForceX / this.mass;
  const ay = totalForceY / this.mass;
  this.vx += ax * timeSpeed;
  this.vy += ay * timeSpeed;
  const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
  if (speed > MAX_SPEED) {
    const ratio = MAX_SPEED / speed;
    this.vx *= ratio;
    this.vy *= ratio;
  }
  this.x += this.vx * timeSpeed;
  this.y += this.vy * timeSpeed;
  if (!isAffectedByGravity) {
    this.vx *= DECELERATION_FACTOR;
    this.vy *= DECELERATION_FACTOR;
  }
  const effectiveRadius = this.radius;
  if (this.x < effectiveRadius) {
    this.x = effectiveRadius;
    this.vx = Math.abs(this.vx) * 0.8;
  } else if (this.x > width - effectiveRadius) {
    this.x = width - effectiveRadius;
    this.vx = -Math.abs(this.vx) * 0.8;
  }
  if (this.y < effectiveRadius) {
    this.y = effectiveRadius;
    this.vy = Math.abs(this.vy) * 0.8;
  } else if (this.y > height - effectiveRadius) {
    this.y = height - effectiveRadius;
    this.vy = -Math.abs(this.vy) * 0.8;
  }
};
function createInitialPlanets() {
  planets.length = 0;
  for (let i = 0; i < MAX_PLANETS; i++) {
    const x = Math.random() * (width - 10) + 5;
    const y = Math.random() * (height - 10) + 5;
    const planet = new Planet(x, y);
    if (!planet.isEarthLike) {
      planet.radius = Math.random() * planetSize * 2 + planetSize;
    }
    planets.push(planet);
  }
}
function generateBackgroundStars() {
  BACKGROUND_STARS.length = 0;
  for (let i = 0; i < NUM_BACKGROUND_STARS; i++) {
    BACKGROUND_STARS.push({
      x: Math.random() * width,
      y: Math.random() * height,
      radius: Math.random() * 1.5 + 0.5,
      brightness: Math.random() * 0.5 + 0.5
    });
  }
}
function animate() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
  ctx.fillRect(0, 0, width, height);
  BACKGROUND_STARS.forEach(star => {
    const gradient = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, star.radius);
    gradient.addColorStop(0, `rgba(255, 255, 255, ${star.brightness})`);
    gradient.addColorStop(0.1, `rgba(255, 255, 255, ${star.brightness * 0.8})`);
    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
  });
  planets.forEach(planet => {
    planet.update();
    planet.draw();
  });
  const wellArray = Array.from(gravityWells.values());
  for (let i = 0; i < wellArray.length; i++) {
    const well = wellArray[i];
    well.animationProgress = Math.min(well.animationProgress + 1, STAR_ANIMATION_DURATION);
    const animationRatio = well.animationProgress / STAR_ANIMATION_DURATION;
    const starProps = STAR_PROPERTIES[well.type];
    if (well.type === 'black') {
      const blackHoleRadius = starProps.baseSize * starSize * Math.sqrt(well.mass / 1e6) * animationRatio;
      const gradientRadius = 250 * Math.sqrt(well.mass / 1e6) * animationRatio;
      for (let angle = 0; angle < Math.PI * 2; angle += 0.1) {
        const radius = gradientRadius * (0.8 + Math.sin(angle * 4 + Date.now() / 1000) * 0.2);
        const x = well.x + Math.cos(angle) * radius;
        const y = well.y + Math.sin(angle) * radius;
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(100, 0, 150, ${0.5 * (1 - radius / gradientRadius)})`;
        ctx.fill();
      }
      ctx.beginPath();
      ctx.arc(well.x, well.y, blackHoleRadius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgb(0, 0, 0)';
      ctx.fill();
      const gradient = ctx.createRadialGradient(well.x, well.y, blackHoleRadius, well.x, well.y, gradientRadius);
      gradient.addColorStop(0, 'rgba(100, 0, 150, 0.8)');
      gradient.addColorStop(0.3, 'rgba(150, 0, 200, 0.5)');
      gradient.addColorStop(1, 'rgba(200, 0, 255, 0)');
      ctx.beginPath();
      ctx.arc(well.x, well.y, gradientRadius, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(well.x, well.y, blackHoleRadius * 1.5, 0, Math.PI * 2);
      const lensGradient = ctx.createRadialGradient(well.x, well.y, blackHoleRadius, well.x, well.y, blackHoleRadius * 1.5);
      lensGradient.addColorStop(0, 'rgba(0, 0, 0, 0.9)');
      lensGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = lensGradient;
      ctx.fill();
    } else {
      const gradientRadius = 150 * Math.sqrt(well.mass / 1e6) * animationRatio;
      const gradient = ctx.createRadialGradient(well.x, well.y, 0, well.x, well.y, gradientRadius);
      gradient.addColorStop(0, `${starProps.colors[0]}${0.8 * animationRatio})`);
      gradient.addColorStop(0.3, `${starProps.colors[1]}${0.5 * animationRatio})`);
      gradient.addColorStop(1, `${starProps.colors[2]}0)`);
      ctx.beginPath();
      ctx.arc(well.x, well.y, gradientRadius, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(well.x, well.y, gradientRadius * 1.2, 0, Math.PI * 2);
      const glowGradient = ctx.createRadialGradient(well.x, well.y, gradientRadius, well.x, well.y, gradientRadius * 1.2);
      glowGradient.addColorStop(0, `${starProps.colors[1]}${0.3 * animationRatio})`);
      glowGradient.addColorStop(1, `${starProps.colors[2]}0)`);
      ctx.fillStyle = glowGradient;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(well.x, well.y, starProps.baseSize * starSize * Math.sqrt(well.mass / 1e6) * animationRatio, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${animationRatio})`;
      ctx.fill();
    }
    for (let j = i + 1; j < wellArray.length; j++) {
      const otherWell = wellArray[j];
      const dx = otherWell.x - well.x;
      const dy = otherWell.y - well.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      if (distance < 150) {
        ctx.beginPath();
        ctx.moveTo(well.x, well.y);
        ctx.lineTo(otherWell.x, otherWell.y);
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.5 * (1 - distance / 150)})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }
  }
  pulses.forEach((pulse, index) => {
    ctx.beginPath();
    ctx.arc(pulse.x, pulse.y, pulse.radius, 0, Math.PI * 2);
    const alpha1 = Math.round((1 - pulse.radius / pulse.maxRadius) * 255);
    const alpha2 = Math.round(0.5 * (1 - pulse.radius / pulse.maxRadius) * 255);
    const gradient = ctx.createRadialGradient(pulse.x, pulse.y, 0, pulse.x, pulse.y, pulse.radius);
    gradient.addColorStop(0, pulse.color1.replace('1)', `${alpha1 / 255})`));
    gradient.addColorStop(0.8, pulse.color2.replace('1)', `${alpha2 / 255})`));
    gradient.addColorStop(1, 'rgba(255, 50, 50, 0)');
    ctx.fillStyle = gradient;
    ctx.fill();
    ctx.strokeStyle = `rgba(255, 255, 255, ${1 - pulse.radius / pulse.maxRadius})`;
    ctx.lineWidth = 5;
    ctx.stroke();
    pulse.radius += pulse.speed * timeSpeed;
    if (pulse.radius > pulse.maxRadius) {
      pulses.splice(index, 1);
    }
  });
  requestAnimationFrame(animate);
}
function handleStart(event) {
  event.preventDefault();
  const touches = event.type === 'mousedown' ? [{
    identifier: 'mouse',
    clientX: event.clientX,
    clientY: event.clientY
  }] : event.changedTouches || [];
  for (let i = 0; i < touches.length; i++) {
    const touch = touches[i];
    const starProps = STAR_PROPERTIES[starType];
    gravityWells.set(touch.identifier, {
      x: touch.clientX,
      y: touch.clientY,
      mass: starProps.mass * starSize,
      strength: 3000 * starSize,
      animationProgress: 0,
      type: starType
    });
  }
}
function handleMove(event) {
  event.preventDefault();
  const touches = event.type === 'mousemove' ? [{
    identifier: 'mouse',
    clientX: event.clientX,
    clientY: event.clientY
  }] : event.changedTouches || [];
  for (let i = 0; i < touches.length; i++) {
    const touch = touches[i];
    if (gravityWells.has(touch.identifier)) {
      const well = gravityWells.get(touch.identifier);
      well.x = touch.clientX;
      well.y = touch.clientY;
    }
  }
}
function handleEnd(event) {
  event.preventDefault();
  const touches = event.type === 'mouseup' ? [{
    identifier: 'mouse'
  }] : event.changedTouches || [];
  for (let i = 0; i < touches.length; i++) {
    const touch = touches[i];
    if (gravityWells.has(touch.identifier)) {
      const well = gravityWells.get(touch.identifier);
      pulses.push({
        x: well.x,
        y: well.y,
        radius: 0,
        maxRadius: Math.max(width, height),
        speed: 15,
        strength: 500,
        color1: `hsla(${Math.random() * 360}, 100%, 50%, 1)`,
        color2: `hsla(${Math.random() * 360}, 100%, 50%, 1)`
      });
      gravityWells.delete(touch.identifier);
    }
  }
}
canvas.addEventListener('touchstart', handleStart, false);
canvas.addEventListener('touchmove', handleMove, false);
canvas.addEventListener('touchend', handleEnd, false);
canvas.addEventListener('mousedown', handleStart, false);
canvas.addEventListener('mousemove', event => {
  if (gravityWells.has('mouse')) {
    handleMove(event);
  }
}, false);
canvas.addEventListener('mouseup', handleEnd, false);
window.addEventListener('resize', () => {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  createInitialPlanets();
  generateBackgroundStars();
});
const fullscreenButton = document.getElementById('fullscreenButton');
fullscreenButton.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      console.log(`Error attempting to enable fullscreen: ${err.message}`);
    });
  } else {
    document.exitFullscreen();
  }
});
document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) {
    fullscreenButton.textContent = 'Exit FullScreen';
  } else {
