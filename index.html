<html><head><base href="." /><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Talking Puppy</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(45deg, #87CEEB, #E0FFFF);
    font-family: Arial, sans-serif;
}

.game-container {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    text-align: center;
}

.pet-container {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 20px auto;
}

.stats {
    display: flex;
    justify-content: space-around;
    margin: 20px 0;
}

.stat {
    background: #f0f0f0;
    padding: 10px;
    border-radius: 10px;
    min-width: 80px;
}

.actions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 20px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
    transition: transform 0.2s;
}

button:hover {
    transform: scale(1.05);
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

@keyframes wag {
    0%, 100% { transform: rotateZ(0deg); }
    50% { transform: rotateZ(20deg); }
}

.happy-effect {
    animation: bounce 0.5s ease-in-out;
}

</style>
</head>
<body>
<div class="game-container">
    <h1>My Talking Puppy</h1>
    <div class="pet-container" id="petContainer">
        <svg width="300" height="300" viewBox="0 0 300 300" id="puppy">
            <!-- Dog body -->
            <ellipse cx="150" cy="180" rx="80" ry="70" fill="#D2B48C"/>
            <!-- Head -->
            <circle cx="150" cy="120" r="60" fill="#D2B48C"/>
            <!-- Eyes -->
            <circle cx="130" cy="110" r="10" fill="black" class="eye"/>
            <circle cx="170" cy="110" r="10" fill="black" class="eye"/>
            <!-- Nose -->
            <circle cx="150" cy="130" r="10" fill="black"/>
            <!-- Ears -->
            <path d="M90 90 Q 120 40 150 90" fill="#B8860B" class="ear"/>
            <path d="M210 90 Q 180 40 150 90" fill="#B8860B" class="ear"/>
            <!-- Tail -->
            <path d="M230 180 Q 260 150 270 190" fill="#D2B48C" class="tail"/>
        </svg>
    </div>
    
    <div class="stats">
        <div class="stat">
            <div>Happiness</div>
            <div id="happiness">100%</div>
        </div>
        <div class="stat">
            <div>Energy</div>
            <div id="energy">100%</div>
        </div>
        <div class="stat">
            <div>Hunger</div>
            <div id="hunger">100%</div>
        </div>
    </div>

    <div class="actions">
        <button onclick="feed()">Feed</button>
        <button onclick="play()">Play</button>
        <button onclick="pet()">Pet</button>
        <button onclick="sleep()">Sleep</button>
    </div>
</div>

<script>
let stats = {
    happiness: 100,
    energy: 100,
    hunger: 100
};

let gameInterval;
let isSleeping = false;

function updateStats() {
    document.getElementById('happiness').textContent = `${stats.happiness}%`;
    document.getElementById('energy').textContent = `${stats.energy}%`;
    document.getElementById('hunger').textContent = `${stats.hunger}%`;
}

function decreaseStats() {
    if (!isSleeping) {
        stats.happiness = Math.max(0, stats.happiness - 1);
        stats.energy = Math.max(0, stats.energy - 1);
        stats.hunger = Math.max(0, stats.hunger - 2);
    } else {
        stats.energy = Math.min(100, stats.energy + 2);
    }
    updateStats();
}

function startGame() {
    gameInterval = setInterval(decreaseStats, 1000);
    updateStats();
}

function feed() {
    if (!isSleeping) {
        stats.hunger = Math.min(100, stats.hunger + 20);
        stats.happiness = Math.min(100, stats.happiness + 5);
        animate('bounce');
        updateStats();
    }
}

function play() {
    if (!isSleeping && stats.energy > 20) {
        stats.happiness = Math.min(100, stats.happiness + 15);
        stats.energy = Math.max(0, stats.energy - 15);
        stats.hunger = Math.max(0, stats.hunger - 10);
        animate('bounce');
        updateStats();
    }
}

function pet() {
    if (!isSleeping) {
        stats.happiness = Math.min(100, stats.happiness + 10);
        document.querySelector('.tail').style.animation = 'wag 0.5s infinite';
        setTimeout(() => {
            document.querySelector('.tail').style.animation = '';
        }, 2000);
        updateStats();
    }
}

function sleep() {
    isSleeping = !isSleeping;
    const puppy = document.getElementById('puppy');
    if (isSleeping) {
        puppy.style.opacity = '0.7';
        document.querySelectorAll('.eye').forEach(eye => {
            eye.style.height = '2px';
        });
    } else {
        puppy.style.opacity = '1';
        document.querySelectorAll('.eye').forEach(eye => {
            eye.style.height = 'auto';
        });
    }
}

function animate(animation) {
    const container = document.getElementById('petContainer');
    container.classList.add('happy-effect');
    setTimeout(() => {
        container.classList.remove('happy-effect');
    }, 500);
}

startGame();
</script>
</body></html>
