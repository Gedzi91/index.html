<html><head><base href="https://websim.ai/simulate?prompt=5">
<title>Dreamscape Browser Simulation</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

:root {
  --primary: #8A2BE2;
  --secondary: #FF69B4;
  --accent: #00FFFF;
  --bg: #0F0F1A;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Space Grotesk', sans-serif;
}

body {
  background: var(--bg);
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
}

.dream-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem;
}

.dream-header {
  text-align: center;
  margin-bottom: 3rem;
  animation: fadeIn 2s ease-out;
}

.dream-title {
  font-size: 3.5rem;
  background: linear-gradient(45deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 1rem;
}

.dream-subtitle {
  font-size: 1.2rem;
  color: var(--accent);
  opacity: 0.8;
}

.dream-interface {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 2rem;
  margin-bottom: 2rem;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.dream-control {
  margin-bottom: 1.5rem;
}

.dream-label {
  display: block;
  margin-bottom: 0.5rem;
  color: var(--accent);
}

.dream-slider {
  width: 100%;
  height: 6px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
  appearance: none;
}

.dream-slider::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  background: var(--primary);
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.2s;
}

.dream-slider::-webkit-slider-thumb:hover {
  transform: scale(1.2);
}

.dream-button {
  background: linear-gradient(45deg, var(--primary), var(--secondary));
  border: none;
  padding: 1rem 2rem;
  color: white;
  border-radius: 30px;
  font-size: 1.1rem;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}

.dream-button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4);
}

.dream-visualization {
  height: 400px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.floating-element {
  position: absolute;
  border-radius: 50%;
  filter: blur(20px);
  animation: float 20s infinite linear;
}

@keyframes float {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(100px, 100px) rotate(360deg); }
}
</style>
</head>
<body>
<canvas class="dream-canvas" id="dreamCanvas"></canvas>

<div class="container">
  <header class="dream-header">
    <h1 class="dream-title">Dreamscape Browser</h1>
    <p class="dream-subtitle">Navigate the Collective Unconscious</p>
  </header>

  <main class="dream-interface">
    <div class="dream-control">
      <label class="dream-label">Dream Depth</label>
      <input type="range" class="dream-slider" id="depthControl" min="0" max="100" value="50">
    </div>

    <div class="dream-control">
      <label class="dream-label">Emotional Resonance</label>
      <input type="range" class="dream-slider" id="emotionControl" min="0" max="100" value="75">
    </div>

    <div class="dream-control">
      <label class="dream-label">Surreality Level</label>
      <input type="range" class="dream-slider" id="surrealityControl" min="0" max="100" value="60">
    </div>

    <button class="dream-button" id="initiateJourney">Begin Dream Journey</button>
  </main>

  <div class="dream-visualization" id="dreamVisualization"></div>
</div>

<script>
// Canvas Setup
const canvas = document.getElementById('dreamCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Dreamscape particles
class DreamParticle {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 5 + 2;
    this.speedX = Math.random() * 3 - 1.5;
    this.speedY = Math.random() * 3 - 1.5;
    this.color = `hsl(${Math.random() * 60 + 240}, 50%, 50%)`;
    this.alpha = Math.random() * 0.5 + 0.5;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;

    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.reset();
    }
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha;
    ctx.fill();
  }
}

// Create particle system
const particles = Array(100).fill().map(() => new DreamParticle());

// Animation loop
function animate() {
  ctx.fillStyle = 'rgba(15, 15, 26, 0.1)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach(particle => {
    particle.update();
    particle.draw();
  });

  requestAnimationFrame(animate);
}

animate();

// Interactive controls
const depthControl = document.getElementById('depthControl');
const emotionControl = document.getElementById('emotionControl');
const surrealityControl = document.getElementById('surrealityControl');
const initiateButton = document.getElementById('initiateJourney');

function updateDreamscape() {
  const depth = depthControl.value / 100;
  const emotion = emotionControl.value / 100;
  const surreality = surrealityControl.value / 100;

  particles.forEach(particle => {
    particle.size = particle.size * (1 + depth * 0.1);
    particle.alpha = particle.alpha * (1 + emotion * 0.1);
    particle.speedX *= (1 + surreality * 0.05);
    particle.speedY *= (1 + surreality * 0.05);
  });
}

[depthControl, emotionControl, surrealityControl].forEach(control => {
  control.addEventListener('input', updateDreamscape);
});

initiateButton.addEventListener('click', () => {
  initiateButton.textContent = 'Dreaming...';
  initiateButton.disabled = true;
  
  setTimeout(() => {
    initiateButton.textContent = 'Begin Dream Journey';
    initiateButton.disabled = false;
  }, 3000);

  // Create a wave effect
  particles.forEach((particle, index) => {
    setTimeout(() => {
      particle.size *= 2;
      particle.alpha = 1;
      setTimeout(() => {
        particle.size /= 2;
        particle.alpha = Math.random() * 0.5 + 0.5;
      }, 1000);
    }, index * 10);
  });
});

// Add mousemove interaction
document.addEventListener('mousemove', (e) => {
  const mouseX = e.clientX;
  const mouseY = e.clientY;

  particles.forEach(particle => {
    const dx = mouseX - particle.x;
    const dy = mouseY - particle.y;
    const distance = Math.sqrt(dx * dx + dy * dy);
    
    if (distance < 100) {
      const angle = Math.atan2(dy, dx);
      particle.speedX = -Math.cos(angle) * 2;
      particle.speedY = -Math.sin(angle) * 2;
    }
  });
});
</script>
</body></html>
