<html><head><base href=""><title>Image Gallery with Random Images and GIFs</title>
<style>
.gallery-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    background: #f5f5f5;
    min-height: 400px;
    flex-direction: column;
}

.title {
    font-family: Arial, sans-serif;
    font-size: 24px;
    color: #333;
    margin-bottom: 20px;
    text-align: center;
}

.image-navigation {
    display: flex;
    align-items: center;
    gap: 20px;
}

.arrow {
    font-size: 48px;
    cursor: pointer;
    user-select: none;
    color: #333;
    transition: transform 0.2s;
}

.arrow:hover {
    transform: scale(1.2);
    color: #666;
}

.image-container {
    width: 400px;
    height: 400px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    overflow: hidden;
}

.gallery-image {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

.feedback-container {
    margin-top: 20px;
    width: 100%;
    max-width: 600px;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.feedback-list {
    margin-top: 20px;
    max-height: 300px;
    overflow-y: auto;
}

.feedback-item {
    padding: 10px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: start;
    gap: 10px;
}

.feedback-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

.feedback-content {
    flex-grow: 1;
}

.feedback-username {
    font-weight: bold;
    margin-bottom: 5px;
}

.feedback-form {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.feedback-input {
    flex-grow: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-family: inherit;
}

.submit-button {
    padding: 10px 20px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.2s;
}

.submit-button:hover {
    background: #45a049;
}

</style>
</head>
<body>

<div class="gallery-container">
    <h1 class="title">Random Images and GIFs I Have</h1>
    <div class="image-navigation">
        <div class="arrow" id="prev">←</div>
        <div class="image-container">
            <img src="image.webp" alt="Gallery Image" class="gallery-image" id="currentImage">
        </div>
        <div class="arrow" id="next">→</div>
    </div>
    
    <div class="feedback-container">
        <h2>Gallery Feedback</h2>
        <div class="feedback-form">
            <input type="text" class="feedback-input" placeholder="Share your thoughts..." id="feedbackInput">
            <button class="submit-button" id="submitFeedback">Submit</button>
        </div>
        <div class="feedback-list" id="feedbackList">
            <!-- Feedback items will be inserted here -->
        </div>
    </div>
</div>

<script>
const room = new WebsimSocket();

const images = [
    'image.webp',
    'how-do-i-trick-my-mom-to-buy-me-thigh-highs-v0-yiiq04x63zud1.jpeg',
    'hey-im-a-girl-and-i-think-the-boykisser-meme-is-cute-af-why-v0-3gz5qyv0f7tb1.jpeg',
    'download (18).jpeg',
    'd437628c1577309b20940d2575260625.jpg',
    'every-version-of-the-boykisser-i-could-find-v0-yfoiqch4z60b1.png',
    'every-version-of-the-boykisser-i-could-find-v0-yfoiqch4z60b1 (1).png',
    'every-version-of-the-boykisser-i-could-find-v0-yfoiqch4z60b1 (2).png',
    'boykisser-spin.gif',
    'tcljmxqx43yc1.gif',
    '231.gif',
    'every-version-of-the-boykisser-i-could-find-v0-yfoiqch4z60b1 (3).png',
    'this-is-flipping-insane-flipping.gif',
    'some-boykisser-images-gifs-ive-restored-or-made-higher-v0-p4xjxawwibzc1.png',
    'whats-your-favorite-boykisser-image-or-gif-3-v0-cbesm9f8s4md1.jpg',
    'e2soeas5mumc1.gif',
    'e40q7we1kj1c1.gif',
    'boykisser-mauzymice.gif',
    'mauzymice-boykisser.gif',
    'mauzymice-boykisser (1).gif',
    '8mqv9g.jpg',
    'download.gif',
    '9bi2x7.jpg',
    '3717549-vqpm69zk-v4.webp',
    'png-clipart-undertale-drawing-fan-art-game-tem-game-mammal-thumbnail.png',
    'asd.jpeg',
    '4d097e1b60df01a711f64d3b033a7357.jpg',
    'download (17).jpeg',
    'zxno8mw4fs031.jpg',
    '2aa3f5682d693d47bd42e697407ab7b7.jpg',
    'tumblr_mi65sbdnZI1rj1imwo1_1280.jpeg',
    'download (16).jpeg',
    'pp6ntgae87s91.png',
    '29314288588_a2e50eac02_z.jpg',
    'whats-your-favorite-boykisser-image-or-gif-3-v0-lqi9yivlw4md1.jpeg',
    'boykisser-mauzymice (1).gif',
    'eevee_fanart______yayaya_by_allewolfchufanart_dfgtzsd-fullview.jpg',
    'BB1oRnuR.jpeg',
    'fahnkkw4w1f61.png',
    'images (31).jpeg',
    'download (15).jpeg',
    'images (27).jpeg',
    'images (21).jpeg',
    'download (11).jpeg'
];

let currentIndex = 0;
const currentImage = document.getElementById('currentImage');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const feedbackInput = document.getElementById('feedbackInput');
const submitFeedback = document.getElementById('submitFeedback');
const feedbackList = document.getElementById('feedbackList');

function updateImage() {
    currentImage.src = images[currentIndex];
}

prevBtn.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    updateImage();
});

nextBtn.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % images.length;
    updateImage();
});

// Add keyboard navigation
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') {
        prevBtn.click();
    } else if (e.key === 'ArrowRight') {
        nextBtn.click();
    }
});

// Handle feedback submission
submitFeedback.addEventListener('click', async () => {
    const message = feedbackInput.value.trim();
    if (message) {
        await room.collection('feedback').create({
            message,
            image: images[currentIndex]
        });
        feedbackInput.value = '';
    }
});

// Subscribe to feedback updates
room.collection('feedback').subscribe((feedbacks) => {
    feedbackList.innerHTML = feedbacks
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
        .map(feedback => `
            <div class="feedback-item">
                <img class="feedback-avatar" src="https://images.websim.ai/avatar/${feedback.username}" alt="${feedback.username}'s avatar">
                <div class="feedback-content">
                    <div class="feedback-username">${feedback.username}</div>
                    <div class="feedback-message">${feedback.message}</div>
                    <div class="feedback-image">on image: ${feedback.image}</div>
                </div>
            </div>
        `)
        .join('');
});
</script>

</body></html>
