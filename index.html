<html><head><base href="/" />
<title>AI Baldi Basics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  body { margin: 0; }
  canvas { display: block; }
  #instructions {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: Arial;
    font-size: 16px;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 5px;
  }
  #mathQuestions {
    display: none; 
    position: absolute; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%); 
    background: rgba(255,255,255,0.9); 
    padding: 20px; 
    border-radius: 10px; 
    text-align: center;
  }
  #staminaBarContainer {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 200px;
    height: 20px;
    background: rgba(0,0,0,0.5);
    border-radius: 10px;
    padding: 3px;
  }
  #staminaBar {
    width: 100%;
    height: 100%;
    background: #4CAF50;
    border-radius: 7px;
    transition: width 0.1s;
  }
</style>
</head>
<body>
<div id="instructions">
  WASD to move<br>
  Click doors to open them<br>
  Mouse to look around<br>
  Hold Shift to sprint
</div>
<div id="mathQuestions">
  <h2>You Can Think Pad!</h2>
  <div id="questionContainer">
    <p id="currentQuestion"></p>
    <input type="number" id="answerInput" placeholder="Enter your answer">
    <button onclick="window.checkAnswer()">Submit</button>
  </div>
  <p id="questionProgress">Question 1/3</p>
</div>
<div id="staminaBarContainer">
  <div id="staminaBar"></div>
</div>
<script>
let backgroundMusic = new Audio('Mus_School.wav');
let learnNewSound = new Audio('LearnNew.wav');

// Set up sound properties
backgroundMusic.loop = true;
backgroundMusic.volume = 0.5;
learnNewSound.loop = true; // Make LearnNew sound loop

let baldiAngry = false;
let baldiSpeed = 0.02; // Slower initial speed
let baldiAnimationFrame = 0;
let baldiAnimationTime = 0;
const baldiAnimationFrames = [
    'slap frame 1.png',
    'slap frame 2.png',
    'slap frame 3.png',
    'slap frame 4.png',
    'slap frame 5.png'
];

let hasAnsweredWrong = false; // Track if player has gotten a wrong answer

window.addEventListener('load', () => {
    // Add click handler for starting music
    document.addEventListener('click', function startMusic() {
        backgroundMusic.play();
        document.removeEventListener('click', startMusic);
    }, { once: true });

    // Move these variable declarations to the window object
    window.scene = null;
    window.notebooks = [];
    window.currentQuestionIndex = 0;
    window.questionsAnswered = 0;
    window.currentNotebook = null;
    window.isAnsweringQuestions = false;
    window.notebooksCompleted = 0; // Add glitch state tracking

    let moveForward = false;
    let moveBackward = false;
    let moveLeft = false;
    let moveRight = false;
    let canJump = false;
    let prevTime = performance.now();
    let velocity = new THREE.Vector3();
    let direction = new THREE.Vector3();
    let doors = [];
    let sprinting = false; // Add sprinting state

    // Add stamina variables
    let stamina = 100;
    let staminaRecoveryRate = 10; // Stamina recovered per second
    let staminaDrainRate = 20; // Stamina drained per second

    init();
    animate();

    function init() {
        // Initialization code
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(light);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(0, 1, 0);
        scene.add(directionalLight);

        const textureLoader = new THREE.TextureLoader();
        const wallTexture = textureLoader.load('Wall.webp');
        const floorTexture = textureLoader.load('TileFloor-sharedassets2.assets-234.webp');
        const ceilingTexture = textureLoader.load('CeilingNoLight.webp');
        const baldiTexture = textureLoader.load('Baldi_Wave0099.webp');
        const notebookTexture = textureLoader.load('NotebookSheet_1.webp');

        // Enhanced texture settings
        wallTexture.wrapS = THREE.RepeatWrapping;
        wallTexture.wrapT = THREE.RepeatWrapping;
        wallTexture.repeat.set(1, 1);
        wallTexture.magFilter = THREE.NearestFilter;
        wallTexture.minFilter = THREE.LinearMipmapLinearFilter;
        
        floorTexture.wrapS = THREE.RepeatWrapping;
        floorTexture.wrapT = THREE.RepeatWrapping;
        floorTexture.repeat.set(50, 50);
        floorTexture.magFilter = THREE.NearestFilter;
        floorTexture.minFilter = THREE.LinearMipmapLinearFilter;
        
        ceilingTexture.wrapS = THREE.RepeatWrapping;
        ceilingTexture.wrapT = THREE.RepeatWrapping;
        ceilingTexture.repeat.set(50, 50);
        ceilingTexture.magFilter = THREE.NearestFilter;
        ceilingTexture.minFilter = THREE.LinearMipmapLinearFilter;

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ 
                map: floorTexture,
                normalScale: new THREE.Vector2(1, 1)
            })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const ceiling = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ 
                map: ceilingTexture,
                normalScale: new THREE.Vector2(1, 1)
            })
        );
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = 4;
        scene.add(ceiling);

        function createWall(x, y, z, width, height, rotationY = 0) {
            const wallGeometry = new THREE.BoxGeometry(width, height, 0.2);
            const wallMaterial = new THREE.MeshStandardMaterial({ 
                map: wallTexture,
                side: THREE.DoubleSide
            });
            
            const uvAttribute = wallGeometry.attributes.uv;
            const repeatX = width / 2;  
            const repeatY = height / 2;
            
            for (let i = 0; i < uvAttribute.count; i++) {
                const u = uvAttribute.getX(i);
                const v = uvAttribute.getY(i);
                uvAttribute.setXY(i, u * repeatX, v * repeatY);
            }
            
            const wall = new THREE.Mesh(wallGeometry, wallMaterial);
            wall.position.set(x, y, z);
            wall.rotation.y = rotationY;
            scene.add(wall);
            return wall;
        }

        function createDoor(x, y, z, rotationY = 0) {
            const door = new THREE.Mesh(
                new THREE.BoxGeometry(2, 3, 0.1),
                new THREE.MeshStandardMaterial({ color: 0x8B4513 })
            );
            door.position.set(x, y, z);
            door.rotation.y = rotationY;
            door.isOpen = false;
            door.originalRotation = rotationY; 
            doors.push(door);
            scene.add(door);
            return door;
        }

        createWall(-50, 2, -10, 100, 4); 
        createWall(-50, 2, 10, 100, 4);  
        createWall(0, 2, 30, 100, 4, Math.PI/2); 
        createWall(0, 2, -30, 100, 4, Math.PI/2); 

        createDoor(-25, 1.5, 0, Math.PI/2); 
        createDoor(25, 1.5, 0, Math.PI/2);  
        createDoor(0, 1.5, -20, 0);         
        createDoor(0, 1.5, 20, 0);          

        for(let i = -40; i <= 30; i += 10) {
            createWall(i, 2, -15, 10, 4); 
            createWall(i-5, 2, -12.5, 5, 4, Math.PI / 2); 
            createWall(i+5, 2, -12.5, 5, 4, Math.PI / 2); 
            createDoor(i, 1.5, -10, 0); 
        }

        for(let i = -40; i <= 30; i += 10) {
            createWall(i, 2, 15, 10, 4);
            createWall(i-5, 2, 12.5, 5, 4, Math.PI / 2);
            createWall(i+5, 2, 12.5, 5, 4, Math.PI / 2);
            createDoor(i, 1.5, 10, 0);
        }

        for(let i = -20; i <= 20; i += 10) {
            createWall(5, 2, i, 10, 4, Math.PI/2);
            createWall(2.5, 2, i-5, 5, 4);
            createWall(2.5, 2, i+5, 5, 4);
            createDoor(0, 1.5, i, Math.PI/2);
        }

        for(let i = -20; i <= 20; i += 10) {
            createWall(-5, 2, i, 10, 4, Math.PI/2);
            createWall(-2.5, 2, i-5, 5, 4);
            createWall(-2.5, 2, i+5, 5, 4);
            createDoor(0, 1.5, i, Math.PI/2);
        }

        createWall(35, 2, -15, 20, 4);
        createWall(25, 2, -12.5, 5, 4, Math.PI / 2);
        createWall(45, 2, -12.5, 5, 4, Math.PI / 2);
        createDoor(33, 1.5, -10, 0);
        createDoor(37, 1.5, -10, 0);

        createWall(35, 2, 15, 30, 4);
        createWall(20, 2, 12.5, 5, 4, Math.PI / 2);
        createWall(50, 2, 12.5, 5, 4, Math.PI / 2);
        createDoor(23, 1.5, 10, 0);
        createDoor(27, 1.5, 10, 0);

        createWall(-35, 2, 15, 20, 4);
        createWall(-45, 2, 12.5, 5, 4, Math.PI / 2);
        createWall(-25, 2, 12.5, 5, 4, Math.PI / 2);
        createDoor(-37, 1.5, 10, 0);
        createDoor(-33, 1.5, 10, 0);

        const baldiMaterial = new THREE.SpriteMaterial({ 
            map: baldiTexture,
            sizeAttenuation: true 
        });
        const baldi = new THREE.Sprite(baldiMaterial);
        baldi.scale.set(2, 3, 1); // Changed from (3, 3, 1) to make narrower
        baldi.position.set(35, 2, 25); 
        baldi.name = 'baldi'; // Add name for easy reference
        scene.add(baldi);

        const notebookMaterial = new THREE.SpriteMaterial({ 
            map: notebookTexture,
            sizeAttenuation: true
        });

        const notebookPositions = [
            {x: -35, y: 1.5, z: -17},  
            {x: 15, y: 1.5, z: 17},    
            {x: -35, y: 1.5, z: 17},   
            {x: 35, y: 1.5, z: 17},    
            {x: 35, y: 1.5, z: -17},   
            {x: -7, y: 1.5, z: -15},   
            {x: 7, y: 1.5, z: 15},     
        ];

        notebookPositions.forEach(pos => {
            const notebook = new THREE.Sprite(notebookMaterial);
            notebook.scale.set(2, 2, 1);
            notebook.position.set(pos.x, pos.y, pos.z);
            window.notebooks.push(notebook);  
            scene.add(notebook);
        });

        const spotLight = new THREE.SpotLight(0xffffff, 1);
        spotLight.position.set(35, 5, 25); 
        spotLight.target = baldi;
        scene.add(spotLight);
        scene.add(spotLight.target);

        camera.position.set(35, 2, 35);
        camera.rotation.y = Math.PI;

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('click', onMouseClick);
        
        renderer.domElement.addEventListener('click', function() {
            renderer.domElement.requestPointerLock();
        });
    }

    window.askNextQuestion = askNextQuestion;
    window.checkAnswer = checkAnswer; // Added for global access
    
    function generateQuestion() {
        // Add glitch for third question on every notebook except first
        if (window.notebooksCompleted > 0 && window.questionsAnswered === 2) {
            // Return an impossible glitched question
            return {
                question: "ERROR_̷̧̛̭͎̼̩̬̥̲̠͇̲̘̦̯͓̪̿̏̇̽̌̊̎͒̈́̈́͒̀̊͝#$@ + ∞̴̢̛̮̯̣͚̖̝͕̳̘̥̰̜̲̋̈́̓̂̾̈́̾̋̐̾͘͝͝ = ???",
                answer: -999999 // An impossible answer
            };
        }

        // Normal question generation
        const num1 = Math.floor(Math.random() * 10) + 1;
        const num2 = Math.floor(Math.random() * 10) + 1;
        const operations = ['+', '-'];
        const operation = operations[Math.floor(Math.random() * operations.length)];
        
        let answer;
        switch(operation) {
            case '+': answer = num1 + num2; break;
            case '-': answer = num1 - num2; break;
        }
        
        return {
            question: `What is ${num1} ${operation} ${num2}?`,
            answer: answer
        };
    }

    function askNextQuestion() {
        const question = generateQuestion();
        window.currentQuestionIndex = question.answer;
        
        document.getElementById('currentQuestion').textContent = question.question;
        document.getElementById('answerInput').value = '';
        document.getElementById('questionProgress').textContent = 
            `Question ${window.questionsAnswered + 1}/3`;
    }

    function showMathQuestions() {
        window.isAnsweringQuestions = true;
        document.getElementById('mathQuestions').style.display = 'block';
        window.currentQuestionIndex = 0;
        window.questionsAnswered = 0;
        askNextQuestion();
        document.exitPointerLock();
        
        // Stop background music
        backgroundMusic.pause();
        
        // Only play LearnNew sound if player hasn't gotten a wrong answer yet
        if (!hasAnsweredWrong) {
            learnNewSound.currentTime = 0;
            learnNewSound.play();
        }
    }

    function checkAnswer() {
        const mathQuestions = document.getElementById('mathQuestions');
        const answerInput = document.getElementById('answerInput');
        const userAnswer = parseInt(answerInput.value);
        
        if (window.currentQuestionIndex === undefined) return;

        if (userAnswer === window.currentQuestionIndex) {
            window.questionsAnswered++;
            
            if (window.questionsAnswered >= 3) {
                mathQuestions.style.display = 'none';
                window.isAnsweringQuestions = false;
                window.scene.remove(window.currentNotebook);
                window.notebooks = window.notebooks.filter(n => n !== window.currentNotebook);
                window.currentNotebook = null;
                window.notebooksCompleted++;
                renderer.domElement.requestPointerLock();
                
                // Stop LearnNew sound
                learnNewSound.pause();
                learnNewSound.currentTime = 0;
                
                // If Baldi is not angry, restart background music
                if (!baldiAngry) {
                    backgroundMusic.play();
                }
            } else {
                window.askNextQuestion();
            }
        } else {
            baldiAngry = true;
            baldiSpeed += 0.01; // Increase speed with each wrong answer
            window.questionsAnswered++; // Increment counter even though wrong
            hasAnsweredWrong = true; // Set the flag when answer is wrong
            
            // Stop both background music and LearnNew sound when Baldi gets angry
            backgroundMusic.pause();
            learnNewSound.pause();
            learnNewSound.currentTime = 0;
            
            if (window.questionsAnswered >= 3) {
                mathQuestions.style.display = 'none';
                window.isAnsweringQuestions = false;
                window.scene.remove(window.currentNotebook);
                window.notebooks = window.notebooks.filter(n => n !== window.currentNotebook);
                window.currentNotebook = null;
                window.notebooksCompleted++;
                renderer.domElement.requestPointerLock();
            } else {
                window.askNextQuestion(); // Move to next question even if wrong
            }
        }
    }

    function onKeyDown(event) {
        if (window.isAnsweringQuestions) return; 
    
        switch(event.code) {
            case 'KeyW':
                moveBackward = true;
                break;
            case 'KeyS':
                moveForward = true;
                break;
            case 'KeyA':
                moveLeft = true;
                break;
            case 'KeyD':
                moveRight = true;
                break;
            case 'ShiftLeft':
            case 'ShiftRight':
                sprinting = true;
                break;
        }
    }

    function onKeyUp(event) {
        switch(event.code) {
            case 'KeyW':
                moveBackward = false;
                break;
            case 'KeyS':
                moveForward = false;
                break;
            case 'KeyA':
                moveLeft = false;
                break;
            case 'KeyD':
                moveRight = false;
                break;
            case 'ShiftLeft':
            case 'ShiftRight':
                sprinting = false;
                break;
        }
    }

    function onMouseMove(event) {
        if (window.isAnsweringQuestions) return; 
        if (document.pointerLockElement === renderer.domElement) {
            camera.rotation.y -= event.movementX * 0.002;
        }
    }

    function onMouseClick(event) {
        if (window.isAnsweringQuestions) return; 

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        raycaster.setFromCamera(mouse, camera);
        
        const doorIntersects = raycaster.intersectObjects(doors);
        if (doorIntersects.length > 0) {
            const door = doorIntersects[0].object;
            door.isOpen = !door.isOpen;
            const openAngle = door.isOpen ? door.originalRotation + Math.PI / 2 : door.originalRotation;
            door.rotation.y = openAngle;
            return;
        }
        
        const notebookIntersects = raycaster.intersectObjects(window.notebooks);
        if (notebookIntersects.length > 0) {
            window.currentNotebook = notebookIntersects[0].object;
            showMathQuestions();
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        
        const time = performance.now();
        const delta = (time - prevTime) / 1000;

        if (!window.isAnsweringQuestions) { // Only process movement if not answering questions
            // Update stamina
            if (sprinting && (moveForward || moveBackward || moveLeft || moveRight)) {
                stamina = Math.max(0, stamina - (staminaDrainRate * delta));
                if (stamina === 0) {
                    sprinting = false;
                }
            } else {
                stamina = Math.min(100, stamina + (staminaRecoveryRate * delta));
            }
            
            // Update stamina bar visual
            document.getElementById('staminaBar').style.width = stamina + '%';
            
            // Only allow sprinting if stamina > 0
            const actualSprinting = sprinting && stamina > 0;

            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            const baseSpeed = 50.0; // 4x slower than original 200
            const sprintSpeed = 100.0; // 2x slower than original 200
            const currentSpeed = actualSprinting ? sprintSpeed : baseSpeed;

            if (moveForward || moveBackward) velocity.z -= direction.z * currentSpeed * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * currentSpeed * delta;

            camera.translateX(-velocity.x * delta);
            camera.translateZ(-velocity.z * delta);
            
            camera.position.y = 2;
            camera.rotation.x = 0;

            // Baldi chase logic - only run if not answering questions
            if (baldiAngry) {
                const baldi = scene.getObjectByName('baldi');
                if (baldi) {
                    // Get direction to player
                    const directionToPlayer = new THREE.Vector3()
                        .subVectors(camera.position, baldi.position)
                        .normalize();
                    
                    // Move Baldi towards player
                    baldi.position.x += directionToPlayer.x * baldiSpeed;
                    baldi.position.z += directionToPlayer.z * baldiSpeed;
                    
                    // Update Baldi's animation
                    baldiAnimationTime += delta;
                    if (baldiAnimationTime > 0.15) { // Make animation slightly faster (every 0.15 seconds)
                        baldiAnimationTime = 0;
                        baldiAnimationFrame = (baldiAnimationFrame + 1) % baldiAnimationFrames.length;
                        
                        // Update Baldi's texture
                        const textureLoader = new THREE.TextureLoader();
                        const newTexture = baldiAnimationFrames[baldiAnimationFrame];
                        textureLoader.load(newTexture, function(texture) {
                            baldi.material.map = texture;
                            baldi.material.needsUpdate = true;
                        });
                    }

                    // Check if Baldi caught the player
                    if (baldi.position.distanceTo(camera.position) < 1) {
                        alert("Game Over! Baldi caught you!");
                        location.reload();
                    }
                }
            }
        }

        prevTime = time;
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', onWindowResize, false);

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
});
</script>
</body>
</html>
