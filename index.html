<html><head><base href="https://santaupdate.com/cotton-headed-ninny-muggins"><meta charset="utf-8">
<title>Cotton-Headed Ninny Muggins</title>
<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1a472a, #2d623d);
    font-family: 'Mountains of Christmas', cursive;
    overflow: hidden;
  }

  .elf {
    position: relative;
    width: 300px;
    height: 400px;
    animation: bounce 2s infinite;
  }

  .message {
    position: absolute;
    top: 50px;
    text-align: center;
    color: #fff;
    font-size: 2em;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    animation: glow 1.5s ease-in-out infinite alternate;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  @keyframes glow {
    from {
      text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #e60073;
    }
    to {
      text-shadow: 0 0 10px #fff, 0 0 20px #ff4da6, 0 0 30px #ff4da6;
    }
  }

  .snowfall {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .snowflake {
    position: absolute;
    color: white;
    font-size: 1em;
    animation: fall linear infinite;
  }

</style>
<link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas&display=swap" rel="stylesheet">
</head>
<body>

<div class="message">Cotton-Headed Ninny Muggins</div>

<svg class="elf" viewBox="0 0 200 300">
  <!-- Elf body -->
  <ellipse cx="100" cy="200" rx="50" ry="70" fill="#2ecc71"/>
  <!-- Head -->
  <circle cx="100" cy="100" r="40" fill="#ffd5c2"/>
  <!-- Hat -->
  <path d="M60 80 L100 20 L140 80 Z" fill="#e74c3c"/>
  <!-- Eyes -->
  <circle cx="85" cy="90" r="5" fill="#2c3e50"/>
  <circle cx="115" cy="90" r="5" fill="#2c3e50"/>
  <!-- Smile -->
  <path d="M85 110 Q100 120 115 110" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <!-- Belt -->
  <rect x="50" y="180" width="100" height="10" fill="#f1c40f"/>
</svg>

<script>
function createSnowflakes() {
  const snowfall = document.createElement('div');
  snowfall.className = 'snowfall';
  document.body.appendChild(snowfall);

  for (let i = 0; i < 50; i++) {
    createSnowflake(snowfall);
  }
}

function createSnowflake(container) {
  const snowflake = document.createElement('div');
  snowflake.className = 'snowflake';
  snowflake.innerHTML = '❄';
  
  const startPositionX = Math.random() * window.innerWidth;
  const animationDuration = Math.random() * 3 + 2;
  
  snowflake.style.left = startPositionX + 'px';
  snowflake.style.animationDuration = animationDuration + 's';
  
  container.appendChild(snowflake);
  
  // Reset snowflake position when animation ends
  snowflake.addEventListener('animationend', () => {
    snowflake.remove();
    createSnowflake(container);
  });
}

// Create snowfall animation
document.addEventListener('DOMContentLoaded', createSnowflakes);

// Add falling animation
const style = document.createElement('style');
style.textContent = `
  @keyframes fall {
    from {
      transform: translateY(-5vh);
      opacity: 1;
    }
    to {
      transform: translateY(105vh);
      opacity: 0.5;
    }
  }
`;
document.head.appendChild(style);
</script>

</body></html>
