<html><head><base href="https://websim.ai" />
  <title>BookCraft - Create Your Own Interactive Story</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    h1 {
      color: #4db6ac;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
      animation: slideDown 0.5s ease-out;
    }
    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .book-container {
      background: rgba(42, 42, 42, 0.9);
      border-radius: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      padding: 30px;
      margin-bottom: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      animation: scaleIn 0.5s ease-out;
    }
    @keyframes scaleIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .page-content {
      flex-grow: 1;
      font-size: 18px;
      line-height: 1.6;
      color: #e0e0e0;
      transition: opacity 0.3s ease;
    }
    .navigation {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }
    .nav-button {
      background: #4db6ac;
      color: #1a1a1a;
      border: none;
      width: 80px;
      height: 40px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .nav-button:hover {
      background: #45a29e;
      transform: scale(1.05);
    }
    .nav-button:disabled {
      background: #3a3a3a;
      color: #707070;
      cursor: not-allowed;
      transform: scale(1);
    }
    .nav-button::before {
      content: '';
      position: absolute;
      width: 0;
      height: 0;
      border-style: solid;
      transition: transform 0.3s ease;
    }
    #prev-page::before {
      border-width: 10px 15px 10px 0;
      border-color: transparent #1a1a1a transparent transparent;
      left: 25px;
    }
    #next-page::before {
      border-width: 10px 0 10px 15px;
      border-color: transparent transparent transparent #1a1a1a;
      right: 25px;
    }
    .nav-button:hover::before {
      transform: scale(1.2);
    }
    #prompt-form, #continuation-form {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
      width: 100%;
      animation: slideUp 0.5s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .prompt-input {
      min-height: 50px;
      max-height: 200px;
      padding: 15px;
      font-size: 18px;
      border: 2px solid #4db6ac;
      border-radius: 20px;
      background: rgba(42, 42, 42, 0.9);
      color: #e0e0e0;
      resize: none;
      overflow-y: hidden;
      margin-bottom: 10px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .prompt-input:focus {
      border-color: #66cfcf;
      box-shadow: 0 0 5px rgba(102, 207, 207, 0.5);
    }
    .submit-button, .cancel-button, .option-button {
      background: #4db6ac;
      color: #1a1a1a;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 25px;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
      margin-top: 10px;
    }
    .submit-button:hover, .cancel-button:hover, .option-button:hover {
      background: #45a29e;
      transform: translateY(-2px);
    }
    .cancel-button {
      background: #e57373;
    }
    .cancel-button:hover {
      background: #ef5350;
    }
    .options {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      animation: fadeIn 0.5s ease-out;
    }
    .option-button {
      margin: 0 10px;
    }
    #page-number {
      text-align: center;
      margin-top: 10px;
      font-style: italic;
      color: #909090;
      transition: opacity 0.3s ease;
    }
    #continuation-form {
      display: none;
    }
    .length-selector {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .length-option {
      background: rgba(42, 42, 42, 0.9);
      color: #e0e0e0;
      border: 2px solid #4db6ac;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 16px;
      flex-grow: 1;
      margin: 0 5px;
      text-align: center;
    }
    .length-option:hover, .length-option.selected {
      background: #4db6ac;
      color: #1a1a1a;
      transform: translateY(-2px);
    }
    .moving-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .shape {
      position: absolute;
      opacity: 0.1;
      animation: float 15s infinite ease-in-out;
    }
    .shape:nth-child(1) {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #4db6ac;
      left: 10%;
      top: 20%;
    }
    .shape:nth-child(2) {
      width: 120px;
      height: 120px;
      background: #45a29e;
      right: 15%;
      top: 40%;
      animation-delay: -2s;
    }
    .shape:nth-child(3) {
      width: 100px;
      height: 100px;
      background: #66cfcf;
      left: 20%;
      bottom: 20%;
      animation-delay: -4s;
    }
    .shape:nth-child(4) {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #3d8c84;
      right: 30%;
      bottom: 30%;
      animation-delay: -6s;
    }
    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-20px) rotate(180deg);
      }
    }
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #4db6ac;
      border-top: 5px solid #1a1a1a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-message {
      color: #e0e0e0;
      margin-top: 20px;
      text-align: center;
      max-width: 80%;
    }
    .recent-prompts {
      background: rgba(42, 42, 42, 0.9);
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      display: none;
    }
    .recent-prompts h2 {
      color: #4db6ac;
      margin-bottom: 15px;
    }
    .recent-prompt-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #4db6ac;
    }
    .recent-prompt-item:last-child {
      border-bottom: none;
    }
    .recent-prompt-text {
      flex-grow: 1;
      margin-right: 10px;
    }
    .recent-prompt-actions {
      display: flex;
    }
    .recent-prompt-actions button {
      background: #4db6ac;
      color: #1a1a1a;
      border: none;
      padding: 5px 10px;
      margin-left: 5px;
      border-radius: 15px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .recent-prompt-actions button:hover {
      background: #45a29e;
    }
    .button-container {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }
    .button-container button {
      flex: 1;
      margin: 0 5px;
    }
    #custom-length-input, #custom-length-input-continuation {
      width: 60px;
      text-align: center;
      padding: 5px;
      border: 2px solid #4db6ac;
      border-radius: 10px;
      background: rgba(42, 42, 42, 0.9);
      color: #e0e0e0;
      font-size: 16px;
      margin-left: 5px;
    }
    #custom-length-input:focus, #custom-length-input-continuation:focus {
      outline: none;
      border-color: #66cfcf;
      box-shadow: 0 0 5px rgba(102, 207, 207, 0.5);
    }
  </style>
</head>
<body>
  <div class="moving-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>
  <div class="container">
    <h1>BookCraft</h1>
    <form id="prompt-form">
      <textarea id="prompt-input" class="prompt-input" placeholder="Enter your book idea..." required></textarea>
      <div class="length-selector">
        <div class="length-option" data-length="short">Short (5 pages)</div>
        <div class="length-option" data-length="medium">Medium (10 pages)</div>
        <div class="length-option" data-length="long">Long (15 pages)</div>
        <div class="length-option" data-length="custom">
          Custom
          <input type="number" id="custom-length-input" min="1" max="50" value="20">
        </div>
      </div>
      <div class="button-container">
        <button type="submit" id="submit-prompt" class="submit-button">Create</button>
        <button type="button" id="recent-prompts-button" class="option-button">Recent Prompts</button>
      </div>
    </form>
    <div class="book-container">
      <div id="page-content" class="page-content"></div>
      <div id="page-number"></div>
      <div class="navigation">
        <button id="prev-page" class="nav-button" disabled></button>
        <button id="next-page" class="nav-button" disabled></button>
      </div>
    </div>
    <div class="options" style="display: none;">
      <button id="go-home" class="option-button">Go Back Home</button>
      <button id="continue-book" class="option-button">Continue This Book</button>
    </div>
    <form id="continuation-form">
      <textarea id="continuation-input" class="prompt-input" placeholder="Enter a prompt to continue the story..." required></textarea>
      <div class="length-selector">
        <div class="length-option" data-length="short">Short (5 pages)</div>
        <div class="length-option" data-length="medium">Medium (10 pages)</div>
        <div class="length-option" data-length="long">Long (15 pages)</div>
        <div class="length-option" data-length="custom">
          Custom
          <input type="number" id="custom-length-input-continuation" min="1" max="50" value="20">
        </div>
      </div>
      <div class="button-container">
        <button type="submit" id="submit-continuation" class="submit-button">Continue Story</button>
        <button type="button" id="cancel-continuation" class="cancel-button">Cancel</button>
      </div>
    </form>
    <div id="recent-prompts" class="recent-prompts">
      <h2>Recent Prompts</h2>
      <div id="recent-prompts-list"></div>
    </div>
    <button id="go-to-book" class="option-button"style="display: none;">Go Back to Book Page</button>
  </div>

  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div id="loading-message" class="loading-message"></div>
  </div>

  <script>
    let currentBook = [];
    let currentPage = 0;
    let selectedLength = 'medium';
    let recentPrompts = [];

    const promptForm = document.getElementById('prompt-form');
    const promptInput = document.getElementById('prompt-input');
    const pageContent = document.getElementById('page-content');
    const pageNumber = document.getElementById('page-number');
    const prevButton = document.getElementById('prev-page');
    const nextButton = document.getElementById('next-page');
    const options = document.querySelector('.options');
    const goHomeButton = document.getElementById('go-home');
    const continueBookButton = document.getElementById('continue-book');
    const continuationForm = document.getElementById('continuation-form');
    const continuationInput = document.getElementById('continuation-input');
    const cancelContinuationButton = document.getElementById('cancel-continuation');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingMessage = document.getElementById('loading-message');
    const recentPromptsButton = document.getElementById('recent-prompts-button');
    const recentPromptsContainer = document.getElementById('recent-prompts');
    const recentPromptsList = document.getElementById('recent-prompts-list');
    const goToBookButton = document.getElementById('go-to-book');
    const customLengthInput = document.getElementById('custom-length-input');
    const customLengthInputContinuation = document.getElementById('custom-length-input-continuation');

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }

    promptInput.addEventListener('input', function() {
      autoResize(this);
    });

    continuationInput.addEventListener('input', function() {
      autoResize(this);
    });

    document.querySelectorAll('.length-option').forEach(option => {
      option.addEventListener('click', function() {
        document.querySelectorAll('.length-option').forEach(opt => opt.classList.remove('selected'));
        this.classList.add('selected');
        selectedLength = this.dataset.length;
        if (selectedLength === 'custom') {
          customLengthInput.focus();
        }
      });
    });

    customLengthInput.addEventListener('input', function() {
      this.value = Math.max(1, Math.min(50, this.value));
    });

    customLengthInputContinuation.addEventListener('input', function() {
      this.value = Math.max(1, Math.min(50, this.value));
    });

    promptForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const prompt = promptInput.value;
      const length = selectedLength === 'custom' ? customLengthInput.value : selectedLength;
      addRecentPrompt(prompt);
      await createBook(prompt, false, length);
    });

    prevButton.addEventListener('click', () => {
      navigatePage('prev');
    });

    nextButton.addEventListener('click', () => {
      navigatePage('next');
    });

    goHomeButton.addEventListener('click', () => {
      showHomePage();
    });

    continueBookButton.addEventListener('click', () => {
      options.style.display = 'none';
      continuationForm.style.display = 'flex';
    });

    cancelContinuationButton.addEventListener('click', () => {
      continuationForm.style.display = 'none';
      options.style.display = 'flex';
    });

    continuationForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const continuationPrompt = continuationInput.value;
      const length = selectedLength === 'custom' ? customLengthInputContinuation.value : selectedLength;
      addRecentPrompt(continuationPrompt);
      await createBook(continuationPrompt, true, length);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') {
        navigatePage('prev');
      } else if (e.key === 'ArrowRight') {
        navigatePage('next');
      }
    });

    recentPromptsButton.addEventListener('click', () => {
      recentPromptsContainer.style.display = recentPromptsContainer.style.display === 'none' ? 'block' : 'none';
      updateRecentPromptsList();
    });

    goToBookButton.addEventListener('click', () => {
      showBookPage();
    });

    function navigatePage(direction) {
      if (direction === 'prev' && currentPage > 0) {
        currentPage--;
        updatePage();
      } else if (direction === 'next' && currentPage < currentBook.length - 1) {
        currentPage++;
        updatePage();
      }
    }

    async function createBook(prompt, isContinuation = false, length) {
      promptForm.style.display = 'none';
      continuationForm.style.display = 'none';
      recentPromptsContainer.style.display = 'none';
      loadingOverlay.classList.add('active');
      
      if (parseInt(length) > 20) {
        loadingMessage.textContent = "Doing a pretty high number of pages could cause the AI to not make them all.";
      } else {
        loadingMessage.textContent = "";
      }

      try {
        const response = await fetch('https://websim.ai/api/book-generator', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ prompt, isContinuation, currentBook, length }),
        });

        if (!response.ok) {
          throw new Error('Failed to generate book');
        }

        const data = await response.json();
        
        if (isContinuation) {
          const originalLength = currentBook.length;
          currentBook = currentBook.concat(data.pages);
          currentPage = originalLength; // Set to the first new page
        } else {
          currentBook = data.pages;
          currentPage = 0;
        }
        
        showBookPage();
      } catch (error) {
        pageContent.textContent = 'Error creating book. Please try again.';
        promptForm.style.display = 'flex';
      } finally {
        loadingOverlay.classList.remove('active');
      }
    }

    function updatePage() {
      pageContent.style.opacity = '0';
      pageNumber.style.opacity = '0';
      
      setTimeout(() => {
        pageContent.textContent = currentBook[currentPage];
        pageNumber.textContent = `Page ${currentPage + 1} of ${currentBook.length}`;
        prevButton.disabled = currentPage === 0;
        nextButton.disabled = currentPage === currentBook.length - 1;
        
        pageContent.style.opacity = '1';
        pageNumber.style.opacity = '1';
      }, 300);
    }

    function addRecentPrompt(prompt) {
      recentPrompts.unshift(prompt);
      if (recentPrompts.length > 5) {
        recentPrompts.pop();
      }
      localStorage.setItem('recentPrompts', JSON.stringify(recentPrompts));
    }

    function updateRecentPromptsList() {
      recentPromptsList.innerHTML = '';
      recentPrompts.forEach((prompt, index) => {
        const promptItem = document.createElement('div');
        promptItem.className = 'recent-prompt-item';
        promptItem.innerHTML = `
          <span class="recent-prompt-text">${prompt}</span>
          <div class="recent-prompt-actions">
            <button onclick="copyToClipboard(${index})">Copy</button>
            <button onclick="usePrompt(${index})">Use</button>
          </div>
        `;
        recentPromptsList.appendChild(promptItem);
      });
    }

    function copyToClipboard(index) {
      navigator.clipboard.writeText(recentPrompts[index]).then(() => {
        alert('Prompt copied to clipboard!');
      });
    }

    function usePrompt(index) {
      promptInput.value = recentPrompts[index];
      autoResize(promptInput);
      recentPromptsContainer.style.display = 'none';
    }

    function showHomePage() {
      promptForm.style.display = 'flex';
      options.style.display = 'none';
      continuationForm.style.display = 'none';
      recentPromptsContainer.style.display = 'none';
      pageContent.textContent = '';
      pageNumber.textContent = '';
      prevButton.disabled = false;
      nextButton.disabled = false;
      promptInput.value = '';
      promptInput.style.height = 'auto';
      selectedLength = 'medium';
      document.querySelectorAll('.length-option').forEach(opt => opt.classList.remove('selected'));
      document.querySelector('.length-option[data-length="medium"]').classList.add('selected');
      goToBookButton.style.display = currentBook.length > 0 ? 'block' : 'none';
    }

    function showBookPage() {
      promptForm.style.display = 'none';
      options.style.display = 'flex';
      continuationForm.style.display = 'none';
      recentPromptsContainer.style.display = 'none';
      goToBookButton.style.display = 'none';
      updatePage();
    }

    // Initialize the medium length option as selected
    document.querySelector('.length-option[data-length="medium"]').classList.add('selected');

    // Load recent prompts from localStorage
    const storedPrompts = localStorage.getItem('recentPrompts');
    if (storedPrompts) {
      recentPrompts = JSON.parse(storedPrompts);
    }

    // Show home page on initial load
    showHomePage();
  </script>
</body>
</html>
