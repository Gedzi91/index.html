<!DOCTYPE html><html><head><base href="https://ripples.gl"><title>ripples.gl - Interactive Swirling GLSL Shader with Multiple Ripples</title><style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
    }
    #canvas {
        width: 100%;
        height: 100%;
        cursor: none;
    }
</style></head><body>
<canvas id="canvas"></canvas>
<script id="vertexShader" type="x-shader/x-vertex">
    attribute vec3 position;
    void main() {
        gl_Position = vec4(position, 1.0);
    }
</script>
<script id="fragmentShader" type="x-shader/x-fragment">
    precision highp float;
    uniform vec2 u_resolution;
    uniform vec2 u_mouse;
    uniform float u_time;
    uniform vec2 u_clicks[10];
    uniform float u_clickTimes[10];
    uniform int u_clickCount;

    vec3 palette( float t ) {
        vec3 a = vec3(0.5, 0.5, 0.5);
        vec3 b = vec3(0.5, 0.5, 0.5);
        vec3 c = vec3(1.0, 1.0, 1.0);
        vec3 d = vec3(0.263,0.416,0.557);
        return a + b*cos( 6.28318*(c*t+d) );
    }

    float ripple(vec2 uv, vec2 center, float time) {
        float d = length(uv - center);
        float t = clamp(time, 0.0, 5.0);
        float rippleSpeed = 0.2;
        float rippleRadius = t * rippleSpeed;
        float wave = sin(max(0.0, d - rippleRadius) * 20.0) * 0.5 + 0.5;
        return wave * smoothstep(rippleRadius + 0.1, rippleRadius, d) * smoothstep(5.0, 0.0, t);
    }

    void main() {
        vec2 uv = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / u_resolution.y;
        vec2 mouse = (u_mouse.xy * 2.0 - u_resolution.xy) / u_resolution.y;
        
        float t = u_time * 0.1;
        
        vec2 uv0 = uv;
        vec3 finalColor = vec3(0.0);
        
        float mouseDistance = length(uv - mouse);
        float mouseInfluence = smoothstep(0.5, 0.0, mouseDistance);
        
        float totalRippleEffect = 0.0;
        for (int i = 0; i < 10; i++) {
            if (i >= u_clickCount) break;
            vec2 click = (u_clicks[i].xy * 2.0 - u_resolution.xy) / u_resolution.y;
            float timeSinceClick = u_time - u_clickTimes[i];
            totalRippleEffect += ripple(uv, click, timeSinceClick);
        }
        
        // Fractal iterations
        for (int i = 0; i < 5; i++) {
            float d = length(uv) * exp(-length(uv0));
            
            vec3 col = palette(length(uv0) + t + float(i) * 0.05);
            
            float swirl = sin(d*8. + t + mouseInfluence * 5.0 + totalRippleEffect * 5.0) / (8.0 + mouseInfluence * 4.0);
            d = abs(swirl);
            
            d = pow(0.01 / d, 1.2);
            
            finalColor += col * d * (1.0 / pow(2.0, float(i)));
            
            // Modify UV for next iteration
            uv = fract(uv * 1.5) - 0.5;
        }
        
        finalColor += vec3(1.0, 0.8, 0.6) * smoothstep(0.2, 0.0, mouseDistance) * 0.5;
        finalColor += vec3(0.2, 0.4, 0.8) * totalRippleEffect * 0.5;
        
        gl_FragColor = vec4(finalColor, 1.0);
    }
</script>
<script>
    const canvas = document.getElementById('canvas');
    const gl = canvas.getContext('webgl');

    if (!gl) {
        alert('WebGL not supported');
    }

    const program = gl.createProgram();

    function createShader(type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('Shader compile error:', gl.getShaderInfoLog(shader));
            gl.deleteShader(shader);
            return null;
        }
        return shader;
    }

    const vertexShader = createShader(gl.VERTEX_SHADER, document.getElementById('vertexShader').textContent);
    const fragmentShader = createShader(gl.FRAGMENT_SHADER, document.getElementById('fragmentShader').textContent);

    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);

    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error('Program link error:', gl.getProgramInfoLog(program));
    }

    gl.useProgram(program);

    const positionBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    const positions = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
    gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

    const positionLocation = gl.getAttribLocation(program, 'position');
    gl.enableVertexAttribArray(positionLocation);
    gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

    const timeLocation = gl.getUniformLocation(program, 'u_time');
    const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
    const mouseLocation = gl.getUniformLocation(program, 'u_mouse');
    const clicksLocation = gl.getUniformLocation(program, 'u_clicks');
    const clickTimesLocation = gl.getUniformLocation(program, 'u_clickTimes');
    const clickCountLocation = gl.getUniformLocation(program, 'u_clickCount');

    let mouseX = 0, mouseY = 0;
    let clicks = [];
    let clickTimes = [];

    // Create audio context and oscillators for melody
    let audioContext;
    let melodyOscillators = [];
    let gainNodes = [];
    let reverbNode;

    const melodyNotes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25]; // C4 to C5

    function initAudio() {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        reverbNode = audioContext.createConvolver();

        // Create impulse response for reverb
        const impulseLength = 2 * audioContext.sampleRate;
        const impulse = audioContext.createBuffer(2, impulseLength, audioContext.sampleRate);
        for (let channel = 0; channel < 2; channel++) {
            const impulseData = impulse.getChannelData(channel);
            for (let i = 0; i < impulseLength; i++) {
                impulseData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / impulseLength, 2);
            }
        }
        reverbNode.buffer = impulse;
        reverbNode.connect(audioContext.destination);

        // Create oscillators and gain nodes for each note
        melodyNotes.forEach((frequency, index) => {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(reverbNode);
            
            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            
            oscillator.start();
            
            melodyOscillators.push(oscillator);
            gainNodes.push(gainNode);
        });
    }

    function playMelodyNote(index) {
        if (!audioContext) initAudio();
        const gainNode = gainNodes[index];
        gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
    }

    canvas.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = canvas.height - e.clientY; // Flip Y-coordinate
    });

    function handleInteraction(x, y) {
        clicks.push([x, canvas.height - y]);
        clickTimes.push(performance.now() * 0.001);
        if (clicks.length > 10) {
            clicks.shift();
            clickTimes.shift();
        }
        // Play melody note on interaction
        const noteIndex = Math.floor((x / canvas.width) * melodyNotes.length);
        playMelodyNote(noteIndex);
    }

    canvas.addEventListener('click', (e) => {
        handleInteraction(e.clientX, e.clientY);
    });

    // Add touch event listeners
    canvas.addEventListener('touchstart', handleTouch, false);
    canvas.addEventListener('touchmove', handleTouch, false);

    function handleTouch(e) {
        e.preventDefault();
        const touch = e.touches[0];
        mouseX = touch.clientX;
        mouseY = canvas.height - touch.clientY;
        
        if (e.type === 'touchstart') {
            handleInteraction(mouseX, mouseY);
        }
    }

    // Add sound activation by touch
    document.body.addEventListener('touchstart', function() {
        if (!audioContext) {
            initAudio();
        }
    }, false);

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function render(time) {
        time *= 0.001;  // convert to seconds

        gl.uniform1f(timeLocation, time);
        gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
        gl.uniform2f(mouseLocation, mouseX, mouseY);
        
        // Update clicks and clickTimes
        gl.uniform2fv(clicksLocation, clicks.flat());
        gl.uniform1fv(clickTimesLocation, clickTimes);
        gl.uniform1i(clickCountLocation, clicks.length);

        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

        requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
</script>
</body></html>
