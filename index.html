<html><head><base href="https://neon-pulse.gl">
<title>Neon Pulse - Interactive GLSL Art</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Roboto', sans-serif;
        background-color: #000;
        color: #fff;
    }
    #canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 10;
        background-color: rgba(0,0,0,0.7);
        padding: 20px;
        border-radius: 10px;
    }
    h1 {
        margin-top: 0;
        font-size: 24px;
        color: #0ff;
    }
    .control {
        margin-bottom: 15px;
    }
    label {
        display: block;
        margin-bottom: 5px;
    }
    input[type="range"] {
        width: 200px;
    }
    #presets {
        margin-top: 20px;
    }
    button {
        background-color: #0ff;
        color: #000;
        border: none;
        padding: 8px 12px;
        margin-right: 10px;
        cursor: pointer;
        border-radius: 5px;
        transition: background-color 0.3s;
    }
    button:hover {
        background-color: #00cccc;
    }
    #info {
        position: fixed;
        bottom: 20px;
        right: 20px;
        text-align: right;
        font-size: 14px;
    }
    a {
        color: #0ff;
        text-decoration: none;
    }
    a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
    <h1>Neon Pulse</h1>
    <div class="control">
        <label for="speed">Speed:</label>
        <input type="range" id="speed" min="0" max="2" step="0.1" value="1">
    </div>
    <div class="control">
        <label for="intensity">Intensity:</label>
        <input type="range" id="intensity" min="0" max="2" step="0.1" value="1">
    </div>
    <div class="control">
        <label for="complexity">Complexity:</label>
        <input type="range" id="complexity" min="1" max="5" step="1" value="3">
    </div>
    <div class="control">
        <label for="color">Color Shift:</label>
        <input type="range" id="color" min="0" max="6.28" step="0.1" value="0">
    </div>
    <div id="presets">
        <button id="preset1">Cyberpunk</button>
        <button id="preset2">Retro Wave</button>
        <button id="preset3">Quantum Flux</button>
    </div>
</div>
<div id="info">
    Created by <a href="https://neon-pulse.gl/about">Neon Pulse Studio</a><br>
    <a href="https://neon-pulse.gl/gallery">More Shaders</a> | <a href="https://neon-pulse.gl/learn">Learn GLSL</a>
</div>

<script id="vertexShader" type="x-shader/x-vertex">
    attribute vec3 position;
    void main() {
        gl_Position = vec4(position, 1.0);
    }
</script>

<script id="fragmentShader" type="x-shader/x-fragment">
    precision highp float;
    uniform vec2 u_resolution;
    uniform vec2 u_mouse;
    uniform float u_time;
    uniform float u_speed;
    uniform float u_intensity;
    uniform float u_complexity;
    uniform float u_colorShift;

    vec3 neonColor(float t) {
        return 0.5 + 0.5 * cos(u_colorShift + t + vec3(0.0, 2.0, 4.0));
    }

    float sdCircle(vec2 p, float r) {
        return length(p) - r;
    }

    void main() {
        vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution) / min(u_resolution.x, u_resolution.y);
        vec2 mouse = (u_mouse - 0.5 * u_resolution) / min(u_resolution.x, u_resolution.y);
        
        float t = u_time * u_speed;
        
        float d = 1000.0;
        for (float i = 0.0; i < 5.0; i++) {
            if (i >= u_complexity) break;
            vec2 pos = vec2(
                sin(t * (0.1 + i * 0.1)) * 0.5,
                cos(t * (0.2 + i * 0.1)) * 0.5
            );
            float size = 0.1 + 0.05 * sin(t * (1.0 + i * 0.2));
            d = min(d, sdCircle(uv - pos, size));
        }
        
        vec3 col = neonColor(d * 10.0 - t);
        
        float pulse = sin(t * 2.0 + d * 20.0) * 0.5 + 0.5;
        col *= 1.0 + pulse * u_intensity;
        
        float glow = 0.02 / (abs(d) + 0.01);
        col += col * glow * 2.0 * u_intensity;

        gl_FragColor = vec4(col, 1.0);
    }
</script>

<script>
    const canvas = document.getElementById('canvas');
    const gl = canvas.getContext('webgl');

    if (!gl) {
        alert('WebGL not supported');
    }

    const program = gl.createProgram();

    function createShader(type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('Shader compile error:', gl.getShaderInfoLog(shader));
            gl.deleteShader(shader);
            return null;
        }
        return shader;
    }

    const vertexShader = createShader(gl.VERTEX_SHADER, document.getElementById('vertexShader').textContent);
    const fragmentShader = createShader(gl.FRAGMENT_SHADER, document.getElementById('fragmentShader').textContent);

    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);

    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error('Program link error:', gl.getProgramInfoLog(program));
    }

    gl.useProgram(program);

    const positionBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    const positions = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
    gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

    const positionLocation = gl.getAttribLocation(program, 'position');
    gl.enableVertexAttribArray(positionLocation);
    gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

    const timeLocation = gl.getUniformLocation(program, 'u_time');
    const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
    const mouseLocation = gl.getUniformLocation(program, 'u_mouse');
    const speedLocation = gl.getUniformLocation(program, 'u_speed');
    const intensityLocation = gl.getUniformLocation(program, 'u_intensity');
    const complexityLocation = gl.getUniformLocation(program, 'u_complexity');
    const colorShiftLocation = gl.getUniformLocation(program, 'u_colorShift');

    let mouseX = 0, mouseY = 0;
    canvas.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const speedControl = document.getElementById('speed');
    const intensityControl = document.getElementById('intensity');
    const complexityControl = document.getElementById('complexity');
    const colorControl = document.getElementById('color');

    function render(time) {
        time *= 0.001;  // convert to seconds

        gl.uniform1f(timeLocation, time);
        gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
        gl.uniform2f(mouseLocation, mouseX, canvas.height - mouseY);
        gl.uniform1f(speedLocation, parseFloat(speedControl.value));
        gl.uniform1f(intensityLocation, parseFloat(intensityControl.value));
        gl.uniform1f(complexityLocation, parseFloat(complexityControl.value));
        gl.uniform1f(colorShiftLocation, parseFloat(colorControl.value));

        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

        requestAnimationFrame(render);
    }

    requestAnimationFrame(render);

    // Presets
    document.getElementById('preset1').addEventListener('click', () => {
        speedControl.value = 1.5;
        intensityControl.value = 1.8;
        complexityControl.value = 5;
        colorControl.value = 0;
    });

    document.getElementById('preset2').addEventListener('click', () => {
        speedControl.value = 0.8;
        intensityControl.value = 1.2;
        complexityControl.value = 3;
        colorControl.value = 4.5;
    });

    document.getElementById('preset3').addEventListener('click', () => {
        speedControl.value = 2.0;
        intensityControl.value = 1.5;
        complexityControl.value = 4;
        colorControl.value = 2.8;
    });
</script>
</body></html>
