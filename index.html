<!DOCTYPE html><html><head><base href="https://digital-sculpture.art/research/holographic-technology/ai-reconstruction/holographic-ai-assistants/demo/temporal-nexus/interactive/">
<title>Quantum Temporal Nexus: Interactive Time-Space Screensaver</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000033;
    font-family: 'Arial', sans-serif;
    color: #228B22; /* Dark Forest Green */
}

#info-panel {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: rgba(0, 20, 40, 0.7);
    color: #228B22; /* Dark Forest Green */
    padding: 15px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
}
</style>
</head>
<body>
<div id="canvas-container">
    <canvas id="temporal-canvas"></canvas>
</div>
<div id="info-panel">
    Quantum Temporal Nexus: Click to create temporal distortions | Move mouse to influence particle flow
</div>

<script>
const canvas = document.getElementById('temporal-canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
const particleCount = 500;
const algorithms = ['Quantum Entanglement', 'Time Dilation', 'Wormhole Theory', 'Multiverse Hypothesis'];

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = Math.random() * 3 - 1.5;
        this.speedY = Math.random() * 3 - 1.5;
        this.color = `hsl(${Math.random() * 360}, 50%, 50%)`;
        this.algorithm = algorithms[Math.floor(Math.random() * algorithms.length)];
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x > canvas.width || this.x < 0) {
            this.speedX = -this.speedX;
        }
        if (this.y > canvas.height || this.y < 0) {
            this.speedY = -this.speedY;
        }
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        
        // Display algorithm name in Dark Forest Green
        ctx.fillStyle = '#228B22'; // Dark Forest Green
        ctx.font = '10px Arial';
        ctx.fillText(this.algorithm, this.x + this.size + 2, this.y + this.size + 2);
    }
}

function createParticles() {
    for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
    }
}

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
    }
    
    requestAnimationFrame(animateParticles);
}

createParticles();
animateParticles();

// Event Listeners
canvas.addEventListener('click', (event) => {
    const distortion = new Particle();
    distortion.x = event.clientX;
    distortion.y = event.clientY;
    distortion.size = 10;
    distortion.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
    particles.push(distortion);
});

canvas.addEventListener('mousemove', (event) => {
    const mouseX = event.clientX;
    const mouseY = event.clientY;
    
    particles.forEach(particle => {
        const dx = mouseX - particle.x;
        const dy = mouseY - particle.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < 100) {
            particle.speedX += dx * 0.01;
            particle.speedY += dy * 0.01;
        }
    });
});

// Resize canvas when window is resized
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// Show info panel
document.getElementById('info-panel').style.display = 'block';
</script>
</body></html>
