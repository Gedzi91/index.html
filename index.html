<html><head><base href="https://digital-sculpture.art/research/holographic-technology/ai-%20create%20a%20holographic%20visualization%20of%20a%20statue%20using%2052%20k%20particles%20let%20the%20statue%20be%20something%20already%20known"><title>Interactive Holographic Sculpture Studio</title>
<style>
body {
    font-family: 'Roboto', sans-serif;
    background-color: #111;
    color: #fff;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;

}

    position: relative;
    width: 100vw;
    height: 100vh;
}
canvas {
    position: absolute;

}

    position: absolute;

    transform: translateX(-50%);

    max-width: 90vw;
}
button {
    padding: 12px 24px;
    background-color: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(255, 255, 255, 0.3);

    transition: all 0.3s;
    font-size: 16px;

}
button:hover {
    background-color: rgba(255, 255, 255, 0.2);

}
button:active {
    transform: scale(0.95);
}
#info {
    position: absolute;
    top: 20px;

    background-color: rgba(0, 0, 0, 0.7);
    padding: 20px;

    max-width: 300px;
    z-index: 10;
}
h2 {
    margin-top: 0;

}
p {
    margin: 10px 0;

}
#particle-count {
    position: absolute;
    top: 20px;
    right: 20px;
    background-color: rgba(0, 0, 0, 0.7);
    padding: 10px;

}
#sculpture-select, #color-mode-select, #effect-select, #filter-select {
    position: absolute;
    top: 20px;

}
#sculpture-select {
    left: 20px;
}
#color-mode-select {
    left: 25%;

}

    right: 25%;

}

    right: 20px;
}
#sliders {
    position: absolute;

}

input[type="range"] {

</head>
<body>
<div id="canvas-container">
    <canvas id="particleCanvas" width="1872" height="827" style="width: 1872px; height: 827px; touch-action: none;"></canvas>
</div>
<div id="controls">
    <button id="rotateLeft">⟲ Rotate Left</button>
    <button id="rotateRight">⟳ Rotate Right</button>
    <button id="zoomIn">🔍+ Zoom In</button>
    <button id="zoomOut">🔍- Zoom Out</button>
    <button id="toggleAnimation">⏸ Pause</button>
    <button id="resetView">↺ Reset View</button>
    <button id="explode">💥 Explode</button>
    <button id="implode">⚛️ Implode</button>
</div>
<div id="info">
    <h2 id="sculpture-name">David by Michelangelo</h2>
    <p id="sculpture-info"></p>
</div>
<div id="particle-count">Particles: <span id="count">52,000</span></div>
<select id="sculpture-select">
    <option value="david">David by Michelangelo</option>
    <option value="venus">Venus de Milo</option>
    <option value="thinker">The Thinker by Rodin</option>
    <option value="discus">Discobolus</option>
    <option value="victory">Winged Victory of Samothrace</option>
    <option value="pieta">Pietà by Michelangelo</option>
    <option value="nefertiti">Bust of Nefertiti</option>
    <option value="laocoon">Laocoön and His Sons</option>
</select>
<select id="color-mode-select">
    <option value="rainbow">Rainbow</option>
    <option value="sculpture">Sculpture</option>
    <option value="gradient">Gradient</option>
    <option value="psychedelic">Psychedelic</option>
    <option value="depth">Depth</option>
    <option value="temperature">Temperature</option>
    <option value="metallic">Metallic</option>
    <option value="neon">Neon</option>
</select>
<select id="effect-select">
    <option value="none">None</option>
    <option value="wave">Wave</option>
    <option value="twirl">Twirl</option>
    <option value="pulse">Pulse</option>
    <option value="vortex">Vortex</option>
    <option value="spiral">Spiral</option>
    <option value="bounce">Bounce</option>
    <option value="shatter">Shatter</option>
</select>
<select id="filter-select">
    <option value="none">No Filter</option>
    <option value="warm">Warm</option>
    <option value="cool">Cool</option>
    <option value="sepia">Sepia</option>
    <option value="invert">Invert</option>
    <option value="highContrast">High Contrast</option>
    <option value="grayscale">Grayscale</option>
    <option value="vintage">Vintage</option>
</select>
<div id="sliders">
    <div class="slider-container">
        <label for="particleSize">Particle Size:</label>
        <input type="range" id="particleSize" min="0.001" max="0.05" step="0.001" value="0.01">
    </div>
    <div class="slider-container">
        <label for="rotationSpeed">Rotation Speed:</label>
        <input type="range" id="rotationSpeed" min="-0.01" max="0.01" step="0.001" value="0.001">
    </div>
    <div class="slider-container">
        <label for="effectIntensity">Effect Intensity:</label>
        <input type="range" id="effectIntensity" min="0" max="1" step="0.01" value="0.5">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let scene, camera, renderer, particles;
let rotationSpeed = 0.001;
let zoomLevel = 1;
let particleCount = 52000;
let colorMode = 'rainbow';
let isAnimating = true;
let currentSculpture = 'david';
let time = 0;
let effect = 'none';
let effectIntensity = 0.5;
let particleSize = 0.01;
let exploding = false;
let imploding = false;
let currentFilter = 'none';

const sculptureInfo = {
    david: {
        name: "David by Michelangelo",
        info: "Created: 1501-1504<br>Height: 5.17 meters (17 ft)<br>Material: Carrara marble<br>Location: Galleria dell'Accademia, Florence, Italy<br>Significance: One of the most recognized works of Renaissance sculpture."
    },
    venus: {
        name: "Venus de Milo",
        info: "Created: Between 130 and 100 BC<br>Height: 2.04 meters (6.7 ft)<br>Material: Parian marble<br>Location: Louvre Museum, Paris, France<br>Significance: One of the most famous works of ancient Greek sculpture."
    },
    thinker: {
        name: "The Thinker by Rodin",
        info: "Created: 1880-1904<br>Height: 1.88 meters (6.2 ft)<br>Material: Bronze and marble<br>Location: Multiple casts worldwide<br>Significance: Iconic representation of philosophical contemplation."
    },
    discus: {
        name: "Discobolus",
        info: "Created: 5th century BC (Roman copy)<br>Height: 1.55 meters (5.1 ft)<br>Material: Marble<br>Location: Various museums<br>Significance: Classic representation of athletic prowess in ancient Greek art."
    },
    victory: {
        name: "Winged Victory of Samothrace",
        info: "Created: 2nd century BC<br>Height: 2.44 meters (8 ft)<br>Material: Parian marble<br>Location: Louvre Museum, Paris, France<br>Significance: Masterpiece of Hellenistic sculpture."
    }
};

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('particleCanvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    createParticles();

    camera.position.z = 2;

    window.addEventListener('resize', onWindowResize, false);

    animate();
    updateSculptureInfo();
}

function createParticles() {
    if (particles) scene.remove(particles);

    const geometry = new THREE.BufferGeometry();
    const positions = [];
    const colors = [];
    const originalPositions = [];

    for (let i = 0; i < particleCount; i++) {
        let x, y, z;
        if (currentSculpture === 'david') {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(Math.random() * 2 - 1);
            const radius = 1 + Math.sin(phi * 10) * 0.1;
            x = radius * Math.sin(phi) * Math.cos(theta);
            y = radius * Math.sin(phi) * Math.sin(theta);
            z = radius * Math.cos(phi);
        } else if (currentSculpture === 'venus') {
            const t = Math.random() * Math.PI * 2;
            const h = (Math.random() - 0.5) * 2;
            const r = 0.5 + 0.5 * Math.pow(Math.abs(h), 0.7);
            x = r * Math.cos(t);
            y = h * 1.5;
            z = r * Math.sin(t);
        } else if (currentSculpture === 'thinker') {
            const t = Math.random() * Math.PI * 2;
            const h = (Math.random() - 0.5) * 2;
            x = Math.cos(t) * (0.5 + 0.3 * Math.sin(h * Math.PI));
            y = h;
            z = Math.sin(t) * (0.5 + 0.3 * Math.sin(h * Math.PI));
        } else if (currentSculpture === 'discus') {
            const t = Math.random() * Math.PI * 2;
            const h = (Math.random() - 0.5) * 2;
            x = Math.cos(t) * (0.7 + 0.3 * Math.cos(h * Math.PI));
            y = h;
            z = Math.sin(t) * (0.7 + 0.3 * Math.cos(h * Math.PI));
        } else if (currentSculpture === 'victory') {
            const t = Math.random() * Math.PI * 2;
            const h = (Math.random() - 0.5) * 2;
            x = Math.cos(t) * (0.5 + 0.5 * Math.pow(Math.abs(h), 0.7));
            y = h * 1.2;
            z = Math.sin(t) * (0.5 + 0.5 * Math.pow(Math.abs(h), 0.7));
        }

        positions.push(x, y, z);
        originalPositions.push(x, y, z);

        const color = new THREE.Color();
        if (colorMode === 'rainbow') {
            color.setHSL(Math.random(), 1, 0.5);
        } else if (colorMode === 'sculpture') {
            const shade = Math.random() * 0.3 + 0.7;
            if (currentSculpture === 'david' || currentSculpture === 'venus') {
                color.setRGB(shade, shade, shade * 0.9); // Slightly warm white for marble
            } else if (currentSculpture === 'thinker') {
                color.setRGB(shade * 0.7, shade * 0.5, shade * 0.3); // Bronze color
            } else if (currentSculpture === 'discus') {
                color.setRGB(shade * 0.9, shade * 0.9, shade * 0.8); // Aged marble
            } else if (currentSculpture === 'victory') {
                color.setRGB(shade * 0.95, shade * 0.95, shade * 0.9); // Slightly yellowed marble
            }
        } else if (colorMode === 'gradient') {
            const t = y / 2 + 0.5; // Normalize y to 0-1 range
            color.setHSL(t, 1, 0.5);
        } else if (colorMode === 'psychedelic') {
            const hue = (Math.atan2(z, x) + Math.PI) / (2 * Math.PI);
            const lightness = (y + 1) / 2;
            color.setHSL(hue, 1, lightness);
        } else if (colorMode === 'depth') {
            const depth = Math.sqrt(x*x + y*y + z*z);
            const t = depth / Math.sqrt(3); // Normalize to 0-1 range
            color.setHSL(0.7 - t * 0.7, 1, 0.5); // Blue to red gradient based on depth
        } else if (colorMode === 'temperature') {
            const temp = (y + 1) / 2; // Normalize y to 0-1 range
            color.setHSL(temp * 0.3 + 0.5, 1, 0.5); // Blue (cold) to red (hot)
        } else if (colorMode === 'metallic') {
            const metallic = Math.random() * 0.3 + 0.7;
            color.setRGB(metallic, metallic, metallic);
        } else if (colorMode === 'neon') {
            const neonHue = Math.random();
            color.setHSL(neonHue, 1, 0.7);
        }
        colors.push(color.r, color.g, color.b);
    }

    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    geometry.setAttribute('originalPosition', new THREE.Float32BufferAttribute(originalPositions, 3));

    const material = new THREE.PointsMaterial({ size: particleSize, vertexColors: true });
    particles = new THREE.Points(geometry, material);
    scene.add(particles);
}

function animate() {
    requestAnimationFrame(animate);
    time += 0.01;
    if (isAnimating) {
        particles.rotation.y += rotationSpeed;
    }
    updateParticles();
    renderer.render(scene, camera);
}

function updateParticles() {
    const positions = particles.geometry.attributes.position.array;
    const originalPositions = particles.geometry.attributes.originalPosition.array;
    const colors = particles.geometry.attributes.color.array;

    for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        let x = positions[i3];
        let y = positions[i3 + 1];
        let z = positions[i3 + 2];

        if (exploding) {
            const dx = x - originalPositions[i3];
            const dy = y - originalPositions[i3 + 1];
            const dz = z - originalPositions[i3 + 2];
            x += dx * 0.02;
            y += dy * 0.02;
            z += dz * 0.02;
        } else if (imploding) {
            const dx = originalPositions[i3] - x;
            const dy = originalPositions[i3 + 1] - y;
            const dz = originalPositions[i3 + 2] - z;
            x += dx * 0.02;
            y += dy * 0.02;
            z += dz * 0.02;
        } else {
            if (effect === 'wave') {
                y += Math.sin(time * 5 + x * 5 + z * 5) * 0.02 * effectIntensity;
            } else if (effect === 'twirl') {
                const angle = time * effectIntensity;
                const newX = x * Math.cos(angle) - z * Math.sin(angle);
                const newZ = x * Math.sin(angle) + z * Math.cos(angle);
                x = newX;
                z = newZ;
            } else if (effect === 'pulse') {
                const distance = Math.sqrt(x*x + y*y + z*z);
                const factor = 1 + Math.sin(time * 5) * 0.1 * effectIntensity;
                x *= factor;
                y *= factor;
                z *= factor;
            } else if (effect === 'vortex') {
                const distance = Math.sqrt(x*x + z*z);
                const angle = Math.atan2(z, x) + time * effectIntensity;
                x = distance * Math.cos(angle);
                z = distance * Math.sin(angle);
            } else if (effect === 'spiral') {
                const angle = Math.atan2(z, x) + time * effectIntensity;
                const radius = Math.sqrt(x*x + z*z);
                x = radius * Math.cos(angle);
                z = radius * Math.sin(angle);
                y += Math.sin(time * 5) * 0.1 * effectIntensity;
            } else if (effect === 'bounce') {
                y += Math.abs(Math.sin(time * 5)) * 0.2 * effectIntensity;
            } else if (effect === 'shatter') {
                const dx = x - originalPositions[i3];
                const dy = y - originalPositions[i3 + 1];
                const dz = z - originalPositions[i3 + 2];
                const distance = Math.sqrt(dx*dx + dy*dy + dz*dz);
                const factor = 1 + Math.sin(time * 5) * 0.2 * effectIntensity;
                x += dx * factor;
                y += dy * factor;
                z += dz * factor;
            }
        }

        positions[i3] = x;
        positions[i3 + 1] = y;
        positions[i3 + 2] = z;

        if (colorMode === 'psychedelic') {
            const hue = (Math.atan2(z, x) + Math.PI) / (2 * Math.PI) + time * 0.1;
            const lightness = (Math.sin(time + y * 5) + 1) / 2;
            const color = new THREE.Color().setHSL(hue, 1, lightness);
            colors[i3] = color.r;
            colors[i3 + 1] = color.g;
            colors[i3 + 2] = color.b;
        }
    }

    particles.geometry.attributes.position.needsUpdate = true;
    particles.geometry.attributes.color.needsUpdate = true;
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function updateSculptureInfo() {
    document.getElementById('sculpture-name').textContent = sculptureInfo[currentSculpture].name;
    document.getElementById('sculpture-info').innerHTML = sculptureInfo[currentSculpture].info;
}

function applyFilter(filter) {
    const canvas = document.getElementById('particleCanvas');
    switch (filter) {
        case 'warm':
            canvas.style.filter = 'sepia(0.3) saturate(1.5) hue-rotate(-10deg)';
            break;
        case 'cool':
            canvas.style.filter = 'saturate(1.5) hue-rotate(10deg)';
            break;
        case 'sepia':
            canvas.style.filter = 'sepia(1)';
            break;
        case 'invert':
            canvas.style.filter = 'invert(1)';
            break;
        case 'highContrast':
            canvas.style.filter = 'contrast(1.5) brightness(1.1)';
            break;
        case 'grayscale':
            canvas.style.filter = 'grayscale(1)';
            break;
        case 'vintage':
            canvas.style.filter = 'sepia(0.5) hue-rotate(-30deg) saturate(1.2) contrast(0.8) brightness(1.1)';
            break;
        default:
            canvas.style.filter = 'none';
    }
}

init();

document.getElementById('rotateLeft').addEventListener('click', () => rotationSpeed = -Math.abs(rotationSpeed));
document.getElementById('rotateRight').addEventListener('click', () => rotationSpeed = Math.abs(rotationSpeed));
document.getElementById('zoomIn').addEventListener('click', () => {
    zoomLevel *= 1.1;
    camera.position.z = 2 / zoomLevel;
});
document.getElementById('zoomOut').addEventListener('click', () => {
    zoomLevel /= 1.1;
    camera.position.z = 2 / zoomLevel;
});
document.getElementById('toggleAnimation').addEventListener('click', () => {
    isAnimating = !isAnimating;
    document.getElementById('toggleAnimation').textContent = isAnimating ? '⏸ Pause' : '▶️ Resume';
});
document.getElementById('resetView').addEventListener('click', () => {
    zoomLevel = 1;
    camera.position.set(0, 0, 2);
    particles.rotation.set(0, 0, 0);
});
document.getElementById('explode').addEventListener('click', () => {
    exploding = true;
    imploding = false;
    setTimeout(() => { exploding = false; }, 1000);
});
document.getElementById('implode').addEventListener('click', () => {
    imploding = true;
    exploding = false;
    setTimeout(() => { imploding = false; }, 1000);
});

document.getElementById('sculpture-select').addEventListener('change', (e) => {
    currentSculpture = e.target.value;
    createParticles();
    updateSculptureInfo();
});

document.getElementById('color-mode-select').addEventListener('change', (e) => {
    colorMode = e.target.value;
    createParticles();
});

document.getElementById('effect-select').addEventListener('change', (e) => {
    effect = e.target.value;
});

document.getElementById('filter-select').addEventListener('change', (e) => {
    currentFilter = e.target.value;
    applyFilter(currentFilter);
});

document.getElementById('particleSize').addEventListener('input', (e) => {
    particleSize = parseFloat(e.target.value);
    particles.material.size = particleSize;
});

document.getElementById('rotationSpeed').addEventListener('input', (e) => {
    rotationSpeed = parseFloat(e.target.value);
});

document.getElementById('effectIntensity').addEventListener('input', (e) => {
    effectIntensity = parseFloat(e.target.value);
});

// Add interactivity
let isDragging = false;
let previousMousePosition = { x: 0, y: 0 };

document.addEventListener('mousedown', (e) => {
    isDragging = true;
});

document.addEventListener('mouseup', () => {
    isDragging = false;
});

document.addEventListener('mousemove', (e) => {
    if (isDragging) {
        const deltaMove = {
            x: e.clientX - previousMousePosition.x,
            y: e.clientY - previousMousePosition.y
        };

        particles.rotation.y += deltaMove.x * 0.005;
        particles.rotation.x += deltaMove.y * 0.005;
    }

    previousMousePosition = {
        x: e.clientX,
        y: e.clientY
    };
});

// Add particle count adjustment
document.addEventListener('wheel', (e) => {
    if (e.deltaY < 0) {
        particleCount = Math.min(particleCount + 1000, 100000);
    } else {
        particleCount = Math.max(particleCount - 1000, 1000);
    }
    document.getElementById('count').textContent = particleCount.toLocaleString();
    createParticles();
});

// Add a click event listener to the canvas
document.getElementById('particleCanvas').addEventListener('click', (e) => {
    // Calculate the click position in normalized device coordinates (-1 to +1)
    const mouse = new THREE.Vector2(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
    );

    // Create a raycaster
    const raycaster = new THREE.Raycaster();
    raycaster.params.Points.threshold = 0.1; // Adjust this value to change the click sensitivity

    // Update the picking ray with the camera and mouse position
    raycaster.setFromCamera(mouse, camera);

    // Calculate objects intersecting the picking ray
    const intersects = raycaster.intersectObject(particles);

    if (intersects.length > 0) {
        // Get the index of the intersected particle
        const particleIndex = intersects[0].index;

        // Create a ripple effect from the clicked particle
        createRippleEffect(particleIndex);
    }
});

function createRippleEffect(centerIndex) {
    const positions = particles.geometry.attributes.position.array;
    const colors = particles.geometry.attributes.color.array;
    const centerX = positions[centerIndex * 3];
    const centerY = positions[centerIndex * 3 + 1];
    const centerZ = positions[centerIndex * 3 + 2];

    for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        const dx = positions[i3] - centerX;
        const dy = positions[i3 + 1] - centerY;
        const dz = positions[i3 + 2] - centerZ;
        const distance = Math.sqrt(dx*dx + dy*dy + dz*dz);

        // Create a ripple effect
        const ripple = Math.sin(distance * 10 - time * 10) * 0.05 * Math.exp(-distance * 2);
        positions[i3] += dx * ripple;
        positions[i3 + 1] += dy * ripple;
        positions[i3 + 2] += dz * ripple;

        // Change color based on the ripple
        const color = new THREE.Color();
        color.setHSL((Math.sin(distance * 10 - time * 10) + 1) / 2, 1, 0.5);
        colors[i3] = color.r;
        colors[i3 + 1] = color.g;
        colors[i3 + 2] = color.b;
    }

    particles.geometry.attributes.position.needsUpdate = true;
    particles.geometry.attributes.color.needsUpdate = true;
}

// Initialize audio context
let audioContext;
let oscillator;

function initAudio() {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    oscillator = audioContext.createOscillator();
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
    oscillator.connect(audioContext.destination);
    oscillator.start();
    oscillator.disconnect();
}

function playTone(frequency) {
    if (!audioContext) initAudio();
    oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
    oscillator.connect(audioContext.destination);
    setTimeout(() => oscillator.disconnect(), 100);
}

document.getElementById('particleCanvas').addEventListener('click', (e) => {
    const rect = e.target.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const frequency = 200 + (x / rect.width) * 600;
    playTone(frequency);
});
</script>
