    text-align: center;

</head>

<body>
  <div class="container">
    <h1>The Waifu Corner</h1>
    <div class="img-container">
      <img id="waifu-img" src="" alt="Waifu Image">

    <div class="btn-container">
      <button onclick="getRandomImage('waifu')">Waifu</button>

    </div>
  </div>

  <script>
    const waifuImg = document.getElementById('waifu-img');

    async function getRandomImage(category = '') {
      try {
        const response = category 
          ? await fetch(`https://api.waifu.pics/sfw/${category}`)
          : await fetch('https://api.waifu.pics/sfw/waifu');
        const data = await response.json();
        waifuImg.src = data.url;
      } catch (error) {
        console.error('Error fetching image:', error);
      }
    }

    getRandomImage(); // Load a random image on page load
  </script>
