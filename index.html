<html><head><base href="https://websim.ai/"><title>Lost in Psychedelic</title><style>
body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background-color: #000;
  font-family: Arial, sans-serif;
}
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

}

}

}

  bottom: 20px;

}

  position: fixed;
  top: 20px;
  left: 20px;
  color: white;

  max-width: 300px;
  transition: opacity 0.5s;
  cursor: pointer;
}

  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: white;

  border-radius: 20px;
  font-size: 18px;
  transition: opacity 0.5s;
}

  position: fixed;
  top: 20px;
  right: 20px;
  color: white;
  background-color: rgba(0, 0, 0, 0.5);
  padding: 15px;

  max-width: 300px;
  text-align: right;
  transition: opacity 0.5s;
  cursor: pointer;
}
</style></head><body>
<canvas id="canvas"></canvas>
<button id="fullscreenToggle">Toggle Fullscreen</button>
<button id="audioToggle">Start Audio</button>
<div id="instructions">
  <h2>Instructions:</h2>
  <ul>
    <li>Move your mouse or finger to interact with the visualization and audio</li>
    <li>Click or tap anywhere to change the visual mode and harmonic frequency</li>
    <li>Use the buttons at the bottom to toggle fullscreen and audio</li>
    <li>Experience different harmonic frequencies and their benefits</li>
  </ul>
</div>
<div id="visualName"></div>
<div id="frequencyInfo"></div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fullscreenToggle = document.getElementById('fullscreenToggle');
const audioToggle = document.getElementById('audioToggle');
const instructions = document.getElementById('instructions');
const visualNameElement = document.getElementById('visualName');
const frequencyInfoElement = document.getElementById('frequencyInfo');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let centerX = canvas.width / 2;
let centerY = canvas.height / 2;

let hue = 0;
let frame = 0;
let mouseX = 0;
let mouseY = 0;
let mouseSpeed = 0;
let mouseDistance = 0;

let visualMode = 0;
const totalModes = 13;

const visualNames = [
  "Kaleidoscope",
  "Spiral",
  "Fractal",
  "Circles",
  "Waves",
  "Starburst",
  "Vortex",
  "Lissajous",
  "Mandala",
  "Particles",
  "Nebula",
  "Electric Field",
  "Fractal Tree"
];

const frequencies = [
  { freq: 396, description: "Liberating guilt and fear" },
  { freq: 417, description: "Facilitating change and cleansing traumatic experiences" },
  { freq: 528, description: "Love frequency, promoting healing and DNA repair" },
  { freq: 639, description: "Enhancing relationships and promoting harmony" },
  { freq: 741, description: "Helping with problem-solving and self-expression" },
  { freq: 852, description: "Awakening intuition and inner strength" },
  { freq: 432, description: "Resonating with the universe, promoting relaxation" },
  { freq: 174, description: "Natural anesthetic, reducing pain and stress" },
  { freq: 285, description: "Healing tissues and organs" },
  { freq: 963, description: "Connecting to the spiritual realm and activating the pineal gland" }
];

let currentFrequency = frequencies[0];
let frequencyInfoTimeout;
let visualNameTimeout;
let instructionsTimeout;

function updateVisualName() {
  visualNameElement.textContent = visualNames[visualMode];
  visualNameElement.style.opacity = 1;
  clearTimeout(visualNameTimeout);
  visualNameTimeout = setTimeout(() => {
    visualNameElement.style.opacity = 0;
  }, 3000);
}

function updateFrequencyInfo() {
  if (isAudioInitialized && audioContext.state === 'running') {
    frequencyInfoElement.innerHTML = `
      <h3>${currentFrequency.freq} Hz</h3>
      <p>${currentFrequency.description}</p>
    `;
    frequencyInfoElement.style.opacity = 1;
    clearTimeout(frequencyInfoTimeout);
    frequencyInfoTimeout = setTimeout(() => {
      frequencyInfoElement.style.opacity = 0;
    }, 5000);
  } else {
    frequencyInfoElement.style.opacity = 0;
  }
}

// Audio context and nodes
let audioContext;
let osc1, osc2, osc3, lfo, mainGain, reverbNode;
let isAudioInitialized = false;

function createReverb(duration = 2, decay = 2, reverse = false) {
  const sampleRate = audioContext.sampleRate;
  const length = sampleRate * duration;
  const impulse = audioContext.createBuffer(2, length, sampleRate);
  const impulseL = impulse.getChannelData(0);
  const impulseR = impulse.getChannelData(1);

  for (let i = 0; i < length; i++) {
    const n = reverse ? length - i : i;
    impulseL[i] = (Math.random() * 2 - 1) * Math.pow(1 - n / length, decay);
    impulseR[i] = (Math.random() * 2 - 1) * Math.pow(1 - n / length, decay);
  }

  const convolver = audioContext.createConvolver();
  convolver.buffer = impulse;
  return convolver;
}

function initAudio() {
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  
  osc1 = audioContext.createOscillator();
  osc2 = audioContext.createOscillator();
  osc3 = audioContext.createOscillator();
  lfo = audioContext.createOscillator();
  mainGain = audioContext.createGain();
  reverbNode = createReverb(3, 3);

  osc1.type = 'sine';
  osc2.type = 'triangle';
  osc3.type = 'sine';
  lfo.type = 'sine';

  updateOscillatorFrequencies();

  lfo.frequency.setValueAtTime(0.1, audioContext.currentTime);

  mainGain.gain.setValueAtTime(0.5, audioContext.currentTime);

  lfo.connect(mainGain.gain);
  osc1.connect(mainGain);
  osc2.connect(mainGain);
  osc3.connect(mainGain);
  mainGain.connect(reverbNode);
  reverbNode.connect(audioContext.destination);

  osc1.start();
  osc2.start();
  osc3.start();
  lfo.start();

  isAudioInitialized = true;
}

function updateOscillatorFrequencies() {
  const baseFreq = currentFrequency.freq;
  osc1.frequency.setValueAtTime(baseFreq, audioContext.currentTime);
  osc2.frequency.setValueAtTime(baseFreq * 1.5, audioContext.currentTime);
  osc3.frequency.setValueAtTime(baseFreq * 2, audioContext.currentTime);
}

function changeFrequency() {
  currentFrequency = frequencies[Math.floor(Math.random() * frequencies.length)];
  updateFrequencyInfo();
  if (isAudioInitialized) {
    updateOscillatorFrequencies();
  }
}

function updateAudio() {
  if (!isAudioInitialized) return;

  const normalizedSpeed = mouseSpeed / 50;
  const normalizedDistance = mouseDistance / (Math.sqrt(canvas.width * canvas.width + canvas.height * canvas.height) / 2);

  const baseFreq = currentFrequency.freq;
  osc1.frequency.setValueAtTime(baseFreq + normalizedSpeed * baseFreq * 0.1, audioContext.currentTime);
  osc2.frequency.setValueAtTime(baseFreq * 1.5 + normalizedDistance * baseFreq * 0.15, audioContext.currentTime);
  osc3.frequency.setValueAtTime(baseFreq * 2 + (normalizedSpeed + normalizedDistance) * baseFreq * 0.1, audioContext.currentTime);
  
  lfo.frequency.setValueAtTime(0.1 + normalizedSpeed * 0.4, audioContext.currentTime);
  
  mainGain.gain.setValueAtTime(0.5 * (0.1 + normalizedDistance * 0.1), audioContext.currentTime);
}

function drawKaleidoscope(time) {
  const segments = 8 + Math.floor(mouseSpeed / 5);
  const size = Math.min(canvas.width, canvas.height) * 0.4;
  
  ctx.save();
  ctx.translate(centerX, centerY);
  
  for (let i = 0; i < segments; i++) {
    ctx.save();
    ctx.rotate((Math.PI * 2 / segments) * i);
    
    ctx.beginPath();
    for (let j = 0; j < 100; j++) {
      const t = j / 100;
      const radius = size * t * (1 + mouseDistance / 1000);
      const angle = Math.PI * 2 * t + time / 1000;
      const x = radius * Math.cos(angle);
      const y = radius * Math.sin(angle);
      
      if (j === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    }
    
    ctx.strokeStyle = `hsla(${(hue + i * 360 / segments) % 360}, 100%, 50%, 0.5)`;
    ctx.lineWidth = 2 + mouseSpeed / 20;
    ctx.stroke();
    
    ctx.restore();
  }
  
  ctx.restore();
}

function drawSpiral(time) {
  ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
  ctx.lineWidth = 2 + mouseSpeed / 10;
  ctx.beginPath();

  const spiralIntensity = mouseDistance / 50;
  const spiralCount = 5 + Math.floor(mouseSpeed / 5);

  for (let i = 0; i < 200; i++) {
    const angle = 0.1 * i + time / 1000 + spiralIntensity;
    const radius = 5 * i + mouseSpeed * 2;
    for (let j = 0; j < spiralCount; j++) {
      const offsetAngle = (Math.PI * 2 / spiralCount) * j;
      const x = centerX + radius * Math.cos(angle + offsetAngle);
      const y = centerY + radius * Math.sin(angle + offsetAngle);
      
      if (i === 0 && j === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    }
  }

  ctx.stroke();
}

function drawFractal(x, y, size, angle, depth) {
  if (depth === 0) return;

  const newSize = size * (0.7 + mouseSpeed / 500);
  const newX = x + Math.cos(angle) * size;
  const newY = y + Math.sin(angle) * size;

  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(newX, newY);
  ctx.strokeStyle = `hsl(${(hue + depth * 30 + mouseDistance) % 360}, 100%, 50%)`;
  ctx.lineWidth = 2 + (5 - depth) * mouseSpeed / 50;
  ctx.stroke();

  const angleOffset = 0.5 + (mouseDistance / canvas.width) * 0.4;
  drawFractal(newX, newY, newSize, angle - angleOffset, depth - 1);
  drawFractal(newX, newY, newSize, angle + angleOffset, depth - 1);
}

function drawCircles(time) {
  const maxRadius = Math.min(canvas.width, canvas.height) / 2;
  const circleCount = 10 + Math.floor(mouseSpeed / 5);
  for (let i = 0; i < circleCount; i++) {
    const radius = (maxRadius / circleCount) * (i + 1) + Math.sin(time / 1000 + i) * 20 + mouseDistance / 10;
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${(hue + i * 360 / circleCount) % 360}, 100%, 50%, ${0.7 - i / circleCount})`;
    ctx.lineWidth = 3 + Math.sin(time / 500 + i) * 2 + mouseSpeed / 10;
    ctx.stroke();
  }
}

function drawWaves(time) {
  const waveCount = 3 + Math.floor(mouseSpeed / 10);
  for (let w = 0; w < waveCount; w++) {
    ctx.beginPath();
    for (let x = 0; x < canvas.width; x += 5) {
      const frequencyFactor = 1 + mouseDistance / 500;
      const amplitudeFactor = 1 + mouseSpeed / 50;
      const y = centerY + 
                Math.sin((x + time + w * 100) / (200 / frequencyFactor)) * 100 * amplitudeFactor + 
                Math.cos((x - time + w * 150) / (300 / frequencyFactor)) * 50 * amplitudeFactor;
      if (x === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    }
    ctx.strokeStyle = `hsla(${(hue + w * 120) % 360}, 100%, 50%, 0.5)`;
    ctx.lineWidth = 3 + mouseSpeed / 5;
    ctx.stroke();
  }
}

function drawStarburst(time) {
  const rays = 50 + Math.floor(mouseSpeed);
  const maxLength = Math.min(canvas.width, canvas.height) / 2;
  
  for (let i = 0; i < rays; i++) {
    const angle = (Math.PI * 2 / rays) * i;
    const length = maxLength * (0.5 + 0.5 * Math.sin(time / 1000 + i * 0.1)) * (1 + mouseDistance / 1000);
    
    const startX = centerX + Math.cos(angle) * 10;
    const startY = centerY + Math.sin(angle) * 10;
    const endX = centerX + Math.cos(angle) * length;
    const endY = centerY + Math.sin(angle) * length;
    
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = `hsla(${(hue + i * 360 / rays) % 360}, 100%, 50%, ${0.7 - i / rays})`;
    ctx.lineWidth = 2 + mouseSpeed / 20;
    ctx.stroke();
  }
}

function drawVortex(time) {
  const spirals = 5 + Math.floor(mouseSpeed / 10);
  const points = 200;
  const maxRadius = Math.min(canvas.width, canvas.height) / 2;
  
  for (let s = 0; s < spirals; s++) {
    ctx.beginPath();
    for (let i = 0; i < points; i++) {
      const t = i / points;
      const angle = 2 * Math.PI * (s / spirals + 10 * t) + time / 1000;
      const radius = t * maxRadius * (1 + mouseDistance / 1000);
      const x = centerX + radius * Math.cos(angle);
      const y = centerY + radius * Math.sin(angle);
      
      if (i === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    }
    ctx.strokeStyle = `hsla(${(hue + s * 360 / spirals) % 360}, 100%, 50%, 0.5)`;
    ctx.lineWidth = 2 + mouseSpeed / 20;
    ctx.stroke();
  }
}

function drawLissajous(time) {
  const size = Math.min(canvas.width, canvas.height) * 0.4;
  const points = 1000;
  const a = 3 + mouseSpeed / 10;
  const b = 2 + mouseDistance / 100;
  
  ctx.beginPath();
  for (let i = 0; i < points; i++) {
    const t = (i / points) * Math.PI * 2;
    const x = centerX + size * Math.sin(a * t + time / 1000);
    const y = centerY + size * Math.sin(b * t);
    
    if (i === 0) {
      ctx.moveTo(x, y);
    } else {
      ctx.lineTo(x, y);
    }
  }
  
  ctx.strokeStyle = `hsla(${hue}, 100%, 50%, 0.5)`;
  ctx.lineWidth = 2 + mouseSpeed / 20;
  ctx.stroke();
}

function drawMandala(time) {
  const petals = 12 + Math.floor(mouseSpeed / 5);
  const radius = Math.min(canvas.width, canvas.height) * 0.4;
  const innerRadius = radius * 0.2;
  
  for (let i = 0; i < petals; i++) {
    const angle = (Math.PI * 2 / petals) * i;
    const petalSize = radius * (0.5 + 0.5 * Math.sin(time / 1000 + i * 0.5)) * (1 + mouseDistance / 1000);
    
    ctx.beginPath();
    ctx.moveTo(centerX + innerRadius * Math.cos(angle), centerY + innerRadius * Math.sin(angle));
    ctx.quadraticCurveTo(
      centerX + petalSize * Math.cos(angle + Math.PI / 4),
      centerY + petalSize * Math.sin(angle + Math.PI / 4),
      centerX + innerRadius * Math.cos(angle + Math.PI / 2),
      centerY + innerRadius * Math.sin(angle + Math.PI / 2)
    );
    ctx.quadraticCurveTo(
      centerX + petalSize * Math.cos(angle - Math.PI / 4),
      centerY + petalSize * Math.sin(angle - Math.PI / 4),
      centerX + innerRadius * Math.cos(angle),
      centerY + innerRadius * Math.sin(angle)
    );
    
    ctx.strokeStyle = `hsla(${(hue + i * 360 / petals) % 360}, 100%, 50%, 0.7)`;
    ctx.lineWidth = 2 + mouseSpeed / 20;
    ctx.stroke();
  }
}

function drawParticles(time) {
  const particleCount = 200 + Math.floor(mouseSpeed * 5);
  const maxRadius = Math.min(canvas.width, canvas.height) / 2;
  
  for (let i = 0; i < particleCount; i++) {
    const t = i / particleCount;
    const angle = Math.PI * 2 * t + time / 1000;
    const radius = maxRadius * Math.sqrt(t) * (1 + mouseDistance / 1000);
    const x = centerX + radius * Math.cos(angle);
    const y = centerY + radius * Math.sin(angle);
    
    ctx.beginPath();
    ctx.arc(x, y, 2 + mouseSpeed / 10, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${(hue + i * 360 / particleCount) % 360}, 100%, 50%, 0.7)`;
    ctx.fill();
  }
}

function drawNebula(time) {
  const cloudCount = 5 + Math.floor(mouseSpeed / 10);
  const maxRadius = Math.min(canvas.width, canvas.height) * 0.4;
  
  for (let i = 0; i < cloudCount; i++) {
    const angle = (Math.PI * 2 / cloudCount) * i + time / 5000;
    const x = centerX + Math.cos(angle) * maxRadius * (0.5 + mouseDistance / 1000);
    const y = centerY + Math.sin(angle) * maxRadius * (0.5 + mouseDistance / 1000);
    
    const gradient = ctx.createRadialGradient(x, y, 0, x, y, maxRadius / 2);
    gradient.addColorStop(0, `hsla(${(hue + i * 60) % 360}, 100%, 50%, 0.7)`);
    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(x, y, maxRadius / 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawElectricField(time) {
  const lineCount = 50 + Math.floor(mouseSpeed * 2);
  const maxLength = Math.min(canvas.width, canvas.height) * 0.4;
  
  for (let i = 0; i < lineCount; i++) {
    const angle = (Math.PI * 2 / lineCount) * i;
    const startX = centerX + Math.cos(angle) * 10;
    const startY = centerY + Math.sin(angle) * 10;
    const endX = startX + Math.cos(angle) * maxLength * (1 + mouseDistance / 1000);
    const endY = startY + Math.sin(angle) * maxLength * (1 + mouseDistance / 1000);
    
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    
    const segments = 10;
    for (let j = 1; j <= segments; j++) {
      const t = j / segments;
      const x = startX + (endX - startX) * t;
      const y = startY + (endY - startY) * t;
      const offsetX = Math.sin(time / 500 + i * 0.2) * 20 * (1 - t);
      const offsetY = Math.cos(time / 500 + i * 0.2) * 20 * (1 - t);
      ctx.lineTo(x + offsetX, y + offsetY);
    }
    
    ctx.strokeStyle = `hsla(${(hue + i * 360 / lineCount) % 360}, 100%, 50%, 0.5)`;
    ctx.lineWidth = 2 + mouseSpeed / 20;
    ctx.stroke();
  }
}

function drawFractalTree(x, y, length, angle, depth) {
  if (depth === 0) return;
  
  const endX = x + Math.cos(angle) * length;
  const endY = y + Math.sin(angle) * length;
  
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(endX, endY);
  ctx.strokeStyle = `hsla(${(hue + depth * 30) % 360}, 100%, 50%, ${0.7 - depth * 0.1})`;
  ctx.lineWidth = depth;
  ctx.stroke();
  
  const newLength = length * 0.7;
  const newDepth = depth - 1;
  const angleOffset = 0.5 + mouseSpeed / 100;
  
  drawFractalTree(endX, endY, newLength, angle - angleOffset, newDepth);
  drawFractalTree(endX, endY, newLength, angle + angleOffset, newDepth);
}

function animate(time) {
  ctx.fillStyle = `rgba(0, 0, 0, ${0.05 + mouseSpeed / 1000})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  switch (visualMode) {
    case 0:
      drawKaleidoscope(time);
      break;
    case 1:
      drawSpiral(time);
      break;
    case 2:
      const fractalCount = 6 + Math.floor(mouseSpeed / 5);
      for (let i = 0; i < fractalCount; i++) {
        const angle = (Math.PI * 2 / fractalCount) * i + time / 2000;
        drawFractal(centerX, centerY, 100 + mouseDistance / 2, angle, 5);
      }
      break;
    case 3:
      drawCircles(time);
      break;
    case 4:
      drawWaves(time);
      break;
    case 5:
      drawStarburst(time);
      break;
    case 6:
      drawVortex(time);
      break;
    case 7:
      drawLissajous(time);
      break;
    case 8:
      drawMandala(time);
      break;
    case 9:
      drawParticles(time);
      break;
    case 10:
      drawNebula(time);
      break;
    case 11:
      drawElectricField(time);
      break;
    case 12:
      drawFractalTree(centerX, canvas.height, canvas.height * 0.3, -Math.PI / 2, 8);
      break;
  }

  hue = (hue + 1 + mouseSpeed / 5) % 360;
  frame++;

  updateAudio();

  requestAnimationFrame(animate);
}

animate(0);

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  centerX = canvas.width / 2;
  centerY = canvas.height / 2;
}

window.addEventListener('resize', resizeCanvas);

fullscreenToggle.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    }
  }
});

document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) {
    fullscreenToggle.textContent = 'Exit Fullscreen';
  } else {
    fullscreenToggle.textContent = 'Enter Fullscreen';
  }
  resizeCanvas();
});

audioToggle.addEventListener('click', () => {
  if (!isAudioInitialized) {
    initAudio();
    audioToggle.textContent = 'Stop Audio';
    updateFrequencyInfo();
  } else {
    if (audioContext.state === 'running') {
      audioContext.suspend();
      audioToggle.textContent = 'Resume Audio';
      frequencyInfoElement.style.opacity = 0;
    } else if (audioContext.state === 'suspended') {
      audioContext.resume();
      audioToggle.textContent = 'Stop Audio';
      updateFrequencyInfo();
    }
  }
});

function changeVisual() {
  visualMode = (visualMode + 1) % totalModes;
  updateVisualName();
  changeFrequency();
}

canvas.addEventListener('click', changeVisual);
instructions.addEventListener('click', changeVisual);
frequencyInfoElement.addEventListener('click', changeVisual);

canvas.addEventListener('mousemove', (e) => {
  const newMouseX = e.clientX;
  const newMouseY = e.clientY;
  
  const dx = newMouseX - mouseX;
  const dy = newMouseY - mouseY;
  mouseSpeed = Math.sqrt(dx * dx + dy * dy);
  mouseSpeed = Math.min(mouseSpeed, 50);  // Cap the speed

  mouseDistance = Math.sqrt((newMouseX - centerX) ** 2 + (newMouseY - centerY) ** 2);

  mouseX = newMouseX;
  mouseY = newMouseY;
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const newMouseX = touch.clientX;
  const newMouseY = touch.clientY;
  
  const dx = newMouseX - mouseX;
  const dy = newMouseY - mouseY;
  mouseSpeed = Math.sqrt(dx * dx + dy * dy);
  mouseSpeed = Math.min(mouseSpeed, 50);  // Cap the speed

  mouseDistance = Math.sqrt((newMouseX - centerX) ** 2 + (newMouseY - centerY) ** 2);

  mouseX = newMouseX;
  mouseY = newMouseY;
}, { passive: false });

canvas.addEventListener('mouseleave', () => {
  mouseSpeed = 0;
});

canvas.addEventListener('touchend', () => {
  mouseSpeed = 0;
});

// Hide instructions after 10 seconds
instructionsTimeout = setTimeout(() => {
  instructions.style.transition = 'opacity 1s';
  instructions.style.opacity = '0';
}, 10000);

// Initial update of visual name and frequency info
updateVisualName();
updateFrequencyInfo();

// Add event listener for visual name hover
visualNameElement.addEventListener('mouseenter', () => {
  clearTimeout(visualNameTimeout);
  visualNameElement.style.opacity = 1;
});

visualNameElement.addEventListener('mouseleave', () => {
  visualNameTimeout = setTimeout(()=> {
    visualNameElement.style.opacity = 0;
  }, 3000);
});

// Add event listener for frequency info hover
frequencyInfoElement.addEventListener('mouseenter', () => {
  clearTimeout(frequencyInfoTimeout);
  frequencyInfoElement.style.opacity = 1;
});

frequencyInfoElement.addEventListener('mouseleave', () => {
  if (isAudioInitialized && audioContext.state === 'running') {
    frequencyInfoTimeout = setTimeout(() => {
      frequencyInfoElement.style.opacity = 0;
    }, 5000);
  } else {
    frequencyInfoElement.style.opacity = 0;
  }
});

// Add event listener for instructions hover
instructions.addEventListener('mouseenter', () => {
  clearTimeout(instructionsTimeout);
  instructions.style.opacity = 1;
});

instructions.addEventListener('mouseleave', () => {
  instructionsTimeout = setTimeout(() => {
    instructions.style.opacity = 0;
  }, 5000);
});

</script>
