<html><head><base href="https://example.com" /><meta charset="UTF-8"><title>3D Rocket Launch Simulation</title><style>body { margin: 0; overflow: hidden; background-color: #0000ff; } #gui { position: absolute; top: 10px; left: 10px; z-index: 1; } #telemetry { position: absolute; top: 10px; right: 10px; color: white; font-family: Arial, sans-serif; background: rgba(0, 0, 0, 0.7); padding: 10px; border-radius: 5px; z-index: 1; } #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 48px; font-family: Arial, sans-serif; text-align: center; z-index: 1; } #mission-control { position: absolute; bottom: 10px; left: 10px; color: white; font-family: Arial, sans-serif; background: rgba(0, 0, 0, 0.7); padding: 10px; border-radius: 5px; z-index: 1; } .button { padding: 10px 15px; margin: 5px; background-color: #555; color: white; border: none; cursor: pointer; border-radius: 5px; } .button:hover { background-color: #777; } /* Console Terminal Styles */ #console-terminal { position: absolute; bottom: 10px; right: 10px; width: 400px; height: 200px; background: rgba(0, 0, 0, 0.8); color: #00ff00; font-family: Consolas, monospace; padding: 10px; border-radius: 5px; overflow-y: auto; z-index: 1; } #console-terminal h2 { margin-top: 0; }</style></head><body><div id="gui"></div><div id="telemetry"><h2>Telemetry</h2><div>Altitude: <span id="altitude">0</span> m</div><div>Velocity: <span id="velocity">0</span> m/s</div><div>Fuel: <span id="fuel">100</span>%</div></div><div id="countdown"></div><div id="mission-control"><h2>Mission Control</h2><button class="button" id="btn-launch">Initiate Launch Sequence</button><button class="button" id="btn-abort">Abort Mission</button></div><div id="console-terminal"><h2>Console Terminal</h2><div id="console-output"></div></div><!-- Three.js Library --><script src="https://cdn.jsdelivr.net/npm/three@0.124.0/build/three.min.js"></script><!-- OrbitControls --><script src="https://cdn.jsdelivr.net/npm/three@0.124.0/examples/js/controls/OrbitControls.js"></script><!-- dat.GUI --><script src="https://cdn.jsdelivr.net/npm/three@0.124.0/examples/js/libs/dat.gui.min.js"></script><script>let scene, camera, renderer, controls; let rocket; let launchStarted = false; let launchTime = 0; let smokeParticles = []; let flameParticles = []; let countdownTimer = 10; let countdownInterval; let isCountingDown = false; let fuel = 100; let gravity = 9.81; let velocity = 0; let altitude = 0; let previousTime = 0; let missionAborted = false; const rocketParams = { thrust: 2000000, angle: 90, mass: 500000, dragCoefficient: 0.5, airDensity: 1.225, frontalArea: Math.PI * (5 * 5), }; let altitudeDisplay, velocityDisplay, fuelDisplay, countdownDisplay; let btnLaunch, btnAbort; let countdownSound, launchSound; const consoleOutput = document.getElementById('console-output'); function logToConsole(message) { const p = document.createElement('p'); p.textContent = message; consoleOutput.appendChild(p); consoleOutput.scrollTop = consoleOutput.scrollHeight; } function init() { try { scene = new THREE.Scene(); scene.background = new THREE.Color(0x0000ff); scene.rotation.x = Math.PI; camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 0.1, 100000 ); camera.position.set(0, 50, 200); camera.up.set(0, -1, 0); renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight); document.body.appendChild(renderer.domElement); controls = new THREE.OrbitControls(camera, renderer.domElement); controls.minPolarAngle = 0; controls.maxPolarAngle = Math.PI * 2; controls.enableDamping = true; controls.dampingFactor = 0.25; controls.enableZoom = true; const ambientLight = new THREE.AmbientLight(0x999999); scene.add(ambientLight); const directionalLight = new THREE.DirectionalLight(0xffffff, 1); directionalLight.position.set(1000, 1000, 1000); scene.add(directionalLight); const groundTexture = new THREE.TextureLoader().load('/GettyImages-1407861824-ee2a308b7f134e509f4d3463653d6cfe.jpg'); groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping; groundTexture.repeat.set(100, 100); const groundGeometry = new THREE.SphereGeometry(10000, 64, 64); const groundMaterial = new THREE.MeshStandardMaterial({ map: groundTexture, side: THREE.FrontSide }); const ground = new THREE.Mesh(groundGeometry, groundMaterial); ground.position.y = 0; scene.add(ground); createRocket(); createLaunchPad(); const gui = new dat.GUI({ autoPlace: false }); document.getElementById('gui').appendChild(gui.domElement); gui.add(rocketParams, 'thrust', 1000000, 3000000).name('Thrust (N)').onChange(updateRocket); gui.add(rocketParams, 'angle', 85, 95).name('Angle (°)').onChange(updateRocket); window.addEventListener('resize', onWindowResize, false); btnLaunch = document.getElementById('btn-launch'); btnAbort = document.getElementById('btn-abort'); btnLaunch.addEventListener('click', () => { if (!isCountingDown && !launchStarted) { startCountdown(); } }); btnAbort.addEventListener('click', () => { if (isCountingDown || launchStarted) { abortMission(); } }); altitudeDisplay = document.getElementById('altitude'); velocityDisplay = document.getElementById('velocity'); fuelDisplay = document.getElementById('fuel'); countdownDisplay = document.getElementById('countdown'); loadSounds(); } catch (error) { logToConsole('Error during initialization: ' + error.message); } } function loadSounds() { try { const listener = new THREE.AudioListener(); camera.add(listener); countdownSound = new THREE.Audio(listener); launchSound = new THREE.Audio(listener); const audioLoader = new THREE.AudioLoader(); audioLoader.load('https://www.soundjay.com/buttons/sounds/beep-07.mp3', function(buffer) { countdownSound.setBuffer(buffer); countdownSound.setLoop(false); countdownSound.setVolume(0.5); }); audioLoader.load('https://www.soundjay.com/mechanical/sounds/rocket-1.mp3', function(buffer) { launchSound.setBuffer(buffer); launchSound.setLoop(false); launchSound.setVolume(0.5); }); } catch (error) { logToConsole('Error loading sounds: ' + error.message); } } function createRocket() { try { const rocketGroup = new THREE.Group(); const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d'); const gradient = ctx.createLinearGradient(0, 0, 0, 256); gradient.addColorStop(0, '#ff0000'); gradient.addColorStop(1, '#0000ff'); ctx.fillStyle = gradient; ctx.fillRect(0, 0, 256, 256); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4; for(let i = 0; i < 256; i += 32){ ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 256); ctx.stroke(); } const texture = new THREE.CanvasTexture(canvas); const bodyGeometry = new THREE.CylinderGeometry(5, 5, 50, 32); const bodyMaterial = new THREE.MeshStandardMaterial({ map: texture }); const body = new THREE.Mesh(bodyGeometry, bodyMaterial); rocketGroup.add(body); const coneGeometry = new THREE.ConeGeometry(5, 15, 32); const coneMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 }); const cone = new THREE.Mesh(coneGeometry, coneMaterial); cone.position.y = 32.5; rocketGroup.add(cone); const finGeometry = new THREE.BoxGeometry(1, 10, 20); const finMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00 }); const finPositions = [ { x: -5, z: 0 }, { x: 5, z: 0 }, { x: 0, z: -5 }, { x: 0, z: 5 }, ]; finPositions.forEach(pos => { const fin = new THREE.Mesh(finGeometry, finMaterial); fin.position.set(pos.x, -25, pos.z); rocketGroup.add(fin); }); rocketGroup.position.y = 25; rocket = rocketGroup; scene.add(rocket); } catch (error) { logToConsole('Error creating rocket: ' + error.message); } } function createLaunchPad() { try { const padGeometry = new THREE.CylinderGeometry(15, 15, 5, 32); const padMaterial = new THREE.MeshStandardMaterial({ color: 0x555555 }); const launchPad = new THREE.Mesh(padGeometry, padMaterial); launchPad.position.y = 2.5; scene.add(launchPad); } catch (error) { logToConsole('Error creating launch pad: ' + error.message); } } function startCountdown() { try { isCountingDown = true; countdownDisplay.style.display = 'block'; countdownDisplay.textContent = countdownTimer; logToConsole('Countdown started.'); countdownInterval = setInterval(() => { countdownTimer--; if (countdownTimer > 0) { countdownDisplay.textContent = countdownTimer; countdownSound.play(); logToConsole('Countdown: ' + countdownTimer); } else { clearInterval(countdownInterval); countdownDisplay.style.display = 'none'; countdownTimer = 10; isCountingDown = false; startLaunch(); } }, 1000); } catch (error) { logToConsole('Error during countdown: ' + error.message); } } function abortMission() { try { if (isCountingDown) { clearInterval(countdownInterval); countdownDisplay.style.display = 'none'; countdownTimer = 10; isCountingDown = false; logToConsole('Countdown aborted.'); } if (launchStarted) { missionAborted = true; launchStarted = false; logToConsole('Mission aborted.'); } } catch (error) { logToConsole('Error aborting mission: ' + error.message); } } function startLaunch() { try { launchStarted = true; launchTime = Date.now(); previousTime = launchTime; launchSound.play(); logToConsole('Launch initiated.'); } catch (error) { logToConsole('Error starting launch: ' + error.message); } } function createSmoke(deltaTime) { try { const smokeGeometry = new THREE.SphereGeometry(3, 8, 8); const smokeMaterial = new THREE.MeshStandardMaterial({ color: 0xcccccc, transparent: true, opacity: 0.5, }); const smoke = new THREE.Mesh(smokeGeometry, smokeMaterial); smoke.position.set( rocket.position.x, rocket.position.y - 25, rocket.position.z ); smokeParticles.push(smoke); scene.add(smoke); const flameGeometry = new THREE.ConeGeometry(2, 10, 16); const flameMaterial = new THREE.MeshBasicMaterial({ color: 0xffa500, transparent: true, opacity: 0.8, }); const flame = new THREE.Mesh(flameGeometry, flameMaterial); flame.position.set( rocket.position.x, rocket.position.y - 30, rocket.position.z ); flame.rotation.x = Math.PI; flameParticles.push(flame); scene.add(flame); } catch (error) { logToConsole('Error creating smoke and flames: ' + error.message); } } function updateSmokeAndFlames(deltaTime) { try { smokeParticles.forEach((particle, index) => { particle.position.y -= 5 * deltaTime; particle.material.opacity -= 0.2 * deltaTime; if (particle.material.opacity <= 0) { scene.remove(particle); smokeParticles.splice(index, 1); } }); flameParticles.forEach((particle, index) => { particle.material.opacity -= 0.5 * deltaTime; if (particle.material.opacity <= 0) { scene.remove(particle); flameParticles.splice(index, 1); } }); } catch (error) { logToConsole('Error updating smoke and flames: ' + error.message); } } function updateRocket() { try { const rad = THREE.Math.degToRad(rocketParams.angle - 90); rocket.rotation.z = rad; logToConsole('Rocket parameters updated: Thrust=' + rocketParams.thrust + ' N, Angle=' + rocketParams.angle + '°'); } catch (error) { logToConsole('Error updating rocket: ' + error.message); } } function animate() { requestAnimationFrame(animate); try { const currentTime = Date.now(); const deltaTime = (currentTime - previousTime) / 1000; previousTime = currentTime; if (launchStarted && !missionAborted) { const angleRad = THREE.Math.degToRad(rocketParams.angle - 90); const thrustForce = fuel > 0 ? rocketParams.thrust : 0; const dragForce = 0.5 * rocketParams.airDensity * velocity * velocity * rocketParams.dragCoefficient * rocketParams.frontalArea; const netForce = thrustForce + rocketParams.mass * gravity - dragForce; const acceleration = netForce / rocketParams.mass; velocity += acceleration * deltaTime; altitude += velocity * deltaTime; rocket.position.y = altitude + 25; rocket.position.x += Math.sin(angleRad) * velocity * deltaTime; rocket.position.z += Math.cos(angleRad) * velocity * deltaTime; createSmoke(deltaTime); if (fuel > 0) { fuel -= (thrustForce / 1000000) * deltaTime; if (fuel <= 0) { fuel = 0; rocketParams.thrust = 0; updateRocket(); logToConsole('Fuel depleted.'); } } altitudeDisplay.textContent = altitude.toFixed(2); velocityDisplay.textContent = velocity.toFixed(2); fuelDisplay.textContent = fuel.toFixed(2); } else if (missionAborted) { if (rocket.position.y > 25) { const acceleration = gravity; velocity += acceleration * deltaTime; altitude += velocity * deltaTime; rocket.position.y = altitude + 25; } else { rocket.position.y = 25; missionAborted = false; resetMission(); logToConsole('Mission reset after abort.'); } } updateSmokeAndFlames(deltaTime); controls.update(); renderer.render(scene, camera); } catch (error) { logToConsole('Error during animation: ' + error.message); } } function resetMission() { try { launchStarted = false; missionAborted = false; velocity = 0; altitude = 0; fuel = 100; rocketParams.thrust = 2000000; rocket.position.set(0, 25, 0); updateRocket(); altitudeDisplay.textContent = altitude.toFixed(2); velocityDisplay.textContent = velocity.toFixed(2); fuelDisplay.textContent = fuel.toFixed(2); logToConsole('Mission parameters reset.'); } catch (error) { logToConsole('Error resetting mission: ' + error.message); } } function onWindowResize() { try { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); } catch (error) { logToConsole('Error handling window resize: ' + error.message); } } window.onerror = function(message, source, lineno, colno, error) { logToConsole(`Error: ${message} at ${source}:${lineno}:${colno}`); }; init(); animate(); </script></body></html>
