<html><head><base href=""><title>Super Golden Sigma Deluxe</title><style>
                    body {
                        margin: 0;
                        overflow: hidden;
                        background-color: #87CEEB;
                    }
                    #gameSVG {
                        width: 100vw;
                        height: 100vh;
                        display: block;
                    }
                    .player-sprite {
                        width: 60px;
                        height: 90px;
                    }
                    .enemy {
                        width: 80px;
                        height: 80px;
                        y: 500;
                    }
                    .cutscene-character {
                        opacity: 0;
                    }
                    #marko {
                        animation: jumpAnimation 0.5s infinite alternate;
                    }
                    @keyframes jumpAnimation {
                        from { transform: translateY(0); }
                        to { transform: translateY(-20px); }
                    }
                    #blario {
                        transform: scale(-1, 1);
                    }
                    .hidden {
                        display: none;
                    }
                    #cutsceneGround {
                        fill: #8B4513;
                    }
                    .platform {
                        fill: #8B4513;
                    }
                    .pipe {
                        fill: #00FF00;
                    }
                    .pipe-top {
                        fill: #00CC00;
                    }
                    .extended-ground {
                        fill: #8B4513;
                    }
                    .explosion {
                        fill: orange;
                        animation: explodeAnimation 0.5s forwards;
                    }
                    @keyframes explodeAnimation {
                        from { opacity: 1; transform: scale(1); }
                        to { opacity: 0; transform: scale(2); }
                    }
                    /* Styles for main menu */
                    #mainMenu {
                        position: absolute;
                        top: 0;
                        left: 0;
                        width: 100vw;
                        height: 100vh;
                        background-color: rgba(0, 0, 0, 0.8);
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        flex-direction: column;
                        z-index: 1000;
                    }

                    #mainMenu h1 {
                        color: white;
                        font-family: Arial, sans-serif;
                        font-size: 48px;
                        margin-bottom: 20px;
                        text-shadow: 2px 2px 4px black;
                    }

                    #instructions {
                        color: white;
                        font-family: Arial, sans-serif;
                        font-size: 24px;
                        margin-bottom: 20px;
                        text-align: center;
                        text-shadow: 1px 1px 2px black;
                    }

                    #startButton {
                        padding: 15px 30px;
                        font-size: 24px;
                        font-family: Arial, sans-serif;
                        font-weight: bold;
                        color: white;
                        background-color: #00aaff;
                        border: none;
                        border-radius: 10px;
                        cursor: pointer;
                        box-shadow: 2px 2px 10px black;
                        transition: transform 0.2s, background-color 0.2s;
                    }

                    #startButton:hover {
                        background-color: #0077cc;
                        transform: scale(1.1);
                    }

                    .blood-particle {
                        fill: red;
                        r: 3;
                        opacity: 0.8;
                    }

                    @keyframes particleAnimation {
                        0% {
                            transform: translate(0, 0);
                            opacity: 0.8;
                        }
                        100% {
                            transform: translate(var(--dx), var(--dy));
                            opacity: 0;
                        }
                    }

                    .death-text {
                        font-family: Arial, sans-serif;
                        font-size: 48px;
                        font-weight: bold;
                        fill: red;
                        text-shadow: 2px 2px 4px black;
                    }

                    /* Aspect Ratio Overlay Styles */
                    #aspectRatioOverlay {
                        display: none;
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100vw;
                        height: 100vh;
                        z-index: 9999;
                        background-color: black;
                    }

                    #aspectRatioOverlay img {
                        width: 100%;
                        height: 100%;
                        object-fit: contain;
                    }
                </style>
            </head>
            <body>
                <!-- Aspect Ratio Overlay -->
                <div id="aspectRatioOverlay">
                    <img src="/thumbnail.png" alt="Aspect ratio overlay">
                </div>

                <!-- Main Menu -->
                <div id="mainMenu">
                    <h1>Super Golden Sigma Deluxe</h1>
                    <p id="instructions">
                        Use Arrow keys to move<br>
                        Press 'Z' to jump<br>
                        Press 'X' to fire the Sigma Laser
                      
                      Get to the end and defeat Blario with your Sigma Laser to save Marko!<br>
                      <br>uhh refresh the page if you get stuck
                    </p>
                    <button id="startButton">Start Game</button>
                </div>

                <!-- Existing body content remains unchanged -->
                <audio id="gameMusic">
                    <source src="https://raw.githubusercontent.com/notChocoMilk/general-game-data/refs/heads/main/Websim/Super%20Golden%20Sigma%20Deluxe/golden%20sigma.mp3" type="audio/mpeg">
                </audio>
                <audio id="groundTheme" loop>
                    <source src="https://raw.githubusercontent.com/notChocoMilk/general-game-data/refs/heads/main/Websim/Super%20Golden%20Sigma%20Deluxe/Ground%20Theme%20(Super%20Mario%20Bros.)%20-%20Mario%20Series%20for%20Guitar%20-%20SiIvaGunner.mp3" type="audio/mpeg">
                </audio>
                <audio id="secretCourse" loop>
                    <source src="https://raw.githubusercontent.com/notChocoMilk/general-game-data/refs/heads/main/Websim/Super%20Golden%20Sigma%20Deluxe/Secret%20Course%20-%20Super%20Mario%20Sunshine%20-%20SiIvaGunner.mp3" type="audio/mpeg">
                </audio>
                <audio id="endAudio">
                    <source src="https://raw.githubusercontent.com/notChocoMilk/general-game-data/refs/heads/main/Websim/Super%20Golden%20Sigma%20Deluxe/ttsMP3.com_VoiceText_2024-12-1_17-58-37.mp3" type="audio/mpeg">
                </audio>
                <audio id="deathSound">
                    <source src="https://raw.githubusercontent.com/notChocoMilk/general-game-data/refs/heads/main/Websim/Super%20Golden%20Sigma%20Deluxe/death.mp3" type="audio/mpeg">
                </audio>
                <svg id="gameSVG">
                    <rect class="extended-ground" x="0" y="600" width="4000" height="400" />
                    <g id="cutsceneWorld">
                        <rect id="cutsceneGround" x="0" y="580" width="800" height="20" />
                        <image id="marko" class="cutscene-character" href="/marko.png" width="60" height="90" x="300" y="490" />
                        <image id="blario" class="cutscene-character" href="/blario.png" width="60" height="90" x="-100" y="200" />
                        <image id="cage" class="cutscene-character" href="/cage.png" width="100" height="120" x="280" y="-150" />
                    </g>
                    <g id="gameWorld" class="hidden">
                        <image id="player" href="/a/9635d8b9-d99d-4898-b3b2-0589ba2f1280" width="60" height="90" x="100" y="500" />
                    </g>
                </svg>
                <script>
                    // Prevent game logic or audio from starting until user interaction
                    const mainMenu = document.getElementById("mainMenu");
                    const startButton = document.getElementById("startButton");

                    startButton.addEventListener("click", () => {
                        mainMenu.style.display = "none"; // Hide main menu
                        startGame(); // Start the game logic
                    });

                    function startGame() {
                        // Play first audio track to ensure browser allows audio playback
                        const gameMusic = document.getElementById("gameMusic");
                        gameMusic.play();

                        // Start the cutscene
                        startCutscene();
                    }

                    const svgNS = "http://www.w3.org/2000/svg";
                    const cutsceneWorld = document.getElementById('cutsceneWorld');
                    const marko = document.getElementById('marko');
                    const blario = document.getElementById('blario');
                    const cage = document.getElementById('cage');
                    const gameMusic = document.getElementById('gameMusic');
                    const groundTheme = document.getElementById('groundTheme');
                    const secretCourse = document.getElementById('secretCourse');
                    const endAudio = document.getElementById('endAudio');

                    const gameWorld = document.getElementById('gameWorld');
                    const player = document.getElementById('player');

                    let keys = {};
                    let xVelocity = 0;
                    let yVelocity = 0;
                    let speed = 5;
                    let facingRight = true;
                    const gravity = 0.5;
                    const jumpStrength = -15;
                    let cameraX = 0;
                    let enemies = [];
                    let platforms = [];
                    let pipes = [];
                    let levelWidth = 20000;
                    let blarioBoss = null;
                    let bossAreaStart = levelWidth - 800;
                    let bossCage = null;
                    let blarioExploded = false;
                    let cageDestroyed = false;
                    let gameLoopActive = true;
                    let cageHitCount = 0; // Added cage hit count

                    function lerp(start, end, t) {
                        return start + (end - start) * t;
                    }

                    function createPlatform(x, y, width, height) {
                        const platform = document.createElementNS(svgNS, 'rect');
                        platform.setAttribute('x', x);
                        platform.setAttribute('y', y);
                        platform.setAttribute('width', width);
                        platform.setAttribute('height', height);
                        platform.setAttribute('class', 'platform');
                        gameWorld.appendChild(platform);
                        platforms.push(platform);
                        return platform;
                    }

                    function createPipe(x) {
                        const pipe = document.createElementNS(svgNS, 'g');

                        // Pipe body
                        const pipeBody = document.createElementNS(svgNS, 'rect');
                        pipeBody.setAttribute('x', x);
                        pipeBody.setAttribute('y', 480);
                        pipeBody.setAttribute('width', 60);
                        pipeBody.setAttribute('height', 100);
                        pipeBody.setAttribute('class', 'pipe');

                        // Pipe top
                        const pipeTop = document.createElementNS(svgNS, 'rect');
                        pipeTop.setAttribute('x', x - 5);
                        pipeTop.setAttribute('y', 460);
                        pipeTop.setAttribute('width', 70);
                        pipeTop.setAttribute('height', 20);
                        pipeTop.setAttribute('class', 'pipe-top');

                        pipe.appendChild(pipeBody);
                        pipe.appendChild(pipeTop);
                        gameWorld.appendChild(pipe);
                        pipes.push(pipe);
                        return pipe;
                    }

                    function createEnemy(x) {
                        const enemy = document.createElementNS(svgNS, 'image');
                        enemy.setAttribute('href', '/no gumba can stop the mayro broths.png');
                        enemy.setAttribute('x', x);
                        enemy.setAttribute('y', 500);
                        enemy.setAttribute('width', 80);
                        enemy.setAttribute('height', 80);
                        enemy.direction = Math.random() < 0.5 ? -1 : 1;
                        enemy.speed = 2;
                        gameWorld.appendChild(enemy);
                        enemies.push(enemy);
                        return enemy;
                    }

                    function startCutscene() {
                        // Show Marko jumping
                        marko.style.opacity = 1;

                        setTimeout(() => {
                            // Start Blario's fly-in animation
                            blario.style.opacity = 1;
                            let blarioStartX = -100; // Start offscreen left
                            let blarioStartY = 200;
                            let blarioMidX = 250; // Next to Marko
                            let blarioMidY = 200;
                            let blarioT = 0;

                            function animateBlarioIn() {
                                if (blarioT <= 1) {
                                    blarioT += 0.02;
                                    const x = lerp(blarioStartX, blarioMidX, blarioT);
                                    const y = lerp(blarioStartY, blarioMidY, blarioT);
                                    blario.setAttribute('x', x);
                                    blario.setAttribute('y', y);
                                    requestAnimationFrame(animateBlarioIn);
                                } else {
                                    // Blario has arrived, start cage animation
                                    setTimeout(startCageAnimation, 500);
                                }
                            }
                            animateBlarioIn();
                        }, 1000);

                        function startCageAnimation() {
                            // Animate cage falling
                            cage.style.opacity = 1;
                            let cageStartY = -150;
                            let cageEndY = 470;
                            let cageT = 0;

                            function animateCage() {
                                cageT += 0.03;
                                if (cageT <= 1) {
                                    cage.setAttribute('y', lerp(cageStartY, cageEndY, cageT));
                                    requestAnimationFrame(animateCage);
                                } else {
                                    // After cage falls, start Blario's fly-out animation
                                    setTimeout(() => {
                                        animateBlarioOut();
                                    }, 500);
                                }
                            }
                            animateCage();
                        }

                        function animateBlarioOut() {
                            let blarioStartX = parseFloat(blario.getAttribute('x'));
                            let blarioStartY = parseFloat(blario.getAttribute('y'));
                            let blarioEndX = 800; // Fly off to the right
                            let blarioEndY = blarioStartY;
                            let blarioT = 0;

                            function animate() {
                                if (blarioT <= 1) {
                                    blarioT += 0.02;
                                    const x = lerp(blarioStartX, blarioEndX, blarioT);
                                    blario.setAttribute('x', x);
                                    requestAnimationFrame(animate);
                                } else {
                                    // Blario has flown away, start the game
                                    setTimeout(() => {
                                        cutsceneWorld.classList.add('hidden');
                                        gameWorld.classList.remove('hidden');
                                        generateLevel();
                                        startGroundTheme(); // Play ground theme after cutscene ends
                                        gameLoop();
                                    }, 500);
                                }
                            }
                            animate();
                        }
                    }

                    // Play ground theme after cutscene ends
                    function startGroundTheme() {
                        groundTheme.play();
                    }

                    document.addEventListener('keydown', function(e) {
                        keys[e.code] = true;
                    });

                    document.addEventListener('keyup', function(e) {
                        keys[e.code] = false;
                    });

                    function updateCamera() {
                        const playerX = parseFloat(player.getAttribute('x'));
                        cameraX = playerX - window.innerWidth / 3;
                        cameraX = Math.max(0, Math.min(cameraX, levelWidth - window.innerWidth));
                        gameWorld.setAttribute('transform', `translate(${-cameraX}, 0)`);
                    }

                    function isOnGround() {
                        const playerX = parseFloat(player.getAttribute('x'));
                        const playerY = parseFloat(player.getAttribute('y'));
                        const playerWidth = parseFloat(player.getAttribute('width'));
                        const playerHeight = parseFloat(player.getAttribute('height'));

                        // Check main ground
                        if (playerY + playerHeight >= 580) {
                            return true;
                        }

                        // Check platforms
                        for (let platform of platforms) {
                            const platX = parseFloat(platform.getAttribute('x'));
                            const platY = parseFloat(platform.getAttribute('y'));
                            const platWidth = parseFloat(platform.getAttribute('width'));
                            const platHeight = parseFloat(platform.getAttribute('height'));

                            if (playerY + playerHeight <= platY + 5 && 
                                playerY + playerHeight >= platY - 5 && 
                                playerX + playerWidth > platX && 
                                playerX < platX + platWidth) {
                                return true;
                            }
                        }

                        // Check pipes
                        for (let pipe of pipes) {
                            const pipeX = parseFloat(pipe.getBBox().x);
                            const pipeY = parseFloat(pipe.getBBox().y);
                            const pipeWidth = parseFloat(pipe.getBBox().width);
                            const pipeHeight = parseFloat(pipe.getBBox().height);

                            if (playerY + playerHeight <= pipeY + 5 && 
                                playerY + playerHeight >= pipeY - 5 && 
                                playerX + playerWidth > pipeX && 
                                playerX < pipeX + pipeWidth) {
                                return true;
                            }
                        }

                        return false;
                    }

                    function checkCollision(rect1, rect2) {
                        const r1x = parseFloat(rect1.getAttribute('x'));
                        const r1y = parseFloat(rect1.getAttribute('y'));
                        const r1w = parseFloat(rect1.getAttribute('width'));
                        const r1h = parseFloat(rect1.getAttribute('height'));
                        const r2x = parseFloat(rect2.getAttribute('x'));
                        const r2y = parseFloat(rect2.getAttribute('y'));
                        const r2w = parseFloat(rect2.getAttribute('width'));
                        const r2h = parseFloat(rect2.getAttribute('height'));

                        return !(r1x + r1w < r2x || r2x + r2w < r1x || r1y + r1h < r2y || r2y + r2h < r1y);
                    }

                    function gameLoop() {
                        if (!gameLoopActive) return;

                        if (keys['ArrowLeft']) {
                            xVelocity = -speed;
                            facingRight = false;
                            player.setAttribute('transform', 'scale(-1,1) translate(-' + (2 * parseFloat(player.getAttribute('x')) + parseFloat(player.getAttribute('width'))) + ',0)');
                        } else if (keys['ArrowRight']) {
                            xVelocity = speed;
                            facingRight = true;
                            player.setAttribute('transform', '');
                        } else {
                            xVelocity = 0;
                        }

                        if (keys['ShiftLeft']) {
                            xVelocity *= 1.5;
                        }

                        if (keys['KeyZ'] && isOnGround()) {
                            yVelocity = jumpStrength;
                        }

                        yVelocity += gravity;

                        let playerX = parseFloat(player.getAttribute('x')) + xVelocity;
                        let playerY = parseFloat(player.getAttribute('y')) + yVelocity;
                        let playerWidth = parseFloat(player.getAttribute('width'));
                        let playerHeight = parseFloat(player.getAttribute('height'));

                        // Platform collision
                        platforms.forEach(platform => {
                            const platX = parseFloat(platform.getAttribute('x'));
                            const platY = parseFloat(platform.getAttribute('y'));
                            const platWidth = parseFloat(platform.getAttribute('width'));
                            const platHeight = parseFloat(platform.getAttribute('height'));

                            if (playerX + playerWidth > platX && 
                                playerX < platX + platWidth && 
                                playerY + playerHeight > platY &&
                                playerY < platY + platHeight) {

                                // Coming from above
                                if (playerY + playerHeight - yVelocity <= platY) {
                                    playerY = platY - playerHeight;
                                    yVelocity = 0;
                                }
                                // Coming from below
                                else if (playerY - yVelocity >= platY + platHeight) {
                                    playerY = platY + platHeight;
                                    yVelocity = 0;
                                }
                                // Coming from sides
                                else if (xVelocity > 0) {
                                    playerX = platX - playerWidth;
                                } else if (xVelocity < 0) {
                                    playerX = platX + platWidth;
                                }
                            }
                        });

                        // Ground collision
                        if (playerY + playerHeight > 580) {
                            playerY = 580 - playerHeight;
                            yVelocity = 0;
                        }

                        // Pipe collision for player
                        pipes.forEach(pipe => {
                            const pipeBBox = pipe.getBBox();
                            if (playerX + playerWidth > pipeBBox.x && 
                                playerX < pipeBBox.x + pipeBBox.width && 
                                playerY + playerHeight > pipeBBox.y &&
                                playerY < pipeBBox.y + pipeBBox.height) {

                                // Coming from above
                                if (playerY + playerHeight - yVelocity <= pipeBBox.y) {
                                    playerY = pipeBBox.y - playerHeight;
                                    yVelocity = 0;
                                }
                                // Coming from sides
                                else if (xVelocity > 0) {
                                    playerX = pipeBBox.x - playerWidth;
                                } else if (xVelocity < 0) {
                                    playerX = pipeBBox.x + pipeBBox.width;
                                }
                            }
                        });

                        // Update enemies
                        enemies.forEach((enemy, index) => {
                            let enemyX = parseFloat(enemy.getAttribute('x'));
                            const enemyY = parseFloat(enemy.getAttribute('y'));
                            const enemyWidth = 80;
                            const enemyHeight = 80;

                            // Move enemy
                            enemyX += enemy.direction * enemy.speed;

                            // Check pipe collisions for enemies
                            pipes.forEach(pipe => {
                                const pipeBBox = pipe.getBBox();
                                if (enemyX + 80 > pipeBBox.x && 
                                    enemyX < pipeBBox.x + pipeBBox.width) {
                                    enemy.direction *= -1;
                                    enemyX += enemy.direction * enemy.speed;
                                }
                            });

                            // Check platform edges
                            if (enemyX <= 0 || enemyX + 80 >= levelWidth) {
                                enemy.direction *= -1;
                            }

                            enemy.setAttribute('x', enemyX);

                            // Check for player collision with enemy
                            if (playerX + playerWidth > enemyX && 
                                playerX < enemyX + enemyWidth && 
                                playerY + playerHeight > enemyY && 
                                playerY < enemyY + enemyHeight) {
                                
                                // Check if player is jumping on enemy from above
                                if (yVelocity > 0 && 
                                    playerY + playerHeight < enemyY + 20) {
                                    // Destroy enemy
                                    gameWorld.removeChild(enemy);
                                    enemies.splice(index, 1);
                                    yVelocity = jumpStrength;
                                } else {
                                    // Player dies
                                    playerDeath();
                                }
                            }
                        });

                        playerX = Math.max(0, Math.min(playerX, levelWidth - playerWidth));
                        player.setAttribute('x', playerX);
                        player.setAttribute('y', playerY);

                        if (keys['KeyX']) {
                            fireSigmaLaser(playerX, playerY);
                            keys['KeyX'] = false;
                        }

                        updateCamera();
                        checkEndLevel();
                        requestAnimationFrame(gameLoop);
                    }

                    function fireSigmaLaser(x, y) {
                        const laser = document.createElementNS(svgNS, 'rect');
                        laser.setAttribute('x', x + (facingRight ? parseFloat(player.getAttribute('width')) : -10));
                        laser.setAttribute('y', y + parseFloat(player.getAttribute('height')) / 2);
                        laser.setAttribute('width', 10);
                        laser.setAttribute('height', 4);
                        laser.setAttribute('fill', 'red');
                        gameWorld.appendChild(laser);

                        let laserVelocity = facingRight ? 10 : -10;

                        function moveLaser() {
                            let laserX = parseFloat(laser.getAttribute('x')) + laserVelocity;
                            laser.setAttribute('x', laserX);

                            enemies.forEach((enemy, index) => {
                                if (checkCollision(laser, enemy)) {
                                    if (gameWorld.contains(enemy)) {
                                        gameWorld.removeChild(enemy);
                                        enemies.splice(index, 1);
                                    }
                                    if (gameWorld.contains(laser)) {
                                        gameWorld.removeChild(laser);
                                    }
                                    return;
                                }
                            });

                            // Improved collision checks for Blario and cage
                            if (blarioBoss && checkCollision(laser, blarioBoss) && !blarioExploded) {
                                blarioExploded = true;
                                explodeEffect(blarioBoss);
                                gameWorld.removeChild(blarioBoss);
                                gameWorld.removeChild(laser); // Remove laser immediately
                                spawnMarkoAndCage();
                                return; // Stop laser movement
                            }

                            // Updated cage collision logic to work from both sides
                            if (bossCage && !cageDestroyed) {
                                const laserRect = laser.getBoundingClientRect();
                                const cageRect = bossCage.getBoundingClientRect();
                                
                                // Check if laser overlaps with cage, regardless of direction
                                if (!(laserRect.right < cageRect.left || 
                                    laserRect.left > cageRect.right || 
                                    laserRect.bottom < cageRect.top || 
                                    laserRect.top > cageRect.bottom)) {
                                        
                                    cageHitCount++;
                                    
                                    // Create hit effect
                                    const hitEffect = document.createElementNS(svgNS, 'circle');
                                    hitEffect.setAttribute('cx', parseFloat(bossCage.getAttribute('x')) + 60);
                                    hitEffect.setAttribute('cy', parseFloat(bossCage.getAttribute('y')) + 70);
                                    hitEffect.setAttribute('r', 20);
                                    hitEffect.setAttribute('fill', 'yellow');
                                    hitEffect.setAttribute('opacity', '0.8');
                                    gameWorld.appendChild(hitEffect);
                                    
                                    // Animate and remove hit effect
                                    setTimeout(() => {
                                        if (gameWorld.contains(hitEffect)) {
                                            gameWorld.removeChild(hitEffect);
                                        }
                                    }, 200);

                                    // Shake cage effect
                                    bossCage.style.transition = 'transform 0.1s';
                                    bossCage.style.transform = `translate(${Math.random() * 10 - 5}px, ${Math.random() * 10 - 5}px)`;
                                    setTimeout(() => {
                                        bossCage.style.transform = 'none';
                                    }, 100);

                                    if (cageHitCount >= 3) {
                                        cageDestroyed = true;
                                        explodeEffect(bossCage);
                                        gameWorld.removeChild(bossCage);

                                        if (window.capturedMarko) {
                                            window.capturedMarko.style.transition = 'transform 0.5s';
                                            window.capturedMarko.style.transform = 'translateY(-50px)';
                                        }

                                        const congrats = document.createElementNS(svgNS, 'text');
                                        congrats.setAttribute('x', bossAreaStart + 300);
                                        congrats.setAttribute('y', 300);
                                        congrats.setAttribute('font-size', '48');
                                        congrats.setAttribute('fill', 'white');
                                        congrats.setAttribute('font-weight', 'bold');
                                        congrats.textContent = 'your did it';
                                        gameWorld.appendChild(congrats);

                                        groundTheme.pause();
                                        secretCourse.play();
                                        endAudio.play();
                                    }

                                    if (gameWorld.contains(laser)) {
                                        gameWorld.removeChild(laser);
                                    }
                                    return;
                                }
                            }

                            // Check if laser is off-screen
                            const laserScreenX = laserX - cameraX;
                            if (laserScreenX + parseFloat(laser.getAttribute('width')) < 0 || laserScreenX > window.innerWidth) {
                                if (gameWorld.contains(laser)) {
                                    gameWorld.removeChild(laser);
                                }
                                return;
                            }

                            requestAnimationFrame(moveLaser);
                        }

                        moveLaser();
                    }

                    function generateLevel() {
                        // Ground platform
                        createPlatform(0, 580, levelWidth, 20);

                        const startingAreaWidth = 400;
                        const playerStartX = 100;

                        for (let x = startingAreaWidth; x < bossAreaStart; x += Math.random() * 300 + 200) {
                            const platformY = Math.random() * 200 + 300;
                            createPlatform(x, platformY, Math.random() * 100 + 100, 20);
                        }

                        for (let x = startingAreaWidth + 100; x < bossAreaStart; x += Math.random() * 500 + 300) {
                            createPipe(x);
                            if (Math.random() > 0.5) {
                                createEnemy(x + 100);
                            }
                        }
                        // Add boss area ground
                        createPlatform(bossAreaStart, 580, 800, 20);

                        spawnBlarioBoss(bossAreaStart + 400); // Place in boss area
                    }

                    function spawnBlarioBoss(x) {
                        blarioBoss = document.createElementNS(svgNS, 'image');
                        blarioBoss.setAttribute('href', '/blario.png');
                        blarioBoss.setAttribute('x', x);
                        blarioBoss.setAttribute('y', 480);
                        blarioBoss.setAttribute('width', 100);
                        blarioBoss.setAttribute('height', 100);
                        gameWorld.appendChild(blarioBoss);
                    }

                    function spawnCage(x, y) {
                        bossCage = document.createElementNS(svgNS, 'image');
                        bossCage.setAttribute('href', '/cage.png');
                        bossCage.setAttribute('x', x);
                        bossCage.setAttribute('y', y);
                        bossCage.setAttribute('width', 120);
                        bossCage.setAttribute('height', 140);
                        gameWorld.appendChild(bossCage);
                    }

                    function spawnMarkoAndCage() {
                        // Spawn the cage with Marko inside after defeating Blario
                        const cageX = bossAreaStart + 350; // Adjust position as needed
                        const cageY = 440; // Adjust position as needed

                        spawnCage(cageX, cageY);

                        // Spawn Marko inside the cage
                        const markoInsideCage = document.createElementNS(svgNS, 'image');
                        markoInsideCage.setAttribute('href', '/marko.png');
                        markoInsideCage.setAttribute('x', cageX + 30); // Adjust to place inside the cage
                        markoInsideCage.setAttribute('y', cageY + 20); // Adjust to place inside the cage
                        markoInsideCage.setAttribute('width', 60);
                        markoInsideCage.setAttribute('height', 90);
                        gameWorld.appendChild(markoInsideCage);
                        window.capturedMarko = markoInsideCage;
                    }

                    function checkEndLevel() {
                        // No collision with blarioBoss
                    }

                    // Added function for explosion effect
                    function explodeEffect(target) {
                        const explosion = document.createElementNS(svgNS, 'circle');
                        explosion.setAttribute('cx', parseFloat(target.getAttribute('x')) + parseFloat(target.getAttribute('width')) / 2);
                        explosion.setAttribute('cy', parseFloat(target.getAttribute('y')) + parseFloat(target.getAttribute('height')) / 2);
                        explosion.setAttribute('r', 40);
                        explosion.setAttribute('class', 'explosion');
                        gameWorld.appendChild(explosion);

                        setTimeout(() => {
                            gameWorld.removeChild(explosion);
                        }, 500);
                    }

                    // Function to create blood effect
                    function createBloodEffect(x, y) {
                        for (let i = 0; i < 20; i++) {
                            const particle = document.createElementNS(svgNS, 'circle');
                            particle.setAttribute('class', 'blood-particle');
                            particle.setAttribute('cx', x);
                            particle.setAttribute('cy', y);
                            
                            const angle = Math.random() * Math.PI * 2;
                            const distance = Math.random() * 100 + 50;
                            const dx = Math.cos(angle) * distance;
                            const dy = Math.sin(angle) * distance;
                            
                            particle.style.setProperty('--dx', `${dx}px`);
                            particle.style.setProperty('--dy', `${dy}px`);
                            particle.style.animation = 'particleAnimation 1s forwards';
                            
                            gameWorld.appendChild(particle);
                            
                            setTimeout(() => {
                                if (gameWorld.contains(particle)) {
                                    gameWorld.removeChild(particle);
                                }
                            }, 1000);
                        }
                    }

                    // Function to handle player death
                    function playerDeath() {
                        const playerX = parseFloat(player.getAttribute('x'));
                        const playerY = parseFloat(player.getAttribute('y'));
                        
                        // Create blood effect
                        createBloodEffect(playerX + 30, playerY + 45);
                        
                        // Play death sound
                        const deathSound = document.getElementById('deathSound');
                        deathSound.currentTime = 0;
                        deathSound.play();
                        
                        // Show death text
                        const deathText = document.createElementNS(svgNS, 'text');
                        deathText.setAttribute('class', 'death-text');
                        deathText.setAttribute('x', playerX - cameraX);
                        deathText.setAttribute('y', 300);
                        deathText.textContent = 'you died!!';
                        gameWorld.appendChild(deathText);
                        
                        // Hide player
                        player.style.display = 'none';
                        
                        // Stop game loop
                        gameLoopActive = false;
                        
                        // Prevent further movement
                        keys = {};
                        
                        // Optional: Reload page after delay
                        setTimeout(() => {
                            location.reload();
                        }, 2000);
                    }

                    // Function to check aspect ratio
                    function checkAspectRatio() {
                        const aspectRatioOverlay = document.getElementById('aspectRatioOverlay');
                        const ratio = window.innerWidth / window.innerHeight;
                        
                        // Show overlay if ratio is approximately 1:1 (allowing small margin of error)
                        if (Math.abs(ratio - 1) < 0.01) {
                            aspectRatioOverlay.style.display = 'block';
                        } else {
                            aspectRatioOverlay.style.display = 'none';
                        }
                    }

                    // Check on load and window resize
                    window.addEventListener('load', checkAspectRatio);
                    window.addEventListener('resize', checkAspectRatio);
                </script>
