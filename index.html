<html><head><base href="https://redfoxvirus.local">
<title>Red Fox Virus</title>
<style>
body {
    font-family: 'Courier New', monospace;
    background-color: #000000;
    color: #ff6600;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    transition: background-color 0.5s;
}

#virus-container {
    width: 800px;
    height: 600px;
    background-color: #1a1a1a;
    border: 2px solid #ff6600;
    box-shadow: 0 0 20px #ff6600;
    position: relative;
    overflow: hidden;
    transition: background-color 0.5s;
}

#fox-svg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 300px;
    transition: fill 0.5s;
}

#status-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background-color: #333333;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

#timer, #infection-rate {
    font-size: 18px;
}

#message-box {
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    text-align: center;
    font-size: 24px;
    text-shadow: 0 0 5px #ff6600;
}

#code-input {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
}

#code-input input {
    background-color: #333333;
    border: 1px solid #ff6600;
    color: #ff6600;
    padding: 5px;
    font-family: 'Courier New', monospace;
}

#code-input button {
    background-color: #ff6600;
    border: none;
    color: #000000;
    padding: 5px 10px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
}

.glitch {
    animation: glitch 0.5s infinite;
}

@keyframes glitch {
    0% { transform: translate(-50%, -50%); }
    25% { transform: translate(-52%, -48%); }
    50% { transform: translate(-48%, -52%); }
    75% { transform: translate(-52%, -48%); }
    100% { transform: translate(-50%, -50%); }
}

#exit-button {
    position: absolute;
    top: 10px;
    right: 10px;
    background-color: #ff6600;
    color: #000000;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 16px;
}

#red-eyes {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
}

.eye {
    width: 50px;
    height: 50px;
    background-color: #ff0000;
    border-radius: 50%;
    position: absolute;
    box-shadow: 0 0 20px #ff0000;
    animation: glow 2s infinite alternate;
}

.eye-left {
    left: -40px;
}

.eye-right {
    right: -40px;
}

@keyframes glow {
    from {
        box-shadow: 0 0 20px #ff0000;
    }
    to {
        box-shadow: 0 0 40px #ff0000, 0 0 80px #ff0000;
    }
}
</style>
</head>
<body>
<div id="virus-container">
    <button id="exit-button">Exit</button>
    <svg id="fox-svg" viewBox="0 0 200 200">
        <path d="M100 20 L180 100 L100 180 L20 100 Z" fill="#ff6600" />
        <circle cx="70" cy="80" r="10" fill="#000000" />
        <circle cx="130" cy="80" r="10" fill="#000000" />
        <path d="M90 120 Q100 130 110 120" stroke="#000000" stroke-width="3" fill="none" />
        <path d="M60 50 L80 30 M140 50 L120 30" stroke="#000000" stroke-width="3" />
    </svg>
    <div id="red-eyes">
        <div class="eye eye-left"></div>
        <div class="eye eye-right"></div>
    </div>
    <div id="status-bar">
        <div id="timer">Time: 05:00</div>
        <div id="infection-rate">Infection: 0%</div>
    </div>
    <div id="message-box"></div>
    <div id="code-input">
        <input type="text" placeholder="Enter code">
        <button onclick="checkCode()">Submit</button>
    </div>
</div>

<script>
let time = 300; // 5 minutes
let infection = 0;
let gameOver = false;
let exitClickCount = 0;

function updateTimer() {
    const minutes = Math.floor(time / 60);
    const seconds = time % 60;
    document.getElementById('timer').textContent = `Time: ${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    time--;

    if (time < 0) {
        endGame();
    }
}

function updateInfection() {
    infection += Math.random() * 2;
    if (infection > 100) infection = 100;
    document.getElementById('infection-rate').textContent = `Infection: ${Math.floor(infection)}%`;

    if (infection >= 100) {
        endGame();
    }
}

function displayMessage(message) {
    document.getElementById('message-box').textContent = message;
}

function endGame() {
    gameOver = true;
    clearInterval(timerInterval);
    clearInterval(infectionInterval);
    document.getElementById('fox-svg').classList.add('glitch');
    displayMessage("SYSTEM COMPROMISED. ENTER RECOVERY CODE.");
    document.getElementById('code-input').style.display = 'block';
}

function checkCode() {
    const code = document.getElementById('code-input').querySelector('input').value;
    if (code === "REDFOX") {
        displayMessage("VIRUS NEUTRALIZED. SYSTEM RESTORED.");
        document.getElementById('fox-svg').style.opacity = 0;
        document.body.style.backgroundColor = "#00ff00";
    } else {
        displayMessage("INCORRECT CODE. SYSTEM MELTDOWN IMMINENT.");
        document.body.style.backgroundColor = "#ff0000";
        setTimeout(() => {
            document.body.style.backgroundColor = "#000000";
        }, 500);
    }
}

const timerInterval = setInterval(updateTimer, 1000);
const infectionInterval = setInterval(updateInfection, 1000);

document.addEventListener('mousemove', (e) => {
    if (!gameOver) {
        const fox = document.getElementById('fox-svg');
        const rect = fox.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
        fox.style.transform = `translate(-50%, -50%) rotate(${angle}rad)`;
    }
});

document.getElementById('exit-button').addEventListener('click', () => {
    exitClickCount++;
    
    if (exitClickCount >= 10) {
        document.body.style.backgroundColor = "#000000";
        document.getElementById('virus-container').style.backgroundColor = "#000000";
        const foxSvg = document.getElementById('fox-svg');
        foxSvg.querySelector('path').setAttribute('fill', '#000000');
        foxSvg.querySelectorAll('circle, path').forEach(el => {
            el.setAttribute('stroke', '#000000');
            el.setAttribute('fill', '#000000');
        });
        document.getElementById('red-eyes').style.display = 'block';
        displayMessage("Nice try");
        
        // Use the Web Speech API with a deeper voice
        const message = "Nice try";
        const utterance = new SpeechSynthesisUtterance(message);
        utterance.rate = 0.9;
        utterance.pitch = 0.5; // Lower pitch for a deeper voice
        
        // Try to find a deep male voice
        const voices = speechSynthesis.getVoices();
        const deepVoice = voices.find(voice => voice.name.includes('Male') && voice.name.includes('Deep')) ||
                          voices.find(voice => voice.name.includes('Male')) ||
                          voices[0];
        
        utterance.voice = deepVoice;
        
        speechSynthesis.speak(utterance);
    } else {
        document.getElementById('virus-container').style.display = 'none';
        
        // Use the Web Speech API with a deeper voice
        const message = "You can't escape me. I'm always here.";
        const utterance = new SpeechSynthesisUtterance(message);
        utterance.rate = 0.9;
        utterance.pitch = 0.5; // Lower pitch for a deeper voice
        
        // Try to find a deep male voice
        const voices = speechSynthesis.getVoices();
        const deepVoice = voices.find(voice => voice.name.includes('Male') && voice.name.includes('Deep')) ||
                          voices.find(voice => voice.name.includes('Male')) ||
                          voices[0];
        
        utterance.voice = deepVoice;
        
        speechSynthesis.speak(utterance);
        
        setTimeout(() => {
            document.getElementById('virus-container').style.display = 'block';
        }, 1000);
    }
});

displayMessage("RED FOX VIRUS ACTIVATED. NEUTRALIZE BEFORE TIME RUNS OUT.");

// Initialize voices
speechSynthesis.onvoiceschanged = function() {
    const voices = speechSynthesis.getVoices();
    console.log("Available voices:", voices);
};
</script>
</body>
</html>
