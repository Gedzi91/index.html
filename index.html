<html><head><base href="https://websim.pumpkingubbins.com/"><title>3D Partikel-Ball mit erweiterten Einstellungen</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body { margin: 0; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; color: white; }
#fileInput { position: absolute; top: 10px; left: 10px; z-index: 100; }
#controls { position: absolute; bottom: 10px; left: 10px; z-index: 100; }
#settings {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 300px;
    z-index: 100;
    background-color: rgba(0,0,0,0.7);
    padding: 10px;
    overflow-y: auto;
    transition: transform 0.3s ease-in-out;
}
button, select, input { margin: 5px; }
.setting-group { margin-bottom: 15px; }
#toggleUI {
    position: fixed;
    top: 10px;
    right: 310px;
    z-index: 1000;
    padding: 5px 10px;
    background-color: rgba(0, 0, 0, 0.7);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
.hidden {
    display: none !important;
}
body.ui-hidden #settings {
    transform: translateX(100%);
}
body.ui-hidden #toggleUI {
    right: 10px;
}
</style>
</head>
<body>
<input type="file" id="fileInput" accept="audio/*">
<div id="controls">
    <button id="playPause">Pause</button>
    <button id="stop">Stop</button>
</div>
<div id="settings">
    <h3>Erweiterte Einstellungen</h3>
    
    <div class="setting-group">
        <h4>Farben</h4>
        <label for="colorMode">Farbmodus:</label>
        <select id="colorMode">
            <option value="static">Statisch</option>
            <option value="rainbow">Regenbogen</option>
            <option value="beat">Beat-basiert</option>
            <option value="custom">Benutzerdefiniert</option>
        </select>
        <div id="customColorSettings" style="display:none;">
            <label for="customColor1">Farbe 1:</label>
            <input type="color" id="customColor1" value="#ff0000">
            <label for="customColor2">Farbe 2:</label>
            <input type="color" id="customColor2" value="#0000ff">
        </div>
    </div>
    
    <div class="setting-group">
        <h4>Partikel</h4>
        <label for="particleCount">Partikelanzahl:</label>
        <input type="range" id="particleCount" min="1000" max="20000" step="1000" value="5000">
        <label for="particleSize">Partikelgröße:</label>
        <input type="range" id="particleSize" min="0.01" max="0.5" step="0.01" value="0.1">
        <label for="particleShape">Partikelform:</label>
        <select id="particleShape">
            <option value="circle">Kreis</option>
            <option value="square">Quadrat</option>
            <option value="star">Stern</option>
        </select>
        <label for="particleSpeed">Partikelgeschwindigkeit:</label>
        <input type="range" id="particleSpeed" min="0" max="0.1" step="0.001" value="0.01">
        <label for="particleSpread">Partikelausbreitung:</label>
        <input type="range" id="particleSpread" min="1" max="10" step="0.1" value="5">
    </div>
    
    <div class="setting-group">
        <h4>Animation</h4>
        <label for="rotationSpeed">Rotationsgeschwindigkeit:</label>
        <input type="range" id="rotationSpeed" min="0" max="0.01" step="0.001" value="0.001">
        <label for="beatSensitivity">Beat-Empfindlichkeit:</label>
        <input type="range" id="beatSensitivity" min="0" max="0.01" step="0.001" value="0.002">
        <label for="pulseStrength">Pulsierungsstärke:</label>
        <input type="range" id="pulseStrength" min="0" max="0.5" step="0.01" value="0.05">
    </div>
    
    <div class="setting-group">
        <h4>Kamera</h4>
        <label for="cameraDistance">Kameradistanz:</label>
        <input type="range" id="cameraDistance" min="5" max="20" step="0.5" value="10">
        <label for="cameraAutoRotate">Automatische Kamerarotation:</label>
        <input type="checkbox" id="cameraAutoRotate">
    </div>
    
    <div class="setting-group">
        <h4>Hintergrund</h4>
        <label for="backgroundColor">Hintergrundfarbe:</label>
        <input type="color" id="backgroundColor" value="#000000">
        <label for="backgroundEffect">Hintergrundeffekt:</label>
        <select id="backgroundEffect">
            <option value="none">Keiner</option>
            <option value="stars">Sterne</option>
            <option value="nebula">Nebel</option>
        </select>
    </div>

    <div class="setting-group">
        <h4>Effekte</h4>
        <label for="glowEffect">Glüheffekt:</label>
        <input type="checkbox" id="glowEffect">
        <label for="trailEffect">Partikelspuren:</label>
        <input type="checkbox" id="trailEffect">
        <label for="explosionEffect">Explosionseffekt:</label>
        <input type="checkbox" id="explosionEffect">
    </div>

    <div class="setting-group">
        <h4>Audio Visualisierung</h4>
        <label for="visualizationType">Visualisierungstyp:</label>
        <select id="visualizationType">
            <option value="sphere">Kugel</option>
            <option value="wave">Welle</option>
            <option value="spiral">Spirale</option>
        </select>
        <label for="frequencyRange">Frequenzbereich:</label>
        <select id="frequencyRange">
            <option value="full">Vollständig</option>
            <option value="bass">Bass</option>
            <option value="mid">Mitten</option>
            <option value="treble">Höhen</option>
        </select>
    </div>
</div>
<button id="toggleUI">UI ein-/ausblenden</button>
<script>
let scene, camera, renderer, particles, analyser, dataArray, audioElement, audioContext, source;
let particleCount = 5000;
let colorMode = 'static';
let particleSize = 0.1;
let rotationSpeed = 0.001;
let beatSensitivity = 0.002;
let pulseStrength = 0.05;
let customColor1 = new THREE.Color(0xff0000);
let customColor2 = new THREE.Color(0x0000ff);
let particleShape = 'circle';
let cameraDistance = 10;
let cameraAutoRotate = false;
let backgroundColor = new THREE.Color(0x000000);
let backgroundEffect = 'none';
let backgroundObjects = [];
let glowEffect = false;
let trailEffect = false;
let explosionEffect = false;
let visualizationType = 'sphere';
let frequencyRange = 'full';
let particleSpeed = 0.01;
let particleSpread = 5;

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    createParticles();
    createBackground();

    camera.position.z = cameraDistance;
}

function createParticles() {
    if (particles) scene.remove(particles);

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const radius = 5;

        positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = radius * Math.cos(phi);

        colors[i * 3] = Math.random();
        colors[i * 3 + 1] = Math.random();
        colors[i * 3 + 2] = Math.random();
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({ size: particleSize, vertexColors: true });

    if (particleShape === 'square') {
        material.map = createSquareTexture();
    } else if (particleShape === 'star') {
        material.map = createStarTexture();
    }

    particles = new THREE.Points(geometry, material);
    scene.add(particles);
}

function createSquareTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, 64, 64);
    return new THREE.CanvasTexture(canvas);
}

function createStarTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        const angle = (i * 4 * Math.PI) / 5;
        const x = 32 + 32 * Math.cos(angle);
        const y = 32 + 32 * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    return new THREE.CanvasTexture(canvas);
}

function createBackground() {
    scene.background = backgroundColor;

    backgroundObjects.forEach(obj => scene.remove(obj));
    backgroundObjects = [];

    if (backgroundEffect === 'stars') {
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(1000 * 3);
        for (let i = 0; i < 1000; i++) {
            starPositions[i * 3] = (Math.random() - 0.5) * 100;
            starPositions[i * 3 + 1] = (Math.random() - 0.5) * 100;
            starPositions[i * 3 + 2] = (Math.random() - 0.5) * 100;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        backgroundObjects.push(stars);
    } else if (backgroundEffect === 'nebula') {
        const nebulaTexture = new THREE.TextureLoader().load('https://example.com/nebula-texture.jpg');
        const nebulaMaterial = new THREE.MeshBasicMaterial({ map: nebulaTexture, side: THREE.BackSide });
        const nebulaGeometry = new THREE.SphereGeometry(50, 32, 32);
        const nebula = new THREE.Mesh(nebulaGeometry, nebulaMaterial);
        scene.add(nebula);
        backgroundObjects.push(nebula);
    }
}

function updateParticleColors() {
    const colors = particles.geometry.attributes.color;
    const time = Date.now() * 0.001;

    for (let i = 0; i < colors.count; i++) {
        switch (colorMode) {
            case 'rainbow':
                colors.setXYZ(i, 
                    Math.sin(time + i * 0.1) * 0.5 + 0.5,
                    Math.sin(time + i * 0.2) * 0.5 + 0.5,
                    Math.sin(time + i * 0.3) * 0.5 + 0.5
                );
                break;
            case 'beat':
                if (analyser && !audioElement.paused) {
                    const value = dataArray[i % dataArray.length] / 255;
                    colors.setXYZ(i, value, 1 - value, 0.5);
                }
                break;
            case 'custom':
                const mixFactor = (Math.sin(time + i * 0.1) + 1) / 2;
                const color = customColor1.clone().lerp(customColor2, mixFactor);
                colors.setXYZ(i, color.r, color.g, color.b);
                break;
        }
    }
    colors.needsUpdate = true;
}

function animate() {
    requestAnimationFrame(animate);

    if (analyser && audioElement && !audioElement.paused) {
        analyser.getByteFrequencyData(dataArray);
        const lowerHalfArray = dataArray.slice(0, dataArray.length / 2 - 1);
        const upperHalfArray = dataArray.slice(dataArray.length / 2 - 1, dataArray.length - 1);

        const lowerMax = Math.max(...lowerHalfArray);
        const upperAvg = upperHalfArray.reduce((a, b) => a + b) / upperHalfArray.length;

        const lowerMaxFr = lowerMax / 255;
        const upperAvgFr = upperAvg / 255;

        particles.rotation.y += rotationSpeed + lowerMaxFr * beatSensitivity;
        particles.rotation.x += rotationSpeed + upperAvgFr * beatSensitivity;

        const scale = 1 + lowerMaxFr * pulseStrength;
        particles.scale.set(scale, scale, scale);
    } else {
        particles.rotation.y += rotationSpeed;
        particles.rotation.x += rotationSpeed;
    }

    updateParticleColors();

    if (cameraAutoRotate) {
        camera.position.x = Math.sin(Date.now() * 0.001) * cameraDistance;
        camera.position.z = Math.cos(Date.now() * 0.001) * cameraDistance;
        camera.lookAt(scene.position);
    }

    if (glowEffect) {
        particles.material.blending = THREE.AdditiveBlending;
    } else {
        particles.material.blending = THREE.NormalBlending;
    }

    if (trailEffect) {
        particles.material.map = createTrailTexture();
    } else {
        particles.material.map = null;
    }

    particles.material.needsUpdate = true;

    if (explosionEffect && analyser && !audioElement.paused) {
        const explosionStrength = dataArray[0] / 255; // Use the first frequency bin for the explosion effect
        particles.scale.set(1 + explosionStrength, 1 + explosionStrength, 1 + explosionStrength);
    }

    particles.rotation.y += rotationSpeed + particleSpeed;
    particles.rotation.x += rotationSpeed + particleSpeed;

    renderer.render(scene, camera);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

window.addEventListener('resize', onWindowResize, false);

document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        if (audioElement) {
            audioElement.pause();
            audioElement.remove();
        }
        if (source) {
            source.disconnect();
        }
        if (audioContext) {
            audioContext.close();
        }

        audioElement = new Audio(e.target.result);
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        source = audioContext.createMediaElementSource(audioElement);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        source.connect(analyser);
        analyser.connect(audioContext.destination);

        audioElement.play();
        document.getElementById('playPause').textContent = 'Pause';
    };

    reader.readAsDataURL(file);
});

document.getElementById('playPause').addEventListener('click', function() {
    if (audioElement) {
        if (audioElement.paused) {
            audioElement.play();
            this.textContent = 'Pause';
        } else {
            audioElement.pause();
            this.textContent = 'Play';
        }
    }
});

document.getElementById('stop').addEventListener('click', function() {
    if (audioElement) {
        audioElement.pause();
        audioElement.currentTime = 0;
        document.getElementById('playPause').textContent = 'Play';
    }
});

// Event listeners for all the new settings
document.getElementById('colorMode').addEventListener('change', function(e) {
    colorMode = e.target.value;
    document.getElementById('customColorSettings').style.display = colorMode === 'custom' ? 'block' : 'none';
});

document.getElementById('customColor1').addEventListener('change', function(e) {
    customColor1.setHex(e.target.value.replace('#', '0x'));
});

document.getElementById('customColor2').addEventListener('change', function(e) {
    customColor2.setHex(e.target.value.replace('#', '0x'));
});

document.getElementById('particleCount').addEventListener('input', function(e) {
    particleCount = parseInt(e.target.value);
    createParticles();
});

document.getElementById('particleSize').addEventListener('input', function(e) {
    particleSize = parseFloat(e.target.value);
    particles.material.size = particleSize;
});

document.getElementById('particleShape').addEventListener('change', function(e) {
    particleShape = e.target.value;
    createParticles();
});

document.getElementById('rotationSpeed').addEventListener('input', function(e) {
    rotationSpeed = parseFloat(e.target.value);
});

document.getElementById('beatSensitivity').addEventListener('input', function(e) {
    beatSensitivity = parseFloat(e.target.value);
});

document.getElementById('pulseStrength').addEventListener('input', function(e) {
    pulseStrength = parseFloat(e.target.value);
});

document.getElementById('cameraDistance').addEventListener('input', function(e) {
    cameraDistance = parseFloat(e.target.value);
    camera.position.z = cameraDistance;
});

document.getElementById('cameraAutoRotate').addEventListener('change', function(e) {
    cameraAutoRotate = e.target.checked;
});

document.getElementById('backgroundColor').addEventListener('change', function(e) {
    backgroundColor.setHex(e.target.value.replace('#', '0x'));
    createBackground();
});

document.getElementById('backgroundEffect').addEventListener('change', function(e) {
    backgroundEffect = e.target.value;
    createBackground();
});

document.getElementById('glowEffect').addEventListener('change', function(e) {
    glowEffect = e.target.checked;
    updateParticleEffect();
});

document.getElementById('trailEffect').addEventListener('change', function(e) {
    trailEffect = e.target.checked;
    updateParticleEffect();
});

document.getElementById('explosionEffect').addEventListener('change', function(e) {
    explosionEffect = e.target.checked;
});

document.getElementById('visualizationType').addEventListener('change', function(e) {
    visualizationType = e.target.value;
    updateVisualization();
});

document.getElementById('frequencyRange').addEventListener('change', function(e) {
    frequencyRange = e.target.value;
    updateVisualization();
});

document.getElementById('particleSpeed').addEventListener('input', function(e) {
    particleSpeed = parseFloat(e.target.value);
});

document.getElementById('particleSpread').addEventListener('input', function(e) {
    particleSpread = parseFloat(e.target.value);
    updateParticlePositions();
});

function updateParticleEffect() {
    if (glowEffect) {
        particles.material.blending = THREE.AdditiveBlending;
    } else {
        particles.material.blending = THREE.NormalBlending;
    }
    
    if (trailEffect) {
        particles.material.map = createTrailTexture();
    } else {
        particles.material.map = null;
    }
    
    particles.material.needsUpdate = true;
}

function createTrailTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 32;
    canvas.height = 32;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
    gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 32, 32);
    return new THREE.CanvasTexture(canvas);
}

function updateVisualization() {
    // Implementation for different visualization types and frequency ranges
    // This would require significant changes to the particle system
    // and is beyond the scope of this simple update
}

function updateParticlePositions() {
    const positions = particles.geometry.attributes.position;
    for (let i = 0; i < positions.count; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const radius = particleSpread;

        positions.setXYZ(
            i,
            radius * Math.sin(phi) * Math.cos(theta),
            radius * Math.sin(phi) * Math.sin(theta),
            radius * Math.cos(phi)
        );
    }
    positions.needsUpdate = true;
}

document.getElementById('toggleUI').addEventListener('click', function() {
    document.body.classList.toggle('ui-hidden');
    this.textContent = document.body.classList.contains('ui-hidden') ? 'UI einblenden' : 'UI ausblenden';
});

init();
animate();
</script>
</body></html>
