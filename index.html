<html><head><base href="https://generated-games.infinitespace.ai/mindscape-collapse/"><title>Cosmic Mindscape: A Psyche Odyssey</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background-color: #000;
    color: #fff;
}
canvas {
    width: 100%;
    height: 100%;
    display: block;
}
#overlay {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 14px;
    pointer-events: none;
}
#controls {
    position: absolute;
    bottom: 10px;
    left: 10px;
    display: flex;
    flex-direction: column;
}
button {
    margin: 5px;
    padding: 10px;
    background-color: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    cursor: pointer;
    transition: background-color 0.3s;
}
button:hover {
    background-color: rgba(255,255,255,0.4);
}
#thoughtBubble {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 20px;
    max-width: 300px;
    text-align: center;
    display: none;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="overlay">
    <div>Mental State: <span id="mentalState">Stable</span></div>
    <div>Anxiety Level: <span id="anxietyLevel">0</span></div>
    <div>Calmness Level: <span id="calmnessLevel">0</span></div>
    <div>Supernova Type: <span id="supernovaType">Type Ia</span></div>
</div>
<div id="controls">
    <button id="exploreMemories">Explore Memories</button>
    <button id="confrontFears">Confront Fears</button>
    <button id="meditate">Meditate</button>
</div>
<div id="thoughtBubble"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let scene, camera, renderer, terrain;
let anxietyLevel = 0.5;
let calmnessLevel = 0.5;
let blackHole, supernova, stars;
let cosmicRayDetector;
let gravityWells = [];
let timeDilationOrb;
let isOrbTouched = false;
let originalTimeScale = 1;
let nebulaCloud;
let clock = new THREE.Clock();

let supernovaTypes = ["Type Ia", "Type II", "Type Ib/c"];
let currentSupernovaTypeIndex = 0;

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({canvas: document.getElementById('gameCanvas'), antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);

    // Terrain
    const geometry = new THREE.PlaneGeometry(100, 100, 100, 100);
    const material = new THREE.MeshPhongMaterial({color: 0x444444, wireframe: true});
    terrain = new THREE.Mesh(geometry, material);
    terrain.rotation.x = -Math.PI / 2;
    scene.add(terrain);

    // Black Hole
    const blackHoleGeometry = new THREE.SphereGeometry(5, 32, 32);
    const blackHoleMaterial = new THREE.MeshBasicMaterial({color: 0x000000});
    blackHole = new THREE.Mesh(blackHoleGeometry, blackHoleMaterial);
    blackHole.position.set(0, 20, -30);
    scene.add(blackHole);

    // Accretion Disk
    const diskGeometry = new THREE.TorusGeometry(8, 2, 16, 100);
    const diskMaterial = new THREE.MeshPhongMaterial({color: 0xff6600, emissive: 0xff4400});
    const accretionDisk = new THREE.Mesh(diskGeometry, diskMaterial);
    accretionDisk.rotation.x = Math.PI / 2;
    blackHole.add(accretionDisk);

    // Supernova
    const supernovaGeometry = new THREE.SphereGeometry(3, 32, 32);
    const supernovaMaterial = new THREE.MeshBasicMaterial({
        color: 0xffff00,
        transparent: true,
        opacity: 0.8
    });
    supernova = new THREE.Mesh(supernovaGeometry, supernovaMaterial);
    supernova.position.set(30, 15, -20);
    scene.add(supernova);

    // Stars
    const starsGeometry = new THREE.BufferGeometry();
    const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.1});

    const starsVertices = [];
    for (let i = 0; i < 10000; i++) {
        const x = (Math.random() - 0.5) * 2000;
        const y = (Math.random() - 0.5) * 2000;
        const z = (Math.random() - 0.5) * 2000;
        starsVertices.push(x, y, z);
    }

    starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
    stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
    directionalLight.position.set(1, 1, 1);
    scene.add(directionalLight);

    camera.position.set(0, 30, 50);
    camera.lookAt(0, 0, 0);

    createCosmicRayDetector();
    createGravityWells();
    createTimeDilationOrb(0, 10, 0);
    createNebulaCloud();
}

function createCosmicRayDetector() {
    const geometry = new THREE.SphereGeometry(5, 32, 32);
    const material = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
    cosmicRayDetector = new THREE.Mesh(geometry, material);
    cosmicRayDetector.position.set(40, 20, -10);
    scene.add(cosmicRayDetector);
}

function createGravityWell(x, y, z, strength = 0.1) { 
    const geometry = new THREE.SphereGeometry(3, 32, 32); 
    const material = new THREE.MeshBasicMaterial({ color: 0x0000ff, transparent: true, opacity: 0.3 });
    const gravityWell = new THREE.Mesh(geometry, material);
    gravityWell.position.set(x, y, z);
    gravityWell.strength = strength; 
    scene.add(gravityWell);
    gravityWells.push(gravityWell);
}

function createGravityWells() {
    createGravityWell(10, 0, 0);
    createGravityWell(-10, 5, -3);
    createGravityWell(0, -5, 10);
}

function createTimeDilationOrb(x, y, z, radius = 5, timeScaleFactor = 0.5) { 
    const geometry = new THREE.SphereGeometry(radius, 32, 32);
    const material = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.4 });
    timeDilationOrb = new THREE.Mesh(geometry, material);
    timeDilationOrb.position.set(x, y, z);
    timeDilationOrb.timeScaleFactor = timeScaleFactor;
    scene.add(timeDilationOrb);
}

function createNebulaCloud() {
    const particleCount = 10000;
    const particles = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 100; 
        colors[i] = Math.random(); 
    }

    particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({ 
        size: 0.5, 
        vertexColors: true, 
        blending: THREE.AdditiveBlending, 
        transparent: true 
    });

    nebulaCloud = new THREE.Points(particles, material);
    scene.add(nebulaCloud);
}

function animate() {
    requestAnimationFrame(animate);

    const time = Date.now() * 0.001;
    const vertices = terrain.geometry.attributes.position.array;

    for (let i = 0; i < vertices.length; i += 3) {
        const x = vertices[i];
        const y = vertices[i + 1];
        vertices[i + 2] = Math.sin(x * 0.5 + time) * Math.cos(y * 0.5 + time) * anxietyLevel - calmnessLevel;
    }

    terrain.geometry.attributes.position.needsUpdate = true;

    // Rotate black hole
    blackHole.rotation.y += 0.01;

    // Pulsate supernova
    supernova.scale.setScalar(1 + Math.sin(time * 2) * 0.1);

    // Rotate stars
    stars.rotation.y += 0.0001;

    // Simulate gravity effect
    camera.position.y = 30 + Math.sin(time * 0.5) * 5;
    camera.lookAt(0, 0, 0);

    // Animate nebula cloud
    const colorAttribute = nebulaCloud.geometry.getAttribute('color');
    for (let i = 0; i < colorAttribute.count * 3; i += 3) {
        colorAttribute.array[i] += (Math.random() - 0.5) * 0.01; 
        colorAttribute.array[i + 1] += (Math.random() - 0.5) * 0.01;
        colorAttribute.array[i + 2] += (Math.random() - 0.5) * 0.01;

        colorAttribute.array[i] = Math.max(0, Math.min(1, colorAttribute.array[i]));
        colorAttribute.array[i + 1] = Math.max(0, Math.min(1, colorAttribute.array[i + 1]));
        colorAttribute.array[i + 2] = Math.max(0, Math.min(1, colorAttribute.array[i + 2]));
    }
    colorAttribute.needsUpdate = true;

    renderer.render(scene, camera);
}

function updateMentalState() {
    anxietyLevel = Math.sin(Date.now() * 0.001) * 0.5 + 0.5;
    calmnessLevel = Math.cos(Date.now() * 0.0015) * 0.5 + 0.5;

    document.getElementById('anxietyLevel').textContent = anxietyLevel.toFixed(2);
    document.getElementById('calmnessLevel').textContent = calmnessLevel.toFixed(2);

    const mentalStateElement = document.getElementById('mentalState');
    if (anxietyLevel > 0.7) {
        mentalStateElement.textContent = "Highly Anxious";
        mentalStateElement.style.color = "red";
    } else if (calmnessLevel > 0.7) {
        mentalStateElement.textContent = "Deeply Calm";
        mentalStateElement.style.color = "green";
    } else {
        mentalStateElement.textContent = "Stable";
        mentalStateElement.style.color = "white";
    }
}

function showThought(thought) {
    const thoughtBubble = document.getElementById('thoughtBubble');
    thoughtBubble.textContent = thought;
    thoughtBubble.style.display = 'block';
    setTimeout(() => {
        thoughtBubble.style.display = 'none';
    }, 5000);
}

function changeSupernovaType() {
    currentSupernovaTypeIndex = (currentSupernovaTypeIndex + 1) % supernovaTypes.length;
    document.getElementById('supernovaType').textContent = supernovaTypes[currentSupernovaTypeIndex];
    
    // Change supernova appearance based on type
    switch(supernovaTypes[currentSupernovaTypeIndex]) {
        case "Type Ia":
            supernova.material.color.setHex(0xffff00);
            supernova.scale.setScalar(1);
            break;
        case "Type II":
            supernova.material.color.setHex(0xff0000);
            supernova.scale.setScalar(1.5);
            break;
        case "Type Ib/c":
            supernova.material.color.setHex(0x00ffff);
            supernova.scale.setScalar(0.8);
            break;
    }
}

document.getElementById('exploreMemories').addEventListener('click', () => {
    anxietyLevel = Math.max(0, anxietyLevel - 0.1);
    calmnessLevel = Math.min(1, calmnessLevel + 0.1);
    showThought("Fragments of childhood laughter echo through the cosmic void...");
    camera.position.z -= 5;
});

document.getElementById('confrontFears').addEventListener('click', () => {
    anxietyLevel = Math.min(1, anxietyLevel + 0.2);
    calmnessLevel = Math.max(0, calmnessLevel - 0.2);
    showThought("The black hole's gravity pulls at the edges of your consciousness...");
    blackHole.scale.multiplyScalar(1.1);
});

document.getElementById('meditate').addEventListener('click', () => {
    anxietyLevel = Math.max(0, anxietyLevel - 0.2);
    calmnessLevel = Math.min(1, calmnessLevel + 0.2);
    showThought("The supernova's warmth washes over your thoughts, bringing clarity...");
    supernova.material.color.setHex(0x00ffff);
    setTimeout(() => supernova.material.color.setHex(0xffff00), 2000);
});

function onTouchStart(event) {
    event.preventDefault();

    const raycaster = new THREE.Raycaster();
    const touch = new THREE.Vector2();
    touch.x = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
    touch.y = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(touch, camera);

    const intersectsDetector = raycaster.intersectObject(cosmicRayDetector);
    if (intersectsDetector.length > 0) {
        changeSupernovaType();
    }

    const intersectsWells = raycaster.intersectObjects(gravityWells);
    if (intersectsWells.length > 0) {
        const touchedWell = intersectsWells[0].object;
        applyGravityEffect(touchedWell);
    }

    const intersectsOrb = raycaster.intersectObject(timeDilationOrb);
    if (intersectsOrb.length > 0) {
        isOrbTouched = true;
        originalTimeScale = clock.getDelta();
        clock.getDelta = () => originalTimeScale * timeDilationOrb.timeScaleFactor;
    }
}

function onTouchEnd(event) {
    isOrbTouched = false;
    clock.getDelta = () => originalTimeScale;
}

function applyGravityEffect(well) {
    const celestialBodies = [supernova, blackHole]; // Add more objects if needed
    for (const body of celestialBodies) {
        const distance = body.position.distanceTo(well.position);
        if (distance < 10) {
            const direction = well.position.clone().sub(body.position).normalize();
            const force = well.strength / (distance * distance);
            body.position.add(direction.multiplyScalar(force));
        }
    }
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

window.addEventListener('touchstart', onTouchStart, false);
window.addEventListener('touchend', onTouchEnd, false);

init();
animate();
setInterval(updateMentalState, 100);
</script>
</body>
</html>
