<html><head><base href="https://capycorgi.ai/" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corgi and Capybara Chat Simulator</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: Arial, sans-serif;
    }
    .container {
        background-image: url('https://file.garden/ZqyI0H6Iv3i3b0Sn/%D1%81apycorgi/background.webp');
        background-size: cover;
        background-position: center;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }
    .controls {
        background-color: rgba(255, 255, 255, 0.8);
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .controls input, .controls button {
        margin: 0 5px;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    .controls input:focus {
        outline: none;
        border-color: transparent;
    }
    #topic {
        flex-grow: 1;
    }
    #messageCount {
        width: 60px;
    }
    .controls button {
        cursor: pointer;
        background-color: #4CAF50;
        color: white;
        border: none;
        white-space: nowrap;
    }
    .controls button:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
    }
    #languageBtn, #ttsBtn {
        background-color: #008CBA;
        width: 50px;
    }
    .characters {
        flex: 1;
        display: flex;
        justify-content: space-around;
        align-items: flex-end;
        padding-bottom: 20px;
    }
    .character {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .character img {
        max-height: 40vh;
        max-width: 40vw;
        transition: transform 0.3s ease;
    }
    .character img:hover {
        transform: scale(1.1);
        cursor: pointer;
    }
    .character.speaking img {
        transform: scale(1);
        cursor: default;
        animation: wobble 0.5s ease-in-out infinite;
    }
    @keyframes wobble {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-5deg); }
        75% { transform: rotate(5deg); }
    }
    .dialog {
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        background-color: white;
        border-radius: 10px;
        padding: 10px;
        width: 300px;
        min-height: 60px;
        text-align: center;
        opacity: 0;
        transition: opacity 0.5s ease-in-out;
        margin-bottom: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .loading-dots {
        display: inline-block;
    }
    .loading-dots::after {
        content: '.';
        animation: dots 1.5s steps(5, end) infinite;
    }
    @keyframes dots {
        0%, 20% {
            color: rgba(0,0,0,0);
            text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);
        }
        40% {
            color: black;
            text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);
        }
        60% {
            text-shadow: .25em 0 0 black, .5em 0 0 rgba(0,0,0,0);
        }
        80%, 100% {
            text-shadow: .25em 0 0 black, .5em 0 0 black;
        }
    }
    @media (max-width: 768px) {
        .controls {
            flex-wrap: wrap;
        }
        .controls input, .controls button {
            flex-basis: calc(50% - 10px);
            margin: 5px;
        }
        #topic {
            flex-basis: 100%;
        }
        .characters {
            flex-direction: column;
            align-items: center;
        }
        .character {
            margin-bottom: 20px;
        }
        .character img {
            max-height: 30vh;
            max-width: 80vw;
        }
        .dialog {
            width: 80vw;
        }
    }
</style>
</head>
<body>
<div class="container">
    <div class="controls">
        <button id="languageBtn">EN</button>
        <button id="ttsBtn">🔊</button>
        <input type="text" id="topic" placeholder="Enter topic" autocomplete="off">
        <input type="number" id="messageCount" value="10" min="1" max="20">
        <button id="startBtn">Start Conversation</button>
        <button id="stopBtn" disabled>Stop Conversation</button>
    </div>
    <div class="characters">
        <div class="character" id="corgiCharacter">
            <div class="dialog" id="corgiDialog"></div>
            <img src="https://file.garden/ZqyI0H6Iv3i3b0Sn/%D1%81apycorgi/corgi.png" alt="Corgi">
        </div>
        <div class="character" id="capybaraCharacter">
            <div class="dialog" id="capybaraDialog"></div>
            <img src="https://file.garden/ZqyI0H6Iv3i3b0Sn/%D1%81apycorgi/%D1%81apybara.png" alt="Capybara">
        </div>
    </div>
</div>

<script>
    const topicInput = document.getElementById('topic');
    const messageCountInput = document.getElementById('messageCount');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const corgiDialog = document.getElementById('corgiDialog');
    const capybaraDialog = document.getElementById('capybaraDialog');
    const corgiCharacter = document.getElementById('corgiCharacter');
    const capybaraCharacter = document.getElementById('capybaraCharacter');
    const languageBtn = document.getElementById('languageBtn');
    const ttsBtn = document.getElementById('ttsBtn');

    let conversationInterval;
    let dialogMessages = [];
    let isSpeaking = false;
    let currentLanguage = localStorage.getItem('language') || 'EN';
    let isTtsEnabled = localStorage.getItem('ttsEnabled') !== 'false';

    function updateLanguage() {
        languageBtn.textContent = currentLanguage;
        localStorage.setItem('language', currentLanguage);
        updatePlaceholders();
    }

    function updateTtsButton() {
        ttsBtn.textContent = isTtsEnabled ? '🔊' : '🔇';
        localStorage.setItem('ttsEnabled', isTtsEnabled);
    }

    function updatePlaceholders() {
        if (currentLanguage === 'EN') {
            topicInput.placeholder = "Enter topic";
            startBtn.textContent = "Start Conversation";
            stopBtn.textContent = "Stop Conversation";
        } else {
            topicInput.placeholder = "Введите тему";
            startBtn.textContent = "Начать разговор";
            stopBtn.textContent = "Остановить разговор";
        }
    }

    languageBtn.addEventListener('click', () => {
        currentLanguage = currentLanguage === 'EN' ? 'RU' : 'EN';
        updateLanguage();
    });

    ttsBtn.addEventListener('click', () => {
        isTtsEnabled = !isTtsEnabled;
        updateTtsButton();
    });

    updateLanguage();
    updateTtsButton();

    startBtn.addEventListener('click', startConversation);
    stopBtn.addEventListener('click', stopConversation);
    topicInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            startConversation();
        }
    });

    corgiCharacter.addEventListener('click', () => getRandomPhrase('corgi'));
    capybaraCharacter.addEventListener('click', () => getRandomPhrase('capybara'));

    async function startConversation() {
        const topic = topicInput.value;
        const messageCount = messageCountInput.value;

        if (!topic || !messageCount) {
            alert(currentLanguage === 'EN' ? 'Please enter a topic and message count' : 'Пожалуйста, введите тему и количество сообщений');
            return;
        }

        disableControls(true);
        isSpeaking = true;
        showThinking();
        try {
            await getDialog(topic, messageCount);
            displayMessages();
        } catch (error) {
            console.error('Error starting conversation:', error);
            alert(currentLanguage === 'EN' ? 'Failed to start conversation. Please try again.' : 'Не удалось начать разговор. Пожалуйста, попробуйте снова.');
            disableControls(false);
            isSpeaking = false;
            hideThinking();
        }
    }

    function stopConversation() {
        clearInterval(conversationInterval);
        disableControls(false);
        isSpeaking = false;
        corgiDialog.style.opacity = 0;
        capybaraDialog.style.opacity = 0;
        corgiCharacter.classList.remove('speaking');
        capybaraCharacter.classList.remove('speaking');
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
        }
    }

    function disableControls(disabled) {
        topicInput.disabled = disabled;
        messageCountInput.disabled = disabled;
        startBtn.disabled = disabled;
        stopBtn.disabled = !disabled;
        languageBtn.disabled = disabled;
        ttsBtn.disabled = disabled;
    }

    function showThinking() {
        const thinkingText = currentLanguage === 'EN' ? 'Thinking' : 'Думаю';
        corgiDialog.innerHTML = `<span class="loading-dots">${thinkingText}</span>`;
        capybaraDialog.innerHTML = `<span class="loading-dots">${thinkingText}</span>`;
        corgiDialog.style.opacity = 1;
        capybaraDialog.style.opacity = 1;
    }

    function hideThinking() {
        corgiDialog.style.opacity = 0;
        capybaraDialog.style.opacity = 0;
    }

    async function getDialog(topic, messageCount) {
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    topic: topic,
                    count: messageCount,
                    language: currentLanguage
                }),
            });
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            dialogMessages = await response.json();
            hideThinking();
        } catch (error) {
            console.error('Error fetching dialog:', error);
            hideThinking();
            throw error;
        }
    }

    function displayMessages() {
        let index = 0;
        displayNextMessage();

        function displayNextMessage() {
            if (index >= dialogMessages.length) {
                disableControls(false);
                isSpeaking = false;
                corgiCharacter.classList.remove('speaking');
                capybaraCharacter.classList.remove('speaking');
                return;
            }

            const message = dialogMessages[index];
            const dialog = message.character === 'corgi' ? corgiDialog : capybaraDialog;
            const character = message.character === 'corgi' ? corgiCharacter : capybaraCharacter;
            dialog.textContent = message.text;
            dialog.style.opacity = 1;
            character.classList.add('speaking');

            if (isTtsEnabled) {
                speakText(message.text, () => {
                    setTimeout(() => {
                        dialog.style.opacity = 0;
                        character.classList.remove('speaking');
                        index++;
                        displayNextMessage();
                    }, 500);
                });
            } else {
                const readingTime = calculateReadingTime(message.text);
                setTimeout(() => {
                    dialog.style.opacity = 0;
                    character.classList.remove('speaking');
                    setTimeout(() => {
                        index++;
                        displayNextMessage();
                    }, 500);
                }, readingTime);
            }
        }
    }

    function calculateReadingTime(text) {
        const wordsPerMinute = 200;
        const words = text.split(/\s+/).length;
        const minutes = words / wordsPerMinute;
        return Math.max(2000, minutes * 60 * 1000); // Minimum 2 seconds, otherwise calculated reading time
    }

    function speakText(text, onEndCallback) {
        if ('speechSynthesis' in window && isTtsEnabled) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = currentLanguage === 'EN' ? 'en-US' : 'ru-RU';
            utterance.onend = onEndCallback;
            window.speechSynthesis.speak(utterance);
        } else {
            onEndCallback();
        }
    }

    async function getRandomPhrase(character) {
        if (isSpeaking) return;

        isSpeaking = true;
        const dialog = character === 'corgi' ? corgiDialog : capybaraDialog;
        const characterElement = character === 'corgi' ? corgiCharacter : capybaraCharacter;

        // Show loading animation without speaking animation
        const thinkingText = currentLanguage === 'EN' ? 'Thinking' : 'Думаю';
        dialog.innerHTML = `<span class="loading-dots">${thinkingText}</span>`;
        dialog.style.opacity = 1;

        try {
            const response = await fetch('/api/get_random_phrase', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    language: currentLanguage,
                    character: character
                }),
            });
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            const phrase = await response.text();

            dialog.textContent = phrase;
            dialog.style.opacity = 1;
            characterElement.classList.add('speaking');

            if (isTtsEnabled) {
                speakText(phrase, () => {
                    dialog.style.opacity = 0;
                    isSpeaking = false;
                    characterElement.classList.remove('speaking');
                });
            } else {
                const readingTime = calculateReadingTime(phrase);
                setTimeout(() => {
                    dialog.style.opacity = 0;
                    isSpeaking = false;
                    characterElement.classList.remove('speaking');
                }, readingTime);
            }
        } catch (error) {
            console.error('Error fetching random phrase:', error);
            dialog.style.opacity = 0;
            isSpeaking = false;
        }
    }
</script>
</body>
</html>
