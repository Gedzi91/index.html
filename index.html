<html>
<head>
<base href="simulator://fractalgates.umbra">
<title>The Fractal Gates</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
<style>
body {
  margin: 0;
  padding: 0;
  background: #000;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.gateway {
  position: relative;
  width: 150px;
  height: 150px;
  margin: 20px;
  cursor: pointer;
  transition: transform 0.3s;
  filter: drop-shadow(0 0 10px currentColor);
  transform-origin: center;
  animation: gateFloat 4s ease-in-out infinite;
}

.gateway:hover {
  transform: scale(1.1);
  animation: gateActive 1s ease-in-out infinite;
  filter: drop-shadow(0 0 20px currentColor) brightness(1.5);
}

.gateway:active {
  transform: scale(0.95);
  filter: brightness(1.3) drop-shadow(0 0 30px currentColor);
}

@keyframes gateFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-10px) scale(1.05); }
}

@keyframes gateActive {
  0%, 100% { transform: scale(1.1) rotate(0deg); }
  50% { transform: scale(1.15) rotate(5deg); }
}

.gateway svg {
  width: 100%;
  height: 100%;
}

.gateway svg polygon, .gateway svg circle, .gateway svg path {
  transition: stroke-width 0.3s, stroke 0.3s, transform 0.3s;
}

.gateway:hover svg polygon {
  animation: morphShape 2s infinite ease-in-out;
}

@keyframes morphShape {
  0% { points: 50,5 95,50 50,95 5,50; }
  50% { points: 25,25 75,25 75,75 25,75; }
  100% { points: 50,5 95,50 50,95 5,50; }
}

.gateway:hover svg circle {
  animation: pulseGlow 1s infinite ease-in-out;
}

@keyframes pulseGlow {
  0% { filter: drop-shadow(0 0 5px currentColor); }
  50% { filter: drop-shadow(0 0 15px currentColor); }
  100% { filter: drop-shadow(0 0 5px currentColor); }
}

.gateway-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 800px;
}

.fractal-world {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  display: none;
  z-index: 100;
}

.back-button, .submit-answer, .dive-button {
  position: fixed;
  padding: 10px 20px;
  background: rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  color: white;
  border-radius: 5px;
  cursor: pointer;
  z-index: 101;
  position: relative;
  overflow: hidden;
}

.dive-button {
  bottom: 20px;
  right: 20px;
  display: none;
}

.back-button {
  top: 20px;
  left: 20px;
  display: none;
}

.back-button:hover, .submit-answer:hover, .dive-button:hover {
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
  transform: translateY(-2px);
}

.depth-indicator {
  position: fixed;
  top: 20px;
  right: 20px;
  color: white;
  font-size: 1.2em;
  z-index: 101;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 5px;
  display: none;
}

.encounter {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.8);
  padding: 20px;
  border-radius: 10px;
  color: white;
  text-align: center;
  z-index: 102;
  display: none;
  max-width: 400px;
}

.encounter-options button {
  margin: 10px;
  padding: 8px 16px;
  background: rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  color: white;
  border-radius: 5px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.encounter-options button:hover {
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
  transform: translateY(-2px);
}

.riddle-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  padding: 20px;
  border-radius: 10px;
  color: white;
  text-align: center;
  z-index: 101;
  display: none;
}

.riddle-input {
  margin: 10px 0;
  padding: 5px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  border-radius: 3px;
}

.submit-answer {
  margin-top: 10px;
}

.submit-answer:hover {
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
  transform: translateY(-2px);
}

.insight-message {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 15px;
  border-radius: 8px;
  z-index: 103;
  text-align: center;
  max-width: 400px;
  display: none;
}

.achievements-panel {
  position: fixed;
  top: 50%;
  right: -300px;
  transform: translateY(-50%);
  width: 280px;
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 20px;
  border-radius: 10px 0 0 10px;
  transition: right 0.3s;
  z-index: 103;
}

.achievements-panel.show {
  right: 0;
}

.achievement {
  margin: 10px 0;
  padding: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 5px;
}

.achievement.unlocked {
  background: rgba(0,255,0,0.2);
}

.achievement-toggle {
  position: fixed;
  top: 50%;
  right: 0;
  transform: translateY(-50%) rotate(-90deg);
  transform-origin: right;
  background: rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  color: white;
  padding: 10px;
  border-radius: 5px 5px 0 0;
  cursor: pointer;
  z-index: 104;
}

.achievement-toggle:hover {
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
  transform: translateY(-2px);
}

.experimental-message {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.9);
  color: #0ff;
  padding: 20px;
  border-radius: 10px;
  z-index: 105;
  text-align: center;
  display: none;
  text-shadow: 0 0 10px #0ff;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 20px #0ff; }
  50% { box-shadow: 0 0 40px #0ff; }
  100% { box-shadow: 0 0 20px #0ff; }
}

.reality-glitch {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  mix-blend-mode: difference;
  opacity: 0;
  z-index: 102;
  background: linear-gradient(45deg, #ff00ff, #00ffff);
  animation: glitch-fade 2s ease-in-out infinite;
}

@keyframes glitch-fade {
  0%, 100% { opacity: 0; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(1.1); }
}

.artifacts-panel {
  position: fixed;
  top: 50%;
  left: -300px;
  transform: translateY(-50%);
  width: 280px;
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 20px;
  border-radius: 0 10px 10px 0;
  transition: left 0.3s;
  z-index: 103;
}

.artifacts-panel.show {
  left: 0;
}

.artifact {
  margin: 10px 0;
  padding: 15px;
  background: rgba(255,255,255,0.1);
  border-radius: 5px;
  position: relative;
  overflow: hidden;
}

.artifact.resonating {
  animation: resonance 2s infinite;
}

.artifact-icon {
  width: 30px;
  height: 30px;
  margin-right: 10px;
  display: inline-block;
  vertical-align: middle;
}

.artifacts-toggle {
  position: fixed;
  top: 40%;
  left: 0;
  transform: rotate(90deg);
  transform-origin: left bottom;
  background: rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  color: white;
  padding: 10px;
  border-radius: 5px 5px 0 0;
  cursor: pointer;
  z-index: 104;
}

.artifacts-toggle:hover {
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
  transform: translateY(-2px);
}

@keyframes resonance {
  0% { box-shadow: 0 0 10px currentColor; }
  50% { box-shadow: 0 0 25px currentColor; }
  100% { box-shadow: 0 0 10px currentColor; }
}

.artifact-vault {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80%;
  max-width: 800px;
  height: 80vh;
  background: rgba(0,0,0,0.95);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 15px;
  padding: 20px;
  color: white;
  display: none;
  z-index: 200;
  overflow-y: auto;
}

.vault-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.vault-close {
  background: none;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
}

.vault-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.vault-item {
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 15px;
  transition: transform 0.3s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.vault-item:hover {
  transform: scale(1.05);
}

.vault-item-details {
  margin-top: 10px;
  font-size: 0.9em;
  opacity: 0.8;
}

.vault-stats {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.vault-stat {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 5px;
  text-align: center;
}

.analyze-button {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  z-index: 101;
  display: none;
  position: relative;
  overflow: hidden;
}

.analyze-button:hover {
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
  transform: translateY(-2px);
}

.codex-panel {
  position: fixed;
  top: 50%;
  right: -400px;
  transform: translateY(-50%);
  width: 380px;
  background: rgba(0,0,0,0.9);
  color: white;
  padding: 20px;
  border-radius: 10px 0 0 10px;
  transition: right 0.3s;
  z-index: 103;
  max-height: 80vh;
  overflow-y: auto;
}

.codex-panel.show {
  right: 0;
}

.codex-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.codex-tab {
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 5px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.codex-tab.active {
  background: rgba(255,255,255,0.3);
}

.codex-section {
  display: none;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 5px;
}

.codex-section.active {
  display: block;
}

.codex-entry {
  margin: 15px 0;
  padding: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 5px;
  font-size: 0.9em;
}

.codex-entry-title {
  color: #0ff;
  margin-bottom: 5px;
}

.codex-entry-meta {
  font-size: 0.8em;
  color: rgba(255,255,255,0.6);
  margin-top: 5px;
}

.codex-toggle {
  position: fixed;
  top: 60%;
  right: 0;
  transform: rotate(-90deg);
  transform-origin: right;
  background: rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  color: white;
  padding: 10px;
  border-radius: 5px 5px 0 0;
  cursor: pointer;
  z-index: 104;
}

.codex-toggle:hover {
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
  transform: translateY(-2px);
}

.context-ui {
  position: fixed;
  background: rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  padding: 15px;
  color: white;
  transition: all 0.3s ease;
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
}

.context-ui::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1));
  pointer-events: none;
}

.context-menu {
  position: fixed;
  display: none;
  z-index: 1000;
}

.context-menu.show {
  display: block;
  animation: fadeScale 0.3s ease;
}

@keyframes fadeScale {
  from {
    opacity: 0;
    transform: scale(0.9);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.context-menu-item {
  padding: 8px 15px;
  cursor: pointer;
  transition: background 0.2s;
  border-radius: 5px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.context-menu-item:hover {
  background: rgba(255, 255, 255, 0.1);
}

.context-menu-item svg {
  width: 20px;
  height: 20px;
}

.progress-path {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 50;
}

.progress-indicator {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 200px;
  height: 200px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 51;
}

.progress-indicator.show {
  opacity: 1;
}

@keyframes symbolRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.evolving-symbol {
  position: fixed;
  width: 40px;
  height: 40px;
  pointer-events: none;
  animation: symbolRotate 4s linear infinite;
  z-index: 52;
  opacity: 0;
  transition: opacity 0.3s;
}

.evolving-symbol.show {
  opacity: 0.8;
}

.resonance-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  mix-blend-mode: overlay;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 49;
  background: radial-gradient(circle at center, transparent, rgba(255,255,255,0.1));
}

.resonance-overlay.active {
  opacity: 1;
}

button:hover::before, .codex-tab:hover::before, .vault-item:hover::before, .artifact:hover::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 300%;
  height: 300%;
  background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 50%);
  transform: translate(-50%, -50%);
  pointer-events: none;
}

button:active::after, .codex-tab:active::after, .vault-item:active::after, .artifact:active::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100px;
  height: 100px;
  background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 50%);
  transform: translate(-50%, -50%) scale(0);
  pointer-events: none;
  animation: ripple 0.5s linear;
}

@keyframes ripple {
  to {
    transform: translate(-50%, -50%) scale(4);
    opacity: 0;
  }
}

.fade-in {
  animation: fadeIn 0.5s ease-in;
}

.fade-out {
  animation: fadeOut 0.5s ease-out;
}

.zoom-in {
  animation: zoomIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.zoom-out {
  animation: zoomOut 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.rotate-in {
  animation: rotateIn 0.5s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

@keyframes zoomIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes zoomOut {
  from { transform: scale(1); opacity: 1; }
  to { transform: scale(1.5); opacity: 0; }
}

@keyframes rotateIn {
  from { transform: rotate(-180deg) scale(0.3); opacity: 0; }
  to { transform: rotate(0) scale(1); opacity: 1; }
}

.loading-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #fff;
  font-family: Arial, sans-serif;
}

.loading-title {
  font-size: 3em;
  margin-bottom: 30px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 1s ease forwards;
}

.loading-progress {
  width: 300px;
  height: 2px;
  background: rgba(255,255,255,0.1);
  position: relative;
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00ffff, #ff00ff);
  transition: width 0.3s ease;
}

.loading-fractal {
  width: 100px;
  height: 100px;
  margin-bottom: 30px;
  opacity: 0;
  transform: scale(0.8);
  animation: fadeInScale 1s ease forwards;
}

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeInScale {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}
</style>
</head>
<body>
<div class="loading-screen">
  <svg class="loading-fractal" viewBox="0 0 100 100">
    <polygon points="50,5 95,50 50,95 5,50" fill="none" stroke="white" stroke-width="2">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 50 50" to="360 50 50" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <circle cx="50" cy="50" r="30" fill="none" stroke="white" stroke-width="1.5" opacity="0.5">
      <animate attributeName="r" values="30;35;30" dur="2s" repeatCount="indefinite"/>
    </circle>
  </svg>
  <h1 class="loading-title">The Fractal Gates</h1>
  <div class="loading-progress">
    <div class="progress-bar"></div>
  </div>
</div>
<div class="gateway-container"></div>
<button class="back-button">Return</button>
<button class="dive-button">Dive Deeper</button>
<div class="depth-indicator">Depth: 1</div>
<div class="riddle-container">
  <div class="riddle-text"></div>
  <input type="text" class="riddle-input" placeholder="Your answer...">
  <button class="submit-answer">Submit</button>
</div>
<div class="encounter">
  <div class="encounter-text"></div>
  <div class="encounter-options"></div>
</div>
<div class="insight-message"></div>
<div class="achievements-panel">
  <h3>Achievements</h3>
  <div class="achievements-list"></div>
</div>
<div class="achievement-toggle">Achievements</div>
<div class="experimental-message"></div>
<div class="artifacts-panel">
  <h3>Fractal Artifacts</h3>
  <div class="artifacts-list"></div>
</div>
<div class="artifacts-toggle">Artifacts</div>
<div class="artifact-vault">
  <div class="vault-header">
    <h2>Personal Artifact Vault</h2>
    <button class="vault-close">&#xd7;</button>
  </div>
  <div class="vault-stats">
    <div class="vault-stat">
      <div>Total Artifacts</div>
      <div class="total-count">0</div>
    </div>
    <div class="vault-stat">
      <div>Resonating</div>
      <div class="resonating-count">0</div>
    </div>
    <div class="vault-stat">
      <div>Power Level</div>
      <div class="power-level">0</div>
    </div>
  </div>
  <div class="vault-grid"></div>
</div>
<button class="analyze-button">Analyze Artifacts</button>
<div class="codex-panel">
  <h3>Fractal Knowledge Codex</h3>
  <div class="codex-tabs">
    <button class="codex-tab active" data-tab="writings">Writings</button>
    <button class="codex-tab" data-tab="logs">User Logs</button>

    this.verbs = ['transcends', 'reflects', 'embodies', 'manifests', 'reveals', 'conceals', 'transforms'];
    this.insights = ['understanding', 'perception', 'knowledge', 'wisdom', 'awareness', 'insight', 'revelation'];
  }
  generatePhilosophy(userProgress) {
    const primaryConcept = this.concepts[Math.floor(Math.random() * this.concepts.length)];
    const secondaryConcept = this.concepts[Math.floor(Math.random() * this.concepts.length)];
    const verb = this.verbs[Math.floor(Math.random() * this.verbs.length)];
    const insight = this.insights[Math.floor(Math.random() * this.insights.length)];
    const templates = [`The ${primaryConcept} of fractal realms ${verb} our ${insight} of ${secondaryConcept}.`, `Through ${primaryConcept}, we discover that ${secondaryConcept} ${verb} the nature of ${insight}.`, `The deeper truth of ${primaryConcept} lies in how it ${verb} the ${secondaryConcept} within our ${insight}.`];
    let philosophy = templates[Math.floor(Math.random() * templates.length)];
    if (userProgress.decisions.seekWisdom > 3) {
      philosophy += ` The seeker of wisdom finds that truth multiplies like fractals.`;
    }
    if (userProgress.decisions.exploreReality > 3) {
      philosophy += ` Reality itself is but one branch of infinite possibility.`;
    }
    return philosophy;
  }
}
window.philosophySystem = new PhilosophyGenerator();</script>
