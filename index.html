<html><head><base href="https://animetinder.com/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeTinder - Find Your Anime Soulmate!</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  .app {
    width: 340px;
    height: 600px;
    background-color: white;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    overflow: hidden;
    position: relative;
  }
  .header {
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header-icon {
    font-size: 24px;
    cursor: pointer;
  }
  .card {
    width: 300px;
    height: 400px;
    background-size: cover;
    background-position: center;
    position: absolute;
    top: 100px;
    left: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: transform 0.3s ease;
  }
  .card:hover {
    transform: scale(1.05);
  }
  .card-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    color: white;
    padding: 20px;
    border-bottom-left-radius: 10px;
    border-bottom-right-radius: 10px;
  }
  .card-info h2 {
    font-size: 22px;
    margin-bottom: 5px;
  }
  .card-info p {
    font-size: 14px;
    line-height: 1.4;
    margin-bottom: 5px;
    cursor: pointer;
  }
  .card-info .anime-info {
    font-size: 12px;
    font-style: italic;
    color: #ffd700;
  }
  .buttons {
    position: absolute;
    bottom: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 20px;
  }
  .btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: none;
    font-size: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
  .btn:hover {
    transform: scale(1.1);
  }
  .btn-dislike {
    background-color: #ff6b6b;
    color: white;
  }
  .btn-like {
    background-color: #4ecdc4;
    color: white;
  }
  .loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .loading:after {
    content: " ";
    display: block;
    width: 64px;
    height: 64px;
    margin: 8px;
    border-radius: 50%;
    border: 6px solid #ff758c;
    border-color: #ff758c transparent #ff758c transparent;
    animation: loading 1.2s linear infinite;
  }
  .modal {
    display: none;
    position: fixed;
    z-index: 1;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background-color: rgba(0,0,0,0.4);
  }
  .modal-content {
    background-color: #fefefe;
    margin: 15% auto;
    padding: 20px;
    border: 1px solid #888;
    width: 80%;
    max-width: 600px;
    border-radius: 10px;
  }
  .close {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
  }
  .close:hover,
  .close:focus {
    color: black;
    text-decoration: none;
    cursor: pointer;
  }
  .liked-characters {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: white;
    overflow-y: auto;
    padding: 20px;
  }
  .liked-character {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 10px;
    background-color: #f0f0f0;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }
  .liked-character:hover {
    background-color: #e0e0e0;
  }
  .liked-character img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    margin-right: 10px;
    object-fit: cover;
  }
  .liked-character-info {
    flex-grow: 1;
  }
  .liked-character-name {
    font-weight: bold;
  }
  .liked-character-anime {
    font-size: 12px;
    color: #666;
  }
  .back-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    background-color: #ff758c;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s ease;
  }
  .back-btn:hover {
    background-color: #ff5c7c;
  }
  @keyframes loading {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(360deg);
    }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <span class="header-icon" onclick="toggleLikedCharacters()">&#9829;</span>
      AnimeTinder
      <span class="header-icon" style="visibility: hidden;">&#9829;</span>
    </div>
    <div id="card" class="card">
      <div class="card-info">
        <h2 id="characterName">Loading...</h2>
        <p id="characterInfo" onclick="showFullInfo()">Please wait...</p>
        <p id="animeInfo" class="anime-info"></p>
      </div>
    </div>
    <div class="buttons">
      <button class="btn btn-dislike" onclick="swipe('left')">❌</button>
      <button class="btn btn-like" onclick="swipe('right')">❤️</button>
    </div>
    <div id="loading" class="loading"></div>
    <div id="likedCharacters" class="liked-characters">
      <button class="back-btn" onclick="toggleLikedCharacters()">Back</button>
    </div>
  </div>

  <div id="infoModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2 id="modalCharacterName"></h2>
      <p id="modalCharacterInfo"></p>
      <p id="modalAnimeInfo"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    const card = document.getElementById('card');
    const characterName = document.getElementById('characterName');
    const characterInfo = document.getElementById('characterInfo');
    const animeInfo = document.getElementById('animeInfo');
    const loading = document.getElementById('loading');
    const modal = document.getElementById('infoModal');
    const modalCharacterName = document.getElementById('modalCharacterName');
    const modalCharacterInfo = document.getElementById('modalCharacterInfo');
    const modalAnimeInfo = document.getElementById('modalAnimeInfo');
    const likedCharactersContainer = document.getElementById('likedCharacters');
    let currentCharacter = null;
    let likedCharacters = [];

    async function getRandomAnimeCharacter() {
      try {
        const response = await axios.get('https://api.jikan.moe/v4/random/characters');
        return response.data.data;
      } catch (error) {
        console.error('Error fetching anime character:', error);
        return null;
      }
    }

    async function getAnimeInfo(animeId) {
      try {
        const response = await axios.get(`https://api.jikan.moe/v4/anime/${animeId}`);
        return response.data.data;
      } catch (error) {
        console.error('Error fetching anime info:', error);
        return null;
      }
    }

    async function loadNewCharacter() {
      loading.style.display = 'block';
      card.style.opacity = '0';
      currentCharacter = await getRandomAnimeCharacter();
      if (currentCharacter) {
        const img = new Image();
        img.onload = async () => {
          card.style.backgroundImage = `url(${currentCharacter.images.jpg.image_url})`;
          characterName.textContent = currentCharacter.name;
          characterInfo.textContent = currentCharacter.about ? currentCharacter.about.slice(0, 80) + '...' : 'No information available';
          
          if (currentCharacter.anime && currentCharacter.anime.length > 0) {
            const animeId = currentCharacter.anime[0].mal_id;
            const animeDetails = await getAnimeInfo(animeId);
            if (animeDetails) {
              animeInfo.textContent = `From: ${animeDetails.title} (${animeDetails.type})`;
            } else {
              animeInfo.textContent = `From: ${currentCharacter.anime[0].name}`;
            }
          } else if (currentCharacter.manga && currentCharacter.manga.length > 0) {
            animeInfo.textContent = `From: ${currentCharacter.manga[0].name} (Manga)`;
          } else {
            animeInfo.textContent = 'Origin unknown';
          }
          
          loading.style.display = 'none';
          card.style.opacity = '1';
        };
        img.src = currentCharacter.images.jpg.image_url;
      } else {
        characterName.textContent = 'Error loading character';
        characterInfo.textContent = 'Please try again later';
        animeInfo.textContent = '';
        loading.style.display = 'none';
        card.style.opacity = '1';
      }
    }

    function swipe(direction) {
      const swipeAnimation = [
        { transform: 'translateX(0) rotate(0) scale(1)', opacity: 1 },
        { transform: direction === 'left' ? 'translateX(-100%) rotate(-30deg) scale(0.8)' : 'translateX(100%) rotate(30deg) scale(0.8)', opacity: 0 }
      ];
      
      card.animate(swipeAnimation, {
        duration: 500,
        easing: 'ease-out'
      }).onfinish = () => {
        if (direction === 'right') {
          likedCharacters.push(currentCharacter);
          updateLikedCharacters();
        }
        loadNewCharacter();
      };
    }

    function showFullInfo(character = currentCharacter) {
      modalCharacterName.textContent = character.name;
      modalCharacterInfo.textContent = character.about || 'No information available';
      modalAnimeInfo.textContent = character.anime && character.anime.length > 0 
        ? `From: ${character.anime[0].name}` 
        : (character.manga && character.manga.length > 0 
          ? `From: ${character.manga[0].name} (Manga)` 
          : 'Origin unknown');
      modal.style.display = 'block';
    }

    function closeModal() {
      modal.style.display = 'none';
    }

    function toggleLikedCharacters() {
      if (likedCharactersContainer.style.display === 'block') {
        likedCharactersContainer.style.display = 'none';
        card.style.display = 'block';
      } else {
        likedCharactersContainer.style.display = 'block';
        card.style.display = 'none';
        updateLikedCharacters();
      }
    }

    function updateLikedCharacters() {
      const likedCharactersContent = likedCharacters.map((character, index) => `
        <div class="liked-character" onclick="showFullInfo(likedCharacters[${index}])">
          <img src="${character.images.jpg.image_url}" alt="${character.name}">
          <div class="liked-character-info">
            <div class="liked-character-name">${character.name}</div>
            <div class="liked-character-anime">${character.anime && character.anime.length > 0 ? character.anime[0].name : 'Unknown anime'}</div>
          </div>
        </div>
      `).join('');

      likedCharactersContainer.innerHTML = `
        <button class="back-btn" onclick="toggleLikedCharacters()">Back</button>
        ${likedCharactersContent}
      `;
    }

    window.onclick = function(event) {
      if (event.target == modal) {
        closeModal();
      }
    }

    loadNewCharacter();
  </script>
</body>
</html>
