<html><head><base href="https://example.com/holographic-simulation/"><title>DreamTech AI - Holographic Particle Interaction</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Arial', sans-serif;
  background-color: #000;
  color: #fff;
}

#simulationCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  background-color: rgba(0, 0, 0, 0.7);
  padding: 10px;
  border-radius: 10px;
  z-index: 10;
}

.control-btn {
  background-color: #3498db;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 5px;
  cursor: pointer;
  transition: background-color 0.3s;
}

.control-btn:hover {
  background-color: #2980b9;
}

.stats {
  position: fixed;
  top: 20px;
  left: 20px;
  background-color: rgba(0, 0, 0, 0.7);
  padding: 10px;
  border-radius: 5px;
  font-family: 'Courier New', monospace;
}

.interaction-guide {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background-color: rgba(0, 0, 0, 0.8);
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}

.interaction-guide.visible {
  opacity: 1;
}
</style>
</head>
<body>
  <canvas id="simulationCanvas"></canvas>
  
  <div class="controls">
    <button class="control-btn" id="patternBtn">Change Pattern</button>
    <button class="control-btn" id="colorBtn">Change Color</button>
    <button class="control-btn" id="resetBtn">Reset</button>
  </div>
  
  <div class="stats" id="statsDisplay"></div>
  
  <div class="interaction-guide" id="interactionGuide">
    <h2>Interaction Guide</h2>
    <p>Click and drag to interact with particles</p>
    <p>Scroll to zoom in/out</p>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Three.js setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('simulationCanvas') });
renderer.setSize(window.innerWidth, window.innerHeight);

// Particle system
const particleCount = 50000;
const particles = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount * 3; i += 3) {
  positions[i] = (Math.random() - 0.5) * 10;
  positions[i + 1] = (Math.random() - 0.5) * 10;
  positions[i + 2] = (Math.random() - 0.5) * 10;
  
  colors[i] = Math.random();
  colors[i + 1] = Math.random();
  colors[i + 2] = Math.random();
}

particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const particleMaterial = new THREE.PointsMaterial({
  size: 0.05,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  transparent: true
});

const particleSystem = new THREE.Points(particles, particleMaterial);
scene.add(particleSystem);

camera.position.z = 5;

// Animation variables
let time = 0;
let pattern = 'spiral';
const patterns = ['spiral', 'wave', 'explosion', 'implosion'];
let colorScheme = 'rainbow';
const colorSchemes = ['rainbow', 'fire', 'ocean', 'forest'];

function animate() {
  requestAnimationFrame(animate);
  
  time += 0.01;
  
  const positions = particles.attributes.position.array;
  const colors = particles.attributes.color.array;
  
  for (let i = 0; i < particleCount; i++) {
    const i3 = i * 3;
    
    // Update positions based on pattern
    switch (pattern) {
      case 'spiral':
        positions[i3] = Math.sin(time + i * 0.1) * (i / particleCount) * 5;
        positions[i3 + 1] = Math.cos(time + i * 0.1) * (i / particleCount) * 5;
        positions[i3 + 2] = (i / particleCount - 0.5) * 10;
        break;
      case 'wave':
        positions[i3] = (i % 100) / 10 - 5;
        positions[i3 + 1] = Math.sin(time + i * 0.1) * 2;
        positions[i3 + 2] = (Math.floor(i / 100) / 50 - 5) * 2;
        break;
      case 'explosion':
        const radius = (i / particleCount) * 5;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;
        positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
        positions[i3 + 2] = radius * Math.cos(phi);
        break;
      case 'implosion':
        const angle = i / particleCount * Math.PI * 2;
        const radius2 = 5 - (time % 5);
        positions[i3] = Math.cos(angle) * radius2;
        positions[i3 + 1] = Math.sin(angle) * radius2;
        positions[i3 + 2] = (Math.random() - 0.5) * 10;
        break;
    }
    
    // Update colors based on color scheme
    switch (colorScheme) {
      case 'rainbow':
        colors[i3] = Math.sin(time * 0.5 + i * 0.1) * 0.5 + 0.5;
        colors[i3 + 1] = Math.sin(time * 0.5 + i * 0.1 + 2) * 0.5 + 0.5;
        colors[i3 + 2] = Math.sin(time * 0.5 + i * 0.1 + 4) * 0.5 + 0.5;
        break;
      case 'fire':
        colors[i3] = Math.random() * 0.5 + 0.5;
        colors[i3 + 1] = Math.random() * 0.3;
        colors[i3 + 2] = 0;
        break;
      case 'ocean':
        colors[i3] = 0;
        colors[i3 + 1] = Math.random() * 0.5;
        colors[i3 + 2] = Math.random() * 0.5 + 0.5;
        break;
      case 'forest':
        colors[i3] = 0;
        colors[i3 + 1] = Math.random() * 0.5 + 0.5;
        colors[i3 + 2] = Math.random() * 0.3;
        break;
    }
  }
  
  particles.attributes.position.needsUpdate = true;
  particles.attributes.color.needsUpdate = true;
  
  particleSystem.rotation.y += 0.001;
  
  renderer.render(scene, camera);
  updateStats();
}

animate();

// Event listeners
document.getElementById('patternBtn').addEventListener('click', () => {
  const currentIndex = patterns.indexOf(pattern);
  pattern = patterns[(currentIndex + 1) % patterns.length];
});

document.getElementById('colorBtn').addEventListener('click', () => {
  const currentIndex = colorSchemes.indexOf(colorScheme);
  colorScheme = colorSchemes[(currentIndex + 1) % colorSchemes.length];
});

document.getElementById('resetBtn').addEventListener('click', () => {
  pattern = 'spiral';
  colorScheme = 'rainbow';
  camera.position.z = 5;
});

// Stats display
function updateStats() {
  const statsDisplay = document.getElementById('statsDisplay');
  statsDisplay.innerHTML = `
    Pattern: ${pattern}<br>
    Color Scheme: ${colorScheme}<br>
    Particles: ${particleCount}
  `;
}

// Interaction
let isMouseDown = false;
let previousMousePosition = {
    x: 0,
    y: 0
};

renderer.domElement.addEventListener('mousedown', (e) => {
    isMouseDown = true;
});

renderer.domElement.addEventListener('mouseup', (e) => {
    isMouseDown = false;
});

renderer.domElement.addEventListener('mousemove', (e) => {
    if (isMouseDown) {
        const deltaMove = {
            x: e.offsetX - previousMousePosition.x,
            y: e.offsetY - previousMousePosition.y
        };

        particleSystem.rotation.y += deltaMove.x * 0.01;
        particleSystem.rotation.x += deltaMove.y * 0.01;
    }

    previousMousePosition = {
        x: e.offsetX,
        y: e.offsetY
    };
});

renderer.domElement.addEventListener('wheel', (e) => {
    camera.position.z += e.deltaY * 0.01;
    camera.position.z = Math.max(1, Math.min(camera.position.z, 10));
});

// Show interaction guide
const interactionGuide = document.getElementById('interactionGuide');
interactionGuide.classList.add('visible');
setTimeout(() => {
    interactionGuide.classList.remove('visible');
}, 5000);

// Responsive design
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body></html>
