<html><head><base href=""><title>Random Story Card Game</title><style>
    @font-face {
        font-family: 'Comic Sans MS';

    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: repeating-conic-gradient(
            hsla(244, 53%, 88%, 0.8) 0% 25%,

        min-height: 100vh;
        margin: 0;
        padding: 0;
        overflow: hidden;

    @keyframes moveBackground {
        0% {

        }
        100% {
            background-position: 100px 100px;
        }
    }

        font-family: 'Comic Sans MS', cursive, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;

        margin: 0;
        padding: 20px;
        position: relative;
        overflow-x: hidden;
        box-sizing: border-box;

    .logo {

        height: auto;
        margin-bottom: 20px;
    }

    h1 {

        margin-bottom: 30px;
        font-size: 2.5em;

    .cards-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        margin: 20px 0;
        min-height: 300px;
        padding: 20px;
        background: white;
        border-radius: 15px;
        position: relative;
    }

    .cards-container > div:not(.watermark):not(.publish-button) {

        gap: 20px;
        justify-content: center;
    }

    .publish-button {
        margin-top: 20px;
    }

    .watermark {
        position: absolute;
        bottom: 10px;
        right: 10px;
        color: rgba(0, 0, 0, 0.3);
        font-size: 12px;
        font-style: italic;
    }

    .card {
        width: 220px;
        height: auto;
        background: white;
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        overflow: hidden;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                    opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                    box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);

        animation: cardGlow 2s ease-in-out infinite;
    }

    .card.slide-in {

        transform: scale(1) translateY(0);

    .card:hover {
        transform: scale(1.05) translateY(-5px);

    .card img {
        width: 100%;

        text-shadow: 2px 2px 0 #5A4ABD;

    .game-buttons {
        display: flex;
        justify-content: center;
        gap: 10px;

    .progress-bar {

        z-index: 1000;
    }

    .card-3d-container {

        height: 400px;
        perspective: 1000px;
        cursor: pointer;
    }

    .card-3d {
        position: relative;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        transition: none;
    }

    .card-3d.flipped {
        transform: none;
    }

    .card-3d-front,

        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;

    .card-3d-back {
        transform: rotateY(180deg);

    .card-3d-front img,
    .card-3d-back img {

        object-fit: cover;
    }

    .close-viewer {

        right: 20px;

    .loading-image {

    .loading-text {

    .loading-progress {

        height: 20px;

    .card-viewer-overlay {

    .card-3d-container {

    .card-description {

        async function saveAsImage() {
            const cardsContainer = document.getElementById('cardsContainer');
            
            // Remove the publish button temporarily if it exists
            const publishButton = cardsContainer.querySelector('.publish-button');
            if (publishButton) {
                publishButton.style.display = 'none';
            }
            
            try {
                // Use html2canvas to capture the cards container
                const canvas = await html2canvas(cardsContainer, {
                    backgroundColor: null,
                    scale: 2, // Higher quality
                    logging: false,
                });
                
                // Convert canvas to blob
                canvas.toBlob((blob) => {
                    // Create download link
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'my-story-cards.png';
                    
                    // Trigger download
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    // Cleanup
                    URL.revokeObjectURL(url);
                }, 'image/png');
            } catch (error) {
                console.error('Error saving image:', error);
                alert('Failed to save image. Please try again.');
            } finally {
                // Restore publish button visibility
                if (publishButton) {
                    publishButton.style.display = 'block';
                }
            }
        }

        function sortCards(method, cards) {
            switch (method) {
                case 'id-asc':
                    return cards.sort((a, b) => a.id - b.id);
                case 'id-desc':
                    return cards.sort((a, b) => b.id - a.id);
                case 'collected':
                    return cards.sort((a, b) => {
                        const aCollected = collectedCards.includes(a.id);
                        const bCollected = collectedCards.includes(b.id);
                        if (aCollected === bCollected) return a.id - b.id;
                        return aCollected ? -1 : 1;
                    });
                case 'uncollected':
                    return cards.sort((a, b) => {
                        const aCollected = collectedCards.includes(a.id);
                        const bCollected = collectedCards.includes(b.id);
                        if (aCollected === bCollected) return a.id - b.id;
                        return aCollected ? 1 : -1;
                    });
                default:
                    return cards;
            }
        }

            const loadingInterval = setInterval(() => {
                currentStep++;

                    clearInterval(loadingInterval);

            closeBtn.addEventListener('click', () => {
                overlay.style.display = 'none';
            });

            let isDragging = false;
            let startX;
            let rotationY = 0;
            let currentRotation = 0;

            let autoRotationInterval;
            const startAutoRotation = () => {
                autoRotationInterval = setInterval(() => {
                    if (!isDragging) {
                        rotationY += 0.3; 
                        card.style.transform = `rotateY(${rotationY}deg)`;
                    }
                }, 60); 
            };

            cardContainer.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                currentRotation = rotationY;
                clearInterval(autoRotationInterval);
                card.style.transition = 'none';
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const deltaX = e.clientX - startX;
                rotationY = currentRotation + deltaX;
                card.style.transform = `rotateY(${rotationY}deg)`;
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
                card.style.transition = 'transform 0.3s ease';
                startAutoRotation();
            });

            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.style.display = 'none';
                    clearInterval(autoRotationInterval);
                }
            });

            return {
                overlay,
                showCard: (cardSrc, cardId) => {
                    const frontImg = overlay.querySelector('.card-3d-front img');
                    const cardIdElement = overlay.querySelector('.card-id');
                    const descriptionElement = overlay.querySelector('.card-description');
                    
                    frontImg.src = cardSrc;
                    frontImg.alt = `Card #${cardId}`;
                    cardIdElement.textContent = `#${cardId}`;
                    
                    // Set description with fallback
                    const description = descriptions[cardId] || "A mysterious card from the story collection.";
                    descriptionElement.textContent = description;
                    
                    overlay.style.display = 'flex';
                    rotationY = 0;
                    card.style.transform = 'rotateY(0deg)';
                    startAutoRotation();
                }
            };
        }

            if (newCardsCollected) {
                localStorage.setItem('collectedCards', JSON.stringify(collectedCards));
                updateGallery();
                showCollectionComplete();
            }
            
            let cardsLoaded = 0;

            selectedCards.forEach((card, index) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                if (newlyCollectedCards.includes(card.id)) {
                    cardDiv.classList.add('new-card');
                }
                cardDiv.dataset.cardId = card.id;
                
                const img = document.createElement('img');
                img.src = card.src;
                img.alt = `Story character card #${card.id}`;
                
                img.onload = () => {
                    setTimeout(() => {
                        cardDiv.appendChild(img);
                        cardsRow.appendChild(cardDiv);
                        playCardSound();
                        requestAnimationFrame(() => {
                            setTimeout(() => {
                                cardDiv.classList.add('slide-in');
                                cardsLoaded++;
                                
                                if (cardsLoaded === selectedCards.length) {
                                    setTimeout(() => {
                                        drawButton.disabled = false;
                                    }, 600);
                                }
                            }, 50);
                        });
                    }, index * 600);
                };
            });

            const publishButton = document.createElement('button');
            publishButton.className = 'icon-button publish-button';
            publishButton.onclick = publishToComm;
            publishButton.title = "Publish to Community";
            publishButton.innerHTML = `
                <svg viewBox="0 0 24 24">
                    <path d="M18,16.08C17.24,16.08 16.56,16.38 16.04,16.85L8.91,12.7C8.96,12.47 9,12.24 9,12C9,11.76 8.96,11.53 8.91,11.3L15.96,7.19C16.5,7.69 17.21,8 18,8A3,3 0 0,0 21,5A3,3 0 0,0 18,2A3,3 0 0,0 15,5C15,5.24 15.04,5.47 15.09,5.7L8.04,9.81C7.5,9.31 6.79,9 6,9A3,3 0 0,0 3,12A3,3 0 0,0 6,15C6.79,15 7.5,14.69 8.04,14.19L15.16,18.34C15.11,18.55 15.08,18.77 15.08,19C15.08,20.61 16.39,21.91 18,21.91C19.61,21.91 20.92,20.61 20.92,19A2.92,2.92 0 0,0 18,16.08Z"/>
                </svg>`;
            cardsContainer.appendChild(publishButton);
        }

        function showGallery() {
            document.querySelector('.cards-container').style.display = 'none';
            document.querySelector('.game-buttons').style.display = 'none';
            document.querySelector('.gallery-container').style.display = 'block';
            updateCollectionStats();
        }

        function showGame() {
            document.querySelector('.cards-container').style.display = 'flex';
            document.querySelector('.game-buttons').style.display = 'flex';
            document.querySelector('.gallery-container').style.display = 'none';
            const communityContainer = document.querySelector('.community-container');
            if (communityContainer) {
                communityContainer.style.display = 'none';
            }
        }

        async function initGallery() {
            const galleryDiv = document.getElementById('cardGallery');
            galleryDiv.innerHTML = '';
            
            // Add sort controls if they don't exist
            if (!document.getElementById('sortControls')) {
                const sortControls = document.createElement('div');
                sortControls.id = 'sortControls';
                sortControls.className = 'sort-controls';
                sortControls.innerHTML = `
                    <select onchange="changeSort(this.value)">
                        <option value="id-asc">ID (Ascending)</option>
                        <option value="id-desc">ID (Descending)</option>
                        <option value="collected">Collected First</option>
                        <option value="uncollected">Uncollected First</option>
                    </select>
                `;
                galleryDiv.parentElement.insertBefore(sortControls, galleryDiv);
            }

            // Add pagination container if it doesn't exist
            if (!document.getElementById('paginationContainer')) {
                const paginationContainer = document.createElement('div');
                paginationContainer.id = 'paginationContainer';
                paginationContainer.className = 'pagination-container';
                galleryDiv.parentElement.insertBefore(paginationContainer, galleryDiv);
            }
            
            const sortedCards = sortCards(currentSortMethod, [...cards]);
            const startIndex = (currentPage - 1) * cardsPerPage;
            const endIndex = startIndex + cardsPerPage;
            const pageCards = sortedCards.slice(startIndex, endIndex);
            
            const recentlyCollected = collectedCards.slice(-3);
            
            pageCards.forEach(card => {
                const item = document.createElement('div');
                item.className = `gallery-item ${collectedCards.includes(card.id) ? '' : 'locked'}`;
                
                if (recentlyCollected.includes(card.id)) {
                    item.classList.add('new-card');
                }
                
                const img = document.createElement('img');
                if (collectedCards.includes(card.id)) {
                    img.src = card.src;
                    img.alt = `Card #${card.id}`;
                    
                    item.addEventListener('click', () => {
                        cardViewer.showCard(card.src, card.id);
                    });
                } else {
                    img.src = 'data:image/svg+xml,' + encodeURIComponent(`
                        <svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
                            <rect width="100%" height="100%" fill="#e0e0e0"/>
                            <text x="50%" y="50%" font-family="Arial" font-size="14" 
                                  fill="#666" text-anchor="middle" dy=".3em">Card #${card.id}</text>
                        </svg>
                    `);
                    img.alt = `Locked Card #${card.id}`;
                }
                
                item.appendChild(img);
                
                if (!collectedCards.includes(card.id)) {
                    const lockIcon = document.createElement('div');
                    lockIcon.className = 'lock-icon';
                    lockIcon.innerHTML = '🔒';
                    item.appendChild(lockIcon);
                }
                
                galleryDiv.appendChild(item);
            });

            updatePagination();
        }

        function changeSort(method) {
            currentSortMethod = method;
            currentPage = 1;  // Reset to first page when sorting changes
            initGallery();
        }

        function updatePagination() {
            const totalPages = Math.ceil(cards.length / cardsPerPage);
            const paginationContainer = document.getElementById('paginationContainer');
            paginationContainer.innerHTML = `
                <button onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>
                <span>Page ${currentPage} of ${totalPages}</span>
                <button onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>
            `;
        }

        function changePage(delta) {
            const totalPages = Math.ceil(cards.length / cardsPerPage);
            currentPage = Math.max(1, Math.min(totalPages, currentPage + delta));
            initGallery();
        }

        async function toggleUpvote(postId) {
            try {
                // Get the UI elements first
                const upvoteButton = document.querySelector(`[data-post-id="${postId}"] .upvote-button`);
                const upvoteCount = document.querySelector(`[data-post-id="${postId}"] .upvote-count`);
                const currentCount = parseInt(upvoteCount.textContent || '0');

                // Check if user already upvoted
                const existingUpvote = await room.collection('upvote')
                    .filter({ post_id: postId })
                    .getList();

                if (existingUpvote.length > 0) {
                    // Remove upvote
                    await room.collection('upvote').delete(existingUpvote[0].id);
                    upvoteButton.classList.remove('upvoted');
                    // Immediately decrease count
                    upvoteCount.textContent = Math.max(0, currentCount - 1);
                } else {
                    // Add upvote 
                    await room.collection('upvote').create({
                        post_id: postId
                    });
                    upvoteButton.classList.add('upvoted');
                    // Immediately increase count
                    upvoteCount.textContent = currentCount + 1;
                }

            } catch (error) {
                console.error('Error toggling upvote:', error);
                // Reset the UI state in case of error
                upvoteButton.classList.remove('upvoted');
                upvoteCount.textContent = currentCount; // Reset to original count
            }
        }

        async function showCommunityComics() {
            document.querySelector('.cards-container').style.display = 'none';
            document.querySelector('.game-buttons').style.display = 'none';
            document.querySelector('.gallery-container').style.display = 'none';

            let communityContainer = document.querySelector('.community-container');
            if (communityContainer) {
                communityContainer.remove();
            }

            communityContainer = document.createElement('div');
            communityContainer.className = 'community-container';
            communityContainer.innerHTML = `
                <div class="gallery-buttons">
                    <button class="icon-button" onclick="showGame()" title="Back to Game">
                        <svg viewBox="0 0 24 24">
                            <path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/>
                        </svg>
                    </button>
                </div>
                <div class="community-posts"></div>
            `;

            document.querySelector('.container').appendChild(communityContainer);

            try {
                const postsContainer = communityContainer.querySelector('.community-posts');
                
                // Subscribe to both posts and upvotes
                room.collection('story').subscribe(async (posts) => {
                    postsContainer.innerHTML = '';
                    
                    for (const post of posts.sort((a, b) => b.timestamp - a.timestamp)) {
                        const postElement = document.createElement('div');
                        postElement.className = 'community-post';
                        postElement.setAttribute('data-post-id', post.id);
                        
                        const cardsContainer = document.createElement('div');
                        cardsContainer.className = 'cards-container';
                        
                        post.cards.forEach(card => {
                            const cardDiv = document.createElement('div');
                            cardDiv.className = 'card slide-in';
                            cardDiv.innerHTML = `<img src="${card.src}" alt="Card #${card.id}">`;
                            cardsContainer.appendChild(cardDiv);
                        });

                        // Get upvote count for this post
                        const upvotes = await room.collection('upvote')
                          .filter({ post_id: post.id })
                          .getList();

                        // Check if current user upvoted
                        const userUpvoted = upvotes.length > 0;
                        
                        const metadata = document.createElement('div');
                        metadata.className = 'post-metadata';
                        metadata.innerHTML = `
                            <div class="post-info">Posted by ${post.username} on ${new Date(post.timestamp).toLocaleString()}</div>
                            <div class="post-actions">
                                <button class="upvote-button ${userUpvoted ? 'upvoted' : ''}" 
                                        onclick="toggleUpvote('${post.id}')" 
                                        title="Upvote this story">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 4L2 14H6V20H18V14H22L12 4Z"/>
                                    </svg>
                                    <span class="upvote-count">${upvotes.length}</span>
                                </button>
                            </div>
                        `;
                        
                        postElement.appendChild(cardsContainer);
                        postElement.appendChild(metadata);
                        postsContainer.appendChild(postElement);
                    }
                });
            } catch (error) {
                console.error('Error loading community comics:', error);
                communityContainer.innerHTML = '<p>Error loading community comics. Please try again later.</p>';
            }
        }

        function updateCollectionStats() {
            const collectionCount = document.getElementById('collectionCount');
            const totalCards = document.getElementById('totalCards');
            const progressBarFill = document.getElementById('progressBarFill');
            
            collectionCount.textContent = collectedCards.length;
            totalCards.textContent = cards.length;
            
            const percentage = (collectedCards.length / cards.length) * 100;
            progressBarFill.style.width = `${percentage}%`;
        }

        function resetProgress() {
            if (confirm('Are you sure you want to reset your collection progress? This cannot be undone!')) {
                collectedCards = [];
                localStorage.removeItem('collectedCards');
                updateGallery();
                alert('Collection progress has been reset!');
            }
        }

        function showNowPlaying(trackName) {
            const existingPopup = document.querySelector('.now-playing');
            if (existingPopup) {
                existingPopup.classList.remove('show');
                setTimeout(() => existingPopup.remove(), 300);
            }

            const popup = document.createElement('div');
            popup.className = 'now-playing';
            popup.innerHTML = `
                <svg class="now-playing-icon" viewBox="0 0 24 24">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
                <span class="now-playing-text">♫ Now Playing: ${trackName.replace(/_/g, ' ')}</span>
            `;
            document.body.appendChild(popup);

            requestAnimationFrame(() => {
                popup.classList.add('show');
            });

            setTimeout(() => {
                popup.classList.remove('show');
                setTimeout(() => popup.remove(), 500);
            }, 5000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            simulateLoading();
            cardViewer = setupCardViewer();
            generateStory();
            initGallery();
            updateCollectionStats();
            
            currentTrackIndex = Math.floor(Math.random() * musicTracks.length);
            const bgMusic = document.getElementById('bgMusic');
            bgMusic.src = musicTracks[currentTrackIndex];
            bgMusic.volume = 0.5;
            
            showNowPlaying(musicTracks[currentTrackIndex].split('/').pop().split('.')[0]);
            
            bgMusic.addEventListener('ended', () => {
                nextTrack();
            });
        });
    </script>
</body></html>
