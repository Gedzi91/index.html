<html><head><base href="https://websim.ai/logo-creator/"/><style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Oxanium:wght@700&display=swap');

body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  background-color: #f0f0f0;
  font-family: 'Oxanium', sans-serif;
}

.logo-container {
  text-align: center;
}

.logo {
  width: 300px;
  height: 300px;
}

.company-name {
  font-family: 'Oxanium', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
}

.teal-letter {
  fill: #008080;
}

.black-letters {
  fill: #000000;
}
</style></head><body>
<div class="logo-container">
  <svg class="logo" viewBox="0 0 100 100">
    <defs>
      <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#008080;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#004040;stop-opacity:1" />
      </linearGradient>
    </defs>
    
    <!-- Robot Head -->
    <rect x="35" y="20" width="30" height="25" rx="5" ry="5" fill="#000000" />
    
    <!-- Robot Eyes -->
    <circle cx="43" cy="30" r="3" fill="#00ffff" />
    <circle cx="57" cy="30" r="3" fill="#00ffff" />
    
    <!-- Robot Antenna -->
    <line x1="50" y1="20" x2="50" y2="10" stroke="#000000" stroke-width="2" />
    <circle cx="50" cy="5" r="2" fill="#00ffff" />
    
    <!-- Robot Body -->
    <rect x="40" y="45" width="20" height="20" fill="#000000" />
    
    <!-- Robot Arms -->
    <line x1="35" y1="50" x2="25" y2="60" stroke="#000000" stroke-width="3" />
    <line x1="65" y1="50" x2="75" y2="60" stroke="#000000" stroke-width="3" />
    
    <!-- Company Name directly under the robot -->
    <text x="50" y="80" text-anchor="middle" class="company-name">
      <tspan class="teal-letter">O</tspan><tspan class="black-letters">PTIONS</tspan>
    </text>
  </svg>
</div>
</body></html>
