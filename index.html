<html><head><base href="https://cell-simulator.science/" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulepszony Model Komórki Biologicznej z Żółtymi Nićmi</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #000;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="cellCanvas"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
<script>
  const canvas = document.getElementById('cellCanvas');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const engine = Matter.Engine.create();
  const world = engine.world;

  world.gravity.y = 0;
  world.gravity.x = 0;

  // Ustawienia głównej komórki
  const cellRadius = Math.min(canvas.width, canvas.height) * 0.3;
  const cytoplasmParticleRadius = 5;
  const membraneParticleRadius = 10;
  const cytoplasmParticleCount = 200;
  const membraneParticleCount = 40;

  // Ustawienia organelli
  const organelleCount = 5;
  const organelleRadius = cellRadius * 0.2;
  const organelleCytoplasmParticleRadius = 3;
  const organelleMembraneParticleRadius = 6;
  const organelleCytoplasmParticleCount = 30;
  const organelleMembraneParticleCount = 20;

  // Ustawienia żółtych cząsteczek
  const yellowParticleRadius = 4;
  const yellowParticles = [];
  const yellowClusters = [];

  // Funkcje tworzące cząsteczki i błony
  function createParticles(count, radius, particleRadius, centerX, centerY, color, isEnergetic = false) {
    const particles = [];
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * radius * 0.8;
      const x = centerX + Math.cos(angle) * r;
      const y = centerY + Math.sin(angle) * r;
      
      const particle = Matter.Bodies.circle(x, y, particleRadius, {
        restitution: isEnergetic ? 0.9 : 0.8,
        friction: 0.001,
        frictionAir: isEnergetic ? 0.005 : 0.01,
        render: { fillStyle: color }
      });
      
      particles.push(particle);
      Matter.Composite.add(world, particle);
    }
    return particles;
  }

  function createMembrane(count, radius, particleRadius, centerX, centerY, color) {
    const particles = [];
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2;
      const x = centerX + Math.cos(angle) * radius;
      const y = centerY + Math.sin(angle) * radius;
      
      const particle = Matter.Bodies.circle(x, y, particleRadius, {
        isStatic: false,
        restitution: 0.5,
        friction: 0.1,
        frictionAir: 0.02,
        render: { fillStyle: color }
      });
      
      particles.push(particle);
      Matter.Composite.add(world, particle);
    }

    // Łączenie cząsteczek błony
    for (let i = 0; i < count; i++) {
      const particleA = particles[i];
      const particleB = particles[(i + 1) % count];
      const constraint = Matter.Constraint.create({
        bodyA: particleA,
        bodyB: particleB,
        stiffness: 0.1,
        damping: 0.1
      });
      Matter.Composite.add(world, constraint);
    }

    return particles;
  }

  // Tworzenie głównej komórki
  const cytoplasmParticles = createParticles(cytoplasmParticleCount, cellRadius, cytoplasmParticleRadius, canvas.width / 2, canvas.height / 2, '#3498db', true);
  const membraneParticles = createMembrane(membraneParticleCount, cellRadius, membraneParticleRadius, canvas.width / 2, canvas.height / 2, '#2ecc71');

  // Tworzenie organelli
  const organelles = [];
  for (let i = 0; i < organelleCount; i++) {
    const angle = (i / organelleCount) * Math.PI * 2;
    const r = cellRadius * 0.5;
    const centerX = canvas.width / 2 + Math.cos(angle) * r;
    const centerY = canvas.height / 2 + Math.sin(angle) * r;

    const cytoplasm = createParticles(organelleCytoplasmParticleCount, organelleRadius, organelleCytoplasmParticleRadius, centerX, centerY, '#e74c3c', true);
    const membrane = createMembrane(organelleMembraneParticleCount, organelleRadius, organelleMembraneParticleRadius, centerX, centerY, '#c0392b');

    organelles.push({ cytoplasm, membrane });
  }

  // Dodanie ograniczenia dla całej komórki do środka ekranu
  const centerConstraint = Matter.Constraint.create({
    pointA: { x: canvas.width / 2, y: canvas.height / 2 },
    bodyB: Matter.Bodies.circle(canvas.width / 2, canvas.height / 2, 1, { isStatic: true }),
    stiffness: 0.001,
    damping: 0.1,
    render: { visible: false }
  });
  Matter.Composite.add(world, centerConstraint);

  // Połączenie wszystkich cząsteczek błony z centrum
  const membraneConstraints = membraneParticles.map(particle => {
    const constraint = Matter.Constraint.create({
      bodyA: centerConstraint.bodyB,
      bodyB: particle,
      stiffness: 0.001,
      damping: 0.1,
      render: { visible: false }
    });
    Matter.Composite.add(world, constraint);
    return constraint;
  });

  // Funkcja sprawdzająca kolizje między organellami
  function checkOrganelleCollisions() {
    for (let i = 0; i < organelles.length; i++) {
      for (let j = i + 1; j < organelles.length; j++) {
        const organelle1 = organelles[i];
        const organelle2 = organelles[j];

        organelle1.membrane.forEach(particle1 => {
          organelle2.membrane.forEach(particle2 => {
            const distance = Matter.Vector.magnitude(Matter.Vector.sub(particle1.position, particle2.position));
            if (distance < organelleMembraneParticleRadius * 2) {
              createYellowParticle((particle1.position.x + particle2.position.x) / 2, (particle1.position.y + particle2.position.y) / 2);
            }
          });
        });
      }
    }
  }

  // Funkcja tworząca żółte cząsteczki
  function createYellowParticle(x, y) {
    const particle = Matter.Bodies.circle(x, y, yellowParticleRadius, {
      restitution: 0.8,
      friction: 0.001,
      frictionAir: 0.01,
      render: { fillStyle: '#f1c40f' }
    });
    yellowParticles.push(particle);
    Matter.Composite.add(world, particle);
    return particle;
  }

  // Funkcja łącząca żółte cząsteczki w nici
  function connectYellowParticles() {
    const maxDistance = yellowParticleRadius * 4;

    for (let i = 0; i < yellowParticles.length; i++) {
      for (let j = i + 1; j < yellowParticles.length; j++) {
        const particleA = yellowParticles[i];
        const particleB = yellowParticles[j];

        const distance = Matter.Vector.magnitude(
          Matter.Vector.sub(particleA.position, particleB.position)
        );

        if (distance < maxDistance) {
          const existingConstraint = Matter.Composite.allConstraints(world).find(
            constraint => 
              (constraint.bodyA === particleA && constraint.bodyB === particleB) ||
              (constraint.bodyA === particleB && constraint.bodyB === particleA)
          );

          if (!existingConstraint) {
            const constraint = Matter.Constraint.create({
              bodyA: particleA,
              bodyB: particleB,
              stiffness: 0.05,
              damping: 0.1
            });
            Matter.Composite.add(world, constraint);
          }
        }
      }
    }
  }

  // Funkcja rysująca
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Efekt poświaty tła
    const gradient = ctx.createRadialGradient(
      canvas.width / 2, canvas.height / 2, 0,
      canvas.width / 2, canvas.height / 2, cellRadius * 1.5
    );
    gradient.addColorStop(0, 'rgba(52, 152, 219, 0.2)');
    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Rysowanie głównej cytoplazmy
    cytoplasmParticles.forEach(particle => {
      const gradient = ctx.createRadialGradient(
        particle.position.x, particle.position.y, 0,
        particle.position.x, particle.position.y, cytoplasmParticleRadius
      );
      gradient.addColorStop(0, '#3498db');
      gradient.addColorStop(1, 'rgba(52, 152, 219, 0.5)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(particle.position.x, particle.position.y, cytoplasmParticleRadius, 0, Math.PI * 2);
      ctx.fill();
    });
    
    // Rysowanie głównej błony komórkowej
    ctx.strokeStyle = 'rgba(46, 204, 113, 0.8)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    membraneParticles.forEach((particle, index) => {
      const nextParticle = membraneParticles[(index + 1) % membraneParticleCount];
      if (index === 0) {
        ctx.moveTo(particle.position.x, particle.position.y);
      } else {
        ctx.lineTo(particle.position.x, particle.position.y);
      }
    });
    ctx.closePath();
    ctx.stroke();

    membraneParticles.forEach(particle => {
      const gradient = ctx.createRadialGradient(
        particle.position.x, particle.position.y, 0,
        particle.position.x, particle.position.y, membraneParticleRadius
      );
      gradient.addColorStop(0, '#2ecc71');
      gradient.addColorStop(1, 'rgba(46, 204, 113, 0.5)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(particle.position.x, particle.position.y, membraneParticleRadius, 0, Math.PI * 2);
      ctx.fill();
    });

    // Rysowanie organelli
    organelles.forEach(organelle => {
      // Rysowanie cytoplazmy organelli
      organelle.cytoplasm.forEach(particle => {
        const gradient = ctx.createRadialGradient(
          particle.position.x, particle.position.y, 0,
          particle.position.x, particle.position.y, organelleCytoplasmParticleRadius
        );
        gradient.addColorStop(0, '#e74c3c');
        gradient.addColorStop(1, 'rgba(231, 76, 60, 0.5)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(particle.position.x, particle.position.y, organelleCytoplasmParticleRadius, 0, Math.PI * 2);
        ctx.fill();
      });

      // Rysowanie błony organelli
      ctx.strokeStyle = 'rgba(192, 57, 43, 0.8)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      organelle.membrane.forEach((particle, index) => {
        const nextParticle = organelle.membrane[(index + 1) % organelleMembraneParticleCount];
        if (index === 0) {
          ctx.moveTo(particle.position.x, particle.position.y);
        } else {
          ctx.lineTo(particle.position.x, particle.position.y);
        }
      });
      ctx.closePath();
      ctx.stroke();

      organelle.membrane.forEach(particle => {
        const gradient = ctx.createRadialGradient(
          particle.position.x, particle.position.y, 0,
          particle.position.x, particle.position.y, organelleMembraneParticleRadius
        );
        gradient.addColorStop(0, '#c0392b');
        gradient.addColorStop(1, 'rgba(192, 57, 43, 0.5)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(particle.position.x, particle.position.y, organelleMembraneParticleRadius, 0, Math.PI * 2);
        ctx.fill();
      });
    });

    // Rysowanie żółtych cząsteczek i nici
    yellowParticles.forEach(particle => {
      const gradient = ctx.createRadialGradient(
        particle.position.x, particle.position.y, 0,
        particle.position.x, particle.position.y, yellowParticleRadius
      );
      gradient.addColorStop(0, '#f1c40f');
      gradient.addColorStop(1, 'rgba(241, 196, 15, 0.5)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(particle.position.x, particle.position.y, yellowParticleRadius, 0, Math.PI * 2);
      ctx.fill();
    });

    // Rysowanie połączeń między żółtymi cząsteczkami
    ctx.strokeStyle = 'rgba(243, 156, 18, 0.5)';
    ctx.lineWidth = 1;
    Matter.Composite.allConstraints(world).forEach(constraint => {
      if (yellowParticles.includes(constraint.bodyA) && yellowParticles.includes(constraint.bodyB)) {
        ctx.beginPath();
        ctx.moveTo(constraint.bodyA.position.x, constraint.bodyA.position.y);
        ctx.lineTo(constraint.bodyB.position.x, constraint.bodyB.position.y);
        ctx.stroke();
      }
    });
    
    requestAnimationFrame(draw);
  }

  // Uruchomienie silnika fizyki i animacji
  Matter.Runner.run(engine);
  draw();

  // Obsługa zmiany rozmiaru okna
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // Aktualizacja pozycji centralnego punktu
    Matter.Body.setPosition(centerConstraint.bodyB, {
      x: canvas.width / 2,
      y: canvas.height / 2
    });
  });

  // Dodanie zwiększonego ruchu do cząsteczek cytoplazmy
  function applyRandomForce(particles, forceMagnitude) {
    particles.forEach(particle => {
      Matter.Body.applyForce(particle, particle.position, {
        x: (Math.random() - 0.5) * forceMagnitude,
        y: (Math.random() - 0.5) * forceMagnitude
      });
    });
  }

  setInterval(() => {
    applyRandomForce(cytoplasmParticles, 0.0005);
    organelles.forEach(organelle => {
      applyRandomForce(organelle.cytoplasm, 0.0003);
    });
    applyRandomForce(yellowParticles, 0.0002);
  }, 50);

  // Funkcja dodająca początkową prędkość cząsteczkom
  function addInitialVelocity(particles, maxVelocity) {
    particles.forEach(particle => {
      Matter.Body.setVelocity(particle, {
        x: (Math.random() - 0.5) * maxVelocity,
        y: (Math.random() - 0.5) * maxVelocity
      });
    });
  }

  // Dodanie początkowej prędkości cząsteczkom cytoplazmy
  addInitialVelocity(cytoplasmParticles, 5);
  organelles.forEach(organelle => {
    addInitialVelocity(organelle.cytoplasm, 3);
  });

  // Regularne sprawdzanie kolizji organelli i łączenie żółtych cząsteczek
  setInterval(() => {
    checkOrganelleCollisions();
    connectYellowParticles();
  }, 100);
</script>
</body>
</html>
