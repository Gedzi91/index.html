<html><head><base href="https://websim.ai/" /><title>SpongeBob Eating Patrick Simulator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #87CEEB;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }
  #game-container {
    width: 800px;
    height: 600px;
    background-color: #00BFFF;
    border: 10px solid #8B4513;
    border-radius: 20px;
    position: relative;
    overflow: hidden;
  }
  #spongebob, #patrick {
    position: absolute;
    transition: all 0.5s ease;
  }
  #controls {
    margin-top: 20px;
  }
  button {
    font-size: 18px;
    padding: 10px 20px;
    margin: 0 10px;
    cursor: pointer;
    background-color: #FFD700;
    border: none;
    border-radius: 5px;
    transition: background-color 0.3s;
  }
  button:hover {
    background-color: #FFA500;
  }
  #message {
    font-size: 24px;
    font-weight: bold;
    color: #FF4500;
    margin-top: 20px;
  }
</style>
</head>
<body>
<h1>SpongeBob Eating Patrick Simulator</h1>
<div id="game-container">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>
<div id="controls">
  <button id="eatButton">Eat Patrick</button>
  <button id="resetButton">Reset</button>
</div>
<div id="message"></div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const eatButton = document.getElementById('eatButton');
const resetButton = document.getElementById('resetButton');
const messageDiv = document.getElementById('message');

let spongebobX = 100;
let spongebobY = 300;
let patrickX = 600;
let patrickY = 300;
let patrickSize = 100;
let isEating = false;

function drawSpongebob(x, y) {
  // SpongeBob's body
  ctx.fillStyle = '#FFFF00';
  ctx.fillRect(x, y, 120, 120);

  // SpongeBob's eyes
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(x + 30, y + 30, 20, 0, Math.PI * 2);
  ctx.arc(x + 90, y + 30, 20, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'black';
  ctx.beginPath();
  ctx.arc(x + 30, y + 30, 10, 0, Math.PI * 2);
  ctx.arc(x + 90, y + 30, 10, 0, Math.PI * 2);
  ctx.fill();

  // SpongeBob's mouth
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x + 60, y + 80, 30, 0, Math.PI);
  ctx.stroke();
}

function drawPatrick(x, y, size) {
  // Patrick's body
  ctx.fillStyle = '#FFC0CB';
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x - size/2, y + size);
  ctx.lineTo(x + size/2, y + size);
  ctx.closePath();
  ctx.fill();

  // Patrick's eyes
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(x - size/5, y + size/3, size/10, 0, Math.PI * 2);
  ctx.arc(x + size/5, y + size/3, size/10, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'black';
  ctx.beginPath();
  ctx.arc(x - size/5, y + size/3, size/20, 0, Math.PI * 2);
  ctx.arc(x + size/5, y + size/3, size/20, 0, Math.PI * 2);
  ctx.fill();

  // Patrick's mouth
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y + size/2, size/5, 0, Math.PI);
  ctx.stroke();
}

function drawScene() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw underwater background
  ctx.fillStyle = '#00BFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw some bubbles
  for (let i = 0; i < 20; i++) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.beginPath();
    ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 10, 0, Math.PI * 2);
    ctx.fill();
  }

  drawSpongebob(spongebobX, spongebobY);
  drawPatrick(patrickX, patrickY, patrickSize);
}

function eatPatrick() {
  isEating = true;
  messageDiv.textContent = "Om nom nom!";
  
  const eatInterval = setInterval(() => {
    spongebobX += 10;
    patrickSize -= 2;
    patrickX += 1;
    patrickY += 1;

    if (patrickSize <= 0) {
      clearInterval(eatInterval);
      messageDiv.textContent = "Patrick has been eaten!";
      isEating = false;
    }

    drawScene();
  }, 50);
}

function resetScene() {
  spongebobX = 100;
  spongebobY = 300;
  patrickX = 600;
  patrickY = 300;
  patrickSize = 100;
  isEating = false;
  messageDiv.textContent = "";
  drawScene();
}

eatButton.addEventListener('click', () => {
  if (!isEating) {
    eatPatrick();
  }
});

resetButton.addEventListener('click', resetScene);

// Initial draw
drawScene();
</script>
</body>
</html>
