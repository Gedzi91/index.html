<html><head><base href="/" />
  <style>
    body {
      margin: 0;
      padding: 20px;
      background-color: #ffeaf0;
      font-family: 'Comic Sans MS', cursive;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      background-color: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    h1 {
      color: #ff6b9d;
      font-size: 2.5em;
      margin-bottom: 20px;
    }
    
    .pig-container {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    
    .pig-container:hover {
      transform: scale(1.1);
    }
    
    .pig-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .speech-bubble {
      position: absolute;
      top: -60px;
      right: -20px;
      background-color: white;
      padding: 15px;
      border-radius: 20px;
      border: 3px solid #ff6b9d;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .speech-bubble:after {
      content: '';
      position: absolute;
      bottom: -15px;
      left: 50%;
      border-width: 15px 15px 0;
      border-style: solid;
      border-color: #ff6b9d transparent;
    }
    
    .bounce {
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    .facts {
      margin-top: 30px;
      padding: 20px;
      background-color: #fff5f8;
      border-radius: 15px;
    }
    
    .fact {
      margin: 10px 0;
      color: #666;
      font-size: 1.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Meet Our Grumpy Little Friend!</h1>
    
    <div class="pig-container" id="pigContainer">
      <img src="WX20241011-152219@2x.png" alt="Grumpy Pig" class="pig-image bounce">
      <div class="speech-bubble" id="speechBubble">
        *Hmph!*
      </div>
    </div>
    
    <div class="facts">
      <div class="fact">🐷 This little pig is having a bit of a day...</div>
      <div class="fact">👖 But at least they're rocking those cute blue shorts!</div>
      <div class="fact">💕 Even when grumpy, they're absolutely adorable!</div>
    </div>
  </div>

  <script>
    const pigContainer = document.getElementById('pigContainer');
    const speechBubble = document.getElementById('speechBubble');
    const grumpyPhrases = [
      "*Hmph!*",
      "Not today!",
      "Whatever...",
      "Do I have to?",
      "It's too early for this!",
      "Leave me alone..."
    ];
    
    pigContainer.addEventListener('mouseenter', () => {
      speechBubble.style.opacity = '1';
      speechBubble.textContent = grumpyPhrases[Math.floor(Math.random() * grumpyPhrases.length)];
    });
    
    pigContainer.addEventListener('mouseleave', () => {
      speechBubble.style.opacity = '0';
    });
    
    pigContainer.addEventListener('click', () => {
      const currentRotation = pigContainer.style.transform || 'rotate(0deg)';
      const newRotation = currentRotation === 'rotate(0deg)' ? 'rotate(360deg)' : 'rotate(0deg)';
      pigContainer.style.transform = newRotation;
    });
  </script>
</body></html>
