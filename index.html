<html><head><base href="." target="_blank"><link rel="stylesheet" href=""/></head><body>
<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}
canvas {
    width: 100%;
    height: 100%;
}
#controls {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    padding: 10px;
    border-radius: 5px;
    color: white;
    font-family: Arial, sans-serif;
    z-index: 1000;
}
.control-group {
    margin: 10px 0;
}
label {
    display: block;
    margin-bottom: 5px;
}
input[type="range"] {
    width: 200px;
}
input[type="color"] {
    vertical-align: middle;
}
</style>

<div id="controls">
    <div class="control-group">
        <label>Rotation Speed: <span id="rotationValue">0.095</span></label>
        <input type="range" id="rotation" min="0" max="0.5" step="0.001" value="0.095">
    </div>
    <div class="control-group">
        <label>Scale: <span id="scaleValue">8</span></label>
        <input type="range" id="scale" min="1" max="20" step="0.5" value="8">
    </div>
    <div class="control-group">
        <label>Particle Size: <span id="particleSizeValue">6</span></label>
        <input type="range" id="particleSize" min="1" max="20" step="0.5" value="6">
    </div>
    <div class="control-group">
        <label>Particle Count: <span id="particleCountValue">3</span></label>
        <input type="range" id="particleCount" min="1" max="20" step="1" value="3">
    </div>
    <div class="control-group">
        <label>Particle Gravity: <span id="gravityValue">0.1</span></label>
        <input type="range" id="gravity" min="0" max="0.5" step="0.01" value="0.1">
    </div>
    <div class="control-group">
        <label>Mouse Sensitivity: <span id="mouseSensitivityValue">0.5</span></label>
        <input type="range" id="mouseSensitivity" min="0.1" max="2" step="0.1" value="0.5">
    </div>
    <div class="control-group">
        <label>Pattern Layers: <span id="patternLayersValue">4</span></label>
        <input type="range" id="patternLayers" min="1" max="8" step="1" value="4">
    </div>
    <div class="control-group">
        <label>Pattern Speed: <span id="patternSpeedValue">0.2</span></label>
        <input type="range" id="patternSpeed" min="0.1" max="1" step="0.1" value="0.2">
    </div>
    <div class="control-group">
        <label>Particle Life: <span id="particleLifeValue">1</span></label>
        <input type="range" id="particleLife" min="0.5" max="2" step="0.1" value="1">
    </div>
</div>

<canvas id="shader"></canvas>
<canvas id="particles" style="position: absolute; top: 0; left: 0; pointer-events: none;"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Global settings object
const settings = {
    rotationSpeed: 0.095,
    scale: 8,
    particleSize: 6,
    particleCount: 3,
    gravity: 0.1,
    mouseSensitivity: 0.5,
    patternLayers: 4,
    patternSpeed: 0.2,
    particleLife: 1
};

// Setup controls
const controls = {
    rotation: ['rotationSpeed', 'rotationValue'],
    scale: ['scale', 'scaleValue'],
    particleSize: ['particleSize', 'particleSizeValue'],
    particleCount: ['particleCount', 'particleCountValue'],
    gravity: ['gravity', 'gravityValue'],
    mouseSensitivity: ['mouseSensitivity', 'mouseSensitivityValue'],
    patternLayers: ['patternLayers', 'patternLayersValue'],
    patternSpeed: ['patternSpeed', 'patternSpeedValue'],
    particleLife: ['particleLife', 'particleLifeValue']
};

Object.entries(controls).forEach(([id, [setting, valueId]]) => {
    document.getElementById(id).addEventListener('input', (e) => {
        settings[setting] = parseFloat(e.target.value);
        document.getElementById(valueId).textContent = settings[setting];
    });
});

// Particle system
class Particle {
    constructor(x, y, vel) {
        this.x = x;
        this.y = y;
        this.vel = vel;
        this.life = settings.particleLife;
        this.decay = (0.02 + Math.random() * 0.02) / settings.particleLife;
        this.r = Math.floor(Math.random() * 255);
        this.g = Math.floor(Math.random() * 255);
        this.b = Math.floor(Math.random() * 255);
    }

    update() {
        this.x += this.vel.x;
        this.y += this.vel.y;
        this.vel.y += settings.gravity;
        this.life -= this.decay;
        return this.life > 0;
    }
}

const particleCanvas = document.getElementById('particles');
const pctx = particleCanvas.getContext('2d');
let particles = [];
let lastMouseX = 0;
let lastMouseY = 0;

function resizeParticleCanvas() {
    particleCanvas.width = window.innerWidth;
    particleCanvas.height = window.innerHeight;
}
resizeParticleCanvas();
window.addEventListener('resize', resizeParticleCanvas);

function emitParticles(x, y, dx, dy) {
    for (let i = 0; i < settings.particleCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 2 + 2;
        const vel = {
            x: dx * 0.3 + Math.cos(angle) * speed,
            y: dy * 0.3 + Math.sin(angle) * speed
        };
        particles.push(new Particle(x, y, vel));
    }
}

function updateParticles() {
    pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
    
    particles = particles.filter(p => {
        const alive = p.update();
        if (alive) {
            pctx.beginPath();
            const alpha = p.life;
            const size = p.life * settings.particleSize;
            pctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${alpha})`;
            pctx.arc(p.x, p.y, size, 0, Math.PI * 2);
            pctx.fill();
        }
        return alive;
    });
}

const vertexShader = `
    void main() {
        gl_Position = vec4(position, 1.0);
    }
`;

const fragmentShader = `
    uniform vec2 iResolution;
    uniform float iTime;
    uniform vec2 iMouse;
    uniform float iScale;
    uniform float iRotationSpeed;
    uniform float iPatternLayers;
    uniform float iPatternSpeed;

    #define R           iResolution
    #define T           iTime
    #define M           iMouse
    #define PI         3.14159265359
    #define PI2        6.28318530718

    mat2 rot(float a) {return mat2(cos(a),sin(a),-sin(a),cos(a));}
    vec3 hue(float t, float f) { return f+f*cos(PI2*t*(vec3(1.,.75,.75)+vec3(.96,.57,.12)));}
    float hash21(vec2 a) {return fract(sin(dot(a,vec2(27.69,32.58)))*43758.53);}
    float box(vec2 p, vec2 b) {vec2 d = abs(p)-b; return length(max(d,0.)) + min(max(d.x,d.y),0.);}

    mat2 r90;
    vec2 pattern(vec2 p, float sc) {
        vec2 uv = p;
        vec2 id = floor(p*sc);
        p = fract(p*sc)-.5;

        float rnd = hash21(id);
        
        if(rnd>.5) p *= r90;
        rnd=fract(rnd*32.54);
        if(rnd>.4) p *= r90;
        if(rnd>.8) p *= r90;
        
        rnd=fract(rnd*47.13);

        float tk = .075;
        float d = box(p-vec2(.6,.7),vec2(.25,.75))-.15;
        float l = box(p-vec2(.7,.5),vec2(.75,.15))-.15;
        float b = box(p+vec2(0,.7),vec2(.05,.25))-.15;
        float r = box(p+vec2(.6,0),vec2(.15,.05))-.15;
        d = abs(d)-tk; 
        
        if(rnd>.92) {
            d = box(p-vec2(-.6,.5),vec2(.25,.15))-.15;
            l = box(p-vec2(.6,.6),vec2(.25))-.15;
            b = box(p+vec2(.6,.6),vec2(.25))-.15;
            r = box(p-vec2(.6,-.6),vec2(.25))-.15;
            d = abs(d)-tk; 
            
        } else if(rnd>.6) {
            d = length(p.x-.2)-tk;
            l = box(p-vec2(-.6,.5),vec2(.25,.15))-.15;
            b = box(p+vec2(.6,.6),vec2(.25))-.15;
            r = box(p-vec2(.3,0),vec2(.25,.05))-.15;
        }
        
        l = abs(l)-tk; b = abs(b)-tk; r = abs(r)-tk;

        float e = min(d,min(l,min(b,r)));
        
        if(rnd>.6) {
            r = max(r,-box(p-vec2(.2,.2),vec2(tk*1.3)));
            d = max(d,-box(p+vec2(-.2,.2),vec2(tk*1.3)));
        } else {
            l = max(l,-box(p-vec2(.2,.2),vec2(tk*1.3)));
        }
        
        d = min(d,min(l,min(b,r)));

        return vec2(d,e);
    }

    void mainImage( out vec4 O, in vec2 F )
    {
        vec3 C = vec3(.0);
        vec2 uv = (2.*F-R.xy)/max(R.x,R.y);
        r90 = rot(1.5707);
        
        float mouseX = M.x/R.x * 2.0 - 1.0;
        float mouseY = M.y/R.y * 2.0 - 1.0;
        
        uv *= rot(T*iRotationSpeed + mouseX * 0.5);
        uv = vec2(log(length(uv)), atan(uv.y, uv.x)*6./PI2);

        float scale = iScale + mouseY * 4.0;

        for(float i=0.; i<iPatternLayers; i++){  
            float ff=(i*iPatternSpeed)+.2;
            uv.x+=T*ff + mouseX * 0.1;

            float px = fwidth(uv.x*scale);
            vec2 d = pattern(uv,scale);
            vec3 clr = hue(sin(uv.x+(i*8.))*.2+.4 + mouseY * 0.2,(.5+i)*.15);
            C = mix(C,vec3(.001),smoothstep(px,-px,d.y-.04));
            C = mix(C,clr,smoothstep(px,-px,d.x));
            scale *=.5;
        }

        C = pow(C,vec3(.4545));
        O = vec4(C,1.0);
    }

    void main() {
        mainImage(gl_FragColor, gl_FragCoord.xy);
    }
`;

// Set up Three.js scene
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const renderer = new THREE.WebGLRenderer({canvas: document.querySelector('#shader'), antialias: true});

// Create shader material
const uniforms = {
    iTime: { value: 0 },
    iResolution: { value: new THREE.Vector2() },
    iMouse: { value: new THREE.Vector2() },
    iScale: { value: settings.scale },
    iRotationSpeed: { value: settings.rotationSpeed },
    iPatternLayers: { value: settings.patternLayers },
    iPatternSpeed: { value: settings.patternSpeed }
};

const material = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms
});

// Create full screen quad
const geometry = new THREE.PlaneGeometry(2, 2);
const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// Handle resize
function resize() {
    renderer.setSize(window.innerWidth, window.innerHeight);
    uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', resize);
resize();

// Handle mouse with smooth interpolation
let targetMouseX = 0;
let targetMouseY = 0;
let currentMouseX = 0;
let currentMouseY = 0;

window.addEventListener('mousemove', (e) => {
    const dx = e.clientX - lastMouseX;
    const dy = e.clientY - lastMouseY;
    const speed = Math.sqrt(dx*dx + dy*dy);
    
    if (speed > 5) {
        emitParticles(e.clientX, e.clientY, dx * settings.mouseSensitivity, dy * settings.mouseSensitivity);
    }
    
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
    targetMouseX = e.clientX;
    targetMouseY = e.clientY;
});

// Animation loop with smooth mouse movement
function animate(time) {
    currentMouseX += (targetMouseX - currentMouseX) * 0.05;
    currentMouseY += (targetMouseY - currentMouseY) * 0.05;
    
    uniforms.iMouse.value.set(currentMouseX, currentMouseY);
    uniforms.iTime.value = time * 0.001;
    uniforms.iScale.value = settings.scale;
    uniforms.iRotationSpeed.value = settings.rotationSpeed;
    uniforms.iPatternLayers.value = settings.patternLayers;
    uniforms.iPatternSpeed.value = settings.patternSpeed;
    
    renderer.render(scene, camera);
    
    updateParticles();
    
    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body></html>
