function getFruitSVG(fruit) {
    // Base pattern functions
    const patterns = {
        spiral: (color) => `
            <path d="M50 50 L50 20 A30 30 0 0 1 80 50 A30 30 0 0 1 50 80 A30 30 0 0 1 20 50 A30 30 0 0 1 50 20"
                  fill="none" stroke="${color}" stroke-width="4"/>
        `,
        flame: (color) => `
            <path d="M50 20 Q30 40 40 60 Q45 80 50 80 Q55 80 60 60 Q70 40 50 20"
                  fill="${color}" stroke="white" stroke-width="1"/>
            <path d="M50 30 Q40 45 45 60 Q48 70 50 70 Q52 70 55 60 Q60 45 50 30"
                  fill="white" opacity="0.3"/>
        `,
        geometric: (color) => `
            <path d="M20 20 L80 20 L80 80 L20 80 Z M30 30 L70 30 L70 70 L30 70 Z"
                  fill="${color}" stroke="white" stroke-width="1"/>
        `,
        vortex: (color) => `
            <path d="M50 20 Q80 20 80 50 Q80 80 50 80 Q20 80 20 50 Q20 20 50 20"
                  fill="${color}" stroke="white" stroke-width="1"/>
            <path d="M50 30 Q70 30 70 50 Q70 70 50 70 Q30 70 30 50 Q30 30 50 30"
                  fill="white" opacity="0.2"/>
        `,
        cloud: (color) => `
            <circle cx="40" cy="50" r="20" fill="${color}"/>
            <circle cx="60" cy="50" r="20" fill="${color}"/>
            <circle cx="50" cy="40" r="20" fill="${color}"/>
        `,
        crack: (color) => `
            <path d="M20 20 L80 20 L80 80 L20 80 Z" fill="${color}"/>
            <path d="M30 30 L70 40 L50 80" fill="none" stroke="white" stroke-width="2"/>
            <path d="M70 30 L40 50 L60 80" fill="none" stroke="white" stroke-width="2"/>
        `,
        ray: (color) => `
            <path d="M50 20 L80 50 L50 80 L20 50 Z" fill="${color}"/>
            <path d="M50 30 L70 50 L50 70 L30 50 Z" fill="white" opacity="0.2"/>
        `
    };

    // Get base pattern based on fruit type or name
    let pattern = 'geometric'; // default pattern

    if (fruit.name.includes('Dragon') || fruit.name.includes('Phoenix')) {
        pattern = 'flame';
    } else if (fruit.name.includes('Dark') || fruit.name.includes('Control')) {
        pattern = 'vortex';
    } else if (fruit.name.includes('Smoke') || fruit.name.includes('Gas')) {
        pattern = 'cloud';
    } else if (fruit.name.includes('Quake') || fruit.name.includes('Pain')) {
        pattern = 'crack';
    } else if (fruit.name.includes('Light') || fruit.name.includes('Spirit')) {
        pattern = 'ray';
    } else if (fruit.name.includes('Spin')) {
        pattern = 'spiral';
    }

    return `
        <rect x="10" y="10" width="80" height="80" 
              fill="${fruit.color}" stroke="#ffffff" stroke-width="2"/>
        ${patterns[pattern](fruit.color)}
        <rect x="15" y="15" width="70" height="70" 
              fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    `;
}

function updateMoney(amount) {
    money += amount;
    document.getElementById('money').textContent = money;
    document.getElementById('rollButton').disabled = money < ROLL_COST && !freeRollsEnabled;
}

function rollFruit() {
    if (!freeRollsEnabled && money < ROLL_COST) {
        alert("Not enough money to roll!");
        return;
    }
    
    if (!freeRollsEnabled) {
        updateMoney(-ROLL_COST);
    }
    
    const fruit = document.querySelector('.fruit');
    const result = document.querySelector('.result');
    
    fruit.classList.add('spin');
    result.innerHTML = "Rolling...";
    
    setTimeout(() => {
        const randomRarity = determineRarity();
        const availableFruits = devilFruits.filter(fruit => fruit.rarity === randomRarity);
        const randomFruit = availableFruits[Math.floor(Math.random() * availableFruits.length)];
        
        if (!fruitStats[randomFruit.name]) {
            fruitStats[randomFruit.name] = { totalFound: 0 };
        }
        fruitStats[randomFruit.name].totalFound++;
        
        const fruitSvg = document.querySelector('.fruit');
        fruitSvg.innerHTML = getFruitSVG(randomFruit);
        fruit.classList.remove('spin');
        
        result.innerHTML = `
            <h2>${randomFruit.name}</h2>
            <p>Type: ${randomFruit.type}</p>
            <p>${randomFruit.description}</p>
            <div class="rarity ${randomFruit.rarity}">★ ${randomFruit.rarity} ★</div>
            <p>Value: ฿${randomFruit.value}</p>
        `;

        inventory.push({...randomFruit, id: Date.now()});
        updateInventory();
    }, 2000);
}

function determineRarity() {
    const chances = customRarityChances || rarityChances;
    const rand = Math.random();
    let cumulativeProbability = 0;
    
    for (const [rarity, chance] of Object.entries(chances)) {
        cumulativeProbability += chance;
        if (rand <= cumulativeProbability) {
            return rarity;
        }
    }
    return "Common";
}

function updateInventory() {
    const inventoryDiv = document.getElementById('inventory');
    
    const stackedInventory = inventory.reduce((acc, fruit) => {
        const key = fruit.name;
        if (!acc[key]) {
            acc[key] = {
                ...fruit,
                quantity: 1,
                ids: [fruit.id]
            };
        } else {
            acc[key].quantity++;
            acc[key].ids.push(fruit.id);
        }
        return acc;
    }, {});

    inventoryDiv.innerHTML = Object.values(stackedInventory).map(fruit => `
        <div class="inventory-item">
            <svg class="inventory-fruit" viewBox="0 0 100 100">
                ${getFruitSVG(fruit)}
            </svg>
            <div class="inventory-details">
                <strong>${fruit.name}</strong> ${fruit.quantity > 1 ? `<span class="quantity">x${fruit.quantity}</span>` : ''}
                <div>Type: ${fruit.type}</div>
                <div class="rarity ${fruit.rarity}">★ ${fruit.rarity} ★</div>
                <div>Value: ฿${fruit.value} each</div>
                <div>Total Value: ฿${fruit.value * fruit.quantity}</div>
            </div>
            <div class="inventory-actions">
                <button class="info-button" onclick="showDescription('${fruit.ids[0]}')">Info</button>
                <button onclick="sellFruit('${fruit.name}', 1)">Sell 1 (฿${fruit.value})</button>
                ${fruit.quantity > 1 ? `<button onclick="sellFruit('${fruit.name}', ${fruit.quantity})">Sell All (฿${fruit.value * fruit.quantity})</button>` : ''}
                <button onclick="removeFruit('${fruit.name}', 1)">Discard 1</button>
                ${fruit.quantity > 1 ? `<button onclick="removeFruit('${fruit.name}', ${fruit.quantity})">Discard All</button>` : ''}
            </div>
        </div>
    `).join('');
}

function removeFruit(name, amount) {
    const fruitsToRemove = inventory.filter(f => f.name === name).slice(0, amount);
    const idsToRemove = fruitsToRemove.map(f => f.id);
    inventory = inventory.filter(f => !idsToRemove.includes(f.id));
    updateInventory();
}

function sellFruit(name, amount) {
    const fruitsToSell = inventory.filter(f => f.name === name).slice(0, amount);
    const totalValue = fruitsToSell.reduce((sum, fruit) => sum + fruit.value, 0);
    const idsToRemove = fruitsToSell.map(f => f.id);
    
    updateMoney(totalValue);
    inventory = inventory.filter(f => !idsToRemove.includes(f.id));
    updateInventory();
}

        money: money,
        fruitStats: fruitStats,

    localStorage.setItem('devilFruitGame', JSON.stringify(gameState));
    showSuccessMessage('Game saved successfully!');
}

function loadGame() {
    const savedState = localStorage.getItem('devilFruitGame');
    if (savedState) {
        const gameState = JSON.parse(savedState);
        inventory = gameState.inventory;
        fruitStats = gameState.fruitStats || {};
        gameStats = gameState.gameStats || {
            totalRolls: 0,
            maxMoney: 1000,
            mythicalFound: 0,
            uniqueFruitsFound: 0,
            unlockedAchievements: new Set()
        };
        if (typeof gameStats.unlockedAchievements === 'object' && !Array.isArray(gameStats.unlockedAchievements)) {
            gameStats.unlockedAchievements = new Set(Object.values(gameStats.unlockedAchievements));
        }
        updateMoney(gameState.money - money);
        updateInventory();
        updateAchievements();
        showSuccessMessage('Game loaded successfully!');
    } else {
        showSuccessMessage('No saved game found!', false);
    }
}

    } else if (event.target === rarityModal) {
        closeRarityModal();
    }
}

        showSuccessMessage(`Added ฿${amount} successfully!`);
    } else {
        alert('Please enter a valid amount!');
    }
}

function adminAddMoney(amount) {
    updateMoney(amount);
    showSuccessMessage(`Added ฿${amount} successfully!`);
}

function adminAddAllFruits() {

function adminResetStats() {
    if (confirm('Are you sure you want to reset all stats?')) {

        showSuccessMessage('Stats reset successfully!');
    }
}

function toggleFreeRolls() {
    freeRollsEnabled = !freeRollsEnabled;
    const button = document.getElementById('freeRollsButton');
    button.textContent = freeRollsEnabled ? 'Disable Free Rolls' : 'Enable Free Rolls';
    showSuccessMessage(freeRollsEnabled ? 'Free rolls enabled!' : 'Free rolls disabled!');
    document.getElementById('rollButton').disabled = false;
}

function showRarityModal() {
    const modal = document.getElementById('rarityModal');
    modal.style.display = 'flex';
    
    // Set current values
    document.getElementById('mythicalChance').value = customRarityChances?.Mythical || rarityChances.Mythical;
    document.getElementById('legendaryChance').value = customRarityChances?.Legendary || rarityChances.Legendary;
    document.getElementById('rareChance').value = customRarityChances?.Rare || rarityChances.Rare;
    document.getElementById('uncommonChance').value = customRarityChances?.Uncommon || rarityChances.Uncommon;
    document.getElementById('commonChance').value = customRarityChances?.Common || rarityChances.Common;
}

function applyRarityChanges() {
    const total = [
        'mythicalChance',
        'legendaryChance',
        'rareChance',
        'uncommonChance',
        'commonChance'
    ].reduce((sum, id) => sum + parseFloat(document.getElementById(id).value), 0);

    if (Math.abs(total - 1) > 0.01) {
        alert('The probabilities must sum to 1 (100%)!');
        return;
    }

    customRarityChances = {
        Mythical: parseFloat(document.getElementById('mythicalChance').value),
        Legendary: parseFloat(document.getElementById('legendaryChance').value),
        Rare: parseFloat(document.getElementById('rareChance').value),
        Uncommon: parseFloat(document.getElementById('uncommonChance').value),
        Common: parseFloat(document.getElementById('commonChance').value)
    };
    showSuccessMessage('Rarity chances updated successfully!');
    closeRarityModal();
}

function resetRarityChanges() {
    customRarityChances = null;
    document.getElementById('mythicalChance').value = rarityChances.Mythical;
    document.getElementById('legendaryChance').value = rarityChances.Legendary;
    document.getElementById('rareChance').value = rarityChances.Rare;
    document.getElementById('uncommonChance').value = rarityChances.Uncommon;
    document.getElementById('commonChance').value = rarityChances.Common;
    showSuccessMessage('Rarity chances reset to default!');
}

function closeRarityModal() {
    const modal = document.getElementById('rarityModal');
    modal.style.display = 'none';
}

function showSuccessMessage(message, isSuccess = true) {
    const successMessage = document.getElementById('successMessage');
    successMessage.textContent = message;
    successMessage.style.background = isSuccess ? 'rgba(46, 204, 113, 0.9)' : 'rgba(231, 76, 60, 0.9)';
    successMessage.classList.add('show');
    
    setTimeout(() => {
        successMessage.classList.remove('show');
    }, 3000);
}
</script>
