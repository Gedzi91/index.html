<!DOCTYPE html><html><head><base href="https://demosite.com/retro-emulator/"><title>KAIJU APOCALYPSE - Émulateur de Jeu Vidéo Rétro</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body {
    font-family: 'Press Start 2P', cursive;
    background-color: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
}

.emulator {
    width: 640px;
    height: 480px;
    background-color: #222;
    border: 10px solid #444;
    border-radius: 20px;
    position: relative;
    overflow: hidden;
}

.screen {
    width: 100%;
    height: 100%;
    background-color: #131313;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    position: absolute;
    top: 0;
    left: 0;
    transition: transform 0.5s ease;
}

#mainScreen {
    z-index: 2;
}

#gameScreen {
    z-index: 1;
    transform: translateX(100%);
    background-color: #0a0a0a; /* Sol très foncé */
}

.title {
    font-size: 36px;
    color: #ff0000;
    text-shadow: 3px 3px #ff00ff, -3px -3px #00ffff;
    margin-bottom: 40px;
    animation: pulse 2s infinite;
    text-align: center;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.button {
    background-color: #f00;
    border: none;
    color: white;
    padding: 15px 32px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 4px 2px;
    cursor: pointer;
    border-radius: 12px;
    font-family: 'Press Start 2P', cursive;
    transition: all 0.3s ease;
}

.button:hover {
    background-color: #ff5555;
    transform: scale(1.1);
}

.human {
    position: absolute;
    width: 4px;
    height: 4px;
    background-color: #fff;
    border-radius: 50%;
    z-index: 10;
    transition: background-color 0.1s;
}

.human.burning {
    animation: burning 0.2s infinite alternate;
}

.human.dead {
    background-color: #808080;
}

@keyframes burning {
    0% { background-color: #fff; }
    100% { background-color: #ff0000; }
}

.building {
    position: absolute;
    width: 30px;
    height: 50px;
    background-color: #333;
    border: 2px solid #444;
    z-index: 20;
    transition: filter 5s linear;
}

.window {
    position: absolute;
    width: 6px;
    height: 6px;
    background-color: #111;
}

.window.lit {
    background-color: #ffff99;
    box-shadow: 0 0 5px #ffff99;
}

.collision-box {
    position: absolute;
    background-color: rgba(255, 0, 0, 0.1);
    z-index: 15;
}

#drawingFrame {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90px;
    height: 120px;
    background-color: #333;
    display: none;
    z-index: 30;
    border: 2px solid #666;
}

#drawingCanvas {
    width: 100%;
    height: 100%;
}

#dialogBox {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background-color: #444;
    padding: 10px;
    border-radius: 5px;
    text-align: center;
    display: none;
    z-index: 31;
    font-size: 12px;
    width: 80%;
    max-width: 400px;
}

#undoButton, #okButton {
    margin-top: 5px;
    padding: 3px 6px;
    font-size: 10px;
}

#kaiju {
    position: absolute;
    display: none;
    z-index: 25;
}

.fireball {
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: #ff4500;
    border-radius: 50%;
    z-index: 24;
}

#scoreDisplay {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 16px;
    z-index: 40;
}

@keyframes burn {
    0% { opacity: 1; }
    100% { opacity: 0; transform: scale(0.5) rotate(360deg); }
}

@keyframes collapse {
    0% { transform: translateY(0); filter: brightness(1); }
    100% { transform: translateY(100%); filter: brightness(0.5); }
}

@keyframes glitch {
    0% { transform: translate(2px, 2px); }
    25% { transform: translate(-2px, -2px); }
    50% { transform: translate(-2px, 2px); }
    75% { transform: translate(2px, -2px); }
    100% { transform: translate(2px, 2px); }
}

.glitch {
    animation: glitch 0.1s infinite;
}

.flame {
    position: absolute;
    width: 5px;
    height: 10px;
    background-color: #ff4500;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    z-index: 23;
}

@keyframes flameAnimation {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(30px) scale(0.5); opacity: 0; }
}

.ruins {
    position: absolute;
    width: 30px;
    height: 10px;
    background-color: #555;
    border-radius: 2px;
    z-index: 19;
}

.human-a, .human-b, .human-c, .human-d {
    background-color: #ffffff;
}

.bullet {
    position: absolute;
    width: 2px;
    height: 2px;
    background-color: #ffff00;
    border-radius: 50%;
    z-index: 26;
}

</style>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet">
</head>
<body>
<div class="emulator">
    <div class="screen" id="mainScreen">
    <h1 class="title" style="text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #fff, 0 0 40px #ff00de, 0 0 70px #ff00de, 0 0 80px #ff00de, 0 0 100px #ff00de, 0 0 150px #ff00de;">
        <span style="font-size: 2.5em; display: block; font-family: 'Arial', sans-serif; animation: glow 1.5s ease-in-out infinite alternate, shake 0.82s cubic-bezier(.36,.07,.19,.97) both; color: white;">KAIJU</span>
        <span style="font-size: 0.7em; letter-spacing: 0.2em; display: block; margin-top: 20px; font-family: Arial, sans-serif; color: white;">a p o c a l y p s e</span>
    </h1>
    <button id="startButton" class="button">START</button>
</div>
    <div class="screen" id="gameScreen">
    <div id="drawingFrame">
        <canvas id="drawingCanvas"></canvas>
    </div>
    <div id="dialogBox">
        <p>Draw your kaiju, facing right, with your mouse</p>
        <button id="undoButton">Undo</button>
        <button id="okButton">OK</button>
    </div>
    <img id="kaiju" src="" alt="Player's drawn Kaiju">
    <div id="scoreDisplay">Score: 0</div>
</div>
</div>

<script>
const mainScreen = document.getElementById('mainScreen');
const gameScreen = document.getElementById('gameScreen');
const startButton = document.getElementById('startButton');
const drawingFrame = document.getElementById('drawingFrame');
const drawingCanvas = document.getElementById('drawingCanvas');
const dialogBox = document.getElementById('dialogBox');
const undoButton = document.getElementById('undoButton');
const okButton = document.getElementById('okButton');
const kaijuImg = document.getElementById('kaiju');
const scoreDisplay = document.getElementById('scoreDisplay');

let gameStarted = false;
let score = 0;
let humans = [];
let buildings = [];
let collisionBoxes = [];
let ctx;
let isDrawing = false;
let lines = [];
let currentLine = [];
let kaijuWidth = 90;
let kaijuHeight = 120;
let kaijuX = 320 - kaijuWidth / 2;
let kaijuY = 240 - kaijuHeight / 2;
let kaijuSpeed = 3;
let flames = [];
let isBreatheFireActive = false;
let kaijuBoundingBox = { x: 0, y: 0, width: 0, height: 0 };
let pressedKeys = new Set();
let bullets = [];

startButton.addEventListener('click', () => {
    if (!gameStarted) {
        startGame();
    }
});

function startGame() {
    gameStarted = true;
    score = 0;
    updateScore();
    gameScreen.innerHTML = ''; // Écran de jeu vide
    gameScreen.appendChild(drawingFrame);
    gameScreen.appendChild(dialogBox);
    gameScreen.appendChild(kaijuImg);
    gameScreen.appendChild(scoreDisplay);
    
    // Transition to game screen
    mainScreen.style.transform = 'translateX(-100%)';
    gameScreen.style.transform = 'translateX(0)';
    
    gameScreen.classList.add('glitch');
    setTimeout(() => {
        gameScreen.classList.remove('glitch');
    }, 500);

    createBuildings();
    createHumans();
    animateHumans();

    setTimeout(() => {
        drawingFrame.style.display = 'block';
        dialogBox.style.display = 'block';
        initDrawing();
    }, 5000);
}

function initDrawing() {
    ctx = drawingCanvas.getContext('2d');
    drawingCanvas.width = 90;
    drawingCanvas.height = 120;
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    drawingCanvas.addEventListener('mousedown', startDrawing);
    drawingCanvas.addEventListener('mousemove', draw);
    drawingCanvas.addEventListener('mouseup', stopDrawing);
    drawingCanvas.addEventListener('mouseout', stopDrawing);

    undoButton.addEventListener('click', undoLastLine);
    okButton.addEventListener('click', finishDrawing);
}

function startDrawing(e) {
    isDrawing = true;
    draw(e);
}

function draw(e) {
    if (!isDrawing) return;
    const rect = drawingCanvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    currentLine.push({x, y});
    
    ctx.beginPath();
    ctx.moveTo(currentLine[currentLine.length - 2].x, currentLine[currentLine.length - 2].y);
    ctx.lineTo(x, y);
    ctx.stroke();
}

function stopDrawing() {
    if (isDrawing) {
        lines.push([...currentLine]);
        currentLine = [];
        isDrawing = false;
    }
}

function undoLastLine() {
    if (lines.length > 0) {
        lines.pop();
        redrawCanvas();
    }
}

function redrawCanvas() {
    ctx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
    lines.forEach(line => {
        ctx.beginPath();
        ctx.moveTo(line[0].x, line[0].y);
        line.forEach(point => {
            ctx.lineTo(point.x, point.y);
        });
        ctx.stroke();
    });
}

function finishDrawing() {
    const kaijuDataURL = drawingCanvas.toDataURL();
    kaijuImg.src = kaijuDataURL;
    kaijuImg.style.display = 'block';
    kaijuImg.style.left = kaijuX + 'px';
    kaijuImg.style.top = kaijuY + 'px';
    kaijuImg.style.width = kaijuWidth + 'px';
    kaijuImg.style.height = kaijuHeight + 'px';
    drawingFrame.style.display = 'none';
    dialogBox.style.display = 'none';
    
    // Calculer la bounding box du kaiju
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    lines.forEach(line => {
        line.forEach(point => {
            minX = Math.min(minX, point.x);
            minY = Math.min(minY, point.y);
            maxX = Math.max(maxX, point.x);
            maxY = Math.max(maxY, point.y);
        });
    });
    
    kaijuBoundingBox = {
        x: minX,
        y: minY,
        width: maxX - minX,
        height: maxY - minY
    };
    
    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup', handleKeyUp);
    requestAnimationFrame(gameLoop);
    setInterval(fireHumanABullets, 2000);
}

function handleKeyDown(e) {
    pressedKeys.add(e.key);
    if (e.key === ' ' && !isBreatheFireActive) {
        isBreatheFireActive = true;
        breatheFire();
    }
}

function handleKeyUp(e) {
    pressedKeys.delete(e.key);
    if (e.key === ' ') {
        isBreatheFireActive = false;
    }
}

function gameLoop() {
    moveKaiju();
    moveBullets();
    requestAnimationFrame(gameLoop);
}

function moveKaiju() {
    let dx = 0;
    let dy = 0;

    if (pressedKeys.has('ArrowLeft')) dx -= kaijuSpeed;
    if (pressedKeys.has('ArrowRight')) dx += kaijuSpeed;
    if (pressedKeys.has('ArrowUp')) dy -= kaijuSpeed;
    if (pressedKeys.has('ArrowDown')) dy += kaijuSpeed;

    // Normaliser le mouvement diagonal
    if (dx !== 0 && dy !== 0) {
        const factor = kaijuSpeed / Math.sqrt(2);
        dx = dx > 0 ? factor : -factor;
        dy = dy > 0 ? factor : -factor;
    }

    let newX = Math.max(0, Math.min(640 - kaijuWidth, kaijuX + dx));
    let newY = Math.max(0, Math.min(480 - kaijuHeight, kaijuY + dy));

    // Vérifier les collisions avec les bâtiments
    if (!checkBuildingCollision(newX, newY)) {
        kaijuX = newX;
        kaijuY = newY;
        kaijuImg.style.left = kaijuX + 'px';
        kaijuImg.style.top = kaijuY + 'px';
    }

    // Mettre à jour l'orientation du kaiju
    if (dx < 0) {
        kaijuImg.style.transform = 'scaleX(-1)';
    } else if (dx > 0) {
        kaijuImg.style.transform = 'scaleX(1)';
    }
}

function checkBuildingCollision(x, y) {
    const kaijuLeft = x + kaijuBoundingBox.x;
    const kaijuTop = y + kaijuBoundingBox.y;
    const kaijuRight = kaijuLeft + kaijuBoundingBox.width;
    const kaijuBottom = kaijuTop + kaijuBoundingBox.height;

    for (let box of collisionBoxes) {
        if (kaijuLeft < box.x + box.width &&
            kaijuRight > box.x &&
            kaijuTop < box.y + box.height &&
            kaijuBottom > box.y) {
            return true; // Collision détectée
        }
    }
    return false; // Pas de collision
}

function breatheFire() {
    if (!isBreatheFireActive) return;

    const flameCount = 10;
    const flameWidth = kaijuWidth;
    const direction = kaijuImg.style.transform === 'scaleX(-1)' ? -1 : 1;

    for (let i = 0; i < flameCount; i++) {
        const flame = document.createElement('div');
        flame.classList.add('flame');
        const flameX = kaijuX + kaijuBoundingBox.x + (direction === 1 ? kaijuBoundingBox.width : 0);
        const flameY = kaijuY + kaijuBoundingBox.y;
        flame.style.left = flameX + 'px';
        flame.style.top = flameY + 'px';
        flame.style.animation = `flameAnimation ${0.5 + Math.random() * 0.5}s linear`;
        gameScreen.appendChild(flame);

        const flameObj = {
            element: flame,
            x: flameX,
            y: flameY,
            vx: (Math.random() * 2 + 3) * direction,
            vy: -Math.random() * 2 - 1
        };

        flames.push(flameObj);

        flame.addEventListener('animationend', () => {
            gameScreen.removeChild(flame);
            flames = flames.filter(f => f !== flameObj);
        });
    }

    setTimeout(() => {
        if (isBreatheFireActive) breatheFire();
    }, 100);
}

function animateFlames() {
    flames.forEach(flame => {
        flame.x += flame.vx;
        flame.y += flame.vy;
        flame.vy += 0.1; // Gravité

        // Vérifier les collisions avec les bâtiments
        buildings.forEach((building, index) => {
            if (flame.x < building.x + 30 &&
                flame.x + 5 > building.x &&
                flame.y < building.y + 50 &&
                flame.y + 10 > building.y) {
                // Rebondir sur le bâtiment
                flame.vx *= -0.5;
                flame.vy *= -0.5;
                
                // Commencer à brûler le bâtiment
                if (!building.burning) {
                    burnBuilding(index);
                }
            }
        });

        flame.element.style.left = flame.x + 'px';
        flame.element.style.top = flame.y + 'px';

        // Vérifier les collisions avec les humains
        humans.forEach((human, index) => {
            if (flame.x < human.x + 4 &&
                flame.x + 5 > human.x &&
                flame.y < human.y + 4 &&
                flame.y + 10 > human.y) {
                burnHuman(index);
            }
        });
    });

    requestAnimationFrame(animateFlames);
}

function burnBuilding(index) {
    const building = buildings[index];
    if (!building.burning) {
        building.burning = true;
        building.element.style.animation = 'none';
        building.element.style.transition = 'filter 5s linear';
        building.element.style.filter = 'brightness(2) sepia(1) hue-rotate(-50deg) saturate(200%)';
        
        // Faire sortir les humains du bâtiment
        for (let i = 0; i < 50; i++) {
            setTimeout(() => {
                createHuman(building.x, building.y + 50);
            }, Math.random() * 5000);
        }
        
        setTimeout(() => {
            destroyBuilding(index);
        }, 5000);
    }
}

function destroyBuilding(index) {
    const building = buildings[index];
    building.element.style.animation = 'collapse 1s forwards';
    setTimeout(() => {
        gameScreen.removeChild(building.element);
        
        // Créer des ruines
        const ruins = document.createElement('div');
        ruins.classList.add('ruins');
        ruins.style.left = building.x + 'px';
        ruins.style.top = (building.y + 40) + 'px';
        gameScreen.appendChild(ruins);
        
        buildings.splice(index, 1);
        collisionBoxes.splice(index, 1);
    }, 1000);
    score += 100;
    updateScore();
}

function burnHuman(index) {
    const human = humans[index];
    if (!human.burning && !human.dead) {
        human.burning = true;
        human.element.classList.add('burning');
        
        // Changements rapides de trajectoire pendant 5 secondes
        const changeDirectionInterval = setInterval(() => {
            human.vx = (Math.random() - 0.5) * 4; // Vitesse plus élevée
            human.vy = (Math.random() - 0.5) * 4;
        }, 200);
        
        setTimeout(() => {
            clearInterval(changeDirectionInterval);
            human.burning = false;
            human.dead = true;
            human.element.classList.remove('burning');
            human.element.classList.add('dead');
            human.vx = 0;
            human.vy = 0;
        }, 5000);
        
        score += 10;
        updateScore();
    }
}

function updateScore() {
    scoreDisplay.textContent = `Score: ${score}`;
}

function createBuildings() {
    const centerX = 320;
    const centerY = 240;
    const minDistance = 100; // Distance minimale du centre
    const minDistanceBetween = 80; // Distance minimale entre les bâtiments

    for (let i = 0; i < 12; i++) {
        let x, y, tooClose;
        do {
            x = Math.random() * 580 + 30; // 30px de marge sur les bords
            y = Math.random() * 400 + 30; // 30px de marge sur les bords
            
            // Vérifier la distance par rapport au centre
            const distanceToCenter = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));
            
            // Vérifier la distance par rapport aux autres bâtiments
            tooClose = buildings.some(building => {
                const distance = Math.sqrt(Math.pow(x - building.x, 2) + Math.pow(y - building.y, 2));
                return distance < minDistanceBetween;
            });
            
        } while (tooClose || Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2)) < minDistance);

        const building = document.createElement('div');
        building.classList.add('building');
        building.style.left = x + 'px';
        building.style.top = y + 'px';
        
        // Ajouter des fenêtres
        for (let j = 0; j < 12; j++) {
            const window = document.createElement('div');
            window.classList.add('window');
            window.style.left = (j % 3) * 8 + 4 + 'px';
            window.style.top = Math.floor(j / 3) * 8 + 4 + 'px';
            if (Math.random() < 0.4) { // 40% de chance d'être allumée
                window.classList.add('lit');
            }
            building.appendChild(window);
        }

        gameScreen.appendChild(building);
        buildings.push({ x, y, element: building, burning: false });

        // Créer la boîte de collision
        const collisionBox = document.createElement('div');
        collisionBox.classList.add('collision-box');
        collisionBox.style.width = '30px';
        collisionBox.style.height = '30px';
        collisionBox.style.left = x + 'px';
        collisionBox.style.top = (y + 20) + 'px';
        gameScreen.appendChild(collisionBox);
        collisionBoxes.push({
            x: x,
            y: y + 20,
            width: 30,
            height: 30
        });
    }
}

function createHumans() {
    for (let i = 0; i < 50; i++) {
        createHuman(Math.random() * 640, Math.random() * 480);
    }
}

function createHuman(x, y) {
    const human = document.createElement('div');
    human.classList.add('human');
    
    // Déterminer le type d'humain
    const randomValue = Math.random() * 100;
    let humanType;
    if (randomValue < 5) {
        humanType = 'a';
    } else if (randomValue < 7) {
        humanType = 'b';
    } else if (randomValue < 8) {
        humanType = 'c';
    } else {
        humanType = 'd';
    }
    
    human.classList.add(`human-${humanType}`);
    human.style.left = x + 'px';
    human.style.top = y + 'px';
    gameScreen.appendChild(human);
    
    humans.push({
        element: human,
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 1.5,
        vy: (Math.random() - 0.5) * 1.5,
        lastChangeTime: 0,
        burning: false,
        dead: false,
        type: humanType
    });
}

function animateHumans() {
    const now = Date.now();
    humans.forEach(human => {
        if (!human.dead) {
            if (!human.burning) {
                // Fuite du kaiju seulement si l'humain n'est pas en train de brûler
                const dx = human.x - (kaijuX + kaijuWidth / 2);
                const dy = human.y - (kaijuY + kaijuHeight / 2);
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 100) {
                    human.vx = dx / distance;
                    human.vy = dy / distance;
                }
            }
            
            const newX = human.x + human.vx;
            const newY = human.y + human.vy;

            // Vérifier les collisions avec les bâtiments et les boîtes de collision
            let collision = false;
            for (let box of collisionBoxes) {
                if (newX > box.x && newX < box.x + box.width &&
                    newY > box.y && newY < box.y + box.height) {
                    collision = true;
                    break;
                }
            }

            if (!collision) {
                human.x = newX;
                human.y = newY;
            } else {
                // En cas de collision, inverser la direction
                human.vx *= -1;
                human.vy *= -1;
            }

            if (human.x < 0 || human.x > 640) human.vx *= -1;
            if (human.y < 0 || human.y > 480) human.vy *= -1;

            // Changer de trajectoire aléatoirement seulement si l'humain n'est pas en train de brûler
            if (!human.burning && now - human.lastChangeTime > 1000 + Math.random() * 2000) {
                human.vx = (Math.random() - 0.5) * 1.5;
                human.vy = (Math.random() - 0.5) * 1.5;
                human.lastChangeTime = now;
            }

            human.element.style.left = human.x + 'px';
            human.element.style.top = human.y + 'px';
        }
    });

    requestAnimationFrame(animateHumans);
}

function fireHumanABullets() {
    humans.forEach(human => {
        if (human.type === 'a' && !human.dead && !human.burning) {
            const bullet = document.createElement('div');
            bullet.classList.add('bullet');
            bullet.style.left = human.x + 'px';
            bullet.style.top = human.y + 'px';
            gameScreen.appendChild(bullet);

            const dx = kaijuX + kaijuWidth / 2 - human.x;
            const dy = kaijuY + kaijuHeight / 2 - human.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const speed = 5; // Vitesse de la balle

            bullets.push({
                element: bullet,
                x: human.x,
                y: human.y,
                vx: (dx / distance) * speed,
                vy: (dy / distance) * speed
            });
        }
    });
}

function moveBullets() {
    bullets.forEach((bullet, index) => {
        bullet.x += bullet.vx;
        bullet.y += bullet.vy;
        
        bullet.element.style.left = bullet.x + 'px';
        bullet.element.style.top = bullet.y + 'px';

        // Vérifier la collision avec le kaiju
        if (bullet.x > kaijuX && bullet.x < kaijuX + kaijuWidth &&
            bullet.y > kaijuY && bullet.y < kaijuY + kaijuHeight) {
            // Le kaiju est touché !
            gameScreen.removeChild(bullet.element);
            bullets.splice(index, 1);
            // Ajouter ici la logique pour endommager le kaiju
        }

        // Supprimer la balle si elle sort de l'écran
        if (bullet.x < 0 || bullet.x > 640 || bullet.y < 0 || bullet.y > 480) {
            gameScreen.removeChild(bullet.element);
            bullets.splice(index, 1);
        }
    });
}

animateFlames();
</script>
</body></html>
