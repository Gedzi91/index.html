function spawnUpgrade() {

function movePlayer() {
  const speed = 5 * playerStats.speed;
  if (keys['w'] && playerY > 0) playerY -= speed;
  if (keys['s'] && playerY < 550) playerY += speed;
  if (keys['a'] && playerX > 0) playerX -= speed;
  if (keys['d'] && playerX < 750) playerX += speed;
  player.style.left = playerX + 'px';
  player.style.top = playerY + 'px';
  room.send({
    type: "playerMove",
    x: playerX,
    y: playerY
  });
}
function shootProjectile() {
  if (!gameActive) return;
  const createSingleProjectile = (angleOffset = 0) => {
    const projectile = document.createElement('div');
    projectile.className = 'projectile';
    projectile.style.left = playerX + 25 + 'px';
    projectile.style.top = playerY + 25 + 'px';
    gameContainer.appendChild(projectile);
    let baseDamage;
    switch (currentPhase) {
      case 1:
        baseDamage = 5;
        break;
      case 2:
        baseDamage = 3;
        break;
      case 3:
        baseDamage = 2;
        break;
      case 4:
        baseDamage = 2;
        break;
      case 5:
        baseDamage = 2;
        break;
      case 6:
        baseDamage = 2;
        break;
      case 7:
        baseDamage = 3;
        break;
      case 8:
        baseDamage = 1;
        break;
      default:
        baseDamage = 1;
    }
    const angle = angleOffset * (Math.PI / 8);
    projectiles.push({
      element: projectile,
      x: playerX + 25,
      y: playerY + 25,
      damage: baseDamage,
      angle: angle
    });
    room.send({
      type: "playerShoot",
      x: playerX + 25,
      y: playerY + 25,
      damage: baseDamage,
      angle: angle
    });
  };
  if (hasTripleShot) {
    createSingleProjectile(-1);
    createSingleProjectile(0);
    createSingleProjectile(1);
  } else {
    createSingleProjectile(0);
  }
}

function checkCollision(projectile, target) {
  if (!projectile || !target) {
    return false;
  }
  if (!projectile.element || !(projectile.element instanceof HTMLElement)) {
    return false;
  }
  let targetElement;
  if (target.element) {
    targetElement = target.element;
  } else if (target instanceof HTMLElement) {
    targetElement = target;
  } else {
    return false;
  }
  const projectileRect = projectile.element.getBoundingClientRect();
  const targetRect = targetElement.getBoundingClientRect();
  return !(projectileRect.right < targetRect.left || projectileRect.left > targetRect.right || projectileRect.bottom < targetRect.top || projectileRect.top > targetRect.bottom);
}
function updateProjectiles() {

    const speed = 10;
    if (projectile.angle !== undefined) {
      projectile.x += Math.cos(projectile.angle) * speed;
      projectile.y += Math.sin(projectile.angle) * speed;

function checkUpgradeCollisions() {
  const magnetRange = 150;
  const magnetSpeed = 5;
  for (let i = upgrades.length - 1; i >= 0; i--) {
    const upgrade = upgrades[i];
    const upgradeX = parseFloat(upgrade.element.style.left);
    const upgradeY = parseFloat(upgrade.element.style.top);
    const dx = playerX - upgradeX;
    const dy = playerY - upgradeY;
    const distance = Math.sqrt(dx * dx + dy * dy);
    if (playerStats.magnetic && distance < magnetRange) {
      const moveX = dx / distance * magnetSpeed;
      const moveY = dy / distance * magnetSpeed;
      upgrade.element.style.left = upgradeX + moveX + 'px';
      upgrade.element.style.top = upgradeY + moveY + 'px';
    }
    if (checkCollision({
      element: player
    }, upgrade.element)) {
      room.send({
        type: "upgradeCollected",
        upgradeId: upgrade.id,
        collectingPlayer: room.party.client.id
      });
      upgrade.type.effect();
      upgrade.element.remove();
      upgrades.splice(i, 1);

      effect.style.position = 'absolute';

room.onmessage = event => {
  const data = event.data;
  switch (data.type) {
    case "connected":

        const newPlayer = spawnPlayer(data.clientId, 50, 500);
        otherPlayers.set(data.clientId, {
          element: newPlayer,
          x: 50,
          y: 500
        });
      }

    case "disconnected":
      if (otherPlayers.has(data.clientId)) {
        otherPlayers.get(data.clientId).element.remove();
        otherPlayers.delete(data.clientId);
      }
      break;
    case "playerMove":
      if (data.clientId !== room.party.client.id && otherPlayers.has(data.clientId)) {
        const playerData = otherPlayers.get(data.clientId);
        playerData.x = data.x;
        playerData.y = data.y;

        playerData.element.style.top = data.y + 'px';

          damage: data.damage

      createUpgradeElement(data.upgrade);
      break;
    case "upgradeCollected":
      const collectedUpgrade = upgrades.find(u => u.id === data.upgradeId);

          const collector = otherPlayers.get(data.collectingPlayer);
