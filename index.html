<html><head><base href="https://potioncraft.alchemistsimulator.com/">
<title>Potion Craft: Pixel Alchemist Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat&display=swap');

@font-face {
    font-family: 'PixelFont';
    src: url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
}

body {
    font-family: 'PixelFont', monospace;
    background-color: #3a2f2d;
    color: #f8e8b0;
    margin: 0;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 12px;
    line-height: 1.6;
    image-rendering: pixelated;
}

h1, h2 {
    text-align: center;
    text-shadow: 2px 2px #2c2420;
}

#game-container {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 600px;
    perspective: 1000px;
}

#cauldron, #quest-log {
    background-color: #4a3c38;
    border: 4px solid #2c2420;
    padding: 10px;
    margin: 10px 0;
    border-radius: 0;
    box-shadow: 4px 4px 0 #2c2420;
}

#cauldron {
    transform: rotateX(10deg);
    transition: transform 0.3s;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%238B4513"/><rect y="0" width="100" height="10" fill="%23A0522D"/><rect y="20" width="100" height="10" fill="%23A0522D"/><rect y="40" width="100" height="10" fill="%23A0522D"/><rect y="60" width="100" height="10" fill="%23A0522D"/><rect y="80" width="100" height="10" fill="%23A0522D"/></svg>');
    background-size: 50px 50px;
}

#cauldron:hover {
    transform: rotateX(5deg) translateY(-5px);
}

#inventory {
    background-color: #8b4513;
    border: 4px solid #5e2c0b;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    box-shadow: 4px 4px 0 #2c2420;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%238b4513"/><path d="M0 20 L100 20 L100 25 L0 25 Z" fill="%235e2c0b"/><path d="M0 50 L100 50 L100 55 L0 55 Z" fill="%235e2c0b"/><path d="M0 80 L100 80 L100 85 L0 85 Z" fill="%235e2c0b"/></svg>');
    background-size: 50px 50px;
}

#shop {
    background-color: #d2b48c;
    border: 4px solid #a0522d;
    padding: 10px;
    margin: 10px 0;
    border-radius: 0;
    box-shadow: 4px 4px 0 #2c2420;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23d2b48c"/><path d="M0 0 L100 0 L90 10 L10 10 Z" fill="%23a0522d"/><path d="M0 100 L100 100 L90 90 L10 90 Z" fill="%23a0522d"/></svg>');
    background-size: cover;
}

#recipe-book {
    background-color: #f0e6d2;
    border: 4px solid #8b4513;
    padding: 20px;
    margin: 10px 0;
    border-radius: 0;
    box-shadow: 4px 4px 0 #2c2420;
    color: #3a2f2d;
    max-width: 500px;
    position: relative;
    overflow: hidden;
}

#recipe-book::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: 
        linear-gradient(to right, #e0d8c0 1px, transparent 1px),
        linear-gradient(to bottom, #e0d8c0 1px, transparent 1px);
    background-size: 20px 20px;
    opacity: 0.3;
    pointer-events: none;
}

.recipe-page {
    background-color: #fff9e6;
    border: 2px solid #d2b48c;
    padding: 15px;
    margin-bottom: 20px;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
}

.recipe-title {
    font-size: 20px;
    color: #8b4513;
    margin-bottom: 10px;
    text-align: center;
    text-decoration: underline;
    font-family: 'Caveat', cursive;
}

.recipe-content {
    font-size: 16px;
    color: #3a2f2d;
    font-family: 'Caveat', cursive;
}

.recipe-navigation {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.nav-button {
    background-color: #8b4513;
    color: #f8e8b0;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    font-family: 'PixelFont', monospace;
    font-size: 12px;
}

.nav-button:hover {
    background-color: #a0522d;
}

.plant, .plot {
    background-color: #a3c585;
    border: 2px solid #7a9c5c;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 0;
    font-size: 10px;
}

.plant:hover, .plant:active, .plot:hover, .plot:active {
    background-color: #b8d4a0;
    transform: scale(1.05);
}

.plot {
    height: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transform: perspective(500px) rotateX(10deg);
    transition: all 0.3s;
    position: relative;
}

.plot:hover {
    transform: perspective(500px) rotateX(10deg) translateY(-5px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.3);
}

.plot-empty {
    background-color: #c9ae8e;
}

.plot-growing {
    background-color: #a3c585;
}

.plot-ready {
    background-color: #f0e68c;
    color: #000000;
}

.plant-icon {
    width: 40px;
    height: 40px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

#brew-button, .plant-button, #complete-quest-button, .buy-button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 14px;
    background-color: #8b4513;
    color: #f8e8b0;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 0;
    font-family: 'PixelFont', monospace;
    box-shadow: 4px 4px 0 #2c2420;
}

#brew-button {
    display: block;
    margin-left: auto;
    margin-right: auto;
}

#brew-button:hover, #brew-button:active, .plant-button:hover, .plant-button:active, #complete-quest-button:hover, #complete-quest-button:active, .buy-button:hover, .buy-button:active {
    background-color: #a0522d;
    transform: translateY(2px);
    box-shadow: 2px 2px 0 #2c2420;
}

#result {
    margin-top: 20px;
    font-weight: bold;
    text-align: center;
    padding: 10px;
    border-radius: 0;
    background-color: #5a4d41;
    box-shadow: 4px 4px 0 #2c2420;
}

#tabs {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    width: 100%;
}

.tab {
    flex: 1;
    padding: 10px;
    background-color: #5a4d41;
    border: 2px solid #2c2420;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    font-size: 10px;
}

.tab.active {
    background-color: #8b4513;
    color: #f8e8b0;
}

.tab:hover, .tab:active {
    background-color: #6b5a4b;
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

#gold-display {
    font-size: 1.2em;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 1px 1px 2px #000;
    margin-bottom: 10px;
    text-align: center;
}

#ingredients {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
}

.ingredient {
    padding: 5px 10px;
    background-color: #6b5a4b;
    color: #f8e8b0;
    border-radius: 0;
    font-size: 0.9em;
    box-shadow: 2px 2px 0 #2c2420;
}

.cauldron-svg {
    width: 200px;
    height: 200px;
    margin: 0 auto 10px;
    display: block;
}

.cauldron-svg .cauldron-body {
    fill: #2c2420;
}

.cauldron-svg .cauldron-highlight {
    fill: #4a3c38;
}

.cauldron-svg .potion {
    fill: #7cfc00;
    transition: fill 0.5s;
}

@keyframes bubble {
    0% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
    100% { transform: translateY(0); }
}

.bubble {
    fill: rgba(255, 255, 255, 0.6);
    animation: bubble 2s infinite steps(4);
}

#inventory-list, #shop-list, #upgrades-list {
    list-style-type: none;
    padding: 0;
}

#inventory-list li, #shop-list li, #upgrades-list li {
    margin-bottom: 10px;
    background-color: rgba(255, 255, 255, 0.1);
    padding: 5px;
    border-radius: 5px;
}

#inventory-list button, #shop-list button, #upgrades-list button {
    background-color: #5a4d41;
    color: #f8e8b0;
    border: none;
    padding: 5px 10px;
    margin-left: 10px;
    cursor: pointer;
    font-family: 'PixelFont', monospace;
    font-size: 10px;
    box-shadow: 2px 2px 0 #2c2420;
}

#inventory-list button:hover, #inventory-list button:active, 
#shop-list button:hover, #shop-list button:active,
#upgrades-list button:hover, #upgrades-list button:active {
    background-color: #6b5a4b;
    transform: translateY(1px);
    box-shadow: 1px 1px 0 #2c2420;
}

#seed-selection {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
}

.seed-button {
    padding: 5px 10px;
    background-color: #5a4d41;
    color: #f8e8b0;
    border: none;
    cursor: pointer;
    font-family: 'PixelFont', monospace;
    font-size: 10px;
    border-radius: 0;
    box-shadow: 2px 2px 0 #2c2420;
}

.seed-button:hover, .seed-button:active {
    background-color: #6b5a4b;
    transform: translateY(1px);
    box-shadow: 1px 1px 0 #2c2420;
}

#garden-plot {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 20px;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23718c5a"/><path d="M0 10L100 0L100 20L0 30Z" fill="%235d7547" opacity="0.5"/><path d="M0 40L100 30L100 50L0 60Z" fill="%235d7547" opacity="0.5"/><path d="M0 70L100 60L100 80L0 90Z" fill="%235d7547" opacity="0.5"/></svg>');
    background-size: cover;
    border-radius: 10px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
}

#quest-giver-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 10px;
    display: block;
    background-color: transparent;
    image-rendering: pixelated;
}

.shop-category {
    margin-bottom: 20px;
}

.shop-category h3 {
    color: #ffd700;
    border-bottom: 2px solid #ffd700;
    padding-bottom: 5px;
    margin-bottom: 10px;
}

</style>
</head>

<div id="gold-display">Gold: 0</div>

<div id="tabs">

</div>

<div id="inventory" class="tab-content">

<div id="recipes" class="tab-content">

    </div>
</div>

<div id="garden" class="tab-content">
    <h2>Garden</h2>
    <div id="garden-plot"></div>
    <div id="seed-selection"></div>
</div>

<div id="quests" class="tab-content">

    <div id="quest-log">

        <div id="quest-description"></div>
        <button id="complete-quest-button">Complete Quest</button>
    </div>
</div>

<div id="shop" class="tab-content">

</div>

const shopItems = [
    { name: 'Moonflower Seeds', price: 10 },
    { name: 'Sunblossom Seeds', price: 12 },
    { name: 'Whisperleaf Seeds', price: 15 },
    { name: 'Earthroot Seeds', price: 8 },
    { name: 'Starberry Seeds', price: 20 },
    { name: 'Dewdrop Seeds', price: 18 },
    { name: 'Emberleaf Seeds', price: 25 },
    { name: 'Shadowvine Seeds', price: 30 },
    { name: 'Crystalbloom Seeds', price: 35 }
];

const upgradeItems = [
    { name: 'Larger Cauldron', price: 100, description: 'Increases potion brewing capacity' },
    { name: 'Magic Stirring Rod', price: 150, description: 'Speeds up brewing process' },
    { name: 'Enchanted Garden Plots', price: 200, description: 'Plants grow faster' },
    { name: 'Alchemist\'s Guidebook', price: 250, description: 'Unlocks new recipes' }
];

function initializeGame() {
    document.getElementById('brew-button').addEventListener('click', brewPotion);
    document.getElementById('complete-quest-button').addEventListener('click', completeQuest);
    document.getElementById('prev-recipe').addEventListener('click', showPreviousRecipe);
    document.getElementById('next-recipe').addEventListener('click', showNextRecipe);
    updateInventory();
    updateRecipeBook();
    updateGoldDisplay();
    initializeGarden();
    updateSeedSelection();
    generateNewQuest();
    updateShop();
}

function harvestPlant(plant) {
    if (!inventory[plant]) {
        inventory[plant] = 0;
    }
    inventory[plant]++;
    updateInventory();
}

function updateInventory() {
    const inventoryList = document.getElementById('inventory-list');
    inventoryList.innerHTML = '';
    for (const [plant, count] of Object.entries(inventory)) {
        const li = document.createElement('li');
        li.textContent = `${plantIcons[plant]} ${plant}: ${count}`;
        const addButton = document.createElement('button');
        addButton.textContent = 'Add';
        addButton.addEventListener('click', () => addToCauldron(plant));
        li.appendChild(addButton);
        inventoryList.appendChild(li);
    }
}

function addToCauldron(plant) {
    if (inventory[plant] > 0) {
        cauldron.push(plant);
        inventory[plant]--;
        updateInventory();
        updateCauldron();
    }
}

function updateCauldron() {
    const ingredientsDiv = document.getElementById('ingredients');
    ingredientsDiv.innerHTML = '';
    cauldron.forEach(plant => {
        const ingredientSpan = document.createElement('span');
        ingredientSpan.classList.add('ingredient');
        ingredientSpan.textContent = `${plantIcons[plant]} ${plant}`;
        ingredientsDiv.appendChild(ingredientSpan);
    });

    // Update cauldron color
    const potionColor = getPotionColor();
    document.querySelector('.cauldron-svg .potion').style.fill = potionColor;
}

function getPotionColor() {
    if (cauldron.length === 0) return '#7cfc00';
    const matchedRecipe = recipes.find(recipe => 
        recipe.ingredients.length === cauldron.length && 
        recipe.ingredients.every(ingredient => cauldron.includes(ingredient))
    );
    return matchedRecipe ? matchedRecipe.color : '#7cfc00';
}

function brewPotion() {
    const result = document.getElementById('result');
    if (cauldron.length === 0) {
        result.textContent = "The cauldron is empty!";
        return;
    }

    const matchedRecipe = recipes.find(recipe => 
        recipe.ingredients.length === cauldron.length && 
        recipe.ingredients.every(ingredient => cauldron.includes(ingredient))
    );

    if (matchedRecipe) {
        result.textContent = `Brewed ${matchedRecipe.name}! Effect: ${matchedRecipe.effect} Value: ${matchedRecipe.value} gold`;
        gold += matchedRecipe.value;
        updateGoldDisplay();
        currentPotion = matchedRecipe.name;
        
        if (currentQuest && currentQuest.potion === matchedRecipe.name) {
            result.textContent += " Quest potion brewed!";
        }
    } else {
        result.textContent = "Experiment failed. Try again!";
        currentPotion = null;
    }

    cauldron = [];
    updateCauldron();
}

function updateRecipeBook() {
    showRecipe(currentRecipeIndex);
}

function showRecipe(index) {
    const recipe = recipes[index];
    const recipePage = document.getElementById('recipe-page');
    recipePage.innerHTML = `
        <div class="recipe-page">
            <h3 class="recipe-title">${recipe.name}</h3>
            <div class="recipe-content">
                <p><strong>Ingredients:</strong> ${recipe.ingredients.map(ingredient => `${plantIcons[ingredient]} ${ingredient}`).join(', ')}</p>
                <p><strong>Effect:</strong> ${recipe.effect}</p>
                <p><strong>Value:</strong> ${recipe.value} gold</p>
            </div>
        </div>
    `;
}

function showPreviousRecipe() {
    currentRecipeIndex = (currentRecipeIndex - 1 + recipes.length) % recipes.length;
    showRecipe(currentRecipeIndex);
}

function showNextRecipe() {
    currentRecipeIndex = (currentRecipeIndex + 1) % recipes.length;
    showRecipe(currentRecipeIndex);
}

function showTab(tabName) {
    const tabs = document.querySelectorAll('.tab');
    const tabContents = document.querySelectorAll('.tab-content');

    tabs.forEach(tab => tab.classList.remove('active'));
    tabContents.forEach(content => content.classList.remove('active'));

    document.querySelector(`.tab:nth-child(${['game', 'inventory', 'recipes', 'garden', 'quests', 'shop'].indexOf(tabName) + 1})`).classList.add('active');
    document.getElementById(tabName).classList.add('active');
}

function updateGoldDisplay() {
    document.getElementById('gold-display').textContent = `Gold: ${gold}`;
}

function initializeGarden() {
    const gardenPlot = document.getElementById('garden-plot');
    for (let i = 0; i < 9; i++) {
        const plot = document.createElement('div');
        plot.classList.add('plot', 'plot-empty');
        plot.textContent = 'Empty';
        plot.addEventListener('click', () => plantSeed(i));
        gardenPlot.appendChild(plot);
        gardenPlots.push({ state: 'empty', plant: null, growthStage: 0 });
    }
}

function updateSeedSelection() {
    const seedSelection = document.getElementById('seed-selection');
    seedSelection.innerHTML = '';
    plants.forEach(plant => {
        const seedButton = document.createElement('button');
        seedButton.classList.add('seed-button');
        seedButton.textContent = `${plantIcons[plant]} Plant ${plant}`;
        seedButton.addEventListener('click', () => selectSeed(plant));
        seedSelection.appendChild(seedButton);
    });
}

let selectedSeed = null;

function selectSeed(seed) {
    selectedSeed = seed;
}

function plantSeed(plotIndex) {
    if (selectedSeed && gardenPlots[plotIndex].state === 'empty') {
        gardenPlots[plotIndex] = { state: 'growing', plant: selectedSeed, growthStage: 0 };
        updateGardenDisplay();
        selectedSeed = null;
        setTimeout(() => growPlant(plotIndex), 5000);
    }
}

function growPlant(plotIndex) {
    const plot = gardenPlots[plotIndex];
    if (plot.state === 'growing') {
        plot.growthStage++;
        if (plot.growthStage >= 3) {
            plot.state = 'ready';
        }
        updateGardenDisplay();
        if (plot.state === 'growing') {
            setTimeout(() => growPlant(plotIndex), 5000);
        }
    }
}

function updateGardenDisplay() {
    const gardenPlot = document.getElementById('garden-plot');
    gardenPlot.innerHTML = '';
    gardenPlots.forEach((plot, index) => {
        const plotElement = document.createElement('div');
        plotElement.classList.add('plot');
        if (plot.state === 'empty') {
            plotElement.classList.add('plot-empty');
            plotElement.textContent = 'Empty';
        } else if (plot.state === 'growing') {
            plotElement.classList.add('plot-growing');
            plotElement.textContent = `${plantIcons[plot.plant]} ${plot.plant} (${plot.growthStage}/3)`;
        } else if (plot.state === 'ready') {
            plotElement.classList.add('plot-ready');
            plotElement.textContent = `${plantIcons[plot.plant]} ${plot.plant} (Ready)`;
        }
        plotElement.addEventListener('click', () => handlePlotClick(index));
        gardenPlot.appendChild(plotElement);
    });
}

function handlePlotClick(plotIndex) {
    const plot = gardenPlots[plotIndex];
    if (plot.state === 'ready') {
        harvestPlant(plot.plant);
        plot.state = 'empty';
        plot.plant = null;
        plot.growthStage = 0;
        updateGardenDisplay();
    } else if (plot.state === 'empty') {
        plantSeed(plotIndex);
    }
}

function generateNewQuest() {
    const randomCustomer = customers[Math.floor(Math.random() * customers.length)];
    const requestedPotion = recipes.find(recipe => randomCustomer.dialogue.includes(recipe.name));
    
    if (requestedPotion) {
        currentQuest = {
            customer: randomCustomer.name,
            potion: requestedPotion.name,
            reward: Math.floor(requestedPotion.value * 1.5)
        };

        document.getElementById('quest-giver-icon').style.backgroundImage = `url('${randomCustomer.icon}')`;
        document.getElementById('quest-description').innerHTML = `
            <p><strong>${randomCustomer.name}:</strong> "${randomCustomer.dialogue}"</p>
            <p>Requested Potion: ${currentQuest.potion}</p>
            <p>Reward: ${currentQuest.reward} gold</p>
        `;
    } else {
        console.error('No matching potion found for the customer dialogue');
        generateNewQuest(); // Try again
    }
}

function completeQuest() {
    const result = document.getElementById('result');
    if (!currentQuest) {
        result.textContent = "No active quest!";
        return;
    }

    if (currentPotion && currentPotion === currentQuest.potion) {
        gold += currentQuest.reward;
        updateGoldDisplay();
        result.textContent = `Quest completed! You earned ${currentQuest.reward} gold.`;
        generateNewQuest();
        currentPotion = null;
    } else if (currentPotion) {
        result.textContent = "This is not the requested potion. Try again!";
    } else {
        result.textContent = "You need to brew a potion first!";
    }
}

function updateShop() {
    const shopList = document.getElementById('shop-list');
    shopList.innerHTML = '';
    shopItems.forEach(item => {
        const li = document.createElement('li');
        const plantName = item.name.replace(' Seeds', '');
        li.textContent = `${plantIcons[plantName]} ${item.name}: ${item.price} gold`;
        const buyButton = document.createElement('button');
        buyButton.textContent = 'Buy';
        buyButton.addEventListener('click', () => buyItem(item));
        li.appendChild(buyButton);
        shopList.appendChild(li);
    });

    const upgradesList = document.getElementById('upgrades-list');
    upgradesList.innerHTML = '';
    upgradeItems.forEach(item => {
        const li = document.createElement('li');
        li.textContent = `${item.name}: ${item.price} gold - ${item.description}`;
        const buyButton = document.createElement('button');
        buyButton.textContent = 'Buy';
        buyButton.addEventListener('click', () => buyUpgrade(item));
        li.appendChild(buyButton);
        upgradesList.appendChild(li);
    });
}

function buyItem(item) {
    if (gold >= item.price) {
        gold -= item.price;
        const plantName = item.name.replace(' Seeds', '');
        if (!inventory[plantName]) {
            inventory[plantName] = 0;
        }
        inventory[plantName]++;
        updateGoldDisplay();
        updateInventory();
        document.getElementById('result').textContent = `Bought ${item.name} for ${item.price} gold.`;
    } else {
        document.getElementById('result').textContent = "Not enough gold!";
    }
}

function buyUpgrade(item) {
    if (gold >= item.price) {
        gold -= item.price;
        updateGoldDisplay();
        document.getElementById('result').textContent = `Bought ${item.name} upgrade for ${item.price} gold.`;
        // TODO: Implement upgrade effects
    } else {
        document.getElementById('result').textContent = "Not enough gold!";
    }
}

initializeGame();
</script>
