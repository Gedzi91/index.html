      return;

      mixer._actions[0].setLoop(THREE.LoopOnce);

        isGettingUp = false;

    }
    if (keyStates['KeyA']) {
      flyForceX += -Math.cos(cameraAngle) * flySpeed;
      flyForceZ += Math.sin(cameraAngle) * flySpeed;
    }
    if (keyStates['KeyD']) {
      flyForceX += Math.cos(cameraAngle) * flySpeed;
      flyForceZ += -Math.sin(cameraAngle) * flySpeed;
    }
    if (keyStates['Space']) {
      flyForceY += flySpeed;
    }
    if (keyStates['ShiftLeft'] || keyStates['ShiftRight']) {
      flyForceY -= flySpeed;
    }
    sphereBody.position.x += flyForceX * timeStep;
    sphereBody.position.y += flyForceY * timeStep;
    sphereBody.position.z += flyForceZ * timeStep;
  } else {
    const velocity = sphereBody.velocity;
    const speed = Math.sqrt(velocity.x * velocity.x + velocity.z * velocity.z);
    const currentMoveForce = isCrouching ? moveForce * crouchSpeedMultiplier : moveForce;
    if (speed < maxSpeed) {
      let forceX = 0;
      let forceZ = 0;
      if (keyStates['KeyW']) {
        forceX += -Math.sin(cameraAngle) * currentMoveForce;
        forceZ += -Math.cos(cameraAngle) * currentMoveForce;
      }
      if (keyStates['KeyS']) {
        forceX += Math.sin(cameraAngle) * currentMoveForce;
        forceZ += Math.cos(cameraAngle) * currentMoveForce;
      }
      if (keyStates['KeyA']) {
        forceX += -Math.cos(cameraAngle) * currentMoveForce;
        forceZ += Math.sin(cameraAngle) * currentMoveForce;
      }
      if (keyStates['KeyD']) {
        forceX += Math.cos(cameraAngle) * currentMoveForce;
        forceZ += -Math.sin(cameraAngle) * currentMoveForce;
      }
      sphereBody.applyForce(new CANNON.Vec3(forceX, 0, forceZ));
    }
    if (speed > maxSpeed) {
      const factor = maxSpeed / speed;
      sphereBody.velocity.x *= factor;
      sphereBody.velocity.z *= factor;
    }
    if (keyStates['Space'] && canJump && !isCrouching) {
      sphereBody.applyImpulse(new CANNON.Vec3(0, jumpForce, 0));
      canJump = false;
      if (jumpSound) {
        jumpSound.currentTime = 0;
        jumpSound.play();
      }
    }
    if (!keyStates['KeyW'] && !keyStates['KeyS'] && !keyStates['KeyA'] && !keyStates['KeyD']) {
      if (footstepSound) {
        footstepSound.pause();
        footstepSound.currentTime = 0;
      }
    }
  }
}
function getPlayerState() {
  if (isHurt) return 'Hurt';
  if (isGettingUp) return 'Getting Up';
  if (flyMode) return 'Flying';
  if (!canJump) return 'Airborne';
  if (isCrouching) return 'Crouching';
  const velocity = sphereBody.velocity;
  const horizontalSpeed = Math.sqrt(velocity.x * velocity.x + velocity.z * velocity.z);
  if (horizontalSpeed > 0.5) return 'Moving';
  return 'Idle';
}
function getCurrentAnimation() {
  if (!characterModel) return 'None';
  if (characterModel === idleModel) return 'Idle';
  if (characterModel === runModel) return 'Run';
  if (characterModel === jumpModel) return 'Jump';
  if (characterModel === fallModel) return 'Fall';
  if (characterModel === crouchModel) return 'Crouch';
  if (characterModel === crouchWalkModel) return 'Crouch Walk';
  if (characterModel === hurtModel) return 'Hurt';
  if (characterModel === getUpModel) return 'Get Up';
  return 'Unknown';
}
function animate() {
  requestAnimationFrame(animate);
  const currentTime = performance.now();
  const elapsed = currentTime - lastFrameTime;
  if (elapsed < frameInterval) {
    return;
  }
  lastFrameTime = currentTime - elapsed % frameInterval;
  const time = performance.now() / 1000;
  if (!lastCallTime) {
    world.step(timeStep);
  } else {
    const dt = time - lastCallTime;
    world.step(timeStep, dt);
  }
  lastCallTime = time;
  if (mixer) {
    mixer.update(timeStep);
  }
  handleInput();
  updateCharacterAnimation();
  sphere.position.copy(sphereBody.position);
  sphere.quaternion.copy(sphereBody.quaternion);
  const idealCameraDistance = 20;
  const baseCameraHeight = 10;
  const idealCameraX = sphereBody.position.x + Math.sin(cameraAngle) * idealCameraDistance * Math.cos(cameraVerticalAngle);
  const idealCameraZ = sphereBody.position.z + Math.cos(cameraAngle) * idealCameraDistance * Math.cos(cameraVerticalAngle);
  const idealCameraY = sphereBody.position.y + baseCameraHeight + Math.sin(cameraVerticalAngle) * idealCameraDistance;
  const idealCameraPos = new THREE.Vector3(idealCameraX, idealCameraY, idealCameraZ);
  const playerPos = new THREE.Vector3(sphereBody.position.x, sphereBody.position.y, sphereBody.position.z);
  const directionToCamera = new THREE.Vector3().subVectors(idealCameraPos, playerPos).normalize();
  raycaster.set(playerPos, directionToCamera);
  const intersectObjects = scene.children.filter(obj => obj !== sphere && obj !== characterModel && obj !== idleModel && obj !== runModel && obj !== jumpModel && obj !== fallModel && obj !== crouchModel && obj !== crouchWalkModel && obj !== hurtModel && obj !== getUpModel);
  const intersects = raycaster.intersectObjects(intersectObjects);
  if (intersects.length > 0 && intersects[0].distance < idealCameraDistance) {
    const distance = Math.max(CAMERA_MIN_DISTANCE, intersects[0].distance - 0.5);
    camera.position.copy(playerPos).add(directionToCamera.multiplyScalar(distance));
  } else {
    camera.position.copy(idealCameraPos);
  }
  camera.lookAt(sphere.position);
  renderer.render(scene, camera);
  const coordinatesElement = document.getElementById('coordinates');
  const x = sphereBody.position.x.toFixed(2);
  const y = sphereBody.position.y.toFixed(2);
  const z = sphereBody.position.z.toFixed(2);
  coordinatesElement.textContent = `X: ${x} Y: ${y} Z: ${z}`;
  const stateTrackerElement = document.getElementById('state-tracker');
  const velocity = sphereBody.velocity;
  const speed = Math.sqrt(velocity.x * velocity.x + velocity.z * velocity.z).toFixed(2);
  const verticalSpeed = velocity.y.toFixed(2);
  const currentState = getPlayerState();
  const currentAnim = getCurrentAnimation();
  const currentFrame = mixer ? mixer._actions[0] ? mixer._actions[0].time.toFixed(2) : '0.00' : '0.00';
  const totalFrames = mixer ? mixer._actions[0] ? mixer._actions[0]._clip.duration.toFixed(2) : '0.00' : '0.00';
  stateTrackerElement.innerHTML = `State: ${currentState}<br>` + `Horizontal Speed: ${speed}<br>` + `Vertical Speed: ${verticalSpeed}<br>` + `Animation: ${currentAnim}<br>` + `Frame: ${currentFrame}/${totalFrames}`;
}
document.getElementById('loading').style.display = 'block';
function resetGame() {
  sphereBody.position.set(0, 5, 0);
  sphereBody.velocity.set(0, 0, 0);
  sphereBody.angularVelocity.set(0, 0, 0);
  isHurt = false;
  isGettingUp = false;
  hurtTimer = 0;
  isCrouching = false;
  sphereBody.shapes[0].radius = sphereRadius;
  sphere.scale.set(1, 1, 1);
  cameraAngle = 0;
  cameraVerticalAngle = 0;
  powerLevel = 6;
  updatePowerMeter();
  flyMode = false;
  sphereBody.type = CANNON.Body.DYNAMIC;
}
function updatePowerMeter() {
  const slots = document.querySelectorAll('.power-slot');
  slots.forEach((slot, index) => {
    if (index < powerLevel) {
      slot.classList.remove('empty');
    } else {
      slot.classList.add('empty');
    }
  });
}
function fadeToBlack() {
  if (isFading) return;
  isFading = true;
  const overlay = document.getElementById('fade-overlay');
  overlay.style.opacity = '1';
  setTimeout(() => {
    resetGame();
    overlay.style.opacity = '0';
    setTimeout(() => {
      isFading = false;
    }, 1000);
  }, 1000);
}
init().then(() => {
  animate();
});</script>
