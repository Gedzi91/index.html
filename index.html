<html>
<head><base href="https://example.com">
  <meta charset="UTF-8">
  <title>3D Weaving Wiregrid</title>
  <!-- Vue.js via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  <!-- Three.js via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
      color: #fff;
    }

    #bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      z-index: -1;
    }
    #bg .part1 {
      background: linear-gradient(225deg, #1e3c72, #2a5298);
    }
    #bg .part2 {
      background: linear-gradient(60deg, #00b09b, #96c93d);
    }
    #bg .part3 {
      background: linear-gradient(45deg, #2b5876, #4e4376);
    }
    #bg .part4 {
      background: linear-gradient(180deg, #673ab7, #512da8);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 1;
      -webkit-clip-path: url(#foregroundClip);
      clip-path: url(#foregroundClip);
    }

    .overlay {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: rgba(0,0,0,0.5);
      padding: 1rem;
      border-radius: 6px;
    }
    .overlay a {
      color: #00ffcc;
      text-decoration: none;
    }
    @keyframes hueShift {
      0%   { filter: hue-rotate(0deg); }
      25%  { filter: hue-rotate(90deg); }
      50%  { filter: hue-rotate(180deg); }
      75%  { filter: hue-rotate(270deg); }
      100% { filter: hue-rotate(360deg); }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <clipPath id="foregroundClip" clipPathUnits="objectBoundingBox">
        <rect x="0" y="0" width="1" height="1"></rect>
      </clipPath>
    </defs>
  </svg>

  <div id="bg">
    <div class="part part1"></div>
    <div class="part part2"></div>
    <div class="part part3"></div>
    <div class="part part4"></div>
  </div>

  <div id="app">
    <div class="overlay">
      <h1>3D Weaving Wiregrid</h1>
      <p>Immerse yourself in a glowing, psychedelic wireframe animation. Created with Vue &amp; Three.js</p>
      <p>
        Explore more examples at 
        <a href="https://example.com">example.com</a>
      </p>
    </div>
    <div ref="rendererContainer" style="width:100%; height:100%;"></div>
  </div>

  <script>
    new Vue({
      el: '#app',
      data() {
        return {
          scene: null,
          camera: null,
          renderer: null,
          plane: null,
          animationId: null,
          clock: null,
          torusKnot: null
        }
      },
      mounted() {
        this.initScene();
        window.addEventListener('resize', this.onWindowResize, false);
      },
      methods: {
        initScene() {
          // Create scene
          this.scene = new THREE.Scene();
          this.scene.background = new THREE.Color(0x000000);
          
          // Create camera
          const aspect = window.innerWidth / window.innerHeight;
          this.camera = new THREE.PerspectiveCamera(60, aspect, 0.1, 1000);
          this.camera.position.set(0, 15, 35);
          this.camera.lookAt(new THREE.Vector3(0, 0, 0));

          // Create renderer
          this.renderer = new THREE.WebGLRenderer({ antialias: true });
          this.renderer.setSize(window.innerWidth, window.innerHeight);
          this.$refs.rendererContainer.appendChild(this.renderer.domElement);
          this.renderer.domElement.style.animation = 'hueShift 8s infinite linear';

          // Add some faint ambient light
          const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
          this.scene.add(ambientLight);

          // Add a directional light
          const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
          dirLight.position.set(10, 20, 10);
          this.scene.add(dirLight);

          // Create a parametric plane geometry with many segments for wavy effect
          const width = 40;
          const height = 40;
          const segments = 40;
          const geometry = new THREE.PlaneGeometry(width, height, segments, segments);
          
          // Material with wireframe for the "grid" look
          const material = new THREE.MeshLambertMaterial({
            color: 0x00ffcc,
            wireframe: true
          });

          // Create plane
          this.plane = new THREE.Mesh(geometry, material);
          this.plane.rotation.x = -Math.PI / 2;
          this.scene.add(this.plane);

          // Create a torus knot for an additional psychedelic element
          const torusKnotGeometry = new THREE.TorusKnotGeometry(10, 1, 200, 16);
          const torusKnotMaterial = new THREE.MeshLambertMaterial({
            color: 0xff00ff,
            wireframe: true
          });
          this.torusKnot = new THREE.Mesh(torusKnotGeometry, torusKnotMaterial);
          this.torusKnot.position.y = 5;
          this.scene.add(this.torusKnot);

          // Clock to track elapsed time
          this.clock = new THREE.Clock();

          // Start animation
          this.animate();
        },
        animate() {
          this.animationId = requestAnimationFrame(this.animate);

          // Time since last frame
          const time = this.clock.getElapsedTime();

          // Create a weaving wave effect on the plane's vertices
          const position = this.plane.geometry.attributes.position;
          for (let i = 0; i < position.count; i++) {
            const x = position.getX(i);
            const y = position.getY(i);
            const wave1 = Math.sin(x * 0.7 + time * 1.5);
            const wave2 = Math.cos(y * 0.7 + time * 1.3);
            position.setZ(i, (wave1 + wave2) * 1.5);
          }
          position.needsUpdate = true;

          // Rotate the plane around the y-axis
          this.plane.rotation.y += 0.0015;

          // Add rotation to the torus knot for a more psychedelic effect
          if (this.torusKnot) {
            this.torusKnot.rotation.x += 0.005;
            this.torusKnot.rotation.y += 0.005;
          }

          // Render scene
          this.renderer.render(this.scene, this.camera);
        },
        onWindowResize() {
          this.camera.aspect = window.innerWidth / window.innerHeight;
          this.camera.updateProjectionMatrix();
          this.renderer.setSize(window.innerWidth, window.innerHeight);
        }
      }
    });
  </script>
</body>
</html>
