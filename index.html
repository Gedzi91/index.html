<html><head><base href="https://octapong.ai/"><title>OctaPong: Spectacle Edition</title><style>
        body { margin: 0; overflow: hidden; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #gameCanvas { display: block; }
        #controls {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #controls label {
            margin-right: 5px;
        }
        #controls input[type="range"] {
            width: 150px;
            margin-right: 20px;
            vertical-align: middle;
        }
    </style></head><body>
    <div id="controls">
        <label for="spinSpeed">Spin Speed:</label>
        <input type="range" id="spinSpeed" min="0" max="5" step="0.1" value="1">

        <label for="ballSpeed">Ball Speed:</label>
        <input type="range" id="ballSpeed" min="1" max="20" step="0.1" value="7.5">
    </div>
    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <script>
        (() => {
            'use strict';

            class Vector2D {
                constructor(x = 0, y = 0) {
                    this.x = x;
                    this.y = y;
                }

                static fromAngle(angle, magnitude = 1) {
                    return new Vector2D(Math.cos(angle) * magnitude, Math.sin(angle) * magnitude);
                }

                add({ x, y }) {
                    return new Vector2D(this.x + x, this.y + y);
                }

                sub({ x, y }) {
                    return new Vector2D(this.x - x, this.y - y);
                }

                mult(scalar) {
                    return new Vector2D(this.x * scalar, this.y * scalar);
                }

                dot({ x, y }) {
                    return this.x * x + this.y * y;
                }

                magnitude() {
                    return Math.hypot(this.x, this.y);
                }

                normalize() {
                    const mag = this.magnitude();
                    return mag ? this.mult(1 / mag) : new Vector2D();
                }
            }

            class AudioManager {
                constructor() {
                    this.context = new (window.AudioContext || window.webkitAudioContext)();
                    this.noteFrequencies = {
                        'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 
                        'F4': 349.23, 'G4': 392.00, 'A4': 440.00, 
                        'B4': 493.88, 'C5': 523.25
                    };
                }

                playNote(note, volume = 0.5) {
                    const oscillator = this.context.createOscillator();
                    const gainNode = this.context.createGain();
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(this.noteFrequencies[note], this.context.currentTime);
                    gainNode.gain.setValueAtTime(volume, this.context.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.context.currentTime + 0.1);
                    oscillator.connect(gainNode);
                    gainNode.connect(this.context.destination);
                    oscillator.start();
                    oscillator.stop(this.context.currentTime + 0.1);
                }
            }

            class GameObject {
                constructor(body, sprite) {
                    this.body = body;
                    this.sprite = sprite;
                }

                updateSprite() {
                    this.sprite.position.set(this.body.position.x, this.body.position.y);
                    this.sprite.rotation = this.body.angle;
                }
            }

            class Ball extends GameObject {
                constructor(x, y) {
                    const sprite = new PIXI.Graphics()
                        .beginFill(0xFF0000)
                        .drawCircle(0, 0, 5)
                        .endFill();
                    
                    const bodyOptions = {
                        restitution: 1,
                        friction: 0,
                        frictionAir: 0,
                        inertia: Infinity
                    };
                    const body = Matter.Bodies.circle(x, y, 5, bodyOptions);
                    
                    super(body, sprite);

                    this.speed = 7.5;
                    this.trail = [];
                }

                reset(centerX, centerY) {
                    this.speed = 7.5;
                    Matter.Body.setPosition(this.body, { x: centerX, y: centerY });
                    const angle = Math.random() * 2 * Math.PI;
                    const velocity = Vector2D.fromAngle(angle, this.speed);
                    Matter.Body.setVelocity(this.body, velocity);
                    this.trail = [];
                }

                maintainSpeed() {
                    const velocity = new Vector2D(this.body.velocity.x, this.body.velocity.y);
                    if (velocity.magnitude() !== this.speed) {
                        const newVelocity = velocity.normalize().mult(this.speed);
                        Matter.Body.setVelocity(this.body, newVelocity);
                    }
                }

                accelerate() {
                    this.speed = Math.min(this.speed + 0.1, 20);
                    this.maintainSpeed();
                }

                updateTrail() {
                    this.trail.unshift({ x: this.body.position.x, y: this.body.position.y });
                    if (this.trail.length > 20) {
                        this.trail.pop();
                    }
                }
            }

            class Paddle extends GameObject {
                constructor(x, y, angle, note) {
                    const adjustedWidth = 1 + 10;
                    const sprite = new PIXI.Graphics()
                        .beginFill(0xFFFFFF)
                        .drawRect(-adjustedWidth / 2, -5 / 2, adjustedWidth, 5)
                        .endFill();

                    const bodyOptions = {
                        isStatic: true,
                        angle: angle + Math.PI / 2
                    };
                    const body = Matter.Bodies.rectangle(x, y, adjustedWidth, 5, bodyOptions);

                    super(body, sprite);

                    this.baseAngle = angle;
                    this.offset = 0;
                    this.note = note;
                }

                moveTowards(targetOffset) {
                    const MAX_OFFSET = 100; 
                    this.offset = Math.max(Math.min(targetOffset, MAX_OFFSET), -MAX_OFFSET);
                }
            }

            class ParticleSystem {
                constructor(app) {
                    this.app = app;
                    this.particles = [];
                    this.container = new PIXI.ParticleContainer(
                        100 * 10,
                        { 
                            scale: true, position: true, rotation: true, 
                            uvs: true, alpha: true 
                        }
                    );
                    this.app.stage.addChild(this.container);
                }

                emit(x, y, color) {
                    for (let i = 0; i < 100; i++) {
                        const particle = new PIXI.Sprite(PIXI.Texture.WHITE);
                        particle.position.set(x, y);
                        particle.scale.set(2 / 16);
                        particle.tint = color;
                        particle.velocity = Vector2D.fromAngle(
                            Math.random() * 2 * Math.PI, 
                            Math.random() * 3
                        );
                        particle.alpha = 1;
                        particle.lifetime = 60;
                        this.container.addChild(particle);
                        this.particles.push(particle);
                    }
                }

                update() {
                    for (let i = this.particles.length - 1; i >= 0; i--) {
                        const particle = this.particles[i];
                        particle.position.x += particle.velocity.x;
                        particle.position.y += particle.velocity.y;
                        particle.alpha = particle.lifetime / 60;
                        particle.lifetime--;
                        
                        if (particle.lifetime <= 0) {
                            this.container.removeChild(particle);
                            this.particles.splice(i, 1);
                        }
                    }
                }
            }

            class OctaPong {
                constructor() {
                    this.app = new PIXI.Application({
                        width: 800,
                        height: 600,
                        backgroundColor: 0x000000,
                        view: document.getElementById('gameCanvas')
                    });

                    this.engine = Matter.Engine.create({ gravity: { x: 0, y: 0 } });
                    this.world = this.engine.world;

                    this.ball = null;
                    this.paddles = [];
                    this.gameActive = false;
                    this.audioManager = new AudioManager();
                    this.particleSystem = new ParticleSystem(this.app);
                    this.arenaRotation = 0;
                    this.arenaRotationSpeed = 1;

                    this.trailGraphics = new PIXI.Graphics();
                    this.app.stage.addChild(this.trailGraphics);

                    this.init();
                }

                init() {
                    this.createObjects();
                    Matter.Events.on(this.engine, 'collisionStart', (event) => this.handleCollision(event));
                    this.app.ticker.add(this.gameLoop.bind(this));

                    window.addEventListener('resize', () => this.onResize());
                    this.onResize();

                    document.getElementById('spinSpeed').addEventListener('input', (event) => {
                        this.arenaRotationSpeed = parseFloat(event.target.value);
                    });

                    document.getElementById('ballSpeed').addEventListener('input', (event) => {
                        this.ball.speed = parseFloat(event.target.value);
                        this.ball.maintainSpeed();
                    });

                    this.startGame();
                }

                createObjects() {
                    const { width, height } = this.app.screen;
                    const center = new Vector2D(width / 2, height / 2);

                    this.ball = new Ball(center.x, center.y);
                    Matter.World.add(this.world, this.ball.body);
                    this.app.stage.addChild(this.ball.sprite);

                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * 2 * Math.PI;
                        const position = center.add(Vector2D.fromAngle(angle, 260));
                        const paddle = new Paddle(position.x, position.y, angle, ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5'][i]);
                        this.paddles.push(paddle);
                        Matter.World.add(this.world, paddle.body);
                        this.app.stage.addChild(paddle.sprite);
                    }
                }

                onResize() {
                    this.updateObjectPositions();
                }

                updateObjectPositions() {
                    const { width, height } = this.app.screen;
                    const center = new Vector2D(width / 2, height / 2);

                    this.paddles.forEach(paddle => {
                        paddle.offset = 0;
                    });
                }

                gameLoop(delta) {
                    if (!this.gameActive) return;
                    Matter.Engine.update(this.engine, delta * 16.67);
                    this.arenaRotation += this.arenaRotationSpeed * 0.1 * delta;

                    const center = new Vector2D(this.app.screen.width / 2, this.app.screen.height / 2);

                    this.updateAI(center);
                    this.updatePaddles(center);

                    this.ball.updateSprite();
                    this.ball.maintainSpeed();
                    this.ball.updateTrail();
                    this.drawTrail();
                    this.checkResetZone(center);
                    this.particleSystem.update();
                }

                updateAI(center) {
                    const ballPos = new Vector2D(this.ball.body.position.x, this.ball.body.position.y);

                    this.paddles.forEach(paddle => {
                        const angle = paddle.baseAngle + this.arenaRotation;
                        const normal = Vector2D.fromAngle(angle);
                        const tangent = new Vector2D(-normal.y, normal.x);

                        const paddlePosition = center.add(normal.mult(260));
                        const relativeBallPos = ballPos.sub(paddlePosition);

                        let targetOffset = relativeBallPos.dot(tangent);
                        const MAX_OFFSET = 100;
                        targetOffset = Math.max(Math.min(targetOffset, MAX_OFFSET), -MAX_OFFSET);

                        paddle.moveTowards(targetOffset);
                    });
                }

                updatePaddles(center) {
                    this.paddles.forEach(paddle => {
                        const angle = paddle.baseAngle + this.arenaRotation;
                        const normal = Vector2D.fromAngle(angle);
                        const tangent = new Vector2D(-normal.y, normal.x);

                        const paddlePosition = center
                            .add(normal.mult(260))
                            .add(tangent.mult(paddle.offset));

                        Matter.Body.setPosition(paddle.body, paddlePosition);
                        Matter.Body.setAngle(paddle.body, angle + Math.PI / 2);
                        paddle.updateSprite();
                    });
                }

                checkResetZone(center) {
                    const ballPos = new Vector2D(this.ball.body.position.x, this.ball.body.position.y);

                    if (ballPos.sub(center).magnitude() > 280) {
                        this.ball.reset(center.x, center.y);
                        this.particleSystem.emit(this.ball.body.position.x, this.ball.body.position.y, 0xFFFFFF);
                    }
                }

                startGame() {
                    const { width, height } = this.app.screen;
                    this.ball.reset(width / 2, height / 2);
                    this.gameActive = true;
                    this.audioManager.context.resume();
                }

                drawTrail() {
                    this.trailGraphics.clear();
                    const trailLength = this.ball.trail.length;
                    for (let i = 0; i < trailLength - 1; i++) {
                        const start = this.ball.trail[i];
                        const end = this.ball.trail[i + 1];
                        const alpha = (20 - i) / 20 * 0.95;
                        const colorIndex = Math.floor((i / 20) * [0xFF00FF, 0x00FFFF, 0xFFFF00, 0x00FF00].length);
                        this.trailGraphics.lineStyle({
                            width: 5 * 2 * alpha,
                            color: [0xFF00FF, 0x00FFFF, 0xFFFF00, 0x00FF00][colorIndex],
                            alpha: alpha
                        });
                        this.trailGraphics.moveTo(start.x, start.y).lineTo(end.x, end.y);
                    }
                }

                handleCollision(event) {
                    const pairs = event.pairs;
                    for (const pair of pairs) {
                        if (pair.bodyA === this.ball.body || pair.bodyB === this.ball.body) {
                            const paddleBody = (pair.bodyA === this.ball.body) ? pair.bodyB : pair.bodyA;
                            const paddle = this.paddles.find(p => p.body === paddleBody);
                            if (paddle) {
                                this.audioManager.playNote(paddle.note, 0.5 + (this.ball.speed / 40) * 0.5);
                                this.particleSystem.emit(this.ball.body.position.x, this.ball.body.position.y, 0xFF0000);
                                this.ball.accelerate();
                            }
                        }
                    }
                }
            }

            window.onload = () => new OctaPong();
        })();
    </script>
</body></html>
