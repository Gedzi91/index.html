<html><head><base href="/">
<style>
    .dialogue-box {
        position: absolute;
        background: rgba(255, 255, 255, 0.9);
        border: 3px solid #ff69b4;
        border-radius: 15px;
        padding: 15px;
        max-width: 300px;
        box-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
        display: none;
        z-index: 100;
    }

    .dialogue-input {
        width: 90%;
        padding: 8px;
        margin-top: 10px;
        border: 2px solid #ff69b4;
        border-radius: 5px;
        font-family: 'Comic Sans MS', cursive;
    }

    .dialogue-timer {
        height: 3px;
        background: #ff69b4;
        width: 100%;
        position: absolute;
        bottom: 0;
        left: 0;
        transition: width 7s linear;  /* Changed from 10s to 7s */
        border-radius: 0 0 15px 15px;
    }

    @keyframes float {
        from { transform: translateY(0); }
        to { transform: translateY(-20px); opacity: 0; }
    }

    @keyframes jiggle {
        0% { transform: scale(1, 1); }
        25% { transform: scale(1.2, 0.8); }
        50% { transform: scale(0.8, 1.2); }
        75% { transform: scale(1.1, 0.9); }
        100% { transform: scale(1, 1); }
    }

    .blush {
        position: absolute;
        width: 100px;
        height: 30px;
        background: pink;
        border-radius: 10px;
        top: 240px;
        left: 150px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s;
    }

    .game-container {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }

    .score-container {
        margin-bottom: 20px;
        font-size: 20px;
        font-family: 'Arial', sans-serif;
    }

    .score-container span {
        margin: 0 10px;
    }
    
    .start-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        color: white;
        font-size: 24px;
        font-family: 'Comic Sans MS', cursive;
    }

    .character-container {
        position: relative;
    }
</style>
</head>
<body>
    <div class="game-container">
        <div class="score-container">
            <span>Score: <span id="score">0</span></span>
            <span>Rizz Coins: <span id="rizzCoins">10</span></span>
            <span>Status: <span id="status">Stranger</span></span>
        </div>
        <div class="character-container">
            <img id="cowgirl" src="/images (3).jpg" alt="anime farmgirl" width="400" height="600">
            <div id="blush" class="blush"></div>
        </div>
    </div>

    <div class="dialogue-box" id="dialogueBox">
        <div id="dialogueText"></div>
        <input type="text" class="dialogue-input" id="dialogueInput" placeholder="Type your response...">
        <div class="dialogue-timer" id="dialogueTimer"></div>
    </div>

    <div id="startOverlay" class="start-overlay">
        Press Enter to Start!
    </div>

    <audio id="ambientMusic" src="https://example.com/romantic_ambient.mp3" loop volume="0.3"></audio>

    <script>
        let gameActive = true;
        let score = 0;
        let rizzCoins = 10;
        let lastClickTime = Date.now();
        let inactivityTimer;

        const cowgirl = document.getElementById('cowgirl');
        const blush = document.getElementById('blush');
        const scoreDisplay = document.getElementById('score');
        const rizzDisplay = document.getElementById('rizzCoins');
        const statusDisplay = document.getElementById('status');
        const dialogueBox = document.getElementById('dialogueBox');
        const dialogueInput = document.getElementById('dialogueInput');
        const dialogueTimerElement = document.getElementById('dialogueTimer');
        const startOverlay = document.getElementById('startOverlay');
        const ambientMusic = document.getElementById('ambientMusic');

        let currentDialogue = null;
        let dialogueTimerTimeout = null;

        const dialogues = [
            { question: "Whatchu doing??", responses: ["nothing", "just admiring you", "hanging out"] },
            { question: "Are u being naughty?", responses: ["no", "maybe", "never"] },
            { question: "Do you like spending time with me?", responses: ["yes", "of course", "definitely"] },
            { question: "Why are you so cute?", responses: ["i try my best", "you're cuter", "thank you"] },
            { question: "Would you take me on a date?", responses: ["yes", "absolutely", "anytime"] },
            { question: "What's your favorite thing about me?", responses: ["everything", "your smile", "your personality"] },
            { question: "Want to go get ice cream together?", responses: ["sure", "i'd love to", "yes please"] },
            { question: "Do you think about me often?", responses: ["always", "yes", "all the time"] },
            { question: "What are your plans for today?", responses: ["spending time with you", "just chatting", "hanging out"] },
            { question: "Am I your type?", responses: ["definitely", "100%", "absolutely"] },
            { question: "Would you protect me?", responses: ["always", "of course", "with my life"] },
            { question: "Do you like my outfit today?", responses: ["love it", "beautiful", "looks amazing"] },
            { question: "Want to watch anime together?", responses: ["yes", "definitely", "can't wait"] },
            { question: "Are we more than friends?", responses: ["i hope so", "maybe", "if you want"] },
            { question: "Would you hold my hand?", responses: ["yes", "anytime", "of course"] },
            { question: "Do you think I'm pretty?", responses: ["very", "gorgeous", "beautiful"] },
            { question: "Want to go stargazing?", responses: ["yes", "sounds romantic", "love to"] },
            { question: "Miss me when I'm gone?", responses: ["always", "every moment", "so much"] },
            { question: "Would you cook for me?", responses: ["anytime", "love to", "of course"] },
            { question: "Am I special to you?", responses: ["very", "absolutely", "the most"] }
        ];

        const soundEffects = {
            giggles: [
                new Audio('https://example.com/giggle1.mp3'),
                new Audio('https://example.com/giggle2.mp3'),
                new Audio('https://example.com/giggle3.mp3')
            ],
            affectionate: [
                new Audio('https://example.com/happy1.mp3'),
                new Audio('https://example.com/happy2.mp3'),
                new Audio('https://example.com/happy3.mp3')
            ],
            romantic: [
                new Audio('https://example.com/romantic1.mp3'),
                new Audio('https://example.com/romantic2.mp3'),
                new Audio('https://example.com/romantic3.mp3')
            ],
            angry: [
                new Audio('https://example.com/angry1.mp3'),
                new Audio('https://example.com/angry2.mp3'),
                new Audio('https://example.com/angry3.mp3')
            ]
        };

        const animeGirlResponses = [
            "Kyaaaa~ You're making me blush! (*´▽`*)",
            "Mou... you're so sweet! (*/ω＼*)",
            "Hehe, you really know how to make a girl happy! (＾▽＾)",
            "Waaah~ Don't say such embarrassing things! (〃ω〃)",
            "Ara ara~ How forward of you! (♡˙︶˙♡)",
            "My heart is going doki doki! (´｡• ᵕ •｡`)",
            "You're such a charmer! (≧◡≦)",
            "I can't help smiling when I talk to you! (◕‿◕✿)",
            "Maybe we should get closer... (♡´౪`♡)",
            "You're different from the others... (ﾉ◕ヮ◕)ﾉ*:･ﾟ✧"
        ];

        function getRandomResponse() {
            return animeGirlResponses[Math.floor(Math.random() * animeGirlResponses.length)];
        }

        function startInactivityTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                if (gameActive) {
                    gameOver("Too slow! *walks away bored*");
                }
            }, 10000);
        }

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            startInactivityTimer();
        }

        function playRandomSound(soundArray) {
            const randomSound = soundArray[Math.floor(Math.random() * soundArray.length)];
            randomSound.play().catch(e => console.log("Sound play failed:", e));
        }

        function gameOver(message) {
            gameActive = false;
            statusDisplay.textContent = message;
            dialogueBox.style.display = 'none';
            clearTimeout(inactivityTimer);
            startOverlay.style.display = 'flex';
            startOverlay.textContent = 'Game Over! Press Enter to Restart';
            ambientMusic.pause();
            ambientMusic.currentTime = 0;
        }

        function addHeart(x, y) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'absolute';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            heart.style.animation = 'float 1s ease-out';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        function addGiggleText(x, y) {
            const giggles = ['hehe', 'teehee', '*giggles*'];
            const text = document.createElement('div');
            text.textContent = giggles[Math.floor(Math.random() * giggles.length)];
            text.style.position = 'absolute';
            text.style.left = x + 'px';
            text.style.top = y + 'px';
            text.style.animation = 'float 1s ease-out';
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 1000);
        }

        function showRandomBubble(x, y, mood = "normal") {
            const randomMessages = [
                "*giggles*", "Teehee~", "Kyaaa!", "Hehe", "So silly!", 
                "That tickles!", "Stahp~", "You're funny!", "Uwaa~", 
                "Not there!", "Eep!", "Nya~", "How cute!", "Oh my...",
                "You're making me blush!", "Ahaha~", "So sweet!", "Mou~",
                "No fair!", "You're too much!"
            ];
            const angryMessages = [
                "Hey! Watch it!", "Not there!", "BAKA!", "TOO LOW!", 
                "You pervert!", "I'll report you!", "How dare you!"
            ];
            
            const message = mood === "angry" ? 
                angryMessages[Math.floor(Math.random() * angryMessages.length)] :
                randomMessages[Math.floor(Math.random() * randomMessages.length)];
                
            const bubble = document.createElement('div');
            bubble.textContent = message;
            bubble.style.position = 'absolute';
            bubble.style.left = x + 'px';
            bubble.style.top = y + 'px';
            bubble.style.animation = 'float 1.5s ease-out';
            bubble.style.background = 'rgba(255, 255, 255, 0.9)';
            bubble.style.padding = '5px 10px';
            bubble.style.borderRadius = '15px';
            bubble.style.border = '2px solid pink';
            document.body.appendChild(bubble);
            setTimeout(() => bubble.remove(), 1500);
        }

        function checkClickRate(currentTime) {
            const timeSinceLastClick = currentTime - lastClickTime;
            if (timeSinceLastClick < 100) {
                gameOver("Too fast! *walks away frustrated*");
                return false;
            }
            return true;
        }

        function triggerChestJiggle() {
            cowgirl.style.animation = 'jiggle 0.5s ease-in-out';
            setTimeout(() => {
                cowgirl.style.animation = '';
            }, 500);
        }

        function updateRelationshipStatus() {
            if (score >= 1000) {
                statusDisplay.textContent = "Boyfriend";
            } else if (score >= 100) {
                statusDisplay.textContent = "Friend";
            }
        }

        function showRandomDialogue() {
            if (!gameActive) return;

            const dialogue = dialogues[Math.floor(Math.random() * dialogues.length)];
            currentDialogue = dialogue;

            dialogueBox.style.display = 'block';
            dialogueBox.style.left = Math.random() * (window.innerWidth - 300) + 'px';
            dialogueBox.style.top = Math.random() * (window.innerHeight - 200) + 'px';

            document.getElementById('dialogueText').textContent = dialogue.question;
            dialogueInput.value = '';
            dialogueInput.focus();

            // Reset timer bar
            dialogueTimerElement.style.width = '100%';
            // Force browser reflow
            dialogueTimerElement.offsetHeight;
            dialogueTimerElement.style.width = '0%';

            // Clear any existing timeout
            clearTimeout(dialogueTimerTimeout);
            // Set new 7 second timeout
            dialogueTimerTimeout = setTimeout(() => {
                if (gameActive) {
                    gameOver("You didn't respond in time! *walks away*");
                }
            }, 7000);  // Changed to 7000 milliseconds
        }

        function checkDialogueResponse(response) {
            if (!currentDialogue) return false;
            const normalizedResponse = response.toLowerCase().trim();
            if (currentDialogue.responses.some(validResponse =>
                normalizedResponse.includes(validResponse.toLowerCase())
            )) {
                // Add cute random response when correct
                const randomResponse = getRandomResponse();
                statusDisplay.textContent = randomResponse;
                playRandomSound(soundEffects.romantic);
                return true;
            }
            return false;
        }

        dialogueInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const response = dialogueInput.value;
                if (checkDialogueResponse(response)) {
                    score += 50;
                    rizzCoins += 2;
                    scoreDisplay.textContent = score;
                    rizzDisplay.textContent = rizzCoins;
                    statusDisplay.textContent = "Perfect response! +50 points, +2 Rizz Coins";
                    playRandomSound(soundEffects.affectionate);
                    resetInactivityTimer();
                } else {
                    rizzCoins -= 3; // Changed from 5 to 3
                    rizzDisplay.textContent = rizzCoins;
                    statusDisplay.textContent = "Wrong answer! -3 Rizz Coins";
                    
                    if (rizzCoins < 0) {
                        gameOver("No more rizz! *walks away disappointed*");
                    }
                }
                dialogueBox.style.display = 'none';
                clearTimeout(dialogueTimerTimeout);
            }
        });

        cowgirl.addEventListener('click', (e) => {
            if (!gameActive) return;

            const currentTime = Date.now();
            if (!checkClickRate(currentTime)) return;
            lastClickTime = currentTime;
            resetInactivityTimer();

            const rect = cowgirl.getBoundingClientRect();
            const clickY = e.clientY - rect.top;
            const zoneHeight = rect.height / 3;  // Divide image into thirds

            // Head/shoulder zone
            if (clickY < zoneHeight) {
                score += 1;
                addHeart(e.pageX, e.pageY);
                showRandomBubble(e.pageX + 30, e.pageY - 30);
                playRandomSound(soundEffects.affectionate);
            } 
            // Middle/chest zone 
            else if (clickY > zoneHeight && clickY < zoneHeight * 2) {
                triggerChestJiggle();
                blush.style.opacity = '1';
                setTimeout(() => blush.style.opacity = '0', 500);
                playRandomSound(soundEffects.giggles);
                showRandomBubble(e.pageX + 30, e.pageY - 30);
                
                // Stronger jiggle animation for middle zone
                cowgirl.style.animation = 'jiggle 0.8s cubic-bezier(.36,.07,.19,.97)';
                setTimeout(() => cowgirl.style.animation = '', 800);
            }
            // Bottom zone
            else {
                // 20% chance to lose a point
                if (Math.random() < 0.2) {
                    score = Math.max(0, score - 1);
                    showRandomBubble(e.pageX + 30, e.pageY - 30, "angry");
                    playRandomSound(soundEffects.angry);
                }
            }

            scoreDisplay.textContent = score;
            updateRelationshipStatus();

            if (Math.random() < 0.2) {
                showRandomDialogue();
            }
        });

        setInterval(() => {
            if (gameActive && Math.random() < 0.3) {
                showRandomDialogue();
            }
        }, 5000);

        function initGame() {
            gameActive = true;
            score = 0;
            rizzCoins = 10;
            scoreDisplay.textContent = score;
            rizzDisplay.textContent = rizzCoins;
            statusDisplay.textContent = "Stranger";
            startInactivityTimer();
            startOverlay.style.display = 'none';
            dialogueBox.style.display = 'none';
            ambientMusic.play().catch(e => console.log("Music play failed:", e));
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !gameActive) {
                initGame();
            }
        });

        initGame();
    </script>
</body>
</html>
