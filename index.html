async function reconnectWebSocket() {

  try {
    room = new WebsimSocket();

async function refreshPosts() {
  try {
    const posts = await room.store.get('posts') || [];
    const postsContainer = document.getElementById('posts');
    postsContainer.innerHTML = '';

    // Sort posts by timestamp, newest first
    const sortedPosts = [...posts].sort((a, b) => b.timestamp - a.timestamp);

    // Remove posts older than 5 minutes
    const fiveMinutesAgo = Date.now() - (5 * 60 * 1000);
    const recentPosts = sortedPosts.filter(post => post.timestamp > fiveMinutesAgo);

    // Update store with filtered posts if there's a difference
    if (recentPosts.length !== posts.length) {
      await room.store.update({
        id: 'posts',
        dependencies: { recentPosts },
        updateFunction: () => recentPosts
      });
    }
    
    // Render each post
    recentPosts.forEach(post => {
      const postElement = createPostElement(post);
      postsContainer.appendChild(postElement);
    });
  } catch (error) {
    console.error('Error refreshing posts:', error);
    if (error.message?.includes('WebSocket') || error.message?.includes('connection')) {
      await reconnectWebSocket();
    }
  }
}

      username,
      avatarUrl,
      timestamp: Date.now(),
      likes: [],
      dislikes: [],
      reglorps: [],
      replies: []
    };

    await room.store.update({
      id: 'posts',
      dependencies: { post },
      updateFunction: (posts = []) => [...posts, post]
    });
    
    await refreshPosts();
    playAlienSound();

    console.error('Error generating post:', error);
    if (error.message?.includes('WebSocket') || error.message?.includes('connection')) {
      await reconnectWebSocket();
      await generatePost(content);
    } else {
      throw error;
    }
  }
}

  const username = room.party.client.username;

  try {

      id: 'posts',
      dependencies: { replyContent, replyingToPostId, username },
      updateFunction: (posts) => {
        return posts.map(post => {
          if (post.id === replyingToPostId) {
            const replies = post.replies || [];
            return {...post, replies: [...replies, {username, content: replyContent, timestamp: Date.now()}]};

          return post;

      await submitReply();

  }

async function handleLike(postId) {
  const username = room.party.client.username;
  await safeSendToStore(async () => {
    await room.store.update({
      id: 'posts',
      dependencies: { postId, username },
      updateFunction: (posts) => {
        return posts.map(post => {
          if (post.id === postId) {
            const likes = post.likes || [];
            const dislikes = post.dislikes || [];
            const index = likes.indexOf(username);
            
            if (index === -1) {
              return {
                ...post,
                likes: [...likes, username],
                dislikes: dislikes.filter(u => u !== username)
              };
            } else {
              return {
                ...post,
                likes: likes.filter(u => u !== username)
              };
            }
          }
          return post;
        });
      }
    });
  });

  const posts = await room.store.get('posts');
  const updatedPost = posts.find(p => p.id === postId);
  if (updatedPost) notifyInteractions(updatedPost, 'like');
}

const audioContext = new (window.AudioContext || window.webkitAudioContext)();

function playAlienSound() {
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
  gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
  
  oscillator.frequency.exponentialRampToValueAtTime(
    400,
    audioContext.currentTime + 0.2
  );
  
  gainNode.gain.exponentialRampToValueAtTime(
    0.01,
    audioContext.currentTime + 0.3
  );
  
  oscillator.start();
  oscillator.stop(audioContext.currentTime + 0.3);
}

function playNotificationSound(type) {
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  
  oscillator.type = 'sine';
  
  switch(type) {
    case 'like':
      oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 0.1);
      break;
    case 'dislike':
      oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.1);
      break;
    case 'reglorp':
      oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(600, audioContext.currentTime + 0.2);
      break;
    case 'reply':
      oscillator.frequency.setValueAtTime(500, audioContext.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(700, audioContext.currentTime + 0.15);
      break;
    default:
      oscillator.frequency.setValueAtTime(500, audioContext.currentTime);
  }
  
  gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
  
  oscillator.start();
  oscillator.stop(audioContext.currentTime + 0.2);
}

function createFloatingParticles() {
  for (let i = 0; i < 50; i++) {
    const particle = document.createElement('div');
    particle.className = 'floating-particle';
    particle.style.left = Math.random() * window.innerWidth + 'px';
    particle.style.top = Math.random() * window.innerHeight + 'px';
    document.body.appendChild(particle);
    
    const animate = () => {
      const x = parseFloat(particle.style.left);
      const y = parseFloat(particle.style.top);
      
      particle.style.left = (x + (Math.random() - 0.5) * 2) + 'px';
      particle.style.top = (y + (Math.random() - 0.5) * 2) + 'px';
      
      if (x < 0) particle.style.left = window.innerWidth + 'px';
      if (x > window.innerWidth) particle.style.left = '0px';
      if (y < 0) particle.style.top = window.innerHeight + 'px';
      if (y > window.innerHeight) particle.style.top = '0px';
      
      requestAnimationFrame(animate);
    };
    
    animate();
  }
}

function spawnUFOs() {
  const ufos = ['🛸', '🛸', '🛸'];
  const ufoElements = [];
  
  ufos.forEach(ufo => {
    const ufoElement = document.createElement('div');
    ufoElement.className = 'flying-ufo';
    ufoElement.textContent = ufo;
    ufoElement.style.left = Math.random() * window.innerWidth + 'px';
    ufoElement.style.top = Math.random() * window.innerHeight + 'px';
    document.body.appendChild(ufoElement);
    ufoElements.push(ufoElement);
    
    ufoElement.vx = (Math.random() - 0.5) * 4;
    ufoElement.vy = (Math.random() - 0.5) * 4;
  });

  function animateUFOs() {
    ufoElements.forEach(ufo => {
      let x = parseFloat(ufo.style.left);
      let y = parseFloat(ufo.style.top);
      
      ufo.vx += (Math.random() - 0.5) * 0.2;
      ufo.vy += (Math.random() - 0.5) * 0.2;
      
      ufo.vx *= 0.99;
      ufo.vy *= 0.99;
      
      x += ufo.vx;
      y += ufo.vy;
      
      if (x < -50) x = window.innerWidth;
      if (x > window.innerWidth) x = -50;
      if (y < -50) y = window.innerHeight;
      if (y > window.innerHeight) y = -50;
      
      const angle = Math.atan2(ufo.vy, ufo.vx) * (180 / Math.PI);
      ufo.style.transform = `rotate(${angle}deg)`;
      
      ufo.style.left = x + 'px';
      ufo.style.top = y + 'px';
    });
    
    requestAnimationFrame(animateUFOs);
  }
  
  animateUFOs();
}
