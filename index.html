<html><head><base href="https://psychedelic-vr-experience.com/"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Psychedelic VR Art Experience</title><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script><style>
body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background-color: #000;
}
#vr-container {
  width: 100%;
  height: 100%;
}
.loading {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  font-family: Arial, sans-serif;
  font-size: 24px;
  text-align: center;
}
.button-container {
  position: absolute;
  bottom: 20px;
  left: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  z-index: 1000;
}
.add-animation-btn {
  padding: 10px 20px;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.3s ease;
}
.add-animation-btn:hover {
  transform: scale(1.05);
}
.add-animation-btn:active {
  transform: scale(0.95);
}
.randomize-container {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 1000;
}
.randomize-btn {
  padding: 10px 20px;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.3s ease;
}
.randomize-btn:hover {
  transform: scale(1.05);
}
.randomize-btn:active {
  transform: scale(0.95);
}
</style></head><body>
<div id="vr-container">
  <div class="button-container">
    <button class="add-animation-btn" style="background-color: #4CAF50;">Add Animation</button>
    <button class="add-animation-btn" style="background-color: #2196F3;">Add Animation 2</button>
    <button class="add-animation-btn" style="background-color: #FF9800;">Add Animation 3</button>
    <button class="add-animation-btn" style="background-color: #E91E63;">Add Animation 4</button>
    <button class="add-animation-btn" style="background-color: #9C27B0;">Add Animation 5</button>
    <button class="add-animation-btn" style="background-color: #00BCD4;">Add Animation 6</button>
    <button class="add-animation-btn" style="background-color: #FFEB3B; color: black;">Add Animation 7</button>
    <button class="add-animation-btn" style="background-color: #795548;">Add Animation 8</button>
  </div>
  <div class="randomize-container">
    <button id="randomize-colors" class="randomize-btn" style="background-color: #FF4081;">Randomize Colors</button>
    <button id="randomize-shapes" class="randomize-btn" style="background-color: #7C4DFF;">Randomize Shapes</button>
    <button id="randomize-effects" class="randomize-btn" style="background-color: #00E5FF;">Randomize Effects</button>
  </div>
</div>
<div class="loading">Entering the Psychedelic Realm...</div>

<script>
let scene, camera, renderer, composer;
let geometry, material, mesh;
let clock = new THREE.Clock();
let objects = [];

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.getElementById('vr-container').appendChild(renderer.domElement);

  // Create a complex geometry
  geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);

  // Create a psychedelic material
  material = new THREE.ShaderMaterial({
    uniforms: {
      time: { value: 0 }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float time;
      varying vec2 vUv;
      
      vec3 hsv2rgb(vec3 c) {
        vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
        vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
        return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
      }

      void main() {
        vec2 uv = vUv;
        float t = time * 0.5;
        
        vec3 color = hsv2rgb(vec3(
          sin(uv.x * 10.0 + t) * 0.5 + 0.5,
          cos(uv.y * 10.0 - t) * 0.5 + 0.5,
          sin((uv.x + uv.y) * 5.0 + t) * 0.5 + 0.5
        ));
        
        gl_FragColor = vec4(color, 1.0);
      }
    `
  });

  mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);
  objects.push(mesh);

  // Add some particle systems for extra psychedelia
  addParticles();

  // Add ambient light
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  // Add directional light
  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
  directionalLight.position.set(5, 5, 5);
  scene.add(directionalLight);

  // Remove loading message
  document.querySelector('.loading').style.display = 'none';

  // Add event listeners for all buttons
  const addAnimationButtons = document.querySelectorAll('.add-animation-btn');
  addAnimationButtons.forEach((button, index) => {
    button.addEventListener('click', () => addNewAnimation(index));
  });

  // Add event listeners for randomize buttons
  document.getElementById('randomize-colors').addEventListener('click', randomizeColors);
  document.getElementById('randomize-shapes').addEventListener('click', randomizeShapes);
  document.getElementById('randomize-effects').addEventListener('click', randomizeEffects);
}

function addParticles() {
  const particleCount = 5000;
  const particles = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);

  for (let i = 0; i < particleCount * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 10;
  }

  particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const particleMaterial = new THREE.PointsMaterial({
    color: 0xFFFFFF,
    size: 0.05,
    transparent: true
  });

  const particleSystem = new THREE.Points(particles, particleMaterial);
  scene.add(particleSystem);
  objects.push(particleSystem);
}

function animate() {
  requestAnimationFrame(animate);

  const elapsedTime = clock.getElapsedTime();

  // Rotate the main mesh
  mesh.rotation.x += 0.005;
  mesh.rotation.y += 0.01;

  // Update shader uniforms
  material.uniforms.time.value = elapsedTime;

  // Apply a psychedelic warp effect
  const warpIntensity = 0.5;
  mesh.position.x = Math.sin(elapsedTime) * warpIntensity;
  mesh.position.y = Math.cos(elapsedTime * 1.3) * warpIntensity;
  mesh.scale.setScalar(1 + Math.sin(elapsedTime * 2) * 0.2);

  // Rotate the camera around the scene
  camera.position.x = Math.sin(elapsedTime * 0.5) * 5;
  camera.position.z = Math.cos(elapsedTime * 0.5) * 5;
  camera.lookAt(scene.position);

  renderer.render(scene, camera);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function addNewAnimation(index) {
  let newGeometry, newMaterial;

  switch(index) {
    case 0:
      newGeometry = new THREE.IcosahedronGeometry(0.5, 0);
      newMaterial = new THREE.MeshPhongMaterial({
        color: Math.random() * 0xffffff,
        shininess: 100,
        specular: 0xffffff
      });
      break;
    case 1:
      newGeometry = new THREE.TorusGeometry(0.3, 0.1, 16, 100);
      newMaterial = new THREE.MeshNormalMaterial();
      break;
    case 2:
      newGeometry = new THREE.OctahedronGeometry(0.5);
      newMaterial = new THREE.MeshLambertMaterial({
        color: Math.random() * 0xffffff,
        emissive: Math.random() * 0xffffff
      });
      break;
    case 3:
      newGeometry = new THREE.TetrahedronGeometry(0.5);
      newMaterial = new THREE.MeshStandardMaterial({
        color: Math.random() * 0xffffff,
        metalness: Math.random(),
        roughness: Math.random()
      });
      break;
    case 4:
      newGeometry = new THREE.SphereGeometry(0.3, 32, 32);
      newMaterial = new THREE.MeshPhysicalMaterial({
        color: Math.random() * 0xffffff,
        metalness: 0.5,
        roughness: 0.5,
        clearcoat: 1.0,
        clearcoatRoughness: 0.1
      });
      break;
    case 5:
      newGeometry = new THREE.CylinderGeometry(0.2, 0.2, 0.5, 32);
      newMaterial = new THREE.MeshToonMaterial({
        color: Math.random() * 0xffffff,
        gradientMap: new THREE.TextureLoader().load('https://threejs.org/examples/textures/gradientMaps/threeTone.jpg')
      });
      break;
    case 6:
      newGeometry = new THREE.DodecahedronGeometry(0.4);
      newMaterial = new THREE.MeshMatcapMaterial({
        color: Math.random() * 0xffffff,
        matcap: new THREE.TextureLoader().load('https://threejs.org/examples/textures/matcaps/matcap-crystal.png')
      });
      break;
    case 7:
      newGeometry = new THREE.TorusKnotGeometry(0.3, 0.1, 100, 16);
      newMaterial = new THREE.ShaderMaterial({
        uniforms: {
          time: { value: 0 }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform float time;
          varying vec2 vUv;
          
          void main() {
            vec2 p = -1.0 + 2.0 * vUv;
            float a = time * 40.0;
            float d, e, f, g = 1.0 / 40.0 ,h ,i ,r ,q;
            e = 400.0 * ( p.x * 0.5 + 0.5 );
            f = 400.0 * ( p.y * 0.5 + 0.5 );
            i = 200.0 + sin( e * g + a / 150.0 ) * 20.0;
            d = 200.0 + cos( f * g / 2.0 ) * 18.0 + cos( e * g ) * 7.0;
            r = sqrt( pow( abs( i - e ), 2.0 ) + pow( abs( d - f ), 2.0 ) );
            q = f / r;
            e = ( r * cos( q ) ) - a / 2.0;
            f = ( r * sin( q ) ) - a / 2.0;
            d = sin( e * g ) * 176.0 + sin( e * g ) * 164.0 + r;
            h = ( ( f + d ) + a / 2.0 ) * g;
            i = cos( h + r * p.x / 1.3 ) * ( e + e + a ) + cos( q * g * 6.0 ) * ( r + h / 3.0 );
            h = sin( f * g ) * 144.0 - sin( e * g ) * 212.0 * p.x;
            h = ( h + ( f - e ) * q + sin( r - ( a + h ) / 7.0 ) * 10.0 + i / 4.0 ) * g;
            i += cos( h * 2.3 * sin( a / 350.0 - q ) ) * 184.0 * sin( q - ( r * 4.3 + a / 12.0 ) * g ) + tan( r * g + h ) * 184.0 * cos( r * g + h );
            i = mod( i / 5.6, 256.0 ) / 64.0;
            if ( i < 0.0 ) i += 4.0;
            if ( i >= 2.0 ) i = 4.0 - i;
            d = r / 350.0;
            d += sin( d * d * 8.0 ) * 0.52;
            f = ( sin( a * g ) + 1.0 ) / 2.0;
            gl_FragColor = vec4( vec3( f * i / 1.6, i / 2.0 + d / 13.0, i ) * d * p.x + vec3( i / 1.3 + d / 8.0, i / 2.0 + d / 18.0, i ) * d * ( 1.0 - p.x ), 1.0 );
          }
        `
      });
      break;
  }

  // Create a new mesh
  const newMesh = new THREE.Mesh(newGeometry, newMaterial);

  // Set a random position
  newMesh.position.set(
    (Math.random() - 0.5) * 5,
    (Math.random() - 0.5) * 5,
    (Math.random() - 0.5) * 5
  );

  // Add the new mesh to the scene and objects array
  scene.add(newMesh);
  objects.push(newMesh);

  // Create a random animation
  gsap.to(newMesh.rotation, {
    x: Math.random() * Math.PI * 2,
    y: Math.random() * Math.PI * 2,
    z: Math.random() * Math.PI * 2,
    duration: 2 + Math.random() * 3,
    repeat: -1,
    yoyo: true,
    ease: "power1.inOut"
  });

  gsap.to(newMesh.position, {
    x: (Math.random() - 0.5) * 5,
    y: (Math.random() - 0.5) * 5,
    z: (Math.random() - 0.5) * 5,
    duration: 3 + Math.random() * 2,
    repeat: -1,
    yoyo: true,
    ease: "power1.inOut"
  });

  // Add a point light to the new mesh
  const pointLight = new THREE.PointLight(
    newMaterial.color instanceof THREE.Color ? newMaterial.color : new THREE.Color(Math.random() * 0xffffff),
    1,
    3
  );
  newMesh.add(pointLight);

  // If the material has a time uniform, animate it
  if (newMaterial.uniforms && newMaterial.uniforms.time) {
    function updateTime() {
      newMaterial.uniforms.time.value = clock.getElapsedTime();
      requestAnimationFrame(updateTime);
    }
    updateTime();
  }
}

function randomizeColors() {
  objects.forEach(obj => {
    if (obj.material) {
      if (obj.material.color) {
        obj.material.color.setHex(Math.random() * 0xffffff);
      }
      if (obj.material.emissive) {
        obj.material.emissive.setHex(Math.random() * 0xffffff);
      }
      if (obj.material.specular) {
        obj.material.specular.setHex(Math.random() * 0xffffff);
      }
    }
  });
}

function randomizeShapes() {
  const geometries = [
    new THREE.SphereGeometry(0.5, 32, 32),
    new THREE.BoxGeometry(0.6, 0.6, 0.6),
    new THREE.ConeGeometry(0.4, 0.8, 32),
    new THREE.TorusGeometry(0.4, 0.2, 16, 100),
    new THREE.TorusKnotGeometry(0.4, 0.1, 100, 16),
    new THREE.OctahedronGeometry(0.5),
    new THREE.TetrahedronGeometry(0.5),
    new THREE.IcosahedronGeometry(0.5, 0),
    new THREE.DodecahedronGeometry(0.5)
  ];

  objects.forEach(obj => {
    if (obj.geometry) {
      const newGeometry = geometries[Math.floor(Math.random() * geometries.length)];
      obj.geometry.dispose();
      obj.geometry = newGeometry;
    }
  });
}

function randomizeEffects() {
  objects.forEach(obj => {
    if (obj.material) {
      const effects = [
        new THREE.MeshBasicMaterial({ color: Math.random() * 0xffffff }),
        new THREE.MeshLambertMaterial({ color: Math.random() * 0xffffff, emissive: Math.random() * 0xffffff }),
        new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff, specular: Math.random() * 0xffffff, shininess: Math.random() * 100 }),
        new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff, roughness: Math.random(), metalness: Math.random() }),
        new THREE.MeshPhysicalMaterial({ color: Math.random() * 0xffffff, roughness: Math.random(), metalness: Math.random(), clearcoat: Math.random(), clearcoatRoughness: Math.random() }),
        new THREE.MeshNormalMaterial(),
        new THREE.MeshDepthMaterial(),
        new THREE.MeshToonMaterial({ color: Math.random() * 0xffffff })
      ];

      const newMaterial = effects[Math.floor(Math.random() * effects.length)];
      obj.material.dispose();
      obj.material = newMaterial;
    }
  });
}

window.addEventListener('resize', onWindowResize, false);

init();
animate();
</script>
</body></html>
