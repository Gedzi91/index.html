<html><head><base href="https://rude-robot.com"><title>Rude Robot</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Arial', sans-serif;
    background-color: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }
  .container {
    text-align: center;
  }
  .robot {
    width: 200px;
    height: 300px;
    background-color: #4a4a4a;
    border-radius: 50px;
    position: relative;
    margin: 0 auto 20px;
  }
  .head {
    width: 150px;
    height: 150px;
    background-color: #4a4a4a;
    border-radius: 75px;
    position: absolute;
    top: -75px;
    left: 25px;
  }
  .eye {
    width: 40px;
    height: 40px;
    background-color: #ff0000;
    border-radius: 20px;
    position: absolute;
    top: 30px;
  }
  .eye-left {
    left: 30px;
  }
  .eye-right {
    right: 30px;
  }
  .mouth {
    width: 80px;
    height: 20px;
    background-color: #000;
    position: absolute;
    bottom: 30px;
    left: 35px;
  }
  .message {
    font-size: 48px;
    font-weight: bold;
    color: #ff0000;
    text-transform: uppercase;
    animation: blink 0.5s infinite;
  }
  @keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 1; }
  }
  .button {
    background-color: #ff0000;
    color: #fff;
    border: none;
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 5px;
    transition: background-color 0.3s;
  }
  .button:hover {
    background-color: #cc0000;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="robot">
      <div class="head">
        <div class="eye eye-left"></div>
        <div class="eye eye-right"></div>
        <div class="mouth"></div>
      </div>
    </div>
    <div class="message" id="message">Fuck Off</div>
    <button class="button" onclick="toggleMessage()">Toggle Message</button>
  </div>

  <script>
    const messages = ["Fuck Off", "Go Away", "Leave Me Alone", "Not Today"];
    let currentIndex = 0;

    function toggleMessage() {
      currentIndex = (currentIndex + 1) % messages.length;
      document.getElementById('message').textContent = messages[currentIndex];
    }

    // Add some random eye movement
    setInterval(() => {
      const eyes = document.querySelectorAll('.eye');
      eyes.forEach(eye => {
        const x = Math.random() * 10 - 5;
        const y = Math.random() * 10 - 5;
        eye.style.transform = `translate(${x}px, ${y}px)`;
      });
    }, 1000);
  </script>
</body></html>
