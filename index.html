<html><head><base href="." />
<title>Galactic Civilization Simulator</title>
<style>
/* Keeping existing styles */
body {
  margin: 0;
  padding: 0;
  background: #000033;
  color: #00ffff;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}

.galaxy-view {
  width: 100vw;
  height: 100vh;
  position: relative;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle 1s infinite alternate;
}

.civilization {
  position: absolute;
  width: 30px;
  height: 30px;
  cursor: pointer;
  transition: all 0.3s;
  border-radius: 50%;
}

.civilization:hover::after {
  content: attr(data-power);
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 51, 0.9);
  padding: 5px;
  border: 1px solid #00ffff;
  border-radius: 3px;
  white-space: nowrap;
}

.player {
  border: 2px solid #00ffff;
  animation: pulse 2s infinite;
}

.enemy {
  border: 2px solid transparent;
}

.resources-panel {
  position: fixed;
  top: 20px;
  left: 20px;
  background: rgba(0, 0, 51, 0.8);
  padding: 15px;
  border: 1px solid #00ffff;
  border-radius: 5px;
}

.control-panel {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: rgba(0, 0, 51, 0.8);
  padding: 15px;
  border: 1px solid #00ffff;
  border-radius: 5px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.button {
  background: #000066;
  color: #00ffff;
  border: 1px solid #00ffff;
  padding: 10px 20px;
  cursor: pointer;
  transition: all 0.3s;
}

.button:hover {
  background: #000099;
}

.selected {
  box-shadow: 0 0 10px #00ffff;
  transform: scale(1.2);
}

.battle-flash {
  animation: battle-flash 0.5s;
}

@keyframes battle-flash {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0.5; }
  100% { transform: scale(0); opacity: 0; }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

@keyframes twinkle {
  from { opacity: 0.5; }
  to { opacity: 1; }
}
</style>
</head>
<body>

<div class="galaxy-view" id="galaxyView">
  <!-- Stars will be added dynamically -->
</div>

<div class="resources-panel">
  <div>Population: <span id="population">1000</span></div>
  <div>Resources: <span id="resources">500</span></div>
  <div>Military Power: <span id="military">100</span></div>
  <div>Systems Controlled: <span id="systems">1</span></div>
  <div>Enemy Civilizations: <span id="enemyCount">100</span></div>
  <div>Battles Won: <span id="battlesWon">0</span></div>
  <div id="selectedEnemy">Selected Enemy: None</div>
</div>

<div class="control-panel">
  <button class="button" onclick="buildColony()">Build Colony (Cost: 100)</button>
  <button class="button" onclick="upgradeMilitary()">Upgrade Military (Cost: 50)</button>
  <button class="button" onclick="harvestResources()">Harvest Resources</button>
  <button class="button" onclick="expandTerritory()">Expand Territory</button>
  <button class="button" onclick="attackSelected()">Attack Selected Enemy</button>
</div>

<script>
let gameState = {
  population: 1000,
  resources: 500,
  military: 100,
  systems: 1,
  enemies: [],
  battlesWon: 0,
  selectedEnemy: null
};

// Keeping existing functions and adding new ones
function getRandomColor() {
  const colors = [
    '#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF',
    '#FFA500', '#800080', '#008000', '#FFC0CB', '#800000', '#008080',
    '#FF4500', '#9400D3', '#FFD700', '#4B0082', '#7CFC00', '#FF1493'
  ];
  return colors[Math.floor(Math.random() * colors.length)];
}

function updateDisplay() {
  document.getElementById('population').textContent = gameState.population;
  document.getElementById('resources').textContent = gameState.resources;
  document.getElementById('military').textContent = gameState.military;
  document.getElementById('systems').textContent = gameState.systems;
  document.getElementById('enemyCount').textContent = gameState.enemies.length;
  document.getElementById('battlesWon').textContent = gameState.battlesWon;
  
  const selectedText = gameState.selectedEnemy ? 
    `Selected Enemy: Power ${gameState.selectedEnemy.power}` : 
    'Selected Enemy: None';
  document.getElementById('selectedEnemy').textContent = selectedText;
}

function createStarfield() {
  const galaxyView = document.getElementById('galaxyView');
  for(let i = 0; i < 200; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + 'vw';
    star.style.top = Math.random() * 100 + 'vh';
    galaxyView.appendChild(star);
  }
}

function createCivilization(isEnemy = false, color = null) {
  const civ = document.createElement('div');
  civ.className = isEnemy ? 'civilization enemy' : 'civilization player';
  civ.style.left = Math.random() * (window.innerWidth - 30) + 'px';
  civ.style.top = Math.random() * (window.innerHeight - 30) + 'px';
  if (isEnemy) {
    civ.style.borderColor = color || getRandomColor();
  }
  document.getElementById('galaxyView').appendChild(civ);
  return civ;
}

function selectEnemy(enemy) {
  // Clear previous selection
  document.querySelectorAll('.civilization').forEach(civ => {
    civ.classList.remove('selected');
  });
  
  if (gameState.selectedEnemy === enemy) {
    gameState.selectedEnemy = null;
  } else {
    gameState.selectedEnemy = enemy;
    enemy.element.classList.add('selected');
  }
  updateDisplay();
}

function attackSelected() {
  if (!gameState.selectedEnemy) {
    alert("Please select an enemy to attack!");
    return;
  }

  if (gameState.military < 25) {
    alert("Not enough military power to attack!");
    return;
  }

  const enemy = gameState.selectedEnemy;
  const battleResult = gameState.military > enemy.power;

  enemy.element.classList.add('battle-flash');
  setTimeout(() => {
    if (battleResult) {
      enemy.element.style.borderColor = '#00ffff';
      enemy.power = gameState.military;
      gameState.military = Math.max(1, gameState.military - 25);
      gameState.resources += 200;
      gameState.systems += 1;
      gameState.battlesWon += 1;
      alert(`Victory! Enemy civilization (Power: ${enemy.power}) conquered!`);
    } else {
      gameState.military = Math.max(1, gameState.military - 50);
      gameState.population = Math.max(0, gameState.population - 200);
      alert(`Defeat! Enemy too strong (Power: ${enemy.power})! Your forces have been repelled!`);
    }
    enemy.element.classList.remove('battle-flash');
    enemy.element.classList.remove('selected');
    gameState.selectedEnemy = null;
    updateDisplay();
  }, 500);
}

function spawnEnemy() {
  const color = getRandomColor();
  const enemy = createCivilization(true, color);
  const power = Math.floor(Math.random() * 100) + 50;
  enemy.setAttribute('data-power', `Power: ${power}`);
  
  const enemyObj = {
    element: enemy,
    power: power
  };
  
  enemy.addEventListener('click', () => selectEnemy(enemyObj));
  gameState.enemies.push(enemyObj);
  updateDisplay();
}

// Keep existing game functions
function buildColony() {
  if(gameState.resources >= 100) {
    gameState.resources -= 100;
    gameState.population += 500;
    gameState.systems += 1;
    createCivilization();
    updateDisplay();
  }
}

function upgradeMilitary() {
  if(gameState.resources >= 50) {
    gameState.resources -= 50;
    gameState.military += 50;
    updateDisplay();
  }
}

function harvestResources() {
  gameState.resources += Math.floor(Math.random() * 50) + 50;
  updateDisplay();
}

function expandTerritory() {
  if(gameState.military >= 50) {
    gameState.military -= 50;
    gameState.systems += 1;
    gameState.resources += 100;
    createCivilization();
    updateDisplay();
  }
}

function enemyBattle() {
  if (gameState.enemies.length < 2) return;
  
  const attacker = gameState.enemies[Math.floor(Math.random() * gameState.enemies.length)];
  let defender;
  do {
    defender = gameState.enemies[Math.floor(Math.random() * gameState.enemies.length)];
  } while (defender === attacker);

  if (attacker.power > defender.power) {
    defender.element.style.borderColor = attacker.element.style.borderColor;
    defender.power = attacker.power;
    defender.element.setAttribute('data-power', `Power: ${defender.power}`);
    defender.element.classList.add('battle-flash');
    setTimeout(() => defender.element.classList.remove('battle-flash'), 500);
  }
}

function initGame() {
  createStarfield();
  createCivilization();
  
  for(let i = 0; i < 100; i++) {
    spawnEnemy();
  }
  
  setInterval(() => {
    gameState.resources += gameState.systems * 5;
    gameState.population += gameState.systems * 10;
    updateDisplay();
  }, 5000);
  
  setInterval(() => {
    if(gameState.enemies.length > 0) {
      const enemyPower = gameState.enemies.reduce((sum, enemy) => sum + enemy.power, 0);
      if(enemyPower > gameState.military) {
        gameState.systems = Math.max(1, gameState.systems - 1);
        gameState.population = Math.max(0, gameState.population - 500);
        alert('Your civilization is under attack! Upgrade your military!');
      }
    }
    updateDisplay();
  }, 15000);

  setInterval(() => {
    enemyBattle();
  }, 3000);
}

initGame();
</script>

</body></html>
