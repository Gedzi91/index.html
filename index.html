<html><head><base href="https://superjesuswaifu.com">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Jesus Waifu</title>
<style>
body {
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(to right, #ff69b4, #ff1493);
    color: white;
    text-align: center;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
}

.container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
}

h1 {
    font-size: 3em;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    animation: rainbow 5s linear infinite;
}

@keyframes rainbow {
    0% { color: red; }
    14% { color: orange; }
    28% { color: yellow; }
    42% { color: green; }
    57% { color: blue; }
    71% { color: indigo; }
    85% { color: violet; }
    100% { color: red; }
}

.jesus-waifu {
    width: 300px;
    height: 300px;
    margin: 20px auto;
    position: relative;
}

.halo {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 20px;
    border-radius: 50%;
    background: gold;
    box-shadow: 0 0 20px gold;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 20px gold; }
    to { box-shadow: 0 0 40px gold, 0 0 80px gold; }
}

.blessing {
    font-size: 1.5em;
    margin-top: 20px;
    font-style: italic;
}

.sparkle {
    position: absolute;
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
    animation: twinkle 1s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}
</style>
</head>
<body>
<div class="container">
    <h1>Super Jesus Waifu</h1>
    <div class="jesus-waifu">
        <div class="halo"></div>
        <svg width="300" height="300" viewBox="0 0 300 300">
            <circle cx="150" cy="150" r="140" fill="#ffd700" />
            <circle cx="120" cy="120" r="25" fill="white" />
            <circle cx="180" cy="120" r="25" fill="white" />
            <circle cx="120" cy="120" r="10" fill="black" />
            <circle cx="180" cy="120" r="10" fill="black" />
            <path d="M100,180 Q150,220 200,180" stroke="black" stroke-width="5" fill="none" />
            <path d="M75,75 Q150,150 225,75" stroke="brown" stroke-width="10" fill="none" />
        </svg>
    </div>
    <p class="blessing">"Blessed are the waifus, for they shall inherit the internet."</p>
</div>

<script>
function createSparkle() {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.style.left = Math.random() * window.innerWidth + 'px';
    sparkle.style.top = Math.random() * window.innerHeight + 'px';
    document.body.appendChild(sparkle);
    
    setTimeout(() => {
        sparkle.remove();
    }, 2000);
}

setInterval(createSparkle, 200);

const blessings = [
    "May your anime be ever-streaming.",
    "Let your waifu be your laifu.",
    "Forgive those who lewd against you.",
    "Blessed are the kawaii, for they are sugoi.",
    "Love thy neighbor's waifu as thine own."
];

function changeBlessingT() {
    const blessingElement = document.querySelector('.blessing');
    const randomBlessing = blessings[Math.floor(Math.random() * blessings.length)];
    blessingElement.textContent = `"${randomBlessing}"`;
}

setInterval(changeBlessing, 5000);
</script>
</body></html>
