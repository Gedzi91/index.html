<html><head><base href="." /></head>
<style>
body {
    font-family: Arial, sans-serif;
    background: #1a1a1a;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: white;
    background-image: url('html5-2048x1274-1114558010.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.ban-screen {
    background: rgba(44, 44, 44, 0.95);
    border-radius: 15px;
    padding: 30px;
    text-align: center;
    max-width: 600px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    animation: appear 0.5s ease-out;
    backdrop-filter: blur(5px);
    border: 3px solid #4a4a4a;
}

.ban-icon {
    width: 150px;
    height: 150px;
    margin: 20px auto;
}

.ban-message {
    font-size: 24px;
    color: #ff4444;
    margin: 20px 0;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

.reason {
    font-size: 18px;
    color: #ddd;
    margin: 15px 0;
}

.ban-time {
    font-size: 16px;
    color: #888;
    margin: 10px 0;
}

.warning {
    margin-top: 20px;
    color: #ffa500;
    font-size: 14px;
    line-height: 1.5;
}

@keyframes appear {
    from {
        transform: scale(0.8);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

.praying-penguin {
    width: 150px;
    height: 150px;
    margin: 20px auto;
    animation: wobble 2s infinite;
}

@keyframes wobble {
    0% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
    100% { transform: rotate(-5deg); }
}
</style>
<body>
    <div class="ban-screen">
        <img src="latest-231475651.png" class="praying-penguin" alt="Banned Penguin">
        <div class="ban-message">YOU HAVE BEEN BANNED</div>
        <div class="reason">
            Inappropriate Language: "PEPPE BRESCIA"<br>
            This type of language is not allowed in Club Penguin
        </div>
        <div class="ban-time">Ban Duration: 24 hours</div>
        <div class="warning">
            Please review our Community Guidelines.<br>
            Multiple violations may result in a permanent ban.
        </div>
    </div>

    <script>
        // Add some interactivity - penguin wobbles when clicked
        document.querySelector('.praying-penguin').addEventListener('click', function() {
            this.style.animation = 'none';
            void this.offsetWidth; // Trigger reflow
            this.style.animation = 'wobble 2s infinite';
        });
    </script>
</body></html>
