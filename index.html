<html><head><base href="https://Omni.Engine"><title>Omni.Engine - Desire Search</title><style>
@import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;700&display=swap');
body{background:#000;color:#fff;font-family:'Source Code Pro',monospace;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.container{text-align:center;width:85%;max-width:850px;transform:translateY(-5vh)}
h1{font-size:3em;margin-bottom:25px;letter-spacing:.2em;transform:scaleX(1.2) scaleY(.9);font-weight:300}
form{display:flex;justify-content:center;margin-bottom:20px}
input,button{font-size:22px;padding:12px;font-family:'Source Code Pro',monospace;font-weight:300;letter-spacing:.05em}
input{flex-grow:1;background:#111;color:#fff;border:none;border-radius:8px 0 0 8px;transform:scaleY(.92)}
button{background:#fff;color:#000;border:none;cursor:pointer;border-radius:0 8px 8px 0;width:120px;transform:scaleY(.92)}
#eye-image{width:130px;height:auto;filter:invert(1)}
#menu-icon{position:fixed;top:20px;right:20px;width:40px;height:40px;cursor:pointer;display:flex;justify-content:center;align-items:center;font-weight:bold;font-size:24px;color:#fff;z-index:1000}
#overlay{display:none;position:fixed;top:0;right:0;width:300px;height:100%;background:rgba(0,0,0,0.9);z-index:999;overflow-y:auto;padding:20px;box-sizing:border-box}
.menu-item{margin:20px 0;padding:10px;background:#111;border-radius:5px;cursor:pointer;transition:all 0.3s ease;text-decoration:none;color:#fff;display:block}
.menu-item:hover{background:#222;transform:translateX(5px)}
#menu-icon.close{font-size:32px}
</style></head><body>
<div class="container">
<h1><a href="https://Omni.Engine" style="color:#fff;text-decoration:none;">Omni.Engine</a></h1>
<form method="GET" action="/search">
<input type="text" name="q" placeholder="What do you Desire?" id="desireInput">
<button type="submit">Search</button>
</form>
<a href="https://Omni.Engine/about"><img id="eye-image" src="https://creazilla-store.fra1.digitaloceanspaces.com/cliparts/20734/simple-eye-clipart-md.png" alt="Simple eye clipart, white" width="130" height="74"></a>
</div>
<div id="menu-icon">☰</div>
<div id="overlay">
<a href="https://Omni.Engine/images" class="menu-item">Image Search</a>
<a href="https://Omni.Engine/news" class="menu-item">News Search</a>
<a href="https://Omni.Engine/wiki" class="menu-item">Wiki Search</a>
<a href="https://Omni.Engine/academic" class="menu-item">Academic Search</a>
<a href="https://Omni.Engine/multiverse" class="menu-item">Multiverse Search</a>
</div>
<script>
const menuIcon=document.getElementById('menu-icon'),overlay=document.getElementById('overlay');let isOpen=false;menuIcon.addEventListener('click',()=>{isOpen=!isOpen;overlay.style.display=isOpen?'block':'none';menuIcon.innerHTML=isOpen?'×':'☰';menuIcon.classList.toggle('close',isOpen);});
</script>
</body></html>
