<html><head><base href="https://duckieverse.com/">
<title>Duckieverse - DuckSphere's 15-Phase Adventure</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #87CEEB, #E0F6FF);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  #game-container {
    display: flex;
    flex-direction: column;
    background: rgba(255, 255, 255, 0.8);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
  }
  #main-content {
    display: flex;
  }
  #duck-container {
    width: 300px;
    height: 300px;
    position: relative;
    overflow: hidden;
    background: url('pond.jpg') no-repeat center center;
    background-size: cover;
    border-radius: 10px;
  }
  #duck {
    position: absolute;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: yellow;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: all 0.3s ease;
  }
  #duck::before {
    content: '';
    position: absolute;
    width: 20px;
    height: 10px;
    background: orange;
    top: 30px;
    left: 70px;
    border-radius: 50% 50% 0 0;
    transition: all 0.3s ease;
  }
  #duck::after {
    content: '•';
    position: absolute;
    font-size: 24px;
    top: 20px;
    left: 30px;
    transition: all 0.3s ease;
  }
  #stats {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
  }
  button {
    background: #4CAF50;
    border: none;
    color: white;
    padding: 10px 20px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 4px 2px;
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.3s ease;
  }
  button:hover {
    background: #45a049;
  }
  button:disabled {
    background: #cccccc;
    cursor: not-allowed;
  }
  #shop {
    margin-top: 20px;
  }
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.7);
    animation: ripple 1s linear;
    pointer-events: none;
  }
  @keyframes ripple {
    to {
      transform: scale(4);
      opacity: 0;
    }
  }
  #minigame-container {
    width: 300px;
    height: 300px;
    background: #f0f0f0;
    border-radius: 10px;
    margin-right: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-around;
    position: relative;
  }
  #minigame-area {
    width: 280px;
    height: 50px;
    background: #e0e0e0;
    position: relative;
    overflow: hidden;
  }
  #dot {
    width: 10px;
    height: 10px;
    background: red;
    border-radius: 50%;
    position: absolute;
    top: 20px;
  }
  #target-zone {
    width: 20px;
    height: 50px;
    background: rgba(0, 255, 0, 0.3);
    position: absolute;
    left: 130px;
  }
  #minigame-result {
    font-size: 18px;
    font-weight: bold;
  }
  #duck-name {
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 10px;
    color: #4CAF50;
  }
  #duck-bio {
    background: #f9f9f9;
    border-radius: 10px;
    padding: 15px;
    margin-top: 20px;
    font-style: italic;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  @keyframes rotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }
  @keyframes pulsate {
    0% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.1); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes dimensionShift {
    0% { clip-path: circle(50% at 50% 50%); }
    50% { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
    100% { clip-path: circle(50% at 50% 50%); }
  }
</style>
</head>
<body>
<div id="game-container">
  <div id="duck-name">DuckSphere</div>
  <div id="main-content">
    <div id="minigame-container">
      <h2>Perfection Minigame</h2>
      <div id="minigame-area">
        <div id="target-zone"></div>
        <div id="dot"></div>
      </div>
      <div id="minigame-result">Press spacebar to stop the dot</div>
      <button id="start-minigame">Start Game</button>
    </div>
    <div>
      <h1>Duckieverse</h1>
      <div id="duck-container">
        <div id="duck"></div>
      </div>
      <div id="stats">
        <span>Phase: <span id="phase">1</span></span>
        <span>XP: <span id="xp">0</span></span>
        <span>Coins: <span id="coins">100</span></span>
      </div>
      <div id="shop">
        <button id="feed">Feed DuckSphere (10 coins)</button>
      </div>
    </div>
  </div>
  <div id="duck-bio"></div>
</div>

<script>
  const duck = document.getElementById('duck');
  const feedButton = document.getElementById('feed');
  const phaseDisplay = document.getElementById('phase');
  const xpDisplay = document.getElementById('xp');
  const coinsDisplay = document.getElementById('coins');
  const duckBio = document.getElementById('duck-bio');
  const minigameArea = document.getElementById('minigame-area');
  const dot = document.getElementById('dot');
  const minigameResult = document.getElementById('minigame-result');
  const startMinigameButton = document.getElementById('start-minigame');

  let phase = 1;
  let xp = 0;
  let coins = 100;
  let minigameInterval;
  let isGameRunning = false;
  let dotPosition = 0;
  let dotDirection = 1;

  const duckName = "DuckSphere";

  const bioPhrases = [
    `${duckName} is a perfectly spherical duck with a passion for geometry.`,
    `As ${duckName} grows, it dreams of becoming the roundest entity in the universe.`,
    `${duckName}'s favorite snack is pi-flavored crackers, naturally.`,
    `Some say ${duckName} isn't your typical duck. They're absolutely right - it's a sphere!`,
    `${duckName} has achieved such perfect roundness that it's now studying quantum physics.`,
    `${duckName} has started to manipulate its own spherical form at will.`,
    `The laws of physics seem to bend around ${duckName}'s perfect spherical shape.`,
    `${duckName} now exists in multiple dimensions simultaneously.`,
    `Reality itself seems to curve around ${duckName}'s hyperspherical presence.`,
    `${duckName} has become one with the cosmos, a living embodiment of universal perfection.`,
    `${duckName} now perceives time as a spherical construct, existing at all moments simultaneously.`,
    `The very fabric of space-time ripples with ${duckName}'s every movement.`,
    `${duckName} has transcended physical form, becoming a conceptual sphere of pure energy.`,
    `Universes are born and die within the infinite curves of ${duckName}'s spherical essence.`,
    `${duckName} has achieved such perfect roundness that it has become the mathematical constant of reality itself.`
  ];

  function updateBio() {
    const bioPhrase = bioPhrases[phase - 1] || `${duckName} has transcended all known forms of existence.`;
    duckBio.textContent = bioPhrase;
  }

  function updateStats() {
    phaseDisplay.textContent = phase;
    xpDisplay.textContent = xp;
    coinsDisplay.textContent = coins;
    feedButton.disabled = coins < 10;
    updateBio();
  }

  function evolve() {
    if (xp >= 100 && phase < 15) {
      phase++;
      xp = 0;
      const hue = (phase - 1) * 24; // 360 degrees / 15 phases
      duck.style.background = `hsl(${hue}, 100%, 50%)`;
      duck.style.width = `${100 + (phase - 1) * 10}px`;
      duck.style.height = `${100 + (phase - 1) * 10}px`;
      
      // Add special effects for higher phases
      if (phase >= 5) {
        duck.style.boxShadow = `0 0 ${phase * 5}px rgba(255, 255, 255, 0.7)`;
      }
      if (phase >= 7) {
        duck.style.animation = `rotate ${16 - phase}s linear infinite`;
      }
      if (phase >= 9) {
        duck.style.background = `radial-gradient(circle, hsl(${hue}, 100%, 50%), hsl(${(hue + 180) % 360}, 100%, 50%))`;
      }
      if (phase >= 11) {
        duck.style.animation = `rotate ${16 - phase}s linear infinite, pulsate 2s ease-in-out infinite`;
      }
      if (phase >= 13) {
        duck.style.animation = `rotate ${16 - phase}s linear infinite, pulsate 2s ease-in-out infinite, dimensionShift 5s ease-in-out infinite`;
      }
      if (phase === 15) {
        duck.style.background = `conic-gradient(from 0deg, 
          hsl(0, 100%, 50%), 
          hsl(60, 100%, 50%), 
          hsl(120, 100%, 50%), 
          hsl(180, 100%, 50%), 
          hsl(240, 100%, 50%), 
          hsl(300, 100%, 50%), 
          hsl(360, 100%, 50%)
        )`;
      }
      
      updateBio();
    }
  }

  function createRipple(x, y) {
    const ripple = document.createElement('div');
    ripple.classList.add('ripple');
    ripple.style.left = `${x}px`;
    ripple.style.top = `${y}px`;
    duck.parentElement.appendChild(ripple);
    setTimeout(() => ripple.remove(), 1000);
  }

  duck.addEventListener('click', (e) => {
    const rect = duck.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    createRipple(x, y);
  });

  feedButton.addEventListener('click', () => {
    if (coins >= 10) {
      coins -= 10;
      xp += 10;
      evolve();
      updateStats();

      duck.style.transform = 'translate(-50%, -50%) scale(1.1)';
      setTimeout(() => {
        duck.style.transform = 'translate(-50%, -50%) scale(1)';
      }, 200);
    }
  });

  // Perfection Minigame logic with faster dot movement
  function moveDot() {
    dotPosition += dotDirection * 8;
    if (dotPosition <= 0 || dotPosition >= 270) {
      dotDirection *= -1;
    }
    dot.style.left = `${dotPosition}px`;
  }

  function startGame() {
    isGameRunning = true;
    dotPosition = 0;
    dotDirection = 1;
    startMinigameButton.disabled = true;
    minigameResult.textContent = "Press spacebar to stop the dot";

    minigameInterval = setInterval(moveDot, 16);
  }

  function endGame() {
    isGameRunning = false;
    clearInterval(minigameInterval);
    startMinigameButton.disabled = false;

    const center = 140;
    const distance = Math.abs(dotPosition - center);
    let earnedCoins = Math.max(1, Math.round(50 - distance));

    coins += earnedCoins;
    updateStats();

    minigameResult.textContent = `You earned ${earnedCoins} coins!`;
  }

  startMinigameButton.addEventListener('click', startGame);

  document.addEventListener('keydown', (e) => {
    if (isGameRunning && e.code === 'Space') {
      endGame();
    }
  });

  // Secret code implementation
  let secretCode = '';
  const correctCode = '123';

  document.addEventListener('keydown', (e) => {
    if (!isGameRunning) {
      if (e.key >= '1' && e.key <= '3') {
        secretCode += e.key;
        if (secretCode === correctCode) {
          coins += 10000;
          updateStats();
          alert('Congratulations! You found the secret code and received 10000 coins!');
          secretCode = '';
        } else if (secretCode.length >= 3) {
          secretCode = '';
        }
      }
    }
  });

  updateStats();
</script>
</body></html>
