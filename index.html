<html><head><base href="https://www.dreamtechai.com/research/holographic-technology/ai-reconstruction/demo/fullscreen/"><title>DreamTech AI - Fullscreen Holographic Demo</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Roboto', sans-serif;
  background-color: #000;
  color: #fff;
}

#demoCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 1;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  pointer-events: none;
}

.controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  display: flex;
  gap: 10px;
  background-color: rgba(0, 0, 0, 0.5);
  padding: 10px;
  border-radius: 10px;
}

.control-btn {
  background-color: rgba(59, 130, 246, 0.6);
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 5px;
  cursor: pointer;
  transition: background-color 0.3s;
}

.control-btn:hover {
  background-color: rgba(59, 130, 246, 0.8);
}

.stats {
  position: fixed;
  top: 20px;
  left: 20px;
  background-color: rgba(0, 0, 0, 0.5);
  padding: 10px;
  border-radius: 5px;
  font-family: 'Courier New', monospace;
  z-index: 3;
}

.exit-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  background-color: rgba(239, 68, 68, 0.6);
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 5px;
  cursor: pointer;
  z-index: 3;
  transition: background-color 0.3s;
}

.exit-btn:hover {
  background-color: rgba(239, 68, 68, 0.8);
}

@keyframes pulse {
  0% { opacity: 0.4; }
  50% { opacity: 0.6; }
  100% { opacity: 0.4; }
}

.pulse-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
  animation: pulse 4s infinite;
  z-index: 1;
  pointer-events: none;
}
</style>
</head>
<body>
  <canvas id="demoCanvas"></canvas>
  <div class="overlay">
    <div class="pulse-overlay"></div>
  </div>
  <div class="controls">
    <button class="control-btn" id="toggleReconstructionBtn">Toggle Reconstruction</button>
    <button class="control-btn" id="changeResolutionBtn">Change Resolution</button>
    <button class="control-btn" id="addNoiseBtn">Add/Remove Noise</button>
    <button class="control-btn" id="changeShapeBtn">Change Shape</button>
    <button class="control-btn" id="rotateBtn">Rotate</button>
  </div>
  <div class="stats" id="statsDisplay"></div>
  <button class="exit-btn" id="exitFullscreenBtn">Exit Fullscreen</button>

<script>
const canvas = document.getElementById('demoCanvas');
const ctx = canvas.getContext('2d');
const statsDisplay = document.getElementById('statsDisplay');

// Set canvas size
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Simulation variables
let particles = [];
let isReconstructed = false;
let resolution = 5;
let noiseLevel = 0;
let shape = 'sphere';
let rotation = 0;

function createParticles() {
  particles = [];
  const totalParticles = 10000;
  for (let i = 0; i < totalParticles; i++) {
    let x, y, z;
    if (shape === 'sphere') {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = Math.min(canvas.width, canvas.height) * 0.4;
      x = r * Math.sin(phi) * Math.cos(theta);
      y = r * Math.sin(phi) * Math.sin(theta);
      z = r * Math.cos(phi);
    } else if (shape === 'torus') {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.random() * Math.PI * 2;
      const r = Math.min(canvas.width, canvas.height) * 0.1;
      const R = Math.min(canvas.width, canvas.height) * 0.3;
      x = (R + r * Math.cos(theta)) * Math.cos(phi);
      y = (R + r * Math.cos(theta)) * Math.sin(phi);
      z = r * Math.sin(theta);
    } else {
      x = (Math.random() - 0.5) * canvas.width * 0.8;
      y = (Math.random() - 0.5) * canvas.height * 0.8;
      z = (Math.random() - 0.5) * Math.min(canvas.width, canvas.height) * 0.8;
    }
    particles.push({
      x, y, z,
      size: Math.random() * 3 + 1,
      color: `hsl(${Math.random() * 60 + 200}, 100%, ${50 + Math.random() * 50}%)`
    });
  }
}

function rotateParticles() {
  const cosR = Math.cos(rotation);
  const sinR = Math.sin(rotation);
  particles.forEach(p => {
    const x = p.x * cosR - p.z * sinR;
    const z = p.z * cosR + p.x * sinR;
    p.x = x;
    p.z = z;
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    const scale = 400 / (400 + p.z);
    const x = canvas.width / 2 + p.x * scale;
    const y = canvas.height / 2 + p.y * scale;
    ctx.beginPath();
    ctx.arc(x, y, p.size * scale, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  });
}

function drawReconstructedImage() {
  const imageSize = resolution;
  for (let x = 0; x < canvas.width; x += imageSize) {
    for (let y = 0; y < canvas.height; y += imageSize) {
      const color = getAverageColor(x, y, imageSize);
      ctx.fillStyle = color;
      ctx.fillRect(x, y, imageSize, imageSize);
    }
  }
}

function getAverageColor(x, y, size) {
  let r = 0, g = 0, b = 0, count = 0;
  particles.forEach(p => {
    const scale = 400 / (400 + p.z);
    const px = canvas.width / 2 + p.x * scale;
    const py = canvas.height / 2 + p.y * scale;
    if (px >= x && px < x + size && py >= y && py < y + size) {
      const rgb = hexToRgb(p.color);
      r += rgb.r;
      g += rgb.g;
      b += rgb.b;
      count++;
    }
  });
  if (count === 0) return 'rgba(0, 0, 0, 0.1)';
  r = Math.floor(r / count) + noiseLevel * (Math.random() - 0.5);
  g = Math.floor(g / count) + noiseLevel * (Math.random() - 0.5);
  b = Math.floor(b / count) + noiseLevel * (Math.random() - 0.5);
  return `rgba(${clamp(r, 0, 255)}, ${clamp(g, 0, 255)}, ${clamp(b, 0, 255)}, 0.8)`;
}

function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? {
    r: parseInt(result[1], 16),
    g: parseInt(result[2], 16),
    b: parseInt(result[3], 16)
  } : null;
}

function clamp(value, min, max) {
  return Math.min(Math.max(value, min), max);
}

function updateStats() {
  statsDisplay.innerHTML = `
    Mode: ${isReconstructed ? 'Reconstructed' : 'Raw'}<br>
    Resolution: ${resolution}px<br>
    Noise Level: ${noiseLevel}<br>
    Shape: ${shape}<br>
    Rotation: ${(rotation * 180 / Math.PI).toFixed(2)}°<br>
    Particles: ${particles.length}
  `;
}

function animate() {
  rotateParticles();
  if (isReconstructed) {
    drawReconstructedImage();
  } else {
    drawParticles();
  }
  updateStats();
  requestAnimationFrame(animate);
}

createParticles();
animate();

// Event listeners
document.getElementById('toggleReconstructionBtn').addEventListener('click', () => {
  isReconstructed = !isReconstructed;
});

document.getElementById('changeResolutionBtn').addEventListener('click', () => {
  resolution = resolution === 5 ? 10 : (resolution === 10 ? 20 : 5);
});

document.getElementById('addNoiseBtn').addEventListener('click', () => {
  noiseLevel = noiseLevel === 0 ? 50 : (noiseLevel === 50 ? 100 : 0);
});

document.getElementById('changeShapeBtn').addEventListener('click', () => {
  shape = shape === 'sphere' ? 'torus' : (shape === 'torus' ? 'random' : 'sphere');
  createParticles();
});

document.getElementById('rotateBtn').addEventListener('click', () => {
  rotation += Math.PI / 8;
});

document.getElementById('exitFullscreenBtn').addEventListener('click', () => {
  window.location.href = '/research/holographic-technology/ai-reconstruction/demo';
});

// Automatic rotation
setInterval(() => {
  rotation += 0.005;
}, 50);

// Add mouse/touch interactivity
let isDragging = false;
let previousMousePosition = { x: 0, y: 0 };

canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  previousMousePosition = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mousemove', (e) => {
  if (isDragging) {
    const deltaX = e.clientX - previousMousePosition.x;
    const deltaY = e.clientY - previousMousePosition.y;
    rotation += deltaX * 0.01;
    previousMousePosition = { x: e.clientX, y: e.clientY };
  }
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
});

canvas.addEventListener('mouseleave', () => {
  isDragging = false;
});

// Touch events for mobile
canvas.addEventListener('touchstart', (e) => {
  isDragging = true;
  previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});

canvas.addEventListener('touchmove', (e) => {
  if (isDragging) {
    const deltaX = e.touches[0].clientX - previousMousePosition.x;
    const deltaY = e.touches[0].clientY - previousMousePosition.y;
    rotation += deltaX * 0.01;
    previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
});

canvas.addEventListener('touchend', () => {
  isDragging = false;
});
</script>
</body></html>
