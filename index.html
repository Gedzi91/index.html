<html><head><base href="https://websim.ai" />
  <title>BookCraft - Create Your Own Interactive Story</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    h1 {
      color: #4db6ac;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
      animation: slideDown 0.5s ease-out;
    }
    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .book-container {
      background: rgba(42, 42, 42, 0.9);
      border-radius: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      padding: 30px;
      margin-bottom: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      animation: scaleIn 0.5s ease-out;
    }
    @keyframes scaleIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .page-content {
      flex-grow: 1;
      font-size: 18px;
      line-height: 1.6;
      color: #e0e0e0;
      transition: opacity 0.3s ease;
    }
    .navigation {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }
    .nav-button {
      background: #4db6ac;
      color: #1a1a1a;
      border: none;
      width: 80px;
      height: 40px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .nav-button:hover {
      background: #45a29e;
      transform: scale(1.05);
    }
    .nav-button:disabled {
      background: #3a3a3a;
      color: #707070;
      cursor: not-allowed;
      transform: scale(1);
    }
    .nav-button::before {
      content: '';
      position: absolute;
      width: 0;
      height: 0;
      border-style: solid;
      transition: transform 0.3s ease;
    }
    #prev-page::before {
      border-width: 10px 15px 10px 0;
      border-color: transparent #1a1a1a transparent transparent;
      left: 25px;
    }
    #next-page::before {
      border-width: 10px 0 10px 15px;
      border-color: transparent transparent transparent #1a1a1a;
      right: 25px;
    }
    .nav-button:hover::before {
      transform: scale(1.2);
    }
    #prompt-form, #continuation-form {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
      width: 100%;
      animation: slideUp 0.5s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .prompt-input {
      min-height: 50px;
      max-height: 200px;
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: 2px solid #4db6ac;
      border-radius: 20px;
      background: rgba(42, 42, 42, 0.9);
      color: #e0e0e0;
      resize: none;
      overflow-y: hidden;
      margin-bottom: 10px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .prompt-input:focus {
      border-color: #66cfcf;
      box-shadow: 0 0 5px rgba(102, 207, 207, 0.5);
    }
    .submit-button, .cancel-button, .option-button {
      background: #4db6ac;
      color: #1a1a1a;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 25px;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
      margin-top: 10px;
    }
    .submit-button:hover, .cancel-button:hover, .option-button:hover {
      background: #45a29e;
      transform: translateY(-2px);
    }
    .cancel-button {
      background: #e57373;
    }
    .cancel-button:hover {
      background: #ef5350;
    }
    .options {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      animation: fadeIn 0.5s ease-out;
    }
    .option-button {
      margin: 0 10px;
    }
    #page-number {
      text-align: center;
      margin-top: 10px;
      font-style: italic;
      color: #909090;
      transition: opacity 0.3s ease;
    }
    #continuation-form {
      display: none;
    }
    .length-selector {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .length-option {
      background: rgba(42, 42, 42, 0.9);
      color: #e0e0e0;
      border: 2px solid #4db6ac;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 16px;
      flex-grow: 1;
      margin: 0 5px;
      text-align: center;
    }
    .length-option:hover, .length-option.selected {
      background: #4db6ac;
      color: #1a1a1a;
      transform: translateY(-2px);
    }
    .moving-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .shape {
      position: absolute;
      opacity: 0.1;
      animation: float 15s infinite ease-in-out;
    }
    .shape:nth-child(1) {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #4db6ac;
      left: 10%;
      top: 20%;
    }
    .shape:nth-child(2) {
      width: 120px;
      height: 120px;
      background: #45a29e;
      right: 15%;
      top: 40%;
      animation-delay: -2s;
    }
    .shape:nth-child(3) {
      width: 100px;
      height: 100px;
      background: #66cfcf;
      left: 20%;
      bottom: 20%;
      animation-delay: -4s;
    }
    .shape:nth-child(4) {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #3d8c84;
      right: 30%;
      bottom: 30%;
      animation-delay: -6s;
    }
    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-20px) rotate(180deg);
      }
    }
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #4db6ac;
      border-top: 5px solid #1a1a1a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-message {
      color: #e0e0e0;
      margin-top: 20px;
      text-align: center;
      max-width: 80%;
    }
    .recent-prompts {
      background: rgba(42, 42, 42, 0.9);
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      display: none;
    }
    .recent-prompts h2 {
      color: #4db6ac;
      margin-bottom: 15px;
    }
    .recent-prompt-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #4db6ac;
    }
    .recent-prompt-item:last-child {
      border-bottom: none;
    }
    .recent-prompt-text {
      flex-grow: 1;
      margin-right: 10px;
    }
    .recent-prompt-actions {
      display: flex;
    }
    .recent-prompt-actions button {
      background: #4db6ac;
      color: #1a1a1a;
      border: none;
      padding: 5px 10px;
      margin-left: 5px;
      border-radius: 15px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .recent-prompt-actions button:hover {
      background: #45a29e;
    }
    .button-container {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }
    .button-container button {
      flex: 1;
      margin: 0 5px;
    }
    #custom-length-input, #custom-length-input-continuation {
      width: 60px;
      text-align: center;
      padding: 5px;
      border: 2px solid #4db6ac;
      border-radius: 10px;
      background: rgba(42, 42, 42, 0.9);
      color: #e0e0e0;
      font-size: 16px;
      margin-left: 5px;
    }
    #custom-length-input:focus, #custom-length-input-continuation:focus {
      outline: none;
      border-color: #66cfcf;
      box-shadow: 0 0 5px rgba(102, 207, 207, 0.5);
    }
  </style>
</head>
<body>
  <div class="moving-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>
  <div class="container">
    <h1>BookCraft</h1>
    <form id="prompt-form">
      <textarea id="prompt-input" class="prompt-input" placeholder="Enter your book idea..." required></textarea>
      <div class="length-selector">
        <div class="length-option" data-length="short">Short (5 pages)</div>
        <div class="length-option" data-length="medium">Medium (10 pages)</div>
        <div class="length-option" data-length="long">Long (15 pages)</div>
        <div class="length-option" data-length="custom">
          Custom
          <input type="number" id="custom-length-input" min="1" max="50" value="20">
        </div>
      </div>
      <div class="button-container">
        <button type="submit" id="submit-prompt" class="submit-button">Create</button>
        <button type="button" id="recent-prompts-button" class="option-button">Recent Prompts</button>
      </div>
    </form>
    <div class="book-container">
      <div id="page-content" class="page-content"></div>
      <div id="page-number"></div>
      <div class="navigation">
        <button id="prev-page" class="nav-button" disabled></button>
        <button id="next-page" class="nav-button" disabled></button>
      </div>
    </div>
    <div class="options" style="display: none;">
      <button id="go-home" class="option-button">Go Back Home</button>
      <button id="continue-book" class="option-button">Continue This Book</button>
    </div>
    <form id="continuation-form">
      <textarea id="continuation-input" class="prompt-input" placeholder="Enter a prompt to continue the story..." required></textarea>
      <div class="length-selector">
        <div class="length-option" data-length="short">Short (5 pages)</div>
        <div class="length-option" data-length="medium">Medium (10 pages)</div>
        <div class="length-option" data-length="long">Long (15 pages)</div>
        <div class="length-option" data-length="custom">
          Custom
          <input type="number" id="custom-length-input-continuation" min="1" max="50" value="20">
        </div>
      </div>
      <div class="button-container">
        <button type="submit" id="submit-continuation" class="submit-button">Continue Story</button>
        <button type="button" id="cancel-continuation" class="cancel-button">Cancel</button>
      </div>
    </form>
    <div id="recent-prompts" class="recent-prompts">
      <h2>Recent Prompts</h2>
      <div id="recent-prompts-list"></div>
    </div>
    <button id="go-to-book" class="option-button"style="display: none;">Go Back to Book Page</button>
  </div>

  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div id="loading-message" class="loading-message"></div>
  </div>

  <script>
   let currentBook = [];
  let currentPage = 0;
  let selectedLength = 'medium';
  let recentPrompts = [];

  const promptForm = document.getElementById('prompt-form');
  const promptInput = document.getElementById('prompt-input');
  const pageContent = document.getElementById('page-content');
  const pageNumber = document.getElementById('page-number');
  const prevButton = document.getElementById('prev-page');
  const nextButton = document.getElementById('next-page');
  const options = document.querySelector('.options');
  const goHomeButton = document.getElementById('go-home');
  const continueBookButton = document.getElementById('continue-book');
  const recentPromptsContainer = document.getElementById('recent-prompts');
  const recentPromptsList = document.getElementById('recent-prompts-list');

  // Length settings for dummy pages
  const lengthSettings = {
    short: 5,
    medium: 10,
    long: 15
  };

  // Event listeners
  promptForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const prompt = promptInput.value;
    const length = selectedLength === 'custom' ? parseInt(customLengthInput.value) : lengthSettings[selectedLength];
    addRecentPrompt(prompt);
    createBook(prompt, length);
  });

  prevButton.addEventListener('click', () => navigatePage('prev'));
  nextButton.addEventListener('click', () => navigatePage('next'));
  goHomeButton.addEventListener('click', showHomePage);

  // Create a dummy book locally
  function createBook(prompt, length) {
    currentBook = Array.from({ length }, (_, i) => `Page ${i + 1}: Content generated for "${prompt}".`);
    saveBookToLocalStorage(prompt, currentBook);
    currentPage = 0;
    showBookPage();
  }

  // Save book to localStorage
  function saveBookToLocalStorage(prompt, book) {
    const books = JSON.parse(localStorage.getItem('books')) || {};
    books[prompt] = book;
    localStorage.setItem('books', JSON.stringify(books));
  }

  // Load a book from localStorage
  function loadBookFromLocalStorage(prompt) {
    const books = JSON.parse(localStorage.getItem('books')) || {};
    return books[prompt] || [];
  }

  // Update current page content
  function updatePage() {
    pageContent.textContent = currentBook[currentPage] || 'No content.';
    pageNumber.textContent = `Page ${currentPage + 1} of ${currentBook.length}`;
    prevButton.disabled = currentPage === 0;
    nextButton.disabled = currentPage === currentBook.length - 1;
  }

  // Navigate between pages
  function navigatePage(direction) {
    if (direction === 'prev' && currentPage > 0) {
      currentPage--;
    } else if (direction === 'next' && currentPage < currentBook.length - 1) {
      currentPage++;
    }
    updatePage();
  }

  // Add prompt to recent list
  function addRecentPrompt(prompt) {
    recentPrompts.unshift(prompt);
    if (recentPrompts.length > 5) recentPrompts.pop();
    localStorage.setItem('recentPrompts', JSON.stringify(recentPrompts));
  }

  // Show recent prompts
  function updateRecentPromptsList() {
    recentPromptsList.innerHTML = recentPrompts.map((prompt, index) =>
      `<div>${prompt} <button onclick="usePrompt(${index})">Use</button></div>`).join('');
  }

  // Use a recent prompt
  function usePrompt(index) {
    const prompt = recentPrompts[index];
    promptInput.value = prompt;
  }

  // Show the home page
  function showHomePage() {
    promptForm.style.display = 'block';
    options.style.display = 'none';
    pageContent.textContent = '';
    pageNumber.textContent = '';
    currentBook = [];
  }

  // Show the book page
  function showBookPage() {
    promptForm.style.display = 'none';
    options.style.display = 'flex';
    updatePage();
  }

  // Initialize from localStorage
  function initializeApp() {
    recentPrompts = JSON.parse(localStorage.getItem('recentPrompts')) || [];
    updateRecentPromptsList();
    showHomePage();
  }

  initializeApp();
  </script>
</body>
</html>
