<html><head><base href="." />
<style>
  body {
    background: #1e1e1e;
    color: #50fa7b;
    font-family: monospace;
    padding: 2rem;
  }

  .terminal {
    background: #282a36;
    border-radius: 8px;
    padding: 20px;
    width: 600px;
    margin: 0 auto;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  .prompt {
    color: #bd93f9;
  }

  .command {
    color: #f8f8f2;
  }

  .error {
    color: #ff5555;
    animation: shake 0.5s;
    margin-top: 10px;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }

  .cat {
    width: 300px;
    margin: 20px auto;
    display: block;
  }
</style>
</head>
<body>
  <div class="terminal">
    <div class="prompt">user@linux:~$</div>
    <div class="command"> :()t:|:&};:</div>
    <div class="error">Error: Fork bomb detected! Nice try! 😺</div>
    <img src="/a/fa0c92ba-60c9-4539-bcdf-f26e4d96ffd3" alt="Mischievous black cat" class="cat">
  </div>

  <script>
    // Add typing animation
    const command = document.querySelector('.command');
    const originalText = command.textContent;
    command.textContent = '';
    
    let i = 0;
    const typeWriter = () => {
      if (i < originalText.length) {
        command.textContent += originalText.charAt(i);
        i++;
        setTimeout(typeWriter, 100);
      }
    };

    typeWriter();
  </script>
</body></html>
