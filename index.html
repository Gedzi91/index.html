<html><head><base href="https://sadzfox.com"><title>Sad Fox - Need Comfort 🦊</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap');
    
    body {
        font-family: 'Indie Flower', cursive;
        background-color: #87CEEB;
        margin: 0;
        padding: 0;
        color: #333;
        background-image: 
            linear-gradient(
                to bottom,
                #87CEEB 0%,
                #E0FFFF 100%
            );
        min-height: 100vh;
    }

    .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
    }

    header {
        background-color: #FFA07A;
        padding: 20px 0;
        text-align: center;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    h1 {
        font-size: 4em;
        color: #FF7F50;
        margin: 0;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .fox-container {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 50px auto;
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0); }
    }

    .fox {
        position: absolute;
        width: 100%;
        height: 100%;
        background-color: #FF7F50;
        border-radius: 50%;
        overflow: visible;
    }

    .white-belly {
        position: absolute;
        width: 100px;
        height: 80px;
        background-color: white;
        border-radius: 50%;
        top: 160px;
        left: 100px;
        z-index: 1;
    }

    .blush {
        position: absolute;
        width: 40px;
        height: 15px;
        background-color: rgba(255, 105, 180, 0.4);
        border-radius: 50%;
        z-index: 2;
        top: 150px;
    }

    .blush-left {
        left: 60px;
    }

    .blush-right {
        right: 60px;
    }

    .ear {
        position: absolute;
        width: 0;
        height: 0;
        border-left: 40px solid transparent;
        border-right: 40px solid transparent;
        border-bottom: 100px solid #8B4513;
        z-index: -1;
    }

    .ear-left {
        top: -40px;
        left: 20px;
        transform: rotate(-30deg);
    }

    .ear-right {
        top: -40px;
        right: 20px;
        transform: rotate(30deg);
    }

    .eye {
        position: absolute;
        width: 30px;
        height: 30px;
        background-color: #000;
        border-radius: 50%;
        top: 100px;
        z-index: 2;
    }

    .eye-shine {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: white;
        border-radius: 50%;
        top: 5px;
        left: 5px;
    }

    .eye-left {
        left: 80px;
    }

    .eye-right {
        right: 80px;
    }

    .tear {
        position: absolute;
        width: 15px;
        height: 30px;
        background-color: #87CEEB;
        border-radius: 50%;
        top: 130px;
        animation: tearDrop 2s infinite;
        z-index: 2;
    }

    .tear-left {
        left: 80px;
    }

    .tear-right {
        right: 80px;
    }

    @keyframes tearDrop {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(50px); opacity: 0; }
    }

    .nose {
        position: absolute;
        width: 25px;
        height: 25px;
        background-color: #000;
        border-radius: 50%;
        top: 170px;
        left: 137px;
        z-index: 2;
    }

    .mouth {
        position: absolute;
        width: 100px;
        height: 60px;
        border: 10px solid #000;
        border-radius: 0 0 100px 100px;
        border-top: none;
        top: 180px;
        left: 100px;
        z-index: 2;
    }

    .sadness-meter {
        background-color: #FFF;
        border: 2px solid #87CEEB;
        border-radius: 20px;
        height: 30px;
        margin: 20px auto;
        width: 80%;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .sadness-level {
        background-color: #87CEEB;
        border-radius: 20px;
        height: 100%;
        width: 75%;
        transition: width 0.3s ease;
    }

    .message {
        font-size: 2em;
        text-align: center;
        color: #FF7F50;
        margin: 20px 0;
    }

    .comfort-button {
        background-color: #90EE90;
        border: none;
        border-radius: 25px;
        color: white;
        cursor: pointer;
        font-size: 1.5em;
        margin: 10px auto;
        padding: 15px 30px;
        display: block;
        font-family: 'Indie Flower', cursive;
        transition: all 0.3s;
    }

    .comfort-button:hover {
        transform: scale(1.1);
        background-color: #98FB98;
    }

    .chat-bubble {
        background: white;
        border-radius: 15px;
        padding: 15px;
        margin: 20px auto;
        max-width: 300px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        text-align: center;
        font-size: 1.2em;
        display: none;
    }
</style>
</head>
<body>
    <header>
        <h1>Sad Little Fox</h1>
    </header>
    <div class="container">
        <div class="message">Please comfort the sad fox...</div>
        <div class="chat-bubble" id="chatBubble"></div>
        <div class="fox-container">
            <div class="fox">
                <div class="white-belly"></div>
                <div class="ear ear-left"></div>
                <div class="ear ear-right"></div>
                <div class="eye eye-left">
                    <div class="eye-shine"></div>
                </div>
                <div class="eye eye-right">
                    <div class="eye-shine"></div>
                </div>
                <div class="blush blush-left"></div>
                <div class="blush blush-right"></div>
                <div class="tear tear-left"></div>
                <div class="tear tear-right"></div>
                <div class="nose"></div>
            </div>
        </div>
        <div class="sadness-meter">
            <div class="sadness-level"></div>
        </div>
        <button class="comfort-button" onclick="comfortFox()">Give Fox a Hug 🤗</button>
    </div>

<script>
let sadnessLevel = 75;
let comfortMessages = [
    "*sniff* Thank you for the hug...",
    "I feel a little better now...",
    "You're so kind...",
    "Maybe today isn't so bad...",
    "Your kindness makes me happy!",
    "I'm starting to feel better! ❤️"
];

function comfortFox() {
    if (sadnessLevel > 0) {
        sadnessLevel -= 5;
        updateSadnessMeter();
        updateFoxFace();
        showComfortMessage();
        playComfortSound();
    }
}

function updateSadnessMeter() {
    const sadnessLevelElement = document.querySelector('.sadness-level');
    sadnessLevelElement.style.width = sadnessLevel + '%';
}

function updateFoxFace() {
    const tears = document.querySelectorAll('.tear');
    tears.forEach(tear => {
        tear.style.opacity = sadnessLevel / 100;
    });
}

function showComfortMessage() {
    const chatBubble = document.getElementById('chatBubble');
    const messageIndex = Math.floor((75 - sadnessLevel) / 15);
    if (messageIndex >= 0 && messageIndex < comfortMessages.length) {
        chatBubble.textContent = comfortMessages[messageIndex];
        chatBubble.style.display = 'block';
        setTimeout(() => {
            chatBubble.style.display = 'none';
        }, 3000);
    }
}

function playComfortSound() {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(400 + (75 - sadnessLevel) * 4, audioContext.currentTime);
    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
    
    oscillator.start();
    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.5);
    setTimeout(() => oscillator.stop(), 500);
}

// Initialize fox's state
updateSadnessMeter();
updateFoxFace();
</script>
</body>
</html>
