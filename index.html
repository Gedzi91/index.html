<html><head><base href="https://shitty-titty.com">
<title>Shitty Titty - Avian Care & Hyperdimensional Hygiene</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Arial', sans-serif;
  background-color: #000;
  color: #fff;
  transition: all 0.5s ease;
  overflow: hidden;
}
.hypercube {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  perspective: 1500px;
}
.tesseract {
  position: absolute;
  width: 200px;
  height: 200px;
  top: 50%;
  left: 50%;
  transform-style: preserve-3d;
}
.cube {
  position: absolute;
  width: 200px;
  height: 200px;
  transform-style: preserve-3d;
}
.face {
  position: absolute;
  width: 200px;
  height: 200px;
  background-color: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 14px;
  overflow: hidden;
  padding: 10px;
  box-sizing: border-box;
}
.popup {
  position: fixed;
  background-color: rgba(255,255,255,0.9);
  border: 2px solid #ff0000;
  padding: 20px;
  box-shadow: 0 0 20px rgba(255,0,0,0.5);
  z-index: 1000;
  max-width: 300px;
  text-align: center;
  display: none;
  transition: all 0.5s ease;
  transform: scale(0);
  border-radius: 10px;
  transform-style: preserve-3d;
}
.close-btn {
  position: absolute;
  top: 5px;
  right: 10px;
  cursor: pointer;
  font-size: 20px;
  color: #ff0000;
}
#infection-level {
  position: fixed;
  top: 10px;
  right: 10px;
  background-color: rgba(255,0,0,0.8);
  color: white;
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 14px;
  z-index: 2000;
}
@keyframes rotate4D {
  0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) rotate3d(1, 1, 1, 0deg); }
  100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg) rotate3d(1, 1, 1, 360deg); }
}
@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-5px, 5px); }
  40% { transform: translate(5px, -5px); }
  60% { transform: translate(-5px, -5px); }
  80% { transform: translate(5px, 5px); }
  100% { transform: translate(0); }
}
@keyframes flicker {
  0% { opacity: 1; }
  50% { opacity: 0.5; }
  100% { opacity: 1; }
}
@keyframes tvOff {
  0% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(0.8); filter: brightness(0.5); }
  100% { transform: scale(0); filter: brightness(0); }
}
#desktop {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('https://i.imgur.com/JKuZSor.jpg');
  background-size: cover;
  background-position: center;
}
.folder {
  position: absolute;
  width: 80px;
  height: 80px;
  background-image: url('https://i.imgur.com/7GCGffM.png');
  background-size: contain;
  background-repeat: no-repeat;
  cursor: pointer;
}
.folder-name {
  position: absolute;
  bottom: -20px;
  left: 0;
  right: 0;
  text-align: center;
  color: white;
  text-shadow: 1px 1px 2px black;
}
</style>
</head>
<body>
  <div id="infection-level">Infection Level: 0%</div>
  <div id="popup-container"></div>
  
  <div class="hypercube" id="hypercube"></div>

  <div id="desktop">
    <div class="folder" style="top: 20px; left: 20px;">
      <div class="folder-name">My Documents</div>
    </div>
    <div class="folder" style="top: 120px; left: 20px;">
      <div class="folder-name">Recycle Bin</div>
    </div>
    <div class="folder" style="top: 220px; left: 20px;">
      <div class="folder-name">Control Panel</div>
    </div>
    <div class="folder" style="top: 20px; left: 120px;">
      <div class="folder-name">Bird Secrets</div>
    </div>
    <div class="folder" style="top: 120px; left: 120px;">
      <div class="folder-name">Virus.exe</div>
    </div>
  </div>

  <script>
    let infectionLevel = 0;
    let popupCount = 0;
    const maxPopups = 50;

    const popupTypes = [
      {
        title: "🎉 CONGRATULATIONS! 🎉",
        content: "You've won a lifetime supply of bird seed!",
        style: "background-color: #ffff00; color: #ff00ff; font-family: 'Comic Sans MS', cursive; transform: rotate3d(1, 1, 1, 45deg);"
      },
      {
        title: "🚨 WARNING! 🚨",
        content: "Your bird's poop has gained sentience!",
        style: "background-color: #ff0000; color: #ffffff; font-weight: bold; animation: flicker 0.5s infinite; transform: perspective(500px) rotateX(45deg) rotateY(45deg);"
      },
      {
        title: "👽 ALIEN BIRDS 👽",
        content: "Discover the truth about extraterrestrial avians!",
        style: "background-color: #00ff00; color: #000000; text-shadow: 0 0 5px #00ff00; transform: skew(-10deg, 10deg) rotate3d(0, 1, 1, 60deg);"
      },
      {
        title: "🌈 PSYCHEDELIC PLUMAGE 🌈",
        content: "Turn your bird into a living disco ball!",
        style: "background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet); color: white; animation: rotate4D 5s linear infinite;"
      },
      {
        title: "🧠 BIRD MIND CONTROL 🧠",
        content: "Learn how to telepathically communicate with your feathered friend!",
        style: "background-color: #800080; color: #00ffff; font-style: italic; transform: perspective(500px) rotateY(60deg) rotateZ(45deg);"
      }
    ];

    function createPopup() {
      if (popupCount >= maxPopups) return;
      
      const popup = document.createElement('div');
      popup.className = 'popup';
      popup.style.top = `${Math.random() * (window.innerHeight - 200)}px`;
      popup.style.left = `${Math.random() * (window.innerWidth - 300)}px`;
      
      const closeBtn = document.createElement('span');
      closeBtn.className = 'close-btn';
      closeBtn.innerHTML = '&times;';
      closeBtn.onclick = () => {
        popup.style.transform = 'scale(0)';
        setTimeout(() => {
          popup.remove();
          setTimeout(createPopup, 2000 + Math.random() * 3000);
        }, 500);
      };
      
      const popupType = popupTypes[Math.floor(Math.random() * popupTypes.length)];
      popup.innerHTML = `
        <h3>${popupType.title}</h3>
        <p>${popupType.content}</p>
        <button onclick="this.parentElement.querySelector('.close-btn').click();">I NEED THIS!</button>
      `;
      popup.style = popupType.style;
      popup.appendChild(closeBtn);
      
      document.getElementById('popup-container').appendChild(popup);
      setTimeout(() => {
        popup.style.display = 'block';
        popup.style.transform = 'scale(1) ' + popup.style.transform;
      }, 100);
      popupCount++;
    }

    function updateInfection() {
      infectionLevel = Math.min(100, infectionLevel + 1);
      const infectionDisplay = document.getElementById('infection-level');
      infectionDisplay.textContent = `Infection Level: ${infectionLevel}%`;
      
      document.body.style.filter = `hue-rotate(${infectionLevel * 3.6}deg) blur(${infectionLevel / 50}px)`;
      
      if (infectionLevel >= 20) {
        document.body.style.fontFamily = 'Comic Sans MS, cursive';
        document.body.style.animation = 'glitch 0.3s infinite';
      }
      
      if (infectionLevel >= 40) {
        document.querySelectorAll('.face').forEach(face => {
          face.style.backgroundColor = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},0.8)`;
        });
      }
      
      if (infectionLevel >= 60) {
        document.querySelectorAll('.face').forEach(el => {
          el.style.transform += ` matrix3d(
            ${Math.random()}, ${Math.random()}, ${Math.random()}, 0,
            ${Math.random()}, ${Math.random()}, ${Math.random()}, 0,
            ${Math.random()}, ${Math.random()}, ${Math.random()}, 0,
            ${Math.random()*10}, ${Math.random()*10}, ${Math.random()*10}, 1
          )`;
        });
      }
      
      if (infectionLevel >= 80) {
        document.querySelectorAll('*').forEach(el => {
          el.style.animation = `flicker ${Math.random() * 0.5 + 0.1}s infinite`;
        });
      }
      
      if (infectionLevel >= 100) {
        turnOffTV();
      }
    }

    function createHypercube() {
      const hypercube = document.getElementById('hypercube');
      const tesseract = document.createElement('div');
      tesseract.className = 'tesseract';
      
      for (let i = 0; i < 16; i++) {
        const cube = document.createElement('div');
        cube.className = 'cube';
        cube.style.transform = `translateZ(${i * 25 - 175}px) rotate3d(${Math.random()}, ${Math.random()}, ${Math.random()}, ${Math.random() * 360}deg)`;
        
        for (let j = 0; j < 6; j++) {
          const face = document.createElement('div');
          face.className = 'face';
          face.textContent = `Dimension ${i+1}, Face ${j+1}`;
          face.style.transform = [
            'rotateY(0deg) translateZ(100px)',
            'rotateY(90deg) translateZ(100px)',
            'rotateY(180deg) translateZ(100px)',
            'rotateY(-90deg) translateZ(100px)',
            'rotateX(90deg) translateZ(100px)',
            'rotateX(-90deg) translateZ(100px)'
          ][j];
          cube.appendChild(face);
        }
        tesseract.appendChild(cube);
      }
      hypercube.appendChild(tesseract);
    }

    function turnOffTV() {
      const hypercube = document.getElementById('hypercube');
      hypercube.style.animation = 'tvOff 2s forwards';
      setTimeout(() => {
        hypercube.style.display = 'none';
        document.getElementById('desktop').style.display = 'block';
      }, 2000);
    }

    // Initialize the hypercube
    createHypercube();

    // Start the popups after a delay
    setTimeout(() => {
      createPopup();
      setInterval(createPopup, 5000 + Math.random() * 5000);
    }, 2000);

    // Rotate the hypercube
    setInterval(() => {
      const tesseract = document.querySelector('.tesseract');
      tesseract.style.animation = `rotate4D ${20 - infectionLevel/5}s linear infinite`;
    }, 100);

    // Move popups randomly and add more dimensions
    setInterval(() => {
      document.querySelectorAll('.popup').forEach(popup => {
        popup.style.top = `${Math.random() * (window.innerHeight - 200)}px`;
        popup.style.left = `${Math.random() * (window.innerWidth - 300)}px`;
        popup.style.transform += ` rotate3d(${Math.random()}, ${Math.random()}, ${Math.random()}, ${Math.random() * 360}deg)`;
      });
    }, 10000);

    // Increase infection level over time
    setInterval(updateInfection, 1000);

  </script>
</body>
</html>
