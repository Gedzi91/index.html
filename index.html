  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;

      color: #fff;
    }
    #space-scene {
      width: 800px;
      height: 600px;
      position: fixed;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid #00ffff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 20px #00ffff;
    }
    #armchair {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 300px;
      z-index: 2000;
    }
    .avatar {
      position: absolute;
      bottom: 115px;
      width: 150px;
      height: 200px;
      z-index: 2001;
    }
    #avatar1 {
      left: calc(50% - 150px);
    }
    #avatar2 {
      left: calc(50% + 16px);
    }
    #window-frame {
      position: fixed;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 840px;
      height: 640px;
      background: url('window-frame.png') no-repeat center center;
      background-size: cover;
      pointer-events: none;
      z-index: 2002;
    }
    #dolphin-emoji {
      position: absolute;
      font-size: 40px;
      z-index: 2003;
      pointer-events: none;
    }
    #nonsense-quote {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      text-align: center;
      color: #ffffff;
      text-shadow: 0 0 5px #000000;
      z-index: 2004;
      width: 80%;
      max-width: 800px;
    }
  </style>

  <!-- Indicatore di velocità ispirato alla Guida Galattica per Autostoppisti -->
  <g id="speed-indicator" transform="translate(400, 480)">
    <rect x="-250" y="0" width="500" height="60" fill="#000000" rx="10" ry="10" stroke="#00ffff" stroke-width="2"></rect>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="16" fill="#00ffff" text-anchor="middle">Current Speed:</text>
    <text id="speed-value" x="0" y="50" font-family="'Courier New', monospace" font-size="24" fill="#FF00FF" text-anchor="middle">42 ImpProb/h</text>
  </g>

  <script type="text/javascript">
    let currentTexture = 'fabric';
    const armchair = document.getElementById('armchair-swing');
    
    armchair.addEventListener('click', function() {
      switch(currentTexture) {
        case 'fabric':
          changeTexture('metal');
          break;
        case 'metal':
          changeTexture('glass');
          break;
        case 'glass':
          changeTexture('fabric');
          break;
      }
    });

    function changeTexture(newTexture) {
      const elements = armchair.querySelectorAll('rect[fill^="url(#"]');
      elements.forEach(element =&gt; {
        switch(newTexture) {
          case 'metal':
            element.setAttribute('fill', 'url(#metalTexture)');
            break;
          case 'glass':
            element.setAttribute('fill', 'url(#glassTexture)');
            break;
          case 'fabric':
            if (element.getAttribute('width') === '600' || element.getAttribute('width') === '580') {
              element.setAttribute('fill', 'url(#fabricTexture)');
            } else {
              element.setAttribute('fill', 'url(#leatherTexture)');
            }
            break;
        }
      });
      currentTexture = newTexture;
    }

    // Funzione per aggiornare l'indicatore di velocità
    function updateSpeedIndicator() {
      const speedUnits = ['ImpProb/h', 'WhiskeyFlask/ParsecSquared', 'PanicButton/Towel', 'BabelFish/TeaCup'];
      const speedValue = Math.floor(Math.random() * 100);
      const speedUnit = speedUnits[Math.floor(Math.random() * speedUnits.length)];
      document.getElementById('speed-value').textContent = `${speedValue} ${speedUnit}`;
    }

    // Aggiorna l'indicatore di velocità ogni 5 secondi
    setInterval(updateSpeedIndicator, 5000);

    // Inizializza l'indicatore di velocità
    updateSpeedIndicator();
  </script>

    <div id="dolphin-emoji">🐬</div>
  </div>
  <div id="window-frame"></div>
  <div id="nonsense-quote" style="position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 18px; text-align: center; color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; background: rgba(0, 0, 0, 0.7); padding: 12px; border-radius: 8px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); transition: all 0.3s ease; max-width: 80%;"></div>

  <script>
    let scene, camera, renderer, stars = [];
    let galaxyMesh1, galaxyMesh2;
    let nonsenseObjects = [];
    let dolphinEmoji;
    let leftArm, rightArm;
    let leftArmRobot, rightArmRobot;

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, 800 / 600, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ alpha: true });
      renderer.setSize(800, 600);
      document.getElementById('space-scene').insertBefore(renderer.domElement, document.getElementById('armchair'));

      // Create stars
      for(let i = 0; i < 1500; i++) {
        let geometry = new THREE.SphereGeometry(0.1, 32, 32);
        let material = new THREE.MeshBasicMaterial({color: 0xffffff});
        let star = new THREE.Mesh(geometry, material);
        star.position.set(
          Math.random() * 800 - 400,
          Math.random() * 800 - 400,
          Math.random() * 800 - 400
        );
        scene.add(star);
        stars.push(star);
      }

      // Create galaxies
      let galaxyGeometry1 = new THREE.SphereGeometry(30, 32, 32);
      let galaxyMaterial1 = new THREE.MeshBasicMaterial({
        map: new THREE.TextureLoader().load('https://www.velocita-superluminale-spazio.com/galaxy1.jpg')
      });
      galaxyMesh1 = new THREE.Mesh(galaxyGeometry1, galaxyMaterial1);
      galaxyMesh1.position.set(-70, 0, -150);
      scene.add(galaxyMesh1);

      let galaxyGeometry2 = new THREE.SphereGeometry(20, 32, 32);
      let galaxyMaterial2 = new THREE.MeshBasicMaterial({
        map: new THREE.TextureLoader().load('https://www.velocita-superluminale-spazio.com/galaxy2.jpg')
      });
      galaxyMesh2 = new THREE.Mesh(galaxyGeometry2, galaxyMaterial2);
      galaxyMesh2.position.set(70, 30, -200);
      scene.add(galaxyMesh2);

      // Create nonsense objects
      for(let i = 0; i < 150; i++) {
        createNonsenseObject();
      }

      camera.position.z = 5;
      
      // Initialize dolphin emoji
      dolphinEmoji = document.getElementById('dolphin-emoji');
      dolphinEmoji.style.left = '400px';
      dolphinEmoji.style.top = '300px';
      
      // Initialize alien arms
      leftArm = document.getElementById('leftArm');
      rightArm = document.getElementById('rightArm');
      
      // Initialize robot arms
      leftArmRobot = document.getElementById('leftArmRobot');
      rightArmRobot = document.getElementById('rightArmRobot');
      
      animate();
    }

    function createNonsenseObject() {
      const geometries = [
        new THREE.TorusGeometry(1, 0.4, 16, 100),
        new THREE.ConeGeometry(1, 2, 32),
        new THREE.OctahedronGeometry(1),
        new THREE.TetrahedronGeometry(1),
        new THREE.TorusKnotGeometry(0.5, 0.2, 100, 16)
      ];
      
      const geometry = geometries[Math.floor(Math.random() * geometries.length)];
      const material = new THREE.MeshBasicMaterial({
        color: Math.random() * 0xffffff,
        wireframe: Math.random() > 0.5
      });
      
      const object = new THREE.Mesh(geometry, material);
      object.position.set(
        Math.random() * 800 - 400,
        Math.random() * 800 - 400,
        Math.random() * 800 - 400
      );
      object.rotation.set(
        Math.random() * Math.PI,
        Math.random() * Math.PI,
        Math.random() * Math.PI
      );
      object.scale.setScalar(Math.random() * 3 + 0.5);
      
      scene.add(object);
      nonsenseObjects.push({
        mesh: object,
        speed: Math.random() * 0.5 + 0.1,
        rotationSpeed: new THREE.Vector3(
          Math.random() * 0.02 - 0.01,
          Math.random() * 0.02 - 0.01,
          Math.random() * 0.02 - 0.01
        )
      });
    }

    let dolphinX = 400, dolphinY = 300, dolphinSpeedX = 2, dolphinSpeedY = 2, dolphinRotation = 0;
    let armMovement = 0;

    function animate() {
      requestAnimationFrame(animate);
      
      stars.forEach(star => {
        star.position.z += 0.15;
        if(star.position.z > 400) star.position.z -= 800;
      });
      
      nonsenseObjects.forEach(obj => {
        obj.mesh.position.z += obj.speed;
        obj.mesh.rotation.x += obj.rotationSpeed.x;
        obj.mesh.rotation.y += obj.rotationSpeed.y;
        obj.mesh.rotation.z += obj.rotationSpeed.z;
        
        if(obj.mesh.position.z > 10) {
          obj.mesh.position.z = -400;
          obj.mesh.position.x = Math.random() * 800 - 400;
          obj.mesh.position.y = Math.random() * 800 - 400;
        }
      });
      
      galaxyMesh1.rotation.y += 0.001;
      galaxyMesh2.rotation.y += 0.0015;
      
      // Animate dolphin emoji
      dolphinX += dolphinSpeedX;
      dolphinY += dolphinSpeedY;
      dolphinRotation -= 5; // Rotazione antioraria
      
      if(dolphinX <= 0 || dolphinX >= 760) dolphinSpeedX *= -1;
      if(dolphinY <= 0 || dolphinY >= 560) dolphinSpeedY *= -1;
      
      dolphinEmoji.style.left = `${dolphinX}px`;
      dolphinEmoji.style.top = `${dolphinY}px`;
      dolphinEmoji.style.transform = `rotate(${dolphinRotation}deg)`;
      
      // Animate alien arms
      const alienCenterX = 400;  // Adjust based on the alien's position
      const alienCenterY = 300;  // Adjust based on the alien's position
      const distanceToDolphin = Math.sqrt(Math.pow(dolphinX - alienCenterX, 2) + Math.pow(dolphinY - alienCenterY, 2));
      
      if (distanceToDolphin < 200) {  // Adjust this value to change when the arms start moving
        armMovement += 0.1;
        const armWave = Math.sin(armMovement) * 20;
        
        if (leftArm && rightArm) {
          leftArm.setAttribute('transform', `rotate(${armWave}, 35, 100)`);
          rightArm.setAttribute('transform', `rotate(${-armWave}, 115, 100)`);
        }
      } else if (leftArm && rightArm) {
        leftArm.setAttribute('transform', 'rotate(0, 35, 100)');
        rightArm.setAttribute('transform', 'rotate(0, 115, 100)');
      }
      
      // Animate robot arms
      const robotCenterX = 600;  // Adjust based on the robot's position
      const robotCenterY = 300;  // Adjust based on the robot's position
      const robotDistanceToDolphin = Math.sqrt(Math.pow(dolphinX - robotCenterX, 2) + Math.pow(dolphinY - robotCenterY, 2));
      
      if (robotDistanceToDolphin < 200) {  // Adjust this value to change when the arms start moving
        const robotArmWave = Math.sin(armMovement) * 30;
        
        if (leftArmRobot && rightArmRobot) {
          leftArmRobot.setAttribute('transform', `rotate(${robotArmWave}, 50, 110)`);
          rightArmRobot.setAttribute('transform', `rotate(${-robotArmWave}, 100, 110)`);
        }
      } else if (leftArmRobot && rightArmRobot) {
        leftArmRobot.setAttribute('transform', 'rotate(0, 50, 110)');
        rightArmRobot.setAttribute('transform', 'rotate(0, 100, 110)');
      }
      
      renderer.render(scene, camera);
    }

    // Funzione per generare frasi nonsense
    function generateNonsenseQuote() {
      const quotes = [
        "The Answer to the Ultimate Question of Life, The Universe, and Everything is 42.",
        "Time is an illusion. Lunchtime doubly so.",
        "Don't Panic and always carry a towel.",
        "So long, and thanks for all the fish.",
        "The ships hung in the sky in much the same way that bricks don't.",
        "Life... is like a grapefruit. It's orange and squishy, and has a few pips in it, and some folks have half a one for breakfast.",
        "The reason why the universe is so big is to make sure that, somewhere, a piece of seaweed can evolve into a philosopher.",
        "In the beginning the Universe was created. This has made a lot of people very angry and been widely regarded as a bad move.",
        "The best drink in existence is the Pan Galactic Gargle Blaster, the effect of which is like having your brains smashed out by a slice of lemon wrapped round a large gold brick.",
        "Reality is frequently inaccurate.",
        "There is a theory which states that if ever anyone discovers exactly what the Universe is for and why it is here, it will instantly disappear and be replaced by something even more bizarre and inexplicable. There is another theory which states that this has already happened."
      ];
      return quotes[Math.floor(Math.random() * quotes.length)];
    }

    // Funzione per aggiornare la frase nonsense
    function updateNonsenseQuote() {
      document.getElementById('nonsense-quote').innerText = generateNonsenseQuote();
    }

    // Aggiorna la frase ogni 10 secondi
    setInterval(updateNonsenseQuote, 10000);

    // Assicurati che la funzione init() venga chiamata all'avvio
    window.onload = function() {
      init();
      updateNonsenseQuote();
    };
  </script>
