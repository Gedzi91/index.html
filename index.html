<html><head><base href="https://websim.ai/"><title>Phoenix Space Invaders - Interactive Cursors</title><style>
  body {
    margin: 0;
    padding: 0;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    cursor: none;
  }
  canvas {
    display: block;
  }
</style></head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const player = {
  x: canvas.width / 2,
  y: canvas.height - 40,
  width: canvas.width * 0.03,
  height: canvas.height * 0.04,
  speed: canvas.width * 0.005,
  image1: new Image(),
  image2: new Image(),
  currentImage: null,
  isMovingLeft: false,
  isMovingRight: false,
  isShooting: false,
  shootCooldown: 0,
  animationCounter: 0,
  animationSpeed: 30
};
player.image1.src = 'https://i.ibb.co/k3gk7Nz/ship01.png';
player.image2.src = 'https://i.ibb.co/vk2Wfm5/ship02.png';
player.currentImage = player.image1;

const bullets = [];
const enemies = [];
const cursors = [];
const cursorImages = [
  'https://i.ibb.co/HgYXDFm/cursor1.png',
  'https://i.ibb.co/R9sCYLT/cursor2.png',
  'https://i.ibb.co/sRjxC3F/cursor3.png'
];

const motherShip = {
  x: canvas.width / 2 - canvas.width * 0.2,
  y: canvas.height * 0.05,
  width: canvas.width * 0.4,
  height: canvas.height * 0.25,
  image: new Image()
};

motherShip.image.src = 'https://i.ibb.co/z4rgxJj/mothership.png';

const enemyImage1 = new Image();
enemyImage1.src = 'https://i.ibb.co/NKP848c/phoenix.png';
const enemyImage2 = new Image();
enemyImage2.src = 'https://i.ibb.co/2dsrXzX/phoenix02.png';

const stars = [];

for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2 + 1
  });
}

function createEnemies() {
  enemies.length = 0;
  for (let i = 0; i < 18; i++) {
    enemies.push({
      x: (i % 6) * (canvas.width / 6) + canvas.width / 12,
      y: Math.floor(i / 6) * (canvas.height * 0.08) + canvas.height * 0.2,
      width: canvas.width * 0.03,
      height: canvas.height * 0.03,
      direction: 1,
      frame: 0,
      state: 'formation',
      attackTimer: 0,
      attackDuration: 0,
      attackCurve: null
    });
  }
}

createEnemies();

function createCursor(x, y) {
  const cursor = {
    x: x,
    y: y,
    image: new Image(),
    size: 30,
    speed: Math.random() * 2 + 1,
    direction: Math.random() * Math.PI * 2,
    rotationSpeed: (Math.random() - 0.5) * 0.1
  };
  cursor.image.src = cursorImages[Math.floor(Math.random() * cursorImages.length)];
  cursors.push(cursor);
}

function drawStars() {
  ctx.fillStyle = 'white';
  stars.forEach(star => {
    ctx.fillRect(star.x, star.y, star.size, star.size);
  });
}

function drawPlayer() {
  ctx.drawImage(player.currentImage, player.x - player.width / 2, player.y - player.height / 2, player.width, player.height);
}

function drawBullets() {
  ctx.fillStyle = 'yellow';
  bullets.forEach(bullet => {
    ctx.fillRect(bullet.x, bullet.y, canvas.width * 0.002, canvas.height * 0.015);
  });
}

function drawEnemies() {
  enemies.forEach(enemy => {
    const image = enemy.frame === 0 ? enemyImage1 : enemyImage2;
    ctx.drawImage(image, enemy.x - enemy.width / 2, enemy.y - enemy.height / 2, enemy.width, enemy.height);
  });
}

function drawMotherShip() {
  ctx.drawImage(motherShip.image, motherShip.x, motherShip.y, motherShip.width, motherShip.height);
}

function drawCursors() {
  cursors.forEach(cursor => {
    ctx.save();
    ctx.translate(cursor.x, cursor.y);
    ctx.rotate(cursor.direction);
    ctx.drawImage(cursor.image, -cursor.size / 2, -cursor.size / 2, cursor.size, cursor.size);
    ctx.restore();
  });
}

function updatePlayer() {
  if (player.isMovingLeft && player.x > player.width / 2) {
    player.x -= player.speed;
  } else if (player.isMovingRight && player.x < canvas.width - player.width / 2) {
    player.x += player.speed;
  }

  player.animationCounter++;
  if (player.animationCounter >= player.animationSpeed) {
    player.currentImage = (player.currentImage === player.image1) ? player.image2 : player.image1;
    player.animationCounter = 0;
  }
  
  if (player.isShooting && player.shootCooldown <= 0) {
    bullets.push({ x: player.x, y: player.y - player.height / 2 });
    player.shootCooldown = 15;
  }
  if (player.shootCooldown > 0) {
    player.shootCooldown--;
  }
}

function updateBullets() {
  bullets.forEach((bullet, index) => {
    bullet.y -= canvas.height * 0.01;
    if (bullet.y < 0) {
      bullets.splice(index, 1);
    }
  });
}

function updateEnemies() {
  enemies.forEach(enemy => {
    if (enemy.state === 'formation') {
      enemy.x += enemy.direction * canvas.width * 0.0005;
      if (enemy.x > canvas.width - enemy.width / 2 || enemy.x < enemy.width / 2) {
        enemy.direction *= -1;
        enemy.y += canvas.height * 0.005;
      }

      if (Math.random() < 0.0005) {
        enemy.state = 'attack';
        enemy.attackTimer = 0;
        enemy.attackDuration = Math.random() * 6 + 4;
        enemy.attackCurve = Math.random() < 0.5 ? Math.sin : Math.cos;
      }
    } else if (enemy.state === 'attack') {
      enemy.attackTimer += 1/120;
      const progress = enemy.attackTimer / enemy.attackDuration;

      if (progress < 1) {
        const curve = enemy.attackCurve(progress * Math.PI * 2) * canvas.width * 0.2;
        enemy.x = canvas.width / 2 + curve;
        enemy.y += canvas.height * 0.0025;
      } else {
        enemy.state = 'returning';
      }
    } else if (enemy.state === 'returning') {
      const dx = enemy.x - (Math.floor(enemies.indexOf(enemy) % 6) * (canvas.width / 6) + canvas.width / 12);
      const dy = enemy.y - (Math.floor(enemies.indexOf(enemy) / 6) * (canvas.height * 0.08) + canvas.height * 0.2);
      
      if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
        enemy.state = 'formation';
      } else {
        enemy.x -= dx * 0.025;
        enemy.y -= dy * 0.025;
      }
    }
  });

  enemies.forEach(enemy => {
    enemy.frame = enemy.frame === 0 ? 1 : 0;
  });
}

function updateCursors() {
  cursors.forEach((cursor, index) => {
    cursor.x += Math.cos(cursor.direction) * cursor.speed;
    cursor.y += Math.sin(cursor.direction) * cursor.speed;
    cursor.direction += cursor.rotationSpeed;

    if (cursor.x < 0 || cursor.x > canvas.width || cursor.y < 0 || cursor.y > canvas.height) {
      cursors.splice(index, 1);
    }
  });
}

function checkCollisions() {
  bullets.forEach((bullet, bulletIndex) => {
    enemies.forEach((enemy, enemyIndex) => {
      if (bullet.x > enemy.x - enemy.width / 2 &&
          bullet.x < enemy.x + enemy.width / 2 &&
          bullet.y > enemy.y - enemy.height / 2 &&
          bullet.y < enemy.y + enemy.height / 2) {
        bullets.splice(bulletIndex, 1);
        enemies.splice(enemyIndex, 1);
      }
    });
  });
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  drawStars();
  drawMotherShip();
  drawPlayer();
  drawBullets();
  drawEnemies();
  drawCursors();
  
  updatePlayer();
  updateBullets();
  updateEnemies();
  updateCursors();
  checkCollisions();
  
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    player.isMovingLeft = true;
  } else if (e.key === 'ArrowRight') {
    player.isMovingRight = true;
  } else if (e.key === ' ') {
    player.isShooting = true;
  }
});

document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft') {
    player.isMovingLeft = false;
  } else if (e.key === 'ArrowRight') {
    player.isMovingRight = false;
  } else if (e.key === ' ') {
    player.isShooting = false;
  }
});

canvas.addEventListener('click', (e) => {
  createCursor(e.clientX, e.clientY);
});

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  player.x = canvas.width / 2;
  player.y = canvas.height - 40;
  player.width = canvas.width * 0.03;
  player.height = canvas.height * 0.04;
  player.speed = canvas.width * 0.005;

  motherShip.x = canvas.width / 2 - canvas.width * 0.2;
  motherShip.y = canvas.height * 0.05;
  motherShip.width = canvas.width * 0.4;
  motherShip.height = canvas.height * 0.25;

  createEnemies();

  stars.length = 0;
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 1
    });
  }
});

gameLoop();
</script>
</body></html>
