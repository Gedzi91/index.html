<html><head><base href="https://cubivore3d.com/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubivore 3D: Evolve and Survive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #gameCanvas { width: 100%; height: 100%; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #evolutionMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            color: white;
            display: none;
        }
        #evolutionMenu h2 { margin-top: 0; }
        #evolutionMenu button {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        #evolutionMenu button:hover {
            background: #45a049;
        }
        #settingsMenu {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            color: white;
        }
        #settingsMenu input {
            margin: 5px 0;
        }
        #minimap {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 200px;
            height: 200px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        Health: <span id="healthCount">100</span><br>
        DNA Points: <span id="dnaCount">0</span><br>
        Press E to open Evolution Menu
    </div>
    <div id="evolutionMenu">
        <h2>Evolution Menu</h2>
        <button id="evolveEyes">Grow Eyes (10 DNA)</button>
        <button id="evolveSpikes">Grow Spikes (15 DNA)</button>
        <button id="evolveLegs">Grow Legs (20 DNA)</button>
        <button id="evolveBiggerBody">Bigger Body (25 DNA)</button>
        <button id="evolveLongerBody">Longer Body (30 DNA)</button>
        <button id="evolveWings">Grow Wings (40 DNA)</button>
        <button id="evolveMouth">New Mouth (35 DNA)</button>
        <button id="closeMenu">Close Menu</button>
    </div>
    <div id="settingsMenu">
        <h3>Keybind Settings</h3>
        <label>
            Attack:
            <input type="text" id="attackKey" value="Q" maxlength="1">
        </label>
    </div>
    <canvas id="minimap"></canvas>

    <script>
        // Initialize Three.js scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // Create green ground
        const groundGeometry = new THREE.PlaneGeometry(100, 100);
        const groundMaterial = new THREE.MeshPhongMaterial({ color: 0x2ecc71 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Create trees
        function createTree(x, z) {
            const trunkGeometry = new THREE.CylinderGeometry(0.2, 0.2, 2, 8);
            const trunkMaterial = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.set(x, 1, z);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            scene.add(trunk);

            const leavesGeometry = new THREE.ConeGeometry(1, 2, 8);
            const leavesMaterial = new THREE.MeshPhongMaterial({ color: 0x228B22 });
            const leaves = new THREE.Mesh(leavesGeometry, leavesMaterial);
            leaves.position.set(x, 3, z);
            leaves.castShadow = true;
            leaves.receiveShadow = true;
            scene.add(leaves);
        }

        // Add some trees
        for (let i = 0; i < 20; i++) {
            createTree(Math.random() * 80 - 40, Math.random() * 80 - 40);
        }

        // Create player cube
        const playerGeometry = new THREE.BoxGeometry(1, 1, 1);
        const playerMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.position.y = 0.5;
        player.health = 100;
        player.maxHealth = 100;
        player.dna = 0;
        player.castShadow = true;
        player.receiveShadow = true;
        scene.add(player);

        // Add mouth to player
        const playerMouthGeometry = new THREE.BoxGeometry(0.5, 0.1, 0.1);
        const playerMouthMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
        const playerMouth = new THREE.Mesh(playerMouthGeometry, playerMouthMaterial);
        playerMouth.position.set(0, -0.3, 0.5);
        player.add(playerMouth);

        // Create health bar for player
        const playerHealthBarGeometry = new THREE.BoxGeometry(1, 0.1, 0.1);
        const playerHealthBarMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const playerHealthBar = new THREE.Mesh(playerHealthBarGeometry, playerHealthBarMaterial);
        playerHealthBar.position.y = 1.2;
        player.add(playerHealthBar);

        // Create enemy cubes
        const creatures = [];
        function createCreature() {
            const creatureGeometry = new THREE.BoxGeometry(1, 1, 1);
            const creatureColor = Math.random() * 0xffffff;
            const creatureMaterial = new THREE.MeshPhongMaterial({ color: creatureColor });
            const creature = new THREE.Mesh(creatureGeometry, creatureMaterial);
            creature.position.set(
                Math.random() * 80 - 40,
                0.5,
                Math.random() * 80 - 40
            );
            creature.health = 50;
            creature.maxHealth = 50;
            creature.isPeaceful = Math.random() > 0.5;
            creature.movementSpeed = Math.random() * 0.03 + 0.02;
            creature.state = 'idle';
            creature.stateTimer = 0;
            creature.movementDirection = new THREE.Vector3();
            creature.castShadow = true;
            creature.receiveShadow = true;

            // Add mouth to creature
            const mouthGeometry = new THREE.BoxGeometry(0.5, 0.1, 0.1);
            const mouthMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
            const mouth = new THREE.Mesh(mouthGeometry, mouthMaterial);
            mouth.position.set(0, -0.3, 0.5);
            creature.add(mouth);

            // Add health bar to creature
            const healthBarGeometry = new THREE.BoxGeometry(1, 0.1, 0.1);
            const healthBarMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const healthBar = new THREE.Mesh(healthBarGeometry, healthBarMaterial);
            healthBar.position.y = 1.2;
            creature.add(healthBar);

            // Randomly add legs, arms, or wings
            if (Math.random() < 0.3) addLegs(creature);
            if (Math.random() < 0.3) addArms(creature);
            if (Math.random() < 0.2) addWings(creature);

            scene.add(creature);
            creatures.push(creature);

            // Animate creature appearance
            gsap.from(creature.scale, {
                x: 0, y: 0, z: 0,
                duration: 1,
                ease: "elastic.out(1, 0.3)"
            });
        }

        function addLegs(creature) {
            const legGeometry = new THREE.BoxGeometry(0.2, 0.6, 0.2);
            const legMaterial = new THREE.MeshPhongMaterial({ color: creature.material.color });
            const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
            const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
            leftLeg.position.set(-0.3, -0.8, 0);
            rightLeg.position.set(0.3, -0.8, 0);
            leftLeg.castShadow = true;
            rightLeg.castShadow = true;
            creature.add(leftLeg, rightLeg);
        }

        function addArms(creature) {
            const armGeometry = new THREE.BoxGeometry(0.6, 0.2, 0.2);
            const armMaterial = new THREE.MeshPhongMaterial({ color: creature.material.color });
            const leftArm = new THREE.Mesh(armGeometry, armMaterial);
            const rightArm = new THREE.Mesh(armGeometry, armMaterial);
            leftArm.position.set(-0.8, 0, 0);
            rightArm.position.set(0.8, 0, 0);
            leftArm.castShadow = true;
            rightArm.castShadow = true;
            creature.add(leftArm, rightArm);
        }

        function addWings(creature) {
            const wingGeometry = new THREE.BoxGeometry(0.1, 0.8, 0.8);
            const wingMaterial = new THREE.MeshPhongMaterial({ color: creature.material.color });
            const leftWing = new THREE.Mesh(wingGeometry, wingMaterial);
            const rightWing = new THREE.Mesh(wingGeometry, wingMaterial);
            leftWing.position.set(-0.55, 0.2, 0);
            rightWing.position.set(0.55, 0.2, 0);
            leftWing.castShadow = true;
            rightWing.castShadow = true;
            creature.add(leftWing, rightWing);
            creature.canFly = true;
        }

        // Create initial creatures
        for (let i = 0; i < 15; i++) {
            createCreature();
        }

        // Add lighting
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.near = 1;
        directionalLight.shadow.camera.far = 50;
        scene.add(directionalLight);

        // Set up third-person camera
        camera.position.set(0, 3, 5);
        camera.lookAt(player.position);

        // Movement and camera controls
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyE') toggleEvolutionMenu();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        let mouseDown = false;
        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousedown', (e) => {
            mouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        document.addEventListener('mouseup', () => mouseDown = false);
        document.addEventListener('mousemove', (e) => {
            if (mouseDown) {
                const deltaX = e.clientX - mouseX;
                const deltaY = e.clientY - mouseY;
                rotateCamera(deltaX, deltaY);
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });

        function rotateCamera(deltaX, deltaY) {
            const rotationSpeed = 0.005;
            camera.position.sub(player.position);
            camera.position.applyAxisAngle(new THREE.Vector3(0, 1, 0), -deltaX * rotationSpeed);
            camera.position.applyAxisAngle(new THREE.Vector3(1, 0, 0), -deltaY * rotationSpeed);
            camera.position.add(player.position);
            camera.lookAt(player.position);
        }

        function movePlayer() {
            const speed = 0.1;
            const movement = new THREE.Vector3();
            if (keys['KeyW']) movement.z -= speed;
            if (keys['KeyS']) movement.z += speed;
            if (keys['KeyA']) movement.x -= speed;
            if (keys['KeyD']) movement.x += speed;

            movement.applyQuaternion(camera.quaternion);
            movement.y = 0; // Keep player on the ground
            player.position.add(movement);

            // Update camera position
            camera.position.add(movement);

            // Make player look in the direction of movement
            if (movement.length() > 0) {
                player.lookAt(player.position.clone().add(movement));
            }

            // Update player's health bar
            updateHealthBar(player, playerHealthBar);
        }

        function moveCreatures() {
            creatures.forEach(creature => {
                updateCreatureState(creature);
                
                switch (creature.state) {
                    case 'idle':
                        animateIdle(creature);
                        break;
                    case 'walking':
                        moveCreatureInDirection(creature);
                        animateWalking(creature);
                        break;
                    case 'fleeing':
                        fleeFromPlayer(creature);
                        animateWalking(creature);
                        break;
                    case 'attacking':
                        attackPlayer(creature);
                        animateAttacking(creature);
                        break;
                }

                // Update creature's health bar
                updateHealthBar(creature, creature.children[1]);
            });
        }

        function animateIdle(creature) {
            // Subtle breathing animation
            gsap.to(creature.scale, {
                y: 1.05,
                duration: 1,
                yoyo: true,
                repeat: -1,
                ease: "power1.inOut"
            });
        }

        function animateWalking(creature) {
            // Simple walking animation
            if (creature.children.length > 2) { // Check if creature has legs
                gsap.to([creature.children[2].rotation, creature.children[3].rotation], {
                    x: Math.PI / 4,
                    duration: 0.5,
                    yoyo: true,
                    repeat: -1,
                    ease: "power1.inOut"
                });
            }
        }

        function animateAttacking(creature) {
            // Attack animation
            gsap.to(creature.scale, {
                x: 1.2,
                y: 1.2,
                z: 1.2,
                duration: 0.2,
                yoyo: true,
                repeat: 1
            });
        }

        function updateHealthBar(entity, healthBar) {
            const healthPercentage = entity.health / entity.maxHealth;
            healthBar.scale.x = Math.max(0, healthPercentage);
            healthBar.material.color.setHSL(healthPercentage * 0.3, 1, 0.5);
        }

        function updateCreatureState(creature) {
            creature.stateTimer -= 1/60; // Assuming 60 FPS

            if (creature.stateTimer <= 0) {
                if (creature.state === 'idle') {
                    creature.state = 'walking';
                    creature.stateTimer = Math.random() * 3 + 2; // Walk for 2-5 seconds
                    creature.movementDirection = new THREE.Vector3(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
                } else if (creature.state === 'walking') {
                    creature.state = 'idle';
                    creature.stateTimer = Math.random() * 2 + 1; // Idle for 1-3 seconds
                }
            }

            const distanceToPlayer = creature.position.distanceTo(player.position);
            if (distanceToPlayer < 3) {
                if (creature.isPeaceful) {
                    creature.state = 'fleeing';
                    creature.stateTimer = 2;
                } else {
                    creature.state = 'attacking';
                    creature.stateTimer = 1;
                }
            }
        }

        function moveCreatureInDirection(creature) {
            const movement = creature.movementDirection.clone().multiplyScalar(creature.movementSpeed);
            creature.position.add(movement);
            creature.lookAt(creature.position.clone().add(movement));
        }

        function fleeFromPlayer(creature) {
            const fleeDirection = creature.position.clone().sub(player.position).normalize();
            const movement = fleeDirection.multiplyScalar(creature.movementSpeed * 1.5);
            creature.position.add(movement);
            creature.lookAt(creature.position.clone().add(movement));
        }

        function attackPlayer(creature) {
            const attackDirection = player.position.clone().sub(creature.position).normalize();
            const movement = attackDirection.multiplyScalar(creature.movementSpeed * 1.2);
            creature.position.add(movement);
            creature.lookAt(player.position);
        }

        function checkCollisions() {
            creatures.forEach((creature, index) => {
                if (player.position.distanceTo(creature.position) < 1) {
                    // Player bites creature
                    creature.health -= 5;
                    player.dna += 2;
                    
                    if (!creature.isPeaceful) {
                        // Creature attacks back
                        player.health -= 3;
                    }

                    updateUI();

                    if (creature.health <= 0) {
                        scene.remove(creature);
                        creatures.splice(index, 1);
                        player.dna += 20;
                        updateUI();
                        createCreature(); // Spawn a new creature
                    }

                    // Animate bite
                    gsap.to(player.scale, {
                        x: 1.2, y: 1.2, z: 1.2,
                        duration: 0.1,
                        yoyo: true,
                        repeat: 1
                    });

                    // Animate creature on hit
                    gsap.to(creature.material, {
                        opacity: 0.5,
                        duration: 0.1,
                        yoyo: true,
                        repeat: 1
                    });
                }
            });

            // Check for fruit (simplified, you might want to create actual fruit objects)
            if (Math.random() < 0.01) { // 1% chance each frame to find fruit
                player.dna += 10;
                updateUI();
                // Animate eating fruit
                gsap.to(player.scale, {
                    x: 1.1, y: 1.1, z: 1.1,
                    duration: 0.2,
                    yoyo: true,
                    repeat: 1
                });
            }
        }

        function updateUI() {
            document.getElementById('healthCount').textContent = Math.round(player.health);
            document.getElementById('dnaCount').textContent = player.dna;
        }

        function toggleEvolutionMenu() {
            const menu = document.getElementById('evolutionMenu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }

        // Evolution functions
        function evolveEyes() {
            if (player.dna >= 10) {
                player.dna -= 10;
                const eyeGeometry = new THREE.SphereGeometry(0.1, 32, 32);
                const eyeMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
                const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                leftEye.position.set(-0.3, 0.3, 0.5);
                rightEye.position.set(0.3, 0.3, 0.5);
                player.add(leftEye, rightEye);
                updateUI();
            }
        }

        function evolveSpikes() {
            if (player.dna >= 15) {
                player.dna -= 15;
                const spikeGeometry = new THREE.ConeGeometry(0.1, 0.3, 32);
                const spikeMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 });
                for (let i = 0; i < 5; i++) {
                    const spike = new THREE.Mesh(spikeGeometry, spikeMaterial);
                    spike.position.set(
                        Math.random() * 0.8 - 0.4,
                        0.5,
                        Math.random() * 0.8 - 0.4
                    );
                    spike.rotation.x = Math.PI / 2;
                    player.add(spike);
                }
                updateUI();
            }
        }

        function evolveLegs() {
            if (player.dna >= 20) {
                player.dna -= 20;
                const legGeometry = new THREE.BoxGeometry(0.2, 0.6, 0.2);
                const legMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
                const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
                const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
                leftLeg.position.set(-0.3, -0.8, 0);
                rightLeg.position.set(0.3, -0.8, 0);
                player.add(leftLeg, rightLeg);
                updateUI();
            }
        }

        function evolveBiggerBody() {
            if (player.dna >= 25) {
                player.dna -= 25;
                player.scale.set(1.2, 1.2, 1.2);
                player.maxHealth += 20;
                player.health = player.maxHealth;
                updateUI();
            }
        }

        function evolveLongerBody() {
            if (player.dna >= 30) {
                player.dna -= 30;
                player.scale.z *= 1.5;
                player.maxHealth += 15;
                player.health = player.maxHealth;
                updateUI();
            }
        }

        function evolveWings() {
            if (player.dna >= 40) {
                player.dna -= 40;
                const wingGeometry = new THREE.BoxGeometry(0.1, 0.8, 0.8);
                const wingMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
                const leftWing = new THREE.Mesh(wingGeometry, wingMaterial);
                const rightWing = new THREE.Mesh(wingGeometry, wingMaterial);
                leftWing.position.set(-0.55, 0.2, 0);
                rightWing.position.set(0.55, 0.2, 0);
                player.add(leftWing, rightWing);
                updateUI();
            }
        }

        function evolveMouth() {
            if (player.dna >= 35) {
                player.dna -= 35;
                const newMouthGeometry = new THREE.BoxGeometry(0.6, 0.2, 0.2);
                const newMouthMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 });
                const newMouth = new THREE.Mesh(newMouthGeometry, newMouthMaterial);
                newMouth.position.set(0, -0.3, 0.6);
                player.remove(playerMouth);
                player.add(newMouth);
                updateUI();
            }
        }

        // Attach evolution functions to buttons
        document.getElementById('evolveEyes').addEventListener('click', evolveEyes);
        document.getElementById('evolveSpikes').addEventListener('click', evolveSpikes);
        document.getElementById('evolveLegs').addEventListener('click', evolveLegs);
        document.getElementById('evolveBiggerBody').addEventListener('click', evolveBiggerBody);
        document.getElementById('evolveLongerBody').addEventListener('click', evolveLongerBody);
        document.getElementById('evolveWings').addEventListener('click', evolveWings);
        document.getElementById('evolveMouth').addEventListener('click', evolveMouth);
        document.getElementById('closeMenu').addEventListener('click', toggleEvolutionMenu);

        // Keybind settings
        let attackKey = 'KeyQ';
        document.getElementById('attackKey').addEventListener('change', (e) => {
            attackKey = 'Key' + e.target.value.toUpperCase();
        });

        // Minimap
        const minimapCanvas = document.getElementById('minimap');
        const minimapCtx = minimapCanvas.getContext('2d');
        minimapCanvas.width = 200;
        minimapCanvas.height = 200;

        function updateMinimap() {
            minimapCtx.fillStyle = '#000';
            minimapCtx.fillRect(0, 0, 200, 200);
            
            // Draw player
            minimapCtx.fillStyle = '#00ff00';
            minimapCtx.fillRect(100 + player.position.x / 2, 100 + player.position.z / 2, 4, 4);
            
            // Draw creatures
            creatures.forEach(creature => {
                minimapCtx.fillStyle = creature.isPeaceful ? '#0000ff' : '#ff0000';
                minimapCtx.fillRect(100 + creature.position.x / 2, 100 + creature.position.z / 2, 3, 3);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            movePlayer();
            moveCreatures();
            checkCollisions();
            updateMinimap();

            // Check for attack key press
            if (keys[attackKey]) {
                attackNearestCreature();
            }

            renderer.render(scene, camera);
        }

        function attackNearestCreature() {
            let nearestCreature = null;
            let minDistance = Infinity;

            creatures.forEach(creature => {
                const distance = player.position.distanceTo(creature.position);
                if (distance < minDistance && distance < 2) {
                    nearestCreature = creature;
                    minDistance = distance;
                }
            });

            if (nearestCreature) {
                nearestCreature.health -= 10;
                player.dna += 5;

                // Animate attack
                gsap.to(player.scale, {
                    x: 1.2, y: 1.2, z: 1.2,
                    duration: 0.1,
                    yoyo: true,
                    repeat: 1
                });

                // Animate creature on hit
                gsap.to(nearestCreature.material, {
                    opacity: 0.5,
                    duration: 0.1,
                    yoyo: true,
                    repeat: 1
                });

                if (nearestCreature.health <= 0) {
                    scene.remove(nearestCreature);
                    creatures.splice(creatures.indexOf(nearestCreature), 1);
                    player.dna += 20;
                    createCreature(); // Spawn a new creature
                }

                updateUI();
            }
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
