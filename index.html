<html><head><base href="https://cosmic-answer.universe.eternity.example.com/">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Cinzel', serif;
    background: radial-gradient(ellipse at center, #090a0f 0%, #000000 100%);
}

.cosmos {
    position: relative;
    width: 100vw;
    height: 100vh;
    perspective: 1000px;
}

.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
    background-repeat: repeat;
    background-size: 200px 200px;
    animation: twinkle 5s infinite;
}

@keyframes twinkle {
    0% { opacity: 0.7; }
    50% { opacity: 1; }
    100% { opacity: 0.7; }
}

.answer {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 20vw;
    color: #FFD700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.7), 0 0 40px rgba(255, 215, 0, 0.5), 0 0 60px rgba(255, 215, 0, 0.3);
    animation: divine-pulse 8s infinite ease-in-out;
    z-index: 10;
}

@keyframes divine-pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); filter: brightness(1); }
    50% { transform: translate(-50%, -50%) scale(1.1); filter: brightness(1.5); }
}

.enlightenment {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    color: #FFFFFF;
    font-size: 1.5rem;
    text-align: center;
    opacity: 0;
    animation: reveal 10s 3s forwards;
    width: 80%;
}

@keyframes reveal {
    0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.divine-light {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at center, transparent 0%, rgba(255, 215, 0, 0.1) 50%, transparent 100%);
    opacity: 0;
    animation: divine-glow 8s infinite alternate;
}

@keyframes divine-glow {
    0% { opacity: 0; }
    100% { opacity: 0.3; }
}

.meteor {
    position: absolute;
    width: 2px;
    height: 2px;
    background-color: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 5;
}

.meteor::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100px;
    height: 1px;
    background: linear-gradient(to right, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 100%);
    transform: translateX(-100%);
}

@keyframes meteor {
    0% {
        opacity: 1;
        transform: scale(1) rotate(-45deg) translateX(0);
    }
    100% {
        opacity: 0;
        transform: scale(0) rotate(-45deg) translateX(1000px);
    }
}

</style>
</head>
<body>
    <div class="cosmos" id="cosmos">
        <div class="stars"></div>
        <div class="divine-light"></div>
    </div>
    <div class="answer">42</div>
    <div class="enlightenment">The Answer to Life, the Universe, and Everything</div>

<script>
function createMeteorShower() {
    const cosmos = document.getElementById('cosmos');
    
    function createMeteor() {
        const meteor = document.createElement('div');
        meteor.className = 'meteor';
        
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight;
        const size = Math.random() * 2 + 1;
        const duration = Math.random() * 1 + 0.5;
        
        meteor.style.left = `${x}px`;
        meteor.style.top = `${y}px`;
        meteor.style.width = `${size}px`;
        meteor.style.height = `${size}px`;
        meteor.style.animation = `meteor ${duration}s linear forwards`;
        
        cosmos.appendChild(meteor);
        
        setTimeout(() => {
            cosmos.removeChild(meteor);
        }, duration * 1000);
    }
    
    // Create initial batch of meteors
    for (let i = 0; i < 20; i++) {
        setTimeout(createMeteor, Math.random() * 2000);
    }
    
    // Continuously create new meteors
    setInterval(createMeteor, 200);
}

createMeteorShower();

document.addEventListener('click', function(event) {
    const ripple = document.createElement('div');
    ripple.style.position = 'absolute';
    ripple.style.borderRadius = '50%';
    ripple.style.pointerEvents = 'none';
    ripple.style.width = '5px';
    ripple.style.height = '5px';
    ripple.style.top = `${event.clientY}px`;
    ripple.style.left = `${event.clientX}px`;
    ripple.style.backgroundColor = 'rgba(255, 215, 0, 0.5)';
    ripple.style.animation = 'divine-ripple 2s linear';
    document.body.appendChild(ripple);

    setTimeout(() => {
        document.body.removeChild(ripple);
    }, 2000);
});

document.addEventListener('mousemove', function(event) {
    const cosmos = document.getElementById('cosmos');
    const mouseX = event.clientX / window.innerWidth - 0.5;
    const mouseY = event.clientY / window.innerHeight - 0.5;
    
    cosmos.style.transform = `rotateX(${mouseY * 10}deg) rotateY(${-mouseX * 10}deg)`;
});

// Removed event listeners for the answer element

</script>

<style>
@keyframes divine-ripple {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(100); opacity: 0; }
}
</style>

</body></html>
