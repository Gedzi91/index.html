<html><head><base href="https://webcam-particle-mesh.example.com%20show%20particles%20in%20the%20screen%20add%20control%20to%20the%20ui,%20hide%20control%20in%20hamburger%20icon">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Particle Display with Hidden UI Controls</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }
  #particleCanvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }
  #hamburger {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 3;
    cursor: pointer;
    transition: 0.3s;
  }
  #hamburger:hover {
    opacity: 0.7;
  }
  #controls {
    position: fixed;
    top: 0;
    left: -300px;
    width: 280px;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.8);
    padding: 20px;
    box-sizing: border-box;
    transition: 0.3s;
    overflow-y: auto;
    z-index: 2;
  }
  #controls.open {
    left: 0;
  }
  .control-group {
    margin-bottom: 20px;
  }
  label {
    display: block;
    margin-bottom: 5px;
  }
  input[type="range"] {
    width: 100%;
  }
  input[type="color"] {
    width: 50px;
    height: 50px;
    padding: 0;
    border: none;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="particleCanvas"></canvas>

<svg id="hamburger" width="30" height="30" viewBox="0 0 100 100">
  <rect width="80" height="10" x="10" y="20" fill="#fff" />
  <rect width="80" height="10" x="10" y="45" fill="#fff" />
  <rect width="80" height="10" x="10" y="70" fill="#fff" />
</svg>

<div id="controls">
  <h2>Particle Controls</h2>
  <div class="control-group">
    <label for="particleCount">Particle Count: <span id="particleCountValue">200</span></label>
    <input type="range" id="particleCount" min="10" max="500" value="200">
  </div>
  <div class="control-group">
    <label for="particleSize">Particle Size: <span id="particleSizeValue">5</span></label>
    <input type="range" id="particleSize" min="1" max="10" value="5" step="0.1">
  </div>
  <div class="control-group">
    <label for="particleSpeed">Particle Speed: <span id="particleSpeedValue">1.5</span></label>
    <input type="range" id="particleSpeed" min="0.1" max="5" value="1.5" step="0.1">
  </div>
  <div class="control-group">
    <label for="connectionDistance">Connection Distance: <span id="connectionDistanceValue">100</span></label>
    <input type="range" id="connectionDistance" min="50" max="200" value="100">
  </div>
  <div class="control-group">
    <label for="particleColor">Particle Color:</label>
    <input type="color" id="particleColor" value="#ffffff">
  </div>
</div>

<script>
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');

// Set canvas size
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Particle class
class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * particleSize + 1;
    this.speedX = (Math.random() * 2 - 1) * particleSpeed;
    this.speedY = (Math.random() * 2 - 1) * particleSpeed;
    this.color = particleColor;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;

    // Bounce off edges
    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
  }

  draw() {
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Create particle array
let particleArray = [];

// Control variables
let particleCount = 200;
let particleSize = 5;
let particleSpeed = 1.5;
let connectionDistance = 100;
let particleColor = '#ffffff';

// Initialize particles
function initParticles() {
  particleArray = [];
  for (let i = 0; i < particleCount; i++) {
    particleArray.push(new Particle());
  }
}

// Animation loop
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  for (let i = 0; i < particleArray.length; i++) {
    particleArray[i].update();
    particleArray[i].draw();
    
    // Create connections
    for (let j = i; j < particleArray.length; j++) {
      const dx = particleArray[i].x - particleArray[j].x;
      const dy = particleArray[i].y - particleArray[j].y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      
      if (distance < connectionDistance) {
        ctx.beginPath();
        ctx.strokeStyle = particleColor;
        ctx.lineWidth = 0.2;
        ctx.moveTo(particleArray[i].x, particleArray[i].y);
        ctx.lineTo(particleArray[j].x, particleArray[j].y);
        ctx.stroke();
      }
    }
  }
  
  requestAnimationFrame(animate);
}

// Initialize and start animation
initParticles();
animate();

// UI Controls
const controls = document.getElementById('controls');
const hamburger = document.getElementById('hamburger');
const particleCountInput = document.getElementById('particleCount');
const particleSizeInput = document.getElementById('particleSize');
const particleSpeedInput = document.getElementById('particleSpeed');
const connectionDistanceInput = document.getElementById('connectionDistance');
const particleColorInput = document.getElementById('particleColor');

hamburger.addEventListener('click', () => {
  controls.classList.toggle('open');
});

particleCountInput.addEventListener('input', (e) => {
  particleCount = parseInt(e.target.value);
  document.getElementById('particleCountValue').textContent = particleCount;
  initParticles();
});

particleSizeInput.addEventListener('input', (e) => {
  particleSize = parseFloat(e.target.value);
  document.getElementById('particleSizeValue').textContent = particleSize.toFixed(1);
  initParticles();
});

particleSpeedInput.addEventListener('input', (e) => {
  particleSpeed = parseFloat(e.target.value);
  document.getElementById('particleSpeedValue').textContent = particleSpeed.toFixed(1);
  initParticles();
});

connectionDistanceInput.addEventListener('input', (e) => {
  connectionDistance = parseInt(e.target.value);
  document.getElementById('connectionDistanceValue').textContent = connectionDistance;
});

particleColorInput.addEventListener('input', (e) => {
  particleColor = e.target.value;
  initParticles();
});

// Resize canvas when window is resized
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initParticles();
});

// Add new particles on mouse move
canvas.addEventListener('mousemove', (event) => {
  for (let i = 0; i < 3; i++) {
    const particle = new Particle();
    particle.x = event.x;
    particle.y = event.y;
    particleArray.push(particle);
    if (particleArray.length > particleCount) {
      particleArray.shift();
    }
  }
});
</script>
</body>
</html>
