<html><head><base href="https://xn--zp8h.xn--tq9h2by.xn--zp8h.xn--tq9h2by/">
<title>HUE JUMPER AI - Enhanced 3D Racing Game</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-family: 'Impact', sans-serif;
  font-size: 24px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}
#controls {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: white;
  font-family: Arial, sans-serif;
  font-size: 16px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}
#pauseButton {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 50px;
  height: 50px;
  border: none;
  border-radius: 25px;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet);
  color: white;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  transition: transform 0.3s;
}
#pauseButton:hover {
  transform: scale(1.1);
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="time"></div>
  <div id="distance"></div>
  <div id="speed"></div>
</div>
<div id="controls">
  Mouse = Steer<br>
  Click = Brake<br>
  Spacebar = Jump<br>
  Enter = Pause
</div>
<button id="pauseButton">| |</button>

<script>
const context = c.getContext('2d');
const drawDistance = 800;
const cameraDepth = 1;
const segmentLength = 100;
const roadWidth = 500;
const curbWidth = 150;
const dashLineWidth = 9;
const maxPlayerX = 2e3;
const mountainCount = 30;
const timeDelta = 1/60;
const PI = Math.PI;

const height = 150;
const maxSpeed = 300;
const playerAccel = 1;
const playerBrake = -3;
const turnControl = .2;
const jumpAccel = 25;
const springConstant = .01;
const collisionSlow = .1;
const pitchLerp = .1;
const pitchSpringDamp = .9;
const elasticity = 1.2;
const centrifugal = .002;
const forwardDamp = .999;
const lateralDamp = .7;
const offRoadDamp = .98;
const gravity = -1;
const cameraTurnScale = 2;
const worldRotateScale = .00005;

const maxTime = 60;
const checkPointTime = 15;
const checkPointDistance = 1e5;
const maxDifficultySegment = 9e3;
const roadEnd = 1e4;

const ROAD_TYPES = {
  NORMAL: 0,
  RAINBOW: 1,
  ZIGZAG: 2,
  WAVY: 3,
  CHECKERED: 4
};

const blackHoleCount = 5;
const blackHoleRadius = 50;
let blackHoles = [];
let balls = [];
const ballCount = 5;
const ballRadius = 30;
const ballChaseDistance = 500;
const ballSpeed = 2;
let gameOver = false;

let mouseDown = 0;
let mousePressed = 0;
let mouseX = 0;
let isPaused = false;
let pauseButton;

let spacePressed = false;
let jumpCount = 0;
const maxJumps = 2;
let score = 0;
let airFrame = 0;
let hueShift = 0;

onmouseup = e => mouseDown = 0;
onmousedown = e => {
  if (gameOver) {
    gameOver = false;
    position = new Vec3(0, height, 0);
    velocity = new Vec3(0, 0, 0);
    time = maxTime;
    score = 0;
    balls = Array(ballCount).fill().map(createBall);
  } else {
    mousePressed ? mouseDown = 1 : mousePressed = 1;
  }
};
onmousemove = e => mouseX = e.x/window.innerWidth*2 - 1;

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && jumpCount < maxJumps) {
    spacePressed = true;
    jumpCount++;
  } else if (e.code === 'Enter') {
    togglePause();
  }
});

document.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    spacePressed = false;
  }
});

document.addEventListener('DOMContentLoaded', () => {
  pauseButton = document.getElementById('pauseButton');
  pauseButton.addEventListener('click', togglePause);
  createBlackHoles();
  balls = Array(ballCount).fill().map(createBall);
});

function createBlackHoles() {
  blackHoles = [];
  for (let i = 0; i < blackHoleCount; i++) {
    blackHoles.push({
      x: R(-maxPlayerX, maxPlayerX),
      z: R(0, roadEnd * segmentLength)
    });
  }
}

function createBall() {
  const blackHole = blackHoles[Math.floor(R() * blackHoles.length)];
  return {
    x: blackHole.x,
    y: height,
    z: blackHole.z,
    vx: 0,
    vy: 0,
    vz: 0
  };
}

function updateBalls() {
  if (!isPaused && !gameOver) {
    for (let ball of balls) {
      let dx = position.x - ball.x;
      let dz = position.z - ball.z;
      let distance = Math.sqrt(dx*dx + dz*dz);
      
      if (distance < ballChaseDistance) {
        ball.vx += (dx / distance) * ballSpeed;
        ball.vz += (dz / distance) * ballSpeed;
      }
      
      ball.x += ball.vx;
      ball.y = height;
      ball.z += ball.vz;
      
      ball.vx *= 0.95;
      ball.vz *= 0.95;
      
      if (distance < ballRadius + 50) {
        gameOver = true;
      }
    }
  }
}

function drawBalls() {
  for (let ball of balls) {
    let p = new Vec3(ball.x - position.x, ball.y - position.y, ball.z - position.z);
    p.x = p.x * Math.cos(cameraHeading) - p.z * Math.sin(cameraHeading);
    let z = 1 / (p.z * Math.cos(playerPitch) - p.y * Math.sin(playerPitch));
    p.y = p.y * Math.cos(playerPitch) - p.z * Math.sin(playerPitch);
    p = p.Multiply(new Vec3(z, z, 1)).Multiply(projectScale).Add(new Vec3(c.width/2, c.height/2));
    
    if (p.z > 0 && p.z < 1e5) {
      let radius = ballRadius * p.z;
      context.beginPath();
      context.arc(p.x, p.y, radius, 0, 2 * Math.PI);
      context.fillStyle = 'black';
      context.fill();
      
      context.fillStyle = 'red';
      context.beginPath();
      context.arc(p.x - radius/3, p.y - radius/3, radius/5, 0, 2 * Math.PI);
      context.arc(p.x + radius/3, p.y - radius/3, radius/5, 0, 2 * Math.PI);
      context.fill();
      context.beginPath();
      context.arc(p.x, p.y + radius/3, radius/3, Math.PI, 2 * Math.PI);
      context.stroke();
    }
  }
}

function togglePause() {
  isPaused = !isPaused;
  pauseButton.textContent = isPaused ? '▶' : '| |';
}

function DrawPoly(x1, y1, w1, x2, y2, w2, color) {
  context.beginPath();
  context.moveTo(x1 - w1, y1);
  context.lineTo(x1 + w1, y1);
  context.lineTo(x2 + w2, y2);
  context.lineTo(x2 - w2, y2);
  context.closePath();
  context.fillStyle = color;
  context.fill();
}

function DrawText(text, x, y = 60) {
  context.font = '60px Impact';
  context.fillStyle = '#FFF';
  context.fillText(text, x, y);
  context.strokeStyle = '#000';
  context.lineWidth = 2;
  context.strokeText(text, x, y);
}

const Clamp = (v, a, b) => Math.min(Math.max(v, a), b);
const ClampAngle = a => (a+PI) % (2*PI) + (a+PI<0? PI : -PI);
const Lerp = (p, a, b) => a + Clamp(p, 0, 1) * (b-a);
const R = (a=1, b=0) => Lerp((Math.sin(++randSeed)+1)*1e5%1,a,b);
const LSHA = (l,s=0,h=0,a=1) => `hsl(${(h+hueShift)%360},${s}%,${l}%,${a})`;

class Vec3 {
  constructor(x=0, y=0, z=0) {
    this.x = x;
    this.y = y;
    this.z = z;
  }
  
  Add(v) {
    v = v < 1e5 ? new Vec3(v,v,v) : v;
    return new Vec3(this.x + v.x, this.y + v.y, this.z + v.z);
  }
    
  Multiply(v) {
    v = v < 1e5 ? new Vec3(v,v,v) : v;
    return new Vec3(this.x * v.x, this.y * v.y, this.z * v.z);
  }
}

let roadType = ROAD_TYPES.NORMAL;

let roadGenLengthMax = 0;
let roadGenLength = 0;
let roadGenTaper = 0;
let roadGenFreqX = 0;
let roadGenFreqY = 0;
let roadGenScaleX = 0;
let roadGenScaleY = 0;
let roadGenWidth = roadWidth;
let startRandSeed = randSeed = Date.now();
let road = [];

for (let i = 0; i < roadEnd*2; ++i) {
  if (roadGenLength++ > roadGenLengthMax) {
    const d = Math.min(1, (i % maxDifficultySegment) / maxDifficultySegment);
    roadGenWidth = roadWidth*R(1-d*.7,3-2*d);
    roadGenFreqX = R(Lerp(d,.04,.12));
    roadGenFreqY = R(Lerp(d,.04,.15));
    roadGenScaleX = R(Lerp(d,1,2.5));
    roadGenScaleY = R(Lerp(d,2e3,6e3));
    roadGenTaper = R(99, 1e3)|0;
    roadGenLengthMax = roadGenTaper + R(99,1e3);
    roadGenLength = 0;
    
    roadType = R(Object.keys(ROAD_TYPES).length) | 0;
  }
  
  let x = Math.sin(i*roadGenFreqX) * roadGenScaleX;
  let y = Math.sin(i*roadGenFreqY) * roadGenScaleY;
  
  switch(roadType) {
    case ROAD_TYPES.ZIGZAG:
      x += ((i / 100) % 2 < 1 ? 1 : -1) * roadGenScaleX * 0.5;
      break;
    case ROAD_TYPES.WAVY:
      x += Math.sin(i * 0.1) * roadGenScaleX * 0.5;
      break;
  }
  
  road[i] = road[i] || {x:x, y:y, w:roadGenWidth, type:roadType};
  
  const p = Clamp(roadGenLength / roadGenTaper, 0, 1);
  road[i].x = Lerp(p, road[i].x, x);
  road[i].y = Lerp(p, road[i].y, y);
  road[i].w = Lerp(p, road[i].w, roadGenWidth);
  road[i].type = roadType;
    
  road[i].a = road[i-1] ? 
    Math.atan2(road[i-1].y-road[i].y, segmentLength) : 0;
}

let velocity = new Vec3(0, 0, 0);
let pitchSpring = 0;
let pitchSpringSpeed = 0;
let pitchRoad = 0;
let position = new Vec3(0, height, 0);
let nextCheckPoint = checkPointDistance;
let time = maxTime;
heading = randSeed;

function drawRainbowStripe(y, height) {
    const stripeCount = 7;
    const stripeWidth = c.width / stripeCount;
    context.fillStyle = 'black';
    context.fillRect(0, y, c.width, height);
    for (let i = 0; i < stripeCount; i++) {
        const hue = (hueShift + i * 360 / stripeCount) % 360;
        context.fillStyle = LSHA(20, 80, hue, 0.3);
        context.fillRect(i * stripeWidth, y, stripeWidth, height);
    }
}

function DrawFlower(x, y, size, alpha) {
    const petalCount = 5;
    const centerSize = size * 0.3;
    
    for (let i = 0; i < petalCount; i++) {
        const angle = (i / petalCount) * Math.PI * 2;
        const petalX = x + Math.cos(angle) * size;
        const petalY = y + Math.sin(angle) * size;
        
        DrawPoly(
            x, y, centerSize,
            petalX, petalY, centerSize,
            LSHA(R(60,80), 90+R(10), R(350,10), alpha)
        );
    }
    
    DrawPoly(x, y, centerSize, x, y, centerSize, LSHA(R(30,50), 90+R(10), R(350,10), alpha));
}

function Update() {
    if (!isPaused && !gameOver) {
        let s = position.z / segmentLength | 0;
        let p = position.z / segmentLength % 1;

        let roadX = Lerp(p, road[s].x, road[s+1].x);
        let roadY = Lerp(p, road[s].y, road[s+1].y) + height;
        let roadA = Lerp(p, road[s].a, road[s+1].a);

        let lastVelocity = velocity.Add(0);
        velocity.y += gravity;
        velocity.x *= lateralDamp;
        velocity.z = Math.max(0, time ? forwardDamp * velocity.z : 0);

        position = position.Add(velocity);
      
        position.x = Clamp(position.x, -maxPlayerX, maxPlayerX); 

        if (position.y < roadY) {
            position.y = roadY;
            jumpCount = 0;
            
            let dp = Math.cos(roadA)*velocity.y + Math.sin(roadA)*velocity.z;
            
            velocity = new Vec3(0, Math.cos(roadA), Math.sin(roadA))
                .Multiply(-elasticity * dp).Add(velocity);
            
            velocity.z += mouseDown ? playerBrake : Lerp(velocity.z/maxSpeed, mousePressed*playerAccel, 0);
            
            if (Math.abs(position.x) > road[s].w) {
                velocity.z *= offRoadDamp;
                pitchSpring += Math.sin(position.z/99)**4/99;
            }
        } else {
            if (spacePressed && jumpCount < maxJumps) {
                velocity.y += jumpAccel;
                airFrame = 0;
                spacePressed = false;
            }
            airFrame++;
        }

        let turn = Lerp(velocity.z/maxSpeed, mouseX * turnControl, 0);
        velocity.x +=
            velocity.z * turn -
            velocity.z ** 2 * centrifugal * roadX;
      
        if (position.y <= roadY && time) {
            if (spacePressed) {
                velocity.y += jumpAccel;
                airFrame = 0;
            } else {
                airFrame++;
            }
        } else {
            airFrame++;
        }

        let airPercent = (position.y - roadY) / 99;
        pitchSpringSpeed += Lerp(airPercent, 0, velocity.y/4e4);

        pitchSpringSpeed += (velocity.z - lastVelocity.z)/2e3;
        pitchSpringSpeed -= pitchSpring * springConstant;
        pitchSpringSpeed *= pitchSpringDamp;
        pitchSpring += pitchSpring; 
        pitchRoad = Lerp(pitchLerp, pitchRoad, Lerp(airPercent,-roadA,0));
        let playerPitch = pitchSpring + pitchRoad;

        heading = ClampAngle(heading + velocity.z*roadX*worldRotateScale);
        let cameraHeading = turn * cameraTurnScale;

        if (position.z > nextCheckPoint) {
            time = maxTime;
            nextCheckPoint += checkPointDistance;
            hueShift += R(10, 30);
            score += 1000;
        }

        c.width = window.innerWidth;
        c.height = window.innerHeight;

        let projectScale = (new Vec3(1,-1,1)).Multiply(c.width/2/cameraDepth);

        let horizon = c.height/2 - Math.tan(playerPitch)*projectScale.y + Math.sin(position.z * 0.01) * 50;
        let backgroundOffset = Math.sin(cameraHeading)/2;
        let light = Math.cos(heading);

        let pulseEffect = Math.sin(position.z * 0.005) * 0.2 + 0.8;

        let skyGradient = context.createLinearGradient(0, 0, 0, horizon);
        for (let i = 0; i < 7; i++) {
          let hue = (hueShift + i * 60) % 360;
          skyGradient.addColorStop(i / 6, LSHA(50, 80, hue, 1));
        }
        DrawPoly(c.width/2, 0, c.width/2, c.width/2, horizon, c.width/2, skyGradient);

        let sunX = c.width * (0.5 + Math.sin(position.z * 0.0001) * 0.3);
        let sunY = horizon * 0.5;
        let sunRadius = c.width * 0.05;
        context.beginPath();
        context.arc(sunX, sunY, sunRadius, 0, 2 * Math.PI);
        context.fillStyle = 'white';
        context.fill();

        for (let i = 0; i < 5; i++) {
          let glitchX = sunX + R(-10, 10);
          let glitchY = sunY + R(-10, 10);
          let glitchRadius = sunRadius * R(0.8, 1.2);
          context.beginPath();
          context.arc(glitchX, glitchY, glitchRadius, 0, 2 * Math.PI);
          context.fillStyle = LSHA(100, 0, 0, 0.5);
          context.fill();
        }

        for (let blackHole of blackHoles) {
          let p = new Vec3(blackHole.x - position.x, height - position.y, blackHole.z - position.z);
          p.x = p.x * Math.cos(cameraHeading) - p.z * Math.sin(cameraHeading);
          let z = 1 / (p.z * Math.cos(playerPitch) - p.y * Math.sin(playerPitch));
          p.y = p.y * Math.cos(playerPitch) - p.z * Math.sin(playerPitch);
          p = p.Multiply(new Vec3(z, z, 1)).Multiply(projectScale).Add(new Vec3(c.width/2, c.height/2));
          
          if (p.z > 0 && p.z < 1e5) {
            let radius = blackHoleRadius * p.z;
            context.beginPath();
            context.arc(p.x, p.y, radius, 0, 2 * Math.PI);
            let gradient = context.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius);
            gradient.addColorStop(0, 'rgba(0, 0, 0, 1)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            context.fillStyle = gradient;
            context.fill();
          }
        }

        randSeed = startRandSeed;

        for (let i = mountainCount; i--;) {
            let angle = ClampAngle(heading + R(19));
            let treeLight = Math.cos(angle - heading); 
            let x = c.width * (.5 + Lerp(angle/PI/2+.5, 4, -4) - backgroundOffset) + Math.sin(position.z * 0.01 + i) * 20;
            let y = horizon;
            let w = R(.1,.3)**2 * c.width; 
            let h = R(3,4) * w; 
            
            DrawPoly(
                x, y, w/10,
                x, y - h*0.9, w/10,
                LSHA(R(20,30)+i/3-treeLight*9, 80+i/2+R(19), R(360), 0.8)
            );
            
            for (let j = 12; j--;) {
                let layerW = w * (1 - j*0.08);
                let layerH = h * 0.12;
                let layerY = y - h*0.2 - j*layerH*0.7;
                let rainbowHue = (j * 30 + hueShift + i * 10) % 360; 
                DrawPoly(
                    x, layerY, layerW,
                    x, layerY - layerH, 0,
                    LSHA(R(35,55)+i/3-treeLight*9, 80+i/2+R(19), rainbowHue, 0.8)
                );
            }
        }

        for (let x = 0, w = 0, i = 0; i < drawDistance + 1;) {
            let p = new Vec3(
                x += w += road[s+i].x,
                road[s+i].y,
                (s+i) * segmentLength
            ).Add(position.Multiply(-1));

            p.x = p.x * Math.cos(cameraHeading) - p.z * Math.sin(cameraHeading);
            
            let z = 1 / (p.z * Math.cos(playerPitch) - p.y * Math.sin(playerPitch));
            p.y = p.y * Math.cos(playerPitch) - p.z * Math.sin(playerPitch);
            p.z = z;
            
            road[s+i++].p = p.Multiply(new Vec3(z, z, 1))
                .Multiply(projectScale)
                .Add(new Vec3(c.width/2, c.height/2));
        }

        let segment2 = road[s + drawDistance];
        for (let i = drawDistance; i--;) {
            let segment1 = road[s+i];
            let p1 = segment1.p;
            let p2 = segment2.p;
            
            randSeed = startRandSeed + s + i;
            light = Math.sin(segment1.a) * Math.cos(heading) * 99;
            
            if (p1.z < 1e5 && p1.z > 0) {
                if (i % (Lerp(i/drawDistance, 1, 9)|0) == 0) {
                    let roadColor;
                    switch(segment1.type) {
                      case ROAD_TYPES.RAINBOW:
                        roadColor = LSHA(50+light, 80, (hueShift + (s+i)*10) % 360, 1);
                        break;
                      case ROAD_TYPES.ZIGZAG:
                      case ROAD_TYPES.WAVY:
                        roadColor = LSHA(40+light, 70, 200 + light, 1);
                        break;
                      case ROAD_TYPES.CHECKERED:
                        roadColor = ((s+i) % 2 === 0) ? LSHA(20+light, 0, 0, 1) : LSHA(80+light, 0, 0, 1);
                        break;
                      default:
                        roadColor = LSHA(((s+i)*segmentLength%checkPointDistance<300 ? 90 : 27)+light, 80, 0, 1);
                    }
                    
                    DrawPoly(p1.x, p1.y, p1.z*segment1.w,
                      p2.x, p2.y, p2.z*segment2.w,
                      roadColor);
                    
                    segment2 = segment1;
                }

                if (R() < .2 && s+i > 29) {
                    let x = 2*roadWidth * R(10,-10) * R(9);
                    const isRamp = Math.abs(x) < segment1.w; 
                    const objectHeight = isRamp ? 200 + R(200) : (R(2)|0) * 400;
                    
                    if (isRamp || !isRamp) {
                        if (!segment1.h
                            && Math.abs(position.x-x) < 200
                            && Math.abs(position.z-(s+i)*segmentLength) < 200
                            && position.y-height < segment1.y+objectHeight+200)
                        {
                            if (isRamp) {
                                let rampBoost = 20 + R(10);
                                if (spacePressed && airFrame < 5) {
                                    rampBoost *= 1.5;
                                }
                                velocity.y += rampBoost;
                                velocity.z *= 1.1;
                            } else {
                                velocity = velocity.Multiply(segment1.h = collisionSlow);
                            }
                            score += isRamp ? 200 : -100;
                        }

                        const alpha = Lerp(i/drawDistance, 4, 0);
                        if (isRamp) {
                            DrawPoly(x = p1.x+p1.z * x, p1.y, p1.z*100,
                                x, p1.y-objectHeight*p1.z, 0,
                                LSHA(50+R(20), 90+R(10), R(340,20), alpha));
                        } else {
                            DrawPoly(x = p1.x+p1.z*x, p1.y, p1.z*29,
                                x, p1.y-99*p1.z, p1.z*29,
                                LSHA(35+R(9), 80+R(9), 359+R(5), alpha));
                            
                            DrawPoly(x, p1.y-R(50,99)*p1.z, p1.z*R(199,250),
                                x, p1.y-R(600,800)*p1.z, 0,
                                LSHA(25+R(9), 80+R(9), 9+R(29), alpha));
                        }
                    }
                }
            }
        }

        updateBalls();

        time = Clamp(time - timeDelta, 0, maxTime);
        score += Math.floor(velocity.z);
    }
    
    if (gameOver) {
        context.fillStyle = 'rgba(0, 0, 0, 0.7)';
        context.fillRect(0, 0, c.width, c.height);
        context.textAlign = 'center';
        DrawText('GAME OVER', c.width/2, c.height/2);
        DrawText('Click to Restart', c.width/2, c.height/2 + 60);
    }
    
    document.getElementById('time').textContent = `Time: ${Math.ceil(time)}`;
    document.getElementById('distance').textContent = `Distance: ${(position.z/1e3).toFixed(1)}km`;
    document.getElementById('speed').textContent = `Speed: ${(velocity.z * 3.6).toFixed(0)}km/h`;

    if (!mousePressed) {
        context.textAlign = 'center';
        DrawText('HUE JUMPER AI', c.width/2);
        DrawText('Click to Start', c.width/2, c.height/2 + 40);
    }

    hueShift = (hueShift + 0.2) % 360;

    requestAnimationFrame(Update);
}

Update();
</script>
</body>
</html>
