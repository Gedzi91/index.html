  let currentChannel = 1;

  function changeChannel(direction) {
    const channelDisplay = document.getElementById('currentChannel');
    const videoFrame = document.getElementById('videoFrame');
    const songInfoDisplay = document.getElementById('songInfo');

    if (direction === 'next') {
      currentChannel++;
    } else if (direction === 'prev') {
      currentChannel--;
    } else if (direction === 'random') {
      currentChannel = Math.floor(Math.random() * 999999999999) + 1;
    }

    if (currentChannel > 999999999999) currentChannel = 1;
    if (currentChannel < 1) currentChannel = 999999999999;

    channelDisplay.textContent = `Channel: ${currentChannel}`;
    
    // Show static effect
    videoFrame.style.opacity = 0;
    setTimeout(() => {
      const videoIndex = (currentChannel - 1) % musicVideoIds.length;
      videoFrame.src = `https://www.youtube.com/embed/${musicVideoIds[videoIndex]}?autoplay=1&controls=0&showinfo=0&rel=0`;
      songInfoDisplay.textContent = `Now Playing: ${songTitles[videoIndex]}`;
      videoFrame.style.opacity = 1;
    }, 500);
