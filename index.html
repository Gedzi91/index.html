<html><head><base href="https://websim.ai/"><title>LYRiCSTiFY - AI Lyrics Emulate Your Favorite Musical Artists</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #121212;
    color: #ffffff;
  }
  
  .gradient-button {
    background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00);
    background-size: 200% 200%;
    animation: gradient 5s ease infinite;
  }
  
  @keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }
  
  .input-field {
    font-size: 1.2rem;
    padding: 0.75rem;
  }
  
  .submit-button {
    font-size: 1.5rem;
    padding: 1rem 2rem;
    transition: all 0.3s ease;
  }
  
  .submit-button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
  }
  
  #psychedelicBackground {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
  }

  @keyframes progressAnimation {
    0% { width: 0%; }
    20% { width: 20%; }
    40% { width: 40%; }
    60% { width: 60%; }
    80% { width: 80%; }
    100% { width: 100%; }
  }

  #progress {
    animation: progressAnimation 5s ease-in-out;
  }

  select {
    appearance: none;
    background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E');
    background-repeat: no-repeat;
    background-position: right 0.7rem top 50%;
    background-size: 0.65rem auto;
  }
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
  <canvas id="psychedelicBackground"></canvas>
  
  <h1 class="text-4xl font-bold mb-8 text-center">LYRiCSTiFY - AI Lyrics Emulator</h1>
  
  <form id="lyricForm" class="w-full max-w-lg">
    <div class="mb-6">
      <input type="text" id="artist" name="artist" placeholder="Artist or Band" required class="w-full input-field bg-gray-800 text-white rounded">
    </div>
    <div class="mb-6">
      <input type="text" id="theme" name="theme" placeholder="Theme" required class="w-full input-field bg-gray-800 text-white rounded">
    </div>
    <div class="mb-6">
      <select id="genre" name="genre" required class="w-full input-field bg-gray-800 text-white rounded">
        <option value="" disabled selected>Select Genre</option>
        <option value="rock">Rock</option>
        <option value="pop">Pop</option>
        <option value="hiphop">Hip Hop</option>
        <option value="country">Country</option>
        <option value="electronic">Electronic</option>
        <option value="jazz">Jazz</option>
        <option value="blues">Blues</option>
        <option value="reggae">Reggae</option>
        <option value="metal">Metal</option>
        <option value="folk">Folk</option>
      </select>
    </div>
    <button type="submit" class="w-full gradient-button text-white font-bold rounded submit-button">
      Generate Lyrics
    </button>
  </form>

  <div id="techCard" class="hidden mt-8 p-4 bg-gray-800 rounded-lg shadow-lg w-full max-w-lg">
    <h2 class="text-xl font-semibold mb-4">Generating Lyrics...</h2>
    <div class="w-full bg-gray-700 rounded-full h-2.5 dark:bg-gray-700">
      <div id="progress" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
    </div>
  </div>

  <div id="result" class="hidden mt-8 p-4 bg-gray-800 rounded-lg shadow-lg w-full max-w-lg">
    <h2 class="text-2xl font-bold mb-4">Generated Lyrics</h2>
    <pre id="lyrics" class="whitespace-pre-wrap"></pre>
  </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const lyricForm = document.getElementById('lyricForm');
  const resultElement = document.getElementById('result');
  const techCardElement = document.getElementById('techCard');
  const lyricsElement = document.getElementById('lyrics');
  const progressElement = document.getElementById('progress');

  if (lyricForm && resultElement && techCardElement && lyricsElement && progressElement) {
    lyricForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const artist = document.getElementById('artist').value;
      const theme = document.getElementById('theme').value;
      const genre = document.getElementById('genre').value;
      
      resultElement.classList.add('hidden');
      techCardElement.classList.remove('hidden');
      
      try {
        // Reset and start the progress animation
        progressElement.style.width = '0%';
        progressElement.style.animation = 'none';
        progressElement.offsetHeight; // Trigger reflow
        progressElement.style.animation = 'progressAnimation 5s ease-in-out';

        // Simulated lyrics generation process
        await simulateLyricsGeneration();
        
        // Generate mock lyrics
        const lyrics = generateMockLyrics(artist, theme, genre);
        
        lyricsElement.textContent = lyrics;
        resultElement.classList.remove('hidden');
        
        // Scroll to the result
        resultElement.scrollIntoView({ behavior: 'smooth' });
      } catch (error) {
        console.error('Error:', error);
        alert('An error occurred while generating lyrics. Please try again.');
      } finally {
        techCardElement.classList.add('hidden');
      }
    });
  } else {
    console.error('One or more required elements are missing from the DOM');
  }

  async function simulateLyricsGeneration() {
    // Wait for the animation to complete
    await new Promise(resolve => setTimeout(resolve, 5000));
  }

  function generateMockLyrics(artist, theme, genre) {
    const sections = ['[Intro]', '[Hook]', '[Verse 1]', '[Chorus]', '[Verse 2]', '[Chorus]', '[Verse 3]', '[Bridge]', '[Chorus]', '[Outro]'];
    let lyrics = '';

    sections.forEach(section => {
      lyrics += `${section}\n\n`;
      const lines = Math.floor(Math.random() * 4) + 2;
      for (let i = 0; i < lines; i++) {
        lyrics += `${generateRandomLine(theme, genre)}\n`;
      }
      lyrics += '\n';
    });

    return lyrics;
  }

  function generateRandomLine(theme, genre) {
    const themes = {
      'love': ['heart', 'soul', 'embrace', 'forever', 'passion'],
      'heartbreak': ['tears', 'pain', 'goodbye', 'lonely', 'shattered'],
      'party': ['dance', 'night', 'beat', 'wild', 'freedom'],
      'life': ['journey', 'dream', 'hope', 'struggle', 'destiny']
    };

    const genres = {
      'rock': ['guitar', 'rebel', 'loud', 'fire', 'energy'],
      'pop': ['catchy', 'rhythm', 'melody', 'fun', 'bright'],
      'hiphop': ['flow', 'rhyme', 'street', 'beat', 'real'],
      'country': ['home', 'road', 'whiskey', 'truck', 'sunset'],
      'electronic': ['pulse', 'synth', 'bass', 'techno', 'rave'],
      'jazz': ['smooth', 'improvise', 'saxophone', 'swing', 'blues'],
      'blues': ['soulful', 'guitar', 'heartache', 'rhythm', 'deep'],
      'reggae': ['island', 'roots', 'positive', 'vibes', 'sunshine'],
      'metal': ['heavy', 'intense', 'power', 'dark', 'scream'],
      'folk': ['acoustic', 'story', 'tradition', 'harmony', 'nature']
    };

    const themeWords = themes[theme.toLowerCase()] || themes['life'];
    const genreWords = genres[genre.toLowerCase()] || genres['rock'];

    const words = [...themeWords, ...genreWords];
    const lineLength = Math.floor(Math.random() * 5) + 5;
    
    return Array(lineLength).fill().map(() => words[Math.floor(Math.random() * words.length)]).join(' ');
  }

  // Three.js Psychedelic Background
  const canvas = document.getElementById('psychedelicBackground');
  if (canvas) {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    // Create a group to hold all the objects
    const group = new THREE.Group();
    scene.add(group);

    // Create multiple geometric shapes
    const geometries = [
      new THREE.IcosahedronGeometry(1, 0),
      new THREE.OctahedronGeometry(1, 0),
      new THREE.TetrahedronGeometry(1, 0),
      new THREE.TorusKnotGeometry(0.5, 0.2, 100, 16)
    ];

    const materials = [
      new THREE.MeshPhongMaterial({ color: 0xff00ff, shininess: 100 }),
      new THREE.MeshPhongMaterial({ color: 0x00ffff, shininess: 100 }),
      new THREE.MeshPhongMaterial({ color: 0xffff00, shininess: 100 }),
      new THREE.MeshPhongMaterial({ color: 0xff8000, shininess: 100 })
    ];

    for (let i = 0; i < 20; i++) {
      const geometry = geometries[Math.floor(Math.random() * geometries.length)];
      const material = materials[Math.floor(Math.random() * materials.length)];
      const mesh = new THREE.Mesh(geometry, material);
      
      mesh.position.set(
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 10
      );
      
      mesh.rotation.set(
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2
      );
      
      group.add(mesh);
    }

    // Add lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    camera.position.z = 5;

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      
      group.rotation.x += 0.001;
      group.rotation.y += 0.002;
      
      group.children.forEach(mesh => {
        mesh.rotation.x += 0.01;
        mesh.rotation.y += 0.01;
      });
      
      renderer.render(scene, camera);
    }

    animate();

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  } else {
    console.error('Canvas element for Three.js background is missing');
  }
});
</script>

</body></html>
