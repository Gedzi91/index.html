<script>const audioContext = new (window.AudioContext || window.webkitAudioContext)();
function createRobotSound(frequency, duration, type = 'sine') {
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();
  oscillator.type = type;
  oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
  gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  oscillator.start();
  oscillator.stop(audioContext.currentTime + duration);
}
function playEmotionSound(emotion) {
  switch (emotion) {
    case 'happy':
      createRobotSound(440, 0.2, 'sine');
      setTimeout(() => createRobotSound(550, 0.2, 'sine'), 200);
      break;
    case 'sad':
      createRobotSound(330, 0.3, 'sine');
      setTimeout(() => createRobotSound(280, 0.3, 'sine'), 300);
      break;
    case 'laugh':
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          createRobotSound(440 + i * 50, 0.15, 'square');
        }, i * 150);
      }
      break;
    case 'love':
      createRobotSound(440, 0.15, 'sine');
      setTimeout(() => createRobotSound(660, 0.3, 'sine'), 150);
      break;
    case 'playful':
      createRobotSound(523.25, 0.1, 'sine');
      setTimeout(() => createRobotSound(587.33, 0.1, 'sine'), 150);
      setTimeout(() => createRobotSound(659.25, 0.1, 'sine'), 300);
      break;
    case 'eating':
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          createRobotSound(330 + i * 110, 0.1, 'sine');
        }, i * 300);
      }
      break;
  }
}
const robot = document.querySelector('.robot');
const eyes = document.querySelectorAll('.eye');
const mouth = document.querySelector('.mouth');
const arms = document.querySelectorAll('.arm');
const speechBubble = document.querySelector('.speech-bubble');
let isPlaying = false;
const butterfly = document.querySelector('.butterfly');
function updateButterflyPosition(e) {
  if (!isPlaying) return;
  const mouseX = e.clientX;
  const mouseY = e.clientY;
  butterfly.style.left = `${mouseX - 15}px`;
  butterfly.style.top = `${mouseY - 15}px`;
  const robotRect = robot.getBoundingClientRect();
  const robotCenterX = robotRect.left + robotRect.width / 2;
  const robotCenterY = robotRect.top + robotRect.height / 2;
  const dx = mouseX - robotCenterX;
  const dy = mouseY - robotCenterY;
  const distance = Math.sqrt(dx * dx + dy * dy);
  const angle = Math.atan2(dy, dx);
  const eyeMovementRange = 3;
  const eyeX = Math.cos(angle) * eyeMovementRange;
  const eyeY = Math.sin(angle) * eyeMovementRange;
  eyes.forEach(eye => {
    if (!eye.classList.contains('closed')) {
      eye.style.transform = `translate(${eyeX}px, ${eyeY}px)`;
    }
  });
  const faceProximity = 100;
  const isFaceClose = distance < faceProximity;
  eyes.forEach(eye => {
    eye.classList.toggle('closed', isFaceClose);
    if (isFaceClose) {
      eye.style.transform = '';
    }
  });
  arms.forEach((arm, i) => {
    if (isFaceClose) {
      arm.style.transform = i === 0 ? 'rotate(-45deg)' : 'rotate(45deg)';
    } else {
      arm.style.transform = 'rotate(0deg)';
    }
  });
  if (isFaceClose) {
    speak('*happy sigh*');
    if (!robot.dataset.playingSweetSound) {
      robot.dataset.playingSweetSound = 'true';
      createRobotSound(660, 0.3, 'sine');
      setTimeout(() => {
        robot.dataset.playingSweetSound = '';
      }, 300);

function speakWithVoice(text) {
  if (!voiceEnabled) return;
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    if (text.toLowerCase().includes('crunch') || text.toLowerCase().includes('yummy') || text.toLowerCase().includes('delicious')) {
      utterance.pitch = 1.8;
      utterance.rate = 0.7;
      utterance.volume = 1.0;
    } else if (text.toLowerCase().includes('happy') || text.toLowerCase().includes('yay') || text.toLowerCase().includes('funny') || text.toLowerCase().includes('love') || text.toLowerCase().includes('play')) {
      utterance.pitch = 2.0;
      utterance.rate = 1.2;
      utterance.volume = 1.0;
    } else if (text.toLowerCase().includes('sad') || text.toLowerCase().includes('sniff')) {
      utterance.pitch = 0.7;
      utterance.rate = 0.6;
      utterance.volume = 0.5;
    } else if (text.toLowerCase().includes('zzz') || text.toLowerCase().includes('yawn')) {
      utterance.pitch = 0.5;
      utterance.rate = 0.5;
      utterance.volume = 0.3;
    } else {
      utterance.pitch = 1.5;
      utterance.rate = 0.9;
      utterance.volume = 0.8;
    }
    const voices = window.speechSynthesis.getVoices();
    const preferredVoice = voices.find(voice => voice.name.toLowerCase().includes('google') || voice.name.toLowerCase().includes('microsoft'));
    if (preferredVoice) {
      utterance.voice = preferredVoice;
    }
    window.speechSynthesis.speak(utterance);
  }
}
function speak(text) {
  speechBubble.textContent = text;
  speechBubble.style.opacity = '1';
  speakWithVoice(text);
  setTimeout(() => {

  }, 2000);
}
