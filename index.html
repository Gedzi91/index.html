<html><head><base href="/" />
<style>
:root {
  --oren-orange: #FF7F00;
  --oren-yellow: #FFD700;
}

body {
  margin: 0;
  padding: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(45deg, var(--oren-yellow), var(--oren-orange));
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
}

.container {
  text-align: center;
  position: relative;
}

.oren-image {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  transition: transform 0.3s ease;
  cursor: pointer;
  animation: float 3s ease-in-out infinite;
}

.oren-image:hover {
  transform: scale(1.1);
}

@keyframes float {
  0% {
    transform: translateY(0px);
  }
  50% {
    transform: translateY(-20px);
  }
  100% {
    transform: translateY(0px);
  }
}

.sparkle {
  position: absolute;
  pointer-events: none;
}

.name {
  font-size: 4em;
  color: white;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  margin-top: 20px;
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% {
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }
  50% {
    text-shadow: 0 0 20px var(--oren-yellow), 0 0 30px var(--oren-orange);
  }
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <img src="orenplus.webp" alt="Oren" class="oren-image" id="oren">
  <h1 class="name">OREN</h1>
</div>

<script>
function createSparkle(e) {
  const sparkle = document.createElement('div');
  sparkle.className = 'sparkle';
  
  const size = Math.random() * 20 + 10;
  const angle = Math.random() * 360;
  
  const svg = `
    <svg width="${size}" height="${size}" viewBox="0 0 24 24">
      <polygon points="12 0 15 9 24 12 15 15 12 24 9 15 0 12 9 9"
               fill="${Math.random() > 0.5 ? 'var(--oren-yellow)' : 'var(--oren-orange)'}">
        <animate attributeName="opacity" values="1;0" dur="1s" begin="0s" fill="freeze"/>
      </polygon>
    </svg>
  `;
  
  sparkle.innerHTML = svg;
  sparkle.style.left = (e.pageX - size/2) + 'px';
  sparkle.style.top = (e.pageY - size/2) + 'px';
  
  document.body.appendChild(sparkle);
  
  setTimeout(() => {
    document.body.removeChild(sparkle);
  }, 1000);
}

document.getElementById('oren').addEventListener('click', (e) => {
  for(let i = 0; i < 10; i++) {
    setTimeout(() => createSparkle(e), i * 50);
  }
});

// Create random background sparkles
setInterval(() => {
  const x = Math.random() * window.innerWidth;
  const y = Math.random() * window.innerHeight;
  createSparkle({pageX: x, pageY: y});
}, 2000);
</script>
</body></html>
