<html><head><base href="https://prrrrrr.com">
<title>Error 404 - Prrrrrr Not Found</title>
<style>
  body {
    font-family: 'Courier New', monospace;
    background-color: #1a1a1a;
    color: #00ff00;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }
  .container {
    text-align: center;
  }
  h1 {
    font-size: 3em;
    margin-bottom: 20px;
  }
  .cat {
    font-size: 2em;
    white-space: pre;
    line-height: 1.2;
  }
  .message {
    font-size: 1.2em;
    margin-top: 20px;
  }
  .cursor {
    animation: blink 0.7s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Error 404: Prrrrrr Not Found</h1>
  <div class="cat">
 /\___/\
( o   o )
(  =^=  )
(        )
(         )
(          )))))))))))
  </div>
  <p class="message">Oops! The cat you're looking for has wandered off.<span class="cursor">_</span></p>
</div>

<script>
document.addEventListener('DOMContentLoaded', (event) => {
  const container = document.querySelector('.container');
  const cat = document.querySelector('.cat');
  
  document.addEventListener('mousemove', (e) => {
    const x = e.clientX / window.innerWidth - 0.5;
    const y = e.clientY / window.innerHeight - 0.5;
    
    container.style.transform = `
      translate(${x * 20}px, ${y * 20}px)
      rotateX(${y * 10}deg) rotateY(${x * 10}deg)
    `;
  });

  cat.addEventListener('click', () => {
    const meows = ['Meow!', 'Prrrr!', 'Mrow?', 'Hiss!', 'Purrrrup!'];
    const randomMeow = meows[Math.floor(Math.random() * meows.length)];
    
    const meowElem = document.createElement('div');
    meowElem.textContent = randomMeow;
    meowElem.style.position = 'absolute';
    meowElem.style.left = `${Math.random() * 80 + 10}%`;
    meowElem.style.top = `${Math.random() * 80 + 10}%`;
    meowElem.style.fontSize = '2em';
    meowElem.style.opacity = '0';
    meowElem.style.transition = 'all 1s ease-out';
    
    document.body.appendChild(meowElem);
    
    setTimeout(() => {
      meowElem.style.opacity = '1';
      meowElem.style.transform = `translateY(-50px) rotate(${Math.random() * 60 - 30}deg)`;
    }, 50);
    
    setTimeout(() => {
      meowElem.style.opacity = '0';
      meowElem.style.transform += ' scale(0.5)';
    }, 1000);
    
    setTimeout(() => {
      document.body.removeChild(meowElem);
    }, 2000);
  });
});
</script>
</body>
</html>
