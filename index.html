<html><head><base href="https://websim.cymatic.experiment/v4/" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced 3D Cymatics Simulation with Audio Visualization</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.7/dat.gui.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
<style>
  body { margin: 0; overflow: hidden; background-color: #000; }
  canvas { display: block; }
  #info {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: 'Arial', sans-serif;
    font-size: 14px;
    background-color: rgba(0, 0, 0, 0.5);
    padding: 10px;
    border-radius: 5px;
    z-index: 100;
  }
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-family: 'Arial', sans-serif;
    font-size: 24px;
    text-align: center;
  }
  #audioControls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background-color: rgba(0, 0, 0, 0.5);
    padding: 10px;
    border-radius: 5px;
    z-index: 100;
    display: flex;
    align-items: center;
  }
  #audioControls input[type="file"] {
    display: none;
  }
  #audioControls label, #audioControls button {
    background-color: #4CAF50;
    border: none;
    color: white;
    padding: 10px 20px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 4px 2px;
    cursor: pointer;
    border-radius: 5px;
  }
  #audioControls button:disabled {
    background-color: #cccccc;
    cursor: not-allowed;
  }
</style>
</head>
<body>
<div id="info">Advanced 3D Cymatics Simulation with Audio Visualization<br>Use the controls to adjust parameters and upload audio</div>
<div id="loading">Loading...</div>
<div id="audioControls">
  <label for="audioUpload">Upload MP3</label>
  <input type="file" id="audioUpload" accept="audio/mp3">
  <button id="playPause" disabled>Play</button>
</div>
<script>
let scene, camera, renderer, plane, material;
let width = 200, height = 200;
let frequency = 0.1, amplitude = 5, waveSpeed = 0.05;
let time = 0;
let particles, particleSystem;
let waveFunction = Math.sin;
let isAnimating = true;

// Audio variables
let audioContext, audioSource, analyser;
let audioData;
let isPlaying = false;

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const geometry = new THREE.PlaneGeometry(width, height, width - 1, height - 1);
  material = new THREE.MeshPhongMaterial({
    color: 0x00ff00,
    wireframe: true,
    side: THREE.DoubleSide,
    shininess: 100,
    emissive: 0x00ff00,
    emissiveIntensity: 0.5
  });

  plane = new THREE.Mesh(geometry, material);
  scene.add(plane);

  const light1 = new THREE.PointLight(0xffffff, 1, 500);
  light1.position.set(50, 50, 50);
  scene.add(light1);

  const light2 = new THREE.PointLight(0x00ffff, 0.5, 500);
  light2.position.set(-50, -50, 50);
  scene.add(light2);

  const ambientLight = new THREE.AmbientLight(0x404040);
  scene.add(ambientLight);

  camera.position.z = 150;

  particles = new THREE.BufferGeometry();
  const particleCount = 10000;
  const posArray = new Float32Array(particleCount * 3);
  
  for (let i = 0; i < particleCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 200;
  }
  
  particles.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
  const particleMaterial = new THREE.PointsMaterial({
    size: 0.1,
    color: 0xffffff,
    transparent: true,
    opacity: 0.8
  });
  
  particleSystem = new THREE.Points(particles, particleMaterial);
  scene.add(particleSystem);

  setupGUI();
  setupAudioControls();

  window.addEventListener('resize', onWindowResize, false);

  document.getElementById('loading').style.display = 'none';
}

function setupGUI() {
  const gui = new dat.GUI();
  const params = {
    frequency: frequency,
    amplitude: amplitude,
    waveSpeed: waveSpeed,
    wireframe: true,
    color: '#00ff00',
    emissiveIntensity: 0.5,
    particleOpacity: 0.8,
    rotationSpeed: 0.001,
    waveFunction: 'sin',
    planeSegments: width - 1,
    cameraZoom: 150,
    particleSize: 0.1,
    particleCount: 10000,
    pauseAnimation: false
  };

  gui.add(params, 'frequency', 0.01, 1).onChange(value => frequency = value);
  gui.add(params, 'amplitude', 0, 20).onChange(value => amplitude = value);
  gui.add(params, 'waveSpeed', 0, 0.2).onChange(value => waveSpeed = value);
  gui.add(params, 'wireframe').onChange(value => material.wireframe = value);
  gui.addColor(params, 'color').onChange(value => {
    material.color.setHex(parseInt(value.replace('#', '0x')));
    material.emissive.setHex(parseInt(value.replace('#', '0x')));
  });
  gui.add(params, 'emissiveIntensity', 0, 1).onChange(value => material.emissiveIntensity = value);
  gui.add(params, 'particleOpacity', 0, 1).onChange(value => particleSystem.material.opacity = value);
  gui.add(params, 'rotationSpeed', 0, 0.01);
  gui.add(params, 'waveFunction', ['sin', 'cos', 'tan']).onChange(value => {
    switch(value) {
      case 'sin': waveFunction = Math.sin; break;
      case 'cos': waveFunction = Math.cos; break;
      case 'tan': waveFunction = Math.tan; break;
    }
  });
  gui.add(params, 'planeSegments', 10, 300).step(1).onChange(value => {
    scene.remove(plane);
    const newGeometry = new THREE.PlaneGeometry(width, height, value, value);
    plane = new THREE.Mesh(newGeometry, material);
    scene.add(plane);
  });
  gui.add(params, 'cameraZoom', 50, 300).onChange(value => camera.position.z = value);
  gui.add(params, 'particleSize', 0.01, 1).onChange(value => particleSystem.material.size = value);
  gui.add(params, 'particleCount', 1000, 50000).step(1000).onChange(value => {
    scene.remove(particleSystem);
    particles = new THREE.BufferGeometry();
    const posArray = new Float32Array(value * 3);
    for (let i = 0; i < value * 3; i++) {
      posArray[i] = (Math.random() - 0.5) * 200;
    }
    particles.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    particleSystem = new THREE.Points(particles, particleSystem.material);
    scene.add(particleSystem);
  });
  gui.add(params, 'pauseAnimation').onChange(value => isAnimating = !value);
}

function setupAudioControls() {
  const audioUpload = document.getElementById('audioUpload');
  const playPauseButton = document.getElementById('playPause');

  audioUpload.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        setupAudio(e.target.result);
      };
      reader.readAsArrayBuffer(file);
    }
  });

  playPauseButton.addEventListener('click', function() {
    if (isPlaying) {
      audioSource.stop();
      playPauseButton.textContent = 'Play';
    } else {
      setupAudio(audioData);
      playPauseButton.textContent = 'Pause';
    }
    isPlaying = !isPlaying;
  });
}

function setupAudio(arrayBuffer) {
  if (audioContext) audioContext.close();
  
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;

  audioContext.decodeAudioData(arrayBuffer, function(buffer) {
    audioSource = audioContext.createBufferSource();
    audioSource.buffer = buffer;
    audioSource.connect(analyser);
    analyser.connect(audioContext.destination);
    audioSource.start(0);
    document.getElementById('playPause').disabled = false;
  });

  audioData = arrayBuffer;
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  if (isAnimating) {
    render();
  }
}

function render() {
  time += waveSpeed;
  const positions = plane.geometry.attributes.position.array;

  if (analyser) {
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(dataArray);

    for (let i = 0; i < positions.length; i += 3) {
      const x = positions[i];
      const y = positions[i + 1];
      const distance = Math.sqrt(x * x + y * y);
      
      // Use audio data to influence the wave
      const index = Math.floor(distance / width * dataArray.length);
      const audioInfluence = dataArray[index] / 128.0 - 1;
      
      positions[i + 2] = waveFunction(distance * frequency + time) * amplitude * (1 + audioInfluence);
    }

    // Update particle positions based on audio
    const particlePositions = particles.attributes.position.array;
    for (let i = 0; i < particlePositions.length; i += 3) {
      const index = Math.floor(i / particlePositions.length * dataArray.length);
      const audioInfluence = dataArray[index] / 128.0 - 1;
      particlePositions[i + 1] += Math.sin(time + particlePositions[i]) * 0.1 * (1 + audioInfluence);
    }
    particles.attributes.position.needsUpdate = true;

    // Change color based on average frequency
    const avgFrequency = dataArray.reduce((a, b) => a + b) / dataArray.length;
    const hue = (avgFrequency / 255) * 360;
    const color = new THREE.Color(`hsl(${hue}, 100%, 50%)`);
    material.color.set(color);
    material.emissive.set(color);

  } else {
    for (let i = 0; i < positions.length; i += 3) {
      const x = positions[i];
      const y = positions[i + 1];
      const distance = Math.sqrt(x * x + y * y);
      positions[i + 2] = waveFunction(distance * frequency + time) * amplitude;
    }
  }

  plane.geometry.attributes.position.needsUpdate = true;
  plane.geometry.computeVertexNormals();

  plane.rotation.z += 0.001;

  renderer.render(scene, camera);
}

init();
animate();
</script>
</body></html>
