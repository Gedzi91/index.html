<html><head><base href="https://gyattusmaximussimulator.com/" target="_blank">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyattus Maximus Simulator</title>
<style>
  body {
    font-family: 'Comic Sans MS', cursive;
    background-color: #FFD700;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }
  .container {
    text-align: center;
  }
  #gyattus {
    width: 300px;
    height: 300px;
    cursor: pointer;
    transition: transform 0.3s;
  }
  #gyattus:hover {
    transform: scale(1.1);
  }
  #score {
    font-size: 24px;
    margin-top: 20px;
  }
  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Gyattus Maximus Simulator</h1>
  <svg id="gyattus" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="45" fill="#FF69B4" />
    <circle cx="35" cy="40" r="5" fill="black" />
    <circle cx="65" cy="40" r="5" fill="black" />
    <path d="M 30 60 Q 50 80 70 60" fill="none" stroke="black" stroke-width="3" />
  </svg>
  <div id="score">Gyattus Level: 0</div>
</div>
<canvas id="particles"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
<script>
const gyattus = document.getElementById('gyattus');
const scoreEl = document.getElementById('score');
const particlesCanvas = document.getElementById('particles');
const ctx = particlesCanvas.getContext('2d');

let score = 0;
let particles = [];

function updateCanvasSize() {
  particlesCanvas.width = window.innerWidth;
  particlesCanvas.height = window.innerHeight;
}

updateCanvasSize();
window.addEventListener('resize', updateCanvasSize);

function createParticle(x, y) {
  return {
    x,
    y,
    size: Math.random() * 10 + 5,
    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
    speedX: Math.random() * 3 - 1.5,
    speedY: Math.random() * 3 - 1.5,
  };
}

function updateParticles() {
  particles = particles.filter(p => p.size > 0.1);
  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;
    p.size *= 0.95;
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

function animate() {
  updateParticles();
  drawParticles();
  requestAnimationFrame(animate);
}

animate();

gyattus.addEventListener('click', () => {
  score++;
  scoreEl.textContent = `Gyattus Level: ${score}`;
  
  gsap.to(gyattus, {
    scale: 1.2,
    duration: 0.1,
    yoyo: true,
    repeat: 1
  });
  
  const rect = gyattus.getBoundingClientRect();
  const x = rect.left + rect.width / 2;
  const y = rect.top + rect.height / 2;
  
  for (let i = 0; i < 20; i++) {
    particles.push(createParticle(x, y));
  }
  
  if (score % 10 === 0) {
    gsap.to(document.body, {
      backgroundColor: `hsl(${Math.random() * 360}, 100%, 50%)`,
      duration: 0.5
    });
  }
});

setInterval(() => {
  const randomAngle = Math.random() * Math.PI * 2;
  const distance = 5;
  gsap.to(gyattus, {
    x: Math.cos(randomAngle) * distance,
    y: Math.sin(randomAngle) * distance,
    duration: 0.3,
    ease: 'power2.out'
  });
}, 300);
</script>
</body></html>
