<html><head><base href="https://websim.example.com/ultimate-clicker-extravaganza/">
<title>🌟 ULTIMATE COOKIE CLICKER EXTRAVAGANZA 2.0 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Luckiest+Guy&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Permanent Marker', cursive;
  background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

#game-container {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#cookie {
  width: 300px;
  height: 300px;
  cursor: pointer;
  transition: transform 0.1s;
  filter: drop-shadow(0 0 20px gold);
}

#cookie:active {
  transform: scale(0.95);
}

#stats {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 24px;
  color: #fff;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

#upgrades {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 20px;
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

.upgrade-btn {
  font-family: 'Luckiest Guy', cursive;
  font-size: 18px;
  padding: 15px 30px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(45deg, #ff00ff, #00ffff);
  color: #fff;
  cursor: pointer;
  transition: all 0.3s;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.upgrade-btn:hover {
  transform: scale(1.1) rotate(-5deg);
  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

.upgrade-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

h1 {
  font-family: 'Bungee Shade', cursive;
  font-size: 48px;
  color: #fff;
  text-shadow: 4px 4px 8px rgba(0,0,0,0.5);
  margin-bottom: 30px;
  animation: titlePulse 2s infinite;
}

@keyframes titlePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: -1;
}

.powerup {
  position: absolute;
  font-size: 40px;
  pointer-events: none;
  animation: floatUp 3s forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100px); opacity: 0; }
}

#rainbow-trail {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
}

#achievements {
  position: absolute;
  left: 20px;
  bottom: 20px;
  font-size: 18px;
  color: #fff;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

.achievement {
  background: rgba(255,255,255,0.2);
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  transition: all 0.3s;
}

.achievement.unlocked {
  background: rgba(255,255,255,0.4);
  transform: scale(1.05);
}

#cookie-rain {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1000;
}

</style>
</head>
<body>
<div id="game-container">
  <h1>🍪 ULTIMATE COOKIE CLICKER 2.0 🍪</h1>
  <svg id="cookie" viewBox="0 0 200 200">
    <circle cx="100" cy="100" r="95" fill="#D2691E" />
    <circle cx="70" cy="70" r="10" fill="#8B4513" />
    <circle cx="130" cy="80" r="10" fill="#8B4513" />
    <circle cx="90" cy="120" r="10" fill="#8B4513" />
    <circle cx="50" cy="100" r="10" fill="#8B4513" />
    <circle cx="150" cy="110" r="10" fill="#8B4513" />
  </svg>
  <div id="stats">
    <p>Cookies: <span id="cookie-count">0</span></p>
    <p>CPS: <span id="cps">0</span></p>
  </div>
  <div id="upgrades">
    <button class="upgrade-btn" id="double-click">Double Click Power</button>
    <button class="upgrade-btn" id="auto-clicker">Auto Clicker</button>
    <button class="upgrade-btn" id="cookie-storm">Cookie Storm</button>
    <button class="upgrade-btn" id="golden-cookie">Golden Cookie Chance</button>
    <button class="upgrade-btn" id="cookie-factory">Cookie Factory</button>
    <button class="upgrade-btn" id="cookie-planet">Cookie Planet</button>
    <button class="upgrade-btn" id="cookie-galaxy">Cookie Galaxy</button>
    <button class="upgrade-btn" id="cookie-multiverse">Cookie Multiverse</button>
  </div>
  <div id="achievements">
    <h3>Achievements</h3>
    <div class="achievement" id="achievement-1">🥉 Cookie Novice</div>
    <div class="achievement" id="achievement-2">🥈 Cookie Apprentice</div>
    <div class="achievement" id="achievement-3">🥇 Cookie Master</div>
    <div class="achievement" id="achievement-4">👑 Cookie God</div>
  </div>
</div>
<canvas id="particles"></canvas>
<canvas id="rainbow-trail"></canvas>
<div id="cookie-rain"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
<script>
let cookies = 0;
let cps = 0;
let clickPower = 1;
let autoClickerInterval;
let cookieStormInterval;
let goldenCookieChance = 0.01;
let factoryPower = 0;
let planetPower = 0;
let galaxyPower = 0;
let multiversePower = 0;

const cookieCount = document.getElementById('cookie-count');
const cpsDisplay = document.getElementById('cps');
const cookieElem = document.getElementById('cookie');
const upgradeButtons = {
  doubleClick: document.getElementById('double-click'),
  autoClicker: document.getElementById('auto-clicker'),
  cookieStorm: document.getElementById('cookie-storm'),
  goldenCookie: document.getElementById('golden-cookie'),
  cookieFactory: document.getElementById('cookie-factory'),
  cookiePlanet: document.getElementById('cookie-planet'),
  cookieGalaxy: document.getElementById('cookie-galaxy'),
  cookieMultiverse: document.getElementById('cookie-multiverse')
};

const upgradeCosts = {
  doubleClick: 100,
  autoClicker: 200,
  cookieStorm: 500,
  goldenCookie: 1000,
  cookieFactory: 5000,
  cookiePlanet: 50000,
  cookieGalaxy: 500000,
  cookieMultiverse: 5000000
};

cookieElem.addEventListener('click', () => {
  cookies += clickPower;
  updateDisplay();
  createFloatingText('+' + clickPower, event.clientX, event.clientY);
  spawnParticles(event.clientX, event.clientY);
  playClickSound();
  checkAchievements();
});

Object.keys(upgradeButtons).forEach(upgrade => {
  upgradeButtons[upgrade].addEventListener('click', () => buyUpgrade(upgrade));
});

function buyUpgrade(upgrade) {
  if (cookies >= upgradeCosts[upgrade]) {
    cookies -= upgradeCosts[upgrade];
    upgradeCosts[upgrade] *= 2;
    updateDisplay();

    switch (upgrade) {
      case 'doubleClick':
        clickPower *= 2;
        break;
      case 'autoClicker':
        cps += 1;
        if (!autoClickerInterval) {
          autoClickerInterval = setInterval(() => {
            cookies += cps;
            updateDisplay();
          }, 1000);
        }
        break;
      case 'cookieStorm':
        if (!cookieStormInterval) {
          cookieStormInterval = setInterval(spawnCookieStorm, 100);
          setTimeout(() => {
            clearInterval(cookieStormInterval);
            cookieStormInterval = null;
          }, 5000);
        }
        break;
      case 'goldenCookie':
        goldenCookieChance += 0.01;
        break;
      case 'cookieFactory':
        factoryPower += 10;
        cps += 10;
        break;
      case 'cookiePlanet':
        planetPower += 100;
        cps += 100;
        break;
      case 'cookieGalaxy':
        galaxyPower += 1000;
        cps += 1000;
        break;
      case 'cookieMultiverse':
        multiversePower += 10000;
        cps += 10000;
        break;
    }

    upgradeButtons[upgrade].textContent = `${upgrade} (Cost: ${upgradeCosts[upgrade]})`;
    createPowerup('💪', event.clientX, event.clientY);
  }
}

function updateDisplay() {
  cookieCount.textContent = Math.floor(cookies);
  cpsDisplay.textContent = cps;
  
  Object.keys(upgradeButtons).forEach(upgrade => {
    upgradeButtons[upgrade].disabled = cookies < upgradeCosts[upgrade];
  });
}

function createFloatingText(text, x, y) {
  const floatingText = document.createElement('div');
  floatingText.textContent = text;
  floatingText.style.position = 'fixed';
  floatingText.style.left = x + 'px';
  floatingText.style.top = y + 'px';
  floatingText.style.fontSize = '24px';
  floatingText.style.color = '#FFD700';
  floatingText.style.pointerEvents = 'none';
  document.body.appendChild(floatingText);

  gsap.to(floatingText, {
    y: '-=50',
    opacity: 0,
    duration: 1,
    onComplete: () => floatingText.remove()
  });
}

function createPowerup(emoji, x, y) {
  const powerup = document.createElement('div');
  powerup.textContent = emoji;
  powerup.className = 'powerup';
  powerup.style.left = x + 'px';
  powerup.style.top = y + 'px';
  document.body.appendChild(powerup);

  setTimeout(() => powerup.remove(), 3000);
}

// Particle system
const particlesCanvas = document.getElementById('particles');
const particlesCtx = particlesCanvas.getContext('2d');
const particles = [];

function resizeCanvas() {
  particlesCanvas.width = window.innerWidth;
  particlesCanvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function spawnParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x: x,
      y: y,
      vx: Math.random() * 4 - 2,
      vy: Math.random() * -5 - 2,
      radius: Math.random() * 3 + 1,
      color: `hsl(${Math.random() * 360}, 100%, 50%)`,
      alpha: 1
    });
  }
}

function updateParticles() {
  particlesCtx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.alpha -= 0.02;

    particlesCtx.beginPath();
    particlesCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    particlesCtx.fillStyle = p.color;
    particlesCtx.globalAlpha = p.alpha;
    particlesCtx.fill();

    if (p.alpha <= 0) {
      particles.splice(i, 1);
    }
  }

  requestAnimationFrame(updateParticles);
}

updateParticles();

// Rainbow trail
const rainbowCanvas = document.getElementById('rainbow-trail');
const rainbowCtx = rainbowCanvas.getContext('2d');
const trail = [];

function resizeRainbowCanvas() {
  rainbowCanvas.width = window.innerWidth;
  rainbowCanvas.height = window.innerHeight;
}

resizeRainbowCanvas();
window.addEventListener('resize', resizeRainbowCanvas);

document.addEventListener('mousemove', (e) => {
  trail.push({ x: e.clientX, y: e.clientY });
  if (trail.length > 50) trail.shift();
});

function drawRainbowTrail() {
  rainbowCtx.clearRect(0, 0, rainbowCanvas.width, rainbowCanvas.height);

  for (let i = 0; i < trail.length - 1; i++) {
    const p1 = trail[i];
    const p2 = trail[i + 1];
    
    rainbowCtx.beginPath();
    rainbowCtx.moveTo(p1.x, p1.y);
    rainbowCtx.lineTo(p2.x, p2.y);
    rainbowCtx.strokeStyle = `hsl(${(i * 10) % 360}, 100%, 50%)`;
    rainbowCtx.lineWidth = (i / trail.length) * 10;
    rainbowCtx.stroke();
  }

  requestAnimationFrame(drawRainbowTrail);
}

drawRainbowTrail();

// Cookie storm
function spawnCookieStorm() {
  const stormCookie = document.createElement('div');
  stormCookie.style.position = 'fixed';
  stormCookie.style.left = Math.random() * window.innerWidth + 'px';
  stormCookie.style.top = '-50px';
  stormCookie.style.fontSize = '30px';
  stormCookie.textContent = '🍪';
  stormCookie.style.pointerEvents = 'none';
  document.body.appendChild(stormCookie);

  gsap.to(stormCookie, {
    y: window.innerHeight + 100,
    rotation: Math.random() * 360,
    duration: 2 + Math.random() * 2,
    ease: 'none',
    onComplete: () => {
      stormCookie.remove();
      cookies += clickPower;
      updateDisplay();
    }
  });
}

// Click sound
function playClickSound() {
  const audio = new Audio('https://websim.example.com/ultimate-clicker-extravaganza/click.mp3');
  audio.volume = 0.2;
  audio.play();
}

// Cookie animations
gsap.to(cookieElem, {
  rotation: 360,
  duration: 20,
  repeat: -1,
  ease: 'none'
});

gsap.to(cookieElem, {
  scale: 1.1,
  duration: 0.5,
  yoyo: true,
  repeat: -1
});

// Button animations
const buttons = document.querySelectorAll('.upgrade-btn');
buttons.forEach(btn => {
  btn.addEventListener('mouseenter', () => {
    gsap.to(btn, { scale: 1.1, duration: 0.3 });
  });
  btn.addEventListener('mouseleave', () => {
    gsap.to(btn, { scale: 1, duration: 0.3 });
  });
});

// Easter egg
let konami = [];
const konamiCode = [38, 38, 40, 40, 37, 39, 37, 39, 66, 65];
document.addEventListener('keydown', (e) => {
  konami.push(e.keyCode);
  konami = konami.slice(-10);
  if (konami.join(',') === konamiCode.join(',')) {
    activateSecretMode();
  }
});

function activateSecretMode() {
  document.body.style.background = 'url(https://websim.example.com/ultimate-clicker-extravaganza/rainbow-unicorn.gif)';
  cookieElem.style.filter = 'hue-rotate(360deg) saturate(1000%)';
  alert('🦄✨ SECRET UNICORN MODE ACTIVATED! ✨🦄');
}

// Golden Cookie
setInterval(() => {
  if (Math.random() < goldenCookieChance) {
    spawnGoldenCookie();
  }
}, 10000);

function spawnGoldenCookie() {
  const goldenCookie = document.createElement('div');
  goldenCookie.textContent = '🍪';
  goldenCookie.style.position = 'fixed';
  goldenCookie.style.fontSize = '50px';
  goldenCookie.style.left = Math.random() * (window.innerWidth - 50) + 'px';
  goldenCookie.style.top = Math.random() * (window.innerHeight - 50) + 'px';
  goldenCookie.style.cursor = 'pointer';
  goldenCookie.style.filter = 'hue-rotate(45deg) brightness(1.5)';
  document.body.appendChild(goldenCookie);

  goldenCookie.addEventListener('click', () => {
    cookies += Math.floor(cookies * 0.1);
    updateDisplay();
    goldenCookie.remove();
    createFloatingText('Golden Cookie! +10%', goldenCookie.offsetLeft, goldenCookie.offsetTop);
  });

  setTimeout(() => goldenCookie.remove(), 5000);
}

// Achievements
const achievements = [
  { id: 'achievement-1', name: 'Cookie Novice', requirement: 100 },
  { id: 'achievement-2', name: 'Cookie Apprentice', requirement: 1000 },
  { id: 'achievement-3', name: 'Cookie Master', requirement: 10000 },
  { id: 'achievement-4', name: 'Cookie God', requirement: 1000000 }
];

function checkAchievements() {
  achievements.forEach(achievement => {
    if (cookies >= achievement.requirement) {
      const achievementElem = document.getElementById(achievement.id);
      if (!achievementElem.classList.contains('unlocked')) {
        achievementElem.classList.add('unlocked');
        createFloatingText(`Achievement Unlocked: ${achievement.name}!`, window.innerWidth / 2, window.innerHeight / 2);
      }
    }
  });
}

// Cookie Rain
function startCookieRain() {
  const rainContainer = document.getElementById('cookie-rain');
  for (let i = 0; i < 50; i++) {
    const raindrop = document.createElement('div');
    raindrop.textContent = '🍪';
    raindrop.style.position = 'absolute';
    raindrop.style.left = `${Math.random() * 100}%`;
    raindrop.style.animationDuration = `${Math.random() * 2 + 1}s`;
    raindrop.style.opacity = Math.random();
    raindrop.style.fontSize = `${Math.random() * 20 + 10}px`;
    raindrop.style.animation = `fall ${Math.random() * 5 + 5}s linear infinite`;
    rainContainer.appendChild(raindrop);
  }
}

// CSS for Cookie Rain animation
const style = document.createElement('style');
style.textContent = `
  @keyframes fall {
    0% { transform: translateY(-100px); }
    100% { transform: translateY(100vh); }
  }
`;
document.head.appendChild(style);

startCookieRain();

// Auto-save and load game
function saveGame() {
  const gameState = {
    cookies,
    cps,
    clickPower,
    goldenCookieChance,
    factoryPower,
    planetPower,
    galaxyPower,
    multiversePower,
    upgradeCosts
  };
  localStorage.setItem('cookieClickerSave', JSON.stringify(gameState));
}

function loadGame() {
  const savedGame = localStorage.getItem('cookieClickerSave');
  if (savedGame) {
    const gameState = JSON.parse(savedGame);
    cookies = gameState.cookies;
    cps = gameState.cps;
    clickPower = gameState.clickPower;
    goldenCookieChance = gameState.goldenCookieChance;
    factoryPower = gameState.factoryPower;
    planetPower = gameState.planetPower;
    galaxyPower = gameState.galaxyPower;
    multiversePower = gameState.multiversePower;
    upgradeCosts = gameState.upgradeCosts;
    updateDisplay();
    checkAchievements();
  }
}

setInterval(saveGame, 60000); // Auto-save every minute
loadGame(); // Load game on start

// Initialize game loop
function gameLoop() {
  cookies += cps / 60; // Divide CPS by 60 for smoother increments
  updateDisplay();
  checkAchievements();
  requestAnimationFrame(gameLoop);
}

gameLoop();

</script>
</body>
</html>
