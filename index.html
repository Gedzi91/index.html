<html><head><base href="." /><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Numerical Library of Babel</title>
<style>
  body {
    font-family: 'Courier New', monospace;
    background: #1a1a1a;
    color: #00ff00;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .library-container {
    max-width: 800px;
    width: 100%;
    background: #000;
    border: 1px solid #00ff00;
    padding: 20px;
    border-radius: 5px;
    box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
    position: relative;
    min-height: 400px; /* Added min-height to keep container size consistent */
  }

  .number-display {
    font-size: 24px;
    text-align: center;
    margin: 20px 0;
    letter-spacing: 2px;
    font-weight: bold;
    word-wrap: break-word;
    font-variant-numeric: tabular-nums;
    padding: 0 60px;
    margin-left: 60px;
  }

  @media (min-width: 768px) {
    .number-display[data-digits="20"] { font-size: 20px; }
    .number-display[data-digits="50"] { font-size: 16px; }
    .number-display[data-digits="100"] { font-size: 14px; }
    .number-display[data-digits="200"] { font-size: 12px; }
    .number-display[data-digits="500"] { font-size: 10px; }
  }

  @media (max-width: 767px) {
    .number-display[data-digits="20"] { font-size: 16px; }
    .number-display[data-digits="50"] { font-size: 14px; }
    .number-display[data-digits="100"] { font-size: 12px; }
    .number-display[data-digits="200"] { font-size: 10px; }
    .number-display[data-digits="500"] { font-size: 8px; }
  }

  .controls {
    display: grid;
    grid-template-columns: auto auto auto;
    gap: 10px;
    margin: 20px 0;
    justify-content: space-between;
    margin-left: 60px;
  }

  .nav-buttons {
    position: absolute;
    left: 20px;
    top: 200px; /* Fixed position from top */
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .nav-button {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    padding: 0;
  }

  .other-buttons {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  button, select {
    background: #003300;
    color: #00ff00;
    border: 1px solid #00ff00;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.3s;
  }

  button:hover, select:hover {
    background: #004400;
    box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
  }

  .info {
    text-align: center;
    margin: 20px 0;
    margin-left: 60px;
  }

  .settings {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 20px 0;
    margin-left: 60px;
  }

  .checkbox-container {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  input[type="checkbox"] {
    accent-color: #00ff00;
  }

  #totalNumbers {
    display: inline-block;
    word-break: break-word;
    max-width: 200px;
  }

  h1 {
    text-align: center;
    margin-left: 60px;
  }
</style>
</head>
<body>
  <div class="library-container">
    <div class="nav-buttons">
      <button onclick="generateNext()" class="nav-button">^</button>
      <button onclick="generatePrevious()" class="nav-button">v</button>
    </div>
    
    <h1>The Numerical Library of Babel</h1>
    <div class="settings">
      <select id="digitCount" onchange="updateDigits()">
        <option value="5">5 digits</option>
        <option value="10" selected>10 digits</option>
        <option value="20">20 digits</option>
        <option value="50">50 digits</option>
        <option value="100">100 digits</option>
        <option value="200">200 digits</option>
        <option value="500">500 digits</option>
      </select>
      <div class="checkbox-container">
        <input type="checkbox" id="includeNegatives" onchange="updateDigits()">
        <label for="includeNegatives">Include negatives</label>
      </div>
    </div>
    <div class="number-display" id="currentNumber" data-digits="10">0000000000</div>
    <div class="controls">
      <div></div>
      <div></div>
      <div class="other-buttons">
        <button onclick="generateRandom()">Random Number</button>
        <button onclick="searchNumber()">Search Number</button>
      </div>
    </div>
    <div class="info">
      <p>Every possible <span id="digitCountDisplay">10</span>-digit number exists in this library.</p>
      <p>Total possible numbers: <span id="totalNumbers">10,000,000,000</span></p>
    </div>
  </div>

<script>
let currentPosition = BigInt(0);
let digitCount = 10;
let includeNegatives = false;

function getMaxNumber() {
  return BigInt("9".repeat(digitCount));
}

function getMinNumber() {
  return includeNegatives ? -getMaxNumber() : BigInt(0);
}

function formatNumber(num) {
  const absNum = (num < 0n ? -num : num).toString().padStart(digitCount, '0');
  return num < 0n ? '-' + absNum : absNum;
}

function updateDigits() {
  digitCount = parseInt(document.getElementById('digitCount').value);
  includeNegatives = document.getElementById('includeNegatives').checked;
  currentPosition = BigInt(0);
  document.getElementById('currentNumber').setAttribute('data-digits', digitCount);
  updateDisplay();
  updateInfo();
}

function updateInfo() {
  document.getElementById('digitCountDisplay').textContent = digitCount;
  const total = includeNegatives ? 
    (2n * (getMaxNumber() + 1n)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',') : 
    (getMaxNumber() + 1n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  document.getElementById('totalNumbers').textContent = total;
}

function generateRandom() {
  const min = getMinNumber();
  const max = getMaxNumber();
  const range = max - min + 1n;
  const bits = range.toString(2).length;
  let result;
  
  do {
    result = BigInt(0);
    for (let i = 0; i < bits; i++) {
      result = result * 2n + BigInt(Math.random() < 0.5 ? 0 : 1);
    }
  } while (result >= range);
  
  currentPosition = min + result;
  updateDisplay();
}

function generateNext() {
  currentPosition = currentPosition >= getMaxNumber() ? getMinNumber() : currentPosition + 1n;
  updateDisplay();
}

function generatePrevious() {
  currentPosition = currentPosition <= getMinNumber() ? getMaxNumber() : currentPosition - 1n;
  updateDisplay();
}

function searchNumber() {
  const maxLength = includeNegatives ? digitCount + 1 : digitCount;
  const regex = includeNegatives ? new RegExp(`^-?\\d{1,${digitCount}}$`) : new RegExp(`^\\d{1,${digitCount}}$`);
  const input = prompt(`Enter a number (up to ${digitCount} digits${includeNegatives ? ', can be negative' : ''}):`);
  
  if (input && regex.test(input)) {
    const num = BigInt(input);
    if (num >= getMinNumber() && num <= getMaxNumber()) {
      currentPosition = num;
      updateDisplay();
    } else {
      alert(`Number must be between ${getMinNumber().toString()} and ${getMaxNumber().toString()}`);
    }
  } else {
    alert(`Please enter a valid number (up to ${digitCount} digits${includeNegatives ? ', can be negative' : ''})`);
  }
}

function updateDisplay() {
  const numberDisplay = document.getElementById('currentNumber');
  numberDisplay.textContent = formatNumber(currentPosition);
}

updateDisplay();
updateInfo();
</script>
</body></html>
