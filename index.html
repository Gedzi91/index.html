<html><head><base href="https://WW3.wars.io/world%20map/if%20you%20click%20a%20country%20then%20click%20a%20other%20country%20than%20it%20will%20go%20to%20war%20if%20you%20after%20select%20start%20war%20but%20this%20time%20unions%20cans%20happened%20if%20you%20click%20more%20then%201%20countrys%20that%20could%20name%20there%20country%20but%20not%20you%20and%20the%20can%20name%20there%20unions%20what%20ever%20they%20want%20but%20not%20there%20name%20and%20you%20can't%20name%20there%20union%20the%20countrys%20want%20to%20make%20a%20Union%20without%20there%20name%20and%20now%20you%20can%20start%20civil%20wars%20that%20makes%20a%20random%20part%20of%20a%20country%20independent%20if%20you%20click%20on%20them%20and%20the%20unions%20can%20act%20as%20countrys%20like%20if%20you%20click%20the%20member%20of%20the%20union%20then%20the%20other%20members%20Will%20be%20selected%20as%20well%20as%20the%20independent%20places%20which%20can%20have%20borders%20and%20can%20have%20every%20name%20possible%20for%20a%20independent%20place%20which%20could%20have%20a%20chance%20to%20be%20half%20the%20land%20mass%20as%20the%20country%20it's%20getting%20a%20rebellion%20from%20as%20well%20as%20acting%20like%20a%20country%20and%20there's%20a%20botton%20that%20let's%20you%20see%20what%20countrys%20Said%20while%20you%20are%20doing%20stuff%20and%20independent%20places%20can%20be%20selected%20and%20if%20you%20start%20a%20civil%20war%20in%20the%20USA%20then%20a%20random%20us%20state%20Will%20try%20to%20get%20under%20independence%20which%20have%20100%20out%20of%2050%20chances%20to%20actually%20Gain%20independence">
<title>World War III Simulator - Advanced Geopolitical Edition with US States</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/topojson.v3.min.js"></script>
<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background-color: #111;
    color: #fff;
  }
  #map-container {
    width: 100%;
    height: 100%;
  }
  .country, .state {
    stroke: #444;
    stroke-width: 0.5;
    transition: fill 0.3s, stroke 0.3s;
  }
  .country:hover, .state:hover {
    stroke: #fff;
    stroke-width: 1;
  }
  .selected {
    stroke: #ff0;
    stroke-width: 2;
  }
  .at-war {
    fill: #f00 !important;
  }
  .in-union {
    fill: #0f0 !important;
  }
  .in-civil-war {
    fill: #f0f !important;
  }
  .independent {
    fill: #00f !important;
  }
  #info-panel {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    padding: 10px;
    border-radius: 5px;
  }
  #event-log {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    padding: 10px;
    border-radius: 5px;
    max-height: 200px;
    overflow-y: auto;
    width: 300px;
  }
  #controls {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.7);
    padding: 10px;
    border-radius: 5px;
  }
  #dialogue-panel {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.7);
    padding: 10px;
    border-radius: 5px;
    max-height: 200px;
    overflow-y: auto;
    width: 300px;
    display: none;
  }
  button {
    background: #444;
    color: #fff;
    border: none;
    padding: 5px 10px;
    margin: 5px;
    cursor: pointer;
    transition: background 0.3s;
  }
  button:hover {
    background: #666;
  }
</style>
</head>
<body>
<div id="map-container"></div>
<div id="info-panel">
  <h2>World War III Simulator</h2>
  <p>Click on countries or states to select them.</p>
  <p>Use the buttons to start wars, form unions, or trigger civil wars.</p>
  <p>Active Wars: <span id="war-count">0</span></p>
  <p>Unions: <span id="union-count">0</span></p>
  <p>Civil Wars: <span id="civil-war-count">0</span></p>
  <p>Independent Regions: <span id="independent-count">0</span></p>
</div>
<div id="event-log">
  <h3>Event Log</h3>
  <ul id="log-list"></ul>
</div>
<div id="controls">
  <button id="clear-selection">Clear Selection</button>
  <button id="start-war">Start War</button>
  <button id="form-union">Form Union</button>
  <button id="start-civil-war">Start Civil War</button>
  <button id="toggle-dialogue">Toggle Country Dialogue</button>
</div>
<div id="dialogue-panel">
  <h3>Country Dialogue</h3>
  <ul id="dialogue-list"></ul>
</div>

<script>
const width = window.innerWidth;
const height = window.innerHeight;
let wars = [];
let unions = [];
let civilWars = [];
let independentRegions = [];
let selectedEntities = [];
let countries;
let usStates;
let countryDialogue = [];

const svg = d3.select("#map-container")
  .append("svg")
  .attr("width", width)
  .attr("height", height);

const projection = d3.geoMercator()
  .scale(width / 2 / Math.PI)
  .translate([width / 2, height / 2]);

const path = d3.geoPath().projection(projection);

const g = svg.append("g");

const colorScale = d3.scaleOrdinal(d3.schemeCategory10);

Promise.all([
  d3.json("https://unpkg.com/world-atlas@2.0.2/countries-110m.json"),
  d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json")
]).then(function([world, us]) {
  countries = topojson.feature(world, world.objects.countries).features;
  usStates = topojson.feature(us, us.objects.states).features;
  
  g.selectAll("path.country")
    .data(countries)
    .enter().append("path")
    .attr("d", path)
    .attr("class", "country")
    .attr("fill", (d, i) => colorScale(i))
    .on("click", handleEntityClick);
  
  g.selectAll("path.state")
    .data(usStates)
    .enter().append("path")
    .attr("d", path)
    .attr("class", "state")
    .attr("fill", (d, i) => colorScale(i + countries.length))
    .on("click", handleEntityClick);

  updateMap();
});

function handleEntityClick(event, d) {
  const entityName = d.properties.name;
  
  if (selectedEntities.includes(entityName)) {
    selectedEntities = selectedEntities.filter(e => e !== entityName);
  } else {
    selectedEntities.push(entityName);
    
    // Check if the clicked entity is part of a union
    const union = unions.find(u => u.countries.includes(entityName));
    if (union) {
      // Select all entities in the union
      union.countries.forEach(e => {
        if (!selectedEntities.includes(e)) {
          selectedEntities.push(e);
        }
      });
    }
    
    // Check if the clicked entity has independent regions
    const independentRegion = independentRegions.find(ir => ir.originalCountry === entityName);
    if (independentRegion) {
      if (!selectedEntities.includes(independentRegion.name)) {
        selectedEntities.push(independentRegion.name);
      }
    }
  }

  updateMap();
  addCountryDialogue(entityName, `${entityName} has been ${selectedEntities.includes(entityName) ? 'selected' : 'deselected'}.`);
}

function startWar() {
  if (selectedEntities.length === 2) {
    wars.push({countries: [...selectedEntities], intensity: 1});
    updateEventLog(`${selectedEntities[0]} and ${selectedEntities[1]} have gone to war!`);
    addCountryDialogue(selectedEntities[0], `We declare war on ${selectedEntities[1]}!`);
    addCountryDialogue(selectedEntities[1], `We will defend ourselves against ${selectedEntities[0]}!`);
    selectedEntities = [];
    updateMap();
  } else {
    alert("Please select exactly two entities to start a war.");
  }
}

function formUnion() {
  if (selectedEntities.length > 1) {
    const unionName = generateRandomUnionName(selectedEntities);
    unions.push({countries: [...selectedEntities], name: unionName});
    updateEventLog(`A new union called "${unionName}" has been formed between ${selectedEntities.join(', ')}!`);
    selectedEntities.forEach(entity => {
      addCountryDialogue(entity, `We are proud to join the ${unionName}!`);
    });
    selectedEntities = [];
    updateMap();
  } else {
    alert("Please select at least two entities to form a union.");
  }
}

function startCivilWar() {
  if (selectedEntities.length === 1) {
    const entity = selectedEntities[0];
    if (entity === "United States of America") {
      startUSStateCivilWar();
    } else {
      const newStateName = generateRandomStateName(entity);
      const landMassPercentage = Math.random() < 0.5 ? 0.5 : Math.random() * 0.4 + 0.1; // 50% chance of being half, otherwise 10-50%
      civilWars.push({originalCountry: entity, newCountry: newStateName, landMassPercentage: landMassPercentage});
      updateEventLog(`Civil war has broken out in ${entity}! ${newStateName} is fighting for independence, claiming ${Math.round(landMassPercentage * 100)}% of the land mass.`);
      addCountryDialogue(entity, `We face internal strife as ${newStateName} seeks independence!`);
      addCountryDialogue(newStateName, `We demand our freedom from ${entity}!`);
    }
    selectedEntities = [];
    updateMap();
  } else {
    alert("Please select exactly one entity to start a civil war.");
  }
}

function startUSStateCivilWar() {
  const randomState = usStates[Math.floor(Math.random() * usStates.length)].properties.name;
  const successChance = 100 / 50; // 100 out of 50 chances (200% chance)
  
  if (Math.random() < successChance) {
    independentRegions.push({name: randomState, originalCountry: "United States of America", landMassPercentage: 1/50});
    updateEventLog(`Civil war in the USA! ${randomState} has successfully gained independence!`);
    addCountryDialogue("United States of America", `We're facing a crisis as ${randomState} declares independence!`);
    addCountryDialogue(randomState, `We, the people of ${randomState}, declare our independence from the United States!`);
  } else {
    updateEventLog(`Civil war attempt in the USA! ${randomState} tried to gain independence but failed.`);
    addCountryDialogue("United States of America", `We've successfully suppressed the rebellion in ${randomState}.`);
    addCountryDialogue(randomState, `Our bid for independence has been thwarted, but our spirit remains unbroken!`);
  }
}

function updateMap() {
  g.selectAll(".country, .state")
    .classed("selected", d => selectedEntities.includes(d.properties.name))
    .classed("at-war", d => wars.some(war => war.countries.includes(d.properties.name)))
    .classed("in-union", d => unions.some(union => union.countries.includes(d.properties.name)))
    .classed("in-civil-war", d => civilWars.some(cw => cw.originalCountry === d.properties.name))
    .classed("independent", d => independentRegions.some(ir => ir.name === d.properties.name));

  document.getElementById("war-count").textContent = wars.length;
  document.getElementById("union-count").textContent = unions.length;
  document.getElementById("civil-war-count").textContent = civilWars.length;
  document.getElementById("independent-count").textContent = independentRegions.length;
}

function updateEventLog(message) {
  const logList = document.getElementById("log-list");
  const logItem = document.createElement("li");
  logItem.textContent = message;
  logList.appendChild(logItem);
  logList.scrollTop = logList.scrollHeight;
}

function addCountryDialogue(entity, message) {
  countryDialogue.push({entity, message, timestamp: new Date()});
  updateDialoguePanel();
}

function updateDialoguePanel() {
  const dialogueList = document.getElementById("dialogue-list");
  dialogueList.innerHTML = "";
  countryDialogue.slice(-10).forEach(dialogue => {
    const dialogueItem = document.createElement("li");
    dialogueItem.textContent = `[${dialogue.timestamp.toLocaleTimeString()}] ${dialogue.entity}: ${dialogue.message}`;
    dialogueList.appendChild(dialogueItem);
  });
  dialogueList.scrollTop = dialogueList.scrollHeight;
}

function generateRandomStateName(entity) {
  const prefixes = ["New", "Free", "Independent", "Autonomous", "Sovereign", "Liberated", "Democratic", "People's", "Revolutionary"];
  const suffixes = ["Republic", "State", "Nation", "Land", "Territory", "Commonwealth", "Federation"];
  const randomPrefix = prefixes[Math.floor(Math.random() * prefixes.length)];
  const randomSuffix = suffixes[Math.floor(Math.random() * suffixes.length)];
  return `${randomPrefix} ${entity} ${randomSuffix}`;
}

function generateRandomUnionName(unionEntities) {
  const adjectives = ["United", "Allied", "Federated", "Cooperative", "Harmonious", "Integrated", "Unified"];
  const nouns = ["Alliance", "Union", "Federation", "Coalition", "League", "Confederation", "Commonwealth"];
  const randomAdjective = adjectives[Math.floor(Math.random() * adjectives.length)];
  const randomNoun = nouns[Math.floor(Math.random() * nouns.length)];
  return `${randomAdjective} ${randomNoun} of ${unionEntities.length} Entities`;
}

function simulateWorldEvents() {
  // Simulate war progress
  wars.forEach(war => {
    if (Math.random() < 0.1) {
      war.intensity++;
      updateEventLog(`The war between ${war.countries[0]} and ${war.countries[1]} has escalated to intensity level ${war.intensity}!`);
      addCountryDialogue(war.countries[0], `Our conflict with ${war.countries[1]} intensifies!`);
      addCountryDialogue(war.countries[1], `The war against ${war.countries[0]} grows more fierce!`);
    }
    
    if (war.intensity >= 10 || Math.random() < 0.05) {
      const winner = war.countries[Math.floor(Math.random() * 2)];
      const loser = war.countries.find(c => c !== winner);
      updateEventLog(`The war between ${war.countries[0]} and ${war.countries[1]} has ended. ${winner} is victorious!`);
      addCountryDialogue(winner, `We have emerged victorious in our war against ${loser}!`);
      addCountryDialogue(loser, `We concede defeat to ${winner} and seek peace.`);
      wars = wars.filter(w => w !== war);
    }
  });
  
  // Simulate civil war progress
  civilWars.forEach(cw => {
    if (Math.random() < 0.1) {
      if (Math.random() < 0.5) {
        updateEventLog(`${cw.newCountry} has gained independence from ${cw.originalCountry}, claiming ${Math.round(cw.landMassPercentage * 100)}% of the land mass!`);
        addCountryDialogue(cw.newCountry, `We have won our independence from ${cw.originalCountry}!`);
        addCountryDialogue(cw.originalCountry, `We have lost control of ${cw.newCountry}.`);
        independentRegions.push({name: cw.newCountry, originalCountry: cw.originalCountry, landMassPercentage: cw.landMassPercentage});
        countries.push({properties: {name: cw.newCountry}});
      } else {
        updateEventLog(`${cw.originalCountry} has suppressed the rebellion of ${cw.newCountry}.`);
        addCountryDialogue(cw.originalCountry, `We have successfully quelled the rebellion of ${cw.newCountry}.`);
      }
      civilWars = civilWars.filter(w => w !== cw);
    }
  });
  
  // Simulate random union formations
  if (Math.random() < 0.05 && countries.length > 2) {
    const unionEntities = [];
    const unionSize = Math.floor(Math.random() * 3) + 2; // 2 to 4 entities
    for (let i = 0; i < unionSize; i++) {
      const allEntities = [...countries, ...usStates, ...independentRegions];
      const randomEntity = allEntities[Math.floor(Math.random() * allEntities.length)];
      const entityName = randomEntity.properties ? randomEntity.properties.name : randomEntity.name;
      if (!unionEntities.includes(entityName)) {
        unionEntities.push(entityName);
      }
    }
    if (unionEntities.length > 1) {
      const unionName = generateRandomUnionName(unionEntities);
      unions.push({countries: unionEntities, name: unionName});
      updateEventLog(`A new union called "${unionName}" has spontaneously formed between ${unionEntities.join(', ')}!`);
      unionEntities.forEach(entity => {
        addCountryDialogue(entity, `We have joined the ${unionName} for mutual benefit and cooperation.`);
      });
    }
  }
  
  // Simulate independent regions acting like countries
  independentRegions.forEach(ir => {
    if (Math.random() < 0.1) {
      const action = Math.random();
      if (action < 0.3) {
        // Start a war
        const allEntities = [...countries, ...usStates, ...independentRegions];
        const targetEntity = allEntities[Math.floor(Math.random() * allEntities.length)];
        const targetName = targetEntity.properties ? targetEntity.properties.name : targetEntity.name;
        if (targetName !== ir.name) {
          wars.push({countries: [ir.name, targetName], intensity: 1});
          updateEventLog(`${ir.name} has declared war on ${targetName}!`);
          addCountryDialogue(ir.name, `We declare war on ${targetName} to assert our sovereignty!`);
          addCountryDialogue(targetName, `We face an unexpected aggression from ${ir.name}!`);
        }
      } else if (action < 0.6) {
        // Join a union
        const allEntities = [...countries, ...usStates, ...independentRegions];
        const availableEntities = allEntities.filter(e => {
          const name = e.properties ? e.properties.name : e.name;
          return name !== ir.name && !unions.some(u => u.countries.includes(name));
        });
        if (availableEntities.length > 0) {
          const partner = availableEntities[Math.floor(Math.random() * availableEntities.length)];
          const partnerName = partner.properties ? partner.properties.name : partner.name;
          const unionName = generateRandomUnionName([ir.name, partnerName]);
          unions.push({countries: [ir.name, partnerName], name: unionName});
          updateEventLog(`${ir.name} has formed a new union called "${unionName}" with ${partnerName}!`);
          addCountryDialogue(ir.name, `We have formed the ${unionName} with ${partnerName} for mutual prosperity.`);
          addCountryDialogue(partnerName, `We are excited to join forces with ${ir.name} in the ${unionName}.`);
        }
      } else {
        // Start its own civil war
        const newStateName = generateRandomStateName(ir.name);
        const landMassPercentage = Math.random() * 0.4 + 0.1; // 10-50% of the already independent region
        civilWars.push({originalCountry: ir.name, newCountry: newStateName, landMassPercentage: landMassPercentage});
        updateEventLog(`Civil war has broken out in ${ir.name}! ${newStateName} is fighting for further independence, claiming ${Math.round(landMassPercentage * 100)}% of ${ir.name}'s territory.`);
        addCountryDialogue(ir.name, `We face internal division as ${newStateName} seeks to break away!`);
        addCountryDialogue(newStateName, `We demand recognition as a separate entity from ${ir.name}!`);
      }
    }
  });
  
  updateMap();
}

setInterval(simulateWorldEvents, 5000);

// Zoom and pan functionality
const zoom = d3.zoom()
  .scaleExtent([1, 8])
  .on("zoom", zoomed);

svg.call(zoom);

function zoomed(event) {
  g.attr("transform", event.transform);
}

// Add event listeners for buttons
document.getElementById("clear-selection").addEventListener("click", () => {
  selectedEntities = [];
  updateMap();
});

document.getElementById("start-war").addEventListener("click", startWar);
document.getElementById("form-union").addEventListener("click", formUnion);
document.getElementById("start-civil-war").addEventListener("click", startCivilWar);
document.getElementById("toggle-dialogue").addEventListener("click", () => {
  const dialoguePanel = document.getElementById("dialogue-panel");
  dialoguePanel.style.display = dialoguePanel.style.display === "none" ? "block" : "none";
});

</script>
</body></html>
