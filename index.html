<html><head><base href="https://example.com/cosmic-visualizer">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cosmic Harmony Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            color: #fff;
        }
        #visualizer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
        }
        button, input[type="file"] {
            margin: 5px;
            padding: 10px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover, input[type="file"]:hover {
            background: #555;
        }
        #songInfo {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            font-size: 18px;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>
    <div id="visualizer">
        <canvas width="980" height="1811" style="display: block; width: 980px; height: 1811px;" w-tid="11"></canvas>
    </div>
    <div id="songInfo">Upload a song to begin your cosmic journey</div>
    <div id="controls">
        <input type="file" id="audioUpload" accept="audio/*">
        <button id="playPause">Play/Pause</button>
        <button id="toggleVR">Toggle VR Mode</button>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 980 / 1811, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('canvas'), antialias: true });
        renderer.setSize(980, 1811);

        // VR setup
        let vrMode = false;
        if ('xr' in navigator) {
            renderer.xr.enabled = true;
            document.getElementById('toggleVR').addEventListener('click', function() {
                if (vrMode) {
                    renderer.xr.getSession().end();
                    vrMode = false;
                } else {
                    navigator.xr.requestSession('immersive-vr').then((session) => {
                        renderer.xr.setSession(session);
                        vrMode = true;
                    });
                }
            });
        } else {
            document.getElementById('toggleVR').style.display = 'none';
        }

        // Starfield background
        const starGeometry = new THREE.BufferGeometry();
        const starMaterial = new THREE.PointsMaterial({
            color: 0xFFFFFF,
            size: 0.1,
            transparent: true
        });

        const starVertices = [];
        for (let i = 0; i < 15000; i++) {
            const x = (Math.random() - 0.5) * 2000;
            const y = (Math.random() - 0.5) * 2000;
            const z = (Math.random() - 0.5) * 2000;
            starVertices.push(x, y, z);
        }

        starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // Earth geometry
        const earthRadius = 5;
        const earthGeometry = new THREE.SphereGeometry(earthRadius, 64, 64);
        const earthMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                audioFrequency: { value: 0 },
                earthTexture: { value: new THREE.TextureLoader().load('https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg') },
                bumpTexture: { value: new THREE.TextureLoader().load('https://threejs.org/examples/textures/earth_bumpmap.jpg') },
                cloudTexture: { value: new THREE.TextureLoader().load('https://threejs.org/examples/textures/earth_clouds_2048.png') }
            },
            vertexShader: `
                uniform float time;
                uniform float audioFrequency;
                varying vec2 vUv;
                varying vec3 vNormal;
                void main() {
                    vUv = uv;
                    vNormal = normal;
                    vec3 newPosition = position + normal * sin(time * 2.0 + position.y) * audioFrequency * 0.1;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform float audioFrequency;
                uniform sampler2D earthTexture;
                uniform sampler2D bumpTexture;
                uniform sampler2D cloudTexture;
                varying vec2 vUv;
                varying vec3 vNormal;
                void main() {
                    vec4 earthColor = texture2D(earthTexture, vUv);
                    vec4 bumpColor = texture2D(bumpTexture, vUv);
                    vec4 cloudColor = texture2D(cloudTexture, vUv + vec2(time * 0.0001, 0.0));
                    
                    float elevation = bumpColor.r;
                    vec3 light = normalize(vec3(1.0, 1.0, 1.0));
                    float diffuse = max(0.0, dot(vNormal, light));
                    
                    vec3 finalColor = mix(earthColor.rgb, cloudColor.rgb, cloudColor.a * 0.5);
                    finalColor = mix(finalColor, vec3(0.0, 0.5, 1.0), audioFrequency * 0.5);
                    finalColor *= (diffuse * 0.8 + 0.2);
                    finalColor += vec3(1.0, 1.0, 1.0) * pow(max(0.0, dot(reflect(-light, vNormal), normalize(vNormal))), 10.0) * 0.5;
                    
                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `,
            transparent: true
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);

        // Holographic wireframe
        const wireframeGeometry = new THREE.SphereGeometry(earthRadius * 1.01, 32, 32);
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ffff,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const wireframe = new THREE.Mesh(wireframeGeometry, wireframeMaterial);
        scene.add(wireframe);

        // Cloud layer
        const cloudGeometry = new THREE.SphereGeometry(earthRadius * 1.02, 32, 32);
        const cloudMaterial = new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load('https://threejs.org/examples/textures/earth_clouds_2048.png'),
            transparent: true,
            opacity: 0.8
        });
        const cloudLayer = new THREE.Mesh(cloudGeometry, cloudMaterial);
        scene.add(cloudLayer);

        // Floating geometric shapes
        const geometries = [
            new THREE.TetrahedronGeometry(0.5),
            new THREE.BoxGeometry(0.5, 0.5, 0.5),
            new THREE.OctahedronGeometry(0.5),
            new THREE.DodecahedronGeometry(0.5),
            new THREE.IcosahedronGeometry(0.5)
        ];

        const floatingShapes = [];
        const floatingShapesCount = 50;

        for (let i = 0; i < floatingShapesCount; i++) {
            const geometry = geometries[Math.floor(Math.random() * geometries.length)];
            const material = new THREE.MeshPhongMaterial({
                color: Math.random() * 0xffffff,
                shininess: 100,
                transparent: true,
                opacity: 0.7
            });
            const shape = new THREE.Mesh(geometry, material);
            
            const radius = Math.random() * 20 + 10;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;
            
            shape.position.x = radius * Math.sin(phi) * Math.cos(theta);
            shape.position.y = radius * Math.sin(phi) * Math.sin(theta);
            shape.position.z = radius * Math.cos(phi);
            
            shape.rotation.x = Math.random() * Math.PI;
            shape.rotation.y = Math.random() * Math.PI;
            shape.rotation.z = Math.random() * Math.PI;
            
            floatingShapes.push(shape);
            scene.add(shape);
        }

        // Energy field
        const energyFieldGeometry = new THREE.SphereGeometry(earthRadius * 1.5, 32, 32);
        const energyFieldMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                audioFrequency: { value: 0 }
            },
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal = normal;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform float audioFrequency;
                varying vec3 vNormal;
                void main() {
                    vec3 color = vec3(0.0, 0.5, 1.0);
                    float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
                    intensity = intensity * (0.5 + 0.5 * sin(time * 5.0 + audioFrequency * 10.0));
                    gl_FragColor = vec4(color, intensity * audioFrequency);
                }
            `,
            side: THREE.BackSide,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const energyField = new THREE.Mesh(energyFieldGeometry, energyFieldMaterial);
        scene.add(energyField);

        // Audio-reactive rings
        const ringsGroup = new THREE.Group();
        scene.add(ringsGroup);

        const ringCount = 10;
        const rings = [];

        for (let i = 0; i < ringCount; i++) {
            const ringGeometry = new THREE.TorusGeometry(earthRadius * (1.5 + i * 0.2), 0.05, 16, 100);
            const ringMaterial = new THREE.MeshBasicMaterial({
                color: new THREE.Color().setHSL(i / ringCount, 1, 0.5),
                transparent: true,
                opacity: 0.5
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = Math.PI / 2;
            rings.push(ring);
            ringsGroup.add(ring);
        }

        // Particle system
        const particleCount = 1000;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i += 3) {
            const r = Math.random() * 30 + 10;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(Math.random() * 2 - 1);

            particlePositions[i] = r * Math.sin(phi) * Math.cos(theta);
            particlePositions[i + 1] = r * Math.sin(phi) * Math.sin(theta);
            particlePositions[i + 2] = r * Math.cos(phi);
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

        const particleMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.1,
            transparent: true,
            opacity: 0.7,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particleSystem);

        camera.position.z = 15;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        let audioContext, analyser, source;
        let isPlaying = false;

        document.getElementById('audioUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                audioContext.decodeAudioData(arrayBuffer, function(buffer) {
                    if (source) {
                        source.disconnect();
                    }
                    source = audioContext.createBufferSource();
                    source.buffer = buffer;

                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;

                    source.connect(analyser);
                    analyser.connect(audioContext.destination);

                    source.start(0);
                    isPlaying = true;

                    document.getElementById('songInfo').textContent = `Now playing: ${file.name}`;
                });
            };

            reader.readAsArrayBuffer(file);
        });

        document.getElementById('playPause').addEventListener('click', function() {
            if (audioContext) {
                if (isPlaying) {
                    audioContext.suspend();
                    isPlaying = false;
                } else {
                    audioContext.resume();
                    isPlaying = true;
                }
            }
        });

        function animate(time) {
            if (vrMode) {
                renderer.setAnimationLoop(render);
            } else {
                requestAnimationFrame(animate);
                render(time);
            }
        }

        function render(time) {
            if (analyser) {
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(dataArray);

                const avg = dataArray.reduce((a, b) => a + b) / dataArray.length;
                const normalizedAvg = avg / 256;

                // Update Earth material
                earth.material.uniforms.time.value = time * 0.001;
                earth.material.uniforms.audioFrequency.value = normalizedAvg;

                // Update wireframe
                wireframe.scale.setScalar(1 + normalizedAvg * 0.1);
                wireframe.material.opacity = 0.3 + normalizedAvg * 0.5;

                // Update cloud layer
                cloudLayer.rotation.y += 0.0005 * (1 + normalizedAvg);
                cloudLayer.material.opacity = 0.8 + normalizedAvg * 0.2;

                // Rotate Earth and wireframe
                earth.rotation.y += 0.001;
                wireframe.rotation.y += 0.002;

                // Pulsate Earth based on audio
                earth.scale.setScalar(1 + normalizedAvg * 0.05);

                // Update floating shapes
                floatingShapes.forEach((shape, index) => {
                    const freq = dataArray[index % dataArray.length] / 256;
                    shape.scale.setScalar(1 + freq * 0.5);
                    shape.rotation.x += 0.01 * (1 + freq);
                    shape.rotation.y += 0.01 * (1 + freq);
                    shape.material.opacity = 0.7 + freq * 0.3;
                    
                    // Orbital movement
                    const orbitTime = Date.now() * 0.001;
                    const radius = 15 + Math.sin(orbitTime * 0.2 + index) * 5;
                    const theta = orbitTime * 0.1 + index * 0.1;
                    const phi = orbitTime * 0.05 + index * 0.05;
                    
                    shape.position.x = radius * Math.sin(phi) * Math.cos(theta);
                    shape.position.y = radius * Math.sin(phi) * Math.sin(theta);
                    shape.position.z = radius * Math.cos(phi);
                });

                // Update energy field
                energyField.material.uniforms.time.value = time * 0.001;
                energyField.material.uniforms.audioFrequency.value = normalizedAvg;
                energyField.rotation.y += 0.005 * normalizedAvg;

                // Update audio-reactive rings
                rings.forEach((ring, index) => {
                    const freq = dataArray[index * 2 % dataArray.length] / 256;
                    ring.scale.setScalar(1 + freq * 0.3);
                    ring.material.opacity = 0.5 + freq * 0.5;
                    ring.rotation.z += 0.01 * (1 + freq);
                });

                ringsGroup.rotation.x += 0.005;
                ringsGroup.rotation.y += 0.003;

                // Update particle system
                const positions = particleSystem.geometry.attributes.position.array;
                for (let i = 0; i < positions.length; i += 3) {
                    const freq = dataArray[i % dataArray.length] / 256;
                    const distance = Math.sqrt(positions[i]**2 + positions[i+1]**2 + positions[i+2]**2);
                    const factor = 1 + freq * 2;
                    positions[i] *= factor;
                    positions[i+1] *= factor;
                    positions[i+2] *= factor;

                    if (distance > 40) {
                        const r = Math.random() * 30 + 10;
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(Math.random() * 2 - 1);

                        positions[i] = r * Math.sin(phi) * Math.cos(theta);
                        positions[i + 1] = r * Math.sin(phi) * Math.sin(theta);
                        positions[i + 2] = r * Math.cos(phi);
                    }
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
                particleSystem.rotation.y += 0.001;
            }

            // Rotate starfield
            stars.rotation.y += 0.0002;
            stars.rotation.x += 0.0001;

            // Camera movement (only in non-VR mode)
            if (!vrMode) {
                camera.position.x = Math.sin(time * 0.0002) * 15;
                camera.position.y = Math.cos(time * 0.0002) * 15;
                camera.lookAt(scene.position);
            }

            renderer.render(scene, camera);
        }

        animate(0);

        window.addEventListener('resize', function() {
            camera.aspect = 980 / 1811;
            camera.updateProjectionMatrix();
            renderer.setSize(980, 1811);
        });
    </script>
</body></html>
