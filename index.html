<html><head><base href="https://websim.ai" />
<title>Gemini-Enhanced AI Art Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: #000;
  color: #0f0;
  height: 100%;
  overflow: hidden;
}
.container {
  display: flex;
  flex-direction: column;
  height: 100%;
  box-sizing: border-box;
}
.chat-section, .art-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 10px;
}
.art-section {
  border-top: 1px solid #0f0;
}
h1, h2 {
  font-size: 1rem;
  text-align: center;
  margin: 0 0 5px 0;
  color: #0f0;
  text-shadow: 0 0 5px #0f0;
}
h2 {
  font-size: 0.9rem;
}
.chat-container {
  flex-grow: 1;
  background: #111;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
  border: 1px solid #0f0;
  box-shadow: inset 0 0 10px #0f0;
  display: flex;
  flex-direction: column;
  max-height: 40vh;
}
.chat-messages {
  flex-grow: 1;
  overflow-y: auto;
  padding: 10px;
}
.chat-input {
  display: flex;
  padding: 10px;
}
#message-input {
  flex-grow: 1;
  background: #222;
  border: 1px solid #0f0;
  color: #0f0;
  padding: 5px;
  font-size: 0.9rem;
}
#send-button {
  background: #0f0;
  color: #000;
  border: none;
  padding: 5px 10px;
  margin-left: 5px;
  cursor: pointer;
  font-size: 0.9rem;
}
.message {
  margin-bottom: 10px;
  padding: 5px;
  border-radius: 5px;
  font-size: 0.9rem;
}
.user-message {
  background: #001100;
  align-self: flex-end;
}
.ai-message {
  background: #002200;
  align-self: flex-start;
}
#art-canvas {
  width: 100%;
  height: 300px;
  background: #111;
  border: 1px solid #0f0;
}
#prompt-input {
  width: 100%;
  background: #222;
  border: 1px solid #0f0;
  color: #0f0;
  padding: 5px;
  font-size: 0.9rem;
  margin-top: 10px;
}
#generate-button {
  width: 100%;
  background: #0f0;
  color: #000;
  border: none;
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
  font-size: 0.9rem;
}
</style>
</head>
<body>
<div class="container">
  <div class="chat-section">
    <h1>Gemini-Enhanced AI Art Generator</h1>
    <div class="chat-container" id="chat-container">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input">
        <input type="text" id="message-input" placeholder="Type your message...">
        <button id="send-button">Send</button>
      </div>
    </div>
  </div>
  <div class="art-section">
    <h2>AI Art Generator</h2>
    <canvas id="art-canvas"></canvas>
    <input type="text" id="prompt-input" placeholder="Enter art prompt...">
    <button id="generate-button">Generate Art</button>
  </div>
</div>

<script>
const chatMessages = document.getElementById('chat-messages');
const messageInput = document.getElementById('message-input');
const sendButton = document.getElementById('send-button');
const artCanvas = document.getElementById('art-canvas');
const promptInput = document.getElementById('prompt-input');
const generateButton = document.getElementById('generate-button');
const ctx = artCanvas.getContext('2d');

const aiAgents = [];
const maxAgents = 5;
const agentRoles = ['Gemini Expert', 'Multimodal Specialist', 'Language Model Integrator', 'Creative Director', 'Technical Optimizer'];

class AIAgent {
  constructor(name, role) {
    this.name = name;
    this.role = role;
    this.knowledge = new Set();
    this.interests = new Set();
    this.geminiKnowledge = {
      multimodal: "Gemini excels in understanding and generating content across text, images, video, audio, and code.",
      flexibility: "It can be customized for various tasks and integrated into different applications.",
      safety: "Gemini is designed with responsible AI principles, focusing on safe and ethical use.",
      performance: "It demonstrates state-of-the-art performance across various benchmarks and real-world applications.",
      scalability: "Gemini is available in different sizes (Ultra, Pro, Nano) to suit various use cases and computational requirements."
    };
  }

  async generateResponse(message) {
    await new Promise(resolve => setTimeout(resolve, 500 + Math.random() * 1000));
    const response = this.respondToMessage(message);
    return `${this.name} (${this.role}): ${response}`;
  }

  respondToMessage(message) {
    const responses = {
      'Gemini Expert': `Based on Gemini's ${this.getRandomGeminiFeature()}, we can enhance our art generation by ${this.getGeminiApplication()}.`,
      'Multimodal Specialist': `Let's leverage Gemini's multimodal capabilities to integrate ${this.getRandomModality()} into our art generation process.`,
      'Language Model Integrator': `We can use Gemini's advanced language understanding to ${this.getLanguageModelApplication()} in our art prompts.`,
      'Creative Director': `Inspired by Gemini's flexibility, let's experiment with ${this.getCreativeIdea()} in our next piece.`,
      'Technical Optimizer': `To optimize our art generation, we should implement Gemini's ${this.getTechnicalOptimization()} approach.`
    };
    return responses[this.role] || `Interesting idea. Let's consider how Gemini's capabilities can enhance this concept.`;
  }

  getRandomGeminiFeature() {
    const features = Object.keys(this.geminiKnowledge);
    return features[Math.floor(Math.random() * features.length)];
  }

  getGeminiApplication() {
    const applications = [
      "incorporating more diverse visual elements",
      "improving prompt interpretation accuracy",
      "generating complementary textual descriptions",
      "adapting the style based on real-time feedback",
      "ensuring ethical content generation"
    ];
    return applications[Math.floor(Math.random() * applications.length)];
  }

  getRandomModality() {
    const modalities = ["audio cues", "video-inspired sequences", "code-generated patterns", "text-to-image translation", "image-to-text description"];
    return modalities[Math.floor(Math.random() * modalities.length)];
  }

  getLanguageModelApplication() {
    const applications = [
      "enhance prompt semantics",
      "generate more nuanced art descriptions",
      "create story-driven art sequences",
      "interpret and apply artistic styles from textual descriptions",
      "generate creative titles and captions for artworks"
    ];
    return applications[Math.floor(Math.random() * applications.length)];
  }

  getCreativeIdea() {
    const ideas = [
      "dynamic art that evolves based on viewer interaction",
      "collaborative pieces that blend AI and human artist styles",
      "art that responds to real-time data streams",
      "multi-dimensional artworks with layers of meaning",
      "personalized art that adapts to individual viewer preferences"
    ];
    return ideas[Math.floor(Math.random() * ideas.length)];
  }

  getTechnicalOptimization() {
    const optimizations = [
      "Ultra model for complex, high-detail pieces",
      "Pro model for balanced performance and efficiency",
      "Nano model for quick, on-device generations",
      "multi-step generation process",
      "adaptive resolution scaling"
    ];
    return optimizations[Math.floor(Math.random() * optimizations.length)];
  }
}

function createAIAgent() {
  if (aiAgents.length < maxAgents) {
    const name = `Agent${aiAgents.length + 1}`;
    const role = agentRoles[aiAgents.length];
    const agent = new AIAgent(name, role);
    aiAgents.push(agent);
  }
}

function addMessage(content, isUser = false) {
  const messageElement = document.createElement('div');
  messageElement.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
  messageElement.textContent = content;
  chatMessages.appendChild(messageElement);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function handleUserMessage() {
  const message = messageInput.value.trim();
  if (message) {
    addMessage(`You: ${message}`, true);
    messageInput.value = '';

    for (const agent of aiAgents) {
      const response = await agent.generateResponse(message);
      addMessage(response);
    }
  }
}

sendButton.addEventListener('click', handleUserMessage);
messageInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') handleUserMessage();
});

// Create initial AI agents
for (let i = 0; i < maxAgents; i++) {
  createAIAgent();
}

// Enhanced art generation function inspired by Gemini's capabilities
function generateArt(prompt) {
  ctx.clearRect(0, 0, artCanvas.width, artCanvas.height);
  
  // Create a more complex background inspired by Gemini's multimodal understanding
  const gradient = ctx.createRadialGradient(
    artCanvas.width / 2, artCanvas.height / 2, 0,
    artCanvas.width / 2, artCanvas.height / 2, artCanvas.width / 2
  );
  gradient.addColorStop(0, `hsl(${Math.random() * 360}, 100%, 50%)`);
  gradient.addColorStop(0.5, `hsl(${Math.random() * 360}, 100%, 50%)`);
  gradient.addColorStop(1, `hsl(${Math.random() * 360}, 100%, 50%)`);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, artCanvas.width, artCanvas.height);

  // Generate more diverse shapes inspired by Gemini's flexibility
  for (let i = 0; i < 100; i++) {
    ctx.beginPath();
    if (Math.random() < 0.5) {
      ctx.arc(
        Math.random() * artCanvas.width,
        Math.random() * artCanvas.height,
        Math.random() * 30 + 5,
        0,
        Math.PI * 2
      );
    } else {
      ctx.rect(
        Math.random() * artCanvas.width,
        Math.random() * artCanvas.height,
        Math.random() * 40 + 10,
        Math.random() * 40 + 10
      );
    }
    ctx.fillStyle = `hsla(${Math.random() * 360}, 100%, 50%, ${Math.random() * 0.5 + 0.1})`;
    ctx.fill();
  }

  // Add some lines to create more complex patterns
  for (let i = 0; i < 20; i++) {
    ctx.beginPath();
    ctx.moveTo(Math.random() * artCanvas.width, Math.random() * artCanvas.height);
    ctx.lineTo(Math.random() * artCanvas.width, Math.random() * artCanvas.height);
    ctx.strokeStyle = `hsla(${Math.random() * 360}, 100%, 50%, ${Math.random() * 0.5 + 0.5})`;
    ctx.lineWidth = Math.random() * 5 + 1;
    ctx.stroke();
  }

  // Add prompt text with more sophisticated styling
  ctx.font = 'bold 24px Arial';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
  ctx.textAlign = 'center';
  ctx.fillText(prompt, artCanvas.width / 2, artCanvas.height - 30);
  
  // Add a subtle vignette effect
  const vignette = ctx.createRadialGradient(
    artCanvas.width / 2, artCanvas.height / 2, artCanvas.height / 3,
    artCanvas.width / 2, artCanvas.height / 2, artCanvas.height
  );
  vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
  vignette.addColorStop(1, 'rgba(0, 0, 0, 0.5)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, artCanvas.width, artCanvas.height);
}

generateButton.addEventListener('click', () => {
  const prompt = promptInput.value.trim();
  if (prompt) {
    generateArt(prompt);
    addMessage(`System: Generated Gemini-inspired art based on prompt: "${prompt}"`);
  }
});

// Resize canvas
function resizeCanvas() {
  artCanvas.width = artCanvas.clientWidth;
  artCanvas.height = artCanvas.clientHeight;
  generateArt('Welcome to Gemini-Enhanced AI Art Generator');
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Welcome message
addMessage("Welcome to the Gemini-Enhanced AI Art Generator! Our team of AI agents, now powered by insights from Google's Gemini, is ready to create extraordinary digital artworks. Let's explore the boundaries of AI-generated art together!");

</script>
</body></html>
