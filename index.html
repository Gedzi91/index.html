<html><head><base href="/">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    flex-direction: column;
}

#stickman {
    width: 300px;
    height: 300px;
}

.head {
    fill: none;
    stroke: #fff;
    stroke-width: 4;
}

.body {
    fill: none;
    stroke: #fff;
    stroke-width: 4;
}

@keyframes breakdance {
    0% {
        transform: rotate(0deg) translateY(0);
    }
    25% {
        transform: rotate(90deg) translateY(-10px);
    }
    50% {
        transform: rotate(180deg) translateY(0);
    }
    75% {
        transform: rotate(270deg) translateY(-10px);
    }
    100% {
        transform: rotate(360deg) translateY(0);
    }
}

@keyframes headbob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(2px) rotate(10deg); }
}

@keyframes armWave {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(-30deg); }
    100% { transform: rotate(0deg); }
}

@keyframes legSpin {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(-20deg); }
    100% { transform: rotate(0deg); }
}

#dancer {
    transform-origin: center center;
    opacity: 1;
    transition: all 0.5s ease-in-out;
}

#dancer.dancing {
    animation: breakdance 4s infinite ease-in-out;
}

.dancing .head {
    animation: headbob 1s infinite ease-in-out;
    transform-origin: center 25px;
}

.dancing #leftArm, .dancing #rightArm {
    animation: armWave 1s infinite ease-in-out;
    transform-origin: 50px 45px;
}

.dancing #rightArm {
    animation-delay: 0.5s;
}

.dancing #leftLeg, .dancing #rightLeg {
    animation: legSpin 1s infinite ease-in-out;
    transform-origin: 50px 60px;
}

.dancing #rightLeg {
    animation-delay: 0.5s;
}

.glow {
    filter: drop-shadow(0 0 5px #fff);
}

#floor {
    stroke: #333;
    stroke-width: 2;
}

#startButton {
    padding: 15px 30px;
    font-size: 18px;
    background: #333;
    color: white;
    border: 2px solid #fff;
    border-radius: 25px;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.3s ease;
}

#startButton:hover {
    background: #444;
    transform: scale(1.05);
}

#startButton.playing {
    background: #555;
    transform: scale(0.95);
}
</style>
</head>
<body>

<svg id="stickman" viewBox="0 0 100 100">
    <line id="floor" x1="10" y1="85" x2="90" y2="85"/>
    <g id="dancer" class="glow">
        <circle class="head" cx="50" cy="25" r="8"/>
        <line class="body" x1="50" y1="33" x2="50" y2="60"/>
        <line id="leftArm" class="body" x1="50" y1="45" x2="30" y2="35"/>
        <line id="rightArm" class="body" x1="50" y1="45" x2="70" y2="35"/>
        <line id="leftLeg" class="body" x1="50" y1="60" x2="30" y2="80"/>
        <line id="rightLeg" class="body" x1="50" y1="60" x2="70" y2="80"/>
    </g>
</svg>

<button id="startButton">Start Dancing!</button>

<audio id="music" loop>
    <source src="Core.mp3.opus" type="audio/ogg">
</audio>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const music = document.getElementById('music');
    const dancer = document.getElementById('dancer');
    const startButton = document.getElementById('startButton');
    
    let isPlaying = false;
    let audioContext = null;
    let analyzer = null;
    let startTime = 0;
    
    function initAudio() {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyzer = audioContext.createAnalyser();
        const source = audioContext.createMediaElementSource(music);
        source.connect(analyzer);
        analyzer.connect(audioContext.destination);
        analyzer.fftSize = 256;
    }
    
    function animate() {
        if (!isPlaying) return;
        
        requestAnimationFrame(animate);
        const bufferLength = analyzer.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyzer.getByteFrequencyData(dataArray);
        
        const average = dataArray.reduce((a, b) => a + b) / bufferLength;
        
        // Calculate time elapsed since start
        const currentTime = (Date.now() - startTime) / 1000;
        
        // Gradually increase animation speed over 4 seconds
        let speedMultiplier = Math.min(currentTime / 4, 1);
        
        // Base animation speed adjusted by music intensity and time
        const baseSpeed = 4 - (3 * speedMultiplier);
        const speed = baseSpeed - (average / 512);
        
        dancer.style.animationDuration = speed + 's';
        
        // Adjust limb movement speed
        const limbSpeed = (1 - (speedMultiplier * 0.5)) - (average / 1024);
        document.querySelectorAll('.dancing #leftArm, .dancing #rightArm, .dancing #leftLeg, .dancing #rightLeg')
            .forEach(limb => {
                limb.style.animationDuration = limbSpeed + 's';
            });
        
        // Adjust head bob speed
        document.querySelector('.dancing .head').style.animationDuration = (limbSpeed * 1.2) + 's';
        
        // Adjust glow intensity based on music
        const glowIntensity = 5 + (average / 256) * 15;
        dancer.style.filter = `drop-shadow(0 0 ${glowIntensity}px #fff)`;
    }
    
    startButton.addEventListener('click', () => {
        if (!audioContext) {
            initAudio();
        }
        
        if (!isPlaying) {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            startTime = Date.now();
            music.play();
            dancer.classList.add('dancing');
            startButton.classList.add('playing');
            startButton.textContent = 'Stop Dancing';
            isPlaying = true;
            animate();
        } else {
            music.pause();
            music.currentTime = 0;
            dancer.classList.remove('dancing');
            startButton.classList.remove('playing');
            startButton.textContent = 'Start Dancing!';
            isPlaying = false;
        }
    });
});
</script>

</body></html>
