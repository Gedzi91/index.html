<html><head><base href="https://websim.ai" /><title>WebSim Shader Playground - Interactive Julia Set Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
  #shaderContainer { 
    width: 100%; 
    height: 100%; 
    position: relative;
    touch-action: none;
  }
  canvas { width: 100%; height: 100%; display: block; }
  #info {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    background-color: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 5px;
    font-size: 14px;
    text-align: center;
    transition: opacity 0.5s ease-in-out;
  }
  #pauseButton {
    position: absolute;
    top: 20px;
    right: 20px;
    background-color: rgba(255,255,255,0.2);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="shaderContainer">
  <canvas id="shaderCanvas"></canvas>
  <div id="info">Pinch to Zoom | Drag to Move | Tap to Change Julia Set<br><span id="status"></span></div>
  <button id="pauseButton">Pause</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="x-shader/x-fragment" id="fragmentShader">
uniform float time;
uniform vec2 resolution;
uniform float zoom;
uniform vec2 offset;
uniform vec2 juliaConstant;

vec3 hsv2rgb(vec3 c) {
    vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
    vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
    return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
}

void main() {
    vec2 uv = (gl_FragCoord.xy - 0.5 * resolution.xy) / min(resolution.y, resolution.x);
    uv = uv / zoom + offset;
    
    vec2 c = juliaConstant;
    vec2 z = uv;
    float iter = 0.0;
    const float MAX_ITER = 100.0;
    
    for(float i = 0.0; i < MAX_ITER; i++) {
        z = vec2(z.x * z.x - z.y * z.y, 2.0 * z.x * z.y) + c;
        if(dot(z, z) > 4.0) break;
        iter++;
    }
    
    if(iter == MAX_ITER) {
        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
    } else {
        float hue = mod(iter / MAX_ITER + time * 0.1, 1.0);
        vec3 color = hsv2rgb(vec3(hue, 0.8, 1.0));
        gl_FragColor = vec4(color, 1.0);
    }
}
</script>
<script>
let scene, camera, renderer, material, mesh;
let isPaused = false;
let zoomLevel = 1.0;
let offset = { x: 0, y: 0 };
let isDragging = false;
let lastTouchPosition = { x: 0, y: 0 };
let infoTimeout;
let juliaConstant = { x: -0.4, y: 0.6 };

function init() {
    scene = new THREE.Scene();
    camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    renderer = new THREE.WebGLRenderer({canvas: document.getElementById('shaderCanvas'), antialias: true});
    
    material = new THREE.ShaderMaterial({
        uniforms: {
            time: { value: 0 },
            resolution: { value: new THREE.Vector2() },
            zoom: { value: zoomLevel },
            offset: { value: new THREE.Vector2(offset.x, offset.y) },
            juliaConstant: { value: new THREE.Vector2(juliaConstant.x, juliaConstant.y) }
        },
        fragmentShader: document.getElementById('fragmentShader').textContent
    });
    
    mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
    scene.add(mesh);
    
    onWindowResize();
    window.addEventListener('resize', onWindowResize, false);
    
    const canvas = document.getElementById('shaderCanvas');
    canvas.addEventListener('touchstart', startDrag);
    canvas.addEventListener('touchmove', handleTouchMove);
    canvas.addEventListener('touchend', endDrag);
    canvas.addEventListener('touchcancel', endDrag);
    canvas.addEventListener('click', changeJuliaSet);
    
    const pauseButton = document.getElementById('pauseButton');
    pauseButton.addEventListener('click', togglePause);
    
    animate();
    updateStatus();
    fadeOutInfo();
}

function onWindowResize() {
    const width = window.innerWidth;
    const height = window.innerHeight;
    renderer.setSize(width, height);
    material.uniforms.resolution.value.set(width, height);
}

function animate() {
    requestAnimationFrame(animate);
    if (!isPaused) {
        material.uniforms.time.value += 0.05;
    }
    renderer.render(scene, camera);
}

function handleZoom(event) {
    const touchDistance = Math.hypot(
        event.touches[0].pageX - event.touches[1].pageX,
        event.touches[0].pageY - event.touches[1].pageY
    );

    if (this.lastTouchDistance) {
        const zoomDelta = touchDistance - this.lastTouchDistance;
        const zoomSpeed = 0.01;
        zoomLevel += zoomDelta * zoomSpeed;
        zoomLevel = Math.max(0.1, Math.min(5, zoomLevel));
        material.uniforms.zoom.value = zoomLevel;
        updateStatus();
    }

    this.lastTouchDistance = touchDistance;
}

function togglePause() {
    isPaused = !isPaused;
    const pauseButton = document.getElementById('pauseButton');
    pauseButton.textContent = isPaused ? 'Resume' : 'Pause';
    updateStatus();
}

function startDrag(event) {
    isDragging = true;
    if (event.touches.length === 1) {
        lastTouchPosition.x = event.touches[0].clientX;
        lastTouchPosition.y = event.touches[0].clientY;
    }
}

function handleTouchMove(event) {
    showInfo();
    event.preventDefault();
    if (event.touches.length === 2) {
        handleZoom(event);
    } else if (isDragging && event.touches.length === 1) {
        drag(event);
    }
}

function drag(event) {
    const touch = event.touches[0];
    const deltaX = touch.clientX - lastTouchPosition.x;
    const deltaY = touch.clientY - lastTouchPosition.y;
    
    offset.x -= deltaX / (window.innerWidth * zoomLevel);
    offset.y += deltaY / (window.innerHeight * zoomLevel);
    
    material.uniforms.offset.value.set(offset.x, offset.y);
    
    lastTouchPosition.x = touch.clientX;
    lastTouchPosition.y = touch.clientY;
    
    updateStatus();
}

function endDrag() {
    isDragging = false;
    this.lastTouchDistance = null;
}

function changeJuliaSet() {
    juliaConstant.x = Math.random() * 2 - 1;
    juliaConstant.y = Math.random() * 2 - 1;
    material.uniforms.juliaConstant.value.set(juliaConstant.x, juliaConstant.y);
    updateStatus();
}

function updateStatus() {
    const statusElement = document.getElementById('status');
    statusElement.textContent = `Status: ${isPaused ? 'Paused' : 'Running'} | Zoom: ${(zoomLevel * 100).toFixed(0)}% | Offset: (${offset.x.toFixed(2)}, ${offset.y.toFixed(2)}) | Julia: (${juliaConstant.x.toFixed(2)}, ${juliaConstant.y.toFixed(2)})`;
}

function showInfo() {
    const infoElement = document.getElementById('info');
    infoElement.style.opacity = '1';
    clearTimeout(infoTimeout);
    fadeOutInfo();
}

function fadeOutInfo() {
    infoTimeout = setTimeout(() => {
        const infoElement = document.getElementById('info');
        infoElement.style.opacity = '0';
    }, 3000);
}

init();
</script>
</body></html>
