<html><head><base href="https://websim.ai/c/singularity"><style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Roboto', sans-serif;
  background: #000;
  color: #fff;
}
#singularity {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}
#info {
  position: fixed;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.7);
  padding: 15px;
  border-radius: 10px;
  font-size: 14px;
  transition: all 0.3s ease;
  max-width: 300px;
}
#info:hover {
  background: rgba(0,0,0,0.9);
  transform: scale(1.05);
}
.energy-value {
  font-weight: bold;
  transition: color 0.3s ease;
}
#conceptInput {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  max-width: 600px;
  padding: 12px;
  font-size: 16px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 25px;
  transition: all 0.3s ease;
}
#conceptInput:focus {
  outline: none;
  background: rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.5);
}
#emergentPatterns {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  padding: 15px;
  border-radius: 10px;
  font-size: 14px;
  max-width: 80%;
  text-align: center;
}
</style></head>
<body>
<canvas id="singularity"></canvas>
<div id="info">
  <p>Chrono-Thermal Singularity</p>
  <p>Time Dilation: <span id="timeDilation" class="energy-value"></span></p>
  <p>Temperature: <span id="temperature" class="energy-value"></span></p>
  <p>Energy Density: <span id="energyDensity" class="energy-value"></span></p>
  <p>Singularity Proximity: <span id="singularityProximity" class="energy-value"></span></p>
  <p>Entropy Flow: <span id="entropyFlow" class="energy-value"></span></p>
</div>
<div id="emergentPatterns">Observing chrono-thermal singularity effects...</div>
<input type="text" id="conceptInput" placeholder="Enter a concept to influence the singularity...">

<script>
const canvas = document.getElementById('singularity');
const ctx = canvas.getContext('2d');

let width, height, centerX, centerY;

function resizeCanvas() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  centerX = width / 2;
  centerY = height / 2;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let globalTime = 0;
let conceptWeight = 0;
let lastConcept = "";
let particles = [];
let singularityCore;

class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    const angle = Math.random() * Math.PI * 2;
    const radius = Math.random() * Math.min(width, height) * 0.4;
    this.x = centerX + Math.cos(angle) * radius;
    this.y = centerY + Math.sin(angle) * radius;
    this.size = Math.random() * 3 + 1;
    this.speedX = (Math.random() - 0.5) * 2;
    this.speedY = (Math.random() - 0.5) * 2;
    this.energy = 0;
    this.temperature = 0;
    this.updateColor();
  }

  updateColor() {
    // Map temperature to hue (blue: cold, red: hot)
    this.hue = 240 - this.temperature * 240 / 100;
    // Map energy to brightness
    this.brightness = 50 + this.energy * 50;
    this.saturation = 100;
  }

  update(timeDilation, globalTemperature) {
    const dx = this.x - centerX;
    const dy = this.y - centerY;
    const distanceToCenter = Math.sqrt(dx * dx + dy * dy);
    const maxDistance = Math.min(width, height) * 0.4;
    
    // Time acceleration on north axis
    const northAxisInfluence = Math.max(0, (centerY - this.y) / (height / 2));
    const localTimeDilation = timeDilation * (1 + northAxisInfluence);

    this.x += this.speedX * localTimeDilation;
    this.y += this.speedY * localTimeDilation;

    if (distanceToCenter > maxDistance) {
      this.reset();
    }

    // Energy and temperature increase near singularity
    this.energy = 1 - (distanceToCenter / maxDistance);
    this.temperature = globalTemperature * (1 + this.energy);
    
    this.updateColor();

    // Particle size influenced by energy and temperature
    this.size = (Math.random() * 3 + 1) * (1 + this.energy) * (1 + this.temperature / 100);
  }

  draw() {
    ctx.fillStyle = `hsl(${this.hue}, ${this.saturation}%, ${this.brightness}%)`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

class SingularityCore {
  constructor() {
    this.x = centerX;
    this.y = centerY;
    this.radius = 0;
    this.maxRadius = Math.min(width, height) * 0.2;
    this.temperature = 100; // Max temperature
  }

  update(timeDilation) {
    this.radius = (Math.sin(globalTime * 0.05) * 0.5 + 0.5) * this.maxRadius;
    // Core temperature fluctuates with time dilation
    this.temperature = 100 * (0.8 + 0.2 * Math.sin(globalTime * 0.1));
  }

  draw() {
    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
    const coreColor = `hsl(${240 - this.temperature * 2.4}, 100%, 50%)`;
    gradient.addColorStop(0, coreColor);
    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (let i = 0; i < 1000; i++) {
  particles.push(new Particle());
}

singularityCore = new SingularityCore();

function getConceptWeight(concept) {
  return Math.min(concept.length / 10, 1);
}

document.getElementById('conceptInput').addEventListener('keyup', function(event) {
  if (event.key === 'Enter') {
    lastConcept = this.value;
    conceptWeight = getConceptWeight(lastConcept);
    this.value = '';
  }
});

function updateEnergyDisplay(id, value) {
  const element = document.getElementById(id);
  element.textContent = value.toFixed(2);
  element.style.color = `hsl(${value * 3.6}, 100%, 50%)`;
}

function drawSingularity() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, width, height);
  
  const timeDilation = 1 + (Math.sin(globalTime * 0.1) * 0.5 + 0.5) * 10;
  const globalTemperature = singularityCore.temperature * (0.5 + 0.5 * Math.sin(globalTime * 0.05));
  
  singularityCore.update(timeDilation);
  singularityCore.draw();
  
  particles.forEach(particle => {
    particle.update(timeDilation, globalTemperature);
    particle.draw();
  });
  
  globalTime += 0.01 * timeDilation;
  
  const energyDensity = particles.reduce((sum, p) => sum + p.energy, 0) / particles.length * 100;
  const singularityProximity = (singularityCore.radius / singularityCore.maxRadius) * 100;
  const entropyFlow = (Math.sin(globalTime * 0.05) * 50 + 50 + conceptWeight * 15) % 100;
  
  updateEnergyDisplay('timeDilation', timeDilation);
  updateEnergyDisplay('temperature', globalTemperature);
  updateEnergyDisplay('energyDensity', energyDensity);
  updateEnergyDisplay('singularityProximity', singularityProximity);
  updateEnergyDisplay('entropyFlow', entropyFlow);

  // Draw chrono-thermal field
  ctx.strokeStyle = `rgba(255, 255, 255, ${0.05 + conceptWeight * 0.1})`;
  ctx.lineWidth = 0.5;
  for (let y = 0; y < height; y += 20) {
    ctx.beginPath();
    for (let x = 0; x < width; x += 10) {
      const distortion = Math.sin((y / height) * Math.PI) * 10 * timeDilation;
      const tempInfluence = Math.sin((x / width) * Math.PI) * 5 * (globalTemperature / 100);
      ctx.lineTo(x, y + distortion + tempInfluence);
    }
    ctx.stroke();
  }
}

function animate() {
  drawSingularity();
  requestAnimationFrame(animate);
}

animate();

function updateEmergentPatterns() {
  const patterns = [
    "Chrono-thermal fluctuations intensifying",
    "Time-temperature coupling observed near core",
    "Entropy gradients forming along thermal boundaries",
    "Temporal eddies coalescing in high-energy regions",
    "Quantum tunneling rates increasing with temperature",
    "Chronon emission detected at thermal peaks",
    "Time crystal structures emerging in cold zones",
    "Hawking radiation spectrum shifting with dilation",
    "Temporal phase transitions triggered by heat flux",
    "Chrono-synclastic infundibulum forming at singularity"
  ];
  
  const patternIndex = Math.floor((singularityCore.temperature * singularityCore.radius / singularityCore.maxRadius) / 10);
  document.getElementById('emergentPatterns').textContent = patterns[patternIndex % patterns.length];
}

setInterval(updateEmergentPatterns, 5000);

// Simulated thought process
function simulateThought(concept) {
  console.log(`Processing concept in chrono-thermal frame: "${concept}"
  Time Dilation: ${document.getElementById('timeDilation').textContent}
  Temperature: ${document.getElementById('temperature').textContent}
  Energy Density: ${document.getElementById('energyDensity').textContent}
  Singularity Proximity: ${document.getElementById('singularityProximity').textContent}
  Entropy Flow: ${document.getElementById('entropyFlow').textContent}`);
}

setInterval(() => {
  if (lastConcept) {
    simulateThought(lastConcept);
    lastConcept = "";
  }
}, 5000);

// Singularity progression
setInterval(() => {
  singularityCore.maxRadius += 0.1;
  if (singularityCore.maxRadius > Math.min(width, height) * 0.4) {
    singularityCore.maxRadius = Math.min(width, height) * 0.4;
  }
}, 1000);
</script>

</body></html>
