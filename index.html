<html><head><base href="https://8bit-piano.com"><title>8-Bit Piano - Retro Music Creation</title><style>
body {
  font-family: 'Press Start 2P', cursive;
  background-color: #000;
  color: #0f0;
  margin: 0;
  padding: 20px;
  line-height: 1.6;
}
.container {
  max-width: 800px;
  margin: 0 auto;
}
h1 {
  text-align: center;
  color: #0f0;
  text-shadow: 2px 2px #008000;
  font-size: 2.5em;
  margin-bottom: 30px;
}
.piano {
  display: flex;
  justify-content: center;
  margin-bottom: 30px;
}
.key {
  width: 40px;
  height: 120px;
  background-color: #fff;
  border: 2px solid #000;
  margin: 0 2px;
  cursor: pointer;
}
.key.black {
  background-color: #000;
  height: 80px;
  width: 30px;
  margin-left: -15px;
  margin-right: -15px;
  z-index: 2;
}
.controls {
  display: flex;
  justify-content: space-around;
  margin-bottom: 30px;
}
.btn {
  background-color: #008000;
  color: #fff;
  border: none;
  padding: 10px 20px;
  font-family: 'Press Start 2P', cursive;
  cursor: pointer;
}
.btn:hover {
  background-color: #00a000;
}
.composition {
  background-color: #001100;
  border: 2px solid #008000;
  padding: 20px;
  height: 200px;
  overflow-y: auto;
}
@keyframes glitch {
  0% {
    transform: translate(2px, 2px);
  }
  25% {
    transform: translate(-2px, -2px);
  }
  50% {
    transform: translate(-2px, 2px);
  }
  75% {
    transform: translate(2px, -2px);
  }
  100% {
    transform: translate(2px, 2px);
  }
}
.glitch {
  animation: glitch 0.3s infinite;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <h1 class="glitch">8-Bit Piano</h1>
  
  <div class="piano">
    <div class="key" data-note="C"></div>
    <div class="key black" data-note="C#"></div>
    <div class="key" data-note="D"></div>
    <div class="key black" data-note="D#"></div>
    <div class="key" data-note="E"></div>
    <div class="key" data-note="F"></div>
    <div class="key black" data-note="F#"></div>
    <div class="key" data-note="G"></div>
    <div class="key black" data-note="G#"></div>
    <div class="key" data-note="A"></div>
    <div class="key black" data-note="A#"></div>
    <div class="key" data-note="B"></div>
  </div>

  <div class="controls">
    <button class="btn" id="record">Record</button>
    <button class="btn" id="play">Play</button>
    <button class="btn" id="save">Save</button>
    <button class="btn" id="load">Load</button>
  </div>

  <div class="composition" id="composition">
    Your composition will appear here...
  </div>
</div>

<script>
const audioContext = new (window.AudioContext || window.webkitAudioContext)();
const gainNode = audioContext.createGain();
gainNode.connect(audioContext.destination);

const keys = document.querySelectorAll('.key');
let isRecording = false;
let composition = [];
let startTime;

keys.forEach(key => {
  key.addEventListener('mousedown', () => playNote(key.dataset.note));
  key.addEventListener('mouseup', () => stopNote(key.dataset.note));
});

function playNote(note) {
  const osc = audioContext.createOscillator();
  osc.type = 'square';
  osc.frequency.setValueAtTime(getNoteFrequency(note), audioContext.currentTime);
  osc.connect(gainNode);
  osc.start();
  osc.stop(audioContext.currentTime + 0.1);

  if (isRecording) {
    const time = audioContext.currentTime - startTime;
    composition.push({ note, time });
  }
}

function stopNote(note) {
  // For this simple implementation, we don't need to do anything here
}

function getNoteFrequency(note) {
  const notes = {'C': 261.63, 'C#': 277.18, 'D': 293.66, 'D#': 311.13, 'E': 329.63, 'F': 349.23, 'F#': 369.99, 'G': 392.00, 'G#': 415.30, 'A': 440.00, 'A#': 466.16, 'B': 493.88};
  return notes[note];
}

document.getElementById('record').addEventListener('click', () => {
  isRecording = !isRecording;
  if (isRecording) {
    composition = [];
    startTime = audioContext.currentTime;
    document.getElementById('record').textContent = 'Stop';
  } else {
    document.getElementById('record').textContent = 'Record';
    updateComposition();
  }
});

document.getElementById('play').addEventListener('click', () => {
  startTime = audioContext.currentTime;
  composition.forEach(note => {
    setTimeout(() => playNote(note.note), note.time * 1000);
  });
});

document.getElementById('save').addEventListener('click', () => {
  localStorage.setItem('8bitComposition', JSON.stringify(composition));
  alert('Composition saved!');
});

document.getElementById('load').addEventListener('click', () => {
  const savedComposition = localStorage.getItem('8bitComposition');
  if (savedComposition) {
    composition = JSON.parse(savedComposition);
    updateComposition();
    alert('Composition loaded!');
  } else {
    alert('No saved composition found.');
  }
});

function updateComposition() {
  const compositionDiv = document.getElementById('composition');
  compositionDiv.innerHTML = composition.map(note => `${note.note} at ${note.time.toFixed(2)}s`).join('<br>');
}
</script>
</body></html>
