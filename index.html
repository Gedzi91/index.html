body {
    background: #0a0a0a;
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #fff;
    overflow-x: hidden;
    min-height: 100vh;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
}

.neon-border {
    border: 2px solid #0ff;
    box-shadow: 0 0 20px #0ff, 
                inset 0 0 20px #0ff;
    border-radius: 15px;
    padding: 2rem;
    margin: 2rem 0;
    background: rgba(0, 255, 255, 0.05);
    backdrop-filter: blur(10px);
}

.showcase {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
    padding: 2rem;
}

.nft-card {
    background: rgba(0, 255, 255, 0.1);
    border-radius: 15px;
    padding: 1.5rem;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.nft-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
}

.nft-image {
    width: 100%;
    height: 300px;
    object-fit: contain;
    border-radius: 10px;
    margin-bottom: 1rem;
    border: 2px solid #0ff;
}

.nft-title {
    color: #0ff;
    font-size: 1.5rem;
    text-align: center;
    margin: 1rem 0;
    text-shadow: 0 0 10px #0ff;
}

.neon-text {
    color: #0ff;
    text-shadow: 0 0 10px #0ff;
    font-size: 3rem;
    text-align: center;
    margin-bottom: 2rem;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { text-shadow: 0 0 10px #0ff; }
    50% { text-shadow: 0 0 30px #0ff, 0 0 50px #0ff; }
    100% { text-shadow: 0 0 10px #0ff; }
}

.attributes {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-top: 1rem;
}

.attribute {
    background: rgba(0, 255, 255, 0.1);
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-size: 0.9rem;
    color: #0ff;
    border: 1px solid #0ff;
}

.glow-line {
    height: 2px;
    background: linear-gradient(90deg, transparent, #0ff, transparent);
    margin: 2rem 0;
    animation: glow 2s infinite;
}

@keyframes glow {
    0% { opacity: 0.3; }
    50% { opacity: 1; }
    100% { opacity: 0.3; }
}

.first-nft {
    width: 200px;
    height: 200px;
    object-fit: contain;
    border-radius: 10px;
    border: 2px solid #0ff;
}

.AppExhibition {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.AppExhibition-card {
    background: rgba(0, 255, 255, 0.1);
    border-radius: 15px;
    padding: 1.5rem;
    transition: all 0.3s ease;
    position: relative;

    margin: 2rem;
}

.AppExhibition-card:hover {

    border-radius: 10px;
    margin-bottom: 1rem;
