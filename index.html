<html><head><base href="." /><title>Low Res Pixel Art</title><style>
body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: monospace;
    cursor: none;
}

.custom-cursor {
    width: 30px;
    height: 30px;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    filter: grayscale(100%) brightness(2);
    opacity: 0.8;
}

.container {
    display: flex;
    align-items: center;
    gap: 100px;
    position: relative;
    z-index: 1;
}

.pixel-art {
    image-rendering: pixelated;
    transform: scale(4);
}

.pixel-text {
    color: white;
    font-size: 24px;
    letter-spacing: 8px;
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    filter: blur(0.8px);
    opacity: 0.9;
    animation: textFade 14s infinite;
}

@keyframes textFade {
    0%, 14% { content: "pace."; }
    14%, 28% { content: "Blood."; }
    28%, 42% { content: "Flesh."; }
    42%, 56% { content: "Dust."; }
    56%, 70% { content: "Fear."; }
    70%, 84% { content: "Bones."; }
    84%, 100% { content: "will I see the light again?"; }
}

img {
    width: 100px;
    height: 100px;
    filter: brightness(1.2) contrast(1.4);
}

.particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}

.particle {
    position: absolute;
    background: white;
    width: 2px;
    height: 2px;
    opacity: 0.6;
    animation: float 20s infinite linear;
}

.floating-eyes {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
}

.floating-eye {
    position: absolute;
    width: 60px;
    height: 60px;
    opacity: 0.15;
    filter: grayscale(100%) brightness(2);
    animation: floatEye 30s infinite linear;
}

@keyframes float {
    0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
    }
    10% {
        opacity: 0.6;
    }
    90% {
        opacity: 0.6;
    }
    100% {
        transform: translateY(-100px) translateX(50px);
        opacity: 0;
    }
}

@keyframes floatEye {
    0% {
        transform: translate(0, 100vh) rotate(0deg);
    }
    100% {
        transform: translate(100vw, -100vh) rotate(360deg);
    }
}
</style></head><body>
    <img src="Screenshot 2024-12-19 6.35.33 PM.png" class="custom-cursor" id="custom-cursor">
    <div class="floating-eyes" id="floating-eyes"></div>
    <div class="particles" id="particles"></div>
    <div class="container">
        <div class="pixel-art">
            <img src="Screenshot 2024-12-19 2.53.20 PM.png" alt="Pixelated Robot">
        </div>
        <div class="pixel-text" id="changing-text"></div>
    </div>

    <script>
        // Text animation
        const texts = ["pace.", "Blood.", "Flesh.", "Dust.", "Fear.", "Bones.", "will I see the light again?"];
        const textElement = document.getElementById('changing-text');
        let currentIndex = 0;

        function updateText() {
            textElement.textContent = texts[currentIndex];
            currentIndex = (currentIndex + 1) % texts.length;
        }

        updateText(); // Initial text
        setInterval(updateText, 2000); // Change text every 2 seconds

        // Custom cursor movement
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Create Audio Context and Static Sound
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function createStaticNoise() {
            const bufferSize = audioCtx.sampleRate * 0.1;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true;

            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 0.05;

            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            return source;
        }

        function playStaticLoop() {
            const staticNode = createStaticNoise();
            staticNode.start();
            
            setTimeout(() => {
                staticNode.stop();
                playStaticLoop();
            }, 100);
        }

        document.addEventListener('click', function initAudio() {
            audioCtx.resume().then(() => {
                playStaticLoop();
                document.removeEventListener('click', initAudio);
            });
        }, { once: true });

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const numParticles = 50;

            for (let i = 0; i < numParticles; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = Math.random() * 100 + 'vh';
                
                const duration = 15 + Math.random() * 10;
                particle.style.animationDuration = duration + 's';
                
                const delay = Math.random() * duration;
                particle.style.animationDelay = '-' + delay + 's';

                particlesContainer.appendChild(particle);
            }
        }

        function createFloatingEyes() {
            const eyesContainer = document.getElementById('floating-eyes');
            const numEyes = 20;

            for (let i = 0; i < numEyes; i++) {
                const eye = document.createElement('img');
                eye.src = 'Screenshot 2024-12-19 6.35.33 PM.png';
                eye.className = 'floating-eye';
                
                eye.style.left = Math.random() * 100 + 'vw';
                eye.style.top = Math.random() * 100 + 'vh';
                
                const duration = 20 + Math.random() * 20;
                eye.style.animationDuration = duration + 's';
                
                const delay = Math.random() * duration;
                eye.style.animationDelay = '-' + delay + 's';

                eyesContainer.appendChild(eye);
            }
        }

        createParticles();
        createFloatingEyes();

        setInterval(() => {
            const eye = document.createElement('img');
            eye.src = 'Screenshot 2024-12-19 6.35.33 PM.png';
            eye.className = 'floating-eye';
            
            eye.style.left = Math.random() * 100 + 'vw';
            eye.style.top = '100vh';
            
            const duration = 20 + Math.random() * 20;
            eye.style.animationDuration = duration + 's';
            
            document.getElementById('floating-eyes').appendChild(eye);
            
            setTimeout(() => {
                eye.remove();
            }, duration * 1000);
        }, 2000);
    </script>
</body></html>
