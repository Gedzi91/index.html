<html><head><base href="blob:https://party.websim.ai/eb1a59f7-6bcd-4436-8e17-237ccee78fd4">
<title>Immersive Sci-Fi Adventure Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

:root {
  --primary-color: #00ffff;
  --secondary-color: #ff00ff;
  --background-color: #000033;
  --text-color: #ffffff;
}

body, html {
  margin: 0;
  padding: 0;
  font-family: 'Orbitron', sans-serif;
  background-color: var(--background-color);
  color: var(--text-color);
  overflow: hidden;
}

.game-container {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwxfDB8MXxyYW5kb218MHx8c3BhY2V8fHx8fHwxNjg2ODQ0ODcy&ixlib=rb-4.0.3&q=80&utm_campaign=api-credit&utm_medium=referral&utm_source=unsplash_source&w=1080') no-repeat center center fixed;
  background-size: cover;
}

.hud {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 18px;
}

.game-title {
  font-size: 48px;
  margin-bottom: 30px;
  text-shadow: 0 0 10px var(--primary-color);
}

.game-controls {
  display: flex;
  gap: 20px;
}

.control-btn {
  padding: 15px 30px;
  font-size: 18px;
  background-color: rgba(0, 0, 0, 0.6);
  border: 2px solid var(--primary-color);
  color: var(--primary-color);
  cursor: pointer;
  transition: all 0.3s ease;
}

.control-btn:hover {
  background-color: var(--primary-color);
  color: var(--background-color);
}

.starfield {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

@keyframes floating {
  0% { transform: translate(0, 0); }
  50% { transform: translate(0, 15px); }
  100% { transform: translate(0, 0); }
}

.spaceship {
  position: absolute;
  width: 100px;
  height: 100px;
  background: url('https://www.svgrepo.com/show/95176/spaceship.svg') no-repeat center center;
  background-size: contain;
  animation: floating 3s ease-in-out infinite;
}

</style>
</head>
<body>
<div class="game-container">
  <div class="hud">Energy: <span id="energy">100</span> | Shields: <span id="shields">100</span></div>
  
  <h1 class="game-title">Cosmic Odyssey</h1>
  
  <div class="game-controls">
    <button class="control-btn" id="exploreBtn">Explore</button>
    <button class="control-btn" id="combatBtn">Combat</button>
    <button class="control-btn" id="tradeBtn">Trade</button>
  </div>

  <canvas class="starfield" id="starfield"></canvas>
  <div class="spaceship" id="spaceship"></div>
</div>

<script>
// Starfield effect
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = [];
const numStars = 200;

for (let i = 0; i < numStars; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 1.5,
    vx: Math.floor(Math.random() * 50) - 25,
    vy: Math.floor(Math.random() * 50) - 25
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ffffff';
  
  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2, false);
    ctx.fill();
    
    star.x += star.vx / 30;
    star.y += star.vy / 30;
    
    if (star.x < 0 || star.x > canvas.width) star.vx = -star.vx;
    if (star.y < 0 || star.y > canvas.height) star.vy = -star.vy;
  });
}

function animate() {
  draw();
  requestAnimationFrame(animate);
}

animate();

// Game logic
let energy = 100;
let shields = 100;

function updateHUD() {
  document.getElementById('energy').textContent = energy;
  document.getElementById('shields').textContent = shields;
}

document.getElementById('exploreBtn').addEventListener('click', () => {
  energy = Math.max(0, energy - 10);
  updateHUD();
  alert('Exploring new star system...');
});

document.getElementById('combatBtn').addEventListener('click', () => {
  shields = Math.max(0, shields - 20);
  updateHUD();
  alert('Engaging in space combat!');
});

document.getElementById('tradeBtn').addEventListener('click', () => {
  energy = Math.min(100, energy + 20);
  updateHUD();
  alert('Trading with alien merchants...');
});

// Spaceship movement
const spaceship = document.getElementById('spaceship');
document.addEventListener('mousemove', (e) => {
  const x = e.clientX;
  const y = e.clientY;
  spaceship.style.left = `${x - 50}px`;
  spaceship.style.top = `${y - 50}px`;
});

</script>
</body></html>
