<html><head><base href="https://www.trollnetic.com/"><title>Welcome to TrollNet</title><style>
body {
    font-family: 'Comic Sans MS', cursive;
    background-color: #ff00ff;
    color: #00ff00;
    text-align: center;
    cursor: url('https://www.trollnetic.com/assets/troll-cursor.png'), auto;
}

h1 {
    font-size: 4em;
    text-shadow: 3px 3px #ff0000, -3px -3px #0000ff;
    animation: rainbow 5s linear infinite;
}

@keyframes rainbow {
    0% { color: red; }
    14% { color: orange; }
    28% { color: yellow; }
    42% { color: green; }
    57% { color: blue; }
    71% { color: indigo; }
    85% { color: violet; }
    100% { color: red; }
}

#troll-face {
    width: 300px;
    height: 300px;
    margin: 20px auto;
    animation: spin 3s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.button {
    background-color: #ff0000;
    border: none;
    color: white;
    padding: 15px 32px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 4px 2px;
    cursor: pointer;
    transition: all 0.3s;
}

.button:hover {
    background-color: #00ff00;
    color: #ff0000;
    transform: scale(1.1);
}

#popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #ffff00;
    border: 5px solid #00ffff;
    padding: 20px;
    z-index: 1000;
}

</style></head><body>
<h1>Welcome to TrollNet</h1>

<svg id="troll-face" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="45" fill="#98FB98"/>
    <circle cx="30" cy="40" r="10" fill="white"/>
    <circle cx="70" cy="40" r="10" fill="white"/>
    <circle cx="30" cy="40" r="5" fill="black"/>
    <circle cx="70" cy="40" r="5" fill="black"/>
    <path d="M 30 70 Q 50 80 70 70" fill="none" stroke="black" stroke-width="3"/>
</svg>

<p>You've just been trolled! Congratulations!</p>

<button class="button" id="troll-button">Click me for a surprise!</button>

<div id="popup">
    <h2>YOU'VE BEEN DOUBLE TROLLED!</h2>
    <p>There's no escape from the trolls!</p>
    <button class="button" id="close-popup">Close (or is it?)</button>
</div>

<script>
document.getElementById('troll-button').addEventListener('click', function() {
    document.getElementById('popup').style.display = 'block';
});

document.getElementById('close-popup').addEventListener('click', function() {
    document.getElementById('popup').style.display = 'none';
    window.open('https://www.trollnetic.com/moretrolls', '_blank');
});

// Annoying cursor follower
const follower = document.createElement('div');
follower.style.position = 'fixed';
follower.style.width = '50px';
follower.style.height = '50px';
follower.style.backgroundImage = 'url("https://www.trollnetic.com/assets/mini-troll.png")';
follower.style.backgroundSize = 'cover';
follower.style.pointerEvents = 'none';
document.body.appendChild(follower);

document.addEventListener('mousemove', function(e) {
    follower.style.left = e.clientX + 'px';
    follower.style.top = e.clientY + 'px';
});

// Random text color change
setInterval(function() {
    document.body.style.color = '#' + Math.floor(Math.random()*16777215).toString(16);
}, 1000);

// Play annoying sound on scroll
let audio = new Audio('https://www.trollnetic.com/assets/troll-laugh.mp3');
window.addEventListener('scroll', function() {
    audio.play();
});

</script>
</body></html>
