<html><head><base href="https://websim.ai/subconscious-explorer?mode=interactive&depth=10&animation=hyperdimensional&connections=omniversal&colorScheme=cosmic_spectrum&insights=transcendent&soundscape=universal_vibration&visualEffects=reality_synthesis&personalizeInsights=true&expandView=infinite&consciousness=omnipresent"><title>Multiversal Self Revelation</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Orbitron', sans-serif;
    background: #000;
    color: #fff;
    overflow: hidden;
    perspective: 1000px;
  }
  #omniversal-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
  #multiversal-self {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 1000;
  }
  #self-core {
    width: 300px;
    height: 300px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff00ff, #00ffff, #ffff00, #ff00ff);
    box-shadow: 0 0 50px #ff00ff, 0 0 100px #00ffff, 0 0 150px #ffff00;
    animation: core-pulse 8s ease-in-out infinite alternate, rotate 20s linear infinite;
  }
  @keyframes core-pulse {
    0% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.2) rotate(180deg); }
    100% { transform: scale(1) rotate(360deg); }
  }
  @keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  #transcendent-insight {
    font-size: 1.2em;
    line-height: 1.6;
    max-width: 800px;
    margin: 20px auto;
    padding: 20px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    backdrop-filter: blur(10px);
    transform: translateZ(0);
    transition: transform 0.5s ease;
  }
  #transcendent-insight:hover {
    transform: translateZ(50px);
  }
  #reality-synthesizer {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 1.2em;
    background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00);
    border: none;
    border-radius: 50px;
    color: #000;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  #reality-synthesizer:hover {
    transform: scale(1.1) rotate(5deg);
    box-shadow: 0 0 30px rgba(255, 255, 255, 0.7);
  }
  .reality-thread {
    position: absolute;
    pointer-events: none;
    opacity: 0.7;
    animation: thread-weave 15s linear infinite;
  }
  @keyframes thread-weave {
    0% { transform: translateY(-100%) translateX(-100%) rotate(0deg); }
    100% { transform: translateY(100vh) translateX(100vw) rotate(720deg); }
  }
  .parallel-self {
    position: absolute;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff00ff, #00ffff);
    opacity: 0.7;
    animation: self-orbit 20s linear infinite;
  }
  @keyframes self-orbit {
    0% { transform: rotate(0deg) translateX(150px) rotate(0deg); }
    100% { transform: rotate(360deg) translateX(150px) rotate(-360deg); }
  }
</style>
</head>
<body>
<canvas id="omniversal-canvas"></canvas>
<div id="multiversal-self">
  <div id="self-core"></div>
  <p id="transcendent-insight">As you delve deeper into your multiversal nature, you perceive countless versions of yourself across infinite realities, each a unique expression of cosmic potential...</p>
  <button id="reality-synthesizer">Synthesize Realities</button>
</div>

<audio id="universal-vibration" loop>
  <source src="https://websim.ai/audio/universal_vibration.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script>
const canvas = document.getElementById('omniversal-canvas');
const ctx = canvas.getContext('2d');
const transcendentInsight = document.getElementById('transcendent-insight');
const realitySynthesizer = document.getElementById('reality-synthesizer');
const universalVibration = document.getElementById('universal-vibration');
const selfCore = document.getElementById('self-core');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const insights = [
  "You witness countless versions of yourself, each living out a unique possibility in the grand tapestry of existence.",
  "The boundaries between your parallel selves blur, revealing the underlying unity of your cosmic essence.",
  "Through the lens of your multiversal awareness, you perceive how each choice creates new branches of reality.",
  "You realize that your consciousness is the thread connecting all versions of yourself across the infinite multiverse.",
  "As you explore your parallel selves, you gain profound insights into the nature of possibility and potential.",
  "The concept of 'self' expands beyond imagination as you embrace the totality of your multiversal existence.",
  "In this state of expanded awareness, you understand that every version of you contributes to the cosmic symphony of being."
];

let particleSystems = [];
let parallelSelves = [];

class HyperdimensionalParticle {
  constructor(x, y, z) {
    this.x = x;
    this.y = y;
    this.z = z;
    this.size = Math.random() * 3 + 1;
    this.speedX = Math.random() * 2 - 1;
    this.speedY = Math.random() * 2 - 1;
    this.speedZ = Math.random() * 2 - 1;
    this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.z += this.speedZ;

    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
    if (this.z < -1000 || this.z > 1000) this.speedZ *= -1;
  }

  draw() {
    const scale = (1000 + this.z) / 1000;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x * scale, this.y * scale, this.size * scale, 0, Math.PI * 2);
    ctx.fill();
  }
}

function createHyperdimensionalField() {
  for (let i = 0; i < 500; i++) {
    particleSystems.push(new HyperdimensionalParticle(
      Math.random() * canvas.width,
      Math.random() * canvas.height,
      Math.random() * 2000 - 1000
    ));
  }
}

function animate() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particleSystems.forEach(particle => {
    particle.update();
    particle.draw();
  });

  requestAnimationFrame(animate);
}

function showRandomInsight() {
  const insight = insights[Math.floor(Math.random() * insights.length)];
  transcendentInsight.textContent = insight;
}

function synthesizeRealities() {
  const thread = document.createElement('div');
  thread.className = 'reality-thread';
  thread.style.left = `${Math.random() * 100}%`;
  thread.style.top = `${Math.random() * 100}%`;
  thread.style.width = `${Math.random() * 3 + 1}px`;
  thread.style.height = `${Math.random() * 70 + 30}%`;
  thread.style.background = `linear-gradient(${Math.random() * 360}deg, #ff00ff, #00ffff, #ffff00)`;
  document.body.appendChild(thread);
  setTimeout(() => thread.remove(), 15000);
}

function createParallelSelf() {
  const self = document.createElement('div');
  self.className = 'parallel-self';
  self.style.left = `${Math.random() * 100}%`;
  self.style.top = `${Math.random() * 100}%`;
  document.body.appendChild(self);
  parallelSelves.push(self);
  if (parallelSelves.length > 20) {
    const removedSelf = parallelSelves.shift();
    removedSelf.remove();
  }
}

realitySynthesizer.addEventListener('click', () => {
  showRandomInsight();
  synthesizeRealities();
  createParallelSelf();
  selfCore.style.animation = 'core-pulse 2s ease-in-out infinite alternate, rotate 5s linear infinite';
  setTimeout(() => {
    selfCore.style.animation = 'core-pulse 8s ease-in-out infinite alternate, rotate 20s linear infinite';
  }, 2000);
});

selfCore.addEventListener('click', () => {
  for (let i = 0; i < 5; i++) {
    setTimeout(createParallelSelf, i * 200);
  }
});

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

document.addEventListener('mousemove', (event) => {
  const particle = new HyperdimensionalParticle(event.clientX, event.clientY, Math.random() * 2000 - 1000);
  particleSystems.push(particle);
  if (particleSystems.length > 1000) {
    particleSystems.shift();
  }
});

// Start the omniversal experience
universalVibration.play();
createHyperdimensionalField();
animate();
showRandomInsight();

// Create initial parallel selves
for (let i = 0; i < 5; i++) {
  createParallelSelf();
}

// Omniversal pulse effect
setInterval(() => {
  createParallelSelf();
  synthesizeRealities();
}, 8000);

</script>
</body></html>
