<html><head><base href="https://galactic-conquest.io">
<title>Galactic Conquest: Space Strategy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap');

  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background-color: #000;
    color: #fff;
    font-family: 'Roboto Mono', monospace;
  }
  #space-canvas {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
  }
  #hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #planet-info {
    position: absolute;
    top: 20px;
    left: 20px;
    background-color: rgba(0, 20, 40, 0.8);
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #0af;
    box-shadow: 0 0 20px rgba(0, 170, 255, 0.5);
    display: none;
    font-family: 'Orbitron', sans-serif;
  }
  #planet-list {
    position: absolute;
    top: 20px;
    right: 20px;
    background-color: rgba(0, 20, 40, 0.8);
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #0af;
    box-shadow: 0 0 20px rgba(0, 170, 255, 0.5);
    max-height: 60%;
    overflow-y: auto;
    font-family: 'Orbitron', sans-serif;
  }
  .planet-item {
    cursor: pointer;
    padding: 8px;
    margin-bottom: 8px;
    border-radius: 5px;
    transition: background-color 0.3s;
  }
  .planet-item:hover {
    background-color: rgba(0, 170, 255, 0.3);
  }
  #terminal {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: calc(100% - 40px);
    height: 200px;
    background-color: rgba(0, 20, 40, 0.8);
    border: 1px solid #0af;
    box-shadow: 0 0 20px rgba(0, 170, 255, 0.5);
    border-radius: 10px;
    color: #0f0;
    font-family: 'Roboto Mono', monospace;
    font-size: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: height 0.3s ease-in-out;
    pointer-events: auto;
  }
  #terminal.minimized {
    height: 40px;
  }
  #terminal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 10px;
    background-color: rgba(0, 40, 80, 0.5);
    border-bottom: 1px solid #0af;
  }
  #terminal-title {
    font-weight: bold;
    color: #0af;
  }
  #terminal-controls {
    display: flex;
  }
  .terminal-button {
    background-color: transparent;
    border: none;
    color: #0af;
    font-size: 18px;
    cursor: pointer;
    margin-left: 10px;
  }
  #terminal-output {
    flex-grow: 1;
    padding: 10px;
    overflow-y: auto;
  }
  #terminal-input {
    display: flex;
    padding: 10px;
    background-color: rgba(0, 40, 80, 0.5);
    border-top: 1px solid #0af;
  }
  #terminal-input span {
    margin-right: 10px;
    color: #0af;
  }
  #command-input {
    flex-grow: 1;
    background-color: transparent;
    border: none;
    color: #0f0;
    font-family: 'Roboto Mono', monospace;
    font-size: 14px;
  }
  #command-input:focus {
    outline: none;
  }
  #game-title {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #0af;
    text-shadow: 0 0 10px rgba(0, 170, 255, 0.7);
  }
  #mini-map {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 200px;
    height: 200px;
    background-color: rgba(0, 20, 40, 0.8);
    border: 1px solid #0af;
    box-shadow: 0 0 20px rgba(0, 170, 255, 0.5);
    border-radius: 10px;
  }
  .glow {
    animation: glow 1.5s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from {
      text-shadow: 0 0 5px #0af, 0 0 10px #0af, 0 0 15px #0af, 0 0 20px #0af;
    }
    to {
      text-shadow: 0 0 10px #0af, 0 0 20px #0af, 0 0 30px #0af, 0 0 40px #0af;
    }
  }
</style>
</head>
<body>
<canvas id="space-canvas"></canvas>
<div id="hud">
  <div id="game-title" class="glow">Galactic Conquest</div>
  <div id="planet-info"></div>
  <div id="planet-list"></div>
  <div id="terminal">
    <div id="terminal-header">
      <span id="terminal-title">Command Terminal</span>
      <div id="terminal-controls">
        <button class="terminal-button" id="minimize-terminal">_</button>
        <button class="terminal-button" id="maximize-terminal">□</button>
      </div>
    </div>
    <div id="terminal-output"></div>
    <div id="terminal-input">
      <span>Commander &gt;</span>
      <input type="text" id="command-input" autocomplete="off">
    </div>
  </div>
  <canvas id="mini-map"></canvas>
</div>

<script>
const canvas = document.getElementById('space-canvas');
const ctx = canvas.getContext('2d');
const planetInfo = document.getElementById('planet-info');
const planetList = document.getElementById('planet-list');
const terminal = document.getElementById('terminal');
const terminalOutput = document.getElementById('terminal-output');
const commandInput = document.getElementById('command-input');
const minimizeTerminal = document.getElementById('minimize-terminal');
const maximizeTerminal = document.getElementById('maximize-terminal');
const miniMap = document.getElementById('mini-map');
const miniMapCtx = miniMap.getContext('2d');

// Set canvas size
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
miniMap.width = 200;
miniMap.height = 200;

// Game objects
let planets = [];
let stars = [];
let fleets = [];
let travelingFleet = null;
let orbitingFleets = [];
let sun = null;
let dysonSphere = null;
let blackHole = null;
let spaceStation = null;
let satellite = null;

// Colors
const colors = {
  stars: '#ffffff',
  planets: ['#ff4136', '#ff851b', '#ffdc00', '#2ecc40', '#0074d9', '#b10dc9', '#85144b', '#39cccc', '#3d9970', '#01ff70'],
  fleets: '#7fdbff',
  selectedPlanet: '#ffffff',
  sun: '#ffff00',
  dysonSphere: '#00ffff',
  blackHole: '#000000',
  spaceStation: '#c0c0c0',
  satellite: '#ffffff'
};

// Camera
let camera = {
  x: 0,
  y: 0,
  dragging: false,
  lastX: 0,
  lastY: 0,
  zoom: 1
};

// Initialize game objects
function initializeObjects() {
  // Create stars
  for (let i = 0; i < 3000; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5 + 0.5
    });
  }

  // Create planets
  const planetNames = ['Zenith', 'Nova Prime', 'Elysium', 'Arcadia', 'Nebula', 'Helios', 'Chronos', 'Atlas', 'Olympus', 'Pandora', 'Hyperion', 'Aurora', 'Oblivion', 'Utopia', 'Nexus'];
  for (let i = 0; i < 15; i++) {
    planets.push({
      x: Math.random() * (canvas.width * 2) - canvas.width,
      y: Math.random() * (canvas.height * 2) - canvas.height,
      radius: Math.random() * 30 + 15,
      color: colors.planets[Math.floor(Math.random() * colors.planets.length)],
      selected: false,
      name: planetNames[i],
      population: Math.floor(Math.random() * 1000000000),
      resources: Math.floor(Math.random() * 100000),
      rings: Math.random() < 0.3,
      moons: Math.floor(Math.random() * 3),
      atmosphere: Math.random() < 0.7
    });
  }

  // Create traveling fleet
  const startPlanet = planets[0];
  const endPlanet = planets[1];
  travelingFleet = {
    x: startPlanet.x,
    y: startPlanet.y,
    destX: endPlanet.x,
    destY: endPlanet.y,
    speed: 0.5,
    size: 5,
    progress: 0
  };

  // Create orbiting fleets
  const orbitPlanet = planets[2];
  for (let i = 0; i < 6; i++) {
    orbitingFleets.push({
      angle: (Math.PI * 2 / 6) * i,
      distance: orbitPlanet.radius + 20,
      speed: 0.02,
      size: 3,
      planet: orbitPlanet
    });
  }

  // Create sun
  sun = {
    x: 0,
    y: 0,
    radius: 100,
    color: colors.sun
  };

  // Create Dyson sphere
  dysonSphere = {
    x: 0,
    y: 0,
    radius: 150,
    color: colors.dysonSphere,
    segments: 60,
    rotationSpeed: 0.001
  };

  // Create black hole
  blackHole = {
    x: canvas.width / 4,
    y: canvas.height / 4,
    radius: 50,
    color: colors.blackHole,
    accretionDiskRadius: 80,
    accretionDiskColor: '#FF4500',
    rotationSpeed: 0.005
  };

  // Create space station
  spaceStation = {
    x: -canvas.width / 3,
    y: -canvas.height / 3,
    radius: 40,
    color: colors.spaceStation,
    modules: 6,
    rotationSpeed: 0.001
  };

  // Create satellite
  satellite = {
    x: canvas.width / 3,
    y: -canvas.height / 3,
    size: 15,
    color: colors.satellite,
    orbitRadius: 100,
    orbitSpeed: 0.002,
    orbitAngle: 0
  };

  updatePlanetList();
}

function updatePlanetList() {
  planetList.innerHTML = '<h3>Planets</h3>';
  planets.forEach((planet, index) => {
    const planetItem = document.createElement('div');
    planetItem.className = 'planet-item';
    planetItem.style.color = planet.color;
    planetItem.textContent = planet.name;
    planetItem.onclick = () => selectPlanet(index);
    planetList.appendChild(planetItem);
  });
}

function selectPlanet(index) {
  const planet = planets[index];
  camera.x = planet.x - canvas.width / (2 * camera.zoom);
  camera.y = planet.y - canvas.height / (2 * camera.zoom);
  showPlanetInfo(planet);
}

function showPlanetInfo(planet) {
  planetInfo.style.display = 'block';
  planetInfo.innerHTML = `
    <h3>${planet.name}</h3>
    <p>Population: ${planet.population.toLocaleString()}</p>
    <p>Resources: ${planet.resources.toLocaleString()}</p>
    <p>Moons: ${planet.moons}</p>
    <p>Rings: ${planet.rings ? 'Yes' : 'No'}</p>
    <p>Atmosphere: ${planet.atmosphere ? 'Yes' : 'No'}</p>
  `;
}

// Draw stars
function drawStars() {
  ctx.fillStyle = colors.stars;
  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

// Draw planets
function drawPlanets() {
  planets.forEach((planet, index) => {
    const x = (planet.x - camera.x) * camera.zoom;
    const y = (planet.y - camera.y) * camera.zoom;
    const radius = planet.radius * camera.zoom;

    // Draw atmosphere
    if (planet.atmosphere) {
      const gradient = ctx.createRadialGradient(x, y, radius, x, y, radius * 1.5);
      gradient.addColorStop(0, `${planet.color}33`);
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw planet
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fillStyle = planet.color;
    ctx.fill();

    // Draw rings
    if (planet.rings) {
      ctx.beginPath();
      ctx.ellipse(x, y, radius * 1.8, radius * 0.3, Math.PI / 6, 0, Math.PI * 2);
      ctx.strokeStyle = `${planet.color}88`;
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    // Draw moons
    for (let i = 0; i < planet.moons; i++) {
      const angle = (Date.now() / 1000 + i * Math.PI / 2) % (Math.PI * 2);
      const moonX = x + Math.cos(angle) * (radius * 1.5);
      const moonY = y + Math.sin(angle) * (radius * 1.5);
      ctx.beginPath();
      ctx.arc(moonX, moonY, radius * 0.2, 0, Math.PI * 2);
      ctx.fillStyle = '#aaa';
      ctx.fill();
    }

    if (planet.selected) {
      ctx.strokeStyle = colors.selectedPlanet;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Draw planet name
    ctx.fillStyle = '#ffffff';
    ctx.font = `${12 * camera.zoom}px Orbitron`;
    ctx.textAlign = 'center';
    ctx.fillText(planet.name, x, y + radius + 15 * camera.zoom);
  });
}

// Draw fleets
function drawFleets() {
  ctx.fillStyle = colors.fleets;

  // Draw traveling fleet
  ctx.beginPath();
  ctx.moveTo((travelingFleet.x - camera.x) * camera.zoom, (travelingFleet.y - camera.y - travelingFleet.size) * camera.zoom);
  ctx.lineTo((travelingFleet.x - camera.x - travelingFleet.size) * camera.zoom, (travelingFleet.y - camera.y + travelingFleet.size) * camera.zoom);
  ctx.lineTo((travelingFleet.x - camera.x + travelingFleet.size) * camera.zoom, (travelingFleet.y - camera.y + travelingFleet.size) * camera.zoom);
  ctx.closePath();
  ctx.fill();

  // Draw route
  ctx.beginPath();
  ctx.moveTo((planets[0].x - camera.x) * camera.zoom, (planets[0].y - camera.y) * camera.zoom);
  ctx.lineTo((planets[1].x - camera.x) * camera.zoom, (planets[1].y - camera.y) * camera.zoom);
  ctx.strokeStyle = colors.fleets;
  ctx.setLineDash([5, 5]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw orbiting fleets
  orbitingFleets.forEach(fleet => {
    const x = (fleet.planet.x + Math.cos(fleet.angle) * fleet.distance - camera.x) * camera.zoom;
    const y = (fleet.planet.y + Math.sin(fleet.angle) * fleet.distance - camera.y) * camera.zoom;
    ctx.beginPath();
    ctx.moveTo(x, y - fleet.size * camera.zoom);
    ctx.lineTo(x - fleet.size * camera.zoom, y + fleet.size * camera.zoom);
    ctx.lineTo(x + fleet.size * camera.zoom, y + fleet.size * camera.zoom);
    ctx.closePath();
    ctx.fill();
  });

  // Draw regular fleets
  fleets.forEach(fleet => {
    ctx.beginPath();
    ctx.moveTo((fleet.x - camera.x) * camera.zoom, (fleet.y - camera.y - fleet.size) * camera.zoom);
    ctx.lineTo((fleet.x - camera.x - fleet.size) * camera.zoom, (fleet.y - camera.y + fleet.size) * camera.zoom);
    ctx.lineTo((fleet.x - camera.x + fleet.size) * camera.zoom, (fleet.y - camera.y + fleet.size) * camera.zoom);
    ctx.closePath();
    ctx.fill();

    if (fleet.destX !== undefined && fleet.destY !== undefined) {
      ctx.beginPath();
      ctx.moveTo((fleet.x - camera.x) * camera.zoom, (fleet.y - camera.y) * camera.zoom);
      ctx.lineTo((fleet.destX - camera.x) * camera.zoom, (fleet.destY - camera.y) * camera.zoom);
      ctx.strokeStyle = colors.fleets;
      ctx.setLineDash([5, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  });
}

// Draw sun
function drawSun() {
  const gradient = ctx.createRadialGradient(
    (sun.x - camera.x) * camera.zoom, (sun.y - camera.y) * camera.zoom, 0,
    (sun.x - camera.x) * camera.zoom, (sun.y - camera.y) * camera.zoom, sun.radius * camera.zoom
  );
  gradient.addColorStop(0, '#fff');
  gradient.addColorStop(0.3, '#ffff00');
  gradient.addColorStop(1, 'rgba(255, 255, 0, 0)');

  ctx.beginPath();
  ctx.arc((sun.x - camera.x) * camera.zoom, (sun.y - camera.y) * camera.zoom, sun.radius * camera.zoom, 0, Math.PI * 2);
  ctx.fillStyle = gradient;
  ctx.fill();

  // Draw solar flares
  const flareCount = 8;
  for (let i = 0; i < flareCount; i++) {
    const angle = (Date.now() / 1000 + i * Math.PI / 4) % (Math.PI * 2);
    const flareLength = sun.radius * (0.2 + Math.sin(Date.now() / 500 + i) * 0.1);
    ctx.beginPath();
    ctx.moveTo(
      (sun.x - camera.x) * camera.zoom + Math.cos(angle) * sun.radius * camera.zoom,
      (sun.y - camera.y) * camera.zoom + Math.sin(angle) * sun.radius * camera.zoom
    );
    ctx.lineTo(
      (sun.x - camera.x) * camera.zoom + Math.cos(angle) * (sun.radius + flareLength) * camera.zoom,
      (sun.y - camera.y) * camera.zoom + Math.sin(angle) * (sun.radius + flareLength) * camera.zoom
    );
    ctx.strokeStyle = 'rgba(255, 255, 0, 0.7)';
    ctx.lineWidth = 3 * camera.zoom;
    ctx.stroke();
  }
}

// Draw Dyson sphere
function drawDysonSphere() {
  ctx.strokeStyle = dysonSphere.color;
  ctx.lineWidth = 2;

  for (let i = 0; i < dysonSphere.segments; i++) {
    const angle1 = (i / dysonSphere.segments) * Math.PI * 2 + dysonSphere.rotationSpeed * Date.now();
    const angle2 = ((i + 1) / dysonSphere.segments) * Math.PI * 2 + dysonSphere.rotationSpeed * Date.now();

    const x1 = (dysonSphere.x + Math.cos(angle1) * dysonSphere.radius - camera.x) * camera.zoom;
    const y1 = (dysonSphere.y + Math.sin(angle1) * dysonSphere.radius - camera.y) * camera.zoom;
    const x2 = (dysonSphere.x + Math.cos(angle2) * dysonSphere.radius - camera.x) * camera.zoom;
    const y2 = (dysonSphere.y + Math.sin(angle2) * dysonSphere.radius - camera.y) * camera.zoom;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // Draw energy collection points
  const collectionPoints = 12;
  for (let i = 0; i < collectionPoints; i++) {
    const angle = (i / collectionPoints) * Math.PI * 2 + dysonSphere.rotationSpeed * Date.now();
    const x = (dysonSphere.x + Math.cos(angle) * dysonSphere.radius - camera.x) * camera.zoom;
    const y = (dysonSphere.y + Math.sin(angle) * dysonSphere.radius - camera.y) * camera.zoom;

    ctx.beginPath();
    ctx.arc(x, y, 5 * camera.zoom, 0, Math.PI * 2);
    ctx.fillStyle = '#00ffff';
    ctx.fill();

    // Draw energy beam
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo((dysonSphere.x - camera.x) * camera.zoom, (dysonSphere.y - camera.y) * camera.zoom);
    ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
    ctx.lineWidth = 2 * camera.zoom;
    ctx.stroke();
  }
}

// Draw black hole
function drawBlackHole() {
  const x = (blackHole.x - camera.x) * camera.zoom;
  const y = (blackHole.y - camera.y) * camera.zoom;
  const radius = blackHole.radius * camera.zoom;

  // Draw accretion disk
  const gradient = ctx.createRadialGradient(x, y, radius, x, y, blackHole.accretionDiskRadius * camera.zoom);
  gradient.addColorStop(0, 'rgba(255, 69, 0, 0)');
  gradient.addColorStop(0.7, 'rgba(255, 69, 0, 0.7)');
  gradient.addColorStop(1, 'rgba(255, 69, 0, 0)');

  ctx.beginPath();
  ctx.arc(x, y, blackHole.accretionDiskRadius * camera.zoom, 0, Math.PI * 2);
  ctx.fillStyle = gradient;
  ctx.fill();

  // Draw event horizon
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = blackHole.color;
  ctx.fill();

  // Draw gravitational lensing effect
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const lensGradient = ctx.createRadialGradient(x, y, radius, x, y, radius * 3);
  lensGradient.addColorStop(0, 'rgba(0, 0, 0, 0.8)');
  lensGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = lensGradient;
  ctx.beginPath();
  ctx.arc(x, y, radius * 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// Draw space station
function drawSpaceStation() {
  const x = (spaceStation.x - camera.x) * camera.zoom;
  const y = (spaceStation.y - camera.y) * camera.zoom;
  const radius = spaceStation.radius * camera.zoom;

  // Draw central hub
  ctx.beginPath();
  ctx.arc(x, y, radius * 0.4, 0, Math.PI * 2);
  ctx.fillStyle = spaceStation.color;
  ctx.fill();

  // Draw modules
  for (let i = 0; i < spaceStation.modules; i++) {
    const angle = (i / spaceStation.modules) * Math.PI * 2 + spaceStation.rotationSpeed * Date.now();
    const moduleX = x + Math.cos(angle) * radius * 0.7;
    const moduleY = y + Math.sin(angle) * radius * 0.7;

    ctx.beginPath();
    ctx.rect(moduleX - radius * 0.15, moduleY - radius * 0.15, radius * 0.3, radius * 0.3);
    ctx.fillStyle = spaceStation.color;
    ctx.fill();

    // Draw solar panels
    ctx.beginPath();
    ctx.moveTo(moduleX, moduleY);
    ctx.lineTo(moduleX + Math.cos(angle) * radius * 0.5, moduleY + Math.sin(angle) * radius * 0.5);
    ctx.strokeStyle = '#4169E1';
    ctx.lineWidth = 3 * camera.zoom;
    ctx.stroke();
  }

  // Draw docking port
  ctx.beginPath();
  ctx.moveTo(x + radius * 0.4, y);
  ctx.lineTo(x + radius, y);
  ctx.strokeStyle = spaceStation.color;
  ctx.lineWidth = 5 * camera.zoom;
  ctx.stroke();

  // Draw station name
  ctx.fillStyle = '#ffffff';
  ctx.font = `${14 * camera.zoom}px Orbitron`;
  ctx.textAlign = 'center';
  ctx.fillText("Orbital Nexus", x, y + radius + 20 * camera.zoom);
}

// Draw satellite
function drawSatellite() {
  const centerX = (satellite.x - camera.x) * camera.zoom;
  const centerY = (satellite.y - camera.y) * camera.zoom;
  
  // Update satellite position
  satellite.orbitAngle += satellite.orbitSpeed;
  const x = centerX + Math.cos(satellite.orbitAngle) * satellite.orbitRadius * camera.zoom;
  const y = centerY + Math.sin(satellite.orbitAngle) * satellite.orbitRadius * camera.zoom;

  // Draw satellite body
  ctx.beginPath();
  ctx.rect(x - satellite.size * camera.zoom / 2, y - satellite.size * camera.zoom / 4, satellite.size * camera.zoom, satellite.size * camera.zoom / 2);
  ctx.fillStyle = satellite.color;
  ctx.fill();

  // Draw solar panels
  ctx.beginPath();
  ctx.rect(x - satellite.size * camera.zoom, y - satellite.size * camera.zoom / 8, satellite.size * camera.zoom / 2, satellite.size * camera.zoom / 4);
  ctx.rect(x + satellite.size * camera.zoom / 2, y - satellite.size * camera.zoom / 8, satellite.size * camera.zoom / 2, satellite.size * camera.zoom / 4);
  ctx.fillStyle = '#4169E1';
  ctx.fill();

  // Draw satellite dish
  ctx.beginPath();
  ctx.arc(x, y - satellite.size * camera.zoom / 2, satellite.size * camera.zoom / 4, 0, Math.PI * 2);
  ctx.fillStyle = '#C0C0C0';
  ctx.fill();

  // Draw orbit path
  ctx.beginPath();
  ctx.arc(centerX, centerY, satellite.orbitRadius * camera.zoom, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
  ctx.setLineDash([5, 5]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw satellite name
  ctx.fillStyle = '#ffffff';
  ctx.font = `${10 * camera.zoom}px Orbitron`;
  ctx.textAlign = 'center';
  ctx.fillText("GalactiCom-1", x, y + satellite.size * camera.zoom);
}

// Draw mini-map
function drawMiniMap() {
  miniMapCtx.fillStyle = '#000';
  miniMapCtx.fillRect(0, 0, miniMap.width, miniMap.height);

  const mapScale = 0.1;
  const mapOffsetX = miniMap.width / 2;
  const mapOffsetY = miniMap.height / 2;

  // Draw planets on mini-map
  planets.forEach(planet => {
    miniMapCtx.beginPath();
    miniMapCtx.arc(
      planet.x * mapScale + mapOffsetX,
      planet.y * mapScale + mapOffsetY,
      2,
      0,
      Math.PI * 2
    );
    miniMapCtx.fillStyle = planet.color;
    miniMapCtx.fill();
  });

  // Draw sun on mini-map
  miniMapCtx.beginPath();
  miniMapCtx.arc(
    sun.x * mapScale + mapOffsetX,
    sun.y * mapScale + mapOffsetY,
    4,
    0,
    Math.PI * 2
  );
  miniMapCtx.fillStyle = sun.color;
  miniMapCtx.fill();

  // Draw black hole on mini-map
  miniMapCtx.beginPath();
  miniMapCtx.arc(
    blackHole.x * mapScale + mapOffsetX,
    blackHole.y * mapScale + mapOffsetY,
    3,
    0,
    Math.PI * 2
  );
  miniMapCtx.fillStyle = '#FF4500';
  miniMapCtx.fill();

  // Draw space station on mini-map
  miniMapCtx.fillStyle = spaceStation.color;
  miniMapCtx.fillRect(
    spaceStation.x * mapScale + mapOffsetX - 2,
    spaceStation.y * mapScale + mapOffsetY - 2,
    4,
    4
  );

  // Draw satellite on mini-map
  miniMapCtx.fillStyle = satellite.color;
  miniMapCtx.fillRect(
    satellite.x * mapScale + mapOffsetX - 1,
    satellite.y * mapScale + mapOffsetY - 1,
    2,
    2
  );

  // Draw camera view on mini-map
  const viewX = (camera.x + canvas.width / (2 * camera.zoom)) * mapScale + mapOffsetX;
  const viewY = (camera.y + canvas.height / (2 * camera.zoom)) * mapScale + mapOffsetY;
  const viewWidth = (canvas.width / camera.zoom) * mapScale;
  const viewHeight = (canvas.height / camera.zoom) * mapScale;

  miniMapCtx.strokeStyle = '#0af';
  miniMapCtx.strokeRect(viewX - viewWidth / 2, viewY - viewHeight / 2, viewWidth, viewHeight);
}

// Update game objects
function updateObjects() {
  // Move traveling fleet
  travelingFleet.progress += travelingFleet.speed / 100;
  if (travelingFleet.progress > 1) travelingFleet.progress = 0;
  
  travelingFleet.x = planets[0].x + (planets[1].x - planets[0].x) * travelingFleet.progress;
  travelingFleet.y = planets[0].y + (planets[1].y - planets[0].y) * travelingFleet.progress;

  // Move orbiting fleets
  orbitingFleets.forEach(fleet => {
    fleet.angle += fleet.speed;
    if (fleet.angle > Math.PI * 2) fleet.angle -= Math.PI * 2;
  });

  // Move regular fleets
  fleets.forEach(fleet => {
    if (fleet.destX !== undefined && fleet.destY !== undefined) {
      const dx = fleet.destX - fleet.x;
      const dy = fleet.destY - fleet.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      
      if (distance > fleet.speed) {
        fleet.x += (dx / distance) * fleet.speed;
        fleet.y += (dy / distance) * fleet.speed;
      } else {
        fleet.x = fleet.destX;
        fleet.y = fleet.destY;
        fleet.destX = undefined;
        fleet.destY = undefined;
      }
    }
  });

  // Update satellite position
  satellite.orbitAngle += satellite.orbitSpeed;
  if (satellite.orbitAngle > Math.PI * 2) satellite.orbitAngle -= Math.PI * 2;
}

// Handle mouse click
function handleClick(event) {
  const rect = canvas.getBoundingClientRect();
  const mouseX = event.clientX - rect.left + camera.x;
  const mouseY = event.clientY - rect.top + camera.y;

  let clickedPlanet = null;
  for (let i = planets.length - 1; i >= 0; i--) {
    const planet = planets[i];
    const distance = Math.sqrt(Math.pow(mouseX - planet.x, 2) + Math.pow(mouseY - planet.y, 2));
    if (distance <= planet.radius) {
      clickedPlanet = planet;
      break;
    }
  }

  planets.forEach(planet => planet.selected = false);

  if (clickedPlanet) {
    clickedPlanet.selected = true;
    showPlanetInfo(clickedPlanet);
  } else {
    planetInfo.style.display = 'none';
  }
}

// Handle mouse down
function handleMouseDown(event) {
  camera.dragging = true;
  camera.lastX = event.clientX;
  camera.lastY = event.clientY;
}

// Handle mouse move
function handleMouseMove(event) {
  if (camera.dragging) {
    const deltaX = event.clientX - camera.lastX;
    const deltaY = event.clientY - camera.lastY;
    camera.x -= deltaX / camera.zoom;
    camera.y -= deltaY / camera.zoom;
    camera.lastX = event.clientX;
    camera.lastY = event.clientY;
  }
}

// Handle mouse up
function handleMouseUp() {
  camera.dragging = false;
}

// Handle mouse wheel for zooming
function handleWheel(event) {
  event.preventDefault();
  const zoomSpeed = 0.1;
  const zoomFactor = event.deltaY > 0 ? (1 - zoomSpeed) : (1 + zoomSpeed);
  const oldZoom = camera.zoom;
  camera.zoom *= zoomFactor;
  camera.zoom = Math.max(0.1, Math.min(camera.zoom, 5)); // Limit zoom between 0.1 and 5

  // Adjust camera position to zoom towards mouse position
  const rect = canvas.getBoundingClientRect();
  const mouseX = event.clientX - rect.left;
  const mouseY = event.clientY - rect.top;
  
  camera.x += (mouseX / oldZoom - mouseX / camera.zoom);
  camera.y += (mouseY / oldZoom - mouseY / camera.zoom);
}

// Terminal functions
function addToTerminal(text) {
  const line = document.createElement('div');
  line.textContent = text;
  terminalOutput.appendChild(line);
  terminalOutput.scrollTop = terminalOutput.scrollHeight;
}

function executeCommand(command) {
  addToTerminal(`Commander > ${command}`);
  
  const parts = command.toLowerCase().split(' ');
  const action = parts[0];

  switch (action) {
    case 'help':
      addToTerminal('Available commands:');
      addToTerminal('help - Show this help message');
      addToTerminal('list planets - List all planets');
      addToTerminal('create fleet [size] [planet] - Create a new fleet at the specified planet');
      addToTerminal('move fleet [index] [planet] - Move the specified fleet to the target planet');
      addToTerminal('status - Show the status of all fleets');
      break;
    case 'list':
      if (parts[1] === 'planets') {
        planets.forEach((planet, index) => {
          addToTerminal(`${index}: ${planet.name} - Population: ${planet.population}, Resources: ${planet.resources}`);
        });
      } else {
        addToTerminal('Unknown list command. Try "list planets".');
      }
      break;
    case 'create':
      if (parts[1] === 'fleet' && parts[2] && parts[3]) {
        const size = parseInt(parts[2]);
        const planetIndex = parseInt(parts[3]);
        if (isNaN(size) || isNaN(planetIndex) || planetIndex < 0 || planetIndex >= planets.length) {
          addToTerminal('Invalid fleet creation command. Usage: create fleet [size] [planet]');
        } else {
          const planet = planets[planetIndex];
          fleets.push({
            x: planet.x,
            y: planet.y,
            size: Math.min(size, 10),
            speed: 2,
          });
          addToTerminal(`Fleet created at ${planet.name} with size ${Math.min(size, 10)}`);
        }
      } else {
        addToTerminal('Invalid create command. Try "create fleet [size] [planet]".');
      }
      break;
    case 'move':
      if (parts[1] === 'fleet' && parts[2] && parts[3]) {
        const fleetIndex = parseInt(parts[2]);
        const planetIndex = parseInt(parts[3]);
        if (isNaN(fleetIndex) || isNaN(planetIndex) || fleetIndex < 0 || fleetIndex >= fleets.length || planetIndex < 0 || planetIndex >= planets.length) {
          addToTerminal('Invalid move command. Usage: move fleet [index] [planet]');
        } else {
          const fleet = fleets[fleetIndex];
          const planet = planets[planetIndex];
          fleet.destX = planet.x;
          fleet.destY = planet.y;
          addToTerminal(`Moving fleet ${fleetIndex} to ${planet.name}`);
        }
      } else {
        addToTerminal('Invalid move command. Try "move fleet [index] [planet]".');
      }
      break;
    case 'status':
      if (fleets.length === 0) {
        addToTerminal('No fleets available.');
      } else {
        fleets.forEach((fleet, index) => {
          let status = `Fleet ${index}: Size ${fleet.size}, Position (${Math.round(fleet.x)}, ${Math.round(fleet.y)})`;
          if (fleet.destX !== undefined && fleet.destY !== undefined) {
            status += ` - Moving to (${Math.round(fleet.destX)}, ${Math.round(fleet.destY)})`;
          } else {
            status += ' - Idle';
          }
          addToTerminal(status);
        });
      }
      break;
    default:
      addToTerminal('Unknown command. Type "help" for a list of commands.');
  }
}

// Main game loop
function gameLoop() {
  // Clear canvas
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw game objects
  drawStars();
  drawPlanets();
  drawFleets();
  drawSun();
  drawDysonSphere();
  drawBlackHole();
  drawSpaceStation();
  drawSatellite();

  // Update game objects
  updateObjects();

  // Draw mini-map
  drawMiniMap();

  // Request next frame
  requestAnimationFrame(gameLoop);
}

// Initialize and start the game
initializeObjects();
gameLoop();

// Add event listeners
canvas.addEventListener('click', handleClick);
canvas.addEventListener('mousedown', handleMouseDown);
canvas.addEventListener('mousemove', handleMouseMove);
canvas.addEventListener('mouseup', handleMouseUp);
canvas.addEventListener('mouseleave', handleMouseUp);
canvas.addEventListener('wheel', handleWheel);

commandInput.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') {
    const command = commandInput.value.trim();
    if (command) {
      executeCommand(command);
      commandInput.value = '';
    }
  }
});

// Minimize and maximize terminal
minimizeTerminal.addEventListener('click', () => {
  terminal.classList.add('minimized');
});

maximizeTerminal.addEventListener('click', () => {
  terminal.classList.remove('minimized');
});

// Resize canvas when window is resized
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Focus on command input when clicking on terminal
terminal.addEventListener('click', () => {
  commandInput.focus();
});

// Initial focus on command input
commandInput.focus();

</script>
