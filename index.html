<html><head><base href="https://kusanagi-motoko.cyborg">
<meta charset="UTF-8">
<title>草薙素子 - Motoko Kusanagi</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Roboto', sans-serif;
    background-color: #0f1c2e;
    color: #e0e0e0;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem;
    text-align: center;
  }
  h1 {
    font-size: 3rem;
    color: #4a9de7;
    margin-bottom: 1rem;
    text-shadow: 0 0 10px rgba(74, 157, 231, 0.5);
  }
  .image-container {
    position: relative;
    width: 400px;
    height: 600px;
    margin: 2rem auto;
    overflow: hidden;
    border: 2px solid #4a9de7;
    box-shadow: 0 0 20px rgba(74, 157, 231, 0.3);
  }
  .kusanagi-svg {
    width: 100%;
    height: 100%;
  }
  .description {
    margin-top: 2rem;
    text-align: left;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">
  <h1>草薙素子</h1>
  <h2>Motoko Kusanagi</h2>
  
  <div class="image-container">
    <svg class="kusanagi-svg" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="skinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#ffdab9;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#ffa07a;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="hairGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#4a0e4e;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#8b008b;stop-opacity:1" />
        </linearGradient>
      </defs>
      
      <!-- Body -->
      <path d="M 150 200 Q 200 180 250 200 L 270 550 Q 200 570 130 550 Z" fill="url(#skinGradient)" />
      
      <!-- Head -->
      <circle cx="200" cy="150" r="100" fill="url(#skinGradient)" />
      
      <!-- Hair -->
      <path d="M 100 150 Q 200 50 300 150 L 280 200 Q 200 230 120 200 Z" fill="url(#hairGradient)" />
      
      <!-- Eyes -->
      <ellipse cx="160" cy="130" rx="15" ry="8" fill="#4a9de7" />
      <ellipse cx="240" cy="130" rx="15" ry="8" fill="#4a9de7" />
      
      <!-- Nose -->
      <path d="M 195 140 Q 200 150 205 140" stroke="#ffa07a" stroke-width="2" fill="none" />
      
      <!-- Mouth -->
      <path d="M 180 170 Q 200 180 220 170" stroke="#ffa07a" stroke-width="2" fill="none" />
      
      <!-- Cybernetic enhancements -->
      <circle cx="180" cy="110" r="5" fill="#4a9de7" />
      <circle cx="220" cy="110" r="5" fill="#4a9de7" />
      <path d="M 100 50 L 120 70 M 300 50 L 280 70" stroke="#4a9de7" stroke-width="3" />
    </svg>
  </div>

  <div class="description">
    <p>草薙素子（くさなぎ もとこ）は、「攻殻機動隊」シリーズの主人公です。彼女は公安9課のリーダーであり、サイボーグの身体を持つ凄腕のハッカーです。紫がかった黒髪と鋭い青い目が特徴的で、常に冷静沈着な態度を保っています。その知性と戦闘能力は群を抜いており、複雑な事件を解決に導きます。</p>
    <p>この SVG 画像は、草薙素子のアイコニックな外見を抽象的に表現しています。サイボーグとしての彼女の特徴を、目の周りの機械的な要素や体の輪郭線で表現しています。</p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', (event) => {
  const kusanagiSvg = document.querySelector('.kusanagi-svg');
  const eyes = kusanagiSvg.querySelectorAll('ellipse');

  kusanagiSvg.addEventListener('mousemove', (e) => {
    const rect = kusanagiSvg.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    eyes.forEach((eye) => {
      const cx = parseFloat(eye.getAttribute('cx'));
      const cy = parseFloat(eye.getAttribute('cy'));
      const angle = Math.atan2(y - cy, x - cx);
      const distance = Math.min(5, Math.sqrt((x - cx) ** 2 + (y - cy) ** 2) / 10);

      const newX = cx + Math.cos(angle) * distance;
      const newY = cy + Math.sin(angle) * distance;

      eye.setAttribute('cx', newX);
      eye.setAttribute('cy', newY);
    });
  });

  kusanagiSvg.addEventListener('mouseleave', () => {
    eyes[0].setAttribute('cx', '160');
    eyes[0].setAttribute('cy', '130');
    eyes[1].setAttribute('cx', '240');
    eyes[1].setAttribute('cy', '130');
  });
});
</script>

</body></html>
