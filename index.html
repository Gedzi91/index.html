<!DOCTYPE html><html><head><base href="https://magic-ball-book.com/"><title>Magic Ball Book Recommendation</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #6e45e2, #88d3ce);
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }
  .container {
    text-align: center;
    color: white;
  }
  #question {
    width: 80%;
    max-width: 400px;
    padding: 10px;
    margin-bottom: 20px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
  }
  button {
    padding: 10px 20px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s;
    margin: 10px;
  }
  button:hover {
    background-color: #45a049;
  }
  .magic-ball-container {
    width: 400px;
    height: 400px;
    margin: 20px auto;
    position: relative;
    perspective: 1000px;
  }
  .magic-ball {
    width: 100%;
    height: 100%;
    background: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExYmRqOXd1NHR5bDR0cmplcDE0Y2xhbTQzNmNxN3pzNmJ0Yzh0MnhkaiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o6ozoD1ByqYv7ARIk/giphy.gif') no-repeat center center;
    background-size: cover;
    border-radius: 50%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s;
  }
  .magic-ball::before {
    content: "";
    position: absolute;
    top: 10%;
    left: 20%;
    width: 20%;
    height: 20%;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.1) 58%);
    filter: blur(5px);
  }
  .answer-window {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 180px;
    height: 100px;
    background-color: rgba(0, 0, 0, 0.7);
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }
  .answer {
    color: #c4e7d4;
    font-size: 14px;
    text-align: center;
    padding: 10px;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #result {
    margin-top: 20px;
    font-size: 18px;
    min-height: 100px;
    animation: fadeIn 1s ease-in-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Magic Ball Book Recommendation</h1>
  <input type="text" id="question" placeholder="Ask a question about entrepreneurship...">
  <button id="askButton">Ask for a Book</button>
  <div class="magic-ball-container">
    <div class="magic-ball">
  <div class="answer-window">
    <div class="answer" id="answer"></div>
  </div>
</div>
  </div>
  <button id="shakeButton" style="display: none;">Shake the Ball</button>
  <div id="result"></div>
</div>

<script>
const shakeSound = new Audio('https://magic-ball-book.com/shake.mp3');
let books = [];

function generateBooks(question) {
  const lowercaseQuestion = question.toLowerCase();
  
  // Generate sarcastic book titles
  const sarcasticTitle1 = generateSarcasticTitle(lowercaseQuestion);
  const sarcasticTitle2 = generateSarcasticTitle(lowercaseQuestion);
  
  // Generate a real book recommendation
  const realBook = generateRealBookRecommendation(lowercaseQuestion);

  books = [
    {
      title: sarcasticTitle1,
      author: generateFunnyAuthorName()
    },
    {
      title: sarcasticTitle2,
      author: generateFunnyAuthorName()
    },
    realBook
  ];
}

function generateSarcasticTitle(question) {
  const sarcasticTitles = [
    `How to ${question.includes('fail') ? 'Succeed' : 'Fail'} at ${capitalizeFirstLetter(question.split(' ').slice(-1)[0])} Without Really Trying`,
    `${question.includes('money') ? 'Lose' : 'Make'} Money Fast: The Art of ${capitalizeFirstLetter(question.split(' ').slice(-1)[0])} Disaster`,
    `The 7 Habits of Highly Ineffective ${capitalizeFirstLetter(question.split(' ').slice(-1)[0])} Enthusiasts`,
    `${capitalizeFirstLetter(question.split(' ').slice(-1)[0])} for Dummies: A Guide to Spectacular Failure`,
    `The 4-Hour ${capitalizeFirstLetter(question.split(' ').slice(-1)[0])}: Achieve Less in Less Time`
  ];
  return sarcasticTitles[Math.floor(Math.random() * sarcasticTitles.length)];
}

function generateFunnyAuthorName() {
  const firstNames = ['Dr.', 'Professor', 'Lord', 'Captain', 'Guru'];
  const lastNames = ['Oopsie', 'Blunder', 'Chaos', 'Mayhem', 'Disaster'];
  return `${firstNames[Math.floor(Math.random() * firstNames.length)]} ${lastNames[Math.floor(Math.random() * lastNames.length)]}`;
}

function generateRealBookRecommendation(question) {
  const realBooks = [
    {
      title: "The Lean Startup: How Today's Entrepreneurs Use Continuous Innovation to Create Radically Successful Businesses",
      author: "Eric Ries",
      buyLink: "https://www.amazon.com/Lean-Startup-Entrepreneurs-Continuous-Innovation/dp/0307887898"
    },
    {
      title: "Zero to One: Notes on Startups, or How to Build the Future",
      author: "Peter Thiel",
      buyLink: "https://www.amazon.com/Zero-One-Notes-Startups-Future/dp/0804139296"
    },
    {
      title: "The $100 Startup: Reinvent the Way You Make a Living, Do What You Love, and Create a New Future",
      author: "Chris Guillebeau",
      buyLink: "https://www.amazon.com/100-Startup-Reinvent-Living-Create/dp/0307951529"
    },
    {
      title: "Thinking, Fast and Slow",
      author: "Daniel Kahneman",
      buyLink: "https://www.amazon.com/Thinking-Fast-Slow-Daniel-Kahneman/dp/0374533555"
    },
    {
      title: "Start with Why: How Great Leaders Inspire Everyone to Take Action",
      author: "Simon Sinek",
      buyLink: "https://www.amazon.com/Start-Why-Leaders-Inspire-Everyone/dp/1591846447"
    }
  ];
  return realBooks[Math.floor(Math.random() * realBooks.length)];
}

function capitalizeFirstLetter(string) {
  return string.charAt(0).toUpperCase() + string.slice(1);
}

let shakeCount = 0;

function shakeBall() {
  const ball = document.querySelector('.magic-ball');
  ball.style.transform = `rotateZ(${Math.random() * 40 - 20}deg) rotateY(${Math.random() * 40 - 20}deg)`;
  setTimeout(() => {
    ball.style.transform = 'rotateZ(0deg) rotateY(0deg)';
  }, 250);
  shakeSound.play();
}

function displayAnswer(text) {
  const answer = document.getElementById('answer');
  answer.innerHTML = text;
  answer.style.opacity = 1;
}

function hideAnswer() {
  const answer = document.getElementById('answer');
  answer.style.opacity = 0;
}

function shake() {
  let shakeInterval = setInterval(shakeBall, 150);
  setTimeout(() => {
    clearInterval(shakeInterval);
    displayResult();
  }, 3000);
}

function displayResult() {
  shakeCount++;
  let bookInfo, resultText;

  if (shakeCount === 1) {
    bookInfo = books[0];
    resultText = "Oops! I'm sorry, give me another shake. I'll be serious this time, pakka promise! 🙏😅";
    displayAnswer(`<span style="font-size: 12px; font-weight: bold;">${bookInfo.title}</span><br><span style="font-size: 10px; font-style: italic; color: #a0e6ff;">by ${bookInfo.author}</span>`);
  } else if (shakeCount === 2) {
    hideAnswer();
    bookInfo = books[1];
    resultText = "Hmm... The magic ball is thinking deeply. One more shake might reveal the perfect book for you! 🤔✨";
    setTimeout(() => {
      displayAnswer(`<span style="font-size: 12px; font-weight: bold;">${bookInfo.title}</span><br><span style="font-size: 10px; font-style: italic; color: #a0e6ff;">by ${bookInfo.author}</span>`);
    }, 1000);
  } else if (shakeCount === 3) {
    hideAnswer();
    bookInfo = books[2];
    resultText = "Aha! The magic ball has found the perfect book for you. It's a game-changer for entrepreneurs! 🚀📈💡";
    setTimeout(() => {
      displayAnswer(`<span style="font-size: 12px; font-weight: bold;">${bookInfo.title}</span><br><span style="font-size: 10px; font-style: italic; color: #a0e6ff;">by ${bookInfo.author}</span>`);
    }, 1000);
    shakeCount = 0;
  }

  document.getElementById('result').innerHTML = resultText;
  
  setTimeout(() => {
    if (shakeCount === 0) {
      document.getElementById('shakeButton').textContent = 'Buy the Book';
      document.getElementById('shakeButton').removeEventListener('click', shake);
      document.getElementById('shakeButton').addEventListener('click', () => {
        window.open(books[2].buyLink, '_blank');
      });
    } else {
      document.getElementById('shakeButton').textContent = 'Shake Again';
    }
    document.getElementById('shakeButton').style.display = 'inline-block';
    if (shakeCount === 0) {
      document.getElementById('askButton').style.display = 'inline-block';
    }
  }, 1000);
}

document.getElementById('askButton').addEventListener('click', () => {
  const question = document.getElementById('question').value;
  if (!question) {
    alert('Please enter a question about entrepreneurship.');
    return;
  }

  generateBooks(question);
  shakeCount = 0;
  hideAnswer();
  document.getElementById('result').innerHTML = '';
  document.getElementById('askButton').style.display = 'none';
  document.getElementById('shakeButton').style.display = 'inline-block';
  document.getElementById('shakeButton').textContent = 'Shake the Ball';
  document.getElementById('shakeButton').removeEventListener('click', () => {
    window.open(books[2].buyLink, '_blank');
  });
  document.getElementById('shakeButton').addEventListener('click', shake);
  shake();
});

document.getElementById('shakeButton').addEventListener('click', shake);

// Hide the shake button initially
document.getElementById('shakeButton').style.display = 'none';
</script>
</body></html>
