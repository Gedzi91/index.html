<html><head><base href="https://websim.ai/c/3d-spinning-duck-sphere"><title>3D Spinning Duck Sphere</title><style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

#canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.info {
  position: fixed;
  bottom: 20px;
  left: 20px;
  font-size: 18px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  z-index: 10;
}

</style></head><body>
<canvas id="canvas"></canvas>
<div class="info">
  <p>Welcome to the 3D Spinning Duck Sphere!</p>
  <p>Ducks: <span id="duckCount">0</span></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const duckCountElement = document.getElementById('duckCount');
let duckCount = 0;

// Create sphere
const sphereGeometry = new THREE.SphereGeometry(5, 32, 32);
const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0x3498db, wireframe: true });
const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
scene.add(sphere);

// Create duck texture
const duckTexture = new THREE.TextureLoader().load('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%23FFD700" d="M50 90C72.08 90 90 72.08 90 50S72.08 10 50 10 10 27.92 10 50s17.92 40 40 40z"/><circle cx="65" cy="35" r="5" fill="%23000"/><path fill="%23FF6347" d="M40 60s5 10 20 10 20-10 20-10H40z"/></svg>');

function createDuck() {
  const duckGeometry = new THREE.PlaneGeometry(0.5, 0.5);
  const duckMaterial = new THREE.MeshBasicMaterial({ map: duckTexture, transparent: true });
  const duck = new THREE.Mesh(duckGeometry, duckMaterial);

  const phi = Math.acos(-1 + (2 * Math.random()));
  const theta = 2 * Math.PI * Math.random();
  
  duck.position.setFromSpherical(new THREE.Spherical(5, phi, theta));
  duck.lookAt(0, 0, 0);

  sphere.add(duck);
  duckCount++;
  duckCountElement.textContent = duckCount;
}

function addDucks(count) {
  for (let i = 0; i < count; i++) {
    createDuck();
  }
}

// Start with 50 ducks
addDucks(50);

camera.position.z = 10;

// Animation
function animate() {
  requestAnimationFrame(animate);
  
  sphere.rotation.x += 0.002;
  sphere.rotation.y += 0.003;
  
  renderer.render(scene, camera);
}

animate();

// Add a new duck every second
setInterval(() => addDucks(1), 1000);

// Handle window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body></html>
