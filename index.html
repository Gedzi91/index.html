<html><head><base href="https://static.wikia.nocookie.net/umineko/images/b/b4/Kotonoha_mei_%25281%2529.png%20as%20in%20the%20title%20screen%20with%20chomix">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chillguy Clicker</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f0e6ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }
        #title-screen {
            text-align: center;
            background-color: rgba(255,255,255,0.8);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #title-images {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        #chomik, #kotonoha, #elliot {
            width: 250px;
            height: auto;
            cursor: pointer;
            transition: transform 0.1s ease;
            border-radius: 15px;
        }
        #chomik:active, #kotonoha:active, #elliot:active {
            transform: scale(0.95);
        }
        #start-btn {
            background-color: #8A4FFF;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        #start-btn:hover {
            background-color: #6A2FDD;
        }
        #game-container {
            text-align: center;
        }
        #characters {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .character {
            width: 200px;
            height: auto;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .character:active {
            transform: scale(0.95);
        }
        #score {
            font-size: 24px;
            margin: 20px 0;
        }
        #upgrades {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .upgrade-btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .upgrade-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div id="title-screen">
        <h1>Chillguy Clicker</h1>
        <div id="title-images">
            <img id="chomik" src="/Chomik-hampster12_11_44_.gif" alt="Chomik Hamster">
            <img id="kotonoha" src="https://static.wikia.nocookie.net/umineko/images/b/b4/Kotonoha_mei_%281%29.png" alt="Kotonoha">
            <img id="elliot" src="https://static.wikia.nocookie.net/incredibox/images/9/90/Elliot%28ingame%29.png" alt="Elliot">
        </div>
        <button id="start-btn">Start Game</button>
    </div>

    <div id="game-container" style="display:none;">
        <h1>Character Clicker</h1>
        <div id="score">Chill Points: 0</div>
        <div id="characters">
            <img id="chillguy" class="character" src="/Chill_guy_original_artwork.jpg" alt="Chillguy">
            <img id="wilt" class="character" src="/Wilt.jpg" alt="Wilt">
            <img id="upset" class="character" src="/Screenshot_20241112-125843~2.jpg" alt="Upset Character">
            <img id="extra-character" class="character" src="/Screenshot_20241108-124910~2.jpg" alt="Extra Character">
        </div>
        <div id="upgrades">
            <button class="upgrade-btn" id="autoClickerBtn">Auto Clicker (Cost: 10)</button>
            <button class="upgrade-btn" id="multiClickerBtn">Multi Clicker (Cost: 50)</button>
        </div>
    </div>

    <script>
        let score = 0;
        let autoClickerCount = 0;
        let multiClickerLevel = 0;

        const scoreDisplay = document.getElementById('score');
        const characters = document.querySelectorAll('.character');
        const autoClickerBtn = document.getElementById('autoClickerBtn');
        const multiClickerBtn = document.getElementById('multiClickerBtn');

        characters.forEach(character => {
            character.addEventListener('click', () => {
                score += 1 + multiClickerLevel;
                updateScore();
            });
        });

        autoClickerBtn.addEventListener('click', () => {
            const cost = 10 * (autoClickerCount + 1);
            if (score >= cost) {
                score -= cost;
                autoClickerCount++;
                updateScore();
                startAutoClicker();
            }
        });

        multiClickerBtn.addEventListener('click', () => {
            const cost = 50 * (multiClickerLevel + 1);
            if (score >= cost) {
                score -= cost;
                multiClickerLevel++;
                updateScore();
                autoClickerBtn.textContent = `Auto Clicker (Cost: ${10 * (autoClickerCount + 1)})`;
                multiClickerBtn.textContent = `Multi Clicker (Cost: ${50 * (multiClickerLevel + 1)})`;
            }
        });

        function updateScore() {
            scoreDisplay.textContent = `Chill Points: ${score}`;
        }

        function startAutoClicker() {
            setInterval(() => {
                const randomCharacter = characters[Math.floor(Math.random() * characters.length)];
                score += 1 + multiClickerLevel;
                updateScore();
            }, 1000);
        }

        const titleScreen = document.getElementById('title-screen');
        const gameContainer = document.getElementById('game-container');
        const startBtn = document.getElementById('start-btn');
        const chomik = document.getElementById('chomik');
        const kotonoha = document.getElementById('kotonoha');
        const elliot = document.getElementById('elliot');

        [startBtn, chomik, kotonoha, elliot].forEach(element => {
            element.addEventListener('click', () => {
                titleScreen.style.display = 'none';
                gameContainer.style.display = 'block';
            });
        });
    </script>
</body>
</html>
