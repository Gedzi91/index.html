<html><head><base href="https://websim.ai/zen-visualizer/" />
<title>Dynamic ZEN Particle Animation</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #000;
    font-family: Arial, sans-serif;
  }
  #canvas {
    position: absolute;
    top: 0;
    left: 0;
  }
  #info {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: #fff;
    font-size: 14px;
    opacity: 0.7;
  }
  a {
    color: #4fc3f7;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="info">
  Dynamic ZEN Particle Animation | <a href="https://websim.ai/zen-visualizer/about">About</a> | <a href="https://websim.ai/zen-visualizer/gallery">Gallery</a>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let hue = 0;
let frame = 0;
let state = 'forming'; // 'forming', 'stable', 'exploding', 'morphing'
let stateTimer = 0;

class Particle {
  constructor(x, y, size, color) {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = size;
    this.color = color;
    this.targetX = x;
    this.targetY = y;
    this.vx = (Math.random() - 0.5) * 10;
    this.vy = (Math.random() - 0.5) * 10;
    this.accX = 0;
    this.accY = 0;
    this.friction = 0.95;
    this.gravity = 0.1;
    this.hue = Math.random() * 360;
    this.brightness = 100;
  }

  update() {
    switch(state) {
      case 'forming':
        this.accX = (this.targetX - this.x) * 0.05;
        this.accY = (this.targetY - this.y) * 0.05;
        this.vx += this.accX;
        this.vy += this.accY;
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= this.friction;
        this.vy *= this.friction;
        break;
      case 'stable':
        this.x = this.targetX + Math.sin(frame * 0.1) * 2;
        this.y = this.targetY + Math.cos(frame * 0.1) * 2;
        break;
      case 'exploding':
        this.vx *= 1.05;
        this.vy *= 1.05;
        this.x += this.vx;
        this.y += this.vy;
        this.y += this.gravity;
        this.hue += 5;
        break;
      case 'morphing':
        this.x += Math.sin(frame * 0.05 + this.y * 0.1) * 2;
        this.y += Math.cos(frame * 0.05 + this.x * 0.1) * 2;
        this.hue += 1;
        this.brightness = Math.sin(frame * 0.05) * 50 + 50;
        break;
    }

    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
  }

  draw() {
    ctx.fillStyle = state === 'stable' ? this.color : `hsl(${this.hue}, 100%, ${this.brightness}%)`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();

    if (state === 'morphing') {
      ctx.strokeStyle = `hsl(${(this.hue + 180) % 360}, 100%, 50%)`;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x + this.vx * 5, this.y + this.vy * 5);
      ctx.stroke();
    }
  }
}

function createZenParticles() {
  particles = [];
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 300px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  const text = 'ZEN';
  const textWidth = ctx.measureText(text).width;
  const scale = Math.min(canvas.width / textWidth, 1) * 0.8;
  ctx.font = `bold ${300 * scale}px Arial`;
  
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  for (let y = 0; y < canvas.height; y += 4) {
    for (let x = 0; x < canvas.width; x += 4) {
      const index = (y * canvas.width + x) * 4;
      const alpha = data[index + 3];

      if (alpha > 128) {
        const size = Math.random() * 3 + 1;
        const color = `hsl(${Math.random() * 360}, 100%, 50%)`;
        particles.push(new Particle(x, y, size, color));
      }
    }
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function animate() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  particles.forEach(particle => {
    particle.update();
    particle.draw();
  });
  
  frame++;
  stateTimer++;

  switch(state) {
    case 'forming':
      if (stateTimer >= 300) { // 5 seconds
        state = 'stable';
        stateTimer = 0;
      }
      break;
    case 'stable':
      if (stateTimer >= 300) { // 5 seconds
        state = 'exploding';
        stateTimer = 0;
      }
      break;
    case 'exploding':
      if (stateTimer >= 60) { // 1 second
        state = 'morphing';
        stateTimer = 0;
      }
      break;
    case 'morphing':
      if (stateTimer >= 2640) { // 44 seconds
        state = 'forming';
        stateTimer = 0;
        createZenParticles();
      }
      break;
  }
  
  requestAnimationFrame(animate);
}

createZenParticles();
animate();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  createZenParticles();
});
</script>
</body></html>
