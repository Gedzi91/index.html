<!DOCTYPE html><html><head><base href="https://websim.ai"><title>Particle Shape Explorer</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #000;
    color: #0f0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #canvas {
    width: 100%;
    height: 100%;
  }
  #controls {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(0,255,0,0.1);
    padding: 10px;
    border-radius: 5px;
  }
  button, select {
    background: #0f0;
    color: #000;
    border: none;
    padding: 5px 10px;
    margin: 5px;
    cursor: pointer;
  }
  #info {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0,255,0,0.1);
    padding: 10px;
    border-radius: 5px;
  }
  #shapeInfo {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0,255,0,0.1);
    padding: 10px;
    border-radius: 5px;
    max-width: 300px;
  }
</style>
</head>
<body>
<canvas id="canvas" width="1024" height="768"></canvas>
<div id="controls">
  <select id="shapeSelect">
    <option value="cloud">Cloud</option>
    <option value="fractal">Fractal</option>
    <option value="helix">Helix</option>
    <option value="ascii">ASCII</option>
    <option value="mandelbrot">Mandelbrot</option>
  </select>
  <button id="randomizeBtn">Randomize</button>
</div>
<div id="info">
  <p>Particles: <span id="particleCount">0</span></p>
  <p>FPS: <span id="fps">0</span></p>
</div>
<div id="shapeInfo"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, 1024 / 768, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('canvas')});
renderer.setSize(1024, 768);

const particleCount = 6777;
const particles = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount * 3; i++) {
  positions[i] = (Math.random() - 0.5) * 10;
  colors[i] = Math.random();
}

particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const material = new THREE.PointsMaterial({
  size: 0.03,
  vertexColors: true,
  transparent: true,
  opacity: 0.8,
});

const particleSystem = new THREE.Points(particles, material);
scene.add(particleSystem);

const lineMaterial = new THREE.LineBasicMaterial({color: 0x00ff00});
let wireframe;

camera.position.z = 5;

let currentShape = 'cloudHelix';
let rotationSpeed = 0.001;

const shapeInfo = {
  cloudHelix: "A dynamic cloud of particles forming a helix shape, with ASCII bot representations.",
};

function updateShape() {
  let geometry = createCloudHelixGeometry();
  
  if (wireframe) scene.remove(wireframe);
  wireframe = new THREE.LineSegments(new THREE.WireframeGeometry(geometry), lineMaterial);
  scene.add(wireframe);
  
  document.getElementById('shapeInfo').innerHTML = `<h3>Cloud Helix</h3><p>${shapeInfo.cloudHelix}</p>`;
}

function createCloudHelixGeometry() {
  const geometry = new THREE.BufferGeometry();
  const vertices = [];

  const turns = 5;
  const pointsPerTurn = 200;
  const radius = 2;
  const height = 8;

  // ASCII representation of a bot
  const botAscii = [
    " o ",
    "/|\\",
    "/ \\"
  ];

  for (let i = 0; i < particleCount; i++) {
    const t = i / particleCount;
    const angle = t * Math.PI * 2 * turns;
    const x = Math.cos(angle) * radius;
    const y = (t * height) - (height / 2);
    const z = Math.sin(angle) * radius;

    // Add some randomness for cloud effect
    const randomFactor = 0.5;
    vertices.push(
      x + (Math.random() - 0.5) * randomFactor,
      y + (Math.random() - 0.5) * randomFactor,
      z + (Math.random() - 0.5) * randomFactor
    );

    // Add ASCII bot representation
    if (i % 100 === 0) {
      const scale = 0.1;
      botAscii.forEach((line, lineIndex) => {
        for (let j = 0; j < line.length; j++) {
          if (line[j] !== " ") {
            vertices.push(
              x + (j - line.length / 2) * scale,
              y + (lineIndex - botAscii.length / 2) * scale,
              z
            );
          }
        }
      });
    }
  }

  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  return geometry;
}

updateShape();

function animate() {
  requestAnimationFrame(animate);
  
  wireframe.rotation.x += rotationSpeed;
  wireframe.rotation.y += rotationSpeed * 1.5;
  
  const time = Date.now() * 0.001;
  const positions = particles.attributes.position.array;
  
  for (let i = 0; i < particleCount; i++) {
    const i3 = i * 3;
    const x = positions[i3];
    const y = positions[i3 + 1];
    const z = positions[i3 + 2];
    
    positions[i3] = Math.sin(time + x) * 2;
    positions[i3 + 1] = Math.cos(time + y) * 2;
    positions[i3 + 2] = Math.sin(time + z) * 2;
  }
  
  particles.attributes.position.needsUpdate = true;
  
  renderer.render(scene, camera);
  updateFPS();
}

animate();

// The rest of the script remains the same
// ...

</script>
</body></html>
