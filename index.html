<html><head><base href="/" />
<title>Chrome Music Player</title>
<script src="https://websim-multiplayer.web.app/websim-multiplayer.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
    position: relative;
    overflow: hidden;
}

.loading-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}

.loading-screen video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#main-content {
    display: none;
}

#particles-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
}

.particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: float 15s infinite linear;
}

@keyframes float {
    0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    90% {
        opacity: 1;
    }
    100% {
        transform: translateY(-100px) scale(1);
        opacity: 0;
    }
}

.header {
    text-align: center;
    margin-bottom: 2rem;
    position: relative;
    z-index: 1;
}

.header h1 {
    font-size: 2.5rem;
    color: #4285f4;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 10px rgba(66, 133, 244, 0.3);
}

.header p {
    color: #999;
    font-size: 0.9rem;
    font-style: italic;
}

.player-wrapper {
    display: flex;
    gap: 2rem;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
    padding: 1rem;
}

.music-container {
    display: block !important; /* Override previous display rules */
}

.music-player {
    background: #2d2d2d;
    border-radius: 20px;
    padding: 2rem;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    width: 300px; /* Reduced from 350px */
    text-align: center;
}

.thumbnail {
    width: 200px;
    height: 200px;
    margin: 0 auto 1rem;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    position: relative;
}

.thumbnail img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.1s;
}

.thumbnail.playing img {
    animation: visualizer 0.6s infinite;
}

@keyframes visualizer {
    0% { transform: scale(1); }
    25% { transform: scale(1.05) rotate(1deg); }
    50% { transform: scale(1.1) rotate(-1deg); }
    75% { transform: scale(1.05) rotate(1deg); }
    100% { transform: scale(1); }
}

.title {
    font-size: 1.2rem;
    margin-bottom: 1rem;
    color: #fff;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 0.8rem;
    margin: 1rem 0;
    align-items: center;
}

button {
    background: #4285f4;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 5px;
    color: white;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
}

button:hover {
    background: #5295f5;
    transform: scale(1.05);
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

.progress-container {
    cursor: pointer;
    position: relative;
    transition: height 0.2s;
}

.progress-container:hover {
    height: 8px; /* Make the bar slightly taller on hover */
}

.progress-bar {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: #4285f4;
    border-radius: 5px;
    transition: width 0.1s linear;
}

.progress-container:hover .progress-bar {
    background: #5295f5; /* Slightly lighter blue on hover */
}

.time-display {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: #999;
    margin-top: 0.5rem;
}

.time-display span {
    cursor: pointer;
    transition: color 0.2s;
}

.time-display span:hover {
    color: #4285f4;
    text-decoration: underline;
}

.volume-control {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin: 1rem 0;
    justify-content: center;
}

.volume-slider {
    -webkit-appearance: none;
    width: 100px;
    height: 4px;
    background: #404040;
    border-radius: 2px;
    outline: none;
}

.volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: #4285f4;
    border-radius: 50%;
    cursor: pointer;
}

.mute-btn {
    padding: 0.3rem 0.6rem;
    font-size: 0.8rem;
}

.listeners-panel {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(45, 45, 45, 0.9);
    padding: 0.8rem; /* Reduced padding */
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    z-index: 100;
    max-width: 250px; /* Reduced max-width */
}

.listeners-panel h3 {
    color: #4285f4;
    margin-bottom: 0.5rem; /* Reduced margin */
    font-size: 1rem; /* Smaller font size */
}

.listener {
    display: flex;
    align-items: center;
    gap: 0.5rem; /* Reduced gap */
    margin: 0.4rem 0; /* Reduced margin */
    padding: 0.4rem; /* Reduced padding */
    background: rgba(66, 133, 244, 0.1);
    border-radius: 6px;
    transition: all 0.3s ease;
}

.listener img {
    width: 24px; /* Smaller image size */
    height: 24px; /* Smaller image size */
    border-radius: 50%;
}

.listener-info {
    display: flex;
    flex-direction: column;
    gap: 0.2rem; /* Reduced gap */
}

.listener-name {
    font-size: 0.8rem; /* Smaller font size */
}

.listener-song {
    font-size: 0.7rem; /* Smaller font size */
    color: #999;
}
</style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <video autoplay>
            <source src="1206.mp4" type="video/mp4">
        </video>
    </div>
    <div id="main-content">
        <div id="particles-container"></div>
        <div class="header">
            <h1>Chrome Music</h1>
            <p>Official music websim</p>
        </div>

        <div class="player-wrapper">
            <div class="music-container" id="song1">
                <div class="music-player">
                    <div class="thumbnail" id="thumbnail1">
                        <img src="8bitchromium.png" alt="Chrome Music">

                    </div>
                    <h2 class="title">2025 [OFFICIAL SOUNDTRACK] by Chrome</h2>

                        <img src="ChrometryDashing.png" alt="Chrometry Dash">
                    </div>
                    <h2 class="title">Chrometry Dash [OFFICIAL SOUNDTRACK] by Chrome</h2>

                    <div class="volume-control">

            <div class="music-container" id="song4">

                        <img src="Space.png" alt="Google Chrome">
                    </div>
                    <h2 class="title">Google Chrome [OFFICIAL SOUNDTRACK] by Chrome</h2>
                    <audio id="audio4" src="Google Chrome.mp3" loop></audio>
                    <div class="progress-container" id="progressContainer4">
                        <div class="progress-bar" id="progressBar4"></div>
                    </div>
                    <div class="time-display">
                        <span id="currentTime4">0:00</span>
                        <span id="duration4">0:00</span>
                    </div>
                    <div class="volume-control">
                        <button id="muteBtn4" class="mute-btn">🔊</button>
                        <input type="range" class="volume-slider" id="volumeSlider4" min="0" max="1" step="0.1" value="1">
                    </div>
                    <div class="controls">
                        <button id="toggleBtn4">Play</button>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const loadingScreen = document.getElementById('loadingScreen');
    const mainContent = document.getElementById('main-content');
    const loadingVideo = loadingScreen.querySelector('video');
    
    // Use the video's audio instead of separate audio
    loadingVideo.muted = false; // Enable video audio
    loadingVideo.volume = 0.5;  // Set volume to 50%
    
    // Show loading screen for 9 seconds
    setTimeout(() => {
        loadingScreen.style.opacity = '0';
        loadingScreen.style.transition = 'opacity 0.5s ease';
        mainContent.style.display = 'block';
        
        // Fade out video audio
        const fadeOut = setInterval(() => {
            if (loadingVideo.volume > 0.1) {
                loadingVideo.volume -= 0.1;
            } else {
                loadingVideo.volume = 0;
                clearInterval(fadeOut);
            }
        }, 100);
        
        // Remove loading screen after fade out
        setTimeout(() => {
            loadingScreen.remove();
        }, 500);
    }, 9000);
});

const room = new WebsimSocket();

function createParticle() {
    const colors = ['#4285f4', '#34a853', '#fbbc05', '#ea4335']; // Chrome colors
    const particle = document.createElement('div');
    particle.className = 'particle';
    
    // Random properties
    const size = Math.random() * 20 + 5;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left = Math.random() * 100;
    const duration = Math.random() * 10 + 5;
    const delay = Math.random() * -20;
    
    particle.style.width = `${size}px`;
    particle.style.height = `${size}px`;
    particle.style.background = color;
    particle.style.left = `${left}%`;
    particle.style.animationDuration = `${duration}s`;
    particle.style.animationDelay = `${delay}s`;
    
    return particle;
}

function initializeParticles() {
    const container = document.getElementById('particles-container');
    for(let i = 0; i < 50; i++) {
        container.appendChild(createParticle());
    }
    
    // Periodically add new particles
    setInterval(() => {
        const particle = createParticle();
        container.appendChild(particle);
        // Remove particle after animation
        setTimeout(() => {
            particle.remove();
        }, 15000);
    }, 300);
}

// Initialize particles
initializeParticles();

function updateListeners() {
    // Remove existing listeners panel if it exists
    const existingPanel = document.querySelector('.listeners-panel');
    if (existingPanel) {
        existingPanel.remove();
    }
    
    // Create new listeners panel
    const listenersPanel = document.createElement('div');
    listenersPanel.className = 'listeners-panel';
    listenersPanel.innerHTML = '<h3>Current Listeners</h3>';
    
    // Add each peer to the panel
    for (const peerId in room.party.peers) {
        const peer = room.party.peers[peerId];
        const listenerDiv = document.createElement('div');
        listenerDiv.className = 'listener';
        
        // Get the song title based on the currentSong ID
        let songTitle = "Not playing";
        if (peer.currentSong === 'song1') {
            songTitle = "8Bit Dino";
        } else if (peer.currentSong === 'song2') {
            songTitle = "2025";
        } else if (peer.currentSong === 'song3') {
            songTitle = "Chrometry Dash";
        } else if (peer.currentSong === 'song4') {
            songTitle = "Google Chrome";
        }
        
        listenerDiv.innerHTML = `
            <img src="https://images.websim.ai/avatar/${peer.username}" alt="${peer.username}">
            <div class="listener-info">
                <span class="listener-name">${peer.username}</span>
                <span class="listener-song">🎵 ${songTitle}</span>
            </div>
        `;
        listenersPanel.appendChild(listenerDiv);
    }
    
    // Add the panel to the body
    document.body.appendChild(listenersPanel);
}

// Replace the existing initializeAudioPlayer function
function initializeAudioPlayer(id) {
    const audio = document.getElementById(`audio${id}`);
    const toggleBtn = document.getElementById(`toggleBtn${id}`);
    const progressBar = document.getElementById(`progressBar${id}`);
    const progressContainer = document.getElementById(`progressContainer${id}`);
    const currentTimeDisplay = document.getElementById(`currentTime${id}`);
    const durationDisplay = document.getElementById(`duration${id}`);
    const muteBtn = document.getElementById(`muteBtn${id}`);
    const volumeSlider = document.getElementById(`volumeSlider${id}`);
    const thumbnail = document.getElementById(`thumbnail${id}`);

    function formatTime(seconds) {
        const minutes = Math.floor(seconds / 60);
        seconds = Math.floor(seconds % 60);
        return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    toggleBtn.addEventListener('click', () => {
        if (audio.paused) {
            // Pause all other audio elements first
            document.querySelectorAll('audio').forEach(a => {
                if(a !== audio) {
                    a.pause();
                    // Update other toggle buttons
                    const otherId = a.id.replace('audio', '');
                    document.getElementById(`toggleBtn${otherId}`).textContent = 'Play';
                }
            });
            audio.play();
            toggleBtn.textContent = 'Pause';
            toggleBtn.style.background = '#34a853';
            
            // Broadcast that this user is listening to this song
            room.send({
                type: 'songUpdate',
                songId: `song${id}`,
                playing: true
            });
        } else {
            audio.pause();
            toggleBtn.textContent = 'Play';
            toggleBtn.style.background = '#4285f4';
            
            // Broadcast that this user stopped listening
            room.send({
                type: 'songUpdate',
                songId: null,
                playing: false
            });
        }
    });

    audio.addEventListener('timeupdate', () => {
        const progress = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = progress + '%';
        currentTimeDisplay.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
        durationDisplay.textContent = formatTime(audio.duration);
    });

    // Improved progress container click handling
    progressContainer.addEventListener('mousedown', (e) => {
        const updateTime = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const clickX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
            const percentageClicked = clickX / rect.width;
            const newTime = percentageClicked * audio.duration;
            
            // Update progress bar visually
            progressBar.style.width = (percentageClicked * 100) + '%';
            
            // Update time display
            currentTimeDisplay.textContent = formatTime(newTime);
        };

        const seekTo = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const clickX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
            const percentageClicked = clickX / rect.width;
            
            // Set the actual audio time
            audio.currentTime = percentageClicked * audio.duration;
            
            // Remove mousemove and mouseup listeners
            document.removeEventListener('mousemove', updateTime);
            document.removeEventListener('mouseup', seekTo);
        };

        // Add mousemove event listener for live preview
        document.addEventListener('mousemove', updateTime);
        
        // Add mouseup event listener for final seek
        document.addEventListener('mouseup', seekTo);
        
        // Initial update
        updateTime(e);
    });

    // Add hover preview functionality
    progressContainer.addEventListener('mousemove', (e) => {
        const rect = progressContainer.getBoundingClientRect();
        const hoverX = e.clientX - rect.left;
        const percentageHovered = hoverX / rect.width;
        const previewTime = percentageHovered * audio.duration;
        
        // Update cursor to pointer
        progressContainer.style.cursor = 'pointer';
        
        // Add tooltip showing time preview
        progressContainer.title = formatTime(previewTime);
    });

    // Reset cursor when mouse leaves progress bar
    progressContainer.addEventListener('mouseleave', () => {
        progressContainer.style.cursor = 'default';
    });

    currentTimeDisplay.style.cursor = 'pointer';
    durationDisplay.style.cursor = 'pointer';
    
    currentTimeDisplay.addEventListener('click', (e) => {
        e.stopPropagation();
        // Let users click timestamp to preview current time
        const rect = currentTimeDisplay.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const percent = clickX / rect.width;
        const newTime = Math.max(0, Math.min(percent * audio.duration, audio.duration));
        audio.currentTime = newTime;
    });
    
    durationDisplay.addEventListener('click', (e) => {
        e.stopPropagation();
        // Let users click duration to preview time remaining
        const rect = durationDisplay.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const percent = clickX / rect.width;
        const newTime = Math.max(0, Math.min(percent * audio.duration, audio.duration));
        audio.currentTime = newTime;
    });

    muteBtn.addEventListener('click', () => {
        audio.muted = !audio.muted;
        muteBtn.textContent = audio.muted ? '🔇' : '🔊';
    });

    volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
        if(audio.volume === 0) {
            muteBtn.textContent = '🔇';
        } else {
            muteBtn.textContent = '🔊';
        }
    });

    audio.addEventListener('play', () => {
        toggleBtn.textContent = 'Pause';
        toggleBtn.style.background = '#34a853';
        thumbnail.classList.add('playing');
    });

    audio.addEventListener('pause', () => {
        toggleBtn.textContent = 'Play';
        toggleBtn.style.background = '#4285f4';
        thumbnail.classList.remove('playing');
    });

    audio.addEventListener('ended', () => {
        toggleBtn.textContent = 'Play';
        toggleBtn.style.background = '#4285f4';
        thumbnail.classList.remove('playing');
    });
}

// Initialize all audio players
initializeAudioPlayer('1');
initializeAudioPlayer('2');
initializeAudioPlayer('3');
initializeAudioPlayer('4');

// Add shuffle play button to each player
const playerControls = document.querySelectorAll('.controls');
playerControls.forEach(controls => {
    const shuffleBtn = document.createElement('button');
    shuffleBtn.textContent = '🔀';
    shuffleBtn.title = 'Shuffle Play';
    shuffleBtn.onclick = () => {
        const audioElements = Array.from(document.querySelectorAll('audio'));
        const currentIndex = audioElements.findIndex(audio => !audio.paused);
        
        // Pause current audio if playing
        audioElements.forEach(audio => audio.pause());
        
        // Pick random audio excluding current
        let availableIndices = audioElements.map((_, i) => i)
            .filter(i => i !== currentIndex);
        let randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
        
        // Play random audio
        audioElements[randomIndex].play();
    };
    controls.appendChild(shuffleBtn);
});

// Add keyboard volume controls
document.addEventListener('keydown', (e) => {
    const activeAudio = Array.from(document.querySelectorAll('audio'))
        .find(audio => !audio.paused);
    
    if (activeAudio) {
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeAudio.volume = Math.min(1, activeAudio.volume + 0.1);
            const volumeSlider = activeAudio.parentElement.querySelector('.volume-slider');
            volumeSlider.value = activeAudio.volume;
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeAudio.volume = Math.max(0, activeAudio.volume - 0.1);
            const volumeSlider = activeAudio.parentElement.querySelector('.volume-slider');
            volumeSlider.value = activeAudio.volume;
        }
    }
});

// Update title with now playing info
function updateNowPlaying() {
    const playingAudio = Array.from(document.querySelectorAll('audio'))
        .find(audio => !audio.paused);
    
    if (playingAudio) {
        const songTitle = playingAudio.parentElement.querySelector('.title').textContent;
        document.title = `▶ ${songTitle} - Chrome Music`;
    } else {
        document.title = 'Chrome Music';
    }
}

// Add audio visualization
document.querySelectorAll('audio').forEach(audio => {
    const context = new (window.AudioContext || window.webkitAudioContext)();
    const source = context.createMediaElementSource(audio);
    const analyser = context.createAnalyser();
    
    source.connect(analyser);
    analyser.connect(context.destination);
    
    const thumbnail = audio.parentElement.querySelector('.thumbnail');
    const canvas = document.createElement('canvas');
    canvas.style.position = 'absolute';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    canvas.style.opacity = '0.5';
    thumbnail.appendChild(canvas);
    
    const ctx = canvas.getContext('2d');
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    
    function draw() {
        const width = canvas.width;
        const height = canvas.height;
        
        requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray);
        
        ctx.clearRect(0, 0, width, height);
        
        if (!audio.paused) {
            const barWidth = width / bufferLength * 2;
            let x = 0;
            
            for(let i = 0; i < bufferLength; i++) {
                const barHeight = dataArray[i] / 2;
                ctx.fillStyle = `rgba(66, 133, 244, ${barHeight / 255})`;
                ctx.fillRect(x, height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }
    }
    
    draw();
    
    // Update title when play/pause state changes
    audio.addEventListener('play', updateNowPlaying);
    audio.addEventListener('pause', updateNowPlaying);
});

// Initial title update
updateNowPlaying();

// Add WebSocket message handler
room.onmessage = (event) => {
    const data = event.data;
    if (data.type === 'songUpdate') {
        // Update the peer's current song in the peers object
        if (room.party.peers[data.clientId]) {
            room.party.peers[data.clientId].currentSong = data.songId;
            updateListeners();
        }
    }
};

// Subscribe to peer updates
room.party.subscribe(() => {
    updateListeners();
});

// Initial listeners update
updateListeners();

// Space bar control for active player
document.addEventListener('keydown', (e) => {
    if(e.code === 'Space') {
        e.preventDefault();
        const activeContainer = document.querySelector('.music-container.active');
        const audio = activeContainer.querySelector('audio');
        if(audio.paused) {
            audio.play();
        } else {
            audio.pause();
        }
    }
});

// Keyboard shortcuts for skipping
document.addEventListener('keydown', (e) => {
    const activeContainer = document.querySelector('.music-container.active');
    const audio = activeContainer.querySelector('audio');
    if (!audio.paused) {
        if (e.key === 'ArrowRight') {
            e.preventDefault();
            const newTime = Math.min(audio.currentTime + 5, audio.duration);
            audio.currentTime = newTime;
        } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            const newTime = Math.max(audio.currentTime - 5, 0);
            audio.currentTime = newTime;
        }
    }
});
</script>
</body></html>
