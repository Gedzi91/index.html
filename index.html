<canvas id="canvas"></canvas>
<button class="menu-button">Settings</button>
<div class="menu-panel">
  <div class="control-group">
    <label>
      <input type="checkbox" id="showSensors" checked>
      Show Sensors
    </label>
  </div>
  
  <div class="control-group">
    <label>
      <input type="checkbox" id="showPheromones" checked>
      Show Pheromones
    </label>
  </div>

  <div class="control-group">
    <label>Max Speed <span class="value-display" id="maxSpeedValue">4.0</span></label>
    <input type="range" id="maxSpeed" min="1" max="10" step="0.5" value="4">
  </div>
  
  <div class="control-group">
    <label>Sensor Distance <span class="value-display" id="sensorDistanceValue">64</span></label>
    <input type="range" id="sensorDistance" min="32" max="200" step="8" value="64">
  </div>
  
  <div class="control-group">
    <label>Sensor Count <span class="value-display" id="sensorCountValue">4</span></label>
    <input type="range" id="sensorCount" min="2" max="8" step="1" value="4">
  </div>
  
  <div class="control-group">
    <label>Alignment Force <span class="value-display" id="alignmentValue">1.0</span></label>
    <input type="range" id="alignment" min="0" max="2" step="0.1" value="1.0">
  </div>
  
  <div class="control-group">
    <label>Cohesion Force <span class="value-display" id="cohesionValue">0.7</span></label>
    <input type="range" id="cohesion" min="0" max="2" step="0.1" value="0.7">
  </div>
  
  <div class="control-group">
    <label>Separation Force <span class="value-display" id="separationValue">1.8</span></label>
    <input type="range" id="separation" min="0" max="3" step="0.1" value="1.8">
  </div>
  
  <div class="control-group">
    <label>Pheromone Influence <span class="value-display" id="pheromoneValue">1.2</span></label>
    <input type="range" id="pheromone" min="0" max="2" step="0.1" value="1.2">
  </div>

  <div class="control-group">
    <label>Pheromone Decay Rate <span class="value-display" id="pheromoneDecayValue">0.99</span></label>
    <input type="range" id="pheromoneDecay" min="0.9" max="0.999" step="0.001" value="0.99">
  </div>

  <div class="control-group">
    <label>Pheromone Production <span class="value-display" id="pheromoneProductionValue">0.008</span></label>
    <input type="range" id="pheromoneProduction" min="0.0001" max="0.01" step="0.0001" value="0.008">
  </div>

  <div class="control-group">
    <label>Other Pheromone Avoidance <span class="value-display" id="otherPheromoneAvoidValue">6.0</span></label>
    <input type="range" id="otherPheromoneAvoid" min="0" max="20" step="0.1" value="9.0">
  </div>

  <div class="control-group">
    <label>Boid Count <span class="value-display" id="boidCountValue">150</span></label>
    <input type="range" id="boidCount" min="10" max="800" step="10" value="150">
  </div>

  <div class="control-group">
    <label>Grid Size <span class="value-display" id="gridSizeValue">32</span></label>
    <input type="range" id="gridSize" min="8" max="64" step="4" value="32">
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Set canvas size to window size
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Global settings object
const settings = {
  showSensors: true,
  showPheromones: true,
  maxSpeed: 4,
  sensorDistance: 64,
  sensorCount: 4,
  alignmentForce: 1.0,
  cohesionForce: 0.7,
  separationForce: 1.8,
  pheromoneForce: 1 / 0.6,
  pheromoneDecay: 0.99,
  pheromoneProduction: 0.008,
  otherPheromoneAvoid: 9.0,
  boidCount: 150,
  gridSize: 32,  // Add this line
};

// Grid system
let gridCols, gridRows;
const grid = [];

// Initialize grid
function initializeGrid() {
  gridCols = Math.ceil(canvas.width / settings.gridSize);
  gridRows = Math.ceil(canvas.height / settings.gridSize);
  
  // Clear existing grid
  while(grid.length > 0) {
    grid.pop();
  }
  
  // Initialize new grid
  for (let y = 0; y < gridRows; y++) {
    grid[y] = [];
    for (let x = 0; x < gridCols; x++) {
      grid[y][x] = {
        pheromones: [0, 0, 0] // Red, Green, Blue pheromones
      };
    }
  }
}
initializeGrid();

// Menu controls
document.querySelector('.menu-button').addEventListener('click', () => {
  document.querySelector('.menu-panel').classList.toggle('visible');
});

// Setup all control listeners
document.getElementById('showSensors').addEventListener('change', (e) => {
  settings.showSensors = e.target.checked;
});

document.getElementById('showPheromones').addEventListener('change', (e) => {
  settings.showPheromones = e.target.checked;
});

function setupSlider(id, property, multiplier = 1) {
  const slider = document.getElementById(id);
  const valueDisplay = document.getElementById(id + 'Value');
  const step = parseFloat(slider.step);
  
  // Create input element for direct value entry
  const valueInput = document.createElement('input');
  valueInput.type = 'text';
  valueInput.className = 'value-input';
  valueInput.value = slider.value;
  valueDisplay.parentElement.appendChild(valueInput);
  
  // Determine number of decimal places based on step
  const decimalPlaces = Math.max(
    0,
    -Math.floor(Math.log10(step) + 0.000001)
  );

  // Update displays with formatted value
  function updateDisplays(value) {
    valueDisplay.textContent = parseFloat(value).toFixed(decimalPlaces);
    valueInput.value = parseFloat(value).toFixed(decimalPlaces);
  }

  // Update settings and boids
  function updateValue(value) {
    settings[property] = parseFloat(value);
    slider.value = value;
    updateDisplays(value);
    
    // Update all boids with new values
    for (let boid of flock) {
      if (property === 'maxSpeed') boid.maxSpeed = value;
      if (property === 'sensorDistance') boid.sensorDistance = value;
      if (property === 'sensorCount') boid.sensorCount = Math.round(value);
      if (property === 'boidCount') {
        adjustBoidCount();
      }
      if (property === 'gridSize') {
        initializeGrid();
      }
    }
  }

  // Slider input handler
  slider.addEventListener('input', (e) => {
    updateValue(e.target.value);
  });

  // Click on value to show input
  valueDisplay.addEventListener('click', () => {
    valueInput.classList.add('visible');
    valueInput.focus();
    valueInput.select();
  });

  // Handle input blur and enter key
  valueInput.addEventListener('blur', () => {
    valueInput.classList.remove('visible');
  });

  valueInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const newValue = Math.min(
        Math.max(
          parseFloat(valueInput.value), 
          parseFloat(slider.min)
        ), 
        parseFloat(slider.max)
      );
      
      if (!isNaN(newValue)) {
        updateValue(newValue);
      }
      
      valueInput.classList.remove('visible');
    }
  });

  // Initial display update
  updateDisplays(slider.value);
}

setupSlider('maxSpeed', 'maxSpeed');
setupSlider('sensorDistance', 'sensorDistance');
setupSlider('sensorCount', 'sensorCount');
setupSlider('alignment', 'alignmentForce');
setupSlider('cohesion', 'cohesionForce');
setupSlider('separation', 'separationForce');
setupSlider('pheromone', 'pheromoneForce');
setupSlider('pheromoneDecay', 'pheromoneDecay');
setupSlider('pheromoneProduction', 'pheromoneProduction');
setupSlider('otherPheromoneAvoid', 'otherPheromoneAvoid');
setupSlider('boidCount', 'boidCount');
setupSlider('gridSize', 'gridSize');

// Boid count adjustment function
function adjustBoidCount() {
  const targetCount = settings.boidCount;
  const currentCount = flock.length;
  
  if (targetCount > currentCount) {
    // Add boids
    for (let i = 0; i < targetCount - currentCount; i++) {
      const boid = new Boid(
        Math.random() * canvas.width,
        Math.random() * canvas.height
      );
      boid.group = (currentCount + i) % 3;
      flock.push(boid);
    }
  } else if (targetCount < currentCount) {
    // Remove boids
    flock.splice(targetCount, currentCount - targetCount);
  }
}

// Grid functions
function updateGrid(x, y, group) {
  const gridX = Math.floor(x / settings.gridSize);
  const gridY = Math.floor(y / settings.gridSize);
  
  if (gridX >= 0 && gridX < gridCols && gridY >= 0 && gridY < gridRows) {
    grid[gridY][gridX].pheromones[group] += settings.pheromoneProduction;
    grid[gridY][gridX].pheromones[group] = Math.min(grid[gridY][gridX].pheromones[group], 1.0);
  }
}

function drawGrid() {
  if (!settings.showPheromones) return;
  
  for (let y = 0; y < gridRows; y++) {
    for (let x = 0; x < gridCols; x++) {
      const cell = grid[y][x];
      const r = Math.floor(cell.pheromones[0] * 255);
      const g = Math.floor(cell.pheromones[1] * 255);
      const b = Math.floor(cell.pheromones[2] * 255);
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.5)`;
      ctx.fillRect(x * settings.gridSize, y * settings.gridSize, settings.gridSize, settings.gridSize);
    }
  }
}

// Decay pheromones
function decayPheromones() {
  for (let y = 0; y < gridRows; y++) {
    for (let x = 0; x < gridCols; x++) {
      for (let i = 0; i < 3; i++) {
        grid[y][x].pheromones[i] *= settings.pheromoneDecay;
      }
    }
  }
}

class QuadTree {
  constructor(boundary, capacity) {
    this.boundary = boundary;
    this.capacity = capacity;
    this.points = [];
    this.divided = false;
  }

  subdivide() {
    const x = this.boundary.x;
    const y = this.boundary.y;
    const w = this.boundary.w / 2;
    const h = this.boundary.h / 2;

    const ne = new Rectangle(x + w, y - h, w, h);
    const nw = new Rectangle(x - w, y - h, w, h);
    const se = new Rectangle(x + w, y + h, w, h);
    const sw = new Rectangle(x - w, y + h, w, h);

    this.northeast = new QuadTree(ne, this.capacity);
    this.northwest = new QuadTree(nw, this.capacity);
    this.southeast = new QuadTree(se, this.capacity);
    this.southwest = new QuadTree(sw, this.capacity);

    this.divided = true;
  }

  insert(point) {
    if (!this.boundary.contains(point.position)) {
      return false;
    }

    if (this.points.length < this.capacity) {
      this.points.push(point);
      return true;
    }

    if (!this.divided) {
      this.subdivide();
    }

    return (this.northeast.insert(point) ||
            this.northwest.insert(point) ||
            this.southeast.insert(point) ||
            this.southwest.insert(point));
  }

  query(range, found) {
    if (!found) {
      found = [];
    }

    if (!this.boundary.intersects(range)) {
      return found;
    }

    for (let p of this.points) {
      if (range.contains(p.position)) {
        found.push(p);
      }
    }

    if (this.divided) {
      this.northwest.query(range, found);
      this.northeast.query(range, found);
      this.southwest.query(range, found);
      this.southeast.query(range, found);
    }

    return found;
  }
}

class Rectangle {
  constructor(x, y, w, h) {
    this.x = x;
    this.y = y;
    this.w = w;
    this.h = h;
  }

  contains(point) {
    return (point.x >= this.x - this.w &&
            point.x <= this.x + this.w &&
            point.y >= this.y - this.h &&
            point.y <= this.y + this.h);
  }

  intersects(range) {
    return !(range.x - range.w > this.x + this.w ||
             range.x + range.w < this.x - this.w ||
             range.y - range.h > this.y + this.h ||
             range.y + range.h < this.y - this.h);
  }
}

class Boid {
  constructor(x, y) {
    this.position = { x, y };
    this.velocity = {
      x: (Math.random() * 2 - 1) * 2,
      y: (Math.random() * 2 - 1) * 2
    };
    this.acceleration = { x: 0, y: 0 };
    this.maxSpeed = settings.maxSpeed;
    this.maxForce = 0.2;
    this.sensorCount = settings.sensorCount; // Number of sensors
    this.sensorDistance = settings.sensorDistance; // Distance of sensors
    this.sensorAngle = Math.PI / 4; // Angle between sensors
    this.pheromoneWeight = 0.5; // How much pheromones influence direction
    this.group = Math.floor(Math.random() * 3); // 0=red, 1=green, 2=blue
    this.colors = ['#ff6b6b', '#6bff6b', '#6b6bff']; // Group colors
  }

  // Get pheromone value at specific coordinates
  getPheromoneAt(x, y) {
    const gridX = Math.floor(x / settings.gridSize);
    const gridY = Math.floor(y / settings.gridSize);
    
    if (gridX >= 0 && gridX < gridCols && gridY >= 0 && gridY < gridRows) {
      const myPheromone = grid[gridY][gridX].pheromones[this.group];
      const otherPheromones = grid[gridY][gridX].pheromones
        .reduce((sum, val, idx) => idx !== this.group ? sum + val : sum, 0);
      return myPheromone - (otherPheromones * settings.otherPheromoneAvoid);
    }
    return 0;
  }

  // Get sensor readings
  getSensorReadings() {
    let angle = Math.atan2(this.velocity.y, this.velocity.x);
    let readings = [];
    
    // Calculate readings for each sensor
    for (let i = 0; i < this.sensorCount; i++) {
      let sensorAngle = angle - this.sensorAngle + (i * (this.sensorAngle * 2) / (this.sensorCount - 1));
      let sensorX = this.position.x + Math.cos(sensorAngle) * this.sensorDistance;
      let sensorY = this.position.y + Math.sin(sensorAngle) * this.sensorDistance;
      
      readings.push({
        position: { x: sensorX, y: sensorY },
        value: this.getPheromoneAt(sensorX, sensorY)
      });
    }
    
    return readings;
  }

  // Apply pheromone steering
  pheromoneSteer() {
    let readings = this.getSensorReadings();
    let steering = { x: 0, y: 0 };
    
    // Find the sensor with highest pheromone value
    let maxReading = readings.reduce((max, reading) => 
      reading.value > max.value ? reading : max, readings[0]);
    
    if (maxReading.value > 0) {
      // Steer towards the highest pheromone
      let desired = {
        x: maxReading.position.x - this.position.x,
        y: maxReading.position.y - this.position.y
      };
      desired = setMag(desired, this.maxSpeed);
      
      steering.x = (desired.x - this.velocity.x) * this.pheromoneWeight;
      steering.y = (desired.y - this.velocity.y) * this.pheromoneWeight;
      steering = limit(steering, this.maxForce);
    }
    
    return steering;
  }

  edges() {
    if (this.position.x > canvas.width) this.position.x = 0;
    if (this.position.x < 0) this.position.x = canvas.width;
    if (this.position.y > canvas.height) this.position.y = 0;
    if (this.position.y < 0) this.position.y = canvas.height;
  }

  align(boids) {
    let perceptionRadius = 50;
    let steering = { x: 0, y: 0 };
    let total = 0;

    for (let other of boids) {
      let d = dist(this.position, other.position);
      if (other !== this && d < perceptionRadius) {
        // Only align with same color boids
        if (other.group === this.group) {
          steering.x += other.velocity.x;
          steering.y += other.velocity.y;
          total++;
        }
      }
    }

    if (total > 0) {
      steering.x /= total;
      steering.y /= total;
      steering = setMag(steering, this.maxSpeed);
      steering.x -= this.velocity.x;
      steering.y -= this.velocity.y;
      steering = limit(steering, this.maxForce);
    }
    return steering;
  }

  cohesion(boids) {
    let perceptionRadius = 50;
    let steering = { x: 0, y: 0 };
    let total = 0;

    for (let other of boids) {
      let d = dist(this.position, other.position);
      if (other !== this && d < perceptionRadius) {
        // Only cohere with same color boids
        if (other.group === this.group) {
          steering.x += other.position.x;
          steering.y += other.position.y;
          total++;
        }
      }
    }

    if (total > 0) {
      steering.x /= total;
      steering.y /= total;
      steering.x -= this.position.x;
      steering.y -= this.position.y;
      steering = setMag(steering, this.maxSpeed);
      steering.x -= this.velocity.x;
      steering.y -= this.velocity.y;
      steering = limit(steering, this.maxForce);
    }
    return steering;
  }

  separation(boids) {
    let perceptionRadius = 25;
    let steering = { x: 0, y: 0 };
    let total = 0;

    for (let other of boids) {
      let d = dist(this.position, other.position);
      if (other !== this && d < perceptionRadius) {
        let diff = {
          x: this.position.x - other.position.x,
          y: this.position.y - other.position.y
        };
        diff = normalize(diff);
        
        // Stronger separation for different colors
        let separationMultiplier = (other.group !== this.group) ? 2.5 : 1.0;
        
        diff.x = (diff.x / d) * separationMultiplier;
        diff.y = (diff.y / d) * separationMultiplier;
        
        steering.x += diff.x;
        steering.y += diff.y;
        total++;
      }
    }

    if (total > 0) {
      steering.x /= total;
      steering.y /= total;
      steering = setMag(steering, this.maxSpeed);
      steering.x -= this.velocity.x;
      steering.y -= this.velocity.y;
      steering = limit(steering, this.maxForce);
    }
    return steering;
  }

  flock(boids) {
    let alignment = this.align(boids);
    let cohesion = this.cohesion(boids);
    let separation = this.separation(boids);
    let pheromone = this.pheromoneSteer();

    this.acceleration.x += alignment.x * settings.alignmentForce;
    this.acceleration.y += alignment.y * settings.alignmentForce;
    this.acceleration.x += cohesion.x * settings.cohesionForce;
    this.acceleration.y += cohesion.y * settings.cohesionForce;
    this.acceleration.x += separation.x * settings.separationForce;
    this.acceleration.y += separation.y * settings.separationForce;
    this.acceleration.x += pheromone.x * settings.pheromoneForce;
    this.acceleration.y += pheromone.y * settings.pheromoneForce;
  }

  update() {
    this.position.x += this.velocity.x;
    this.position.y += this.velocity.y;
    this.velocity.x += this.acceleration.x;
    this.velocity.y += this.acceleration.y;
    this.velocity = limit(this.velocity, this.maxSpeed);
    this.acceleration.x = 0;
    this.acceleration.y = 0;
    
    updateGrid(this.position.x, this.position.y, this.group);
  }

  draw() {
    let angle = Math.atan2(this.velocity.y, this.velocity.x);
    ctx.fillStyle = this.colors[this.group];
    ctx.save();
    ctx.translate(this.position.x, this.position.y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.lineTo(-5, 4);
    ctx.lineTo(-5, -4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    if (settings.showSensors) {
      let readings = this.getSensorReadings();
      ctx.strokeStyle = 'rgba(255, 255, 0, 0.05)';
      readings.forEach(reading => {
        ctx.beginPath();
        ctx.moveTo(this.position.x, this.position.y);
        ctx.lineTo(reading.position.x, reading.position.y);
        ctx.stroke();
      });
    }
  }
}

// Helper functions
function dist(p1, p2) {
  return Math.sqrt((p2.x - p1.x) ** 2 + (p2.y - p1.y) ** 2);
}

function setMag(vector, mag) {
  let normalized = normalize(vector);
  return {
    x: normalized.x * mag,
    y: normalized.y * mag
  };
}

function normalize(vector) {
  let mag = Math.sqrt(vector.x ** 2 + vector.y ** 2);
  if (mag === 0) return { x: 0, y: 0 };
  return {
    x: vector.x / mag,
    y: vector.y / mag
  };
}

function limit(vector, max) {
  let mag = Math.sqrt(vector.x ** 2 + vector.y ** 2);
  if (mag > max) {
    return setMag(vector, max);
  }
  return vector;
}

// Create boids
const flock = [];
const numBoids = 150;

for (let i = 0; i < numBoids; i++) {
  const boid = new Boid(
    Math.random() * canvas.width,
    Math.random() * canvas.height
  );
  boid.group = i % 3;
  flock.push(boid);
}

let nextGroup = 0;

// Add click event to add new boid
canvas.addEventListener('click', (event) => {
  const rect = canvas.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  
  const newBoid = new Boid(x, y);
  newBoid.group = nextGroup;
  nextGroup = (nextGroup + 1) % 3;
  flock.push(newBoid);
});

// Animation loop
let qt; // Declare qt at global scope

function animate() {
  ctx.fillStyle = 'rgba(0, 0, 0, 1)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawGrid();
  
  // Create new quadtree each frame
  let boundary = new Rectangle(canvas.width/2, canvas.height/2, canvas.width/2, canvas.height/2);
  qt = new QuadTree(boundary, 4);

  for (let boid of flock) {
    qt.insert(boid);
  }

  for (let boid of flock) {
    let range = new Rectangle(boid.position.x, boid.position.y, 50, 50);
    let nearbyBoids = qt.query(range);

    boid.edges();
    boid.flock(nearbyBoids);
    boid.update();
    boid.draw();
  }

  decayPheromones();

  requestAnimationFrame(animate);
}

animate();
</script></body></html>
