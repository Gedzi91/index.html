<html><head><base href="https://websim.ai/c/3d-space-alien-explorer"><title>3D Space Alien Explorer - Compact Zoom Edition with Murder Counter</title><style>
        body,html{margin:0;padding:0;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#000;color:#fff;cursor:crosshair}
        #space-container{width:100%;height:100%;position:relative;perspective:1000px;overflow:hidden}
        #rotatable-space{width:100%;height:100%;position:absolute;transform-style:preserve-3d;transition:transform .5s ease}
        .alien{position:absolute;width:80px;height:80px;transform-style:preserve-3d;animation:float 20s infinite ease-in-out;transition:opacity .3s,transform .3s}
        .alien-body{position:absolute;width:100%;height:100%;border-radius:50%;background:transparent;transform-style:preserve-3d}
        .alien-sphere{position:absolute;width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.8),rgba(255,255,255,.4),rgba(255,255,255,.1));box-shadow:inset -5px -5px 20px rgba(0,0,0,.2),inset 5px 5px 20px rgba(255,255,255,.2);transform-style:preserve-3d}
        .alien-face{position:absolute;width:100%;height:100%;transform-style:preserve-3d;transition:transform .3s}
        .alien-eye{position:absolute;width:16px;height:16px;background-color:#000;border-radius:50%;top:20px;overflow:hidden}
        .alien-eye::after{content:'';position:absolute;top:3px;left:3px;width:5px;height:5px;background-color:#fff;border-radius:50%}
        .alien-eye.left{left:15px}.alien-eye.right{right:15px}
        .alien-tear{position:absolute;width:4px;height:10px;background-color:rgba(100,200,255,.7);border-radius:50%;top:16px;left:6px;opacity:0;animation:tear-fall 2s linear infinite}
        @keyframes tear-fall{0%,100%{transform:translateY(0);opacity:0}10%,90%{opacity:1}100%{transform:translateY(30px)}}
        .alien-mouth{position:absolute;width:20px;height:10px;border:3px solid #000;border-radius:0 0 20px 20px;border-top:none;bottom:20px;left:50%;transform:translateX(-50%)}
        .alien-antenna{position:absolute;width:3px;height:25px;background-color:rgba(255,255,255,.7);top:-22px;left:50%;transform:translateX(-50%) rotateX(-30deg)}
        .alien-antenna::after{content:'';position:absolute;top:-6px;left:-4px;width:10px;height:10px;background-color:rgba(255,255,255,.9);border-radius:50%}
        @keyframes float{0%,100%{transform:translate3d(0,0,0) rotate(0deg)}25%{transform:translate3d(50px,-50px,100px) rotate(90deg)}50%{transform:translate3d(-50px,50px,-100px) rotate(180deg)}75%{transform:translate3d(25px,-25px,50px) rotate(270deg)}}
        #info-panel,#obituary-container{position:absolute;background:rgba(0,0,0,.7);padding:10px;border-radius:5px;z-index:10}
        #info-panel{top:10px;left:10px}
        #alien-count,#murder-count{font-size:18px;font-weight:700}
        #murder-count{color:#ff4d4d;display:none}
        #controls{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);text-align:center;z-index:10}
        button{background:#4CAF50;border:none;color:#fff;padding:10px 20px;text-align:center;display:inline-block;font-size:16px;margin:4px 2px;cursor:pointer;border-radius:5px}
        #rotation-controls{position:absolute;right:10px;top:50%;transform:translateY(-50%);z-index:10}
        #rotation-controls button,#zoom-controls button{display:block;margin:10px 0}
        #zoom-controls{position:absolute;left:10px;top:50%;transform:translateY(-50%);z-index:10}
        #laser{position:absolute;width:2px;height:0;background-color:red;transform-origin:top;z-index:1000;opacity:0;transition:opacity .1s}
        #obituary-container{bottom:10px;left:10px;max-width:300px;max-height:200px;overflow-y:auto}
        .obituary{margin-bottom:10px;font-size:14px;border-bottom:1px solid #444;padding-bottom:5px;color:gold}
    </style></head><body>
    <div id="space-container"><div id="rotatable-space"></div></div>
    <div id="laser"></div>
    <div id="info-panel">
        <div>Spherical Beings: <span id="alien-count">0</span></div>
        <div id="murder-count">Murders: <span>0</span></div>
        <div>Click to fire laser (but please reconsider)</div>
    </div>
    <div id="controls">
        <button onclick="addNewAlien()">Welcome New Sphere</button>
    </div>
    <div id="rotation-controls">
        <button onclick="rotateSpace('up')">↑</button>
        <button onclick="rotateSpace('down')">↓</button>
        <button onclick="rotateSpace('left')">←</button>
        <button onclick="rotateSpace('right')">→</button>
    </div>
    <div id="zoom-controls">
        <button onclick="zoom('in')">Zoom In</button>
        <button onclick="zoom('out')">Zoom Out</button>
    </div>
    <div id="obituary-container"></div>

    <script>
        const $=document.querySelector.bind(document),$$=document.querySelectorAll.bind(document),
        spaceContainer=$('#space-container'),rotatableSpace=$('#rotatable-space'),alienCount=$('#alien-count'),
        murderCount=$('#murder-count'),laser=$('#laser'),obituaryContainer=$('#obituary-container');
        let aliens=[],rotationX=0,rotationY=0,zoomLevel=1,murders=0;

        const createAlien=index=>{
            const alien=document.createElement('div');
            alien.className='alien';
            alien.dataset.index=index;
            const hue=Math.random()*360,color=`hsl(${hue},70%,60%)`;
            alien.innerHTML=`<div class="alien-body">${Array(5).fill().map((_,i)=>`<div class="alien-sphere" style="background:radial-gradient(circle at 30% 30%,${color},rgba(${hue},${hue},${hue},.4),rgba(${hue},${hue},${hue},.1));transform:translateZ(${i*2}px) scale(${1-i*.05});"></div>`).join('')}<div class="alien-face"><div class="alien-eye left"><div class="alien-tear"></div></div><div class="alien-eye right"><div class="alien-tear"></div></div><div class="alien-mouth"></div></div><div class="alien-antenna" style="background-color:${color};"></div></div>`;
            Object.assign(alien.style,{left:`${Math.random()*90}%`,top:`${Math.random()*90}%`,transform:`translateZ(${Math.random()*1000-500}px)`,animationDelay:`${Math.random()*20}s`});
            rotatableSpace.appendChild(alien);
            aliens.push(alien);
        };

        const traits=['multidimensional wisdom','quantum humor','gravitational empathy','hyperspatial creativity','cosmic kindness','temporal curiosity','interdimensional diplomacy','astral projection abilities','telepathic poetry','singularity manipulation','dark matter cuisine','wormhole navigation','quasar harmonizing','nebula painting','supernova surfing'];
        const getRandomTrait=()=>traits[Math.floor(Math.random()*traits.length)];

        const obituaries=[
            index=>`Spherical Being #${index} has ascended to a higher plane of existence. Their ${getRandomTrait()} will echo through eternity.`,
            index=>`We mourn the dissipation of Sphere #${index}, whose ${getRandomTrait()} brought light to the darkest corners of the cosmos.`,
            index=>`The multiverse grieves as Being #${index} returns to the quantum foam. Their ${getRandomTrait()} will be remembered across all dimensions.`,
            index=>`Sphere #${index} has collapsed into a singularity of pure energy. May their ${getRandomTrait()} continue to radiate throughout spacetime.`,
            index=>`The celestial spheres sing a dirge for Being #${index}, whose ${getRandomTrait()} harmonized countless galaxies.`,
            index=>`A great void is left in the fabric of reality as Sphere #${index} transcends our understanding. Their ${getRandomTrait()} will inspire generations of cosmic entities.`,
            index=>`The stars dim in respect as Being #${index} completes their journey. Their ${getRandomTrait()} will fuel the birth of new universes.`,
            index=>`Sphere #${index} has merged with the cosmic consciousness. We are all elevated by the memory of their ${getRandomTrait()}.`,
            index=>`A supernova of sorrow erupts as we bid farewell to Being #${index}. May their ${getRandomTrait()} continue to illuminate the vast darkness.`,
            index=>`The space-time continuum ripples with the loss of Sphere #${index}. Their ${getRandomTrait()} will be studied by future civilizations for eons to come.`
        ];
        const getRandomObituary=index=>obituaries[Math.floor(Math.random()*obituaries.length)](index);

        const addNewAlien=()=>{createAlien(aliens.length);updateAlienCount();};
        const rotateSpace=direction=>{
            const step=15;
            if(direction==='up')rotationX-=step;
            else if(direction==='down')rotationX+=step;
            else if(direction==='left')rotationY-=step;
            else if(direction==='right')rotationY+=step;
            updateTransform();
        };
        const zoom=direction=>{
            const step=0.1;
            if(direction==='in')zoomLevel+=step;
            else if(direction==='out')zoomLevel=Math.max(0.5,zoomLevel-step);
            updateTransform();
        };
        const updateTransform=()=>{rotatableSpace.style.transform=`rotateX(${rotationX}deg) rotateY(${rotationY}deg) scale3d(${zoomLevel},${zoomLevel},${zoomLevel})`;};
        const lookAtCamera=()=>{
            const centerX=window.innerWidth/2,centerY=window.innerHeight/2;
            aliens.forEach(alien=>{
                const rect=alien.getBoundingClientRect();
                const alienX=rect.left+rect.width/2,alienY=rect.top+rect.height/2;
                const angleX=Math.atan2(centerY-alienY,centerX-alienX);
                const angleY=Math.atan2(centerX-alienX,centerY-alienY);
                alien.querySelector('.alien-face').style.transform=`rotateX(${angleX}rad) rotateY(${angleY}rad)`;
            });
        };
        const fireLaser=event=>{
            const rect=spaceContainer.getBoundingClientRect();
            const x=event.clientX-rect.left,y=event.clientY-rect.top;
            Object.assign(laser.style,{left:`${x}px`,top:`${y}px`,height:`${Math.max(rect.width,rect.height)}px`,opacity:1});
            setTimeout(()=>laser.style.opacity=0,100);
            checkAlienHit(x,y);
        };
        const checkAlienHit=(x,y)=>aliens.forEach(alien=>{
            const rect=alien.getBoundingClientRect();
            if(x>=rect.left&&x<=rect.right&&y>=rect.top&&y<=rect.bottom)killAlien(alien);
        });
        const killAlien=alien=>{
            const index=parseInt(alien.dataset.index);
            alien.style.opacity=0;
            makenearbySpheresCry(alien);
            setTimeout(()=>{
                alien.remove();
                aliens=aliens.filter(a=>a!==alien);
                updateAlienCount();
                addObituary(index);
                updateMurderCount();
            },300);
        };
        const makenearbySpheresCry=killedAlien=>{
            const killedRect=killedAlien.getBoundingClientRect();
            const killedCenter={x:killedRect.left+killedRect.width/2,y:killedRect.top+killedRect.height/2};
            aliens.forEach(alien=>{
                if(alien!==killedAlien){
                    const alienRect=alien.getBoundingClientRect();
                    const alienCenter={x:alienRect.left+alienRect.width/2,y:alienRect.top+alienRect.height/2};
                    const distance=Math.hypot(killedCenter.x-alienCenter.x,killedCenter.y-alienCenter.y);
                    if(distance<200){
                        alien.querySelectorAll('.alien-tear').forEach(tear=>{
                            tear.style.opacity=1;
                            setTimeout(()=>tear.style.opacity=0,5000);
                        });
                    }
                }
            });
        };
        const updateAlienCount=()=>alienCount.textContent=aliens.length;
        const updateMurderCount=()=>{
            murders++;
            murderCount.style.display='block';
            murderCount.querySelector('span').textContent=murders;
        };
        const addObituary=index=>{
            const obituary=document.createElement('div');
            obituary.className='obituary';
            obituary.textContent=getRandomObituary(index);
            obituaryContainer.prepend(obituary);
            if(obituaryContainer.children.length>5)obituaryContainer.removeChild(obituaryContainer.lastChild);
        };

        // Initialize
        const initialAlienCount=Math.floor(Math.random()*(150-10+1))+10;
        for(let i=0;i<initialAlienCount;i++)createAlien(i);
        spaceContainer.addEventListener('click',fireLaser);
        updateAlienCount();
        document.addEventListener('mousemove',()=>requestAnimationFrame(lookAtCamera));
        lookAtCamera();
    </script>
</body></html>
