<html><head><base href="https://my-resume-is-a-platformer.io/l3dlp-web-guru">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L3DLP Web Guru - Interactive Resume Platformer</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Oswald', sans-serif;
    color: #fff;
    overflow: hidden;
  }
  #game-container {
    width: 100%;
    height: 100%;
    position: relative;
    border: 1px solid #fff;
    box-sizing: border-box;
  }
  #player, .skill-item {
    position: absolute;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    width: 40px;
    height: 40px;
    background-color: rgba(255, 255, 255, 0.2);
    border-radius: 50%;
  }
  .platform {
    position: absolute;
    background-color: rgba(0, 255, 0, 0.5);
  }
  #info-panel {
    position: absolute;
    top: 10px;
    right: 10px;
    background-color: rgba(0, 0, 0, 0.7);
    padding: 10px;
    border-radius: 5px;
    max-width: 300px;
    font-size: 14px;
  }
  #info-panel h2 {
    font-size: 18px;
    margin-top: 0;
  }
  #level-complete {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: rgba(0, 0, 0, 0.8);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    display: none;
    font-size: 18px;
  }
  #level-complete h2 {
    font-size: 24px;
    margin-top: 0;
  }
  #aurora-background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
  }
</style>
</head>
<body>
<canvas id="aurora-background"></canvas>
<div id="game-container">
  <div id="player"></div>
  <div id="info-panel">
    <h2>L3DLP Web Guru</h2>
    <p>Use arrow keys to move and jump. Collect skill emojis to learn about my expertise!</p>
  </div>
  <div id="level-complete">
    <h2>Level Complete!</h2>
    <p>Press Space to continue to the next level.</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
<script>
  const { Engine, Render, World, Bodies, Body, Events } = Matter;

  // Initialize Matter.js engine
  const engine = Engine.create();
  const world = engine.world;

  // Get the game container dimensions
  const gameContainer = document.getElementById('game-container');
  let containerWidth = gameContainer.clientWidth;
  let containerHeight = gameContainer.clientHeight;

  // Player emojis
  const playerEmojis = ['😀', '😎', '🤓', '🧑‍💻', '👩‍💻', '🦸', '🦸‍♀️'];
  let currentPlayerEmoji = playerEmojis[Math.floor(Math.random() * playerEmojis.length)];

  // Create player
  const player = Bodies.rectangle(50, containerHeight - 50, 40, 40, { 
    friction: 0.001,
    frictionAir: 0.001,
    restitution: 0.2
  });
  World.add(world, player);

  // Update player emoji
  document.getElementById('player').innerText = currentPlayerEmoji;

  // Create borders
  const borderThickness = 1;
  const borders = [
    Bodies.rectangle(containerWidth / 2, -borderThickness / 2, containerWidth, borderThickness, { isStatic: true }), // Top
    Bodies.rectangle(containerWidth / 2, containerHeight + borderThickness / 2, containerWidth, borderThickness, { isStatic: true }), // Bottom
    Bodies.rectangle(-borderThickness / 2, containerHeight / 2, borderThickness, containerHeight, { isStatic: true }), // Left
    Bodies.rectangle(containerWidth + borderThickness / 2, containerHeight / 2, borderThickness, containerHeight, { isStatic: true }) // Right
  ];
  World.add(world, borders);

  // Define all possible skills
  const allSkills = [
    { name: 'HTML5', icon: '🌐', description: 'Expert in semantic markup and modern web standards' },
    { name: 'CSS3', icon: '🎨', description: 'Master of responsive design and advanced animations' },
    { name: 'JavaScript', icon: '⚡', description: 'Proficient in ES6+, async programming, and frameworks' },
    { name: 'React', icon: '⚛️', description: 'Experienced in building complex SPAs and component libraries' },
    { name: 'Node.js', icon: '🚀', description: 'Full-stack developer with expertise in RESTful APIs' },
    { name: 'Go', icon: '🐹', description: 'Golang enthusiast, building efficient and concurrent systems' },
    { name: 'Linux', icon: '🐧', description: 'Linux guru, proficient in system administration and scripting' }
  ];

  let currentLevel = 1;
  let platforms = [];
  let skillBodies = [];

  function generateLevel() {
    // Clear existing platforms and skill bodies
    World.remove(world, platforms);
    World.remove(world, skillBodies);
    platforms = [];
    skillBodies = [];

    // Remove existing skill divs
    document.querySelectorAll('.skill-item').forEach(el => el.remove());

    // Create new platforms
    const platformCount = 3 + currentLevel;
    const platformWidth = 200;
    const platformHeight = 20;
    const minSpacing = 100; // Minimum vertical spacing between platforms

    for (let i = 0; i < platformCount; i++) {
      const x = Math.random() * (containerWidth - platformWidth);
      const minY = i === 0 ? containerHeight - 100 : platforms[i-1].position.y - minSpacing;
      const maxY = i === platformCount - 1 ? 100 : containerHeight - ((platformCount - i) * minSpacing);
      const y = Math.random() * (maxY - minY) + minY;
      const platform = Bodies.rectangle(x + platformWidth / 2, y, platformWidth, platformHeight, { isStatic: true });
      platforms.push(platform);
    }
    World.add(world, platforms);

    // Create new skill items
    const skillCount = Math.min(5, allSkills.length);
    const shuffledSkills = allSkills.sort(() => 0.5 - Math.random()).slice(0, skillCount);

    skillBodies = shuffledSkills.map((skill, index) => {
      const platform = platforms[index % platforms.length];
      const x = platform.position.x + (Math.random() - 0.5) * (platformWidth / 2);
      const y = platform.position.y - 30;
      const skillBody = Bodies.circle(x, y, 20, { 
        isStatic: true,
        isSensor: true,
        render: { fillStyle: 'transparent' },
        skill: skill
      });

      // Create skill item div
      const skillDiv = document.createElement('div');
      skillDiv.className = 'skill-item';
      skillDiv.innerText = skill.icon;
      skillDiv.style.left = `${x - 20}px`;
      skillDiv.style.top = `${y - 20}px`;
      gameContainer.appendChild(skillDiv);

      skillBody.skillDiv = skillDiv;
      return skillBody;
    });
    World.add(world, skillBodies);

    // Reset player position
    Body.setPosition(player, { x: 50, y: containerHeight - 50 });

    // Update player emoji
    currentPlayerEmoji = playerEmojis[Math.floor(Math.random() * playerEmojis.length)];
    document.getElementById('player').innerText = currentPlayerEmoji;

    // Update platform positions for shader
    updatePlatformPositions();
  }

  // Set up renderer
  const render = Render.create({
    element: gameContainer,
    engine: engine,
    options: {
      width: containerWidth,
      height: containerHeight,
      wireframes: false,
      background: 'transparent'
    }
  });

  // Run the engine and renderer
  Engine.run(engine);
  Render.run(render);

  // Player controls
  let jumping = false;
  const moveSpeed = 5;
  const jumpForce = -0.05;
  let leftPressed = false;
  let rightPressed = false;

  document.addEventListener('keydown', (e) => {
    switch(e.key) {
      case 'ArrowLeft':
        leftPressed = true;
        break;
      case 'ArrowRight':
        rightPressed = true;
        break;
      case 'ArrowUp':
        if (!jumping) {
          Body.applyForce(player, player.position, { x: 0, y: jumpForce });
          jumping = true;
          setTimeout(() => { jumping = false; }, 500);
        }
        break;
      case ' ':
        if (document.getElementById('level-complete').style.display === 'block') {
          document.getElementById('level-complete').style.display = 'none';
          currentLevel++;
          generateLevel();
        }
        break;
    }
  });

  document.addEventListener('keyup', (e) => {
    switch(e.key) {
      case 'ArrowLeft':
        leftPressed = false;
        break;
      case 'ArrowRight':
        rightPressed = false;
        break;
    }
  });

  // Update player movement and position
  Events.on(engine, 'beforeUpdate', () => {
    if (leftPressed) {
      Body.setVelocity(player, { x: -moveSpeed, y: player.velocity.y });
    }
    if (rightPressed) {
      Body.setVelocity(player, { x: moveSpeed, y: player.velocity.y });
    }
    if (!leftPressed && !rightPressed) {
      Body.setVelocity(player, { x: 0, y: player.velocity.y });
    }

    // Update player div position
    const playerDiv = document.getElementById('player');
    playerDiv.style.left = `${player.position.x - 20}px`;
    playerDiv.style.top = `${player.position.y - 20}px`;

    // Update player position for shader
    updatePlayerPosition();
  });

  // Collision detection for skill items
  Events.on(engine, 'collisionStart', (event) => {
    const pairs = event.pairs;
    for (let i = 0; i < pairs.length; i++) {
      const pair = pairs[i];
      if (pair.bodyA === player && pair.bodyB.skill) {
        collectSkill(pair.bodyB);
      } else if (pair.bodyB === player && pair.bodyA.skill) {
        collectSkill(pair.bodyA);
      }
    }
  });

  function collectSkill(skillBody) {
    const skill = skillBody.skill;
    const infoPanel = document.getElementById('info-panel');
    infoPanel.innerHTML = `
      <h2>${skill.name}</h2>
      <p>${skill.icon} ${skill.description}</p>
    `;
    World.remove(world, skillBody);
    gameContainer.removeChild(skillBody.skillDiv);
    skillBodies = skillBodies.filter(body => body !== skillBody);

    if (skillBodies.length === 0) {
      document.getElementById('level-complete').style.display = 'block';
    }
  }

  // Resize handler
  window.addEventListener('resize', () => {
    const newWidth = gameContainer.clientWidth;
    const newHeight = gameContainer.clientHeight;
    
    render.canvas.width = newWidth;
    render.canvas.height = newHeight;
    
    // Update border positions and sizes
    Body.setPosition(borders[0], { x: newWidth / 2, y: -borderThickness / 2 });
    Body.setPosition(borders[1], { x: newWidth / 2, y: newHeight + borderThickness / 2 });
    Body.setPosition(borders[2], { x: -borderThickness / 2, y: newHeight / 2 });
    Body.setPosition(borders[3], { x: newWidth + borderThickness / 2, y: newHeight / 2 });
    
    Body.scale(borders[0], newWidth / containerWidth, 1);
    Body.scale(borders[1], newWidth / containerWidth, 1);
    Body.scale(borders[2], 1, newHeight / containerHeight);
    Body.scale(borders[3], 1, newHeight / containerHeight);
    
    containerWidth = newWidth;
    containerHeight = newHeight;

    // Regenerate the level to adjust positions
    generateLevel();

    // Resize aurora background
    resizeAuroraBackground();
  });

  // Aurora Background Shader
  const canvas = document.getElementById('aurora-background');
  const gl = canvas.getContext('webgl');

  const vertexShaderSource = `
    attribute vec2 a_position;
    void main() {
      gl_Position = vec4(a_position, 0, 1);
    }
  `;

  const fragmentShaderSource = `
    precision mediump float;
    uniform vec2 u_resolution;
    uniform float u_time;
    uniform vec2 u_player_position;
    uniform vec2 u_platform_positions[10];
    uniform int u_platform_count;

    vec3 palette(float t) {
      vec3 a = vec3(0.5, 0.5, 0.5);
      vec3 b = vec3(0.5, 0.5, 0.5);
      vec3 c = vec3(1.0, 1.0, 1.0);
      vec3 d = vec3(0.263, 0.416, 0.557);
      return a + b * cos(6.28318 * (c * t + d));
    }

    float noise(vec2 st) {
      return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / u_resolution.xy;
      uv.x *= u_resolution.x / u_resolution.y;
      
      vec2 uv0 = uv;
      float finalColor = 0.0;
      
      for (float i = 0.0; i < 4.0; i++) {
        uv = fract(uv * 1.5) - 0.5;
        
        float d = length(uv) * exp(-length(uv0));
        
        vec3 col = palette(length(uv0) + i * 0.4 + u_time * 0.4);
        
        d = sin(d * 8.0 + u_time) / 8.0;
        d = abs(d);
        d = pow(0.01 / d, 1.2);
        
        finalColor += d * col.g;
      }

      // Add glitch effect
      float glitchIntensity = 0.05;
      vec2 glitchUV = uv0 + glitchIntensity * vec2(noise(uv0 + u_time), noise(uv0 - u_time));
      finalColor += noise(glitchUV * 100.0) * 0.1;

      // Add player highlight
      vec2 playerUV = u_player_position / u_resolution.xy;
      float playerDist = length(uv0 - playerUV);
      finalColor += 0.1 / (playerDist + 0.1);

      // Add platform highlights
      for (int i = 0; i < 10; i++) {
        if (i >= u_platform_count) break;
        vec2 platformUV = u_platform_positions[i] / u_resolution.xy;
        float platformDist = length(uv0 - platformUV);
        finalColor += 0.05 / (platformDist + 0.1);
      }
      
      gl_FragColor = vec4(finalColor, finalColor * 0.5, finalColor, 1.0);
    }
  `;

  function createShader(gl, type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    return shader;
  }

  const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
  const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

  const program = gl.createProgram();
  gl.attachShader(program, vertexShader);
  gl.attachShader(program, fragmentShader);
  gl.linkProgram(program);

  const positionAttributeLocation = gl.getAttribLocation(program, 'a_position');
  const positionBuffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);

  const positions = [
    -1, -1,
    1, -1,
    -1, 1,
    1, 1,
  ];
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);

  const resolutionUniformLocation = gl.getUniformLocation(program, 'u_resolution');
  const timeUniformLocation = gl.getUniformLocation(program, 'u_time');
  const playerPositionUniformLocation = gl.getUniformLocation(program, 'u_player_position');
  const platformPositionsUniformLocation = gl.getUniformLocation(program, 'u_platform_positions');
  const platformCountUniformLocation = gl.getUniformLocation(program, 'u_platform_count');

  function resizeAuroraBackground() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
  }

  resizeAuroraBackground();

  function updatePlayerPosition() {
    gl.uniform2f(playerPositionUniformLocation, player.position.x, player.position.y);
  }

  function updatePlatformPositions() {
    const platformPositions = platforms.map(p => [p.position.x, p.position.y]).flat();
    gl.uniform2fv(platformPositionsUniformLocation, platformPositions);
    gl.uniform1i(platformCountUniformLocation, platforms.length);
  }

  function drawAurora(time) {
    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);

    gl.useProgram(program);
    gl.enableVertexAttribArray(positionAttributeLocation);
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);

    gl.vertexAttribPointer(positionAttributeLocation, 2, gl.FLOAT, false, 0, 0);
    gl.uniform2f(resolutionUniformLocation, gl.canvas.width, gl.canvas.height);
    gl.uniform1f(timeUniformLocation, time * 0.001);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    requestAnimationFrame(drawAurora);
  }

  requestAnimationFrame(drawAurora);

  // Initial level generation
  generateLevel();
</script>
</body></html>
