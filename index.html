<html><head><base href="https://cdn.jsdelivr.net/gh/mrdoob/three.js/examples/" /><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
    .slider-container {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .slider {
        width: 100%;
        margin: 10px 0;
    }
    .slider-value {
        color: white;
        font-family: Arial, sans-serif;
        margin-bottom: 5px;
    }
</style>
</head><body style="margin:0;overflow:hidden;">
<div class="slider-container">
    <div class="slider-value" id="frequencyValue">Frequency: 1.0</div>
    <input type="range" id="frequencySlider" class="slider" min="0.1" max="5" step="0.1" value="1">
    <div class="slider-value" id="amplitudeValue">Amplitude: 2.0</div>
    <input type="range" id="amplitudeSlider" class="slider" min="0.1" max="5" step="0.1" value="2">
</div>
<script>
let scene, camera, renderer, mesh;
let frequency = 1.0;
let amplitude = 2.0;

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geometry = new THREE.PlaneGeometry(10, 10, 50, 50);
    const material = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
    mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    camera.position.z = 10;

    // Add event listeners for the sliders
    const frequencySlider = document.getElementById('frequencySlider');
    const frequencyDisplay = document.getElementById('frequencyValue');
    frequencySlider.addEventListener('input', function() {
        frequency = parseFloat(this.value);
        frequencyDisplay.textContent = `Frequency: ${frequency.toFixed(1)}`;
    });

    const amplitudeSlider = document.getElementById('amplitudeSlider');
    const amplitudeDisplay = document.getElementById('amplitudeValue');
    amplitudeSlider.addEventListener('input', function() {
        amplitude = parseFloat(this.value);
        amplitudeDisplay.textContent = `Amplitude: ${amplitude.toFixed(1)}`;
    });

    animate();
}

function animate() {
    requestAnimationFrame(animate);

    const time = Date.now() * 0.001 * frequency;
    const vertices = mesh.geometry.attributes.position.array;
    for (let i = 0; i < vertices.length; i += 3) {
        vertices[i + 2] = Math.sin(vertices[i] + time) * Math.sin(vertices[i + 1] + time) * amplitude;
    }
    mesh.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script></body></html>
