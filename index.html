<html><head><base href="https://unex-worldwide.com/">
<title>UNEX Worldwide - Choose Your Country</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        margin: 0;
        padding: 0;
    }
    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }
    h1 {
        color: #333;
        text-align: center;
    }
    .country-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 30px;
    }
    .country-card {
        background-color: #fff;
        border-radius: 5px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        transition: transform 0.3s ease;
    }
    .country-card:hover {
        transform: translateY(-5px);
    }
    .country-flag {
        width: 100px;
        height: 60px;
        object-fit: cover;
        border-radius: 5px;
        margin-bottom: 10px;
    }
    .country-name {
        font-weight: bold;
        color: #333;
    }
    .special-options {
        margin-top: 30px;
        text-align: center;
    }
    .special-button {
        display: inline-block;
        margin: 10px;
        padding: 10px 20px;
        background-color: #007bff;
        color: #fff;
        text-decoration: none;
        border-radius: 5px;
        transition: background-color 0.3s ease;
    }
    .special-button:hover {
        background-color: #0056b3;
    }
    .warning {
        color: #d9534f;
        text-align: center;
        margin-top: 20px;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>Choose Your Country</h1>
        
        <div class="country-grid">
            <a href="/us" class="country-card">
                <img src="https://flagcdn.com/w320/us.png" alt="USA Flag" class="country-flag">
                <div class="country-name">United States</div>
            </a>
            <a href="/ca" class="country-card">
                <img src="https://flagcdn.com/w320/ca.png" alt="Canada Flag" class="country-flag">
                <div class="country-name">Canada</div>
            </a>
            <a href="/uk" class="country-card">
                <img src="https://flagcdn.com/w320/gb.png" alt="UK Flag" class="country-flag">
                <div class="country-name">United Kingdom</div>
            </a>
            <a href="/au" class="country-card">
                <img src="https://flagcdn.com/w320/au.png" alt="Australia Flag" class="country-flag">
                <div class="country-name">Australia</div>
            </a>
            <a href="/de" class="country-card">
                <img src="https://flagcdn.com/w320/de.png" alt="Germany Flag" class="country-flag">
                <div class="country-name">Germany</div>
            </a>
            <a href="/fr" class="country-card">
                <img src="https://flagcdn.com/w320/fr.png" alt="France Flag" class="country-flag">
                <div class="country-name">France</div>
            </a>
            <a href="/jp" class="country-card">
                <img src="https://flagcdn.com/w320/jp.png" alt="Japan Flag" class="country-flag">
                <div class="country-name">Japan</div>
            </a>
            <a href="/br" class="country-card">
                <img src="https://flagcdn.com/w320/br.png" alt="Brazil Flag" class="country-flag">
                <div class="country-name">Brazil</div>
            </a>
        </div>

        <div class="special-options">
            <a href="/international" class="special-button">International Version</a>
            <a href="/removed-countries" class="special-button">Removed/Eliminated Countries</a>
        </div>

        <p class="warning">Some countries may be experiencing technical difficulties or may have been removed. We apologize for any inconvenience.</p>
    </div>

    <script>
        // Simulating some broken links
        document.querySelector('a[href="/fr"]').addEventListener('click', function(e) {
            e.preventDefault();
            alert('The France page is currently under maintenance. Please try again later.');
        });

        document.querySelector('a[href="/jp"]').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = '/404';
        });

        // Easter egg: Clicking on Brazil 5 times reveals a hidden message
        let brazilClicks = 0;
        document.querySelector('a[href="/br"]').addEventListener('click', function(e) {
            e.preventDefault();
            brazilClicks++;
            if (brazilClicks === 5) {
                alert('Congratulations! You've unlocked the secret UNEX Brazil page!');
                window.location.href = '/br-secret';
            } else {
                window.location.href = '/br';
            }
        });
    </script>
</body>
</html>
