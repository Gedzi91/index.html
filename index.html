<html><head><base href="https://digital-sculpture.art/research/holographic-technology/ai-reconstruction/holographic-ai-assistants/demo/final-render/">
<title>AI Image Generator: Holographic AI Assistant</title>
<style>
    body {
        font-family: 'Arial', sans-serif;
        background-color: #1a1a2e;
        color: #e0e0e0;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    .container {
        background-color: rgba(30, 30, 60, 0.8);
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        max-width: 800px;
        width: 90%;
    }
    h1 {
        color: #00ffff;
        text-align: center;
        font-size: 2.5em;
        margin-bottom: 30px;
        text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }
    .image-container {
        text-align: center;
        margin: 20px 0;
        position: relative;
        overflow: hidden;
        border-radius: 10px;
    }
    img {
        max-width: 100%;
        height: auto;
        border-radius: 10px;
        transition: transform 0.3s ease;
    }
    img:hover {
        transform: scale(1.05);
    }
    .controls {
        display: flex;
        justify-content: space-between;
        margin-top: 30px;
    }
    button {
        background-color: #4CAF50;
        border: none;
        color: white;
        padding: 12px 24px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
        border-radius: 25px;
        transition: all 0.3s ease;
        box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
    }
    button:hover {
        background-color: #45a049;
        box-shadow: 0 0 15px rgba(76, 175, 80, 0.8);
    }
    #prompt-input {
        width: 100%;
        padding: 12px;
        margin: 15px 0;
        border: 1px solid #00ffff;
        border-radius: 5px;
        font-size: 16px;
        background-color: rgba(0, 255, 255, 0.1);
        color: #e0e0e0;
    }
    .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(26, 26, 46, 0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 10px;
    }
    .loading-spinner {
        border: 5px solid #f3f3f3;
        border-top: 5px solid #00ffff;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    .hologram-effect {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(45deg, rgba(0,255,255,0.1) 0%, rgba(0,255,255,0) 100%);
        pointer-events: none;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>Holographic AI Assistant Generator</h1>
        <div class="image-container">
            <img id="generated-image" src="https://replicate.delivery/yhqm/WocX5Uz1E85DEx8lIb0EzNXJhyXe3K6cK6Jbcij0bLgPLYqJA/out-0.webp" alt="AI-generated image of a holographic female assistant with cosmic patterns and futuristic interface elements" width="600" height="400">
            <div class="hologram-effect"></div>
            <div id="loading-overlay" class="loading-overlay" style="display: none;">
                <div class="loading-spinner"></div>
            </div>
        </div>
        <textarea id="prompt-input" rows="3" placeholder="Describe your ideal holographic AI assistant...">Futuristic holographic AI assistant with cosmic patterns and interactive interface</textarea>
        <div class="controls">
            <button id="generate-button">Generate New Hologram</button>
            <button id="analyze-button">Analyze Hologram</button>
        </div>
    </div>

    <script>
        const generatedImage = document.getElementById('generated-image');
        const loadingOverlay = document.getElementById('loading-overlay');
        const promptInput = document.getElementById('prompt-input');

        document.getElementById('generate-button').addEventListener('click', function() {
            const prompt = promptInput.value;
            loadingOverlay.style.display = 'flex';
            
            // Simulate hologram generation process
            setTimeout(() => {
                // In a real implementation, this would be replaced with actual AI image generation
                const newImageSrc = `https://source.unsplash.com/600x400/?hologram,${encodeURIComponent(prompt)}`;
                generatedImage.src = newImageSrc;
                generatedImage.alt = `AI-generated holographic image based on prompt: ${prompt}`;
                
                loadingOverlay.style.display = 'none';
            }, 3000); // Simulating a 3-second generation process
        });

        document.getElementById('analyze-button').addEventListener('click', function() {
            window.location.href = 'analysis.html';
        });

        // Add a subtle floating animation to the image
        let floatY = 0;
        const floatSpeed = 0.5;
        const floatAmplitude = 5;

        function animateFloat() {
            floatY += floatSpeed;
            const yOffset = Math.sin(floatY) * floatAmplitude;
            generatedImage.style.transform = `translateY(${yOffset}px)`;
            requestAnimationFrame(animateFloat);
        }

        animateFloat();

        // Add interactive hologram effect
        const imageContainer = document.querySelector('.image-container');
        imageContainer.addEventListener('mousemove', (e) => {
            const rect = imageContainer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const angleX = (x - centerX) / centerX;
            const angleY = (y - centerY) / centerY;
            
            generatedImage.style.transform = `perspective(1000px) rotateY(${angleX * 5}deg) rotateX(${-angleY * 5}deg)`;
        });

        imageContainer.addEventListener('mouseleave', () => {
            generatedImage.style.transform = 'perspective(1000px) rotateY(0) rotateX(0)';
        });
    </script>
</body></html>
