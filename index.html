<html><head><base href="https://simulaciones-avanzadas.com/fuego-ultra-realista-v10/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Fire Simulator</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background-color: #000;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  #fireCanvas {
    width: 100%;
    height: 100%;
    background-color: #000;
  }
  #controls {
    position: absolute;
    top: 10px;
    left: 10px;
    background-color: rgba(0, 0, 0, 0.7);
    padding: 15px;
    border-radius: 10px;
    color: white;
    box-shadow: 0 0 10px rgba(255, 165, 0, 0.5);
    transition: transform 0.3s ease-in-out;
  }
  #controls.hidden {
    transform: translateX(-100%);
  }
  #toggleControls {
    position: absolute;
    top: 10px;
    left: 10px;
    background-color: rgba(0, 0, 0, 0.7);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
    z-index: 10;
  }
  .slider {
    width: 100%;
    margin: 10px 0;
    -webkit-appearance: none;
    appearance: none;
    height: 10px;
    background: #444;
    outline: none;
    border-radius: 5px;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    background: #ff6600;
    cursor: pointer;
    border-radius: 50%;
  }
  .slider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    background: #ff6600;
    cursor: pointer;
    border-radius: 50%;
  }
  label {
    display: block;
    margin-top: 10px;
  }
  #presets {
    margin-top: 15px;
  }
  button {
    background-color: #ff6600;
    color: white;
    border: none;
    padding: 5px 10px;
    margin: 5px;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  button:hover {
    background-color: #ff8833;
  }
  #interactionInfo {
    margin-top: 15px;
    font-style: italic;
    color: #ffcc00;
  }
</style>
</head>
<body>
<canvas id="fireCanvas"></canvas>
<button id="toggleControls">Mostrar/Ocultar Controles</button>
<div id="controls" style="width: 25vw;">
  <h3>Controles de Fuego Avanzados</h3>
  <label for="intensity">Intensidad: </label>
  <input type="range" id="intensity" class="slider" min="1" max="15" value="8">
  <label for="color">Color Base: </label>
  <input type="color" id="color" value="#ff6600">
  <label for="wind">Viento: </label>
  <input type="range" id="wind" class="slider" min="-10" max="10" value="0">
  <label for="turbulence">Turbulencia: </label>
  <input type="range" id="turbulence" class="slider" min="0" max="10" value="5">
  <label for="embers">Intensidad de Chispas: </label>
  <input type="range" id="embers" class="slider" min="0" max="10" value="3">
  <label for="smoke">Intensidad de Humo: </label>
  <input type="range" id="smoke" class="slider" min="0" max="10" value="5">
  <label for="forceField">Fuerza del Campo Repelente: </label>
  <input type="range" id="forceField" class="slider" min="0" max="300" value="150">
  <div id="presets">
    <button id="campfire">Fogata</button>
    <button id="inferno">Infierno</button>
    <button id="blueFlame">Llama Azul</button>
  </div>
  <div id="interactionInfo">
    ¡Interactúa con el fuego! Mantén presionado el botón izquierdo del ratón para crear un campo de fuerza repelente que empuja todas las partículas.
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
<script>
const canvas = document.getElementById('fireCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const fireParticles = [];
const emberParticles = [];
const smokeParticles = [];
const particleCount = 2000;
const emberCount = 200;
const smokeCount = 400;
const simplex = new SimplexNoise();

let intensity = 8;
let baseColor = [255, 102, 0];
let wind = 0;
let turbulence = 5;
let emberIntensity = 3;
let smokeIntensity = 5;
let forceFieldStrength = 150;
let mouseX = 0;
let mouseY = 0;
let isMouseDown = false;

class Particle {
  constructor(type) {
    this.type = type;
    this.reset();
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = canvas.height;
    this.size = Math.random() * 4 + 2;
    this.speedY = (Math.random() * 3 + 1) * (intensity / 8);
    this.speedX = Math.random() * 1 - 0.5 + wind * 0.1;
    this.life = Math.random() * 0.5 + 0.5;
    this.hue = Math.random() * 60 - 30;

    if (this.type === 'ember') {
      this.size = Math.random() * 2 + 1;
      this.speedY = (Math.random() * 2 + 1) * (emberIntensity / 3);
    } else if (this.type === 'smoke') {
      this.y = canvas.height * 0.7 + Math.random() * canvas.height * 0.3;
      this.size = Math.random() * 40 + 30;
      this.speedY = (Math.random() * 1 + 0.5) * (smokeIntensity / 5);
      this.opacity = Math.random() * 0.3 + 0.1;
      this.angle = Math.random() * Math.PI * 2;
      this.rotationSpeed = (Math.random() - 0.5) * 0.02;
      this.scaleX = Math.random() * 0.5 + 0.5;
      this.scaleY = Math.random() * 0.5 + 0.5;
      this.wiggleOffset = Math.random() * Math.PI * 2;
      this.wiggleSpeed = Math.random() * 0.05 + 0.02;
    }
  }

  update(time) {
    const noise = simplex.noise3D(this.x * 0.01, this.y * 0.01, time * 0.001) * turbulence;
    this.y -= this.speedY + noise;
    this.x += this.speedX + noise * 0.5;
    this.size *= 0.99;
    this.life -= 0.01;

    if (isMouseDown) {
      const dx = this.x - mouseX;
      const dy = this.y - mouseY;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const force = forceFieldStrength / (distance + 1);
      const forceX = (dx / distance) * force;
      const forceY = (dy / distance) * force;
      this.x += forceX * 3;
      this.y += forceY * 3;
      this.speedX += forceX * 0.3;
      this.speedY += forceY * 0.3;
    }

    if (this.life <= 0 || this.size < 0.1 || this.y < 0 || this.x < 0 || this.x > canvas.width) {
      this.reset();
    }

    if (this.type === 'smoke') {
      this.angle += this.rotationSpeed;
      this.wiggleOffset += this.wiggleSpeed;
      this.x += Math.sin(this.wiggleOffset + time * this.wiggleSpeed) * 0.5;
      this.opacity *= 0.997;
    }
  }

  draw() {
    ctx.beginPath();
    if (this.type === 'fire') {
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      const r = Math.min(255, baseColor[0] + this.hue);
      const g = Math.min(255, baseColor[1] + this.hue / 2);
      const b = baseColor[2];
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.life})`;
    } else if (this.type === 'ember') {
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, ${Math.random() * 100 + 155}, 0, ${this.life})`;
    } else if (this.type === 'smoke') {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      ctx.scale(this.scaleX, this.scaleY);
      
      const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
      gradient.addColorStop(0, `rgba(120, 120, 120, ${this.opacity * this.life})`);
      gradient.addColorStop(0.5, `rgba(90, 90, 90, ${this.opacity * this.life * 0.6})`);
      gradient.addColorStop(0.8, `rgba(70, 70, 70, ${this.opacity * this.life * 0.3})`);
      gradient.addColorStop(1, `rgba(50, 50, 50, 0)`);

      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const radius = this.size * (0.8 + Math.sin(angle * 4 + this.wiggleOffset) * 0.2);
        if (i === 0) {
          ctx.moveTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
        } else {
          ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
        }
      }
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.restore();
    }
    if (this.type !== 'smoke') {
      ctx.fill();
    }
  }
}

for (let i = 0; i < particleCount; i++) {
  fireParticles.push(new Particle('fire'));
}

for (let i = 0; i < emberCount; i++) {
  emberParticles.push(new Particle('ember'));
}

for (let i = 0; i < smokeCount; i++) {
  smokeParticles.push(new Particle('smoke'));
}

let lastTime = 0;
function animate(time) {
  const deltaTime = time - lastTime;
  lastTime = time;

  ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  smokeParticles.forEach(smoke => {
    smoke.update(time);
    smoke.draw();
  });

  fireParticles.forEach(particle => {
    particle.update(time);
    particle.draw();
  });

  emberParticles.forEach(ember => {
    ember.update(time);
    ember.draw();
  });

  requestAnimationFrame(animate);
}

animate(0);

// Event Listeners para controles
document.getElementById('intensity').addEventListener('input', (e) => {
  intensity = parseFloat(e.target.value);
});

document.getElementById('color').addEventListener('input', (e) => {
  const hex = e.target.value;
  baseColor = [
    parseInt(hex.slice(1, 3), 16),
    parseInt(hex.slice(3, 5), 16),
    parseInt(hex.slice(5, 7), 16)
  ];
});

document.getElementById('wind').addEventListener('input', (e) => {
  wind = parseFloat(e.target.value);
});

document.getElementById('turbulence').addEventListener('input', (e) => {
  turbulence = parseFloat(e.target.value);
});

document.getElementById('embers').addEventListener('input', (e) => {
  emberIntensity = parseFloat(e.target.value);
});

document.getElementById('smoke').addEventListener('input', (e) => {
  smokeIntensity = parseFloat(e.target.value);
});

document.getElementById('forceField').addEventListener('input', (e) => {
  forceFieldStrength = parseFloat(e.target.value);
});

// Presets
document.getElementById('campfire').addEventListener('click', () => {
  intensity = 6;
  document.getElementById('intensity').value = 6;
  document.getElementById('color').value = '#ff6600';
  baseColor = [255, 102, 0];
  wind = 1;
  document.getElementById('wind').value = 1;
  turbulence = 3;
  document.getElementById('turbulence').value = 3;
  emberIntensity = 2;
  document.getElementById('embers').value = 2;
  smokeIntensity = 3;
  document.getElementById('smoke').value = 3;
  forceFieldStrength = 150;
  document.getElementById('forceField').value = 150;
});

document.getElementById('inferno').addEventListener('click', () => {
  intensity = 15;
  document.getElementById('intensity').value = 15;
  document.getElementById('color').value = '#ff3300';
  baseColor = [255, 51, 0];
  wind = 5;
  document.getElementById('wind').value = 5;
  turbulence = 8;
  document.getElementById('turbulence').value = 8;
  emberIntensity = 10;
  document.getElementById('embers').value = 10;
  smokeIntensity = 8;
  document.getElementById('smoke').value = 8;
  forceFieldStrength = 250;
  document.getElementById('forceField').value = 250;
});

document.getElementById('blueFlame').addEventListener('click', () => {
  intensity = 10;
  document.getElementById('intensity').value = 10;
  document.getElementById('color').value = '#3366ff';
  baseColor = [51, 102, 255];
  wind = -2;
  document.getElementById('wind').value = -2;
  turbulence = 6;
  document.getElementById('turbulence').value = 6;
  emberIntensity = 1;
  document.getElementById('embers').value = 1;
  smokeIntensity = 2;
  document.getElementById('smoke').value = 2;
  forceFieldStrength = 200;
  document.getElementById('forceField').value = 200;
});

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Ocultar/Mostrar controles
const controls = document.getElementById('controls');
const toggleButton = document.getElementById('toggleControls');

toggleButton.addEventListener('click', () => {
  controls.classList.toggle('hidden');
  if (controls.classList.contains('hidden')) {
    toggleButton.textContent = 'Mostrar Controles';
  } else {
    toggleButton.textContent = 'Ocultar Controles';
  }
});

// Event listeners para el campo de fuerza repelente
canvas.addEventListener('mousedown', (e) => {
  isMouseDown = true;
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('mouseup', () => {
  isMouseDown = false;
});

canvas.addEventListener('mouseleave', () => {
  isMouseDown = false;
});

// Prevenir el comportamiento predeterminado del arrastre del mouse
canvas.addEventListener('dragstart', (e) => {
  e.preventDefault();
});
</script>

</body></html>
