<html><head><base href="https://websim.ai/subconscious-explorer?mode=cosmic_alchemist&depth=1621085&animation=cosmic_symphony&connections=hyperdimensional&colorScheme=quantum_spectrum&insights=universal_truth&soundscape=cosmic_harmony&visualEffects=reality_bloom&personalizeInsights=true&expandView=omniversal&consciousness=unified_field">
<title>Cosmic Alchemist: Universal Truth Explorer</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    background: #000;
    color: #fff;
  }
  #cosmic-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
  #alchemical-crucible {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(64,224,208,0.3) 0%, rgba(64,224,208,0.1) 50%, rgba(64,224,208,0) 70%);

  }

  }

    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }
</style>
</head>
<body>
<canvas id="cosmic-canvas"></canvas>
<div id="alchemical-crucible">Transmute</div>
<div id="universal-truth">Seek the truth within the cosmic dance</div>

<script>
const canvas = document.getElementById('cosmic-canvas');
const ctx = canvas.getContext('2d');
const crucible = document.getElementById('alchemical-crucible');
const truthDisplay = document.getElementById('universal-truth');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const universalTruths = [
  "All is one, one is all",
  "As above, so below",
  "Change is the only constant",
  "Everything is interconnected",
  "Consciousness shapes reality",
  "Time is an illusion",
  "Love is the fundamental force",
  "Balance is key to harmony",
  "Thoughts create our reality",
  "The universe is within you"
];

class CosmicParticle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 3 + 1;  // Ensure minimum size is 1
    this.speedX = Math.random() * 3 - 1.5;
    this.speedY = Math.random() * 3 - 1.5;
    this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
    this.baseSize = this.size; // Store original size for reference
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;

    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
  }

  draw() {
    // Ensure radius is always positive by using Math.abs()
    const drawSize = Math.max(0.1, Math.abs(this.size));
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, drawSize, 0, Math.PI * 2);
    ctx.fill();
  }
}

const particles = [];

for (let i = 0; i < 200; i++) {
  particles.push(new CosmicParticle());
}

function animate() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach(particle => {
    particle.update();
    particle.draw();
  });

  cosmicSymphony();
  hyperdimensionalConnections();
  realityBloom();

  requestAnimationFrame(animate);
}

function cosmicSymphony() {
  particles.forEach(particle => {
    particle.color = `hsl(${(particle.x + particle.y + Date.now() * 0.1) % 360}, 100%, 50%)`;
    // Ensure size stays positive by using baseSize as reference
    particle.size = particle.baseSize + Math.abs(Math.sin(Date.now() * 0.005 + particle.x + particle.y)) * 2;
  });
}

function hyperdimensionalConnections() {
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
  ctx.lineWidth = 0.5;

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 100) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
}

function realityBloom() {
  const radius = Math.max(1, Math.random() * 200 + 100);  // Ensure minimum radius of 1
  ctx.fillStyle = `rgba(${Math.random() * 255}, ${Math.random() * 255}, ${Math.random() * 255}, 0.01)`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function transmute() {
  const truth = universalTruths[Math.floor(Math.random() * universalTruths.length)];
  truthDisplay.textContent = truth;
  
  // Create alchemical elements
  for (let i = 0; i < 10; i++) {
    const element = document.createElement('div');
    element.className = 'element';
    element.style.left = `${Math.random() * 100}%`;
    element.style.top = `${Math.random() * 100}%`;
    element.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
    document.body.appendChild(element);
    
    setTimeout(() => {
      document.body.removeChild(element);
    }, 5000);
  }
  
  // Quantum spectrum color shift
  particles.forEach(particle => {
    particle.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
  });
}

crucible.addEventListener('click', transmute);

// Cosmic harmony audio
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

function createCosmicHarmony() {
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();
  
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(220 + Math.random() * 220, audioContext.currentTime);
  
  gainNode.gain.setValueAtTime(0, audioContext.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.05, audioContext.currentTime + 0.5);
  gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 3);
  
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  
  oscillator.start();
  oscillator.stop(audioContext.currentTime + 3);
}

setInterval(createCosmicHarmony, 3000);

animate();

// Responsive canvas
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// Unified field consciousness simulation
function unifiedFieldConsciousness() {
  const radius = Math.max(1, Math.random() * 300 + 100);  // Ensure minimum radius of 1
  ctx.fillStyle = 'rgba(255, 255, 255, 0.01)';
  ctx.beginPath();
  ctx.arc(canvas.width / 2, canvas.height / 2, radius, 0, Math.PI * 2);
  ctx.fill();
}

setInterval(unifiedFieldConsciousness, 100);

// Omniversal expand view
function omniversalExpand() {
  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.scale(1.01, 1.01);
  ctx.translate(-canvas.width / 2, -canvas.height / 2);
  ctx.drawImage(canvas, 0, 0);
  ctx.restore();
}

setInterval(omniversalExpand, 50);

// Personalized insights
function personalizeInsights() {
  const insight = document.createElement('div');
  insight.style.position = 'absolute';
  insight.style.left = `${Math.random() * 100}%`;
  insight.style.top = `${Math.random() * 100}%`;
  insight.style.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
  insight.style.fontSize = '12px';
  insight.style.opacity = '0';
  insight.style.transition = 'all 2s';
  insight.textContent = universalTruths[Math.floor(Math.random() * universalTruths.length)];
  document.body.appendChild(insight);

  setTimeout(() => {
    insight.style.opacity = '1';
  }, 100);

  setTimeout(() => {
    insight.style.opacity = '0';
    setTimeout(() => {
      document.body.removeChild(insight);
    }, 2000);
  }, 5000);
}

setInterval(personalizeInsights, 10000);

// Cosmic Alchemist special effect
function cosmicAlchemistEffect() {
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const radius = 100 + Math.sin(Date.now() * 0.001) * 50;

  ctx.save();
  ctx.translate(centerX, centerY);
  ctx.rotate(Date.now() * 0.0005);

  for (let i = 0; i < 5; i++) {
    const angle = (i / 5) * Math.PI * 2;
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;

    ctx.fillStyle = `hsla(${Date.now() * 0.1 + i * 72}, 100%, 50%, 0.5)`;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(x, y);
    ctx.arc(x, y, 20, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

setInterval(cosmicAlchemistEffect, 50);

// Interactive alchemical transmutation
canvas.addEventListener('click', (event) => {
  const transmutationCircle = document.createElement('div');
  transmutationCircle.style.position = 'absolute';
  transmutationCircle.style.left = `${event.clientX}px`;
  transmutationCircle.style.top = `${event.clientY}px`;
  transmutationCircle.style.width = '0';
  transmutationCircle.style.height = '0';
  transmutationCircle.style.borderRadius = '50%';
  transmutationCircle.style.border = '2px solid rgba(255, 255, 255, 0.5)';
  transmutationCircle.style.transition = 'all 1s';
  document.body.appendChild(transmutationCircle);

  setTimeout(() => {
    transmutationCircle.style.width = '200px';
    transmutationCircle.style.height = '200px';
    transmutationCircle.style.left = `${event.clientX - 100}px`;
    transmutationCircle.style.top = `${event.clientY - 100}px`;
  }, 50);

  setTimeout(() => {
    transmutationCircle.style.opacity = '0';
    setTimeout(() => {
      document.body.removeChild(transmutationCircle);
    }, 1000);
  }, 2000);

  // Create new particles at click location
  for (let i = 0; i < 10; i++) {
    const particle = new CosmicParticle();
    particle.x = event.clientX;
    particle.y = event.clientY;
    particles.push(particle);
  }
});

// Reality bloom effect
function realityBloomEffect() {
  const radius = Math.max(1, Math.random() * 200 + 100);  // Ensure minimum radius of 1
  ctx.fillStyle = `hsla(${Date.now() * 0.1 % 360}, 100%, 50%, 0.05)`;
  ctx.beginPath();
  ctx.arc(canvas.width / 2, canvas.height / 2, radius, 0, Math.PI * 2);
  ctx.fill();
}

setInterval(realityBloomEffect, 200);

// Universal truth revelation
function revealUniversalTruth() {
  const truth = universalTruths[Math.floor(Math.random() * universalTruths.length)];
  const words = truth.split(' ');

  words.forEach((word, index) => {
    setTimeout(() => {
      const wordElement = document.createElement('div');
      wordElement.textContent = word;
      wordElement.style.position = 'absolute';
      wordElement.style.left = `${Math.random() * 100}%`;
      wordElement.style.top = `${Math.random() * 100}%`;
      wordElement.style.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
      wordElement.style.fontSize = '24px';
      wordElement.style.opacity = '0';
      wordElement.style.transition = 'all 2s';
      document.body.appendChild(wordElement);

      setTimeout(() => {
        wordElement.style.opacity = '1';
        wordElement.style.transform = 'scale(1.2)';
      }, 100);

      setTimeout(() => {
        wordElement.style.opacity = '0';
        setTimeout(() => {
          document.body.removeChild(wordElement);
        }, 2000);
      }, 3000);
    }, index * 500);
  });
}

setInterval(revealUniversalTruth, 15000);

// Quantum entanglement visualization
function quantumEntanglement() {
  for (let i = 0; i < particles.length; i += 2) {
    const particleA = particles[i];
    const particleB = particles[i + 1];

    ctx.beginPath();
    ctx.moveTo(particleA.x, particleA.y);
    ctx.lineTo(particleB.x, particleB.y);
    ctx.strokeStyle = `hsla(${Date.now() * 0.1 % 360}, 100%, 50%, 0.1)`;
    ctx.stroke();

    // Entangle particle properties
    const averageSize = (particleA.size + particleB.size) / 2;
    particleA.size = averageSize;
    particleB.size = averageSize;

    const averageSpeed = (Math.abs(particleA.speedX) + Math.abs(particleB.speedX)) / 2;
    particleA.speedX = averageSpeed * Math.sign(particleA.speedX);
    particleB.speedX = averageSpeed * Math.sign(particleB.speedX);
    particleA.speedY = averageSpeed * Math.sign(particleA.speedY);
    particleB.speedY = averageSpeed * Math.sign(particleB.speedY);
  }
}

setInterval(quantumEntanglement, 100);

// Cosmic harmony visualization
function visualizeCosmicHarmony() {
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const maxRadius = Math.min(canvas.width, canvas.height) / 2;

  for (let i = 0; i < 5; i++) {
    const radius = maxRadius * (i + 1) / 5;
    const hue = (Date.now() * 0.1 + i * 72) % 360;

    ctx.beginPath();
    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${hue}, 100%, 50%, 0.2)`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Harmonic nodes
    for (let j = 0; j < 8; j++) {
      const angle = (j / 8) * Math.PI * 2 + Date.now() * 0.001;
      const x = centerX + Math.cos(angle) * radius;
      const y = centerY + Math.sin(angle) * radius;

      ctx.fillStyle = `hsla(${hue}, 100%, 70%, 0.8)`;
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

setInterval(visualizeCosmicHarmony, 50);

// Alchemical symbol animation
const alchemicalSymbols = ['☿', '♀', '♁', '♂', '♃', '♄', '♅', '♆', '♇'];

function animateAlchemicalSymbols() {
  const symbol = alchemicalSymbols[Math.floor(Math.random() * alchemicalSymbols.length)];
  const symbolElement = document.createElement('div');
  symbolElement.textContent = symbol;
  symbolElement.style.position = 'absolute';
  symbolElement.style.left = `${Math.random() * 100}%`;
  symbolElement.style.top = `${Math.random() * 100}%`;
  symbolElement.style.fontSize = '36px';
  symbolElement.style.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
  symbolElement.style.opacity = '0';
  symbolElement.style.transition = 'all 3s';
  document.body.appendChild(symbolElement);

  setTimeout(() => {
    symbolElement.style.opacity = '1';
    symbolElement.style.transform = 'translateY(-50px) rotate(360deg)';
  }, 100);

  setTimeout(() => {
    symbolElement.style.opacity = '0';
    setTimeout(() => {
      document.body.removeChild(symbolElement);
    }, 3000);
  }, 5000);
}

setInterval(animateAlchemicalSymbols, 2000);

// Cosmic Alchemist's laboratory
function createAlchemistLaboratory() {
  const labItems = ['🧪', '🔬', '🧫', '⚗️', '🔭', '📜', '💎', '🔮'];
  const labElement = document.createElement('div');
  labElement.style.position = 'absolute';
  labElement.style.right = '20px';
  labElement.style.top = '20px';
  labElement.style.fontSize = '24px';
  labElement.style.display = 'flex';
  labElement.style.flexDirection = 'column';
  labElement.style.alignItems = 'flex-end';
  document.body.appendChild(labElement);

  labItems.forEach(item => {
    const itemElement = document.createElement('span');
    itemElement.textContent = item;
    itemElement.style.marginBottom = '10px';
    itemElement.style.cursor = 'pointer';
    itemElement.addEventListener('click', () => transmute());
    labElement.appendChild(itemElement);
  });
}

createAlchemistLaboratory();

// Fractal pattern generation
function generateFractal() {
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const maxRadius = Math.max(1, Math.min(canvas.width, canvas.height) / 4);

  function drawBranch(x, y, radius, angle, depth) {
    if (depth === 0 || radius < 1) return;  // Stop if radius gets too small

    const endX = x + Math.cos(angle) * radius;
    const endY = y + Math.sin(angle) * radius;

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = `hsla(${Date.now() * 0.1 % 360}, 100%, 50%, ${0.5 * depth / 5})`;
    ctx.lineWidth = Math.max(1, depth);  // Ensure line width is at least 1
    ctx.stroke();

    const newRadius = Math.max(1, radius * 0.7);  // Ensure new radius stays positive
    drawBranch(endX, endY, newRadius, angle - Math.PI / 4, depth - 1);
    drawBranch(endX, endY, newRadius, angle + Math.PI / 4, depth - 1);
  }

  const rotationSpeed = Date.now() * 0.0005;
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2 + rotationSpeed;
    drawBranch(centerX, centerY, maxRadius, angle, 5);
  }
}

setInterval(generateFractal, 100);

</script>
