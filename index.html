<html><head><base href="https://aianimationgenerator.ai/create/prompt=Ultimate%252090s%2520Nicktoons%2520Mashup">
<title>Ultimate 90s Nicktoons Mashup Extravaganza</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  body { margin: 0; overflow: hidden; background-color: #FF6600; color: #ffffff; font-family: 'Comic Sans MS', cursive, sans-serif; }
  #animation-container { width: 100vw; height: 100vh; }
  #control-box {
    position: fixed;
    top: 20px;
    left: 20px;
    background-color: rgba(0, 128, 128, 0.7);
    padding: 20px;
    border-radius: 10px;
    z-index: 100;
  }
  #prompt-input {
    width: 200px;
    padding: 5px;
    margin-right: 10px;
    border: 2px solid #9933CC;
    border-radius: 5px;
  }
  #generate-btn {
    padding: 5px 10px;
    background-color: #9933CC;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
  }
  #audio-controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 100;
  }
  #play-audio {
    padding: 10px 20px;
    background-color: #33CC33;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 25px;
    font-size: 16px;
  }
  #nickelodeon-splat {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    color: #FF6600;
    text-shadow: 2px 2px #000000;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #character-info {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: rgba(0, 0, 0, 0.7);
    padding: 10px;
    border-radius: 5px;
  }
</style>
</head>
<body>
<div id="animation-container"></div>
<div id="control-box">
  <h2>Ultimate 90s Nicktoons Mashup</h2>
  <input type="text" id="prompt-input" placeholder="Enter a nostalgic prompt">
  <button id="generate-btn">Generate Cartoon Chaos</button>
</div>
<div id="audio-controls">
  <button id="play-audio">Play Nostalgic Sounds</button>
</div>
<div id="nickelodeon-splat">SPLAT!</div>
<div id="character-info"></div>

<script>
// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xFF6600);
document.getElementById('animation-container').appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xFFCCCC);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xFFFFFF, 0.5);
directionalLight.position.set(5, 5, 5);
scene.add(directionalLight);

// Create stylized characters
function createCharacter(color, shape, name) {
  const character = new THREE.Group();

  let bodyGeometry;
  switch(shape) {
    case 'box':
      bodyGeometry = new THREE.BoxGeometry(1, 1.5, 0.5);
      break;
    case 'sphere':
      bodyGeometry = new THREE.SphereGeometry(0.75, 32, 32);
      break;
    case 'cone':
      bodyGeometry = new THREE.ConeGeometry(0.75, 1.5, 32);
      break;
    case 'cylinder':
      bodyGeometry = new THREE.CylinderGeometry(0.5, 0.5, 1.5, 32);
      break;
    default:
      bodyGeometry = new THREE.BoxGeometry(1, 1.5, 0.5);
  }
  
  const bodyMaterial = new THREE.MeshPhongMaterial({ color: color });
  const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
  character.add(body);

  const headGeometry = new THREE.SphereGeometry(0.5, 32, 32);
  const headMaterial = new THREE.MeshPhongMaterial({ color: color });
  const head = new THREE.Mesh(headGeometry, headMaterial);
  head.position.y = 1;
  character.add(head);

  character.name = name;
  return character;
}

// Create multiple characters
const characters = [];
const characterData = [
  { color: 0x9933CC, shape: 'box', name: 'Doug' },
  { color: 0x33CC33, shape: 'sphere', name: 'Tommy Pickles' },
  { color: 0xFF3366, shape: 'cone', name: 'Ren' },
  { color: 0x3366FF, shape: 'cylinder', name: 'Rocko' },
  { color: 0xFFFF00, shape: 'box', name: 'Arnold' },
  { color: 0xFF6600, shape: 'sphere', name: 'CatDog' },
  { color: 0x00FFFF, shape: 'cone', name: 'Stimpy' },
  { color: 0xFF00FF, shape: 'cylinder', name: 'Helga Pataki' }
];

characterData.forEach((data, index) => {
  const character = createCharacter(data.color, data.shape, data.name);
  character.position.set((index - 3.5) * 2, 0, 0);
  scene.add(character);
  characters.push(character);
});

// Background elements
function createBackgroundElement(geometry, color, x, y, z) {
  const material = new THREE.MeshPhongMaterial({ color: color });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(x, y, z);
  scene.add(mesh);
  return mesh;
}

const backgroundElements = [
  createBackgroundElement(new THREE.BoxGeometry(2, 2, 2), 0x00FFFF, -5, 3, -5),
  createBackgroundElement(new THREE.SphereGeometry(1, 32, 32), 0xFF00FF, 5, 2, -5),
  createBackgroundElement(new THREE.ConeGeometry(1, 2, 32), 0xFFFF00, 0, 4, -6),
  createBackgroundElement(new THREE.TorusGeometry(1, 0.4, 16, 100), 0x33CC33, -3, -2, -4),
  createBackgroundElement(new THREE.OctahedronGeometry(1), 0xFF3366, 3, -3, -5)
];

// Camera setup
camera.position.z = 10;

// Animation variables
let isAnimating = false;
let animationTime = 0;

// Raycaster for character selection
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Animation
function animate() {
  requestAnimationFrame(animate);
  
  if (isAnimating) {
    animationTime += 0.016; // Assuming 60fps
    
    characters.forEach((character, index) => {
      character.position.y = Math.sin(animationTime * 2 + index) * 0.5;
      character.rotation.y = Math.sin(animationTime * 3 + index) * 0.5;
    });

    backgroundElements.forEach((element, index) => {
      element.rotation.x = animationTime * (index + 1) * 0.1;
      element.rotation.y = animationTime * (index + 1) * 0.15;
    });

    camera.position.x = Math.sin(animationTime * 0.5) * 2;
    camera.position.y = Math.cos(animationTime * 0.5) * 2;
    camera.lookAt(0, 0, 0);
  }
  
  renderer.render(scene, camera);
}

animate();

// Audio context setup
let audioContext;
let masterGainNode;

function setupAudioContext() {
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  masterGainNode = audioContext.createGain();
  masterGainNode.connect(audioContext.destination);
}

// Sound generation
function playCartoonSound() {
  const duration = 0.1 + Math.random() * 0.2;
  const frequency = 200 + Math.random() * 500;
  
  const oscillator = audioContext.createOscillator();
  oscillator.type = ['sine', 'square', 'sawtooth', 'triangle'][Math.floor(Math.random() * 4)];
  oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
  oscillator.frequency.exponentialRampToValueAtTime(frequency * 2, audioContext.currentTime + duration);
  
  const gainNode = audioContext.createGain();
  gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + duration);
  
  oscillator.connect(gainNode);
  gainNode.connect(masterGainNode);
  
  oscillator.start();
  oscillator.stop(audioContext.currentTime + duration);
}

// Nickelodeon splat animation
function showNickelodeonSplat() {
  const splat = document.getElementById('nickelodeon-splat');
  splat.style.opacity = '1';
  setTimeout(() => {
    splat.style.opacity = '0';
  }, 1000);
}

// Handle window resizing
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Generate new animation
function generateAnimation(prompt) {
  window.location.href = `https://aianimationgenerator.ai/create/prompt=${encodeURIComponent(prompt)}`;
}

document.getElementById('generate-btn').addEventListener('click', () => {
  const prompt = document.getElementById('prompt-input').value;
  generateAnimation(prompt);
});

document.getElementById('prompt-input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    const prompt = document.getElementById('prompt-input').value;
    generateAnimation(prompt);
  }
});

// Audio controls
document.getElementById('play-audio').addEventListener('click', () => {
  if (!audioContext) {
    setupAudioContext();
  }
  if (!isAnimating) {
    isAnimating = true;
    animationTime = 0;
    
    // Play cartoon sounds
    let soundInterval = setInterval(() => {
      if (isAnimating) {
        playCartoonSound();
        if (Math.random() < 0.2) {
          showNickelodeonSplat();
        }
      } else {
        clearInterval(soundInterval);
      }
    }, 200);
  }
});

// Character selection
function onMouseMove(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(characters, true);

  if (intersects.length > 0) {
    const selectedCharacter = intersects[0].object.parent;
    showCharacterInfo(selectedCharacter.name);
  } else {
    hideCharacterInfo();
  }
}

function showCharacterInfo(characterName) {
  const infoBox = document.getElementById('character-info');
  infoBox.innerHTML = `<h3>${characterName}</h3>`;
  infoBox.style.display = 'block';
}

function hideCharacterInfo() {
  const infoBox = document.getElementById('character-info');
  infoBox.style.display = 'none';
}

window.addEventListener('mousemove', onMouseMove, false);

// Initial audio context setup
setupAudioContext();
</script>
</body></html>
