<html><head><base href="https://rodri.com/"></head>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crashout&apos;s Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Vermin Vibes';
            src: url('Vermin%20Vibes.ttf') format('truetype');
        }

        @font-face {
            font-family: 'MonospaceTypewriter';
            src: url('https://file.garden/ZqqVoKhJuCvIIv7X/MonospaceTypewriter.ttf') format('truetype');
        }

        @keyframes ellipsis {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        .loading::after {
            content: '.';
            display: inline-block;
            animation: ellipsis 1.5s infinite;
        }

        .loading {
            color: #ccc;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'MonospaceTypewriter', monospace;
            color: #fff;
        }

        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(168, 85, 247, 0.1);
            border-radius: 15px;
            padding: 20px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0;
            border: 3px solid #a855f7;
            background: rgba(168, 85, 247, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
        }

        h1 {
            font-family: 'Vermin Vibes', cursive;
            font-size: 3em;
            font-weight: normal;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 10px #e0f;
            margin: 0;
        }

        .profile-description {
            font-family: 'MonospaceTypewriter', monospace;
            font-size: 1.1em;
            line-height: 1.6;
            margin: 20px 0;
            color: #ccc;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .stat-box {
            background: rgba(168, 85, 247, 0.2);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-box:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-family: 'MonospaceTypewriter', monospace;
            font-size: 2em;
            font-weight: bold;
            color: #a855f7;
        }

        .stat-label {
            font-family: 'MonospaceTypewriter', monospace;
            font-size: 0.9em;
            color: #ccc;
            margin-top: 5px;
        }

        .socials {
            margin-top: 20px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .social-icon {
            width: 30px;
            height: 30px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .social-icon:hover {
            transform: scale(1.1);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0 20px;
        }

        .tab {
            font-family: 'MonospaceTypewriter', monospace;
            background: rgba(168, 85, 247, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab:hover, .tab.active {
            background: rgba(168, 85, 247, 0.4);
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
            align-items: stretch;
        }

        .project-card {
            background: rgba(168, 85, 247, 0.2);
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: auto;
            min-height: 280px;
        }

        .project-card:hover {
            transform: translateY(-5px);
        }

        .project-title {
            font-family: 'MonospaceTypewriter', monospace;
            font-size: 1.2em;
            margin: 15px 0; 
            word-break: break-word;
        }

        .project-thumbnail {
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            position: relative;
        }

        .project-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .project-card:hover .project-thumbnail img {
            transform: scale(1.05);
        }

        .project-meta {
            font-family: 'MonospaceTypewriter', monospace;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            color: #a855f7;
            font-size: 0.9em;
            margin-top: auto;
            border-top: 1px solid rgba(168, 85, 247, 0.3);
            padding-top: 15px;
        }

        .project-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .material-symbols-outlined {
            font-size: 1.2em;
            vertical-align: middle;
        }

        .profile-thumbnail {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0; 
            overflow: hidden;
            background: rgba(168, 85, 247, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .default-avatar {
            font-size: 2em;
            color: #fff;
        }

        .profile-card {
            display: flex;
            align-items: center;
            flex-direction: row;
            gap: 15px;
            padding: 15px;
            min-height: fit-content;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .profile-info {
            flex-grow: 1;
        }
    </style>
</head>
<body>
    <canvas id="starfield" class="starfield"></canvas>

    <div class="container">
        <div class="profile-header">
            <div class="profile-section">
                <div class="profile-avatar" id="profileAvatar">...</div>
                <h1>@fav</h1>
            </div>
            <p class="profile-description">dumb nut who creates either bangers or nangers.</p>
            
            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-number" id="projectCount">
                        <span class="loading">...</span>
                    </div>
                    <div class="stat-label">Projects</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="followingCount">
                        <span class="loading">...</span>
                    </div>
                    <div class="stat-label">Following</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="followerCount">
                        <span class="loading">...</span>
                    </div>
                    <div class="stat-label">Followers</div>
                </div>
            </div>

            <div class="socials">
                <div class="social-icons">
                    <svg class="social-icon" viewBox="0 0 24 24" onclick="openSocial(&apos;https://www.youtube.com/@Voxol-&apos;)">
                        <path fill="#ffffff" d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab(&apos;projects&apos;)">Projects</div>
            <div class="tab" onclick="switchTab(&apos;following&apos;)">Following</div>
            <div class="tab" onclick="switchTab(&apos;followers&apos;)">Followers</div>
        </div>

        <div class="content-grid" id="projectsGrid">
            <div class="loading">Loading projects...</div>
        </div>
    </div>

    <script>const cache = {
  projects: null,
  following: null,
  followers: null,
  profileData: null
};
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;
const numStars = 200;
const stars = [];
class Star {
  constructor() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.speed = 0.1 + Math.random() * 0.5;
    this.color = '#fff';
    this.radius = 0.5 + Math.random() * 1;
  }
  move(scrollSpeed) {
    if (scrollSpeed !== 0) {
      this.y -= scrollSpeed * 0.05;
      if (this.y >= height) {
        this.y = 0;
      } else if (this.y < 0) {
        this.y = height;
      }
    }
  }
  draw() {
    ctx.beginPath();
    ctx.fillStyle = this.color;
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}
for (let i = 0; i < numStars; i++) {
  stars.push(new Star());
}
let scrollSpeed = 0;
let lastScrollTop = 0;
window.addEventListener('scroll', () => {
  let st = window.pageYOffset || document.documentElement.scrollTop;
  scrollSpeed = st - lastScrollTop;
  lastScrollTop = st <= 0 ? 0 : st;
});
function animate() {
  ctx.fillStyle = 'black';
  ctx.fillRect(0, 0, width, height);
  stars.forEach(star => {
    star.move(scrollSpeed);
    star.draw();
  });
  scrollSpeed *= 0.9;
  if (Math.abs(scrollSpeed) < 0.1) scrollSpeed = 0;
  requestAnimationFrame(animate);
}
animate();
window.addEventListener('resize', () => {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
});
function openSocial(url) {
  window.open(url, '_blank');
}
async function loadProfileData() {
  if (cache.profileData) {
    displayProfileData(cache.profileData);
    return;
  }
  try {
    const userResponse = await fetch('/api/v1/users/fav');
    const userData = await userResponse.json();
    let allProjects = [];
    let hasNextPage = true;
    let after = null;
    while (hasNextPage) {
      const url = `/api/v1/users/fav/projects?posted=true${after ? `&after=${after}` : ''}`;
      const response = await fetch(url);
      const data = await response.json();
      allProjects = [...allProjects, ...data.projects.data];
      hasNextPage = data.projects.meta.has_next_page;
      after = data.projects.meta.end_cursor;
    }
    const followingResponse = await fetch('/api/v1/users/fav/following?count=true');
    const followersResponse = await fetch('/api/v1/users/fav/followers?count=true');
    const followingData = await followingResponse.json();
    const followersData = await followersResponse.json();
    cache.profileData = {
      userData,
      projectCount: allProjects.length,
      followingCount: followingData.following.meta.count,
      followersCount: followersData.followers.meta.count
    };
    displayProfileData(cache.profileData);
  } catch (error) {
    console.error('Error loading profile data:', error);
  }
}
function displayProfileData(data) {
  if (data.userData.user.avatar_url) {
    document.getElementById('profileAvatar').innerHTML = `
                    <img src="${data.userData.user.avatar_url}" alt="@rodri profile picture" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                `;
  }
  document.getElementById('projectCount').innerHTML = data.projectCount;
  document.getElementById('followingCount').innerHTML = data.followingCount;
  document.getElementById('followerCount').innerHTML = data.followersCount;
}
async function loadProjects() {
  const projectsGrid = document.getElementById('projectsGrid');
  if (cache.projects) {
    displayProjects(cache.projects);
    return;
  }
  projectsGrid.innerHTML = '<div class="loading">Loading projects...</div>';
  try {
    let allProjects = [];
    let hasNextPage = true;
    let after = null;
    while (hasNextPage) {
      const url = `/api/v1/users/fav/projects?posted=true${after ? `&after=${after}` : ''}`;
      const response = await fetch(url);
      const data = await response.json();
      allProjects = [...allProjects, ...data.projects.data];
      hasNextPage = data.projects.meta.has_next_page;
      after = data.projects.meta.end_cursor;
    }
    cache.projects = allProjects;
    displayProjects(allProjects);
  } catch (error) {
    console.error('Error loading projects:', error);
    projectsGrid.innerHTML = '<div>Error loading projects</div>';
  }
}
function displayProjects(projects) {
  const projectsGrid = document.getElementById('projectsGrid');
  projectsGrid.innerHTML = '';
  projects.forEach(({
    project,
    site
  }) => {
    const card = document.createElement('div');
    card.className = 'project-card';
    const thumbnailUrl = site ? `https://images.websim.ai/v1/site/${site.id}/600` : '';
    card.innerHTML = `
                    <div class="project-thumbnail">
                        <img src="${thumbnailUrl}" alt="${project.title || 'Untitled Project'}" 
                             onerror="this.style.display='none'">
                    </div>
                    <h3 class="project-title">${project.title || 'Untitled Project'}</h3>
                    <div class="project-meta">
                        <span>
                            <span class="material-symbols-outlined">visibility</span>
                            ${project.stats.views}
                        </span>
                        <span>
                            <span class="material-symbols-outlined">favorite</span>
                            ${project.stats.likes}
                        </span>
                    </div>
                `;
    card.onclick = () => {
      window.open(`https://websim.ai/p/${project.id}`, '_blank');
    };
    projectsGrid.appendChild(card);
  });
}
async function loadFollowers() {
  const contentGrid = document.getElementById('projectsGrid');
  if (cache.followers) {
    displayProfiles(cache.followers, contentGrid);
    return;
  }
  contentGrid.innerHTML = '<div class="loading">Loading followers...</div>';
  try {
    const response = await fetch('/api/v1/users/fav/followers');
    const data = await response.json();
    cache.followers = data.followers.data;
    displayProfiles(cache.followers, contentGrid);
  } catch (error) {
    console.error('Error loading followers:', error);
    contentGrid.innerHTML = '<div>Error loading followers</div>';
  }
}
function displayProfiles(profiles, container) {
  container.innerHTML = '';
  profiles.forEach(({
    follow
  }) => {
    const card = document.createElement('div');
    card.className = 'project-card profile-card';
    card.innerHTML = `
                    <div class="profile-thumbnail">
                        ${follow.user.avatar_url ? `<img src="${follow.user.avatar_url}" alt="${follow.user.username}'s avatar">` : `<div class="default-avatar">@</div>`}
                    </div>
                    <div class="profile-info">
                        <h3 class="project-title">@${follow.user.username}</h3>
                    </div>
                `;
    card.onclick = () => {
      window.open(`https://websim.ai/@${follow.user.username}`, '_blank');
    };
    container.appendChild(card);
  });
}
async function loadFollowing() {
  const contentGrid = document.getElementById('projectsGrid');
  if (cache.following) {
    displayProfiles(cache.following, contentGrid);
    return;
  }
  contentGrid.innerHTML = '<div class="loading">Loading following...</div>';
  try {
    const response = await fetch('/api/v1/users/fav/following');
    const data = await response.json();
    cache.following = data.following.data;
    displayProfiles(cache.following, contentGrid);
  } catch (error) {
    console.error('Error loading following:', error);
    contentGrid.innerHTML = '<div>Error loading following</div>';
  }
}
function switchTab(tab) {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  switch (tab) {
    case 'projects':
      loadProjects();
      break;
    case 'following':
      loadFollowing();
      break;
    case 'followers':
      loadFollowers();
      break;
  }
}
loadProfileData();
loadProjects();</script>
</body>
</html></html>
