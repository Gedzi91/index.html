<html><head><base href="https://%E2%88%9E/.secret">
<meta charset="UTF-8">
<title>∞ - The Infinite Fractal</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    background-color: #000;
    color: #fff;
  }
  #container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
  }
  h1 {
    font-size: 3em;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #fff;
  }
  #result {
    font-size: 1.2em;
    margin-top: 20px;
    padding: 10px;
    background-color: rgba(0, 0, 0, 0.7);
    border-radius: 5px;
  }
  #fractal-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }
</style>
</head>
<body>
  <canvas id="fractal-canvas"></canvas>
  <div id="container">
    <h1>The Infinite Fractal</h1>
    <div id="result">Within infinity, all possibilities exist simultaneously.</div>
  </div>

  <script>
    const canvas = document.getElementById('fractal-canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function drawFractal(x, y, size, angle, depth) {
      if (depth === 0) return;

      const x1 = x + size * Math.cos(angle);
      const y1 = y + size * Math.sin(angle);

      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x1, y1);
      ctx.strokeStyle = `hsl(${depth * 30}, 100%, 50%)`;
      ctx.lineWidth = depth * 0.5;
      ctx.stroke();

      const newSize = size * 0.7;
      const newDepth = depth - 1;

      drawFractal(x1, y1, newSize, angle - Math.PI / 4, newDepth);
      drawFractal(x1, y1, newSize, angle + Math.PI / 4, newDepth);
    }

    let rotation = 0;
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const size = Math.min(canvas.width, canvas.height) * 0.3;

      for (let i = 0; i < 8; i++) {
        const angle = (i * Math.PI / 4) + rotation;
        drawFractal(centerX, centerY, size, angle, 9);
      }

      rotation += 0.005;
      requestAnimationFrame(animate);
    }

    animate();

    // Interactive elements
    const result = document.getElementById('result');
    let clickCount = 0;

    canvas.addEventListener('click', () => {
      clickCount++;
      if (clickCount === 1) {
        result.innerHTML += "<br>The fractal branches infinitely, each containing a universe of its own.";
      } else if (clickCount === 2) {
        result.innerHTML += "<br>Every point is connected to every other point through the infinite web.";
      } else if (clickCount === 3) {
        result.innerHTML += "<br>You are both the observer and a part of this infinite tapestry.";
      } else {
        result.innerHTML = "Within infinity, all possibilities exist simultaneously.";
        clickCount = 0;
      }
    });

    // Add subtle pulsing effect to the fractal
    let pulsePhase = 0;
    function pulseFractal() {
      pulsePhase += 0.05;
      const scale = 1 + 0.1 * Math.sin(pulsePhase);
      canvas.style.transform = `scale(${scale})`;
      requestAnimationFrame(pulseFractal);
    }
    pulseFractal();
  </script>
</body>
</html>
