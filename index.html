<html><head><base href="." />
<style>
body {
    margin: 0;
    padding: 20px;
    background: #0f0f1f;
    color: white;
    font-family: Arial, sans-serif;
}

.animation-container {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    text-align: center;
}

.scene {
    width: 100%;
    height: 400px;
    background: #1a1a2f;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
}

.robot {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
}

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

@keyframes antenna-pulse {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(1.2); }
}

.stars {
    position: absolute;
    width: 100%;
    height: 100%;
}

.controls {
    margin-top: 20px;
}

button {
    background: #4a4a8f;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    margin: 0 10px;
    transition: background 0.3s;
}

button:hover {
    background: #6a6aaf;
}
</style>
</head>
<body>
<div class="animation-container">
    <h1>AI-Powered Animation</h1>
    <div class="scene" id="animationScene">
        <!-- Stars Background -->
        <svg class="stars" viewBox="0 0 800 400">
            <g id="stars"></g>
        </svg>
        
        <!-- AI Robot -->
        <svg class="robot" width="120" height="160" viewBox="0 0 120 160">
            <!-- Robot Head -->
            <rect x="30" y="20" width="60" height="60" rx="10" fill="#3498db" />
            
            <!-- Antenna -->
            <rect id="antenna" x="55" y="5" width="10" height="15" fill="#e74c3c" />
            <circle cx="60" cy="5" r="5" fill="#e74c3c" />
            
            <!-- Eyes -->
            <circle class="eye" cx="45" cy="45" r="8" fill="#fff" />
            <circle class="eye" cx="75" cy="45" r="8" fill="#fff" />
            <circle class="pupil" cx="45" cy="45" r="4" fill="#2c3e50" />
            <circle class="pupil" cx="75" cy="45" r="4" fill="#2c3e50" />
            
            <!-- Body -->
            <rect x="35" y="85" width="50" height="60" rx="5" fill="#2980b9" />
            
            <!-- Arms -->
            <rect class="arm" x="15" y="90" width="20" height="10" rx="5" fill="#3498db" />
            <rect class="arm" x="85" y="90" width="20" height="10" rx="5" fill="#3498db" />
        </svg>
    </div>
    <div class="controls">
        <button onclick="toggleAnimation()">Toggle Animation</button>
        <button onclick="changeColors()">Change Colors</button>
    </div>
</div>

<script>
// Generate random stars
function generateStars() {
    const starsGroup = document.getElementById('stars');
    for(let i = 0; i < 100; i++) {
        const star = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        star.setAttribute("cx", Math.random() * 800);
        star.setAttribute("cy", Math.random() * 400);
        star.setAttribute("r", Math.random() * 2);
        star.setAttribute("fill", "#fff");
        star.style.animation = `blink ${2 + Math.random() * 3}s infinite`;
        starsGroup.appendChild(star);
    }
}

// Initialize animations
let isAnimating = true;
const robot = document.querySelector('.robot');
robot.style.animation = 'float 3s ease-in-out infinite';

document.querySelectorAll('.eye').forEach(eye => {
    eye.style.animation = 'blink 2s infinite';
});

document.querySelector('#antenna').style.animation = 'antenna-pulse 1.5s infinite';

// Toggle animation
function toggleAnimation() {
    isAnimating = !isAnimating;
    robot.style.animation = isAnimating ? 'float 3s ease-in-out infinite' : 'none';
}

// Change colors randomly
function changeColors() {
    const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6'];
    const randomColor = () => colors[Math.floor(Math.random() * colors.length)];
    
    document.querySelector('rect[x="30"]').setAttribute('fill', randomColor());
    document.querySelector('rect[x="35"]').setAttribute('fill', randomColor());
    document.querySelector('#antenna').setAttribute('fill', randomColor());
}

// Initialize stars on load
generateStars();

// Add some interactivity
document.querySelector('.scene').addEventListener('mousemove', (e) => {
    const rect = e.target.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    
    document.querySelectorAll('.pupil').forEach(pupil => {
        pupil.setAttribute('cx', parseFloat(pupil.parentElement.getAttribute('cx')) + (x - 0.5) * 4);
        pupil.setAttribute('cy', parseFloat(pupil.parentElement.getAttribute('cy')) + (y - 0.5) * 4);
    });
});
</script>
</body></html>
