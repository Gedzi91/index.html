<html><head><base href="." target="_blank"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
<style>
:root {
  --face-color: #E0E0E0;
  --eye-color: #2196F3;
  --mouth-color: #424242;
}

/* Adding heart beat animation for love eyes */
@keyframes heartbeat {
  0%, 100% { transform: rotate(45deg) scale(1); }
  50% { transform: rotate(45deg) scale(1.2); }
}

@keyframes lookAround {
  0%, 100% { transform: translateX(0) translateY(0); }
  25% { transform: translateX(-5px) translateY(-2px); }
  50% { transform: translateX(5px) translateY(2px); }
  75% { transform: translateX(-3px) translateY(-1px); }
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes squint {
  0%, 100% { transform: rotate(-10deg) scaleY(1); }
}

@keyframes tearDrop {
  0% { 
    transform: translateX(-50%) translateY(0) scaleY(1);
    opacity: 1;
  }
  70% { 
    transform: translateX(-50%) translateY(40px) scaleY(1.1);
    opacity: 0.7;
  }
  100% { 
    transform: translateX(-50%) translateY(60px) scaleY(1.2);
    opacity: 0;
  }
}

/* Add new keyframe for happy bounce - gentler than laughing bounce */
@keyframes happyBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* Add new keyframe for happy eyes squinting */
@keyframes happyEyes {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(0.8); }
}

.robot-face {
  width: 300px;
  height: 300px;
  background: var(--face-color);
  border-radius: 50%;
  position: relative;
  margin: 50px auto;
  box-shadow: inset -20px -20px 60px rgba(0,0,0,0.2),
              inset 20px 20px 60px rgba(255,255,255,0.8);
  cursor: pointer;
  transition: all 0.3s ease;
}

.robot-face:hover {
  transform: scale(1.05);
}

.eyebrows {
  position: absolute;
  top: 28%;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 0 50px;
  box-sizing: border-box;
}

.eyebrow {
  width: 50px;
  height: 8px;
  background: var(--mouth-color);
  border-radius: 4px;
  transition: all 0.3s ease;
}

.eyes {
  position: absolute;
  top: 35%;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 0 60px;
  box-sizing: border-box;
}

.eye {
  width: 40px;
  height: 40px;
  background: var(--eye-color);
  border-radius: 50%;
  position: relative;
  animation: blink 4s infinite;  /* Only keep the blink animation by default */
}

.tear {
  display: none;
  position: absolute;
  width: 8px; /* Slightly narrower */
  height: 25px; /* Longer tears */
  background: linear-gradient(180deg, #2196F3, rgba(33, 150, 243, 0.6));
  border-radius: 50% 50% 50% 50%;
  bottom: -25px;
  left: 50%;
  transform: translateX(-50%);
  animation: tearDrop 1.5s infinite; /* Faster animation */
}

.heart {
  display: none;
  position: absolute;
  width: 20px;
  height: 20px;
  background: #FF4081;
  transform: rotate(45deg);
  top: -30px;
  animation: float 2s infinite;
}

.heart:before,
.heart:after {
  content: '';
  width: 20px;
  height: 20px;
  background: #FF4081;
  border-radius: 50%;
  position: absolute;
}

.heart:before {
  left: -10px;
}

.heart:after {
  top: -10px;
}

@keyframes float {
  0%, 100% { transform: rotate(45deg) translateY(0); }
  50% { transform: rotate(45deg) translateY(-10px); }
}

.mouth {
  position: absolute;
  bottom: 25%;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 20px;
  background: var(--mouth-color);
  border-radius: 10px;
  transition: all 0.3s ease;
}

@keyframes blink {
  0%, 48%, 52%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(0.1); }
}

.looking-around .eye {
  animation: lookAround 3s infinite, blink 4s infinite;
}

.expressions {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
  flex-wrap: wrap;
  max-width: 600px;
  margin: 20px auto;
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
  background: #2196F3;
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn:hover {
  background: #1976D2;
  transform: translateY(-2px);
}
</style>
</head>
<body>
<div class="robot-face">
  <div class="eyebrows">
    <div class="eyebrow"></div>
    <div class="eyebrow"></div>
  </div>
  <div class="eyes">
    <div class="eye"><div class="tear"></div></div>
    <div class="eye"><div class="tear"></div></div>
  </div>
  <div class="mouth"></div>
  <div class="heart"></div>
</div>

<div class="expressions">
  <button class="btn" onclick="setExpression('happy')">Happy</button>
  <button class="btn" onclick="setExpression('sad')">Sad</button>
  <button class="btn" onclick="setExpression('surprised')">Surprised</button>
  <button class="btn" onclick="setExpression('neutral')">Neutral</button>
  <button class="btn" onclick="setExpression('angry')">Angry</button>
  <button class="btn" onclick="setExpression('excited')">Excited</button>
  <button class="btn" onclick="setExpression('confused')">Confused</button>
  <button class="btn" onclick="setExpression('sleepy')">Sleepy</button>
  <button class="btn" onclick="setExpression('crying')">Crying</button>
  <button class="btn" onclick="setExpression('love')">Love</button>
  <button class="btn" onclick="setExpression('laughing')">Laughing</button>
</div>

<div id="connection-status" style="text-align: center; margin-top: 20px;">
  MQTT Status: Disconnected
</div>

<script>
// MQTT Setup
const clientId = 'cosmo_robot_' + Math.random().toString(16).substr(2, 8);
const host = 'wss://broker.hivemq.com:8884/mqtt';
const options = {
  keepalive: 60,
  clientId: clientId,
  protocolId: 'MQTT',
  protocolVersion: 4,
  clean: true,
  reconnectPeriod: 1000,
  connectTimeout: 30 * 1000
};

const client = mqtt.connect(host, options);

let idleTimer;
let isIdle = false;

// Function to handle user interaction
function handleInteraction() {
  clearTimeout(idleTimer);
  if (isIdle) {
    document.querySelector('.robot-face').classList.remove('looking-around');
    isIdle = false;
  }
  
  // Set new idle timer
  idleTimer = setTimeout(() => {
    if (!document.querySelector('.robot-face').classList.contains('looking-around')) {
      document.querySelector('.robot-face').classList.add('looking-around');
      isIdle = true;
    }
  }, 10000); // 10 seconds
}

// Add event listeners for user interaction
document.querySelector('.robot-face').addEventListener('mouseover', handleInteraction);
document.querySelector('.robot-face').addEventListener('click', handleInteraction);
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', handleInteraction);
});

// MQTT message handler
client.on('message', (topic, message) => {
  if (topic === 'cosmo/expression') {
    const expression = message.toString();
    console.log('Received expression:', expression);
    setExpression(expression);
    handleInteraction(); // Reset idle timer on MQTT message
  }
});

client.on('connect', () => {
  console.log('Connected to MQTT broker');
  document.getElementById('connection-status').textContent = 'MQTT Status: Connected';
  client.subscribe('cosmo/expression', (err) => {
    if (!err) {
      console.log('Subscribed to cosmo/expression');
    }
  });
});

client.on('error', (error) => {
  console.error('MQTT Error:', error);
  document.getElementById('connection-status').textContent = 'MQTT Status: Error';
});

client.on('offline', () => {
  console.log('MQTT Client Offline');
  document.getElementById('connection-status').textContent = 'MQTT Status: Offline';
});

function setExpression(emotion) {
  handleInteraction(); // Reset idle timer when expression changes
  const mouth = document.querySelector('.mouth');
  const eyes = document.querySelectorAll('.eye');
  const tears = document.querySelectorAll('.tear');
  const heart = document.querySelector('.heart');
  const face = document.querySelector('.robot-face');
  const eyebrows = document.querySelectorAll('.eyebrow');

  // Reset all styles first
  face.style.borderRadius = '50%';
  face.style.animation = 'none';  // Clear bounce animation
  eyebrows.forEach(eyebrow => {
    eyebrow.style.transform = 'none';
    eyebrow.style.width = '50px';
  });
  
  // Clear any previous heart content from eyes
  eyes.forEach(eye => {
    eye.innerHTML = '<div class="tear"></div>'; // Reset to just having tear div
    eye.style.background = 'var(--eye-color)'; // Reset background
  });
  tears.forEach(tear => tear.style.display = 'none');
  heart.style.display = 'none';

  // Add these cases in the switch statement:
  switch(emotion) {
    case 'happy':
      face.style.borderRadius = '45%';
      face.style.animation = 'happyBounce 1s infinite'; // Add gentle bouncing
      eyebrows.forEach(eyebrow => {
        eyebrow.style.transform = 'rotate(-15deg)';
      });
      mouth.style.borderRadius = '0 0 20px 20px';
      mouth.style.height = '35px'; // Slightly bigger smile
      mouth.style.width = '140px';
      mouth.style.transition = 'all 0.3s ease';
      eyes.forEach(eye => {
        eye.style.height = '35px';
        eye.style.width = '35px';
        eye.style.borderRadius = '45% 45% 45% 45%';
        eye.style.background = 'var(--eye-color)';
        eye.style.animation = 'happyEyes 1s infinite, blink 4s infinite'; // Add happy squinting plus blink
      });
      break;

    case 'sad':
      face.style.borderRadius = '45% 45% 42% 42%';
      eyebrows.forEach(eyebrow => {
        eyebrow.style.transform = 'rotate(15deg)';
      });
      mouth.style.borderRadius = '20px 20px 0 0';
      mouth.style.height = '30px';
      mouth.style.width = '140px';
      eyes.forEach(eye => {
        eye.style.height = '40px';
        eye.style.width = '40px';
        eye.style.borderRadius = '45% 45% 45% 45%';
        eye.style.background = 'var(--eye-color)';
        eye.style.animation = 'blink 4s infinite'; // Reset to just blink
      });
      break;

    case 'angry':
      face.style.borderRadius = '45% 45% 42% 42%';
      eyebrows.forEach((eyebrow, index) => {
        eyebrow.style.transform = index === 0 ? 'rotate(30deg)' : 'rotate(-30deg)';
        eyebrow.style.width = '60px';
      });
      mouth.style.height = '15px';
      mouth.style.width = '140px';
      mouth.style.borderRadius = '0px';
      mouth.style.transform = 'translateX(-50%) rotate(-10deg)';
      eyes.forEach(eye => {
        eye.style.height = '45px';
        eye.style.width = '45px';
        eye.style.borderRadius = '0';
        eye.style.transform = 'rotate(45deg)';
        eye.style.background = 'var(--eye-color)';
        eye.style.animation = 'blink 4s infinite'; // Reset to just blink
      });
      break;

    case 'surprised':
      face.style.borderRadius = '48% 48% 48% 48%';
      eyebrows.forEach(eyebrow => {
        eyebrow.style.transform = 'translateY(-10px)';
      });
      mouth.style.height = '60px';
      mouth.style.width = '60px';
      mouth.style.borderRadius = '50%';
      eyes.forEach(eye => {
        eye.style.height = '50px';
        eye.style.width = '50px';
        eye.style.borderRadius = '50%';
        eye.style.background = 'var(--eye-color)';
        eye.style.animation = 'blink 4s infinite'; // Reset to just blink
      });
      break;

    case 'love':
      face.style.borderRadius = '45% 45% 48% 48%';
      eyebrows.forEach(eyebrow => {
        eyebrow.style.transform = 'rotate(-10deg) translateY(-5px)';
      });
      mouth.style.borderRadius = '0 0 50% 50%';
      mouth.style.height = '30px';
      mouth.style.width = '60px';
      eyes.forEach(eye => {
        eye.style.height = '70px';  // Make eyes bigger
        eye.style.width = '70px';   // Make eyes bigger
        eye.style.background = 'transparent'; // Changed from white to transparent
        eye.style.border = 'none'; // Removed border
        // Updated heart shape in eyes without white background
        eye.innerHTML = `
          <div style="
            width: 35px;
            height: 35px;
            background: #FF4081;
            transform: rotate(45deg);
            position: relative;
            top: 17px;
            left: 17px;
            animation: heartbeat 1s infinite;
          ">
            <div style="
              width: 35px;
              height: 35px;
              background: #FF4081;
              border-radius: 50%;
              position: absolute;
              left: -17px;
            "></div>
            <div style="
              width: 35px;
              height: 35px;
              background: #FF4081;
              border-radius: 50%;
              position: absolute;
              top: -17px;
            "></div>
          </div>
        `;
      });
      heart.style.display = 'block';
      break;

    case 'crying':
      face.style.borderRadius = '45% 45% 42% 42%';
      eyebrows.forEach(eyebrow => {
        eyebrow.style.transform = 'rotate(15deg)';
      });
      mouth.style.borderRadius = '20px 20px 0 0';
      mouth.style.height = '40px';
      mouth.style.width = '140px';
      eyes.forEach(eye => {
        eye.style.height = '45px';
        eye.style.width = '45px';
        eye.style.borderRadius = '45% 45% 45% 45%';
        eye.style.animation = 'blink 4s infinite';
        // Make sure tear div is present and visible
        const tear = eye.querySelector('.tear');
        if (tear) {
          tear.style.display = 'block';
        }
      });
      // Add second set of tears for more dramatic effect
      eyes.forEach(eye => {
        const extraTear = document.createElement('div');
        extraTear.className = 'tear';
        extraTear.style.display = 'block';
        extraTear.style.left = '70%';
        extraTear.style.animationDelay = '0.5s';
        eye.appendChild(extraTear);
      });
      break;

    case 'excited':
      face.style.borderRadius = '48%';
      eyebrows.forEach(eyebrow => {
        eyebrow.style.transform = 'rotate(-20deg) translateY(-8px)';
      });
      mouth.style.height = '40px';
      mouth.style.width = '160px';
      mouth.style.borderRadius = '0 0 30px 30px';
      eyes.forEach(eye => {
        eye.style.height = '55px';
        eye.style.width = '55px';
        eye.style.borderRadius = '50%';
        eye.style.background = 'var(--eye-color)';
        eye.style.animation = 'blink 4s infinite'; // Reset to just blink
      });
      break;

    case 'confused':
      face.style.borderRadius = '45% 48% 45% 48%';
      eyebrows.forEach((eyebrow, index) => {
        eyebrow.style.transform = index === 0 ? 'rotate(-20deg)' : 'rotate(10deg)';
      });
      mouth.style.height = '20px';
      mouth.style.width = '80px';
      mouth.style.borderRadius = '10px';
      mouth.style.transform = 'translateX(-50%) rotate(15deg)';
      eyes.forEach((eye, index) => {
        eye.style.height = '40px';
        eye.style.width = '40px';
        eye.style.borderRadius = '50%';
        eye.style.background = 'var(--eye-color)';
        eye.style.animation = 'blink 4s infinite'; // Reset to just blink
        if (index === 0) {
          eye.style.transform = 'scale(1.2)';
        } else {
          eye.style.transform = 'scale(0.8)';
        }
      });
      break;

    case 'sleepy':
      face.style.borderRadius = '45% 45% 48% 48%';
      eyebrows.forEach(eyebrow => {
        eyebrow.style.transform = 'rotate(5deg)';
      });
      mouth.style.height = '10px';
      mouth.style.width = '100px';
      mouth.style.borderRadius = '10px';
      eyes.forEach(eye => {
        eye.style.height = '10px';
        eye.style.width = '40px';
        eye.style.borderRadius = '10px';
        eye.style.background = 'var(--eye-color)';
        eye.style.animation = 'blink 4s infinite'; // Reset to just blink
      });
      break;

    case 'laughing':
      face.style.borderRadius = '45%';
      face.style.animation = 'bounce 0.5s infinite';  // Add bouncing animation
      eyebrows.forEach(eyebrow => {
        eyebrow.style.transform = 'rotate(-20deg) translateY(-5px)';
      });
      mouth.style.height = '60px';
      mouth.style.width = '160px';
      mouth.style.borderRadius = '0 0 80px 80px';
      eyes.forEach(eye => {
        eye.style.height = '10px';
        eye.style.width = '45px';
        eye.style.borderRadius = '20px';
        eye.style.background = 'var(--eye-color)';
        eye.style.animation = 'squint 1s infinite';  // Only squint for laughing
      });
      break;

    default:
      // Reset to neutral
      face.style.animation = 'none';  // Clear bounce animation
      face.style.borderRadius = '50%';
      eyebrows.forEach(eyebrow => {
        eyebrow.style.transform = 'none';
      });
      mouth.style.height = '20px';
      mouth.style.width = '120px';
      mouth.style.borderRadius = '10px';
      eyes.forEach(eye => {
        eye.style.height = '40px';
        eye.style.width = '40px';
        eye.style.borderRadius = '50%';
        eye.style.background = 'var(--eye-color)';
        eye.style.animation = 'blink 4s infinite'; // Reset to just blink animation
      });
  }

  // Reset transforms for expressions that don't use them
  if (!['angry', 'confused'].includes(emotion)) {
    mouth.style.transform = 'translateX(-50%)';
    eyes.forEach(eye => {
      if (!['confused'].includes(emotion)) {
        eye.style.transform = 'none';
      }
    });
  }
}

// Start the initial idle timer
handleInteraction();
</script>

<div style="text-align: center; margin-top: 20px; font-family: Arial;">
  <p>To control via MQTT, publish messages to topic: <code>cosmo/expression</code></p>
  <p>Valid messages: happy, sad, surprised, neutral, angry, excited, confused, sleepy, crying, love, laughing</p>
</div>

</body></html>
