<html><head><base href="https://websim.prototype/enhanced-geometric-figures">
<title>Interactive Multiplication Circle with Advanced Controls</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.7/dat.gui.min.js"></script>
<style>
  body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
  #info {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    z-index: 100;
    text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
  }
  .multiplier-input {
    position: absolute;
    top: 50px;
    left: 10px;
    z-index: 1000;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 5px;
    border-radius: 5px;
  }
  #incrementButton, #decrementButton {
    margin-left: 10px;
    padding: 2px 8px;
    background: #4CAF50;
    border: none;
    border-radius: 3px;
    color: white;
    cursor: pointer;
  }
  #decrementButton {
    background: #f44336;
  }
  #incrementButton:hover {
    background: #45a049;
  }
  #decrementButton:hover {
    background: #d32f2f;
  }
  #saveButton {
    position: absolute;
    top: 90px;
    left: 10px;
    z-index: 1000;
    padding: 5px 15px;
    background: #2196F3;
    border: none;
    border-radius: 3px;
    color: white;
    cursor: pointer;
  }
  #saveButton:hover {
    background: #1976D2;
  }
  .rotation-slider {
    position: absolute;
    top: 130px;
    left: 10px;
    z-index: 1000;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 5px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .rotation-slider input[type="range"] {
    width: 150px;
  }
</style>
</head>
<body>
<div id="info">Multiplication Circle</div>
<div class="multiplier-input">
  Multiplier: <input type="number" id="preciseMultiplier" step="0.0001" min="0" max="100">
  <button id="decrementButton">-</button>
  <button id="incrementButton">+</button>
</div>
<button id="saveButton">Save Image</button>
<div class="rotation-slider">
  Manual Rotation: <input type="range" id="manualRotationSlider" min="0" max="360" value="0">
</div>

<script>
let scene, camera, renderer, points, lines;

const params = {
  multiplier: 2,
  totalPoints: 200,
  radius: 5,
  rotationSpeed: 0.001,
  lineColor: '#ff0000',
  pointColor: '#ffffff',
  backgroundColor: '#000000',
  lineWidth: 1,
  pointSize: 0.1,
  animationSpeed: 1,
  isSpinning: false,
  autoIncreaseMultiplier: false,
  rotation: 0,
  lineOpacity: 1.0,
  pointOpacity: 1.0,
  innerRadius: 5,
  outerRadius: 5,
  showPoints: true,
  showLines: true,
  lineStyle: 'solid',
  dashSize: 0.1,
  gapSize: 0.1,
  pulseEffect: false,
  pulseSpeed: 1,
  pulseIntensity: 0.5,
  colorMode: 'single',
  gradientStart: '#ff0000',
  gradientEnd: '#0000ff',
  rainbowSpeed: 1,
  verticalStretch: 1,
  horizontalStretch: 1,
  manualRotation: 0, // Add this new parameter
};

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 10;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  createMultiplicationCircle();
  setupGUI();
  animate();
}

function createMultiplicationCircle() {
  const group = new THREE.Group();

  // Points geometry
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(params.totalPoints * 3);
  const colors = new Float32Array(params.totalPoints * 3);

  for (let i = 0; i < params.totalPoints; i++) {
    const angle = (i / params.totalPoints) * Math.PI * 2;
    positions[i * 3] = Math.cos(angle) * params.radius * params.horizontalStretch;
    positions[i * 3 + 1] = Math.sin(angle) * params.radius * params.verticalStretch;
    positions[i * 3 + 2] = 0;

    colors[i * 3] = 1;
    colors[i * 3 + 1] = 1;
    colors[i * 3 + 2] = 1;
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const pointsMaterial = new THREE.PointsMaterial({
    size: params.pointSize,
    vertexColors: true,
    transparent: true,
    opacity: params.pointOpacity
  });
  points = new THREE.Points(geometry, pointsMaterial);

  // Lines geometry
  const lineGeometry = new THREE.BufferGeometry();
  const linePositions = new Float32Array(params.totalPoints * 2 * 3);
  lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));

  const lineMaterial = new THREE.LineBasicMaterial({
    color: params.lineColor,
    linewidth: params.lineWidth,
    transparent: true,
    opacity: params.lineOpacity
  });
  
  if (params.lineStyle === 'dashed') {
    lineMaterial.dashSize = params.dashSize;
    lineMaterial.gapSize = params.gapSize;
  }

  lines = new THREE.LineSegments(lineGeometry, lineMaterial);

  group.add(points);
  group.add(lines);

  if (scene.children.length > 0) {
    scene.remove(scene.children[0]);
  }
  scene.add(group);
  
  updateMultiplicationCircle();
}

function updateMultiplicationCircle() {
  const positions = points.geometry.attributes.position.array;
  const linePositions = lines.geometry.attributes.position.array;
  const colors = points.geometry.attributes.color.array;

  for (let i = 0; i < params.totalPoints; i++) {
    const angle = (i / params.totalPoints) * Math.PI * 2;
    const x = Math.cos(angle) * params.radius * params.horizontalStretch;
    const y = Math.sin(angle) * params.radius * params.verticalStretch;
    
    positions[i * 3] = x;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = 0;

    const result = Math.floor(i * params.multiplier) % params.totalPoints;
    const resultAngle = (result / params.totalPoints) * Math.PI * 2;
    const resultX = Math.cos(resultAngle) * params.radius * params.horizontalStretch;
    const resultY = Math.sin(resultAngle) * params.radius * params.verticalStretch;

    linePositions[i * 6] = x;
    linePositions[i * 6 + 1] = y;
    linePositions[i * 6 + 2] = 0;
    linePositions[i * 6 + 3] = resultX;
    linePositions[i * 6 + 4] = resultY;
    linePositions[i * 6 + 5] = 0;

    if (params.colorMode === 'rainbow' || params.colorMode === 'gradient') {
      const hue = (i / params.totalPoints) * params.rainbowSpeed;
      const color = new THREE.Color().setHSL(hue, 1, 0.5);
      colors[i * 3] = color.r;
      colors[i * 3 + 1] = color.g;
      colors[i * 3 + 2] = color.b;
    }
  }

  points.geometry.attributes.position.needsUpdate = true;
  points.geometry.attributes.color.needsUpdate = true;
  lines.geometry.attributes.position.needsUpdate = true;
}

function setupGUI() {
  const gui = new dat.GUI();

  const basicFolder = gui.addFolder('Basic Controls');
  basicFolder.add(params, 'totalPoints', 50, 1000).step(1).onChange(createMultiplicationCircle);
  basicFolder.add(params, 'radius', 1, 20).onChange(updateMultiplicationCircle);
  basicFolder.open();

  // Update precise manual input control
  const preciseInput = document.getElementById('preciseMultiplier');
  preciseInput.value = params.multiplier;
  preciseInput.addEventListener('input', function() {
    const value = parseFloat(this.value);
    if (!isNaN(value) && value >= 0 && value <= 100) {
      params.multiplier = value;
      updateMultiplicationCircle();
    }
  });

  // Add increment and decrement button functionality
  const incrementButton = document.getElementById('incrementButton');
  const decrementButton = document.getElementById('decrementButton');
  
  incrementButton.addEventListener('click', function() {
    params.multiplier = Math.round((params.multiplier + 1) * 10000) / 10000;
    preciseInput.value = params.multiplier;
    updateMultiplicationCircle();
  });

  decrementButton.addEventListener('click', function() {
    if (params.multiplier > 0) {
      params.multiplier = Math.round((params.multiplier - 1) * 10000) / 10000;
      preciseInput.value = params.multiplier;
      updateMultiplicationCircle();
    }
  });

  const appearanceFolder = gui.addFolder('Appearance');
  appearanceFolder.addColor(params, 'lineColor').onChange(() => {
    lines.material.color.setStyle(params.lineColor);
  });
  appearanceFolder.addColor(params, 'pointColor').onChange(() => {
    points.material.color.setStyle(params.pointColor);
  });
  appearanceFolder.addColor(params, 'backgroundColor').onChange(() => {
    scene.background = new THREE.Color(params.backgroundColor);
  });
  appearanceFolder.add(params, 'lineWidth', 1, 10).onChange(() => {
    lines.material.linewidth = params.lineWidth;
  });
  appearanceFolder.add(params, 'pointSize', 0.01, 0.5).onChange(() => {
    points.material.size = params.pointSize;
  });
  appearanceFolder.add(params, 'lineOpacity', 0, 1).onChange(() => {
    lines.material.opacity = params.lineOpacity;
  });
  appearanceFolder.add(params, 'pointOpacity', 0, 1).onChange(() => {
    points.material.opacity = params.pointOpacity;
  });

  const animationFolder = gui.addFolder('Animation');
  animationFolder.add(params, 'isSpinning').name('Enable Spinning');
  animationFolder.add(params, 'rotationSpeed', -0.05, 0.05);
  animationFolder.add(params, 'animationSpeed', 0.1, 5);
  animationFolder.add(params, 'autoIncreaseMultiplier').name('Auto Increase Multiplier');
  animationFolder.add(params, 'manualRotation', 0, Math.PI * 2).name('Manual Rotation').onChange(() => {
    scene.children[0].rotation.z = params.manualRotation;
  });

  const effectsFolder = gui.addFolder('Effects');
  effectsFolder.add(params, 'colorMode', ['single', 'rainbow', 'gradient']).onChange(updateMultiplicationCircle);
  effectsFolder.add(params, 'rainbowSpeed', 0.1, 5);
  effectsFolder.add(params, 'pulseEffect');
  effectsFolder.add(params, 'pulseSpeed', 0.1, 5);
  effectsFolder.add(params, 'pulseIntensity', 0, 1);
  effectsFolder.add(params, 'horizontalStretch', 0.1, 2).onChange(updateMultiplicationCircle);
  effectsFolder.add(params, 'verticalStretch', 0.1, 2).onChange(updateMultiplicationCircle);

  const visibilityFolder = gui.addFolder('Visibility');
  visibilityFolder.add(params, 'showPoints').onChange(() => {
    points.visible = params.showPoints;
  });
  visibilityFolder.add(params, 'showLines').onChange(() => {
    lines.visible = params.showLines;
  });

  // Add save button functionality
  const saveButton = document.getElementById('saveButton');
  saveButton.addEventListener('click', function() {
    // Generate random filename
    const randomName = 'multiplication-circle-' + Math.random().toString(36).substr(2, 9) + '.png';
    
    // Render and save the scene
    renderer.render(scene, camera);
    const dataURL = renderer.domElement.toDataURL('image/png');
    
    // Create temporary link and trigger download
    const link = document.createElement('a');
    link.download = randomName;
    link.href = dataURL;
    link.click();
  });
}

function animate() {
  requestAnimationFrame(animate);

  if (params.isSpinning) {
    params.manualRotation = (params.manualRotation + params.rotationSpeed * params.animationSpeed) % (Math.PI * 2);
    scene.children[0].rotation.z = params.manualRotation;
  }

  if (params.autoIncreaseMultiplier) {
    params.multiplier += 0.01 * params.animationSpeed;
    if (params.multiplier > 100) params.multiplier = 1;
    updateMultiplicationCircle();
  }

  if (params.pulseEffect) {
    const pulse = Math.sin(Date.now() * params.pulseSpeed * 0.001) * params.pulseIntensity;
    scene.children[0].scale.set(1 + pulse, 1 + pulse, 1);
  }

  renderer.render(scene, camera);
}

init();

window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Add manual rotation slider functionality
const manualRotationSlider = document.getElementById('manualRotationSlider');
manualRotationSlider.addEventListener('input', function() {
  const degrees = parseFloat(this.value);
  const radians = (degrees * Math.PI) / 180;
  params.manualRotation = radians;
  scene.children[0].rotation.z = radians;
});

// Update slider when rotation changes through other means
function updateRotationSlider() {
  const degrees = (params.manualRotation * 180) / Math.PI;
  manualRotationSlider.value = degrees;
}
</script>
</body>
</html>
