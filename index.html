<html><head><base href="https://weirdai.video/"><title>AI Weird Compilation Video Generator</title><style>
body {
  font-family: 'Courier New', monospace;
  background-color: #000;
  color: #0f0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
  overflow: hidden;
}

#videoContainer {
  width: 640px;
  height: 480px;
  border: 3px solid #0f0;
  position: relative;
  overflow: hidden;
}

#videoOverlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background-color: rgba(0, 0, 0, 0.7);
  z-index: 10;
}

#generateButton {
  font-family: 'Courier New', monospace;
  font-size: 18px;
  background-color: #0f0;
  color: #000;
  border: none;
  padding: 10px 20px;
  cursor: pointer;
  margin-top: 20px;
}

#generateButton:hover {
  background-color: #00ff00;
}

.glitch {
  animation: glitch 1s linear infinite;
}

@keyframes glitch {
  2%, 64% {
    transform: translate(2px,0) skew(0deg);
  }
  4%, 60% {
    transform: translate(-2px,0) skew(0deg);
  }
  62% {
    transform: translate(0,0) skew(5deg); 
  }
}

.glitch:before,
.glitch:after {
  content: attr(title);
  position: absolute;
  left: 0;
}

.glitch:before {
  animation: glitchTop 1s linear infinite;
  clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
  -webkit-clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
}

@keyframes glitchTop {
  2%, 64% {
    transform: translate(2px,-2px);
  }
  4%, 60% {
    transform: translate(-2px,2px);
  }
  62% {
    transform: translate(13px,-1px) skew(-13deg); 
  }
}

.glitch:after {
  animation: glitchBotom 1.5s linear infinite;
  clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);
  -webkit-clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);
}

@keyframes glitchBotom {
  2%, 64% {
    transform: translate(-2px,0);
  }
  4%, 60% {
    transform: translate(-2px,0);
  }
  62% {
    transform: translate(-22px,5px) skew(21deg); 
  }
}

#canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}
</style></head><body>
<div id="videoContainer">
  <div id="videoOverlay">
    <h1 class="glitch" title="AI WEIRD COMPILATION">AI WEIRD COMPILATION</h1>
    <button id="generateButton">GENERATE WEIRDNESS</button>
  </div>
  <canvas id="canvas"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script>
let sketch = function(p) {
  let particles = [];

  p.setup = function() {
    let canvas = p.createCanvas(640, 480);
    canvas.parent('videoContainer');
    for(let i = 0; i < 100; i++) {
      particles.push(new Particle());
    }
  };

  p.draw = function() {
    p.background(0, 10);
    
    for(let particle of particles) {
      particle.update();
      particle.display();
    }
    
    drawWeirdShape();
    drawGlitchyText();
  };

  function Particle() {
    this.x = p.random(p.width);
    this.y = p.random(p.height);
    this.speed = p.random(1, 3);
    this.color = p.color(p.random(100, 255), p.random(100, 255), p.random(100, 255));
    
    this.update = function() {
      this.y += this.speed;
      if(this.y > p.height) {
        this.y = 0;
        this.x = p.random(p.width);
      }
    };
    
    this.display = function() {
      p.noStroke();
      p.fill(this.color);
      p.ellipse(this.x, this.y, 5, 5);
    };
  }

  function drawWeirdShape() {
    p.push();
    p.translate(p.width/2, p.height/2);
    p.rotate(p.frameCount * 0.01);
    p.fill(0, 255, 0, 100);
    p.beginShape();
    for(let i = 0; i < 10; i++) {
      let angle = p.map(i, 0, 10, 0, p.TWO_PI);
      let r = p.sin(p.frameCount * 0.1 + i) * 100 + 50;
      let x = p.cos(angle) * r;
      let y = p.sin(angle) * r;
      p.vertex(x, y);
    }
    p.endShape(p.CLOSE);
    p.pop();
  }

  function drawGlitchyText() {
    if(p.frameCount % 30 === 0) {
      p.push();
      p.fill(255);
      p.textSize(p.random(20, 40));
      p.textAlign(p.CENTER, p.CENTER);
      p.text("WEIRD AI", p.random(p.width), p.random(p.height));
      p.pop();
    }
  }
};

new p5(sketch);

document.getElementById('generateButton').addEventListener('click', function() {
  document.getElementById('videoOverlay').style.display = 'none';
});

// Create a weird AI-generated audio
let audioContext = new (window.AudioContext || window.webkitAudioContext)();

function generateWeirdSound() {
  let oscillator = audioContext.createOscillator();
  let gainNode = audioContext.createGain();
  
  oscillator.type = ['sine', 'square', 'sawtooth', 'triangle'][Math.floor(Math.random() * 4)];
  oscillator.frequency.setValueAtTime(Math.random() * 1000, audioContext.currentTime);
  
  gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.5);
  
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  
  oscillator.start();
  oscillator.stop(audioContext.currentTime + 0.5);
}

setInterval(generateWeirdSound, 1000);
</script>
</body></html>
