<html><head><base href="." /><title>Jake Paul vs Mike Tyson Boxing Match</title><style>
  body {
    margin: 0;
    padding: 20px;
    font-family: 'Press Start 2P', cursive;
    background: #000;
    color: white;
  }
  
  .ring {
    width: 100%;
    max-width: 800px;
    height: 400px;
    margin: 0 auto;
    border: 4px solid #ffd700;
    position: relative;
    background: #2c2c2c;
    overflow: hidden;
  }
  
  .boxer {
    position: absolute;
    bottom: 50px;
    transition: all 0.3s ease;
  }
  
  #tyson {
    left: 100px;
    width: 120px;
    height: 180px;
    object-fit: cover;
  }
  
  #paul {
    right: 100px;
    width: 100px;
    height: 200px;
    object-fit: cover;
  }
  
  .health-bar {
    width: 200px;
    height: 20px;
    background: #333;
    margin: 20px;
  }
  
  .health {
    width: 100%;
    height: 100%;
    background: #0f0;
    transition: width 0.3s ease;
  }
  
  .punch-animation {
    animation: punch 0.5s ease;
  }
  
  @keyframes punch {
    0% { transform: translateX(0); }
    50% { transform: translateX(50px); }
    100% { transform: translateX(0); }
  }
  
  .knockout {
    animation: knockout 1s ease forwards;
  }
  
  @keyframes knockout {
    0% { transform: rotate(0); }
    100% { transform: rotate(90deg) translateY(100px); }
  }

  .commentary {
    text-align: center;
    font-size: 24px;
    margin: 20px;
    color: #ffd700;
  }

  button {
    display: block;
    margin: 20px auto;
    padding: 10px 20px;
    font-family: 'Press Start 2P', cursive;
    background: #ffd700;
    border: none;
    cursor: pointer;
  }

  .title {
    text-align: center;
    color: #ffd700;
    font-size: 28px;
    margin-bottom: 20px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script>
// Moving the script to the head and removing the onclick attribute
function startFight() {
  if (window.fightStarted) return;
  window.fightStarted = true;
  
  const commentary = [
    "Tyson comes out aggressive!",
    "Jake Paul trying to keep his distance",
    "Massive left hook from Iron Mike!",
    "Paul is wobbling!",
    "TYSON WITH THE UPPERCUT!",
    "IT'S ALL OVER! MIKE TYSON WINS BY KNOCKOUT!"
  ];
  
  let round = 0;
  let paulHealth = 100;
  let tysonHealth = 100;
  
  const fightSequence = setInterval(() => {
    document.getElementById('commentary').textContent = commentary[round];
    
    if (round === 2 || round === 4) {
      document.getElementById('tyson').classList.add('punch-animation');
      setTimeout(() => {
        document.getElementById('tyson').classList.remove('punch-animation');
      }, 500);
      paulHealth -= 30;
      document.getElementById('paul-health').style.width = paulHealth + '%';
    }
    
    if (round === 5) {
      document.getElementById('paul').classList.add('knockout');
      clearInterval(fightSequence);
    }
    
    round++;
    if (round >= commentary.length) {
      clearInterval(fightSequence);
    }
  }, 2000);
}

// Add event listener when DOM is loaded
document.addEventListener('DOMContentLoaded', function() {
  document.querySelector('button').addEventListener('click', startFight);
});
</script>
</head>
<body>
  <h1 class="title">Jake Paul VS Mike Tyson but different.</h1>
  
  <div class="health-bar" style="float: left">
    <div id="tyson-health" class="health"></div>
  </div>
  <div class="health-bar" style="float: right">
    <div id="paul-health" class="health"></div>
  </div>
  
  <div class="ring">
    <img id="tyson" class="boxer" src="tyson.jpg" alt="Mike Tyson portrait, smiling broadly in light blue shirt with facial tattoo visible" width="120" height="180">
    <img id="paul" class="boxer" src="jake paul.jpg" alt="Jake Paul in boxing stance inside ring, shirtless with tattoos and red boxing shorts" width="100" height="200">
  </div>

  <div class="commentary" id="commentary">Round 1: Fight!</div>
  <button>Start Fight</button>

</body></html>
