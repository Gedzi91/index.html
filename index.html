<html><head><base href="." />
<meta charset="UTF-8">
<style>
:root {
  --vee-color: #90EE90;
  --screen-color: #000000;
  --bowtie-color: #228B22;
  --antenna-grey: #808080;
}

/* Modified Antenna Styles - Made taller */
.antennas {
  position: absolute;
  top: -60px; /* Adjusted from -40px to accommodate taller antennas */
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 40px;
}

.antenna {
  position: relative;
  width: 8px;
  height: 60px; /* Increased from 40px to make antennas taller */
  background: linear-gradient(var(--vee-color), var(--antenna-grey));
  border-radius: 3px;
}

.antenna-tip {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 16px;
  height: 16px;
  background: var(--antenna-grey);
  border-radius: 50%;
}

.vee-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f0f8ff;
}

.vee {
  position: relative;
  width: 200px;
  height: 200px;
  background: var(--vee-color);
  border-radius: 15px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.screen {
  position: absolute;
  width: 170px;
  height: 170px;
  background: var(--screen-color);
  top: 15px;
  left: 15px;
  border-radius: 8px;
}

.eyes {
  position: absolute;
  display: flex;
  justify-content: space-around;
  width: 120px;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
}

.eye {
  width: 20px;
  height: 15px;
  background: var(--vee-color);
  border-radius: 50%;
  position: relative;
  animation: blink 3s infinite;
  transition: transform 0.3s ease;
  transform-origin: center;
}

.eyelash {
  position: absolute;
  width: 8px;
  height: 2px;
  background: var(--vee-color);
}

.eyelash.left { transform: rotate(-30deg); top: -4px; left: 0; }
.eyelash.middle { top: -5px; left: 6px; }
.eyelash.right { transform: rotate(30deg); top: -4px; right: 0; }

.mouth {
  position: absolute;
  width: 40px;
  height: 20px;
  border: 2px solid var(--vee-color);
  border-radius: 0 0 20px 20px; /* Always curved downward for smile */
  border-top: 0;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
}

.bowtie {
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
}

#bowtie {
  width: 60px;
  height: 45px;
  fill: var(--bowtie-color);
}

@keyframes blink {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(0.1); }
}

@keyframes antennaWiggle {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(5deg); }
}

.antenna {
  animation: antennaWiggle 3s ease-in-out infinite alternate;
}

/* Add new styles for controls */
.controls {
  position: absolute;
  bottom: -80px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
}

.control-btn {
  padding: 10px 15px;
  border: none;
  border-radius: 15px;
  background: var(--vee-color);
  color: white;
  cursor: pointer;
  transition: all 0.3s;
  font-family: Arial, sans-serif;
  box-shadow: 0 3px 6px rgba(0,0,0,0.1);
}

.control-btn:hover {
  transform: scale(1.1);
}

.battery-indicator {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 30px;
  height: 15px;
  border: 2px solid var(--vee-color);
  border-radius: 3px;
}

.battery-level {
  height: 100%;
  background: var(--vee-color);
  width: 100%;
  transition: width 0.3s;
}

.sleep-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  border-radius: 8px;
  display: none;
  justify-content: center;
  align-items: center;
}

.zzz {
  color: var(--vee-color);
  font-size: 24px;
  font-family: Arial, sans-serif;
}

.game-display {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80%;
  height: 80%;
  display: none;
  justify-content: center;
  align-items: center;
}

.game-ball {
  width: 20px;
  height: 20px;
  background: var(--vee-color);
  border-radius: 50%;
  position: absolute;
}

/* Add closed eyes state */
.sleeping .eye {
  transform: scaleY(0.1);
  animation: none;
}

/* New styles for status indicators */
.status-indicators {
  position: absolute;
  top: -120px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
  background: rgba(255, 255, 255, 0.9);
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.1);
}

.status {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: Arial, sans-serif;
  font-size: 12px;
  color: #333;
}

.status-label {
  margin-bottom: 5px;
}

.status-value {
  font-weight: bold;
  color: var(--vee-color);
}

/* Add new style for powered-off state */
.powered-off {
  filter: brightness(0.3);
  pointer-events: none;
}

.powered-off-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  border-radius: 8px;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.powered-off-text {
  color: var(--vee-color);
  font-size: 18px;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* Make charge button always clickable */
#chargeBtn {
  position: relative;
  z-index: 1001;
}
</style>
</head>
<body>
<div class="vee-container">
  <div class="vee">
    <!-- Add powered-off overlay -->
    <div class="powered-off-overlay">
      <div class="powered-off-text">Power depleted!<br>Please charge me!</div>
    </div>
    
    <!-- New Status Indicators -->
    <div class="status-indicators">
      <div class="status">
        <div class="status-label">Battery</div>
        <div class="status-value" id="batteryStatus">100%</div>
      </div>
      <div class="status">
        <div class="status-label">Energy</div>
        <div class="status-value" id="energyStatus">100%</div>
      </div>
      <div class="status">
        <div class="status-label">Fun</div>
        <div class="status-value" id="funStatus">0%</div>
      </div>
    </div>

    <!-- Antennas -->
    <div class="antennas">
      <div class="antenna">
        <div class="antenna-tip"></div>
      </div>
      <div class="antenna">
        <div class="antenna-tip"></div>
      </div>
    </div>
    <div class="screen">
      <div class="battery-indicator">
        <div class="battery-level"></div>
      </div>
      <div class="eyes">
        <div class="eye">
          <div class="eyelash left"></div>
          <div class="eyelash middle"></div>
          <div class="eyelash right"></div>
        </div>
        <div class="eye">
          <div class="eyelash left"></div>
          <div class="eyelash middle"></div>
          <div class="eyelash right"></div>
        </div>
      </div>
      <div class="mouth"></div>
      <div class="sleep-overlay">
        <div class="zzz">Zzz...</div>
      </div>
      <div class="game-display">
        <div class="game-ball"></div>
      </div>
    </div>
    <div class="bowtie">
      <svg id="bowtie" viewBox="0 0 100 60">
        <path d="M50 30 L20 10 L20 50 Z M50 30 L80 10 L80 50 Z"/>
      </svg>
    </div>
    <div class="controls">
      <button class="control-btn" id="chargeBtn">Charge</button>
      <button class="control-btn" id="sleepBtn">Sleep</button>
      <button class="control-btn" id="playBtn">Play</button>
    </div>
  </div>
</div>

<script>
// Remove the mouth click handler to ensure always smiling
// Retain existing click handler for other functionalities
let batteryLevel = 100;
let energyLevel = 100;
let funLevel = 0;
let isAwake = true;
let isPlaying = false;
let gameInterval;

const updateBatteryLevel = () => {
  const batteryDisplay = document.querySelector('.battery-level');
  batteryDisplay.style.width = batteryLevel + '%';
};

const updateStatuses = () => {
  document.getElementById('batteryStatus').textContent = Math.round(batteryLevel) + '%';
  document.getElementById('energyStatus').textContent = Math.round(energyLevel) + '%';
  document.getElementById('funStatus').textContent = Math.round(funLevel) + '%';
};

// Battery drain
setInterval(() => {
  if (batteryLevel <= 0) {
    // Power off sequence
    const veeScreen = document.querySelector('.screen');
    const poweredOffOverlay = document.querySelector('.powered-off-overlay');
    veeScreen.classList.add('powered-off');
    poweredOffOverlay.style.display = 'flex';
    isAwake = false;
    isPlaying = false;
    stopGame();
  } else {
    // Normal battery drain
    if (isAwake && !isPlaying) {
      batteryLevel = Math.max(0, batteryLevel - 0.5);
      energyLevel = Math.max(0, energyLevel - 0.3);
      funLevel = Math.max(0, funLevel - 0.2);
    } else if (isPlaying) {
      batteryLevel = Math.max(0, batteryLevel - 1);
      energyLevel = Math.max(0, energyLevel - 0.5);
      funLevel = Math.min(100, funLevel + 1);
    } else if (!isAwake) {
      energyLevel = Math.min(100, energyLevel + 0.5);
      funLevel = Math.max(0, funLevel - 0.1);
    }
  }
  updateBatteryLevel();
  updateStatuses();
}, 1000);

// Charge button
document.getElementById('chargeBtn').addEventListener('click', () => {
  const veeScreen = document.querySelector('.screen');
  const poweredOffOverlay = document.querySelector('.powered-off-overlay');
  
  batteryLevel = Math.min(100, batteryLevel + 20);
  energyLevel = Math.min(100, energyLevel + 10);
  
  if (batteryLevel > 0) {
    veeScreen.classList.remove('powered-off');
    poweredOffOverlay.style.display = 'none';
    isAwake = true;
  }
  
  updateBatteryLevel();
  updateStatuses();
});

// Modified Sleep button handler
document.getElementById('sleepBtn').addEventListener('click', () => {
  if (batteryLevel <= 0) return; // Don't allow sleep mode when powered off
  
  const sleepOverlay = document.querySelector('.sleep-overlay');
  const eyes = document.querySelector('.eyes');
  isAwake = !isAwake;
  sleepOverlay.style.display = isAwake ? 'none' : 'flex';
  eyes.classList.toggle('sleeping', !isAwake);
  if (!isAwake) {
    stopGame();
  }
  updateStatuses();
});

// Simple bouncing ball game
const startGame = () => {
  const gameDisplay = document.querySelector('.game-display');
  const ball = document.querySelector('.game-ball');
  let x = 0;
  let y = 0;
  let dx = 2;
  let dy = 2;

  gameDisplay.style.display = 'block';
  
  gameInterval = setInterval(() => {
    if (x + dx > gameDisplay.offsetWidth - 20 || x + dx < 0) dx = -dx;
    if (y + dy > gameDisplay.offsetHeight - 20 || y + dy < 0) dy = -dy;
    
    x += dx;
    y += dy;
    
    ball.style.left = x + 'px';
    ball.style.top = y + 'px';
  }, 16);
};

const stopGame = () => {
  clearInterval(gameInterval);
  document.querySelector('.game-display').style.display = 'none';
  isPlaying = false;
};

// Play button
document.getElementById('playBtn').addEventListener('click', () => {
  if (batteryLevel <= 0) return; // Don't allow playing when powered off
  
  if (batteryLevel > 10 && isAwake) {
    isPlaying = !isPlaying;
    if (isPlaying) {
      startGame();
    } else {
      stopGame();
    }
    updateStatuses();
  }
});

// Start updating statuses immediately
updateStatuses();
</script>
</body></html>
