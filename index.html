<script>
// Creating an extremely precise SVG recreation of Tux using 3 decimal curves and paths
// Based on meticulous tracing of Tux.png with bezier curves

function downloadSVG() {
    // Get the SVG content
    const svgElement = document.querySelector('svg');
    const svgContent = svgElement.outerHTML;
    
    // Create a Blob containing the SVG data
    const blob = new Blob([svgContent], { type: 'image/svg+xml' });
    
    // Create a temporary download link
    const downloadLink = document.createElement('a');
    downloadLink.download = 'tux.svg';
    downloadLink.href = URL.createObjectURL(blob);
    
    // Trigger the download
    document.body.appendChild(downloadLink);
    downloadLink.click();
    document.body.removeChild(downloadLink);
    
    // Clean up the URL object
    URL.revokeObjectURL(downloadLink.href);
}
</script>
