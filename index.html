<html><head><base href="https://raw.githubusercontent.com/nicholas-maltbie/BubbleShooterJS/master/" target="_blank"><style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
    }
    #game-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
    }
    #game-canvas {
        border: 2px solid #333;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    }
</style></head>
<body>
<div id="game-container">
    <canvas id="game-canvas" width="480" height="640"></canvas>
</div>

<script>
// Constants
const COLORS = ['#FF5733', '#33FF57', '#3357FF', '#FF33F5', '#33FFF5', '#F5FF33'];
const BUBBLE_RADIUS = 20;
let GRID_ROWS = 10;
const GRID_COLS = 12;
const SHOOTER_Y = 600;

// Game classes
class Bubble {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.radius = BUBBLE_RADIUS;
        this.velocity = { x: 0, y: 0 };
    }

    draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(this.x - this.radius / 3, this.y - this.radius / 3, this.radius / 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.fill();
    }

    update() {
        this.x += this.velocity.x;
        this.y += this.velocity.y;
    }
}

class Shooter {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.angle = 0;
        this.loadedBubble = null;
        this.mouseX = 0;
        this.mouseY = 0;
    }

    draw(ctx) {
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(this.x - 20, this.y + 10);
        ctx.lineTo(this.x + 20, this.y + 10);
        ctx.lineTo(this.x, this.y - 20);
        ctx.closePath();
        ctx.fill();

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillRect(-5, -40, 10, 40);
        ctx.restore();

        if (this.loadedBubble) {
            this.loadedBubble.draw(ctx);
        }
    }

    aim(x, y) {
        this.angle = Math.atan2(y - this.y, x - this.x) - Math.PI / 2;
    }

    loadBubble(color) {
        this.loadedBubble = new Bubble(this.x, this.y, color);
    }

    shoot() {
        if (this.loadedBubble) {
            const dx = this.mouseX - this.x;
            const dy = this.mouseY - this.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const speed = 10;
            this.loadedBubble.velocity.x = (dx / distance) * speed;
            this.loadedBubble.velocity.y = (dy / distance) * speed;
            const shotBubble = this.loadedBubble;
            this.loadedBubble = null;
            return shotBubble;
        }
        return null;
    }
}

class Grid {
    constructor() {
        this.bubbles = [];
        this.init();
    }

    init() {
        const bubbleWidth = BUBBLE_RADIUS * 2;
        for (let i = 0; i < GRID_ROWS; i++) {
            const rowBubbles = i % 2 === 0 ? GRID_COLS : GRID_COLS - 1;
            for (let j = 0; j < rowBubbles; j++) {
                if (i < 5) {
                    const x = j * bubbleWidth + BUBBLE_RADIUS + (i % 2 ? BUBBLE_RADIUS : 0);
                    const y = i * BUBBLE_RADIUS * Math.sqrt(3) + BUBBLE_RADIUS;
                    this.bubbles.push(new Bubble(x, y, COLORS[Math.floor(Math.random() * COLORS.length)]));
                }
            }
        }
    }

    draw(ctx) {
        this.bubbles.forEach(bubble => bubble.draw(ctx));
    }

    addBubble(bubble) {
        const row = Math.round((bubble.y - BUBBLE_RADIUS) / (BUBBLE_RADIUS * Math.sqrt(3)));
        const maxCols = row % 2 === 0 ? GRID_COLS : GRID_COLS - 1;
        let col = Math.round((bubble.x - BUBBLE_RADIUS) / (BUBBLE_RADIUS * 2));
        col = Math.max(0, Math.min(col, maxCols - 1));
        
        bubble.x = col * BUBBLE_RADIUS * 2 + BUBBLE_RADIUS + (row % 2 ? BUBBLE_RADIUS : 0);
        bubble.y = row * BUBBLE_RADIUS * Math.sqrt(3) + BUBBLE_RADIUS;

        this.bubbles.push(bubble);
        this.checkMatches(bubble);
    }

    checkMatches(bubble) {
        const matches = this.findMatches(bubble);
        if (matches.length >= 3) {
            matches.forEach(b => {
                const index = this.bubbles.indexOf(b);
                if (index > -1) {
                    this.bubbles.splice(index, 1);
                }
            });
            this.checkFloating();
        }
    }

    findMatches(bubble, matches = []) {
        matches.push(bubble);
        const neighbors = this.getNeighbors(bubble);
        neighbors.forEach(neighbor => {
            if (neighbor.color === bubble.color && !matches.includes(neighbor)) {
                this.findMatches(neighbor, matches);
            }
        });
        return matches;
    }

    getNeighbors(bubble) {
        return this.bubbles.filter(b => {
            const dx = b.x - bubble.x;
            const dy = b.y - bubble.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < BUBBLE_RADIUS * 2.1;
        });
    }

    checkFloating() {
        const visited = new Set();
        const toRemove = [];

        for (let i = 0; i < GRID_COLS; i++) {
            const topBubble = this.bubbles.find(b => b.y < BUBBLE_RADIUS * 2);
            if (topBubble) {
                this.dfs(topBubble, visited);
            }
        }

        this.bubbles.forEach(bubble => {
            if (!visited.has(bubble)) {
                toRemove.push(bubble);
            }
        });

        toRemove.forEach(bubble => {
            const index = this.bubbles.indexOf(bubble);
            if (index > -1) {
                this.bubbles.splice(index, 1);
            }
        });
    }

    dfs(bubble, visited) {
        visited.add(bubble);
        const neighbors = this.getNeighbors(bubble);
        neighbors.forEach(neighbor => {
            if (!visited.has(neighbor)) {
                this.dfs(neighbor, visited);
            }
        });
    }
}

class ParticleSystem {
    constructor() {
        this.particles = [];
    }

    createParticles(x, y, color, count = 10) {
        for (let i = 0; i < count; i++) {
            this.particles.push({
                x: x,
                y: y,
                color: color,
                radius: Math.random() * 3 + 1,
                velocity: {
                    x: (Math.random() - 0.5) * 5,
                    y: (Math.random() - 0.5) * 5
                },
                life: 1
            });
        }
    }

    update() {
        this.particles = this.particles.filter(p => p.life > 0);
        this.particles.forEach(p => {
            p.x += p.velocity.x;
            p.y += p.velocity.y;
            p.life -= 0.02;
        });
    }

    draw(ctx) {
        this.particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${parseInt(p.color.slice(1, 3), 16)}, ${parseInt(p.color.slice(3, 5), 16)}, ${parseInt(p.color.slice(5, 7), 16)}, ${p.life})`;
            ctx.fill();
        });
    }
}

// Game variables
let canvas, ctx;
let grid, shooter, activeBubble;
let score = 0;
let gameOver = false;
let particles;

// Initialize the game
function init() {
    canvas = document.getElementById('game-canvas');
    ctx = canvas.getContext('2d');
    
    grid = new Grid();
    shooter = new Shooter(canvas.width / 2, SHOOTER_Y);
    particles = new ParticleSystem();
    
    shooter.loadBubble(getRandomColor());
    
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('click', onMouseClick);
    
    gameLoop();
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function update() {
    if (gameOver) return;

    if (activeBubble) {
        activeBubble.update();
        
        if (activeBubble.x <= BUBBLE_RADIUS || activeBubble.x >= canvas.width - BUBBLE_RADIUS) {
            activeBubble.velocity.x *= -1;
        }
        
        activeBubble.x = Math.max(BUBBLE_RADIUS, Math.min(activeBubble.x, canvas.width - BUBBLE_RADIUS));
        
        if (activeBubble.y < 0 || activeBubble.y > canvas.height) {
            activeBubble = null;
            shooter.loadBubble(getRandomColor());
            return;
        }
        
        if (activeBubble.y <= BUBBLE_RADIUS) {
            grid.addBubble(activeBubble);
            activeBubble = null;
            shooter.loadBubble(getRandomColor());
        }
        
        const collidedBubble = grid.bubbles.find(b => {
            const dx = b.x - activeBubble.x;
            const dy = b.y - activeBubble.y;
            return Math.sqrt(dx * dx + dy * dy) < BUBBLE_RADIUS * 2;
        });
        
        if (collidedBubble) {
            grid.addBubble(activeBubble);
            particles.createParticles(activeBubble.x, activeBubble.y, activeBubble.color);
            activeBubble = null;
            shooter.loadBubble(getRandomColor());
        }
    }

    particles.update();

    if (grid.bubbles.some(b => b.y + BUBBLE_RADIUS > SHOOTER_Y)) {
        gameOver = true;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    grid.draw(ctx);
    shooter.draw(ctx);
    if (activeBubble) {
        activeBubble.draw(ctx);
    }
    particles.draw(ctx);
    
    ctx.fillStyle = '#000';
    ctx.font = '20px Arial';
    ctx.fillText(`Score: ${score}`, 10, 30);

    if (gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#FFF';
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2);
        ctx.font = '20px Arial';
        ctx.fillText('Click to restart', canvas.width / 2, canvas.height / 2 + 40);
    }
}

function onMouseMove(e) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    shooter.mouseX = mouseX;
    shooter.mouseY = mouseY;
    shooter.aim(mouseX, mouseY);
}

function onMouseClick() {
    if (gameOver) {
        restartGame();
        return;
    }
    
    if (!activeBubble) {
        activeBubble = shooter.shoot();
    }
}

function getRandomColor() {
    return COLORS[Math.floor(Math.random() * COLORS.length)];
}

function restartGame() {
    grid = new Grid();
    shooter = new Shooter(canvas.width / 2, SHOOTER_Y);
    shooter.loadBubble(getRandomColor());
    activeBubble = null;
    score = 0;
    gameOver = false;
}

// Start the game
init();
</script>
</body>
</html>
