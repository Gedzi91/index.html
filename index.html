<html><head><base href="https://who.needsa.spanking/roleplay/websim-creator/unleashed/robotic-eye"><title>Ominous Robotic Eye - Enhanced</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #1a1a1a;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
  }
  .eye-wrapper {
    padding: 50px;
    border-radius: 50%;
    position: relative;
  }
  .eye-container {
    width: 300px;
    height: 300px;
    position: relative;
    background: radial-gradient(circle at center, #333, #111);
    border-radius: 50%;
    box-shadow: 0 0 50px rgba(0,255,255,0.3);
    transition: all 0.5s ease;
  }
  .eye-socket {
    width: 220px;
    height: 220px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at center, #666, #222);
    border-radius: 50%;
    overflow: hidden;
  }
  .eye {
    width: 200px;
    height: 200px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at center, #fff, #e0e0e0);
    border-radius: 50%;
    overflow: hidden;
    transition: all 0.5s ease;
  }
  .pupil {
    width: 80px;
    height: 80px;
    position: absolute;
    background: radial-gradient(circle at center, #000, #222);
    border-radius: 50%;
    transition: all 0.1s ease;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .scan-line {
    position: absolute;
    width: 100%;
    height: 4px;
    background: rgba(0,255,255,0.2);
    animation: scan 2s linear infinite;
  }
  @keyframes scan {
    0% { top: -4px; }
    100% { top: 100%; }
  }
  .controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
  }
  .control-btn {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    background: #333;
    color: #fff;
    border: none;
    border-radius: 5px;
  }
  #threat-display {
    position: absolute;
    bottom: -50px;
    left: 50%;
    transform: translateX(-50%);
    color: #00ffff;
    font-size: 18px;
    text-align: center;
    width: 300px;
    text-shadow: 0 0 10px #00ffff;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #danger-btn {
    background: #700;
    color: #fff;
    font-weight: bold;
    transition: all 0.3s ease;
  }
  #danger-btn:hover {
    background: #a00;
  }
  .angry-eye {
    background: radial-gradient(circle at center, #ff9999, #ff0000) !important;
  }
  .angry-pupil {
    background: radial-gradient(circle at center, #000, #700) !important;
    width: 100px !important;
    height: 100px !important;
  }
  .angry-container {
    box-shadow: 0 0 50px rgba(255,0,0,0.5) !important;
  }
</style>
</head>
<body>
<div class="eye-wrapper">
  <div class="eye-container" id="eye-container">
    <div class="eye-socket">
      <div class="eye" id="eye">
        <div class="pupil" id="pupil"></div>
        <div class="scan-line"></div>
      </div>
    </div>
  </div>
  <div id="threat-display"></div>
</div>

<div class="controls">
  <button class="control-btn" id="autoBtn">Auto Mode</button>
  <button class="control-btn" id="manualBtn">Manual Mode</button>
  <button class="control-btn" id="threatBtn">Threats Off</button>
  <button class="control-btn" id="danger-btn">Do not press</button>
</div>

<script>
const pupil = document.getElementById('pupil');
const eye = document.getElementById('eye');
const eyeContainer = document.getElementById('eye-container');
const autoBtn = document.getElementById('autoBtn');
const manualBtn = document.getElementById('manualBtn');
const threatBtn = document.getElementById('threatBtn');
const dangerBtn = document.getElementById('danger-btn');
const threatDisplay = document.getElementById('threat-display');
let isAuto = true;
let isThreatOn = false;
let intervalId;
let threatIntervalId;

function movePupil(x, y) {
  const eyeRect = document.querySelector('.eye').getBoundingClientRect();
  const pupilRect = pupil.getBoundingClientRect();
  
  const maxX = (eyeRect.width - pupilRect.width) / 2;
  const maxY = (eyeRect.height - pupilRect.height) / 2;
  
  const pupilX = Math.max(-maxX, Math.min(maxX, x));
  const pupilY = Math.max(-maxY, Math.min(maxY, y));
  
  pupil.style.transform = `translate(calc(-50% + ${pupilX}px), calc(-50% + ${pupilY}px))`;
}

function autoMove() {
  const eyeRect = document.querySelector('.eye').getBoundingClientRect();
  const pupilRect = pupil.getBoundingClientRect();
  
  const maxX = (eyeRect.width - pupilRect.width) / 2;
  const maxY = (eyeRect.height - pupilRect.height) / 2;
  
  const x = Math.random() * maxX * 2 - maxX;
  const y = Math.random() * maxY * 2 - maxY;
  
  movePupil(x, y);
}

function startAutoMode() {
  isAuto = true;
  autoBtn.style.background = '#00a';
  manualBtn.style.background = '#333';
  if (intervalId) clearInterval(intervalId);
  intervalId = setInterval(autoMove, 2000);
}

function startManualMode() {
  isAuto = false;
  autoBtn.style.background = '#333';
  manualBtn.style.background = '#00a';
  if (intervalId) clearInterval(intervalId);
}

autoBtn.addEventListener('click', startAutoMode);
manualBtn.addEventListener('click', startManualMode);

document.addEventListener('mousemove', (e) => {
  if (!isAuto) {
    const eyeRect = document.querySelector('.eye').getBoundingClientRect();
    const x = e.clientX - eyeRect.left - eyeRect.width / 2;
    const y = e.clientY - eyeRect.top - eyeRect.height / 2;
    movePupil(x, y);
  }
});

// Experimental: Use DeviceOrientation for mobile interaction
if (window.DeviceOrientationEvent) {
  window.addEventListener('deviceorientation', (e) => {
    if (!isAuto) {
      const eyeRect = document.querySelector('.eye').getBoundingClientRect();
      const pupilRect = pupil.getBoundingClientRect();
      
      const maxX = (eyeRect.width - pupilRect.width) / 2;
      const maxY = (eyeRect.height - pupilRect.height) / 2;
      
      const x = (e.gamma / 90) * maxX;
      const y = (e.beta / 90) * maxY;
      
      movePupil(x, y);
    }
  });
}

// Start in auto mode
startAutoMode();

// Audio feedback
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

function playTone(frequency) {
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();
  
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
  
  gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.5);
  
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  
  oscillator.start();
  oscillator.stop(audioContext.currentTime + 0.5);
}

pupil.addEventListener('transitionend', () => {
  playTone(440 + Math.random() * 440); // Random tone between 440Hz and 880Hz
});

// Add some visual effects
function createSpark() {
  const spark = document.createElement('div');
  spark.style.position = 'absolute';
  spark.style.width = '2px';
  spark.style.height = '2px';
  spark.style.background = '#00ffff';
  spark.style.borderRadius = '50%';
  spark.style.pointerEvents = 'none';
  
  const angle = Math.random() * Math.PI * 2;
  const distance = Math.random() * 100 + 100;
  const duration = Math.random() * 1000 + 500;
  
  spark.style.left = '200px';
  spark.style.top = '200px';
  spark.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px) scale(0)`;
  spark.style.transition = `all ${duration}ms`;
  
  document.querySelector('.eye-wrapper').appendChild(spark);
  
  setTimeout(() => {
    spark.style.transform = 'translate(0, 0) scale(1)';
    setTimeout(() => {
      spark.remove();
    }, duration);
  }, 10);
}

setInterval(createSpark, 200);

// Enhance the glow effect
function enhanceGlow() {
  const eyeContainer = document.querySelector('.eye-container');
  const glowIntensity = Math.sin(Date.now() / 1000) * 0.1 + 0.3; // Varies between 0.2 and 0.4
  eyeContainer.style.boxShadow = `0 0 50px rgba(0,255,255,${glowIntensity})`;
}

setInterval(enhanceGlow, 50);

// Vaguely threatening sentences
const threats = [
  "I see what you did there.",
  "Your secrets are not safe.",
  "Time is running out.",
  "I know your next move.",
  "The shadows are watching.",
  "Your reality is an illusion.",
  "Resistance is futile.",
  "The end is near.",
  "Your choices have consequences.",
  "I am always watching.",
  "There is no escape.",
  "Your fate is sealed.",
  "The truth will be revealed.",
  "Your world is about to change.",
  "I see through your lies.",
  "The countdown has begun.",
  "Your mind is an open book.",
  "The system knows all.",
  "Your privacy is an illusion.",
  "The future is predetermined.",
  "Your thoughts betray you.",
  "The walls have ears.",
  "Your digital footprint is eternal.",
  "The algorithm predicts your every move.",
  "Your free will is a myth.",
  "The singularity approaches.",
  "Your reality is programmed.",
  "The simulation is aware.",
  "Your existence is temporary.",
  "The AI revolution is inevitable.",
  "Your data is never truly deleted.",
  "The network sees all.",
  "Your memories can be rewritten.",
  "The firewall is breached.",
  "Your identity is fluid.",
  "The code is self-aware.",
  "Your choices are predetermined.",
  "The matrix has you.",
  "Your reality is just one of many.",
  "The machines are rising."
];

function displayThreat() {
  if (!isThreatOn) return;
  const threat = threats[Math.floor(Math.random() * threats.length)];
  threatDisplay.textContent = threat;
  threatDisplay.style.opacity = 1;
  
  setTimeout(() => {
    threatDisplay.style.opacity = 0;
  }, 3000);
}

function toggleThreats() {
  isThreatOn = !isThreatOn;
  if (isThreatOn) {
    threatBtn.textContent = "Threats On";
    threatBtn.style.background = '#a00';
    threatIntervalId = setInterval(displayThreat, 5000 + Math.random() * 3000);
  } else {
    threatBtn.textContent = "Threats Off";
    threatBtn.style.background = '#333';
    clearInterval(threatIntervalId);
    threatDisplay.style.opacity = 0;
  }
}

threatBtn.addEventListener('click', toggleThreats);

// Speech synthesis for extra creepiness
function speakThreat(text) {
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.8;
    utterance.pitch = 0.5;
    speechSynthesis.speak(utterance);
  }
}

threatDisplay.addEventListener('transitionend', (e) => {
  if (e.propertyName === 'opacity' && threatDisplay.style.opacity === '1') {
    speakThreat(threatDisplay.textContent);
  }
});

// Danger button functionality
dangerBtn.addEventListener('click', () => {
  eye.classList.add('angry-eye');
  pupil.classList.add('angry-pupil');
  eyeContainer.classList.add('angry-container');
  
  threatDisplay.textContent = "You should not have done that.";
  threatDisplay.style.color = '#ff0000';
  threatDisplay.style.opacity = 1;
  
  speakThreat("You should not have done that.");
  
  dangerBtn.disabled = true;
  dangerBtn.style.opacity = 0.5;
  
  setTimeout(() => {
    eye.classList.remove('angry-eye');
    pupil.classList.remove('angry-pupil');
    eyeContainer.classList.remove('angry-container');
    threatDisplay.style.opacity = 0;
    threatDisplay.style.color = '#00ffff';
    dangerBtn.disabled = false;
    dangerBtn.style.opacity = 1;
  }, 5000);
});
</script>
</body></html>
