<html><head><base href="/">
<style>
body {
  background: #1a1a1a;
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: hidden;
  perspective: 1000px;
}

.logo-container {
  position: relative;
  width: 200px;
  height: 200px;
  transform-style: preserve-3d;
  animation: floatContainer 6s infinite ease-in-out;
}

@keyframes floatContainer {
  0%, 100% { transform: translateY(0) rotateX(10deg); }
  50% { transform: translateY(-20px) rotateX(-10deg); }
}

.w-logo {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 15px rgba(0, 255, 157, 0.5));
}

.websim-text {
  position: absolute;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 24px;
  font-weight: bold;
  animation: fadeInOut 4s infinite;
  opacity: 0;
  text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
  letter-spacing: 4px;
}

.top { top: -60px; }
.bottom { bottom: -60px; }

.ai-text {
  position: absolute;
  color: #00ff9d;
  font-size: 18px;
  font-weight: bold;
  text-shadow: 0 0 10px #00ff9d;
  opacity: 0;
  animation: glowPulse 2s infinite;
}

.ai-left { left: -40px; transform: rotate(-90deg); }
.ai-right { right: -40px; transform: rotate(90deg); }

.energy-ring {
  position: absolute;
  width: 250px;
  height: 250px;
  border: 2px solid #00ff9d;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: energyPulse 3s infinite;
  opacity: 0;
}

.dna-helix {
  position: absolute;
  width: 300px;
  height: 300px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: rotate3D 10s infinite linear;
}

.dna-strand {
  position: absolute;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #00ff9d, transparent);
  animation: waveEffect 3s infinite ease-in-out;
}

@keyframes rotate3D {
  0% { transform: translate(-50%, -50%) rotateY(0deg) rotateX(60deg); }
  100% { transform: translate(-50%, -50%) rotateY(360deg) rotateX(60deg); }
}

@keyframes waveEffect {
  0%, 100% { transform: scaleX(1); opacity: 0.3; }
  50% { transform: scaleX(1.2); opacity: 1; }
}

@keyframes energyPulse {
  0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
  100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
}

@keyframes fadeInOut {
  0%, 100% { opacity: 0; transform: scale(0.8) translateY(10px); }
  50% { opacity: 1; transform: scale(1.1) translateY(0); }
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.3; text-shadow: 0 0 10px #00ff9d; transform: scale(0.9) rotate(-90deg); }
  50% { opacity: 1; text-shadow: 0 0 20px #00ff9d, 0 0 30px #00ff9d; transform: scale(1.1) rotate(-90deg); }
}

@keyframes rotateAndScale {
  0% { transform: translate(-50%, -50%) rotate(0deg) scale(0.8); }
  50% { transform: translate(-50%, -50%) rotate(180deg) scale(1.2); }
  100% { transform: translate(-50%, -50%) rotate(360deg) scale(0.8); }
}

.w-logo {
  animation: rotateAndScale 8s infinite ease-in-out;
}

.matrix-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  opacity: 0.15;
}

.particle {
  position: absolute;
  background: #00ff9d;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
}

.glow-orb {
  position: absolute;
  width: 10px;
  height: 10px;
  background: #00ff9d;
  border-radius: 50%;
  filter: blur(5px);
}

.cyber-circuit {
  position: absolute;
  width: 400px;
  height: 400px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.circuit-line {
  position: absolute;
  background: linear-gradient(90deg, transparent, #00ff9d, transparent);
  height: 1px;
  animation: circuitFlow 4s infinite linear;
}

@keyframes circuitFlow {
  0% { transform: translateX(-100%); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateX(100%); opacity: 0; }
}
</style>
</head>
<body>

<canvas class="matrix-bg" id="matrixCanvas"></canvas>

<div class="logo-container">
  <div class="cyber-circuit" id="cyberCircuit"></div>
  <div class="dna-helix" id="dnaHelix"></div>
  <div class="energy-ring"></div>
  <div class="energy-ring" style="animation-delay: -1s"></div>
  <div class="energy-ring" style="animation-delay: -2s"></div>
  <img src="/a/12daafc9-6b16-44eb-90e6-eda4781ace9a" alt="Stylized W logo in gradient colors of yellow, blue, and pink" class="w-logo" width="200" height="200">
  <div class="websim-text top">WEBSIM</div>
  <div class="websim-text bottom">CREATE</div>
  <div class="ai-text ai-left">AI</div>
  <div class="ai-text ai-right">AI</div>
</div>

<script>
document.addEventListener('mousemove', (e) => {
  const logo = document.querySelector('.logo-container');
  const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
  const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
  
  logo.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
  createParticle(e.pageX, e.pageY);
  createGlowOrb(e.pageX, e.pageY);
});

function createGlowOrb(x, y) {
  const orb = document.createElement('div');
  orb.className = 'glow-orb';
  document.body.appendChild(orb);

  const angle = Math.random() * Math.PI * 2;
  const radius = Math.random() * 100 + 50;
  const destinationX = x + Math.cos(angle) * radius;
  const destinationY = y + Math.sin(angle) * radius;

  orb.style.left = `${x}px`;
  orb.style.top = `${y}px`;

  const animation = orb.animate([
    { transform: 'scale(1)', opacity: 0.8 },
    { transform: `translate(${destinationX - x}px, ${destinationY - y}px) scale(0)`, opacity: 0 }
  ], {
    duration: 1500,
    easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
  });

  animation.onfinish = () => orb.remove();
}

function createParticle(x, y) {
  const particle = document.createElement('div');
  particle.className = 'particle';
  document.body.appendChild(particle);

  const size = Math.random() * 5 + 2;
  const destinationX = x + (Math.random() - 0.5) * 200;
  const destinationY = y + (Math.random() - 0.5) * 200;

  particle.style.width = `${size}px`;
  particle.style.height = `${size}px`;
  particle.style.left = `${x}px`;
  particle.style.top = `${y}px`;

  const animation = particle.animate([
    {
      transform: `translate(0, 0)`,
      opacity: 1
    },
    {
      transform: `translate(${destinationX - x}px, ${destinationY - y}px)`,
      opacity: 0
    }
  ], {
    duration: 1000,
    easing: 'cubic-bezier(0, .9, .57, 1)',
    delay: Math.random() * 200
  });

  animation.onfinish = () => {
    particle.remove();
  };
}

// Add DNA Helix
const dnaHelix = document.getElementById('dnaHelix');
for(let i = 0; i < 20; i++) {
  const strand = document.createElement('div');
  strand.className = 'dna-strand';
  strand.style.top = `${i * 15}px`;
  strand.style.transform = `rotateY(${i * 18}deg)`;
  strand.style.animationDelay = `${i * 0.15}s`;
  dnaHelix.appendChild(strand);
}

// Add Cyber Circuit
const cyberCircuit = document.getElementById('cyberCircuit');
for(let i = 0; i < 10; i++) {
  const line = document.createElement('div');
  line.className = 'circuit-line';
  line.style.width = `${Math.random() * 100 + 50}px`;
  line.style.top = `${Math.random() * 400}px`;
  line.style.left = `${Math.random() * 400}px`;
  line.style.transform = `rotate(${Math.random() * 360}deg)`;
  line.style.animationDelay = `${Math.random() * 4}s`;
  cyberCircuit.appendChild(line);
}

const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = 'WEBSIM.AI10創造未來CREATE∞∆☯'.split('');
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = new Array(Math.floor(columns)).fill(1);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = '#0F0';
  ctx.font = `${fontSize}px monospace`;
  
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    const alpha = Math.random() * 0.5 + 0.5;
    ctx.fillStyle = `rgba(0, 255, 157, ${alpha})`;
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

setInterval(drawMatrix, 50);
</script>

</body></html>
