<html><head><base href="https://websim.creation.engine/">
  <title>ASCII Art Movie Generator</title>
  <style>
    body {
      font-family: monospace;
      background-color: #1a1a1a;
      color: #33ff33;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    #movie-container {
      white-space: pre;
      font-size: 12px;
      line-height: 12px;
      background-color: #000;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(51, 255, 51, 0.5);
      margin-bottom: 20px;
      min-height: 100px;
      overflow-y: auto;
      max-height: 60vh;
    }
    .frame {
      margin-bottom: 10px;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    button, input {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #33ff33;
      color: #000;
      border: none;
      border-radius: 5px;
      transition: all 0.3s ease;
    }
    button {
      cursor: pointer;
    }
    button:hover:not(:disabled) {
      background-color: #00cc00;
    }
    button:disabled {
      background-color: #666;
      color: #333;
      cursor: not-allowed;
    }
    input {
      background-color: #000;
      color: #33ff33;
      border: 1px solid #33ff33;
    }
    #cooldown {
      margin-top: 10px;
      font-size: 14px;
    }
    #controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <h1>ASCII Art Movie Generator</h1>
  <div id="movie-container"></div>
  <div id="controls">
    <input id="themeInput" type="text" placeholder="Enter movie theme">
    <button id="startBtn" onclick="startMovie()">Start Movie</button>
    <button id="generateBtn" onclick="generateFrame()" disabled>Generate Frame</button>
    <button id="playBtn" onclick="playMovie()" disabled>Play Movie</button>
  </div>
  <div id="cooldown"></div>

  <script>
    const cooldownTime = 16; // seconds
    let lastClickTime = 0;
    const themeInput = document.getElementById('themeInput');
    const startBtn = document.getElementById('startBtn');
    const generateBtn = document.getElementById('generateBtn');
    const playBtn = document.getElementById('playBtn');
    const cooldownDisplay = document.getElementById('cooldown');
    const movieContainer = document.getElementById('movie-container');
    let frames = [];
    let isPlaying = false;
    let movieTheme = '';

    function startMovie() {
      movieTheme = themeInput.value.trim();
      if (movieTheme) {
        themeInput.disabled = true;
        startBtn.disabled = true;
        generateBtn.disabled = false;
        movieContainer.innerHTML = '';
        frames = [];
        generateFrame();
      } else {
        alert('Please enter a movie theme');
      }
    }

    async function generateFrame() {
      const now = Date.now();
      if (now - lastClickTime < cooldownTime * 1000) {
        return;
      }

      lastClickTime = now;
      generateBtn.disabled = true;
      updateCooldownDisplay();

      try {
        const response = await fetch('/api/next-frame', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            theme: movieTheme,
            previousFrame: frames.length > 0 ? frames[frames.length - 1] : null,
            instructions: "Create detailed ASCII art with subtle changes between each frame to make a good ASCII art movie. Ensure the art style is consistent and the animation is smooth."
          }),
        });

        if (!response.ok) {
          throw new Error('API request failed');
        }

        const data = await response.json();
        const newFrame = data.frame;

        frames.push(newFrame);
        const frameElement = document.createElement('pre');
        frameElement.className = 'frame';
        frameElement.textContent = newFrame;
        movieContainer.appendChild(frameElement);
        
        if (frames.length > 1) {
          playBtn.disabled = false;
        }
      } catch (error) {
        console.error('Error generating frame:', error);
        alert('Failed to generate frame. Please try again.');
      }
    }

    function updateCooldownDisplay() {
      const updateInterval = setInterval(() => {
        const now = Date.now();
        const timeLeft = Math.max(0, cooldownTime - Math.floor((now - lastClickTime) / 1000));
        
        if (timeLeft > 0) {
          cooldownDisplay.textContent = `Cooldown: ${timeLeft}s`;
        } else {
          cooldownDisplay.textContent = '';
          generateBtn.disabled = false;
          clearInterval(updateInterval);
        }
      }, 1000);
    }

    function playMovie() {
      if (isPlaying) return;
      isPlaying = true;
      generateBtn.disabled = true;
      playBtn.disabled = true;

      const frameElements = document.querySelectorAll('.frame');
      frameElements.forEach(el => el.style.opacity = '0');

      let currentFrame = 0;
      const playInterval = setInterval(() => {
        if (currentFrame >= frames.length) {
          clearInterval(playInterval);
          decollapse();
          return;
        }

        movieContainer.innerHTML = `<pre class="frame">${frames[currentFrame]}</pre>`;
        currentFrame++;
      }, 125); // Change frame every 125ms (8 frames per second)
    }

    function decollapse() {
      movieContainer.innerHTML = '';
      frames.forEach(frame => {
        const frameElement = document.createElement('pre');
        frameElement.className = 'frame';
        frameElement.textContent = frame;
        frameElement.style.opacity = '0';
        movieContainer.appendChild(frameElement);
      });

      setTimeout(() => {
        const frameElements = document.querySelectorAll('.frame');
        frameElements.forEach((el, index) => {
          setTimeout(() => {
            el.style.opacity = '1';
          }, index * 100);
        });

        setTimeout(() => {
          isPlaying = false;
          generateBtn.disabled = false;
          playBtn.disabled = false;
        }, frameElements.length * 100);
      }, 500);
    }
  </script>
</body></html>
