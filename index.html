<html><head><base href="/biometric-chimera-atomic-reconstruction"><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biometric Chimera Atomic Reconstruction</title>
<style>
body {
  font-family: 'Courier New', monospace;
  background: linear-gradient(to right, #000000, #434343);
  color: #00ff00;
  margin: 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

h1 {
  font-size: 2.5em;
  text-align: center;
  margin-bottom: 30px;
  text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 30px #00ff00;
}

#container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  max-width: 1200px;
}

.panel {
  background: rgba(0, 255, 0, 0.1);
  border: 2px solid #00ff00;
  border-radius: 10px;
  padding: 20px;
  width: 300px;
  box-shadow: 0 0 15px #00ff00;
}

h2 {
  font-size: 1.5em;
  margin-bottom: 15px;
  text-shadow: 0 0 5px #00ff00;
}

button {
  background: #000;
  color: #00ff00;
  border: 2px solid #00ff00;
  padding: 10px 20px;
  font-size: 1em;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 10px;
}

button:hover {
  background: #00ff00;
  color: #000;
}

#biometricData, #chimeraStatus, #reconstructionProgress {
  font-family: 'Courier New', monospace;
  font-size: 0.9em;
  line-height: 1.5;
}

#dna-helix {
  width: 100%;
  height: 200px;
  margin-top: 30px;
}

@keyframes rotate {
  from { transform: rotateY(0deg); }
  to { transform: rotateY(360deg); }
}

.dna-strand {
  stroke: #00ff00;
  stroke-width: 2;
  fill: none;
  animation: rotate 10s linear infinite;
}

#alerts {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 300px;
}

.alert {
  background: rgba(255, 0, 0, 0.8);
  color: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 5px;
  font-size: 0.9em;
}
</style>
</head>
<body>
<h1>Biometric Chimera Atomic Reconstruction</h1>

<div id="container">
  <div class="panel">
    <h2>Biometric Scanner</h2>
    <div id="biometricData">Awaiting subject...</div>
    <button onclick="scanBiometrics()">Initiate Scan</button>
  </div>

  <div class="panel">
    <h2>Chimera Synthesis</h2>
    <div id="chimeraStatus">No chimera synthesized</div>
    <button onclick="synthesizeChimera()">Synthesize Chimera</button>
  </div>

  <div class="panel">
    <h2>Atomic Reconstruction</h2>
    <div id="reconstructionProgress">0% complete</div>
    <button onclick="startReconstruction()">Begin Reconstruction</button>
  </div>
</div>

<svg id="dna-helix" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
  <path class="dna-strand" d="M10,50 Q50,0 90,50 T90,50" />
  <path class="dna-strand" d="M10,50 Q50,100 90,50 T90,50" />
</svg>

<div id="alerts"></div>

<script>
const biometricData = document.getElementById('biometricData');
const chimeraStatus = document.getElementById('chimeraStatus');
const reconstructionProgress = document.getElementById('reconstructionProgress');
const alertsContainer = document.getElementById('alerts');

function scanBiometrics() {
  biometricData.innerHTML = 'Scanning...';
  setTimeout(() => {
    const data = generateBiometricData();
    biometricData.innerHTML = data.join('<br>');
    showAlert('Biometric scan complete');
  }, 2000);
}

function synthesizeChimera() {
  if (biometricData.innerHTML === 'Awaiting subject...') {
    showAlert('Error: Biometric scan required before synthesis');
    return;
  }
  
  chimeraStatus.innerHTML = 'Synthesizing...';
  setTimeout(() => {
    const chimera = generateChimera();
    chimeraStatus.innerHTML = chimera.join('<br>');
    showAlert('Chimera synthesis complete');
  }, 3000);
}

function startReconstruction() {
  if (chimeraStatus.innerHTML === 'No chimera synthesized') {
    showAlert('Error: Chimera synthesis required before reconstruction');
    return;
  }
  
  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.floor(Math.random() * 10) + 1;
    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);
      showAlert('Atomic reconstruction complete');
    }
    reconstructionProgress.innerHTML = `${progress}% complete`;
  }, 1000);
}

function generateBiometricData() {
  const data = [
    `DNA Sequence: ${generateDNASequence()}`,
    `Retinal Pattern: ${generateRetinalPattern()}`,
    `Fingerprint Hash: ${generateFingerprint()}`,
    `Brainwave Frequency: ${(Math.random() * 100).toFixed(2)} Hz`
  ];
  return data;
}

function generateChimera() {
  const animals = ['Lion', 'Eagle', 'Serpent', 'Wolf', 'Bear', 'Shark'];
  const traits = ['Strength', 'Vision', 'Agility', 'Endurance', 'Regeneration'];
  const chimera = [
    `Base: ${animals[Math.floor(Math.random() * animals.length)]}`,
    `Secondary: ${animals[Math.floor(Math.random() * animals.length)]}`,
    `Tertiary: ${animals[Math.floor(Math.random() * animals.length)]}`,
    `Enhanced Trait: ${traits[Math.floor(Math.random() * traits.length)]}`
  ];
  return chimera;
}

function generateDNASequence() {
  const bases = ['A', 'T', 'C', 'G'];
  return Array.from({length: 20}, () => bases[Math.floor(Math.random() * bases.length)]).join('');
}

function generateRetinalPattern() {
  return Array.from({length: 8}, () => Math.floor(Math.random() * 16).toString(16)).join('');
}

function generateFingerprint() {
  return Array.from({length: 16}, () => Math.floor(Math.random() * 256).toString(16).padStart(2, '0')).join('');
}

function showAlert(message) {
  const alert = document.createElement('div');
  alert.className = 'alert';
  alert.textContent = message;
  alertsContainer.appendChild(alert);
  setTimeout(() => {
    alert.style.opacity = '0';
    setTimeout(() => alertsContainer.removeChild(alert), 500);
  }, 3000);
}

// Particle system
const canvas = document.createElement('canvas');
canvas.style.position = 'fixed';
canvas.style.top = '0';
canvas.style.left = '0';
canvas.style.width = '100%';
canvas.style.height = '100%';
canvas.style.pointerEvents = 'none';
document.body.appendChild(canvas);

const ctx = canvas.getContext('2d');

let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 1;
    this.speedX = Math.random() * 3 - 1.5;
    this.speedY = Math.random() * 3 - 1.5;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;

    if (this.size > 0.2) this.size -= 0.1;
  }

  draw() {
    ctx.fillStyle = '#00ff00';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function createParticles() {
  for (let i = 0; i < 100; i++) {
    particles.push(new Particle());
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < particles.length; i++) {
    particles[i].update();
    particles[i].draw();

    if (particles[i].size <= 0.2) {
      particles.splice(i, 1);
      i--;
    }
  }
  if (particles.length < 100) {
    createParticles();
  }
  requestAnimationFrame(animateParticles);
}

createParticles();
animateParticles();
</script>
</body>
</html>
