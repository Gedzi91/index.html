<html><head><base href="https://infinite.creator/generate?prompt=fdgdf">
<style>
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Arial', sans-serif;
    color: white;
}

.container {
    text-align: center;
    padding: 20px;
}

.logo {
    fill: none;
    stroke: #ff3366;
    stroke-width: 4;
    stroke-linecap: round;
    margin-bottom: 30px;
    width: 300px;
    height: 60px;
}

.search-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 30px;
}

input {
    width: 500px;
    height: 40px;
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid #ff3366;
    border-radius: 20px;
    padding: 0 20px;
    color: white;
    font-size: 16px;
}

button {
    background: #ff3366;
    border: none;
    border-radius: 20px;
    padding: 10px 30px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
}

button:hover {
    background: #ff4d7f;
}

.nav {
    display: flex;
    gap: 20px;
    justify-content: center;
}

a {
    color: #ff3366;
    text-decoration: none;
    font-size: 14px;
    transition: color 0.3s;
}

a:hover {
    color: #ff4d7f;
}

@keyframes flow {
    0% {
        stroke-dashoffset: 1000;
    }
    100% {
        stroke-dashoffset: 0;
    }
}

.logo path {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: flow 2s ease-out forwards;
}
</style>
</head>
<body>
    <div class="container">
        <svg class="logo" viewBox="0 0 300 60">
            <path d="M30,30 Q60,10 90,30 T150,30 T210,30 T270,30" />
        </svg>
        <div class="search-container">
            <input type="text" placeholder="Unleash your creative spark...">
            <button onclick="window.location.href='https://infinite.creator/generate'">Ignite</button>
        </div>
        <div class="nav">
            <a href="https://infinite.creator/explore">Explore</a>
            <a href="https://infinite.creator/create">Create</a>
            <a href="https://infinite.creator/inspire">Inspire</a>
            <a href="https://infinite.creator/share">Share</a>
        </div>
    </div>
</body></html>
