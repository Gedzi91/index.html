<html><head><base href="https://soundwave-generator.example.com/">
<title>Soundwave Generator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #1a1a1a;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .container {
    text-align: center;
  }
  canvas {
    border: 1px solid #ffffff;
    margin-bottom: 20px;
  }
  button {
    background-color: #4CAF50;
    border: none;
    color: white;
    padding: 15px 32px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 4px 2px;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  button:hover {
    background-color: #45a049;
  }
  .controls {
    margin-top: 20px;
  }
  input[type="range"] {
    width: 200px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Soundwave Generator</h1>
  <canvas id="waveform" width="500" height="200"></canvas>
  <div>
    <button id="playBtn">Play/Pause</button>
  </div>
  <div class="controls">
    <label for="frequency">Frequency: </label>
    <input type="range" id="frequency" min="20" max="2000" value="440" step="1">
    <span id="frequencyValue">440 Hz</span>
  </div>
  <div class="controls">
    <label for="waveType">Wave Type: </label>
    <select id="waveType">
      <option value="sine">Sine</option>
      <option value="square">Square</option>
      <option value="sawtooth">Sawtooth</option>
      <option value="triangle">Triangle</option>
    </select>
  </div>
</div>

<script>
let audioContext;
let oscillator;
let isPlaying = false;

const canvas = document.getElementById('waveform');
const ctx = canvas.getContext('2d');

function initAudio() {
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  oscillator = audioContext.createOscillator();
  oscillator.connect(audioContext.destination);
}

function drawWaveform() {
  const width = canvas.width;
  const height = canvas.height;
  const frequency = parseFloat(document.getElementById('frequency').value);
  const waveType = document.getElementById('waveType').value;

  ctx.clearRect(0, 0, width, height);
  ctx.beginPath();
  ctx.moveTo(0, height / 2);

  for (let x = 0; x < width; x++) {
    let y = height / 2;
    const t = x / width;
    
    switch(waveType) {
      case 'sine':
        y = height / 2 + Math.sin(2 * Math.PI * frequency * t) * (height / 2 - 10);
        break;
      case 'square':
        y = height / 2 + (Math.sin(2 * Math.PI * frequency * t) > 0 ? 1 : -1) * (height / 2 - 10);
        break;
      case 'sawtooth':
        y = height / 2 + ((t * frequency) % 1 - 0.5) * (height - 20);
        break;
      case 'triangle':
        y = height / 2 + (Math.abs((t * frequency) % 1 - 0.5) - 0.25) * 2 * (height - 20);
        break;
    }
    
    ctx.lineTo(x, y);
  }

  ctx.strokeStyle = '#00ff00';
  ctx.lineWidth = 2;
  ctx.stroke();
}

document.getElementById('playBtn').addEventListener('click', () => {
  if (!audioContext) initAudio();

  if (isPlaying) {
    oscillator.stop();
    isPlaying = false;
  } else {
    oscillator = audioContext.createOscillator();
    oscillator.type = document.getElementById('waveType').value;
    oscillator.frequency.setValueAtTime(parseFloat(document.getElementById('frequency').value), audioContext.currentTime);
    oscillator.connect(audioContext.destination);
    oscillator.start();
    isPlaying = true;
  }
});

document.getElementById('frequency').addEventListener('input', (e) => {
  const frequencyValue = parseFloat(e.target.value);
  document.getElementById('frequencyValue').textContent = `${frequencyValue} Hz`;
  if (isPlaying) {
    oscillator.frequency.setValueAtTime(frequencyValue, audioContext.currentTime);
  }
  drawWaveform();
});

document.getElementById('waveType').addEventListener('change', (e) => {
  if (isPlaying) {
    oscillator.type = e.target.value;
  }
  drawWaveform();
});

drawWaveform();
</script>
</body></html>
