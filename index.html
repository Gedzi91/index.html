function isToxicMessage(message) {
  const lowercaseMsg = message.toLowerCase();
  return toxicWords.some(word => lowercaseMsg.includes(word)) ||
    lowercaseMsg.includes('l + ratio') ||
    lowercaseMsg.includes('dead stream') ||
    lowercaseMsg.includes('worst stream') ||

}

function handleUserBan(usernameOrArray) {
  const usernames = Array.isArray(usernameOrArray) ? usernameOrArray : [usernameOrArray];
  
  usernames.forEach(username => {
    const messages = document.querySelectorAll('.message');
    messages.forEach(message => {
      const messageUsername = message.querySelector('.username');
      if (messageUsername && messageUsername.textContent === username) {
        message.classList.add('banned');
        
        const existingBanButton = message.querySelector('.ban-button');
        if (existingBanButton) {
          existingBanButton.remove();
        }
      }
    });
  });

  // Single consolidated ban message
  const banMessage = usernames.length === 1 
    ? `🚫 ${usernames[0]} has been banned!`
    : `🤖 StreamBot: Banned ${usernames.length} users for toxic behavior`;
  
  addMessage(banMessage, "System", "Normal", true);

  // Generate ban reactions from different personalities
  const personalities = ["Normal", "Toxic", "REALLY_toxic", "Wholesome"];
  const numReactions = Math.floor(Math.random() * 5) + 3; // 3-7 reactions
  
  for(let i = 0; i < numReactions; i++) {
    setTimeout(() => {
      const personality = personalities[Math.floor(Math.random() * personalities.length)];
      if (personalityEventReactions[personality]?.ban) {
        const reactions = personalityEventReactions[personality].ban;
        const reaction = reactions[Math.floor(Math.random() * reactions.length)];
        addMessage(reaction, generateUsername(), personality, false);
      }
    }, i * 500); // Stagger reactions every 500ms
  }
}

function generateEventReactions(eventType, isPositive, duration = 15000) {
  const reactionInterval = setInterval(() => {
    Object.keys(personalityEventReactions).forEach(personality => {
      if (Math.random() > 0.7) {
        const reactionType = isPositive ? 'positive' : 'negative';
        const reactions = personalityEventReactions[personality][reactionType];
        if (reactions) {
          const reaction = reactions[Math.floor(Math.random() * reactions.length)];
          const username = generateUsername();
          addMessage(reaction, username, personality, false);
          
          if ((personality.includes('toxic') && isPositive) || 
              (personality.includes('toxic') && !isPositive && reaction.includes('YES'))) {
            setTimeout(() => {
              handleUserBan(username);
              addMessage(
                `🤖 StreamBot: Banned ${username} for toxic behavior`,
                "System",
                "Normal",
                true
              );
            }, 5000);
          }
        }
      }
    });
  }, 1000);

  setTimeout(() => {
    clearInterval(reactionInterval);
  }, duration);
}

function generateNewChatter() {
  if (!isChatEnabled) return;
  
  const personality = personalities[Math.floor(Math.random() * personalities.length)];
  const messages = messageTemplates[personality];
  let message = messages[Math.floor(Math.random() * messages.length)];
  
  if (personalityPatterns[personality]) {
    const pattern = personalityPatterns[personality];
    if (Math.random() > 0.5) {
      const prefix = pattern.prefix[Math.floor(Math.random() * pattern.prefix.length)];
      message = prefix + message;
    }
    if (Math.random() > 0.5) {
      const suffix = pattern.suffix[Math.floor(Math.random() * pattern.suffix.length)];
      message = message + suffix;
    }
  }
  
  const username = generateUsername();
  addMessage(message, username, personality, false);
  
  // Immediately ban toxic messages
  if ((personality === "Toxic" || personality === "REALLY_toxic") && isToxicMessage(message)) {
    handleUserBan(username);
    addMessage(
      `🤖 StreamBot: Banned ${username} for toxic behavior`,
      "System",
      "Normal",
      true
    );
  }
}

function addMessage(message, username, personality, isSystem) {
  const chatMessages = document.getElementById('chat-messages');
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${isSystem ? 'standing-out' : ''}`;
  
  // Create personality badge if not a system message
  if (!isSystem) {
    const badge = document.createElement('span');
    badge.className = `personality-badge personality-${personality}`;
    badge.textContent = personality;
    messageDiv.appendChild(badge);
  }
  
  // Create username element
  const usernameSpan = document.createElement('span');
  usernameSpan.className = 'username';
  usernameSpan.textContent = username;
  messageDiv.appendChild(usernameSpan);
  
  // Add ban button for non-system messages
  if (!isSystem) {
    const banButton = document.createElement('button');
    banButton.className = 'ban-button';
    banButton.textContent = 'Ban';
    banButton.onclick = () => handleUserBan(username);
    messageDiv.appendChild(banButton);
  }
  
  // Process message text for emotes
  const messageContent = document.createElement('span');
  const words = message.split(' ');
  
  words.forEach(word => {
    if (twitchEmotes[word]) {
      const emoteImg = document.createElement('img');
      emoteImg.src = twitchEmotes[word];
      emoteImg.alt = word;
      emoteImg.className = 'twitch-emote';
      messageContent.appendChild(emoteImg);
    } else {
      messageContent.appendChild(document.createTextNode(' ' + word));
    }
  });
  
  messageDiv.appendChild(messageContent);
  chatMessages.insertBefore(messageDiv, chatMessages.firstChild);
  
  // Keep only last 100 messages
  while (chatMessages.children.length > 100) {
    chatMessages.removeChild(chatMessages.lastChild);
  }
}

function handleRaidEvent() {
  const raidSize = 100;
  const raidLeader = generateUsername();
  const raidBots = [];
  
  addMessage(`⚠️ RAID ALERT! ${raidLeader} is raiding with ${raidSize} bots!`, "System", "Normal", true);

  // Raid bot messages to spam
  const raidMessages = [
    "RAID TIME GET REKT",
    "TRASH STREAMER OMEGALUL",
    "GET DESTROYED KID",
    "IMAGINE STREAMING LMAO",
    "DELETING THIS STREAM RN",
    "L + RATIO + TRASH",
    "DEAD CONTENT CREATOR",
    "UNINSTALL NOW",
    "RAID BOSS HERE",
    "GET READY FOR BOT ATTACK"
  ];

  // Generate raid bots and messages
  for(let i = 0; i < raidSize; i++) {
    setTimeout(() => {
      const raidBot = generateUsername();
      raidBots.push(raidBot);
      const raidMessage = raidMessages[Math.floor(Math.random() * raidMessages.length)];
      addMessage(raidMessage, raidBot, "REALLY_toxic", false);
    }, i * 50); // Stagger bot messages every 50ms
  }

  // Ban all raid bots after 10 seconds
  setTimeout(() => {
    handleUserBan(raidBots);
    addMessage(`🤖 StreamBot: Mass ban completed. Banned ${raidSize} raid bots.`, "System", "Normal", true);
    
    // Generate post-raid reactions
    generateEventReactions('raid', false, 15000);
    generatePostEventDiscussion('raid');
  }, 10000);
}

// Start the chat generation when page loads
document.addEventListener('DOMContentLoaded', () => {
  chatGeneratorInterval = setInterval(generateNewChatter, chatSpeedInterval);
});
