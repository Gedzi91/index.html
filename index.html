<html><head><base href="/" /><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #000;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.game-container {
    width: 800px;
    height: 600px;
    background: #050000; /* Even darker background */
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 100px #ff0000 !important; /* Intense red glow */
    animation: containerDistort 4s ease-in-out infinite;
}

@keyframes containerDistort {
    0%, 100% { transform: scale(1); box-shadow: 0 0 50px #ff0000; }
    50% { transform: scale(0.95); box-shadow: 0 0 100px #800000; }
}

.character {
    width: 150px;
    height: 150px;
    position: absolute;
    bottom: 50px;
    cursor: pointer;
    transition: transform 0.3s, filter 0.5s;
    filter: brightness(0.5) contrast(1.5) grayscale(0.7) sepia(0.5) !important; /* Reduced intensity */
    animation: extremeDistortion 3s ease-in-out infinite !important;
}

.character::before {
    content: '';
    position: absolute;
    top: -10px;
    left: -10px;
    right: -10px;
    bottom: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,0,0,0.2) 0%, transparent 70%);
    z-index: -1;
}

.sky { 
    left: 100px;
    bottom: 100px; /* Moved up slightly */
    z-index: 2; /* Above background */
}

.funbot { 
    left: 350px;
    bottom: 100px; /* Moved up slightly */
    z-index: 2;
}

.raddy { 
    left: 600px;
    top: 200px; /* Adjusted position to be more visible */
    z-index: 2;
}

.background {
    width: 100%;
    height: 100%;
    position: absolute;
    background-image: url('Phase1.jpeg');
    background-size: cover;
    background-position: center;
    z-index: 0;
    filter: brightness(0.1) contrast(3) hue-rotate(666deg) grayscale(0.5) !important; /* Increased brightness */
    animation: bgNightmare 2s ease-in-out infinite;
}

@keyframes bgNightmare {
    0%, 100% { filter: brightness(0.1) contrast(3) hue-rotate(666deg); }
    50% { filter: brightness(0.15) contrast(4) hue-rotate(999deg); }
}

.expression-bubble {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: #800; /* Changed background color */
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(255,0,0,0.5);
    opacity: 0.8; /* Increased opacity */
    transition: opacity 0.3s;
    z-index: 2;
    color: #fff; /* Changed text color */
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 10px #ff0000; /* Added text shadow */
    animation: bubblePulse 1s ease-in-out infinite;
}

@keyframes bubblePulse {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.1); }
    100% { transform: translateX(-50%) scale(1); }
}

.lightning {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    background: radial-gradient(circle, #ff0000, #660000);
    mix-blend-mode: multiply;
    transition: opacity 0.1s;
}

.noose {
    position: absolute;
    left: 670px;
    top: 0;
    width: 5px;
    height: 150px;
    background: #2a1818;
    z-index: 1;
    animation: nooseSway 4s ease-in-out infinite;
}

@keyframes nooseSway {
    0% { transform-origin: top; transform: rotate(-5deg); }
    50% { transform-origin: top; transform: rotate(5deg); }
    100% { transform-origin: top; transform: rotate(-5deg); }
}

.blood-drip {
    position: absolute;
    background: linear-gradient(to bottom, #800000, #ff0000);
    width: 4px;
    height: 40px;
    animation: drip 3s linear infinite;
    opacity: 0;
    filter: blur(1px);
}

@keyframes drip {
    0% { transform: translateY(-40px); opacity: 0; }
    50% { opacity: 0.8; }
    100% { transform: translateY(600px); opacity: 0; }
}

.metal-pole {
    position: absolute;
    background: linear-gradient(90deg, #444, #666, #444);
    width: 20px;
    height: 200px;
    border: 2px solid #777;
    border-radius: 4px;
    box-shadow: 0 0 15px rgba(255,0,0,0.5);
    transform-origin: bottom;
    z-index: 1;
    animation: poleGlow 3s ease-in-out infinite;
}

@keyframes poleGlow {
    0% { box-shadow: 0 0 15px rgba(255,0,0,0.5); }
    50% { box-shadow: 0 0 25px rgba(255,0,0,0.8); }
    100% { box-shadow: 0 0 15px rgba(255,0,0,0.5); }
}

.spirit {
    position: absolute;
    width: 40px;
    height: 60px;
    background: radial-gradient(circle, rgba(255,0,0,0.2), transparent);
    filter: blur(2px);
    transform: scale(2);
    animation: float 6s ease-in-out infinite;
    pointer-events: none;
}

@keyframes float {
    0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.1; }
    50% { transform: translateY(-30px) translateX(20px) rotate(10deg); opacity: 0.3; }
}

.eye-spikes {
    position: absolute;
    left: 600px;
    top: 100px;
    width: 150px;
    height: 150px;
    z-index: 4;
    pointer-events: none;
    animation: spikeGlow 2s ease-in-out infinite;
    filter: drop-shadow(0 0 5px #ff0000);
}

@keyframes spikeGlow {
    0% { filter: drop-shadow(0 0 5px #ff0000); }
    50% { filter: drop-shadow(0 0 15px #ff0000); }
    100% { filter: drop-shadow(0 0 5px #ff0000); }
}

.pentagram {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0.3;
    z-index: 1;
    mix-blend-mode: multiply;
    animation: pentagramPulse 4s ease-in-out infinite;
}

@keyframes pentagramPulse {
    0% { transform: rotate(0deg); opacity: 0.3; }
    50% { transform: rotate(180deg); opacity: 0.6; }
    100% { transform: rotate(360deg); opacity: 0.3; }
}
</style></head><body>

<div class="game-container">
    <div class="background"></div>
    <div class="lightning" id="lightning"></div>
    <div class="noose"></div>
    <div class="character sky" id="sky">
        <img src="Sky_Blue_Normal.webp" alt="Sky">
    </div>
    <div class="character funbot" id="funbot">
        <img src="funbot_phase1.png" alt="Funbot">
    </div>
    <div class="character raddy" id="raddy">
        <img src="raddy_phase1.png" alt="Raddy">
    </div>
    <div class="eye-spikes">
        <svg viewBox="0 0 150 150" fill="#ff0000">
            <path d="M45,45 L20,10 M45,45 L10,35 M45,45 L25,60" 
                  stroke="#ff0000" 
                  stroke-width="3"
                  fill="none">
                <animate attributeName="opacity"
                         values="0.5;1;0.5"
                         dur="2s"
                         repeatCount="indefinite"/>
            </path>
            <path d="M105,45 L130,10 M105,45 L140,35 M105,45 L125,60" 
                  stroke="#ff0000" 
                  stroke-width="3"
                  fill="none">
                <animate attributeName="opacity"
                         values="0.5;1;0.5"
                         dur="2s"
                         repeatCount="indefinite"/>
            </path>
            <path d="M45,45 L15,15 M105,45 L135,15" 
                  stroke="#ff0000" 
                  stroke-width="3"
                  fill="none">
                <animate attributeName="opacity"
                         values="0.5;1;0.5"
                         dur="2s"
                         repeatCount="indefinite"/>
            </path>
        </svg>
    </div>
    <div class="skull">
        <svg viewBox="0 0 100 100" fill="#ffffff">
            <path d="M25,25 C25,10 75,10 75,25 L75,60 C75,75 65,80 60,80 L40,80 C35,80 25,75 25,60 Z" />
            <circle cx="35" cy="45" r="10" fill="#000"/>
            <circle cx="65" cy="45" r="10" fill="#000"/>
            <path d="M40,65 L60,65 L50,75 Z" fill="#000"/>
        </svg>
    </div>
    <div class="expression-bubble" id="bubble"></div>
    <div class="pentagram"></div>
    <div class="glitch-overlay"></div>
    <div class="vignette-overlay"></div>
</div>

<script>
const sky = document.getElementById('sky');
const funbot = document.getElementById('funbot');
const raddy = document.getElementById('raddy');
const bubble = document.getElementById('bubble');
const lightning = document.getElementById('lightning');
const container = document.querySelector('.game-container');

const characterSounds = {
    sky: ['sky_normal1.wav', 'sky_normal2.wav'],
    funbot: ['funbot_normal.mp3'],
    raddy: ['raddy_normal.wav']
};

const characterMessages = {
    sky: "T̸̨̘̭͕̲̝̙̹̫̲̃̈́̅͒͐͆̇̑̚H̷̡̛̛̺̮̦̭̫͚̣̪̱͋̎̌̊̒̈́̈́Ę̶͉̰̣̼̣̖̻̖̌̒̓̆̋̐̓̍͜͝ ̶͖͍̭̲̦͇̖̙̼̇̈́̃̎̒̎̊̕͜͝V̵̡̨̳͈͔͍͉̦̞̀̒̏̊̈́̐̏̕͜͠Ơ̵̢̡̺͓̩̪͍͍͒̈́͒̐̊̃̕͜͝Į̴̛̭͖͉̜̟͚̼̬̇̆̈́̃̓̆̕͜͝D̶̨̢̺͚͓̫͙̦̲̀̆̇̎̒̈́̊̕͜͠",
    funbot: "S̵̨̧̛͔̹͚̝͎̫̻̎̓̊̐̈́̊͘͜͝Y̵̢̨̰͖̦̟͎̫̥̿̆̍̒̐̊̈́̕͜͝S̷̡̢͚͎̻͙̫̹̯̎̊̐̓̆̃̈́̕͜͝T̴̢̢̛̰͉̝͔̫̹̀̊̐̓̆̈́̃͜͝ͅE̵̡̛͚͖̼͙̫̹̺̒̓̆̊̐̃̕͜͝M̷̢̡̛̺͚͙̫̹̺̊̓̆̐̃̈́̕͜͝S̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃̈́̕͜͝ ̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃̈́̕͜͝D̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃̈́̕͜͝E̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃̈́̕͜͝Å̴̢̧̛͚͖͙̫̹̺̓̆̐̃̈́̕͜͝D̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃̈́̕͜͝",
    raddy: "Ẃ̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃͜͝É̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃͜͝L̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃͜͝C̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃͜͝Ơ̴̢̧͚͖͙̫̹̺̊̓̆̐̃͜͝M̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃͜͝E̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃͜͝ ̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃͜͝T̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃͜͝Ơ̴̢̧͚͖͙̫̹̺̊̓̆̐̃͜͝ ̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃͜͝H̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃͜͝E̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃͜͝L̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃͜͝L̴̢̧̛͚͖͙̫̹̺̊̓̆̐̃͜͝"
};

// Modify audio playback for more distortion
const audioElements = {};
for (let character in characterSounds) {
    audioElements[character] = characterSounds[character].map(sound => {
        const audio = new Audio(sound);
        audio.playbackRate = 0.1; // Even slower
        audio.preservesPitch = false;
        return audio;
    });
}

let activeDrips = 0;
const MAX_DRIPS = 10;

function createBloodDrip() {
    if (activeDrips >= MAX_DRIPS) return;
    
    activeDrips++;
    const drip = document.createElement('div');
    drip.className = 'blood-drip';
    drip.style.left = Math.random() * 800 + 'px';
    container.appendChild(drip);
    
    setTimeout(() => {
        drip.remove();
        activeDrips--;
    }, 2000);
}

// Set intervals with reduced frequency
window.bloodInterval = setInterval(createBloodDrip, 2000); // Every 2 seconds

function createLightningEffect() {
    lightning.style.opacity = '0.5'; // Reduced from 0.8
    setTimeout(() => {
        lightning.style.opacity = '0';
    }, 200); // Increased from 100ms
}

function handleCharacterClick(character, element) {
    const sounds = audioElements[character];
    const currentSound = sounds[Math.floor(Math.random() * sounds.length)];
    
    createLightningEffect();
    currentSound.play();
    
    bubble.textContent = characterMessages[character];
    bubble.style.opacity = '1';
    
    // Add temporary highlight
    element.style.filter = 'brightness(1) contrast(1.2)';
    setTimeout(() => {
        element.style.filter = '';
    }, 500);
}

sky.addEventListener('click', () => handleCharacterClick('sky', sky));
funbot.addEventListener('click', () => handleCharacterClick('funbot', funbot));
raddy.addEventListener('click', () => handleCharacterClick('raddy', raddy));

function createCloud() {
    const cloud = document.createElement('div');
    cloud.className = 'cloud';
    cloud.innerHTML = `
        <svg viewBox="0 0 100 60" fill="red">
            <path d="M10 40 Q25 20 40 40 Q55 20 70 40 Q85 20 90 40 Q100 40 100 50 Q100 60 80 60 L20 60 Q0 60 0 50 Q0 40 10 40Z"/>
        </svg>
    `;
    
    cloud.style.left = '-100px';
    cloud.style.top = Math.random() * 200 + 'px';
    container.appendChild(cloud);
    
    requestAnimationFrame(() => {
        cloud.style.left = '900px';
    });
    
    setTimeout(() => cloud.remove(), 15000);
}

// Set intervals with reduced frequency
window.cloudInterval = setInterval(createCloud, 10000); // Every 10 seconds

// Create floating spirits
function createSpirit() {
    const spirit = document.createElement('div');
    spirit.className = 'spirit';
    spirit.style.left = Math.random() * 700 + 50 + 'px';
    spirit.style.top = Math.random() * 500 + 50 + 'px';
    container.appendChild(spirit);
    
    setTimeout(() => spirit.remove(), 4000);
}

// Set intervals with reduced frequency
window.spiritInterval = setInterval(createSpirit, 5000); // Every 5 seconds

// Add decay effect to characters
document.querySelectorAll('.character').forEach(char => {
    char.style.transform = 'rotate(' + (Math.random() * 20 - 10) + 'deg)';
});

// Add metal poles around Sky
function createMetalPoles() {
    const polePositions = [
        {left: 50, angle: -20},
        {left: 150, angle: 20},
        {left: 250, angle: -15},
        {left: 80, angle: 25},
        {left: 180, angle: -25}
    ];

    polePositions.forEach(pos => {
        const pole = document.createElement('div');
        pole.className = 'metal-pole';
        pole.style.left = pos.left + 'px';
        pole.style.transform = `rotate(${pos.angle}deg)`;
        container.appendChild(pole);
    });
}

// Call createMetalPoles on page load
createMetalPoles();

// Add pentagram SVG
function addPentagram() {
    const pentagram = document.createElement('div');
    pentagram.className = 'pentagram';
    pentagram.innerHTML = `
        <svg viewBox="0 0 100 100">
            <path d="M50 5 L95 90 L5 35 L95 35 L5 90 Z" 
                  fill="none" 
                  stroke="#ff0000" 
                  stroke-width="1">
                <animate attributeName="stroke-width"
                         values="1;3;1"
                         dur="2s"
                         repeatCount="indefinite"/>
            </path>
        </svg>
    `;
    container.appendChild(pentagram);
}

// Initialize new effects
addPentagram();
</script></body></html>
