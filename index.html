<html><head><base href="/" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="orientation" content="landscape">
<style>
body { margin: 0; overflow: hidden; background: #2c1810; }

#characterSelect .character-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
}
.bat { 
    position: absolute; 
    width: min(140px, 25vw);
    height: min(140px, 25vw);
    transition: all 0.3s;
}
.bat img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
#characterSelect {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    z-index: 1000;
    padding-top: 20px;
    overflow-y: auto;
}

.character-option {
    width: min(150px, 30vw);
    height: min(150px, 30vw);
    margin: 10px;
    cursor: pointer;
    border: 4px solid transparent;
    border-radius: 10px;
    transition: all 0.3s;
}

.character-option:hover {
    border-color: #ff9800;
    transform: scale(1.1);
}

.locked-overlay {
    position: absolute;
    bottom: -25px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 12px;
    white-space: nowrap;
}

.character-option.locked {
    cursor: not-allowed;
    opacity: 0.7;
}

.character-option.locked:hover {
    transform: none;
    border-color: transparent;
}

.character-option.locked.unlocked {
    cursor: pointer;
    opacity: 1;
}

.character-option.locked.unlocked:hover {
    transform: scale(1.1);
    border-color: #ff9800;
}

.character-option.selected {
    border-color: #ff9800;
    background: rgba(255,152,0,0.2);
}

#startGame {
    padding: 15px 30px;
    background: #ff9800;
    border: none;
    border-radius: 5px;
    color: white;
    font-size: 20px;
    cursor: pointer;
    margin-top: 20px;
    display: none;
}

#startGame:hover {
    background: #f57c00;
}

.tutorial-shapes {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin: 10px;
    color: white;
    font-family: Arial;
    max-height: 40vh;
    overflow-y: auto;
    max-width: 95vw;
    padding: 10px;
}

.shape-demo {
    text-align: center;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    width: 100px;
}

.shape-demo .symbol {
    position: static;
    transform: none;
    margin: 10px auto;
}

.shape-desc {
    font-size: 14px;
    margin-top: 10px;
    color: #ccc;
}

#heartDemo {
    width: 80px;
    height: 80px;
    margin: 5px auto;
}

#gameArea { width: 100vw; height: 100vh; position: relative; }
#player { 
    position: absolute; 
    bottom: 20%; 
    left: 80%; 
    transform: translate(-50%, 0); 
    width: min(120px, 22vw);
    height: min(120px, 22vw);
}

#playerWand {
    position: absolute; 
    left: -30px;
    top: 25%;
    transform: translateY(-50%);
    width: min(50px, 10vw);
    height: min(50px, 10vw);
    pointer-events: none;
    animation: wandFloat 2s infinite ease-in-out;
    z-index: 1;
}

#playerWand img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

@keyframes wandFloat {
    0% { transform: translateY(-50%) rotate(-5deg); }
    50% { transform: translateY(-60%) rotate(5deg); }
    100% { transform: translateY(-50%) rotate(-5deg); }
}

#playerSprite {
    width: 100%;
    height: 100%;
    background: url('https://party.websim.ai/blobs/0192deaa-6972-7466-9cf9-a8f4d3e4ae23.png');
    background-size: contain;
    background-repeat: no-repeat;
    animation: float 2s infinite ease-in-out;
    transform: scaleX(1);
}
.ghost { position: absolute; width: 100px; height: 100px; transition: all 0.3s; }
.symbol { 
    position: absolute; 
    font-size: min(48px, 8vw);
    width: min(60px, 12vw);
    height: min(60px, 12vw);
    color: white; 
    pointer-events: none; 
    left: 50%; 
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
}
.symbol.current {
    border: 2px solid #ff9800;
    border-radius: 5px;
    padding: 5px;
    background: rgba(45, 15, 66, 0.5);
}
#health { position: absolute; top: 10px; left: 10px; }
#score { position: absolute; top: 10px; right: 10px; color: #ffd700; font-size: min(24px, 6vw); font-family: Arial; }
.heart { fill: #ff4444; margin-right: 5px; }
#credits { position: absolute; bottom: 10px; right: 10px; color: white; text-decoration: none; font-family: Arial; z-index: 100; pointer-events: auto; }
#background { 
    width: 200%; 
    height: 100%; 
    position: absolute;
    animation: moveBackground 40s linear infinite;
}

@keyframes moveBackground {
    from { transform: translateX(-50%); }
    to { transform: translateX(0); }
}
#drawCanvas { position: absolute; width: 100%; height: 100%; z-index: 10; }
#gameOverScreen { 
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.8);
    padding: 20px;
    border-radius: 10px;
    color: white;
    text-align: center;
    z-index: 100;
}
#restartBtn {
    padding: 10px 20px;
    background: #ffd700;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
}

@keyframes float {
    0% { transform: translateY(0px) scaleX(-1); }
    50% { transform: translateY(-10px) scaleX(-1); }
    100% { transform: translateY(0px) scaleX(-1); }
}

.ghost, .bat { animation: float 2s infinite ease-in-out; }

.symbol.up { color: #ff6b6b; }
.symbol.down { color: #50fa7b; }
.symbol.left { color: #8be9fd; }
.symbol.right { color: #ff79c6; }
.symbol.triangle { color: #f1fa8c; }
.symbol.square { color: #bd93f9; }

#healingKitten {

    height: min(60px, 12vw);

}

#healingKitten img {

}

.healSymbol {

    border-radius: 5px;
    padding: 5px;

@media screen and (orientation: portrait) {
    body::after {
        content: "Please rotate your device to landscape mode";

        left: 0;

        height: 100vh;

        text-align: center;
        font-family: Arial, sans-serif;
        font-size: 24px;
        padding: 20px;
        z-index: 9999;
    }
}

<script>
let selectedCharacter = null;
const characterSelect = document.getElementById('characterSelect');
const startGameBtn = document.getElementById('startGame');
const characterOptions = document.querySelectorAll('.character-option');
let lastClickTime = 0;
let alternateCount = 0;
let lastCharacter = null;
let highScore;
try {
    highScore = parseInt(localStorage.getItem('highScore')) || 0;
} catch (e) {
    console.warn('Could not load high score:', e);
    highScore = 0;
}
const foxCharacter = document.getElementById('foxCharacter');

// Update unlock state
if (highScore >= 500) {
    foxCharacter.classList.add('unlocked');
    foxCharacter.querySelector('img').style.filter = 'none';
}

const dogCharacter = `
    <div class="character-option" data-character="dog">
        <img src="https://party.websim.ai/blobs/0192df91-afce-7476-83e8-c296e034859c.png" alt="Secret Dog Character" style="width: 100%; height: 100%; object-fit: contain;">
    </div>
`;

characterOptions.forEach(option => {
    option.addEventListener('click', () => {
        if (option.dataset.character === 'fox' && !option.classList.contains('unlocked')) {
            return; // Don't allow selection of locked fox
        }
        
        const now = Date.now();
        
        // Check for rapid alternating clicks between first two characters
        if (option.dataset.character === 'ghost' || option.dataset.character === 'witch') {
            if (lastCharacter !== option.dataset.character && (now - lastClickTime) < 500) {
                alternateCount++;
                
                if (alternateCount >= 3 && !document.querySelector('[data-character="dog"]')) {
                    // Insert dog character after the second character
                    const container = document.querySelector('.character-container div');
                    container.insertAdjacentHTML('beforeend', dogCharacter);
                    
                    // Add click handler to new dog character
                    const dogOption = document.querySelector('[data-character="dog"]');
                    dogOption.addEventListener('click', () => {
                        characterOptions.forEach(opt => opt.classList.remove('selected'));
                        dogOption.classList.add('selected');
                        selectedCharacter = 'dog';
                        startGameBtn.style.display = 'block';
                        
                        const playerSprite = document.getElementById('playerSprite');
                        playerSprite.style.background = `url('${dogOption.querySelector('img').src}')`;
                        playerSprite.style.backgroundSize = 'contain';
                        playerSprite.style.backgroundRepeat = 'no-repeat';
                    });
                }
            } else if ((now - lastClickTime) >= 500) {
                alternateCount = 0;
            }
            
            lastClickTime = now;
            lastCharacter = option.dataset.character;
        }
        
        characterOptions.forEach(opt => opt.classList.remove('selected'));
        option.classList.add('selected');
        selectedCharacter = option.dataset.character;
        startGameBtn.style.display = 'block';
        
        const playerSprite = document.getElementById('playerSprite');
        playerSprite.style.background = `url('${option.querySelector('img').src}')`;
        playerSprite.style.backgroundSize = 'contain';
        playerSprite.style.backgroundRepeat = 'no-repeat';
    });
});

function checkHealing(path) {
    if (path.length < 20) return false;

    // Calculate bounding box and key metrics
    const minX = Math.min(...path.map(p => p.x));
    const maxX = Math.max(...path.map(p => p.x));
    const minY = Math.min(...path.map(p => p.y));
    const maxY = Math.max(...path.map(p => p.y));
    const width = maxX - minX;
    const height = maxY - minY;
    const centerX = minX + width/2;
    const centerY = minY + height/2;

    // Basic size and ratio checks
    const ratio = width / height;
    if (ratio < 0.7 || ratio > 1.3) return false;
    
    let topBump = false;    // Center top bump
    let leftLobe = false;   // Left heart lobe
    let rightLobe = false;  // Right heart lobe
    let bottomPoint = false;// Bottom point
    
    // Track the highest points on left and right side
    let leftHighest = { y: maxY, x: maxX };
    let rightHighest = { y: maxY, x: minX };
    let bottomMostPoint = { y: minY, x: centerX };
    
    // Analyze the path
    for (let i = 0; i < path.length; i++) {
        const p = path[i];
        
        // Find highest points on each side
        if (p.x < centerX && p.y < leftHighest.y) {
            leftHighest = p;
        }
        if (p.x > centerX && p.y < rightHighest.y) {
            rightHighest = p;
        }
        
        // Find bottom point
        if (p.y > bottomMostPoint.y) {
            bottomMostPoint = p;
        }
        
        // Check for top center bump
        if (Math.abs(p.x - centerX) < width * 0.2 && 
            p.y < centerY && 
            p.y > minY) {
            topBump = true;
        }
    }
    
    // Verify left and right lobes
    if (leftHighest.y < centerY + height * 0.2 && 
        leftHighest.x < centerX - width * 0.15) {
        leftLobe = true;
    }
    
    if (rightHighest.y < centerY + height * 0.2 && 
        rightHighest.x > centerX + width * 0.15) {
        rightLobe = true;
    }
    
    // Verify bottom point
    if (bottomMostPoint.y > centerY + height * 0.3 && 
        Math.abs(bottomMostPoint.x - centerX) < width * 0.2) {
        bottomPoint = true;
    }

    // Final check - require most features to be present
    const features = [topBump, leftLobe, rightLobe, bottomPoint];
    const presentFeatures = features.filter(f => f).length;
    
    return presentFeatures >= 3; // Allow some leniency by requiring only 3 of 4 features
}

function moveGhostTowardsPlayer(ghost, speed) {
    const ghostRect = ghost.element.getBoundingClientRect();
    const playerRect = player.getBoundingClientRect();
    
    const dx = playerRect.left - ghostRect.left;
    const dy = playerRect.top - ghostRect.top;
    
    const currentLeft = parseFloat(ghost.element.style.left) || 0;
    const currentTop = parseFloat(ghost.element.style.top) || 0;
    
    ghost.element.style.left = (currentLeft + dx * speed) + '%';
    ghost.element.style.top = (currentTop + dy * speed) + '%';
}

function checkDrawing(path, symbol) {
    if (path.length < 3) return false;

    const minX = Math.min(...path.map(p => p.x));
    const maxX = Math.max(...path.map(p => p.x));
    const minY = Math.min(...path.map(p => p.y));
    const maxY = Math.max(...path.map(p => p.y));
    const width = maxX - minX;
    const height = maxY - minY;
    
    const firstPoint = path[0];
    const lastPoint = path[path.length - 1];
    const distanceToStart = Math.sqrt(
        Math.pow(lastPoint.x - firstPoint.x, 2) + 
        Math.pow(lastPoint.y - firstPoint.y, 2)
    );

    let confidence = 0;

    if (symbol === '↑') {
        confidence = height > width * 1.2 && path[0].y > path[path.length-1].y ? 1 : 0;
    } else if (symbol === '↓') {
        confidence = height > width * 1.2 && path[0].y < path[path.length-1].y ? 1 : 0;
    } else if (symbol === '←') {
        confidence = width > height * 1.2 && lastPoint.x > firstPoint.x ? 1 : 0;
    } else if (symbol === '→') {
        confidence = width > height * 1.2 && lastPoint.x < firstPoint.x ? 1 : 0;
    } else if (symbol === '△') {
        const middlePoint = path[Math.floor(path.length / 2)];
        confidence = distanceToStart < 50 && middlePoint.y < firstPoint.y ? 1 : 0;
    } else if (symbol === '□') {
        const corners = findCorners(path);
        if (corners.length >= 4) {
            const aspectRatio = width / height;
            const isSquarish = aspectRatio > 0.7 && aspectRatio < 1.3;
            confidence = isSquarish && distanceToStart < 50 ? 1 : 0;
        }
    }

    return confidence >= 0.7;
}

function findCorners(path) {
    const corners = [];
    const threshold = 30;
    
    for (let i = 1; i < path.length - 1; i++) {
        const prev = path[i - 1];
        const curr = path[i];
        const next = path[i + 1];
        
        const angle = Math.abs(Math.atan2(next.y - curr.y, next.x - curr.x) -
                             Math.atan2(curr.y - prev.y, curr.x - prev.x));
        
        if (angle > Math.PI / 4) {
            corners.push(curr);
        }
    }
    
    return corners;
}

function createGhost() {
    const isBat = score >= 400;
    const enemy = document.createElement('div');
    enemy.className = isBat ? 'bat' : 'ghost';
    
    if (isBat) {
        enemy.innerHTML = `<img src="https://party.websim.ai/blobs/0192df0b-c50c-7347-8620-00b5d8a6b51e.png" alt="Bat enemy">`;
        patternsRequired = 5; // Bats always require 5 patterns
    } else {
        enemy.innerHTML = `<svg viewBox="0 0 50 50">
            <path d="M25,0 Q40,0 40,20 L40,35 Q40,50 25,50 Q10,50 10,35 L10,20 Q10,0 25,0" fill="white"/>
            <circle cx="20" cy="20" r="3" fill="#6600cc"/>
            <circle cx="30" cy="20" r="3" fill="#6600cc"/>
        </svg>`;
        patternsRequired = Math.min(4, Math.floor(score / 100) + 1);
    }
    
    const side = Math.random() < 0.2 ? 'left' : 'right'; 
    enemy.style.top = Math.random() * 60 + 20 + '%';
    
    if(side === 'left') {
        enemy.style.left = '-5%';
        enemy.style.right = 'auto';
    } else {
        enemy.style.right = '-5%';
        enemy.style.left = 'auto';
    }
    
    gameArea.appendChild(enemy);
    
    const requiredSymbols = [];
    const symbolElements = [];
    for(let i = 0; i < patternsRequired; i++) {
        const symbolIndex = Math.floor(Math.random() * symbols.length);
        const symbolText = symbols[symbolIndex];
        const symbol = document.createElement('div');
        symbol.className = 'symbol ' + ['up', 'down', 'left', 'right', 'triangle', 'square'][symbolIndex];
        if (i === 0) symbol.classList.add('current');
        symbol.textContent = symbolText;
        symbol.style.top = `${-40 - (i * 40)}px`; 
        enemy.appendChild(symbol);
        requiredSymbols.push(symbolText);
        symbolElements.push(symbol);
    }
    
    const ghostId = Date.now().toString();
    patternProgress[ghostId] = {
        completed: 0,
        symbols: requiredSymbols,
        elements: symbolElements
    };
    
    activeGhosts.push({
        element: enemy,
        symbols: requiredSymbols,
        active: true,
        side: side,
        id: ghostId,
        isBat: isBat
    });
    
    return enemy;
}

canvas.addEventListener('mousedown', (e) => {
    isDrawing = true;
    drawingPath = [{x: e.clientX, y: e.clientY}];
    ctx.beginPath();
    ctx.moveTo(e.clientX, e.clientY);
    
    const playerRect = player.getBoundingClientRect();
    playerFacing = e.clientX < playerRect.left ? 'left' : 'right';
    document.getElementById('playerSprite').style.transform = `scaleX(${playerFacing === 'left' ? 1 : -1})`;
});

canvas.addEventListener('mousemove', (e) => {
    if (!isDrawing) return;
    drawingPath.push({x: e.clientX, y: e.clientY});
    
    let bestMatch = '';
    let bestConfidence = 0;
    
    activeGhosts.forEach(ghost => {
        if (ghost.active) {
            const confidence = checkDrawing(drawingPath, ghost.symbols[patternProgress[ghost.id]?.completed]);
            if (confidence > bestConfidence) {
                bestConfidence = confidence;
                bestMatch = ghost.symbols[patternProgress[ghost.id]?.completed];
            }
        }
    });
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath();
    ctx.moveTo(drawingPath[0].x, drawingPath[0].y);
    
    for (let point of drawingPath) {
        ctx.lineTo(point.x, point.y);
    }
    
    ctx.strokeStyle = bestMatch ? symbolColors[bestMatch] : 'white';
    ctx.lineWidth = 2;
    ctx.stroke();
});

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (document.getElementById('healingKitten').style.display === 'block' && 
        checkHealing(drawingPath)) {
        health = Math.min(5, health + 1);
        updateHealth();
        hideHealingKitten();
    }
    
    activeGhosts.forEach(ghost => {
        if(ghost.active) {
            const progress = patternProgress[ghost.id];
            if(progress && checkDrawing(drawingPath, ghost.symbols[progress.completed])) {
                if (progress.elements[progress.completed]) {
                    progress.elements[progress.completed].remove();
                }
                
                progress.completed++;
                
                if (progress.completed < progress.elements.length) {
                    progress.elements[progress.completed].classList.add('current');
                }
                
                if(progress.completed >= ghost.symbols.length) {
                    ghost.element.style.opacity = '0';
                    setTimeout(() => ghost.element.remove(), 300);
                    ghost.active = false;
                    delete patternProgress[ghost.id];
                    score += 10;
                    document.getElementById('score').textContent = score;
                    
                    patternsRequired = Math.min(4, Math.floor(score / 100) + 1);
                }
            }
        }
    });
    
    isDrawing = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}, {passive: false});

    isDrawing = false;
    
    if (document.getElementById('healingKitten').style.display === 'block' && 
        checkHealing(drawingPath)) {

});

function showGameOver() {
    document.getElementById('gameOverScreen').style.display = 'block';
    document.getElementById('finalScore').textContent = score;
    backgroundMusic.pause();
    
    // Update high score with error handling
    if (score > highScore) {
        try {
            highScore = score;
            localStorage.setItem('highScore', score.toString()); // Convert to string explicitly
            
            // Check for fox unlock
            if (highScore >= 500) {
                foxCharacter.classList.add('unlocked');
                foxCharacter.querySelector('img').style.filter = 'none';
            }
        } catch (e) {
            console.warn('Could not save high score:', e);
            // Fallback - at least update the UI even if we can't save
            highScore = score;
        }
    }
}

document.getElementById('restartBtn').addEventListener('click', () => {
    backgroundMusic.currentTime = 0;
    backgroundMusic.play();
    location.reload();
});

function gameLoop() {
    if(health <= 0) {
        showGameOver();
        return;
    }
    
    const currentTime = Date.now();
    const spawnDelay = score >= 400 ? 4000 : 3000;
    if(currentTime - lastGhostTime > spawnDelay) {
        createGhost();
        lastGhostTime = currentTime;
    }
    
    // Detect if mobile/touch device
    const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    
    activeGhosts.forEach(ghost => {
        if(ghost.active) {
            // Adjust speed based on device type
            let speed;
            if (isMobile) {
                speed = ghost.isBat ? 0.0006 : 0.0008; // 4x faster on mobile
            } else {
                speed = ghost.isBat ? 0.00015 : 0.0002; // Original desktop speed
            }
            moveGhostTowardsPlayer(ghost, speed);
        }
    });
    
    activeGhosts = activeGhosts.filter(ghost => {
        if(!ghost.active) return false;
        
        const rect = ghost.element.getBoundingClientRect();
        const playerRect = player.getBoundingClientRect();
        
        if(Math.abs(rect.left - playerRect.left) < 50 && Math.abs(rect.top - playerRect.top) < 50) {
            ghost.element.remove();
            health--;
            updateHealth();
            if (health > 0 && health < 5) {
                showHealingKitten();
            }
            return false;
        }
        
        return true;
    });
    
    requestAnimationFrame(gameLoop);
}

updateHealth();
