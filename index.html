<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #f5d0fe;
  --secondary: #c8b6ff; 
  --background: #f0f8ff;
  --text: #4a4a8a;
  --accent: #ffd700;
  --glow: 0 0 10px rgba(255, 255, 255, 0.8);
}

body {
  background: linear-gradient(135deg, var(--background), #fff);
  color: var(--text);
  font-family: 'Quicksand', 'Roboto', sans-serif;
}

.header {
  display: flex;
  align-items: center;
  padding: 1rem;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 2px 15px rgba(200, 182, 255, 0.2);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--secondary);
  text-decoration: none;
}

.logo svg {
  width: 40px;
  height: 40px;
}

.logo svg circle {
  fill: var(--secondary);
  filter: drop-shadow(0 0 5px rgba(200, 182, 255, 0.5));
}

.search-bar {
  flex-grow: 1;
  margin: 0 2rem;
  position: relative;
}

.search-input {
  width: 100%;
  padding: 0.5rem 1rem;
  border-radius: 20px;
  border: 1px solid var(--secondary);
  background: rgba(255, 255, 255, 0.9);
  color: var(--text);
  box-shadow: 0 0 10px rgba(200, 182, 255, 0.1);
}

.search-input:focus {
  outline: none;
  box-shadow: 0 0 15px rgba(200, 182, 255, 0.3);
}

.main-content {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
  padding: 1rem;
  animation: fadeIn 1s ease-out;
}

.video-card {
  background: rgba(255, 255, 255, 0.9);
  border: 1px solid rgba(200, 182, 255, 0.3);
  box-shadow: 0 5px 15px rgba(200, 182, 255, 0.1);
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
}

.video-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(200, 182, 255, 0.2);
  border-color: var(--secondary);
}

.thumbnail {
  position: relative;
  padding-top: 56.25%;
  background: #404040;
}

.video-info {
  padding: 1rem;
}

.profile-pic {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  margin-right: 0.5rem;
}

.video-meta {
  display: flex;
  align-items: start;
}

.video-text h3 {
  margin: 0;
  font-size: 1rem;
}

.channel-name {
  color: #aaa;
  font-size: 0.9rem;
}

@keyframes shimmer {
  0% { background-position: -1000px 0; }
  100% { background-position: 1000px 0; }
}

.loading {
  background: linear-gradient(90deg, #404040 0%, #4a4a4a 50%, #404040 100%);
  background-size: 1000px 100%;
  animation: shimmer 2s infinite linear;
}

@keyframes float {
  0% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(10deg); }
  100% { transform: translateY(0) rotate(0deg); }
}

.header::before {
  content: '';
  position: absolute;
  top: -50px;
  left: 0;
  width: 100%;
  height: 50px;
  background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.1));
  pointer-events: none;
}

.main-content::before,
.main-content::after {
  content: '❋';
  position: fixed;
  font-size: 2rem;
  color: var(--secondary);
  opacity: 0.3;
  pointer-events: none;
  animation: float 6s infinite ease-in-out;
}

.main-content::before {
  top: 20%;
  left: 5%;
}

.main-content::after {
  bottom: 20%;
  right: 5%;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.online-users-panel {
  position: fixed;
  right: 20px;
  top: 80px;
  background: rgba(255, 255, 255, 0.9);
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 0 20px rgba(200, 182, 255, 0.2);
  backdrop-filter: blur(10px);
  z-index: 90;
  max-height: 80vh;
  overflow-y: auto;
}

.online-users-panel h3 {
  color: var(--secondary);
  margin: 0 0 10px 0;
  font-size: 1rem;
}

.online-user {
  display: flex;
  align-items: center;
  margin: 5px 0;
  padding: 5px;
  border-radius: 20px;
  transition: all 0.3s ease;
}

.online-user:hover {
  background: rgba(200, 182, 255, 0.1);
}

.mini-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  margin-right: 8px;
}

.watchers {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: rgba(200, 182, 255, 0.9);
  color: white;
  padding: 5px 10px;
  border-radius: 15px;
  font-size: 0.8rem;
  animation: fadeIn 0.3s ease-out;
}
</style>
<script>
const room = new WebsimSocket();

// Track connected users
const connectedUsers = {};

room.onPeersChanged = (peers) => {
  updateOnlineUsers(peers);
};

// Handle user presence
room.onmessage = (event) => {
  const data = event.data;
  switch(data.type) {
    case 'connected':
      console.log(`${data.username} connected`);
      break;
    case 'disconnected':
      console.log(`${data.username} disconnected`);
      break;
    case 'watchingVideo':
      showWatchingIndicator(data.videoId, data.username);
      break;
  }
};

// Update UI to show who's online
function updateOnlineUsers(peers) {
  const onlineList = document.getElementById('online-users');
  onlineList.innerHTML = '';
  
  // Create a map to track usernames and their count
  const usernameCount = new Map();
  
  Object.entries(peers).forEach(([clientId, {username, avatarUrl}]) => {
    // Check if username already exists
    if (usernameCount.has(username)) {
      const count = usernameCount.get(username);
      usernameCount.set(username, count + 1);
      // Add a number suffix if duplicate
      username = `${username} (${count + 1})`;
    } else {
      usernameCount.set(username, 0);
    }

    const userEl = document.createElement('div');
    userEl.classList.add('online-user');
    userEl.innerHTML = `
      <img src="${avatarUrl}" alt="${username}'s avatar" class="mini-avatar">
      <span>${username}</span>
    `;
    onlineList.appendChild(userEl);
  });
}

// Show who's watching what
function showWatchingIndicator(videoId, username) {
  const videos = document.querySelectorAll('.video-card');
  videos.forEach(video => {
    const iframe = video.querySelector('iframe');
    if (iframe.src.includes(videoId)) {
      let watchers = video.querySelector('.watchers');
      
      if (!watchers) {
        watchers = document.createElement('div');
        watchers.classList.add('watchers');
        video.appendChild(watchers);
      }

      // Get current watchers and add new one without duplicates
      let currentWatchers = watchers.innerHTML.split(',').map(w => w.trim());
      currentWatchers = currentWatchers.filter(w => w && !w.startsWith(username));
      currentWatchers.push(username);
      
      // Show all unique watchers
      watchers.innerHTML = currentWatchers.join(', ') + ' watching';
      
      // Remove after 5 seconds
      setTimeout(() => watchers.remove(), 5000);
    }
  });
}

// Broadcast when a user starts watching a video
document.querySelectorAll('.video-card').forEach(card => {
  card.addEventListener('click', function() {
    const videoUrl = this.querySelector('iframe').src;
    const videoId = videoUrl.split('embed/')[1];
    
    room.send({
      type: 'watchingVideo',
      videoId: videoId,
      username: room.party.client.username
    });
  });
});
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Simulate loading state
  setTimeout(() => {
    document.querySelectorAll('.loading').forEach(element => {
      element.classList.remove('loading');
    });
  }, 2000);

  // Search functionality
  const searchInput = document.querySelector('.search-input');
  searchInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      const searchTerm = this.value;
      alert(`Searching for: ${searchTerm}`);
    }
  });

  // Video card click handler
  document.querySelectorAll('.video-card').forEach(card => {
    card.addEventListener('click', function() {
      const videoTitle = this.querySelector('iframe').title;
      alert(`Playing: ${videoTitle}`);
    });
  });

  // Add floating feathers
  function createFeather() {
    const feather = document.createElement('div');
    feather.innerHTML = '❋';
    feather.style.position = 'fixed';
    feather.style.left = Math.random() * 100 + 'vw';
    feather.style.top = -20 + 'px';
    feather.style.color = 'var(--secondary)';
    feather.style.opacity = '0.3';
    feather.style.fontSize = (Math.random() * 20 + 10) + 'px';
    feather.style.pointerEvents = 'none';
    feather.style.animation = `float ${Math.random() * 3 + 4}s linear infinite`;
    document.body.appendChild(feather);
    
    setTimeout(() => {
      feather.remove();
    }, 7000);
  }
  
  setInterval(createFeather, 3000);
});
</script>
